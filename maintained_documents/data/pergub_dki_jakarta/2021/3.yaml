              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_84
            title: >-
              Bagian Kesatu Umum Pasal 47 Upaya pemulihan ekonomi, dilaksanakan dengan cara: a.
              menyelamatkan dan mengembangkan usaha mikro, kecil dan menengah, ekonomi kreatif dan
              koperasi, b. mengembangkan ekonomi digital, Cc. mengembangkan ekonomi inovatif
              perkotaan, d. mempercepat perizinan terkait investasi dan/atau penanaman modal: e.
              memberikan insentif fiskal dan nonfiskal: f. melakukan sinergi program Pemulihan
              Ekonomi Nasional dengan kementerian /lembaga terkait serta pihak lainnya, dan atau g.
              mengembangkan Ekonomi Kreatif.
            content:
              type: pasalSet
