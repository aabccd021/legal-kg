    - type: bab
      node: &ref_55
        nodeType: bab
        key: 2
        parentBabSetNode: *ref_7
      title: PELINDUNGAN KESEHATAN INDIVIDU
      content:
        type: bagianSet
        node:
          nodeType: bagianSet
          parentBabNode: *ref_55
        elements:
          - type: bagian
            node: &ref_56
              nodeType: bagian
              key: 1
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_55
            title: >-
              Bagian Kesatu Standar Masker Pasal 3 (1) Standar Masker terdiri atas: a. standar
              Masker bedah, dan b. standar Masker kain. (2) Standar Masker bedah sebagaimana
              dimaksud pada ayat (1) huruf a memiliki kriteria: a. Bacterial Fultration Efficency 2
              98, b. Particle Filtration Effiency 2 98, dan c. Flud Resistance Minimal 120 mmHg. (3)
              Standar Masker kain sebagaimana dimaksud pada ayat (1) huruf b memiliki kriteria: a.
              menggunakan bahan katun dan memiliki lapisan paling sedikit 2 (dua) lapis, b.
              menggunakan pengait telinga dengan tali elastis, atau tali non elastis yang panjang
              untuk diikatkan kebelakang kepala sehingga Masker bisa pas di wajah dan tidak kendur,
              c. kedua sisinya berbeda warna agar dapat diketahui mana bagian dalam dan bagian luar
              d. mudah dibersihkan dan dicuci tanpa berubah bentuk dan ukuran, dan e. mampu menutupi
              area hidung, mulut dan bawah dagu dengan baik.
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_56
              elements: []
          - type: bagian
            node: &ref_57
              nodeType: bagian
              key: 2
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_55
            title: >-
              Bagian Kedua Penerapan PHBS Pencegahan Covid-19 Pasal 4 Penerapan PHBS Pencegahan
              Covid-19 pada tempat/fasilitas umum meliputi: a. menggunakan Masker di luar rumah: b.
              membatasi aktivitas ke luar rumah hanya untuk kegiatan yang penting dan mendesak, c.
              menjaga kesehatan diri dan tidak beraktivitas di luar rumah ketika merasa tidak sehat:
              d. membatasi aktivitas di luar rumah bagi mereka yang memiliki risiko tinggi jika
              terpapar Covid-19, e. menjaga jarak fisik dalam rentang paling sedikit 1 m (satu
              meter) antara orang jika dalam berinteraksi kelompok, f. membatasi diri untuk tidak
              berada dalam kerumunan orang: g. menghindari penggunaan alat pribadi secara bersama:
              h. cuci tangan pakai sabun dan air mengalir sebelum dan/atau sesudah beraktivitas, i.
              melakukan olahraga secara rutin, dan Jj. mengkonsumsi makanan yang sehat dan bergizi
              seimbang.
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_57
              elements: []
          - type: bagian
            node: &ref_58
              nodeType: bagian
              key: 3
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_55
            title: >-
              Bagian Ketiga Pelaksanaan Isolasi Pasal 5 (1) Setiap Orang yang berada di Provinsi DKI
              Jakarta dengan status konfirmasi Covid-19 berdasarkan rekomendasi dari Puskesmas,
              rumah sakit, atau dokter wajib menjalankan Isolasi guna mencegah penularan Covid-19 di
              masyarakat sesuai dengan pedoman pencegahan dan pengendalian Covid-19. (2) Setiap
              Orang dengan status konfirmasi Covid-19 sebagaimana dimaksud pada ayat (1), sebelum
              menjalankan Isolasi, wajib melaporkan kepada Puskesmas di wilayah tempat tinggal /
              domisili. (3) Penetapan prosedur pemberian rekomendasi sebagaimana dimaksud pada ayat
              (1) ditetapkan dengan Keputusan Kepala Dinas Kesehatan. (4) Penetapan lokasi Isolasi
              dan standar operasional prosedur pengelolaan lokasi Isolasi ditetapkan dengan
              Keputusan Ketua Satuan Tugas Penanganan COVID-19 tingkat Provinsi.
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_58
              elements: []
          - type: bagian
            node: &ref_59
              nodeType: bagian
              key: 4
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_55
            title: Bagian Keempat Pengenaan Sanksi dan Upaya Paksa
            content:
              type: paragrafSet
              node:
                nodeType: paragrafSet
                parentBagianNode: *ref_59
              elements:
                - type: paragraf
                  node: &ref_60
                    nodeType: paragraf
                    key: 1
                    parentParagrafSetNode:
                      nodeType: paragrafSet
                      parentBagianNode: *ref_59
                  title: >-
                    Paragraf 1 Pengenaan Sanksi Pasal 6 (1) Setiap Orang yang tidak menggunakan
                    Masker sesuai dengan standar kesehatan yang menutupi hidung, mulut, dan dagu,
                    ketika berada di luar rumah, saat berkendara, tempat kerja dan/atau tempat
                    aktivitas lainnya dikenakan sanksi berupa: a. kerja sosial dengan membersihkan
                    fasilitas umum, atau b. denda administratif paling banyak sebesar Rp250.000,00
                    (dua ratus lima puluh ribu rupiah). (2) Pelaksanaan pengenaan sanksi sebagaimana
                    dimaksud pada ayat (1) dilakukan oleh Satpol PP dengan pendampingan oleh
                    Perangkat Daerah terkait, dan dapat didampingi oleh unsur Kepolisian dan/atau
                    TNI. Pasal 7 (1) Fasilitas umum sebagaimana dimaksud dalam Pasal 6 ayat ayat (1)
                    huruf a, antara lain: a. jalan, b. trotoar: c. saluran air, d. jembatan
                    penyeberangan orang, e. taman, atau f. halte bus. (2)Alat untuk pelaksanaan
                    sanksi kerja sosial dengan membersihkan fasilitas umum sebagaimana dimaksud
                    dalam Pasal 6 ayat (1) huruf a terdiri atas: a. rompi, b. alat pembersih, antara
                    lain sapu, lap, dan ember, dan c. Masker. (3) Alat untuk kerja sosial dengan
                    membersihkan fasilitas umum sebagaimana dimaksud pada ayat (2) disediakan oleh
                    Satpol PP. Pasal 8 (1) Denda administratif sebagaimana dimaksud dalam Pasal 6
                    ayat (1) huruf b wajib disetorkan ke kas daerah. (2) Satpol PP menerbitkan Surat
                    Ketetapan Denda Administratif berdasarkan bukti pelanggaran dan diberikan kepada
                    pelanggar untuk disetorkan ke kas daerah melalui Bank DKI. (3) Foto kopi surat
                    tanda setoran dari Bank DKI oleh pelanggar sebagaimana dimaksud pada ayat (2)
                    diserahkan kepada kantor Satpol PP di wilayah penindakan pelanggaran terjadi.
                  pasalSet:
                    type: pasalSet
                    node:
                      nodeType: pasalSet
                      parentNode: *ref_60
                    elements: []
                - type: paragraf
                  node: &ref_61
                    nodeType: paragraf
                    key: 2
                    parentParagrafSetNode:
                      nodeType: paragrafSet
                      parentBagianNode: *ref_59
                  title: >-
                    Paragraf 2 Upaya Paksa Pasal 9 (l) Setiap Orang terkonfirmasi positif Covid-19
                    yang tidak melaksanakan Isolasi sesuai ketentuan dikenakan upaya paksa untuk
                    ditempatkan pada lokasi Isolasi yang ditentukan oleh Satuan Tugas Penanganan
                    Covid-19 Tingkat Provinsi. (2) Pengenaan upaya paksa sebagaimana dimaksud pada
                    ayat (1) dilaksanakan oleh Satpol PP dengan mengikutsertakan tenaga kesehatan,
                    dan dapat didampingi oleh unsur Kepolisian dan/atau TNI.
                  pasalSet:
                    type: pasalSet
                    node:
                      nodeType: pasalSet
                      parentNode: *ref_61
                    elements: []
                - type: paragraf
                  node: &ref_62
                    nodeType: paragraf
                    key: 3
                    parentParagrafSetNode:
                      nodeType: paragrafSet
                      parentBagianNode: *ref_59
                  title: >-
                    Paragraf 3 Pendataan Pasal 10 (l) Setiap melakukan pengenaan sanksi dan upaya
                    paksa sebagaimana dimaksud dalam Pasal 6 dan Pasal 9, Satpol PP mendata nama,
                    alamat dan nomor induk kependudukan untuk dimasukan ke dalam sistem elektronik
                    melalui aplikasi yang dibangun oleh Diskominfotik. (2) Dalam hal sistem
                    elektronik sebagaimana dimaksud pada ayat (1) belum tersedia, Satpol PP dapat
                    melakukan pendataan nama, alamat dan nomor induk kependudukan pelanggar secara
                    manual.
                  pasalSet:
                    type: pasalSet
                    node:
                      nodeType: pasalSet
                      parentNode: *ref_62
                    elements: []
    - type: bab
      node: &ref_63
        nodeType: bab
        key: 3
        parentBabSetNode: *ref_7
      title: PELINDUNGAN KESEHATAN MASYARAKAT
      content:
        type: bagianSet
        node:
          nodeType: bagianSet
          parentBabNode: *ref_63
        elements:
          - type: bagian
            node: &ref_64
              nodeType: bagian
              key: 1
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_63
            title: >-
              Bagian Kesatu Pelindungan Kesehatan Masyarakat pada Perkantoran / Tempat Kerja, Tempat
              Usaha, Tempat Industri, Perhotelan / Penginapan lain yang sejenis, dan Tempat Wisata
            content:
              type: paragrafSet
              node:
                nodeType: paragrafSet
                parentBagianNode: *ref_64
              elements:
                - type: paragraf
                  node: &ref_65
                    nodeType: paragraf
                    key: 1
                    parentParagrafSetNode:
                      nodeType: paragrafSet
                      parentBagianNode: *ref_64
                  title: >-
                    Paragraf 1 Perkantoran / Tempat Kerja Swasta, Badan Usaha Milik Negara, atau
                    Badan Usaha Milik Daerah Pasal 11 (1) Pelaku usaha, pengelola, penyelenggara,
                    atau penanggung jawab perkantoran/tempat kerja milik swasta, Badan Usaha Milik
                    Negara, atau Badan Usaha Milik Daerah, dalam menyelenggarakan aktivitas bekerja
                    wajib melaksanakan pelindungan kesehatan masyarakat, yang meliputi: a. melakukan
                    edukasi dan protokol pencegahan Covid-19, dan b. melakukan pembatasan interaksi
                    fisik pada setiap aktivitas kerja. (2) Edukasi dan protokol pencegahan Covid-19
                    sebagaimana dimaksud pada ayat (1) huruf a, terdiri atas: a. menyediakan sarana
                    cuci tangan dengan air mengalir dan sabun yang ditempatkan pada area
                    keluar-masuk perkantoran, b. menyediakan hand sanitizer di setiap lantai, area
                    lift, dan mesin absensi: c. melakukan pengukuran suhu kepada pekerja maupun tamu
                    yang akan memasuki perkantoran, d. mewajibkan penggunaan Masker ditempat kerja,
                    secara tertulis dalam bentuk poster atau banner, e. membentuk Tim Satuan Tugas
                    Penanganan Covid-19 internal perusahaan dengan keputusan pimpinan perkantoran /
                    tempat kerja: f. melakukan pembersihan pada peralatan yang sering digunakan
                    secara bersama dengan cairan disinfektan setiap harinya, dan melakukan
                    penyemprotan disinfektan ruangan secara berkala setiap bulannya, g. tidak
                    melakukan pemutusan hubungan kerja kepada pekerja yang sedang menjalani Isolasi,
                    h. memberikan sanksi bagi pekerja yang tidak melaksanakan protokol pencegahan
                    Covid-19 yang diatur dalam peraturan perusahaan atau perjanjian kerja, i.
                    membuat dan menempelkan Pakta Integritas pada area yang mudah dibaca pegawai
                    maupun tamu, Jj. memanfaatkan penggunaan aplikasi JAKI atau aplikasi sejenis
                    dalam penanggulangan Covid-19, k. dalam hal ditemukan pekerja terkonfirmasi
                    Covid-19, dilakukan penutupan tempat kerja selama 3x24 (tiga kali dua puluh
                    empat) jam dan melakukan disinfeksi ruangan secara menyeluruh, serta melaporkan
                    kepada Dinas Tenaga Kerja, Transmigrasi dan Energi, l. dalam hal terjadi klaster
                    penularan Covid-19, pengelola gedung melakukan penutupan 1 (satu) kesatuan
                    area/gedung perkantoran selama 3x24 (tiga kali dua puluh empat) jam berdasarkan
                    rekomendasi dari Dinas Kesehatan: dan m.memberikan keterangan yang
                    sebenar-benarnya kepada petugas yang melakukan pemeriksaan. (3 Pembatasan
                    interaksi fisik pada setiap aktivitas kerja sebagaimana dimaksud pada ayat (1)
                    huruf b, terdiri atas: a. menerapkan sistem bekerja dirumah (work from home)
                    secara bergilir dan membatasi kapasitas jumlah pekerja dalam waktu yang
                    bersamaan, b. melakukan pembatasan kapasitas tamu dan pengaturan jarak tempat
                    duduk paling sedikit 1 m (satu meter), dan Cc. meniadakan aktivitas yang dapat
                    menyebabkan kerumunan antara lain rapat, seminar, apel, dan menggantinya dengan
                    memanfaatkan teknologi untuk melaksanakan aktivitas tersebut secara virtual. 10
                    Pasal 12 (1) Pelaku usaha, pengelola, penyelenggara, atau penanggung jawab
                    perkantoran/tempat kerja milik swasta, Badan Usaha Milik Negara, atau Badan
                    Usaha Milik Daerah yang tidak melaksanakan kewajiban pelindungan kesehatan
                    masyarakat sebagaimana dimaksud dalam Pasal 11 dikenakan sanksi administratif
                    berupa: a. teguran tertulis, b. penghentian sementara kegiatan, c. denda
                    administratif, d. pembekuan sementara izin, dan/atau e. pencabutan izin. (2)
                    Pelaksanaan pengenaan sanksi administratif kepada pelaku usaha, pengelola,
                    penyelenggara, atau penanggung jawab perkantoran/tempat kerja milik swasta,
                    Badan Usaha Milik Negara, atau Badan Usaha Milik Daerah sebagaimana dimaksud
                    pada ayat (1) dilakukan dengan tahapan: a. jika ditemukan pelanggaran protokol
                    pencegahan Covid-19 diberikan teguran tertulis, b. jika mengulangi pelanggaran
                    protokol pencegahan Covid-19 setelah diberikan teguran tertulis sebagaimana
                    dimaksud pada huruf a, maka dilakukan penghentian sementara kegiatan selama 3
                    (tiga) hari dengan pemasangan segel pada pintu masuk perkantoran/tempat kerja,
                    dan c. jika masih mengulangi pelanggaran protokol pencegahan Covid-19 setelah
                    mendapatkan penghentian sementara kegiatan sebagaimana dimaksud pada huruf b,
                    maka dikenakan denda administratif paling banyak Rp50.000.000,00 (lima puluh
                    juta rupiah). (3) Bagi pelaku usaha, pengelola, penyelenggara, atau penanggung
                    jawab perkantoran/tempat kerja milik swasta, Badan Usaha Milik Negara, atau
                    Badan Usaha Milik Daerah yang tidak melaksanakan penghentian sementara kegiatan
                    atau membayar denda administratif sebagaimana dimaksud pada ayat (2) huruf b dan
                    huruf c, maka Dinas Penanaman Modal dan PTSP mengenakan sanksi administratif
                    berupa pembekuan sementara izin atau pencabutan izin setelah mendapat
                    rekomendasi dari Kepala Dinas Tenaga Kerja, Transmigrasi dan Energi atau pejabat
                    yang berwenang. (4) Pelaksanaan pengenaan sanksi administratif kepada pelaku
                    usaha, pengelola, penyelenggara, atau penanggung jawab perkantoran/tempat kerja
                    milik swasta, Badan Usaha Milik Negara, atau Badan Usaha Milik Daerah, dilakukan
                    oleh Dinas Tenaga Kerja, Transmigrasi dan Energi dan dapat didampingi oleh unsur
                    Satpol PP, Kepolisian, dan/atau TNI. 11 (5) Petunjuk teknis mengenai tata cara
                    pelaksanaan pengenaan sanksi administratif ditetapkan dengan Keputusan Kepala
                    Dinas Tenaga Kerja, Transmigrasi dan Energi.
                  pasalSet:
                    type: pasalSet
                    node:
                      nodeType: pasalSet
                      parentNode: *ref_65
                    elements: []
                - type: paragraf
                  node: &ref_66
                    nodeType: paragraf
                    key: 2
                    parentParagrafSetNode:
                      nodeType: paragrafSet
                      parentBagianNode: *ref_64
                  title: >-
                    Paragraf 2 Perkantoran / Tempat Kerja Instansi Pemerintah Pasal 13 (1)
                    Penanggung jawab perkantoran/tempat kerja atau Kepala Unit Kerja pada Instansi
                    Pemerintah dalam menyelenggarakan aktivitas wajib melaksanakan pelindungan
                    kesehatan masyarakat yang meliputi: a. melakukan edukasi dan protokol pencegahan
                    Covid-19, dan b. melakukan pembatasan interaksi fisik pada setiap aktivitas
                    kerja. (2) Ketentuan mengenai pelaksanaan edukasi dan protokol pencegahan
                    Covid-19 dan pembatasan interaksi fisik pada setiap aktivitas kerja sebagaimana
                    dimaksud dalam Pasal 11, berlaku secara mutatis mutandis terhadap pelaksanaan
                    edukasi dan protokol pencegahan Covid-19 dan pembatasan interaksi fisik pada
                    perkantoran/tempat kerja atau Kepala Unit Kerja pada Instansi Pemerintah,
                    kecuali pemberian sanksi disiplin bagi pegawai yang tidak melaksanakan protokol
                    pencegahan Covid-19 mengacu pada ketentuan peraturan perundang-undangan mengenai
                    kepegawaian. Pasal 14 (1) Penanggung jawab perkantoran/tempat kerja atau Kepala
                    Unit Kerja pada Instansi Pemerintah yang tidak melaksanakan kewajiban
                    pelindungan kesehatan masyarakat sebagaimana dimaksud dalam Pasal 11, dikenakan
                    sanksi administratif berupa teguran tertulis. (2) Pelaksanaan pengenaan sanksi
                    administratif sebagaimana dimaksud pada ayat (1), dilakukan oleh Satuan Tugas
                    Penanganan Covid-19 tingkat Provinsi berdasarkan rekomendasi dari Dinas Tenaga
                    Kerja, Transmigrasi dan Energi.
                  pasalSet:
                    type: pasalSet
                    node:
                      nodeType: pasalSet
                      parentNode: *ref_66
                    elements: []
                - type: paragraf
                  node: &ref_67
                    nodeType: paragraf
                    key: 3
                    parentParagrafSetNode:
                      nodeType: paragrafSet
                      parentBagianNode: *ref_64
                  title: >-
                    Paragraf 3 Tempat Usaha dan/atau Tempat Industri Pasal 15 (1) Pelaku usaha,
                    pengelola, penyelenggara, atau penanggung jawab tempat usaha dan/atau tempat
                    industri, dalam menyelenggarakan aktivitas usaha wajib melaksanakan pelindungan
                    kesehatan masyarakat, yang meliputi: a. melakukan edukasi dan protokol
                    pencegahan Covid-19, dan 12 b. melakukan pembatasan interaksi fisik pada setiap
                    aktivitas kerja. (2) Edukasi dan protokol pencegahan Covid-19 sebagaimana
                    dimaksud pada ayat (1) huruf a, terdiri atas: a. menyediakan sarana cuci tangan
                    dengan air mengalir dan sabun yang ditempatkan pada area keluar-masuk
                    perkantoran, b. menyediakan hand sanitizer di setiap lantai, area lift, dan
                    mesin absensi: c. melakukan pengukuran suhu kepada pekerja maupun tamu yang akan
                    memasuki tempat usaha dan/atau tempat industri, d. mewajibkan penggunaan Masker
                    di tempat usaha dan/atau industri, secara tertulis dalam bentuk poster atau
                    banner, e. membentuk tim gugus Covid-19 internal perusahaan dengan keputusan
                    pimpinan perkantoran /tempat kerja, f. melakukan pembersihan pada peralatan yang
                    sering digunakan secara bersama dengan cairan disinfektan setiap harinya, dan
                    melakukan penyemprotan disinfektan ruangan secara berkala setiap bulannya, g.
                    tidak melakukan pemutusan hubungan kerja kepada pekerja yang sedang menjalani
                    Isolasi, h. memberikan sanksi bagi pekerja yang tidak melaksanakan protokol
                    pencegahan Covid-19 yang diatur dalam peraturan perusahaan atau perjanjian
                    kerja, i. membuat dan menempelkan Pakta Integritas pada area yang mudah dibaca
                    oleh para pekerja, tamu dan pengunjung: J. menerapkan kebijakan self assessment
                    risiko COVID-19 untuk memastikan pekerja yang akan masuk kerja dalam kondisi
                    tidak terkonfirmasi Covid-19: k. memasang media informasi untuk mengingatkan
                    pekerja, pelaku usaha, konsumen /pengunjung dan pengunjung agar mengikuti
                    ketentuan pembatasan jarak fisik dan mencuci tangan pakai sabun dengan air
                    mengalir/ hand sanitizer serta menggunakan Masker, Il. mengoptimalkan desain dan
                    fungsi ruang kerja dengan sirkulasi udara yang baik dan mendapatkan sinar
                    matahari yang cukup: m.mengedukasi dan melatih pekerja mengenai protokol
                    pencegahan Covid-19: n. memanfaatkan penggunaan aplikasi Jakarta Kini (JAKI)
                    atau aplikasi sejenis dalam penanggulangan Covid-19, 13 o. dalam hal ditemukan
                    pekerja terkonfirmasi Covid-19, dilakukan penutupan tempat kerja selama 3x24
                    (tiga kali dua puluh empat) jam dan melakukan disinfeksi ruangan secara
                    menyeluruh, serta melaporkan kepada Dinas Tenaga Kerja, Transmigrasi dan Energi,
                    dan p. dalam hal terjadi klaster penularan Covid-19, pengelola gedung melakukan
                    penutupan 1 (satu) kesatuan area/gedung perkantoran selama 3x24 (tiga kali dua
                    puluh empat) jam berdasarkan rekomendasi dari Dinas Kesehatan. (3) Pembatasan
                    interaksi fisik pada setiap aktivitas kerja sebagaimana dimaksud pada ayat (1)
                    huruf b, terdiri atas: a. memaksimalkan pekerja yang berusia di bawah 45 (empat
                    puluh lima) tahun, selain itu disarankan melakukan pengaturan penempatan dan
                    waktu kerja bagi karyawan yang berusia lebih dari 45 (empat puluh lima) tahun
                    atau memiliki penyakit bawaan untuk meminimalisir risiko penularan: b. mengatur
                    waktu kerja tidak terlalu panjang (lembur) yang akan mengakibatkan pekerja
                    kekurangan waktu untuk beristirahat yang dapat menyebabkan penurunan sistem
                    kekebalan /imunitas tubuh, c. melakukan pembatasan jarak fisik paling sedikit 1
                    m (satu meter): d. memberikan tanda khusus yang ditempatkan dilantai area padat
                    pekerja/pengunjung seperti ruang ganti, lift, toilet, area kasir, area customer
                    service dan area lain sebagai pembatas jarak antar pekerja dan tamu/pelanggan,
                    e. pengaturan jumlah pekerja yang masuk agar memudahkan penerapan menjaga jarak,
                    fI. pengaturan meja dan tempat duduk dengan jarak paling sedikit 1 m (satu
                    meter): g. melakukan upaya untuk meminimalkan kontak dengan pelanggan, seperti:
                    1. menggunakan pembatas/partisi di meja atau counter sebagai perlindungan
                    tambahan untuk pekerja, dan 2. mendorong penggunaan metode pembayaran non tunai,
                    jika masih menjalankan transaksi tunai maka pelaku usaha wajib menerapkan
                    tindakan yang dianggap perlu untuk mencegah penularan Covid-19. h. mencegah
                    kerumunan pelanggan, dengan cara: 1. menetapkan kuota dan mengontrol jumlah
                    karyawan / pelanggan yang dapat masuk ke lokasi usaha untuk membatasi akses dan
                    menghindari kerumunan, 14 2. menerapkan sistem antrian di pintu masuk dan
                    menjaga jarak paling sedikit 1 m (satu meter): 3. menerima pesanan/reservasi
                    secara daring atau melalui telepon untuk meminimalkan pertemuan langsung dengan
                    pelanggan dan bagi usaha tertentu dapat menyediakan layanan pesan antar atau
                    dibawa pulang, dan 4. melaksanakan jam layanan, sesuai dengan kebijakan yang
                    ditetapkan oleh Pemerintah Provinsi DKI Jakarta. i. menugaskan orang atau tim
                    khusus yang bertanggung jawab khusus untuk memastikan penerapan protokol
                    pencegahan Covid-19 di tempat usaha dan/atau tempat industri, dan Jj.
                    mendokumentasikan seluruh tindakan yang sudah dilaksanakan dalam rangka protokol
                    pencegahan Covid-19 dan menyimpan dokumen serta rekaman paling sedikit selama 3
                    (tiga) bulan untuk penelusuran. Pasal 16 (1) Pengelola, penyelenggara, atau
                    penanggung jawab tempat usaha dan/atau tempat industri yang tidak melaksanakan
                    kewajiban pelindungan kesehatan masyarakat sebagaimana dimaksud dalam Pasal 15
                    dikenakan sanksi administratif berupa: a. teguran tertulis, b. penghentian
                    sementara kegiatan, c. denda administratif, d. pembekuan sementara izin,
                    dan/atau e. pencabutan izin. (2) Pelaksanaan pengenaan sanksi administratif
                    kepada pengelola, penyelenggara, atau penanggung jawab tempat usaha dan/atau
                    tempat industri sebagaimana dimaksud pada ayat (1) dilakukan dengan tahapan: a.
                    jika ditemukan pelanggaran pelindungan kesehatan masyarakat diberikan teguran
                    tertulis, b. jika mengulangi pelanggaran pelindungan kesehatan masyarakat
                    setelah diberikan teguran tertulis sebagaimana dimaksud pada huruf a, maka
                    dilakukan penghentian sementara kegiatan selama 3 (tiga) hari dengan pemasangan
                    segel pada pintu masuk tempat usaha dan/atau tempat industri, dan Cc. jika masih
                    mengulangi pelanggaran pelindungan kesehatan masyarakat setelah mendapatkan
                    penghentian sementara kegiatan sebagaimana dimaksud pada huruf b, maka dikenakan
                    denda administratif paling banyak Rp50.000.000,00 (lima puluh juta rupiah). 15
                    (3) Bagi pengelola, penyelenggara, atau penanggung jawab tempat usaha dan/atau
                    tempat industri yang tidak melaksanakan penghentian sementara kegiatan atau
                    membayar denda administratif sebagaimana dimaksud pada ayat (2) huruf b dan
                    huruf c, maka Dinas Penanaman Modal dan PTSP mengenakan sanksi administratif
                    berupa pembekuan sementara izin atau pencabutan izin setelah mendapat
                    rekomendasi dari Kepala Dinas Perindustrian, Perdagangan, KUKM atau pejabat yang
                    berwenang. (4) Pelaksanaan pengenaan sanksi administratif kepada Pengelola,
                    penyelenggara, atau penanggung jawab tempat usaha dan/atau tempat industri,
                    dilakukan oleh Dinas Perindustrian, Perdagangan, KUKM dan dapat didampingi oleh
                    unsur Satpol PP, Kepolisian, dan/atau TNI. (5) Terhadap tempat usaha bidang
                    pariwisata, rekomendasi pembekuan sementara izin atau pencabutan izin dan
                    pelaksanaan pengenaan sanksi administratif dilakukan oleh Kepala Dinas
                    Pariwisata dan Ekonomi Kreatif. Pasal 17 (l) Petunjuk teknis mengenai tata cara
                    pelaksanaan pengenaan sanksi administratif untuk tempat usaha dan/atau tempat
                    industri ditetapkan dengan Keputusan Kepala Dinas Perindustrian, Perdagangan,
                    KUKM. (2) Petunjuk teknis mengenai tata cara pelaksanaan pengenaan sanksi
                    administratif untuk tempat usaha bidang pariwisata ditetapkan dengan Keputusan
                    Kepala Dinas Pariwisata dan Ekonomi Kreatif.
