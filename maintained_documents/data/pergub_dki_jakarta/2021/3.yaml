                parentBabNode: *ref_63
            title: >-
              Bagian Ketiga Pelindungan Kesehatan Masyarakat pada Tempat Ibadah Pasal 22 (1)
              Pengelola, penyelenggara, atau penanggung jawab tempat ibadah dalam menyelenggarakan
              aktivitas kegiatan keagamaan wajib melaksanakan pelindungan kesehatan masyarakat, yang
              meliputi: a. melaksanakan edukasi dan protokol pencegahan Covid-19 di lingkungan
              tempat ibadah, b. melakukan pembatasan interaksi fisik antar pengguna tempat ibadah:
              dan Cc. mengikuti kebijakan yang ditetapkan oleh organisasi keagamaan. (2) Edukasi dan
              protokol pencegahan Covid-19 sebagaimana dimaksud pada ayat (1) huruf a, meliputi: a.
              membatasi jumlah pengguna tempat ibadah paling banyak 50Y6 (lima puluh persen) dari
              kapasitas tempat ibadah, b. menerapkan protokol pencegahan Covid-19 di lingkungan
              tempat ibadah, c. melakukan pengukuran suhu tubuh bagi seluruh pengguna tempat ibadah,
              d. memberitahukan setiap pengguna tempat ibadah untuk membawa sendiri perlengkapan
              ibadah, 20 e. membersihkan tempat ibadah dan lingkungan sekitar, f. melakukan
              disinfeksi pada lantai, dinding, dan perangkat bangunan tempat ibadah sebelum dan
              setelah kegiatan ibadah: g. khusus untuk tempat ibadah raya harus melaksanakan
              pencatatan pengunjung, baik buku tamu atau dengan sistem teknologi, h. mengikuti
              kebijakan yang ditetapkan oleh organisasi keagamaan, dan i. membuat prosedur
              pelaksanaan sebelum, saat, dan sesudah kegiatan keagamaan. (3) Pembatasan interaksi
              fisik pada setiap aktivitas pembelajaran sebagaimana dimaksud pada ayat (1) huruf b,
              dilakukan dengan membatasi interaksi fisik dengan rentang jarak paling sedikit 1 m
              (satu meter) antar pengguna tempat ibadah. Pasal 23 (1) Pengelola, penyelenggara, atau
              penanggung jawab tempat ibadah yang tidak melaksanakan kewajiban pelindungan kesehatan
              masyarakat sebagaimana dimaksud dalam Pasal 22 dikenakan sanksi administratif berupa
              teguran tertulis. (2) Pelaksanaan pengenaan sanksi administratif berupa teguran
              tertulis sebagaimana dimaksud pada ayat (1) dilakukan oleh Walikota/Bupati
              Administrasi dan dapat didampingi oleh Perangkat Daerah terkait.
