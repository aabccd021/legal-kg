          - type: bagian
            node: &ref_90
              nodeType: bagian
              key: 6
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_84
            title: >-
              Bagian Keenam Pemberian Insentif Fiskal dan Non Fiskal Pasal 52 (1) Insentif fiskal
              dan non fiskal dapat diberikan kepada masyarakat yang terdampak Covid-19 untuk
              meringankan beban ekonomi dan memberikan stimulus sesuai dengan ketentuan peraturan
              perundang-undangan. (2) Insentif fiskal dan non fiskal dapat diberikan kepada dunia
              usaha yang terdampak Covid-19 untuk menjaga aktifitas produksi, menggerakkan roda
              perekonomian, dan mengurangi beban usaha. (3) Insentif fiskal dapat berupa keringanan
              pajak dan retribusi daerah meliputi penghapusan bunga keterlambatan, pemberian
              keringanan retribusi daerah, dan penghapusan sanksi administratif. 39 4) Insentif non
              fiskal dapat berupa percepatan dan kemudahan proses perizinan bagi usaha mikro, kecil
              dan menengah, pendirian koperasi di kampung prioritas, kolaborasi dengan pemangku
              kepentingan terkait. (S5) Kolaborasi dengan pemangku kepentingan terkait sebagaimana
              dimaksud pada ayat (4), meliputi pengembangan program: a. kolaborasi sosial berskala
              besar usaha mikro, kecil dan menengah, b. kolaborasi sosial berskala besar pangan, dan
              c. kolaborasi sosial berskala besar tenaga kerja.
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_90
              elements: []
          - type: bagian
            node: &ref_91
              nodeType: bagian
              key: 7
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_84
            title: >-
              Bagian Ketujuh Sinergi Program Pemulihan Ekonomi Nasional Pasal 53 (1) Sinergi program
              pemulihan ekonomi nasional dilakukan bersama Pemerintah Pusat, Badan Usaha Milik
              Negara, Badan Usaha Milik Daerah, dan pihak lainnya sesuai dengan ketentuan peraturan
              perundang-undangan. (2) Bentuk sinergi program pemulihan ekonomi nasional meliputi: a.
              mendata, memutakhiran, dan mengusulkan data penerima manfaat kepada
              kementerian/lembaga terkait secara berkala, b. melakukan sosialisasi kepada dunia
              usaha terkait program pemulihan ekonomi nasional, Cc. mengajukan usulan pinjaman
              pemulihan ekonomi nasional daerah kepada pemerintah pusat untuk proyek infrastruktur
              daerah: dan d. menyalurkan kredit kepada usaha mikro kecil dan menengah, pedagang
              pasar dan pelaku usaha lainnya melalui Bank DKI. (3) Sinergi program pemulihan ekonomi
              nasional dilaksanakan oleh Tim Pemulihan Ekonomi Nasional Provinsi DKI Jakarta yang
              ditetapkan dengan Keputusan Gubernur.
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_91
              elements: []
          - type: bagian
            node: &ref_92
              nodeType: bagian
              key: 8
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_84
            title: >-
              Bagian Kedelapan Pengembangan Ekonomi Kreatif Pasal 54 (1) Pembinaan dan pelatihan
              dilaksanakan untuk mengembangkan dan meningkatkan kualitas pelaku ekonomi kreatif. (2)
              Pemerintah Provinsi DKI Jakarta dapat memfasilitasi pencatatan atas hak cipta,
              pendaftaran hak kekayaan industri pelaku ekonomi kreatif dan pengembangan pemasaran
              produk ekonomi kreatif berbasis kekayaan intelektual, sesuai dengan ketentuan
              peraturan perundang-undangan. 40 (3) Pengembangan jejaring pelaku ekonomi kreatif
              dilaksanakan melalui kerjasama atau kolaborasi antara pemerintah, pelaku usaha,
              komunitas dan institusi pendidikan.
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_92
              elements: []
