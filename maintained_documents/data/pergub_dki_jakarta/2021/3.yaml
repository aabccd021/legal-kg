    - type: bab
      node: &ref_76
        nodeType: bab
        key: 4
        parentBabSetNode: *ref_7
      title: >-
        PSBB Pasal 35 (1) Dalam upaya pencegahan penyebaran Covid-19, Gubernur dapat memberlakukan
        PSBB di Provinsi DKI Jakarta. (2) PSBB sebagaimana dimaksud pada ayat (1) dilakukan dalam
        bentuk pembatasan aktivitas luar rumah yang dilakukan oleh 29 setiap orang yang berdomisili
        dan/atau berkegiatan di Provinsi DKI Jakarta. (3) Selama pemberlakuan PSBB, setiap orang
        yang berdomisili dan/atau berkegiatan di Provinsi DKI Jakarta wajib mematuhi Penerapan PHBS
        Pencegahan Covid-19 sebagaimana dimaksud dalam Pasal 4. (4) Pelanggaran terhadap kewajiban
        mematuhi Penerapan PHBS Pencegahan Covid-19 dikenakan sanksi sebagaimana dimaksud dalam
        Pasal 6. (5) Pemberlakuan, jangka waktu dan pembatasan aktivitas luar rumah PSBB ditetapkan
        dengan Keputusan Gubernur. Pasal 36 (1) Pembatasan aktivitas luar rumah dalam pelaksanaan
        PSBB meliputi: a. perkantoran/tempat kerja, tempat usaha, tempat industri, perhotelan
        /penginapan lain yang sejenis dan tempat wisata, b. Satuan Pendidikan: Cc. tempat ibadah, d.
        moda transportasi, e. warung makan, rumah makan, kafe, dan restoran, f. pedagang kaki
        lima/lapak jajanan pada lokasi binaan dan lokasi sementara, g. fasilitas pelayanan
        kesehatan, dan h. area publik dan tempat lainnya yang dapat menimbulkan kerumunan massa. (2)
        Selama pemberlakuan PSBB, aktivitas luar rumah sebagaimana dimaksud pada ayat (1) dilakukan
        penghentian sementara, kecuali aktivitas luar rumah yang diperbolehkan dibuka berdasarkan
        Keputusan Gubernur mengenai pemberlakuan PSBB. (3) Bagi pengelola, penyelenggara dan
        penanggung jawab, aktivitas luar rumah yang diperbolehkan dibuka, wajib mematuhi ketentuan
        mengenai pelindungan kesehatan masyarakat sebagaimana dimaksud dalam Peraturan Gubernur ini.
        Pasal 37 (1) Bagi setiap aktivitas yang dilaksanakan tidak sesuai dengan pemberlakuan
        pembatasan kegiatan / aktivitas PSBB, dikenakan sanksi administratif berupa penutupan
        sementara tempat kegiatan/aktivitas sampai dengan masa tahapan aktifitas kegiatan PSBB
        berakhir. 30 (2) Jika masih mengulangi pelanggaran setelah dikenakan sanksi administratif
        berupa penutupan sementara tempat kegiatan/ aktivitas sebagaimana dimaksud pada ayat (1),
        maka dikenakan sanksi berupa pembekuan sementara izin. (3) Pembekuan sementara izin dan
        pencabutan izin sebagaimana dimaksud pada ayat (2) dilakukan oleh Dinas Penanaman Modal dan
        PTSP setelah mendapat rekomendasi dari Kepala Satpol PP dan/atau Perangkat Daerah terkait.
        (4) Pelaksanaan pengenaan sanksi sebagaimana dimaksud pada ayat (1) dilakukan oleh Satpol PP
        selaku Ketua Bidang Penegakan Hukum dan Kedisiplinan Satuan Tugas Penanganan Covid-19
        Tingkat Provinsi dan dapat didampingi oleh unsur Perangkat Daerah terkait, Kepolisian
        dan/atau TNI. (5) Ketentuan mengenai tata cara pengenaan sanksi administratif pelanggaran
        pemberlakuan pembatasan kegiatan /aktivitas PSBB, ditetapkan dengan Keputusan Kepala Satpol
        PP. Pasal 38 Koordinasi, pengerahan sumber daya dan operasional pelaksanaan PSBB dilakukan
        oleh Satuan Tugas Penanganan Covid-19 tingkat Provinsi.
      content:
        type: pasalSet
        node:
          nodeType: pasalSet
          parentNode: *ref_76
        elements: []
    - type: bab
      node: &ref_77
        nodeType: bab
        key: 5
        parentBabSetNode: *ref_7
      title: PSBB PADA MASA TRANSISI
      content:
        type: bagianSet
        node:
          nodeType: bagianSet
          parentBabNode: *ref_77
        elements:
          - type: bagian
            node: &ref_78
              nodeType: bagian
              key: 1
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_77
            title: >-
              Bagian Kesatu Masa Transisi Pasal 39 (l) Dalam upaya menuju masyarakat yang aman,
              sehat, dan produktif, diberlakukan Masa Transisi. (2) Dalam pemberlakuan Masa Transisi
              sebagaimana dimaksud pada ayat (1), dilaksanakan: a. penerapan pelindungan kesehatan
              individu dan pelindungan kesehatan masyarakat sebagaimana dimaksud dalam Peraturan
              Gubernur ini: b. pentahapan kegiatan / aktivitas masyarakat, dan Cc. pengendalian moda
              transportasi. 31 (3) Pemberlakuan Masa Transisi sebagaimana dimaksud pada ayat (1)
              didasarkan pada indikator kajian dan penilaian yang dilakukan oleh Satuan Tugas
              Penanganan Covid-19 tingkat Provinsi dengan melibatkan pemangku kepentingan meliputi:
              a. kajian epidemiologi, b. penilaian kondisi kesehatan publik: dan Cc. penilaian
              kesiapan fasilitas kesehatan. (4) Pemberlakuan Masa Transisi sebagaimana dimaksud pada
              ayat (1), dilaksanakan secara bertahap terhadap kegiatan/ aktivitas pada tempat
              /fasilitas umum meliputi: a. perkantoran/tempat kerja, tempat usaha, tempat industri,
              perhotelan /penginapan lain yang sejenis dan tempat wisata, b. Satuan Pendidikan: Cc.
              tempat ibadah, d. moda transportasi, e. warung makan, rumah makan, kafe, dan restoran,
              f. pedagang kaki lima/lapak jajanan pada lokasi binaan dan lokasi sementara, g.
              fasilitas pelayanan kesehatan, dan h. area publik dan tempat lainnya yang dapat
              menimbulkan kerumunan massa. (5) Pemberlakuan pada Masa Transisi ditetapkan dengan
              Keputusan Gubernur. (6) Penentuan tahapan dan pelaksanaan kegiatan/aktivitas pada Masa
              Transisi ditetapkan dengan: a. Keputusan Kepala Dinas Tenaga Kerja, Transmigrasi dan
              Energi untuk perkantoran/tempat kerja, b. Kepala Dinas Pendidikan untuk Satuan
              Pendidikan: c. Keputusan Sekretaris Daerah untuk tempat ibadah, d. Kepala Dinas
              Perhubungan untuk moda transportasi, e. Kepala Dinas Perindustrian, Perdagangan, KUKM
              untuk tempat industri, pedagang kaki lima/lapak jajanan pada lokasi binaan dan lokasi
              sementara, dan warung makan, f. Kepala Dinas Kesehatan untuk fasilitas pelayanan
              kesehatan, g. Kepala Dinas Pariwisata dan Ekonomi Kreatif untuk tempat usaha,
              perhotelan/penginapan lain yang sejenis, tempat wisata, rumah makan, kafe, dan
              restoran: dan h. Keputusan Kepala Dinas Kebudayaan, Keputusan Kepala Dinas Pemuda dan
              Olahraga atau Keputusan Kepala Dinas terkait sesuai kewenangannya, untuk area publik
              dan tempat lainnya yang dapat menimbulkan kerumunan massa. 32 Pasal 40 (1) Bagi setiap
              kegiatan/aktivitas yang dilaksanakan tidak sesuai dengan pemberlakuan, penentuan
              tahapan, dan pelaksanaan kegiatan / aktivitas pada Masa Transisi sebagaimana dimaksud
              dalam Pasal 39 ayat (5) dan ayat (6), dikenakan sanksi administratif berupa penutupan
              sementara tempat kegiatan/ aktivitas sesuai masa tahapan aktifitas kegiatan pada masa
              transisi. (2) Pelaksanaan pengenaan sanksi sebagaimana dimaksud pada ayat (1)
              dilakukan oleh: a. Satpol PP pada perkantoran milik pemerintah, warung makan, rumah
              makan, kafe, restoran, area publik dan tempat lainnya yang dapat menimbulkan kerumunan
              orang, b. Dinas Tenaga Kerja, Transmigrasi dan Energi pada perkantoran milik swasta
              dan tempat kerja, c. Dinas Pariwisata dan Ekonomi Kreatif pada perhotelan/penginapan
              lainnya yang sejenis, tempat wisata dan tempat usaha sesuai lingkup kewenangan: d.
              Dinas Perindustrian, Perdagangan, KUKM pada tempat industri dan tempat usaha sesuai
              lingkup kewenangan, pedagang kaki lima/lapak jajanan pada lokasi binaan dan lokasi
              sementara, e. Dinas Pendidikan pada Satuan Pendidikan, f. Dinas Kesehatan pada
              fasilitas pelayanan kesehatan, dan g. Walikota/Bupati Administrasi pada tempat ibadah,
              dan dapat didampingi unsur Kepolisian dan/atau TNI.
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_78
              elements: []
          - type: bagian
            node: &ref_79
              nodeType: bagian
              key: 2
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_77
            title: >-
              Bagian Kedua Penghentian Sementara Masa Transisi Pasal 41 (l) Dalam hal terjadi
              peningkatan kasus baru Covid-19 secara signifikan selama Masa Transisi berdasarkan
              hasil pemantauan dan evaluasi Satuan Tugas Penanganan Covid-19 Provinsi dilakukan
              penghentian sementara pemberlakuan Masa Transisi. (2) Penetapan penghentian sementara
              pelaksanaan Masa Transisi sebagaimana dimaksud pada ayat (1) berdasarkan pada
              tingkatan wilayah dengan ketentuan sebagai berikut: a. untuk tingkat rukun warga,
              kelurahan, kecamatan, dan kota/kabupaten administrasi ditetapkan dengan Keputusan
              Walikota / Bupati Administrasi, dan 33 b. untuk tingkat provinsi ditetapkan dengan
              Keputusan Gubernur. (3) Dalam hal penghentian sementara pelaksanaan Masa Transisi
              sebagaimana dimaksud pada ayat (2) huruf a, diberlakukan pengendalian ketat berskala
              lokal. 4) Dalam hal penghentian sementara pelaksanaan Masa Transisi sebagaimana
              dimaksud pada ayat (2) huruf b, diberlakukan PSBB. Pasal 42 (1) Pelaksanaan
              pengendalian ketat berskala lokal sebagaimana dimaksud dalam Pasal 41 ayat (3)
              meliputi: a. penyiapan lokasi Isolasi, b. pemantauan dan pengawasan wilayah rukun
              warga/ kelurahan / kecamatan /kota/kabupaten administrasi yang ditetapkan sebagai
              wilayah pengendalian ketat, C. pemetaan terhadap wilayah yang memiliki kasus Covid-19
              dengan angka Incident Rate (IR) tinggi dan kecepatan Ineident Rate (IR), d.
              pelaksanaan skrining Covid-19, e. pemantauan terhadap warga dengan kondisi Kontak
              Erat, Suspek, Probable, kasus konfirmasi Covid-19, dan pelaku perjalanan: f.
              penelusuran Kontak Erat: g. pendataan jumlah warga miskin dan warga terdampak, h.
              pelibatan unsur rukun tetangga/rukun warga, Lembaga Masyarakat Kelurahan, Pemberdayaan
              Kesejahteraan Keluarga dan Karang Taruna serta elemen masyarakat lainnya: i.
              pemberlakuan sanksi sosial terhadap warga yang melanggar Isolasi yang sesuai dengan
              kearifan lokal dan kesepakatan warga, dan J. pelaporan pelaksanaan pengendalian ketat
              berskala lokal kepada Satuan Tugas Penanganan Covid-19 Provinsi. (2) Ketentuan lebih
              lanjut mengenai pelaksanaan pengendalian ketat berskala lokal sebagaimana dimaksud
              pada ayat (1) ditetapkan dengan Keputusan Walikota/ Bupati Administrasi. 34
            content:
