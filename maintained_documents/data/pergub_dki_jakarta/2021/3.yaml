          - type: bagian
            node: &ref_75
              nodeType: bagian
              key: 8
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_63
            title: >-
              Bagian Kedelapan Pelindungan Kesehatan Masyarakat pada Area Publik dan Tempat lainnya
              yang dapat Menimbulkan Kerumunan Orang Pasal 33 (1) Pengelola, penyelenggara, atau
              penanggung jawab area publik dan tempat lainnya yang dapat menimbulkan kerumunan orang
              dalam menyelenggarakan kegiatan wajib melaksanakan pelindungan kesehatan masyarakat,
              yang meliputi: a. melaksanakan edukasi dan menerapkan protokol penceghan Covid-19: dan
              b. melakukan pembatasan interaksi fisik antar pengunjung. 28 (2) Edukasi dan protokol
              pencegahan Covid-19 saat pelaksanaan kegiatan pelayanan kesehatan sebagaimana dimaksud
              pada ayat (1) meliputi: a. memiliki izin keramaian sesuai dengan ketentuan peraturan
              perundang-undangan, b. membatasi jumlah pengunjung paling banyak 50Yo (lima puluh
              persen) dari kapasitas area publik atau tempat lainnya yang dapat menimbulkan
              kerumunan orang, c. mewajibkan pengunjung menggunakan Masker: d. menyediakan sarana
              cuci tangan dengan air mengalir dan sabun, e. mengatur waktu kunjungan, fI. menjaga
              kebersihan area publik atau tempat lainnya yang dapat menimbulkan kerumunan orang, dan
              g. melakukan pembersihan dan disinfeksi area publik atau tempat lainnya yang dapat
              menimbulkan kerumunan orang. (3 Pembatasan interaksi fisik antar pengunjung
              sebagaimana dimaksud pada ayat (1) huruf b, dilakukan dengan membatasi interaksi fisik
              dengan rentang jarak paling sedikit 1 m (satu meter) antar pengunjung. Pasal 34 (1)
              Pengelola, penyelenggara, atau penanggung jawab area publik dan tempat lainnya yang
              dapat menimbulkan kerumunan orang yang tidak melaksanakan kewajiban pelindungan
              kesehatan masyarakat sebagaimana dimaksud dalam Pasal 33 dikenakan sanksi
              administratif berupa teguran tertulis dan pembubaran kegiatan. (2) Pelaksanaan
              pengenaan sanksi berupa teguran tertulis dan pembubaran kegiatan sebagaimana dimaksud
              pada ayat (1) dilakukan oleh Satpol PP dan dapat didampingi oleh unsur Perangkat
              Daerah terkait, Kepolisian dan/atau TNI.
