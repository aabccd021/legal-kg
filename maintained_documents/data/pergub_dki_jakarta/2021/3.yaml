                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_13
                      textString: >-
                        Isolasi adalah proses mengurangi resiko penularan melalui upaya memisahkan
                        individu yang sakit baik yang sudah dikonfirmasi laboratorium atau memiliki
                        gejala Covid-19 dengan masyarakat luas.
