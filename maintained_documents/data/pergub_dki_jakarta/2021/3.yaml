                        textName: text
                        parentNode: *ref_11
                      textString: >-
                        Corona Virus Desease 2019 yang selanjutnya disingkat Covid-19 adalah
                        penyakit infeksi saluran pernapasan akibat dari severe acute respiratory
                        syndrome virus corona 2 (SARS-CoV-2) yang telah menjadi pandemi global
                        berdasarkan penetapan dari World Health Organization (WHO) dan ditetapkan
                        sebagai bencana non alam nasional berdasarkan Keputusan Presiden Nomor 12
                        Tahun 2020 tentang Penetapan Bencana Non Alam Penyebaran Corona Virus
                        Desease 2019 (Covid-19) sebagai Bencana Nasional.
                      references: []
                  - type: point
                    node: &ref_12
                      nodeType: point
                      key: '2'
                      parentPointSetNode: *ref_10
