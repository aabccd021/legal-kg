              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_63
            title: >-
              Bagian Keempat Pelindungan Kesehatan Masyarakat pada Transportasi Umum Pasal 24 (1)
              Pelaku usaha, pengelola, penyelenggara, atau penanggung jawab transportasi umum
              termasuk perusahaan aplikasi transportasi daring, wajib melaksanakan pelindungan
              kesehatan masyarakat, yang meliputi: a. melaksanakan edukasi dan protokol pencegahan
              Covid-19, b. pembatasan kapasitas angkut sarana transportasi, C. pembatasan waktu
              operasional, dan d. manajemen kebutuhan lalu lintas. (2) Edukasi dan protokol
              pencegahan Covid-19 sebagaimana dimaksud pada ayat (1) huruf a, meliputi: 21 a.
              menerapkan protokol pencegahan Covid-19 terhadap sarana transportasi umum, b.
              mewajibkan penggunaan Masker pada sarana transportasi umum, Cc. membuat prosedur
              pemantauan dan pelaporan kesehatan pada sarana transportasi umum, dan d. memberikan
              pengumuman di seluruh sarana transportasi umum secara intensif terkait penerapan
              protokol pencegahan Covid-19. (3) Terhadap ojek online dan ojek pangkalan, pelaksanaan
              edukasi dan protokol pencegahan Covid-19 meliputi: a. diperbolehkan mengangkut
              penumpang dan wajib menerapkan protokol pencegahan Covid-19, b. dilarang berkerumum
              lebih dari 5 (lima) orang, C. wajib menjaga jarak antar pengemudi dan parkir antar
              sepeda motor paling sedikit 1 m (satu meter), dan d. terhadap perusahaan aplikasi ojek
              online wajib menerapkan teknologi informasi geofencing agar pengemudi tidak berkerumum
              dan menerapkan sanksi terhadap pengemudi yang melanggar. (4) Pembatasan kapasitas
              angkut sarana transportasi sebagaimana dimaksud pada ayat (1) huruf b, dilakukan
              terhadap sarana transportasi umum dan sarana transportasi perseorangan yang meliputi:
              a. kapasitas angkut mobil penumpang, mobil bus, angkutan perairan, angkutan
              perkeretaapian paling banyak 50”Yo (lima puluh persen) dari kapasitas angkut, dan b.
              kapasitas angkut penumpang pada mobil barang paling banyak untuk 2 (dua) orang per
              baris kursi. (5) Pembatasan waktu operasional sebagaimana dimaksud pada ayat (1) huruf
              c, dilakukan terhadap sarana dan prasarana transportasi umum didasarkan pada indikator
              kajian dan penilaian yang dilakukan oleh Satuan Tugas Penanganan Covid-19 tingkat
              Provinsi. (6) Manajemen kebutuhan lalu lintas sebagaimana dimaksud pada ayat (1) huruf
              d, meliputi: a. meningkatkan efisiensi dan efektivitas penggunaan ruang lalu lintas:
              dan b. mengendalikan pergerakan lalu lintas. 22 (7 Petunjuk teknis mengenai edukasi
              dan protokol pencegahan Covid-19 pelaksanaan pembatasan kapasitas angkut sarana
              transportasi umum, pembatasan waktu operasional, dan manajemen kebutuhan lalu lintas
              sebagaiman dimaksud pada ayat (3), ayat (4), dan ayat (5), ditetapkan dengan Keputusan
              Kepala Dinas Perhubungan. Pasal 25 (1) Pelaku usaha, pengelola, penyelenggara, atau
              penanggung jawab transportasi umum, termasuk perusahaan aplikasi transportasi daring,
              yang tidak melaksanakan kewajiban pelindungan kesehatan masyarakat sebagaimana
              dimaksud dalam Pasal 24 dikenakan sanksi administratif berupa: a. denda administratif,
              b. pembekuan sementara izin, dan Cc. pencabutan izin. (2) Pelaksanaan pengenaan sanksi
              administratif kepada penanggung jawab pengelola, penyelenggara, atau penanggung jawab
              transportasi umum sebagaimana dimaksud pada ayat (1) dilakukan dengan tahapan: a. jika
              ditemukan pelanggaran pelindungan kesehatan masyarakat diberikan denda administratif
              paling banyak Rp50.000.000,00 (lima puluh juta rupiah), b. jika mengulangi pelanggaran
              pelindungan kesehatan masyarakat setelah diberikan denda administratif sebagaimana
              dimaksud pada huruf a, maka dikenakan pembekuan sementara izin: dan c. jika masih
              mengulangi pelanggaran pelindungan kesehatan masyarakat setelah dikenakan pembekuan
              sementara izin sebagaimana dimaksud pada huruf b, maka dikenakan pencabutan izin. (3)
              Pembekuan sementara izin dan pencabutan izin sebagaimana dimaksud pada ayat (2) huruf
              b dan huruf c dilakukan oleh Dinas Penanaman Modal dan PTSP setelah mendapat
              rekomendasi dari Kepala Dinas Perhubungan. (4) Pelaksanaan pengenaan sanksi
              administratif kepada penanggung jawab pengelola, penyelenggara, atau penanggung jawab
              transportasi umum dilakukan oleh Dinas Perhubungan. (5) Petunjuk teknis mengenai tata
              cara pelaksanaan pengenaan sanksi administratif untuk transportasi umum ditetapkan
              dengan Keputusan Kepala Dinas Perhubungan. 23
            content:
              type: pasalSet
