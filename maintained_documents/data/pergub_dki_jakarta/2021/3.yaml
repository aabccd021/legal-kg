                parentBabNode: *ref_84
            title: >-
              Bagian Ketiga Pengembangan Ekonomi Digital Pasal 49 Upaya pengembangan ekonomi digital
              meliputi: a. riset dan edukasi, b. percepatan penerapan elektronifikasi transaksi
              melalui pengembangan infrastruktur fisik, dan teknologi informasi dan komunikasi, C.
              pemberian akses permodalan perbankan dan non perbankan, d. pemasaran dalam negeri dan
              luar negeri, dan e. fasilitasi kekayaan intelektual dan regulasi.
