                  title: >-
                    Paragraf 4 Perhotelan / Penginapan Lain yang Sejenis dan Tempat Wisata Pasal 18
                    (1) Penanggung jawab perhotelan /penginapan lain yang sejenis dan tempat wisata
                    dalam menyelenggarakan aktivitas usaha wajib melaksanakan pelindungan kesehatan
                    masyarakat, yang meliputi: a. melakukan edukasi dan protokol pencegahan
                    Covid-19, dan b. melakukan pembatasan interaksi fisik. (2) Edukasi dan protokol
                    pencegahan Covid-19 sebagaimana dimaksud pada ayat (1) huruf a, meliputi: a.
                    menerapkan protokol kesehatan terhadap perhotelan/ penginapan lain yang sejenis
                    dan tempat wisata, 16 b. mewajibkan pengunjung menggunakan Masker, kecuali saat
                    makan dan minum, c. menerapkan pemeriksaan suhu tubuh, d. mematuhi jam
                    operasional usaha yang telah ditentukan, e. mewajibkan memasang informasi jumlah
                    kapasitas pengunjung: f. melakukan pendataan pengunjung, dan g. membuat dan
                    mengumumkan pakta integritas dan protokol kesehatan pencegahan Covid-19. (3)
                    Pembatasan interaksi fisik sebagaimana dimaksud pada ayat (1) huruf b, meliputi:
                    a. melakukan pembatasan kapasitas tamu paling banyak 50Y6 (lima puluh persen),
                    dan b. pengaturan jarak tamu paling sedikit 1 m (satu meter). (4) Ketentuan
                    lebih lanjut mengenai protokol pencegahan Covid-19 dan pembatasan interaksi
                    fisik pada perhotelan /penginapan lain yang sejenis dan tempat wisata
                    sebagaimana dimaksud pada ayat (1) ditetapkan dengan Keputusan Kepala Dinas
                    Pariwisata dan Ekonomi Kreatif. Pasal 19 (1) Penanggung jawab perhotelan
                    /penginapan lain yang sejenis dan tempat wisata yang tidak melaksanakan
                    kewajiban pelindungan kesehatan masyarakat sebagaimana dimaksud dalam Pasal 18
                    dikenakan sanksi administratif berupa: a. teguran tertulis, b. penghentian
                    sementara kegiatan, c. denda administratif, d. pembekuan sementara izin,
                    dan/atau e. pencabutan izin. (2) Pelaksanaan pengenaan sanksi administratif
                    kepada penanggung jawab perhotelan/penginapan lain yang sejenis dan tempat
                    wisata sebagaimana dimaksud pada ayat (1) dilakukan dengan tahapan: a. jika
                    ditemukan pelanggaran pelindungan kesehatan masyarakat diberikan teguran
                    tertulis, b. jika mengulangi pelanggaran pelindungan kesehatan masyarakat
                    setelah diberikan teguran tertulis sebagaimana dimaksud pada huruf a, maka
                    dilakukan penghentian sementara kegiatan selama 3 (tiga) hari dengan pemasangan
                    segel pada pintu masuk perhotelan/penginapan lain yang sejenis dan tempat
                    wisata, dan 17 Cc. jika masih mengulangi pelanggaran pelindungan kesehatan
                    masyarakat setelah mendapatkan penghentian sementara kegiatan sebagaimana
                    dimaksud pada huruf b, maka dikenakan denda administratif paling banyak
                    Rp50.000.000,00 (lima puluh juta rupiah). (3) Bagi penanggung jawab perhotelan
                    /penginapan lain yang sejenis dan tempat wisata yang tidak melaksanakan
                    penghentian sementara kegiatan atau membayar denda administratif sebagaimana
                    dimaksud pada ayat (2) huruf b dan huruf c, maka Dinas Penanaman Modal dan PTSP
                    mengenakan sanksi administratif berupa pembekuan sementara izin atau pencabutan
                    izin setelah mendapat rekomendasi dari Kepala Dinas Pariwisata dan Ekonomi
                    Kreatif. (4) Pelaksanaan pengenaan sanksi administratif kepada penanggung jawab
                    perhotelan/penginapan lain yang sejenis dan tempat wisata, dilakukan oleh Dinas
                    Pariwisata dan Ekonomi Kreatif dan dapat didampingi oleh unsur Satpol PP,
                    Kepolisian, dan/atau TNI.
