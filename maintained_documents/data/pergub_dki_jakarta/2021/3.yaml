        PENYEBARLUASAN INFORMASI Pasal 45 (1) Penyebarluasan Informasi dilakukan melalui saluran
        komunikasi publik seperti: a. konferensi pers, b. website resmi Pemerintah Provinsi DKI
        Jakarta: c. media massa, d. media sosial: e. media luar ruang, dan f. komunikasi tatap muka.
        (2) Penyebarluasan informasi melalui komunikasi tatap muka sebagaimana dimaksud pada ayat
        (1) huruf f dilakukan dengan menjalankan protokol pencegahan Covid-19. 35
