            title: >-
              Bagian Keempat Pengembangan Ekonomi Inovatif Perkotaan Pasal 50 Upaya pengembangan
              ekonomi inovatif perkotaan meliputi sektor: a. kesehatan: 38 b. logistik, Cc. future
              income, dan d. penanaman modal.
