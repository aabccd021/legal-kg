      title: UPAYA PELINDUNGAN SOSIAL
      content:
        type: bagianSet
        node:
          nodeType: bagianSet
          parentBabNode: *ref_93
        elements:
          - type: bagian
            node: &ref_94
              nodeType: bagian
              key: 1
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_93
            title: >-
              Bagian Kesatu Penerima Manfaat Pasal 55 (1) Bantuan sosial tunai dan/atau bantuan
              sosial non tunai diberikan bagi masyarakat terdampak Covid-19 yaitu: a. masyarakat
              miskin dan rentan miskin yang berpendapatan harian dan terdampak ekonomi akibat
              Covid-19, dan b. masyarakat lainnya yang terdampak ekonomi akibat Covid-19. (2)
              Masyarakat terdampak Covid-19 sebagaimana dimaksud pada ayat (1), dengan kriteria
              sebagai berikut: a. belum mendapatkan bantuan sosial tunai dan/atau bantuan sosial non
              tunai dalam rangka penanganan Covid-19 dari Pemerintah Pusat: b. masuk dalam kategori
              miskin berdasarkan data terpadu kesejahteraan sosial, c. kehilangan pekerjaan karena
              pemutusan hubungan kerja, kehilangan usaha dan/atau penghasilan yang berkurang secara
              signifikan, berpenghasilan tidak tetap, atau dirumahkan tanpa dibayar/pemotongan gaji,
              dan d. dalam hal kepala keluarga yang memenuhi kriteria penerima bantuan sosial
              meninggal dunia, maka ahli waris dalam satu kartu keluarga berhak mendapatkan bantuan
              sosial. (3) Warga terkonfirmasi Covid-19 yang melakukan Isolasi di Provinsi DKI
              Jakarta melalui mekanisme sesuai dengan ketentuan peraturan perundang-undangan yang
              memenuhi kriteria yaitu: a. berdomisili di Provinsi DKI Jakarta, dan b. terkonfirmasi
              positif berdasarkan surat keterangan dari fasilitas kesehatan dan lurah setempat,
              termasuk anggota keluarga yang tinggal satu rumah. 41
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_94
              elements: []
          - type: bagian
            node: &ref_95
              nodeType: bagian
              key: 2
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_93
            title: >-
              Bagian Kedua Pendataan dan Penetapan Pasal 56 (1) Dinas Sosial bersama dengan Unit
              Kerja pada Perangkat Daerah terkait melakukan pengumpulan dan verifikasi data calon
              penerima bantuan sosial tunai dan/atau bantuan sosial non tunai bagi masyarakat
              terdampak Covid-19. (2) Berdasarkan hasil pengumpulan dan verifikasi sebagaimana
              dimaksud pada ayat (1), Dinas Sosial melakukan pengolahan data calon penerima bantuan
              sosial tunai dan/atau bantuan sosial non tunai bagi masyarakat terdampak Covid-19. (3)
              Data Calon penerima bantuan sosial tunai dan/atau bantuan sosial non tunai bagi
              masyarakat terdampak Covid-19 yang telah diolah sebagaimana dimaksud pada ayat (2)
              kemudian ditindaklanjuti oleh Dinas Sosial untuk dilakukan pemadanan dengan: a. data
              kependudukan oleh Dinas Kependudukan dan Catatan Sipil, b. data pajak oleh Badan
              Pendapatan Daerah, dan c. data keluarga oleh Dinas Pemberdayaan, Perlindungan dan
              Pengendalian Penduduk. (4) Hasil pemadanan data penerima bantuan sosial tunai dan/atau
              bantuan sosial non tunai bagi masyarakat terdampak Covid-19 sebagaimana dimaksud pada
              ayat (3) disampaikan kepada Kepala Dinas Sosial sebagai bahan rekomendasi penerima
              bantuan sosial tunai dan/atau bantuan sosial tunai bagi masyarakat terdampak Covid-19.
              (5) Rekomendasi sebagaimana dimaksud pada ayat (4) disampaikan oleh Kepala Dinas
              Sosial kepada: a. Gubernur melalui Tim Anggaran Pemerintah Daerah dengan tembusan
              kepala Badan Pengelolaan Keuangan Daerah Provinsi DKI Jakarta selaku Pejabat Pengelola
              Keuangan Daerah dan Kepala Badan Perencanaan Pembangunan Daerah Provinsi DKI Jakarta,
              b. Kepala Dinas Komunikasi, Informatika dan Statistik untuk diintegrasikan ke dalam
              sistem, dan c. Kepala Biro Kesejahteraan sosial sebagai dasar penyusunan kebijakan
              Keputusan Gubernur. Pasal 57 Penetapan penerima bantuan sosial tunai dan/atau bantuan
              sosial non tunai bagi masyarakat terdampak Covid-19 ditetapkan dalam Keputusan
              Gubernur. 142 Pasal 58 Masyarakat dapat berperan serta dalam pelaksanaan dan
              penyaluran bantuan sosial tunai dan/atau bantuan sosial non tunai bagi masyarakat
              terdampak Covid-19 dengan menginformasikan masyarakat yang layak dan tidak layak
              menerima bantuan sosial tunai dan/atau bantuan sosial non tunai bagi masyarakat
              terdampak Covid-19 melalui perangkat rukun tetangga dan/atau rukun warga.
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_95
              elements: []
          - type: bagian
            node: &ref_96
              nodeType: bagian
              key: 3
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_93
            title: >-
              Bagian Ketiga Pemberian Bantuan Sosial Tunai Pasal 59 (1) Besaran bantuan sosial tunai
              ditetapkan dalam Keputusan Gubernur. (2) Pendanaan bantuan sosial tunai bersumber dari
              Anggaran Pendapatan dan Belanja Daerah, yang penatausahaannya dilaksanakan sesuai
              ketentuan peraturan perundang-undangan. Pasal 60 Pencairan bantuan sosial tunai
              dilaksanakan sesuai ketentuan peraturan perundang-undangan.
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_96
              elements: []
