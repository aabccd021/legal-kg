            title: >-
              Bagian Kedua Pelindungan Kesehatan Masyarakat pada Satuan Pendidikan Pasal 20 (1)
              Pengelola, penyelenggara, atau penanggung jawab Satuan Pendidikan dalam
              menyelenggarakan aktivitas pembelajaran wajib melaksanakan pelindungan kesehatan
              masyarakat, yang meliputi: a. melakukan edukasi dan protokol pencegahan Covid-19, dan
              b. melakukan pembatasan interaksi fisik pada setiap aktivitas pembelajaran. (2)
              Edukasi dan protokol pencegahan Covid-19 sebagaimana dimaksud pada ayat (1) huruf a,
              meliputi: a. menerapkan protokol kesehatan pembelajaran tatap muka, b. mewajibkan
              penggunaan Masker pada area Satuan Pendidikan: Cc. membuat prosedur pemantauan dan
              pelaporan kesehatan warga Satuan Pendidikan, d. memberikan pengumuman di seluruh area
              Satuan Pendidikan secara berulang dan intensif terkait penerapan protokol kesehatan,
              dan e. menyiapkan ruang khusus untuk warga Satuan Pendidikan yang terdeteksi mengalami
              gejala umum Covid-19. 18 (3) Pembatasan interaksi fisik pada setiap aktivitas
              pembelajaran sebagaimana dimaksud pada ayat (1) huruf b, meliputi: a. menerapkan jaga
              jarak paling sedikit 1,5 m (satu setengah meter): b. peserta didik tidak perlu cium
              tangan pendidik cukup ucapkan salam dengan jarak paling sedikit 1,5 m (satu setengah
              meter), C. peserta didik menempati tempat duduk di kelas yang diatur 1 (satu) kursi
              untuk 1 (satu) orang dan menjaga jarak duduk antar siswa paling sedikit 1,5 m (satu
              setengah meter), d. tidak diperbolehkan saling meminjamkan alat tulis/ perlengkapan
              sekolah, e. membawa perlengkapan pribadi, seperti: perlengkapan sekolah, olahraga, dan
              ibadah, f. saat istirahat untuk kebutuhan makan dan minum tetap berada di dalam kelas:
              g. selesai jam pelajaran terakhir, warga sekolah dan institusi pendidikan lainnya
              keluar ruangan kelas dengan berbaris sambil menerapkan jaga jarak dan langsung pulang
              ke rumah masing-masing: h. penjemput peserta didik menunggu di lokasi yang sudah
              disediakan dan melakukan jaga jarak sesuai dengan tempat duduk dan/atau jarak antri
              yang sudah ditandai, dan 1. pengantaran peserta didik dilakukan di lokasi yang telah
              ditentukan. (4) Ketentuan lebih lanjut mengenai protokol pencegahan Covid-19
              pembelajaran tatap muka sebagaimana dimaksud pada ayat (2) huruf a ditetapkan dengan
              Keputusan Kepala Dinas Pendidikan. Pasal D1 (1) Pengelola, penyelenggara, atau
              penanggung jawab Satuan Pendidikan yang tidak melaksanakan kewajiban pelindungan
              kesehatan masyarakat sebagaimana dimaksud dalam Pasal 20 dikenakan sanksi
              administratif berupa: a. teguran tertulis. b. denda administratif, dan / atau C.
              penghentian sementara kegiatan. (2) Pelaksanaan pengenaan sanksi administratif kepada
              penanggung jawab pengelola, penyelenggara, atau penanggung jawab Satuan Pendidikan
              sebagaimana dimaksud pada ayat (1) dilakukan dengan tahapan: 19 a. jika ditemukan
              pelanggaran pelindungan kesehatan masyarakat diberikan teguran tertulis, b. jika
              mengulangi pelanggaran pelindungan kesehatan masyarakat setelah diberikan teguran
              tertulis sebagaimana dimaksud pada huruf a, maka dikenakan denda administratif paling
              banyak Rp50.000.000,00 (lima puluh juta rupiah): dan c. jika masih mengulangi
              pelanggaran pelindungan kesehatan masyarakat setelah dikenakan denda administratif
              sebagaimana dimaksud pada huruf b, maka dikenakan penghentian sementara kegiatan
              selama 3 (tiga) hari dengan pemasangan segel pada pintu masuk Satuan Pendidikan. (3)
              Pelaksanaan pengenaan sanksi administratif sebagaimana dimaksud pada ayat (1)
              dilaksanakan oleh Dinas Pendidikan dan dapat didampingi oleh Perangkat Daerah terkait.
              (4) Petunjuk teknis mengenai tata cara pelaksanaan pengenaan sanksi administratif
              untuk Satuan Pendidikan ditetapkan dengan Keputusan Kepala Dinas Pendidikan.
