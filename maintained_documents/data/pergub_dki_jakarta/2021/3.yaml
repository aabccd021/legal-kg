          - type: bagian
            node: &ref_72
              nodeType: bagian
              key: 5
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_63
            title: >-
              Bagian Kelima Pelindungan Kesehatan Masyarakat pada Warung Makan, Rumah Makan, Kafe,
              atau Restoran Pasal 26 (1) Penanggung jawab/pemilik warung makan, rumah makan, kafe
              atau restoran dalam menyelenggarakan aktivitas usaha wajib melaksanakan pelindungan
              kesehatan masyarakat, yang meliputi: a. melakukan edukasi dan protokol pencegahan
              Covid-19, dan b. melakukan pembatasan jumlah pengunjung. (2) Edukasi dan protokol
              pencegahan Covid-19 sebagaimana dimaksud pada ayat (1) huruf a, meliputi: a.
              mewajibkan pengunjung menggunakan Masker, kecuali saat makan dan minum, b. menerapkan
              pemeriksaan suhu tubuh, c. melakukan pembatasan interaksi fisik dengan rentang jarak
              paling sedikit 1 m (satu meter) antar pengunjung, d. menyediakan hand sanitizer, e.
              tidak menggunakan alat makan atau alat minum yang mengharuskan pengunjung berbagi alat
              dalam mengkonsumsinya, antara lain shisha dan menu sejenisnya, f. mewajibkan memasang
              informasi jumlah kapasitas pengunjung: g. melakukan pendataan pengunjung di warung
              makan, rumah makan, cafe, atau restoran guna kebutuhan penyelidikan epidemiologi
              apabila ditemukan kasus terkonfirmasi Covid-19, dan h. membuat dan mengumumkan pakta
              integritas dan protokol pencegahan Covid-19. (3) Pembatasan jumlah pengunjung
              sebagaimana dimaksud pada ayat (1) huruf b, dilakukan dengan membatasi jumlah
              pengunjung paling banyak 500 (lima puluh persen) dari kapasitas warung makan, rumah
              makan, kafe, atau restoran. Pasal 27 (l) Pelaku usaha warung makan yang tidak
              melaksanakan kewajiban pelindungan kesehatan masyarakat dikenakan sanksi administratif
              berupa: a. teguran tertulis, 24 b. pembubaran kegiatan, dan/atau Cc. penghentian
              sementara kegiatan. (2) Pelaksanaan pengenaan sanksi administratif kepada pelaku usaha
              warung makan sebagaimana dimaksud pada ayat (1) dilakukan dengan tahapan: a. jika
              ditemukan pelanggaran pelindungan kesehatan masyarakat diberikan sanksi berupa teguran
              tertulis: b. Jika mengulangi pelanggaran pelindungan kesehatan masyarakat setelah
              diberikan teguran tertulis sebagaimana dimaksud pada huruf a, maka dikenakan
              pembubaran kegiatan: dan c. Jika masih mengulangi pelanggaran pelindungan kesehatan
              masyarakat setelah dikenakan pembubaran kegiatan sebagaimana dimaksud pada huruf b,
              maka dikenakan penghentian sementara kegiatan. (3) Pelaksanaan pengenaan sanksi
              administratif kepada pelaku usaha warung makan dilakukan oleh Satpol PP dengan
              pendampingan oleh unsur Perangkat Daerah terkait, dan dapat didampingi Kepolisian
              dan/atau TNI. (4) Petunjuk teknis mengenai tata cara pelaksanaan pengenaan sanksi
              administratif untuk pelaku usaha warung makan ditetapkan dengan Keputusan Kepala
              Satpol PP. Pasal 28 (1) Pelaku usaha, pengelola, penyelenggara, atau penanggung jawab
              rumah makan, kafe, atau restoran yang tidak melaksanakan kewajiban pelindungan
              kesehatan masyarakat dikenakan sanksi administratif berupa: a. teguran tertulis, b.
              denda administratif, Cc. pembubaran kegiatan, d. penghentian sementara kegiatan, e.
              pembekuan sementara izin, dan/atau f. pencabutan izin. (2) Pelaksanaan pengenaan
              sanksi administratif kepada Pelaku usaha, pengelola, penyelenggara, atau penanggung
              jawab rumah makan, kafe, atau restoran sebagaimana dimaksud pada ayat (1) dilakukan
              dengan tahapan: a. jika ditemukan pelanggaran pelindungan kesehatan masyarakat
              diberikan sanksi berupa teguran tertulis, 25 b. jika mengulangi pelanggaran
              pelindungan kesehatan masyarakat setelah diberikan teguran tertulis sebagaimana
              dimaksud pada huruf a, maka dikenakan denda administratif paling banyak
              Rp50.000.000,00 (lima puluh juta rupiah), Cc. jika masih mengulangi pelanggaran
              pelindungan kesehatan masyarakat setelah dikenakan denda administratif sebagaimana
              dimaksud pada huruf b, maka dikenakan pembubaran kegiatan, d. jika mengulangi
              pelanggaran pelindungan kesehatan setelah dikenakan pembubaran kegiatan sebagaimana
              dimaksud pada huruf c, maka dikenakan penghentian sementara kegiatan: e. jika
              mengulangi pelanggaran pelindungan kesehatan setelah dikenakan penghentian sementara
              kegiatan sebagaimana dimaksud pada huruf d, maka dikenakan pembekuan sementara izin:
              dan f. jika mengulangi pelanggaran pelindungan kesehatan setelah dikenakan pembekuan
              sementara izin sebagaimana dimaksud pada huruf e, maka dikenakan pencabutan izin. (3
              Pembekuan sementara izin dan pencabutan izin sebagaimana dimaksud pada ayat (2) huruf
              e dan huruf f dilakukan oleh Dinas Penanaman Modal dan PTSP setelah mendapat
              rekomendasi dari Kepala Satpol PP. (4) Pelaksanaan pengenaan sanksi administratif
              kepada pelaku usaha, pengelola, penyelenggara, atau penanggung jawab rumah makan,
              kafe, atau restoran dilakukan oleh Satpol PP. (5) Petunjuk teknis mengenai tata cara
              pelaksanaan pengenaan sanksi administratif pelaku usaha, pengelola, penyelenggara,
              atau penanggung jawab rumah makan, kafe, atau restoran ditetapkan dengan Keputusan
              Kepala Satpol PP.
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_72
              elements: []
          - type: bagian
            node: &ref_73
              nodeType: bagian
              key: 6
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_63
            title: >-
              Bagian Keenam Pelindungan Kesehatan Masyarakat pada Pedagang Kaki Lima/ Lapak Jajanan
              Pasal 29 (1) Pedagang kaki lima/lapak jajanan pada lokasi binaan dan lokasi sementara,
              serta lokasi tertentu lainnya wajib melaksanakan pelindungan kesehatan masyarakat,
              yang meliputi: a. melaksanakan edukasi dan protokol pencegahan Covid-19: dan b.
              melakukan pembatasan interaksi fisik antar pengunjung. (2) Edukasi dan protokol
              pencegahan Covid-19 sebagaimana dimaksud pada ayat (1) huruf a, meliputi: 26 a.
              menggunakan Masker dan sarung tangan pada setiap aktivitas usaha, b. menyediakan hand
              sanitizer, C. mematuhi jam operasional usaha yang telah ditentukan, dan d. menjamin
              kebersihan area. (3) Pembatasan interaksi fisik antar pengunjung sebagaimana dimaksud
              pada ayat (1) huruf b, dilakukan dengan membatasi interaksi fisik dengan rentang jarak
              paling sedikit 1 m (satu meter) antar pengunjung. Pasal 30 (1) Pedagang kaki
              lima/lapak jajanan pada lokasi binaan dan lokasi sementara serta lokasi tertentu
              lainnya yang tidak melaksanakan kewajiban pelindungan kesehatan masyarakat sebagaimana
              dimaksud dalam Pasal 29 ayat (1) dikenakan sanksi administratif berupa teguran
              tertulis dan pembubaran kegiatan. (2) Pelaksanaan pengenaan sanksi administratif
              berupa teguran tertulis dan pembubaran kegiatan sebagaimana dimaksud pada ayat (1)
              dilakukan dengan ketentuan: a. terhadap pedagang kaki lima/lapak jajanan pada lokasi
              binaan, lokasi sementara dilakukan oleh Dinas Perindustrian, Perdagangan, KUKM, dan b.
              terhadap pedagang kaki lima/lapak jajanan pada lokasi tertentu lainnya dilakukan oleh
              Satpol PP.
            content:
              type: pasalSet
              node:
                nodeType: pasalSet
                parentNode: *ref_73
              elements: []
          - type: bagian
            node: &ref_74
              nodeType: bagian
              key: 7
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_63
            title: >-
              Bagian Ketujuh Pelindungan Kesehatan Masyarakat pada Tempat Penyelenggaraan Fasilitas
              Pelayanan Kesehatan Pasal 31 (1) Pengelola, penyelenggara, atau penanggung jawab
              tempat penyelenggaraan — fasilitas pelayanan kesehatan dalam menyelenggarakan kegiatan
              pelayanan kesehatan wajib melaksanakan pelindungan kesehatan masyarakat, yang
              meliputi: a. melaksanakan edukasi dan protokol pencegahan Covid- 19 saat pelaksanaan
              kegiatan pelayanan kesehatan sesuai kebijakan yang ditetapkan oleh instansi yang
              berwenang, b. melakukan pembatasan interaksi fisik antar pengunjung, dan c. melaporkan
              hasil pemeriksaan terkait Covid-19 kepada Dinas Kesehatan. 27 (2) Edukasi dan protokol
              pencegahan Covid-19 sebagaimana dimaksud pada ayat (1) huruf a, meliputi: a.
              menerapkan kaidah umum pelndungan kesehatan masyarakat melalui penerapan protokol
              pencegahan Covid-19 dengan mengutamakan prinsip pencegahan dan pengendalian infeksi
              serta kebijakan perlindungan petugas kesehatan di fasilitas pelayanan kesehatan, dan
              b. mengikuti aturan tentang ditundanya pelaksanaan sebagian pelayanan medis di
              masing-masing fasilitas pelayanan kesehatan selama masa PSBB. (3) Pembatasan interaksi
              fisik sebagaimana dimaksud pada ayat (1) huruf b dengan melakukan pembatasan kapasitas
              tamu dan pengaturan jarak tamu paling sedikit 1 m (satu meter). (4) Melaporkan kepada
              Dinas Kesehatan jika menemukan pasien terkonfirmasi positif Covid-19 atau menjadi
              Kontak Erat. (5) Ketentuan lebih lanjut mengenai pelaksanaan edukasi dan protokol
              pencegahan Covid-19 dan pembatasan interaksi fisik antar pengunjung sebagaimana
              dimaksud pada ayat (1) ditetapkan dengan Keputusan Kepala Dinas Kesehatan. Pasal 32
              (1) Pengelola, penyelenggara, atau penanggung jawab tempat penyelenggaraan kegiatan
              pelayanan kesehatan yang tidak melaksanakan kewajiban pelindungan kesehatan masyarakat
              sebagaimana dimaksud dalam Pasal 31 dikenakan sanksi administratif berupa teguran
              tertulis. (2) Pelaksanaan pengenaan sanksi administratif berupa teguran tertulis
              sebagaimana dimaksud pada ayat (1) dilakukan oleh Dinas Kesehatan.
            content:
