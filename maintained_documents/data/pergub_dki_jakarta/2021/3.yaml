                nodeType: bagianSet
                parentBabNode: *ref_84
            title: >-
              Bagian Kelima Percepatan Perizinan Investasi dan/atau Penanaman Modal Pasal 51 (1)
              Percepatan perizinan investasi dan/atau penanaman modal dilakukan dalam bentuk: Aa.
              penyediaan data dan informasi perizinan investasi dan/atau penanaman modal, b.
              fasilitas “Antar Jemput Izin Bermotor”: C. fasilitasi perizinan oleh “Jakarta
              Investment Center”, d. penyederhanaan dan fleksibilitas perizinan melalui pelayanan
              terpadu satu pintu, dan €. pemberian insentif dan kemudahan investasi dengan kriteria
              yang sesuai dengan ketentuan peraturan perundang-undangan. (2) Percepatan perizinan
              invesatasi dan/atau penanaman modal sebagaimana dimaksud pada ayat (1) dilaksanakan
              oleh Kepala Dinas Penanaman Modal dan PTSP.
            content:
              type: pasalSet
