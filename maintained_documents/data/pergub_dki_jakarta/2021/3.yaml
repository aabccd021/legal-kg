opText: |-
  SALINAN
  PT :
  SANA ARA TUGU 1»
  LAIN
  GUBERNUR DAERAH KHUSUS
  IBUKOTA JAKARTA
  PERATURAN GUBERNUR DAERAH KHUSUS
  IBUKOTA JAKARTA
  NOMOR 3 TAHUN 2021
  TENTANG
  PERATURAN PELAKSANAAN PERATURAN DAERAH NOMOR 2 TAHUN 2020
  TENTANG PENANGGULANGAN CORONA VIRUS DISEASE 2019
  DENGAN RAHMAT TUHAN YANG MAHA ESA
  GUBERNUR DAERAH KHUSUS IBUKOTA JAKARTA,
  Menimbang : bahwa untuk melaksanakan ketentuan Pasal 8 ayat (2), Pasal 9 ayat
  (S5), Pasal 11 ayat (4), Pasal 12 ayat (4), Pasal 13 ayat (4), Pasal 14
  ayat (7), Pasal 15 ayat (5), Pasal 16 ayat (4), Pasal 17 ayat (4), Pasal
  18 ayat (4), Pasal 19 ayat (4), Pasal 20 ayat (4), Pasal 22 ayat (3),
  Pasal 23 ayat (3), Pasal 24 ayat (4), Pasal 25 ayat (3), dan Pasal 26
  ayat (5) Peraturan Daerah Nomor 2 Tahun 2020 tentang
  Penanggulangan Corona Virus Disease 2019, perlu menetapkan
  Peraturan Gubernur tentang Peraturan Pelaksanaan Peraturan
  Daerah Nomor 2 Tahun 2020 tentang Penanggulangan Corona Virus
  Disease 2019:
  Mengingat : 1. Undang-Undang Nomor 29 Tahun 2007 tentang Pemerintahan
  Provinsi Daerah Khusus Ibukota Jakarta sebagai Ibukota Negara
  Kesatuan Republik Indonesia (Lembaran Negara Republik
  Indonesia Tahun 2007 Nomor 93, Tambahan Lembaran Negara
  Republik Indonesia Nomor 4744),
  2. Undang-Undang Nomor 23 Tahun 2014 tentang Pemerintahan
  Daerah (Lembaran Negara Republik Indonesia Tahun 2014
  Nomor 244, Tambahan Lembaran Negara Republik Indonesia
  Nomor 5587), sebagaimana telah beberapa kali diubah terakhir
  dengan dengan Undang-Undang Nomor 9 Tahun 2015 tentang
  Perubahan Kedua atas Undang-Undang Nomor 23 Tahun 2014
  tentang Pemerintahan Daerah (Lembaran Negara Republik
  Indonesia Tahun 2015 Nomor 58, Tambahan Lembaran Negara
  Republik Indonesia Nomor 5679),
  3. Peraturan Daerah Nomor 2 Tahun 2020 tentang
  Penanggulangan Corona Virus Disease 2019 (Lembaran Daerah
  Provinsi Daerah Khusus Ibukota Jakarta Tahun 2020 Nomor
  201, Tambahan Lembaran Daerah Provinsi Daerah Khusus
  Ibukota Jakarta Nomor 2008),
  MEMUTUSKAN:
  Menetapkan : PERATURAN GUBERNUR TENTANG PERATURAN PELAKSANAAN
  PERATURAN DAERAH NOMOR 2 TAHUN 2020 TENTANG
  PENANGGULANGAN CORONA VIRUS DISEASE 2019.
