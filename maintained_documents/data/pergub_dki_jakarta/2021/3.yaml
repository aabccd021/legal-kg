          - type: bagian
            node: &ref_86
              nodeType: bagian
              key: 2
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_84
            title: >-
              Bagian Kedua Penyelamatan dan Pengembangan Usaha Mikro, Kecil, dan Menengah, Ekonomi
              Kreatif, dan Koperasi Pasal 48 (1) Upaya penyelamatan dan dan pengembangan usaha
              mikro, kecil dan menengah, ekonomi kreatif dan koperasi meliputi: a. menyediakan ruang
              pemasaran termasuk penyediaan kios di sisi jalan utama dan pengembangan kawasan/sentra
              usaha mikro, kecil dan menengah, 37 b. mempermudah proses penerbitan perizinan
              berusaha sesuai dengan ketentuan peraturan perundang-undangan, Cc. memfasilitasi
              kegiatan pelatihan peningkatan kapasitas usaha baik secara tatap muka maupun daring:
              d. memberikan akses kepada fasilitas permodalan dari pemerintah pusat, Pemerintah
              Provinsi DKI Jakarta, maupun lembaga lainnya termasuk pinjaman yang bersumber dari
              dana pemulihan ekonomi nasional: e. memfasilitasi kegiatan pemasaran baik secara tatap
              muka maupun daring, termasuk pelaksanaan acara produk kreatif, fI. memberikan akses
              bahan baku murah melalui kerja sama dengan Badan Usaha Milik Daerah yang bergerak di
              bidang pangan, g. mendorong kemitraan usaha mikro, kecil dan menengah dengan pelaku
              usaha besar, h. memberi kemudahan pemberian akta koperasi untuk kampung prioritas, dan
              i. melakukan upaya lain yang dibutuhkan sesuai dengan ketentuan peraturan
              perundang-undangan. (2) Dalam melaksanakan upaya penyelamatan usaha mikro, kecil dan
              menengah, ekonomi kreatif dan koperasi sebagaimana dimaksud pada ayat (1), Pemerintah
              Provinsi DKI Jakarta dapat bekerja sama dengan perusahaan swasta, Badan Usaha Milik
              Negara, Badan Usaha Milik Daerah, perguruan tinggi, lembaga non profit, dan lembaga
              pemerintah.
