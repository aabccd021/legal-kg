        key: 9
        parentBabSetNode: *ref_7
      title: >-
        KEMITRAAN DAN KOLABORASI Pasal 46 (l) Bentuk kemitraan dan kolaborasi penanggulangan
        Covid-19 antara Pemerintah Provinsi DKI Jakarta dengan kementerian dan lembaga negara,
        dilaksanakan melalui: a. koordinasi dan fasilitasi: b. mekanisme hibah dan/atau bantuan
        sosial sesuai dengan ketentuan peraturan perundang-undangan, Cc. pelaksanaan sinergi
        perencanaan yang dapat dituangkan dalam dokumen kerja sama sesuai dengan ketentuan
        perundang-undangan, dan d. dukungan program dalam bentuk lainya. (2) Bentuk kemitraan dan
        kolaborasi penanggulangan Covid-19 antara Pemerintah Provinsi DKI Jakarta dengan pemerintah
        daerah lain, dilakukan melalui: a. koordinasi dan fasilitasi: dan b. pelaksanaan sinergi
        program atau kegiatan yang dapat dituangkan dalam dokumen kerja sama sesuai dengan ketentuan
        peraturan perundang-undangan. (3) Bentuk kemitraan dan kolaborasi penanggulangan Covid-19
        antara Pemerintah Provinsi DKI Jakarta dengan pihak ketiga, dilakukan melalui: a. penerimaan
        bantuan atau sumbangan dalam bentuk barang, b. mekanisme hibah sesuai dengan ketentuan
        perundang- undangan, dan c. bentuk kemitraan dan kolaborasi lainnya yang dapat dituangkan
        dalam dokumen kerja sama sesuai dengan ketentuan peraturan perundang-undangan. 4) Bentuk
        kemitraan dan kolaborasi penanggulangan Covid-19 antara Pemerintah Provinsi DKI Jakarta
        dengan pemerintah daerah lain dan lembaga di luar negeri, dilakukan melalui: a. penerimaan
        bantuan atau sumbangan dalam bentuk barang, b. mekanisme hibah sesuai dengan ketentuan
        perundang- undangan, dan 36 c. bentuk kemitraan dan kolaborasi lainnya yang dapat dituangkan
        dalam dokumen kerja sama sesuai dengan ketentuan peraturan perundang-undangan. (5) Kemitraan
        dan kolaborasi yang melibatkan elemen masyarakat antara lain Dewan Kota/Kabupaten, Lembaga
        Musyawarah Kelurahan, Forum Kewaspadaan Dini Masyarakat, Rukun Warga, Rukun Tetangga, dan
        Pemberdayaan Kesejahteraan Keluarga, Karang Taruna, dan Dasawisma, dilaksanakan melalui
        koordinasi Perangkat Daerah terkait sesuai dengan lingkup tugas dan fungsinya berdasarkan
        ketentuan peraturan perundang- undangan. (6) Dalam melaksanakan kemitraan dan kolaborasi
        penanggulangan Covid-19, Pemerintah Provinsi DKI Jakarta dapat menggunakan platform
        kolaborasi dan ko-kreasi yang dilaksanakan sesuai dengan ketentuan perundang-undangan.
