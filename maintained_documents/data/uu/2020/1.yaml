opText: |-
  SALINAN |
  UNDANG-UNDANG REPUBLIK INDONESIA
  NOMOR 1 TAHUN 2020
  TENTANG
  PENGESAHAN PERSETUJUAN KEMITRAAN EKONOMI KOMPREHENSIF
  INDONESIA-AUSTRALIA (#NDONESIA-AUSTRALIA COMPREHENSIVE ECONOMIC
  PARTNERSHIP AGREEMENT)
  DENGAN RAHMAT TUHAN YANG MAHA ESA
  PRESIDEN REPUBLIK INDONESIA,
  Menimbang : a. bahwa kegiatan perdagangan merupakan salah satu sektor
  utama penggerak perekonomian nasional yang dapat
  dilakukan melalui kerja sama perdagangan internasional
  untuk mendukung program pembangunan nasional di
  bidang ekonomi dalam rangka memajukan kesejahteraan
  Umum sebagaimana tercantum dalam Pembukaan Undang-
  Undang Dasar Negara Republik Indonesia Tahun 1945:
  b. bahwa untuk meningkatkan kerja sama ekonomi secara
  komprehensif antara Indonesia dan Australia, Pemerintah
  Republik Indonesia dan Pemerintah Australia telah
  menandatangani Persetujuan Kemitraan Ekonomi
  Komprehensif — Indonesia-Australia Indonesia-Australia
  Comprehensive Economic Partnership Agreement) pada
  tanggal 4 Maret 2019 di Jakarta, Indonesia:
  SK No 020047 A
  D2 -
  c. bahwa untuk melaksanakan Persetujuan Kemitraan
  Ekonom! Komprehensif Indonesia-Australia (Indonesia—
  Australia Comprehensive Economic Partnership Agreement),
  perlu mengesahkan Persetujuan Kemitraan Ekonomi
  Komprehensif — Indonesia-Australia (Indonesia-Australia
  Comprehensive Economic Partnership Agreement):
  d. bahwa berdasarkan pertimbangan sebagaimana dimaksud
  dalam huruf a, huruf b, dan huruf c, perlu membentuk
  Undang-Undang tentang Pengesahan Persetujuan Kemitraan
  Ekonomi Komprehensif Indonesia-ANustralia (Indonesia-
  Australia Comprehensive Economic Partnership Agreement):
  Mengingat : 1. Pasal 5 ayat (1), Pasal li, dan Pasal 20 Undang-Undang
  Dasar Negara Republik Indonesia Tahun 1945,
  2. Undang-Undang Nomor 24 Tahun 2000 tentang Perjanjian
  Internasional (Lembaran Negara Republik Indonesia
  Tahun 2000 Nomor 185, Tambahan Lerntaran Negara
  Republik Indonesia Nomor 4012):
  3. Undang-Undang Nomor 7 Tahun 2014 tentang Perdagangan
  (Lembaran Negara Republik Indonesia Tahun 2014
  Nomor 45, Tambahan Lembaran Negara Republik Indonesia
  Nomor 5512),
  3 -
  Dengan Persetujuan Bersama
  DEWAN PERWAKILAN RAKYAT REPUBLIK INDONESIA
  dan
  PRESIDEN REPUBLIK INDONESIA
  MEMUTUSKAN:
  Menetapkan : UNDANG-UNDANG TENTANG PENGESAHAN PERSETUJUAN
  KEMITRAAN EKONOMI KOMPREHENSIF INDONESIA-
  AUSTRALIA (INDONESIA-AUSTRALIA COMPREHENSIVE
  ECONOMIC PARTNERSHIP AGREEMENI).
