                        text: >-
                          49. Ketentuan Pasal 160 diubah sehingga berbunyi
                          sebagai berikut: Pasal 160 (1) Dalam hal pekerja/buruh
                          ditahan pihak yang berwajib karena diduga melakukan
                          tindak pidana, pengusaha tidak wajib membayar upah,
                          tetapi wajib memberikan bantuan kepada keluarga
                          pekerja/buruh yang menjadi tanggungannya dengan
                          ketentuan sebagai berikut: a. untuk 1 (satu) orang
                          tanggungan, 25” (dua puluh lima persen) dari upah, b.
                          untuk 2 (dua) orang tanggungan, 35Y6 (tiga puluh lima
                          persen) dari upah, c. untuk 3 (tiga) orang tanggungan,
                          45Y6 (empat puluh lima persen) dari upah, d. untuk 4
                          (empat) orang tanggungan atau lebih, 505 (lima puluh
                          persen) dari upah. (2) Bantuan sebagaimana dimaksud
                          pada ayat (1) diberikan untuk paling lama 6 (enam)
                          bulan terhitung sejak hari pertama pekerja/buruh
                          ditahan oleh pihak yang berwajib. (3) Pengusaha dapat
                          melakukan pemutusan hubungan kerja terhadap
                          pekerja/buruh yang setelah 6 (enam) bulan tidak dapat
                          melakukan pekerjaan sebagaimana mestinya karena dalam
                          proses perkara pidana sebagaimana dimaksud pada ayat
                          (1). (4) Dalam hal pengadilan memutuskan perkara
                          pidana sebelum masa 6 (enam) bulan sebagaimana
                          dimaksud pada ayat (3) berakhir dan pekerja/buruh
                          dinyatakan tidak bersalah, pengusaha wajib
                          mempekerjakan pekerja/ buruh kembali. REPUBLIK
                          INDONESIA - 560 - (5) Dalam hal pengadilan memutuskan
                          perkara pidana sebelum masa 6 (enam) bulan berakhir
                          dan pekerja/buruh dinyatakan bersalah, pengusaha dapat
                          melakukan pemutusan hubungan kerja kepada pekerja/
                          buruh yang bersangkutan.
