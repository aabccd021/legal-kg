                        text: >-
                          2. Ketentuan Pasal 9 diubah sehingga berbunyi sebagai
                          berikut: Pasal 9 (1) Menteri Keuangan menentukan
                          tanggal jatuh tempo pembayaran dan penyetoran pajak
                          yang terutang untuk suatu saat atau Masa Pajak bagi
                          masing- masing jenis pajak paling lama 15 (lima belas)
                          hari setelah saat terutangnya pajak atau berakhirnya
                          Masa Pajak. (2) Kekurangan pembayaran pajak yang
                          terutang berdasarkan Surat Pemberitahuan Tahunan Pajak
                          Penghasilan harus dibayar lunas sebelum Surat
                          Pemberitahuan Pajak Penghasilan disampaikan. (2a)
                          Pembayaran ... REPUBLIK INDONESIA - 652 - (2a)
                          Pembayaran atau penyetoran pajak sebagaimana dimaksud
                          pada ayat (1), yang dilakukan setelah tanggal jatuh
                          tempo pembayaran atau penyetoran pajak, dikenai sanksi
                          administrasi berupa bunga sebesar tarif bunga per
                          bulan yang ditetapkan oleh Menteri Keuangan yang
                          dihitung dari tanggal jatuh tempo pembayaran sampai
                          dengan tanggal pembayaran, dan dikenakan paling lama
                          24 (dua puluh empat) bulan serta bagian dari bulan
                          dihitung penuh 1 (satu) bulan. (2b) Atas pembayaran
                          atau penyetoran pajak sebagaimana dimaksud pada ayat
                          (2) yang dilakukan setelah tanggal jatuh tempo
                          penyampaian Surat Pemberitahuan Tahunan, dikenai
                          sanksi administrasi berupa bunga sebesar tarif bunga
                          per bulan yang ditetapkan oleh Menteri Keuangan yang
                          dihitung mulai dari berakhirnya batas waktu
                          penyampaian Surat Pemberitahuan Tahunan sampai dengan
                          tanggal pembayaran, dan dikenakan paling lama 24 (dua
                          puluh empat) bulan serta bagian dari bulan dihitung
                          penuh 1 (satu) bulan. (2c) Tarif bunga per bulan yang
                          ditetapkan oleh Menteri Keuangan sebagaimana dimaksud
                          pada ayat (2a) dan ayat (2b) dihitung berdasarkan suku
                          bunga acuan ditambah 556 (lima persen) dan dibagi 12
                          (dua belas) yang berlaku pada tanggal dimulainya
                          penghitungan sanksi. (3) Surat Tagihan Pajak, Surat
                          Ketetapan Pajak Kurang Bayar, serta Surat Ketetapan
                          Pajak Kurang Bayar Tambahan, dan Surat Keputusan
                          Keberatan, Surat Keputusan Pembetulan, Putusan
                          Banding, serta Putusan Peninjauan Kembali, yang
                          menyebabkan jumlah pajak yang harus dibayar bertambah,
                          harus dilunasi dalam jangka waktu 1 (satu) bulan sejak
                          tanggal diterbitkan. (3a) Bagi... REPUBLIK INDONESIA -
                          653 - (Ba) Bagi Wajib Pajak usaha kecil dan Wajib
                          Pajak di daerah tertentu, jangka waktu pelunasan
                          sebagaimana dimaksud pada ayat (3) dapat diperpanjang
                          paling lama menjadi 2 (dua) bulan yang ketentuannya
                          diatur dengan atau berdasarkan Peraturan Menteri
                          Keuangan. (4) Direktur Jenderal Pajak atas permohonan
                          Wajib Pajak dapat memberikan persetujuan untuk
                          mengangsur atau menunda pembayaran pajak termasuk
                          kekurangan pembayaran sebagaimana dimaksud pada ayat
                          (2) yang pelaksanaannya diatur dengan atau berdasarkan
                          Peraturan Menteri Keuangan.
