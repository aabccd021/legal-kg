                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: referenceText
                              references:
                                - start: 13
                                  end: 20
                                  node:
                                    _key: 1
                                    parentDocument: *ref_0
                                    _structureType: pasal
                                - start: 81
                                  end: 88
