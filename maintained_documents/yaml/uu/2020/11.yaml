                      description:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan Pasal 4A diubah sehingga berbunyi sebagai
                          berikut:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 3
                      _pasalKey: '9'
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: Dihapus.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pajak Masukan dalam suatu Masa Pajak dikreditkan
                                dengan Pajak Keluaran dalam Masa Pajak yang
                                sama. (2a) Bagi Pengusaha Kena Pajak yang belum
                                melakukan penyerahan Barang Kena Pajak dan/atau
                                Jasa Kena Pajak dan/atau ekspor Barang Kena
                                Pajak dan/atau Jasa Kena Pajak, Pajak Masukan
                                atas perolehan Barang Kena Pajak dan/atau Jasa
                                Kena Pajak, impor Barang Kena Pajak, serta
                                pemanfaatan Barang Kena Pajak Tidak Berwujud
                                dan/atau pemanfaatan Jasa Kena Pajak dari luar
                                Daerah Pabean di dalam Daerah Pabean dapat
                                dikreditkan sepanjang memenuhi ketentuan
                                pengkreditan sesuai dengan Undang-Undang ini.
                                (2b) Pajak Masukan yang dikreditkan harus
                                menggunakan Faktur Pajak yang memenuhi
                                persyaratan sebagaimana dimaksud dalam Pasal 13
                                ayat (S5) dan ayat (9).
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Apabila dalam suatu Masa Pajak, Pajak Keluaran
                                lebih besar daripada Pajak Masukan, selisihnya
                                merupakan Pajak Pertambahan Nilai yang harus
                                disetor oleh Pengusaha Kena Pajak.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Apabila dalam suatu Masa Pajak, Pajak Masukan
                                  yang dapat dikreditkan lebih besar daripada
                                  Pajak Keluaran, selisihnya merupakan kelebihan
                                  pajak yang dikompensasikan ke Masa Pajak
                                  berikutnya. (4a) Atas kelebihan Pajak Masukan
                                  sebagaimana dimaksud pada ayat (4) dapat
                                  diajukan permohonan pengembalian pada akhir
                                  tahun buku. (4b) Dikecualikan dari ketentuan
                                  sebagaimana dimaksud pada ayat (4) dan ayat
                                  (Ya), atas kelebihan Pajak Masukan dapat
                                  diajukan permohonan pengembalian pada setiap
                                  Masa Pajak oleh:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengusaha Kena Pajak yang melakukan ekspor
                                      Barang Kena Pajak Berwujud,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengusaha Kena Pajak yang melakukan
                                      penyerahan Barang Kena Pajak dan/atau
                                      penyerahan Jasa Kena Pajak kepada Pemungut
                                      Pajak Pertambahan Nilai,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengusaha Kena Pajak yang melakukan
                                      penyerahan Barang Kena Pajak dan/atau
                                      penyerahan Jasa Kena Pajak yang Pajak
                                      Pertambahan Nilainya tidak dipungut,
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengusaha Kena Pajak yang melakukan ekspor
                                      Barang Kena Pajak Tidak Berwujud,
                                - _type: alphaPoint
                                  _key: e
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengusaha Kena Pajak yang melakukan ekspor
                                      Jasa Kena Pajak, dan/atau
                                - _type: alphaPoint
                                  _key: f
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Dihapus. (4c) Pengembalian ... (4c)
                                      Pengembalian kelebihan Pajak Masukan
                                      kepada Pengusaha Kena Pajak sebagaimana
                                      dimaksud pada ayat (4b) huruf a sampai
                                      dengan huruf e, yang mempunyai kriteria
                                      sebagai Pengusaha Kena Pajak berisiko
                                      rendah, dilakukan dengan pengembalian
                                      pendahuluan kelebihan pajak sesuai
                                      ketentuan sebagaimana dimaksud dalam Pasal
                                      17C ayat (1) Undang-Undang Nomor 6 Tahun
                                      1983 tentang Ketentuan Umum dan Tata Cara
                                      Perpajakan dan perubahannya. (4d)
                                      Ketentuan mengenai Pengusaha Kena Pajak
                                      berisiko rendah yang diberikan
                                      pengembalian pendahuluan kelebihan pajak
                                      sebagaimana dimaksud pada ayat (4c) diatur
                                      dengan Peraturan Menteri Keuangan. (4e)
                                      Direktur Jenderal Pajak dapat melakukan
                                      pemeriksaan terhadap Pengusaha Kena Pajak
                                      sebagaimana dimaksud pada ayat (4c) dan
                                      menerbitkan surat ketetapan pajak setelah
                                      melakukan pengembalian pendahuluan
                                      kelebihan pajak. (4f) Apabila berdasarkan
                                      hasil pemeriksaan sebagaimana dimaksud
                                      pada ayat (4e), Direktur Jenderal Pajak
                                      menerbitkan Surat Ketetapan Pajak Kurang
                                      Bayar, jumlah kekurangan pajak ditambah
                                      dengan sanksi administrasi berupa bunga
                                      sebagaimana dimaksud dalam Pasal 13 ayat
                                      (2) Undang-Undang Nomor 6 Tahun 1983
                                      tentang Ketentuan Umum dan Tata Cara
                                      Perpajakan dan perubahannya.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Apabila dalam suatu Masa Pajak Pengusaha Kena
                                Pajak selain melakukan penyerahan yang terutang
                                pajak juga melakukan penyerahan yang tidak
                                terutang pajak, sepanjang bagian penyerahan yang
                                terutang pajak dapat diketahui dengan pasti dari
                                pembukuannya, jumlah Pajak Masukan yang dapat
                                dikreditkan adalah Pajak Masukan yang berkenaan
                                dengan penyerahan yang terutang pajak.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Apabila dalam suatu Masa Pajak Pengusaha Kena
                                  Pajak selain melakukan penyerahan yang
