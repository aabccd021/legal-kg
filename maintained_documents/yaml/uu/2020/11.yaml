                  references: []
                  text: >-
                    (1) Pemerintah Pusat dan Pemerintah Daerah wajib
                    menyelenggarakan sistem informasi dan pendataan UMK-M yang
                    terintegrasi. (2) Hasil pendataan sebagaimana dimaksud pada
                    ayat (1) sebagai basis data tunggal UMK-M. (3) Basis data
                    tunggal sebagaimana dimaksud pada ayat (2) wajib digunakan
                    sebagai pertimbangan untuk menentukan kebijakan mengenai
                    UMK-M. (4) Basis data tunggal sebagaimana dimaksud pada ayat
                    (2) disajikan secara tepat waktu, akurat, dan tepat guna
                    serta dapat diakses oleh masyarakat. (5) Pemerintah Pusat
                    melakukan pembaharuan sistem informasi dan basis data
                    tunggal paling sedikit 1 (satu) kali dalam 1 (satu) tahun.
                    (6) Basis data tunggal sebagaimana dimaksud pada ayat (2)
                    dibentuk dalam jangka waktu paling lama 2 (dua) tahun sejak
                    berlakunya Undang-Undang ini. (7) Ketentuan lebih lanjut
                    mengenai basis data tunggal UMK-M diatur dalam Peraturan
                    Pemerintah.
