                          Pengadaan Tanah yang dimiliki/dikuasai oleh Badan
                          Usaha Milik Negara/Badan Usaha Milik Daerah, dan/atau
                          REPLUIBLIK INDONESIA - 700 - c. Objek Pengadaan Tanah
