                                Pencegahan adalah larangan sementara terhadap
                                orang untuk keluar dari Wilayah Indonesia
                                berdasarkan alasan Keimigrasian atau alasan lain
                                yang ditentukan oleh undang-undang.
                          - _type: numPoint
                            _key: '29'
                            isi:
                              _type: referenceText
                              references: []
