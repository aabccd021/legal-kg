                                    _key: 3
                                    parentPasal: *ref_99
                                    _structureType: ayat
                              text: >-
                                Menteri Keuangan selaku Bendahara Umum Negara
                                dan Lembaga dalam melaksanakan investasi
                                sebagaimana dimaksud pada ayat (3) berwenang
                                untuk: a. melakukan penempatan dana dalam bentuk
                                instrumen keuangan, b. melakukan kegiatan
                                pengelolaan aset, c. melakukan kerja sama dengan
                                pihak lain termasuk entitas dana perwalian
                                (trust fund), d. menentukan calon mitra
                                investasi: e. memberikan dan menerima pinjaman,
                                dan/atau f. ' menatausahakan aset yang
                                dimilikinya.
