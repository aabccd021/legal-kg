                                baik di tanah milik sendiri maupun di tanah
                                milik pihak lain. REPUBLIK INDONESIA -105 - (3)
                                Pembangunan bangunan gedung di atas tanah milik
                                pihak lain sebagaimana dimaksud pada ayat (2)
                                dilakukan berdasarkan perjanjian tertulis antara
                                pemilik tanah dan pemilik bangunan gedung. (4)
                                Perencanaan sebagaimana dimaksud pada ayat (1)
                                harus dilakukan oleh penyedia jasa perencana
                                konstruksi yang memenuhi syarat dan standar
                                kompetensi sesuai dengan ketentuan peraturan
                                perundang-undangan. (S5) Penyedia jasa perencana
                                konstruksi sebagaimana dimaksud pada ayat (4)
                                harus merencanakan bangunan gedung dengan acuan
                                standar teknis bangunan gedung sebagaimana
                                dimaksud dalam Pasal 7 ayat (1). (6) Dalam hal
                                bangunan gedung direncanakan tidak sesuai dengan
                                standar teknis sebagaimana dimaksud dalam Pasal
                                7 ayat (1), bangunan gedung harus dilengkapi
                                hasil pengujian untuk mendapatkan persetujuan
                                rencana teknis dari Pemerintah Pusat. (7) Hasil
                                perencanaan harus dikonsultasikan dengan
                                Pemerintah Pusat dan Pemerintah Daerah sesuai
                                dengan kewenangannya berdasarkan norma, standar,
                                prosedur, dan kriteria yang ditetapkan oleh
                                Pemerintah Pusat untuk mendapatkan pernyataan
                                pemenuhan standar teknis bangunan gedung. (8)
                                Dalam hal perencanaan bangunan gedung yang
                                menggunakan prototipe yang ditetapkan Pemerintah
                                Pusat, perencanaan bangunan gedung tidak
                                memerlukan kewajiban konsultasi dan tidak
                                memerlukan pemeriksaan pemenuhan standar.
