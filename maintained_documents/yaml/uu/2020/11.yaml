                                sebagai berikut: REPUBLIK INDONESIA - 285 -
                                Pasal 38 (1) Pemerintah Pusat mengatur kegiatan
                                Perdagangan Luar Negeri melalui kebijakan dan
                                pengendalian di bidang Ekspor dan Impor. (2)
                                Kebijakan dan pengendalian Perdagangan Luar
                                Negeri sebagaimana dimaksud pada ayat (1)
                                diarahkan untuk: a. peningkatan daya saing
                                produk Ekspor Indonesia: b. peningkatan dan
                                perluasan akses Pasar di luar negeri, Cc.
                                peningkatan kemampuan Eksportir dan Importir
                                sehingga menjadi Pelaku Usaha yang andal, dan d.
                                peningkatan dan pengembangan produk invensi dan
                                inovasi nasional yang diekspor ke luar negeri.
                                (3) Kebijakan Perdagangan Luar Negeri paling
                                sedikit meliputi: a. peningkatan jumlah dan
                                jenis serta nilai tambah produk ekspor, b.
                                pengharmonisasian Standar dan prosedur kegiatan
                                Perdagangan dengan negara mitra dagang, C.
                                penguatan kelembagaan di sektor Perdagangan Luar
                                Negeri, d. pengembangan sarana dan prasarana
                                penunjang Perdagangan Luar Negeri, dan e.
                                pelindungan dan pengamanan kepentingan nasional
                                dari dampak negatif Perdagangan Luar Negeri. (4)
                                Pengendalian Perdagangan Luar Negeri meliputi:
                                a. Perizinan Berusaha/persetujuan, b. standar,
                                dan Cc. pelarangan dan pembatasan. REPUBLIK
                                INDONESIA - 286 -
