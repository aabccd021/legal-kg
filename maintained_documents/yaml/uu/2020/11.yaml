        - _type: bagian
          _key: 8
          _judul: Bagian Kedelapan Impor Komoditas Perikanan dan Komoditas Pergaraman
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 115
                isi:
                  _type: amendPoints
                  description:
                    _type: referenceText
                    references: []
                    text: >-
                      Beberapa ketentuan dalam Undang-Undang Nomor 7 Tahun 2016
                      tentang Perlindungan dan Pemberdayaan Nelayan, Pembudi
                      Daya Ikan, dan Petambak Garam (Lembaran Negara Republik
                      Indonesia Tahun 2016 Nomor 68, Tambahan Lembaran Negara
                      Republik Indonesia Nomor 5870) diubah sebagai berikut:
                  isi:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 1
                      _pasalKey: '1'
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                        isi:
                          - _type: numPoint
                            _key: '1'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pelindungan Nelayan, Pembudi Daya Ikan, dan
                                Petambak Garam adalah segala upaya untuk
                                membantu Nelayan, Pembudi Daya Ikan, dan
                                Petambak Garam dalam menghadapi permasalahan
                                kesulitan melakukan Usaha Perikanan atau Usaha
                                Pergaraman.
                          - _type: numPoint
                            _key: '2'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemberdayaan Nelayan, Pembudi Daya Ikan, dan
                                Petambak Garam adalah segala upaya untuk
                                meningkatkan kemampuan Nelayan, Pembudi Daya
                                Ikan, dan Petambak Garam untuk melaksanakan
                                Usaha Perikanan atau Usaha Pergaraman secara
                                lebih baik.
                          - _type: numPoint
                            _key: '3'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Nelayan adalah Setiap Orang yang mata
                                pencahariannya melakukan Penangkapan Ikan.
                          - _type: numPoint
                            _key: '4'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Nelayan Kecil adalah orang yang mata
                                pencahariannya melakukan penangkapan ikan untuk
                                memenuhi kebutuhan hidup sehari-hari, baik yang
                                menggunakan kapal penangkap Ikan maupun yang
                                tidak menggunakan kapal penangkap Ikan.
                          - _type: numPoint
                            _key: '5'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Nelayan Tradisional adalah Nelayan yang
                                melakukan Penangkapan Ikan di perairan yang
                                merupakan hak Perikanan tradisional yang telah
                                dimanfaatkan secara turun-temurun sesuai dengan
                                budaya dan kearifan lokal.
                          - _type: numPoint
                            _key: '6'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Nelayan Buruh adalah Nelayan yang menyediakan
                                tenaganya yang turut serta dalam usaha
                                Penangkapan Ikan.
                          - _type: numPoint
                            _key: '7'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Nelayan Pemilik adalah Nelayan yang memiliki
                                kapal penangkap Ikan yang digunakan dalam usaha
                                Penangkapan Ikan dan secara aktif melakukan
                                Penangkapan Ikan.
                          - _type: numPoint
                            _key: '8'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penangkapan Ikan adalah kegiatan untuk
                                memperoleh Ikan di perairan yang tidak dalam
                                keadaan dibudidayakan dengan alat dan cara yang
                                mengedepankan asas keberlanjutan dan
                                kelestarian, termasuk kegiatan yang menggunakan
                                kapal untuk memuat, mengangkut, menyimpan,
                                mendinginkan, menangani, mengolah, dan/atau
                                mengawetkannya.
                          - _type: numPoint
                            _key: '9'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pembudi Daya Ikan adalah Setiap Orang yang mata
                                pencahariannya melakukan Pembudidayaan Ikan air
                                tawar, Ikan air payau, dan Ikan air laut.
                          - _type: numPoint
                            _key: '10'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pembudi Daya Ikan Kecil adalah Pembudi Daya Ikan
                                yang melakukan Pembudidayaan Ikan untuk memenuhi
                                kebutuhan hidup sehari-hari.
                          - _type: numPoint
                            _key: '11'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penggarap Lahan Budi Daya adalah Pembudi Daya
                                Ikan yang menyediakan tenaganya dalam
                                Pembudidayaan Ikan.
                          - _type: numPoint
                            _key: '12'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemilik Lahan Budi Daya adalah Pembudi Daya Ikan
                                yang memiliki hak atau izin atas lahan dan
                                secara aktif melakukan kegiatan Pembudidayaan
                                Ikan.
                          - _type: numPoint
                            _key: '13'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pembudidayaan Ikan adalah kegiatan untuk
                                memelihara, membesarkan, dan/atau membiakkan
                                Ikan serta memanen hasilnya dalam lingkungan
                                yang terkontrol, termasuk kegiatan yang
                                menggunakan kapal untuk memuat, mengangkut,
                                menyimpan, mendinginkan, menangani, mengolah,
                                dan/atau mengawetkannya.
                          - _type: numPoint
                            _key: '14'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Petambak Garam adalah Setiap Orang yang
                                melakukan kegiatan Usaha Pergaraman.
                          - _type: numPoint
                            _key: '15'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Petambak Garam Kecil adalah Petambak Garam yang
                                melakukan Usaha Pergaraman pada lahannya sendiri
                                dengan luas lahan paling luas 5 (lima) hektare
                                dan perebus Garam.
                          - _type: numPoint
                            _key: '16'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penggarap Tambak Garam adalah Petambak Garam
                                yang menyediakan tenaganya dalam Usaha
                                Pergaraman.
                          - _type: numPoint
                            _key: '17'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemilik Tambak Garam adalah Petambak Garam yang
                                memiliki hak atas lahan yang digunakan untuk
                                produksi Garam dan secara aktif melakukan Usaha
                                Pergaraman.
                          - _type: numPoint
                            _key: '18'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ikan adalah segala jenis organisme yang seluruh
                                atau sebagian dari siklus hidupnya berada di
                                dalam lingkungan perairan.
                          - _type: numPoint
                            _key: '19'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Garam adalah senyawa kimia yang komponen
                                utamanya berupa natrium klorida dan dapat
                                mengandung unsur lain, seperti magnesium,
                                kalsium, besi, dan kalium dengan bahan tambahan
                                atau tanpa bahan tambahan iodium.
                          - _type: numPoint
                            _key: '20'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Perikanan adalah semua kegiatan yang berhubungan
                                dengan pengelolaan dan pemanfaatan sumber daya
                                Ikan dan lingkungannya mulai dari praproduksi,
                                produksi, pascaproduksi, dan pengolahan sampai
                                dengan pemasaran yang dilaksanakan dalam suatu
                                sistem bisnis Perikanan.
                          - _type: numPoint
                            _key: '21'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pergaraman adalah semua hal yang berhubungan
                                dengan praproduksi, produksi, pascaproduksi,
                                pengolahan, dan pemasaran Garam.
                          - _type: numPoint
                            _key: '22'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Usaha Perikanan adalah kegiatan yang
                                dilaksanakan dengan sistem bisnis Perikanan yang
                                meliputi praproduksi, produksi, pascaproduksi,
                                pengolahan, dan pemasaran.
                          - _type: numPoint
                            _key: '23'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Usaha Pergaraman adalah kegiatan yang
                                dilaksanakan dengan sistem bisnis Pergaraman
                                yang meliputi praproduksi, produksi,
                                pascaproduksi, pengolahan, dan pemasaran.
                          - _type: numPoint
                            _key: '24'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Komoditas Perikanan adalah hasil dari Usaha
                                Perikanan yang dapat diperdagangkan, disimpan,
                                dan/atau dipertukarkan.
                          - _type: numPoint
                            _key: '25'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Komoditas Pergaraman adalah hasil dari Usaha
                                Pergaraman yang dapat diperdagangkan, disimpan,
                                dan/atau dipertukarkan.
                          - _type: numPoint
                            _key: '26'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Setiap Orang adalah orang perseorangan atau
                                korporasi, baik yang berbentuk badan hukum
                                maupun yang tidak berbadan hukum.
                          - _type: numPoint
                            _key: '27'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pelaku Usaha adalah orang perseorangan atau
                                korporasi yang melakukan usaha prasarana
                                dan/atau sarana produksi Perikanan, prasarana
                                dan/atau sarana produksi Garam, pengolahan, dan
                                pemasaran hasil Perikanan, serta produksi Garam
