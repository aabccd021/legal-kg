                      isi:
                        _type: amendPoints
                        description:
                          _type: referenceText
                          references: []
                          text: >-
                            Beberapa ketentuan dalam Undang-Undang Nomor 30
                            Tahun 2009 tentang Ketenagalistrikan (Lembaran
                            Negara Republik Indonesia Tahun 2009 Nomor 133,
                            Tambahan Lembaran Negara Republik Indonesia Nomor
                            5052) diubah sebagai berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ketenagalistrikan adalah segala sesuatu
                                      yang menyangkut penyediaan dan pemanfaatan
                                      tenaga listrik serta usaha penunjang
                                      tenaga listrik.
                                - _type: numPoint
                                  _key: '2'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Tenaga listrik adalah suatu bentuk energi
                                      sekunder yang dibangkitkan,
                                      ditransmisikan, dan didistribusikan untuk
                                      segala macam keperluan, tetapi tidak
                                      meliputi listrik yang dipakai untuk
                                      komunikasi, elektronika, atau isyarat.
                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Usaha penyediaan tenaga listrik adalah
                                      pengadaan tenaga listrik meliputi
                                      pembangkitan, transmisi, distribusi, dan
                                      penjualan tenaga listrik kepada konsumen.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembangkitan tenaga listrik adalah
                                      kegiatan memproduksi tenaga listrik.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Transmisi tenaga listrik adalah penyaluran
                                      tenaga listrik dari pembangkitan ke sistem
                                      distribusi atau ke konsumen, atau
                                      penyaluran tenaga listrik antarsistem.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Distribusi tenaga listrik adalah
                                      penyaluran tenaga listrik dari sistem
                                      transmisi atau dari pembangkitan ke
                                      konsumen.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Konsumen adalah setiap orang atau badan
                                      yang membeli tenaga listrik dari pemegang
                                      izin usaha penyediaan tenaga listrik.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Usaha penjualan tenaga listrik adalah
                                      kegiatan usaha penjualan tenaga listrik
                                      kepada konsumen.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Rencana umum ketenagalistrikan adalah
                                      rencana pengembangan sistem penyediaan
                                      tenaga listrik yang meliputi bidang
                                      pembangkitan, transmisi, dan distribusi
                                      tenaga listrik yang diperlukan untuk
                                      memenuhi kebutuhan tenaga listrik.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perizinan Berusaha terkait
                                      ketenagalistrikan adalah perizinan untuk
                                      melakukan kegiatan usaha penyediaan tenaga
                                      listrik untuk kepentingan umum, usaha
                                      penyediaan tenaga listrik untuk
                                      kepentingan sendiri, dan/atau usaha jasa
                                      penunjang tenaga listrik.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: Dihapus.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
