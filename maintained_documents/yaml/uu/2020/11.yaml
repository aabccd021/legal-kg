                                ruang dan/atau rencana zonasi, Perizinan
                                Berusaha terkait pemanfaatan di laut sebagaimana
                                dimaksud dalam Pasal 16 ayat (1) diberikan oleh
                                Pemerintah Pusat berdasarkan rencana tata ruang
                                wilayah nasional dan/atau rencana tata ruang
                                laut. (2) Dalam hal terdapat kebijakan nasional
                                yang bersifat strategis tetapi rencana tata
                                ruang dan/atau rencana zonasi belum ditetapkan
                                oleh Pemerintah atau Pemerintah Daerah,
