                        text: >-
                          5. Di antara Pasal 153 dan Pasal 154 disisipkan 10
                          (sepuluh) pasal, yakni Pasal 153A, Pasal 152B, Pasal
                          153C, Pasal 153D, Pasal 153E, Pasal 153F, Pasal 153G,
                          Pasal 153H, Pasal 1531, dan Pasal 153J sehingga
                          berbunyi sebagai berikut: Pasal 153A (1) Perseroan
                          yang memenuhi kriteria Usaha Mikro dan Kecil dapat
                          didirikan oleh 1 (satu) orang. (2) Pendirian Perseroan
                          untuk Usaha Mikro dan Kecil sebagaimana dimaksud pada
                          ayat (1) dilakukan berdasarkan surat pernyataan
                          pendirian yang dibuat dalam Bahasa Indonesia. (3) —
                          Ketentuan lebih lanjut mengenai pendirian Perseroan
                          untuk Usaha Mikro dan Kecil diatur dalam Peraturan
                          Pemerintah. REPUBLIK INDONESIA - 613 - Pasal 153B (1)
                          Pernyataan pendirian sebagaimana dimaksud dalam Pasal
                          153A ayat (2) memuat maksud dan tujuan, kegiatan
                          usaha, modal dasar, dan keterangan lain berkaitan
                          dengan pendirian Perseroan. (2) “Pernyataan pendirian
                          sebagaimana dimaksud pada ayat (1) didaftarkan secara
                          elektronik kepada Menteri dengan mengisi format isian.
                          (3) — Ketentuan lebih lanjut mengenai materi
                          pernyataan pendirian sebagaimana dimaksud pada ayat
                          (1) dan format isian sebagaimana dimaksud pada ayat
                          (2) diatur dalam Peraturan Pemerintah. Pasal 153C (1)
                          Perubahan pernyataan pendirian Perseroan untuk Usaha
                          Mikro dan Kecil sebagaimana dimaksud dalam Pasal 153A
                          ditetapkan oleh RUPS dan diberitahukan secara
                          elektronik kepada Menteri. (2) — Ketentuan lebih
                          lanjut mengenai materi dan format isian perubahan
                          pernyataan pendirian sebagaimana dimaksud pada ayat
                          (1) diatur dalam Peraturan Pemerintah. Pasal 153D (1)
                          Direksi Perseroan untuk Usaha Mikro dan Kecil
                          sebagaimana dimaksud dalam Pasal 153A menjalankan
                          pengurusan Perseroan untuk Usaha Mikro dan Kecil bagi
                          kepentingan Perseroan sesuai dengan maksud dan tujuan
                          Perseroan. (2) Direksi berwenang menjalankan
                          pengurusan sebagaimana dimaksud pada ayat (1) sesuai
                          dengan kebijakan yang dianggap tepat, dalam batas yang
                          ditentukan dalam Undang-Undang ini, dan/atau
                          pernyataan pendirian Perseroan. REPUBLIK INDONESIA -
                          614 - Pasal 153E (1) Pemegang saham Perseroan untuk
                          Usaha Mikro dan Kecil sebagaimana dimaksud dalam Pasal
                          153A merupakan orang perseorangan. (2) — Pendiri
                          Perseroan hanya dapat mendirikan Perseroan Terbatas
                          untuk Usaha Mikro dan Kecil sejumlah 1 (satu)
                          Perseroan untuk Usaha Mikro dan Kecil dalam 1 (satu)
                          tahun. Pasal 153F (1) Direksi Perseroan untuk Usaha
                          Mikro dan Kecil sebagaimana dimaksud dalam Pasal 153A
                          harus membuat laporan keuangan dalam rangka mewujudkan
                          Tata Kelola Perseroan yang baik. (2) — Ketentuan lebih
                          lanjut mengenai kewajiban membuat laporan keuangan
                          diatur dalam Peraturan Pemerintah. Pasal 153G (1)
                          Pembubaran Perseroan untuk Usaha Mikro dan Kecil
                          sebagaimana dimaksud dalam Pasal 153A dilakukan oleh
                          RUPS yang dituangkan dalam pernyataan pembubaran dan
                          diberitahukan secara elektronik kepada Menteri. (2)
                          Pembubaran Perseroan untuk Usaha Mikro dan Kecil
                          sebagaimana dimaksud pada ayat (1) terjadi karena: a.
                          berdasarkan keputusan RUPS, b. jangka waktu berdirinya
                          yang ditetapkan dalam pernyataan pendirian telah
                          berakhir, c. berdasarkan penetapan pengadilan, d.
                          dengan dicabutnya kepailitan berdasarkan putusan
                          pengadilan niaga yang telah mempunyai kekuatan hukum
                          tetap, harta pailit Perseroan tidak cukup untuk
                          membayar biaya kepailitan, REPUBLIK INDONESIA - 615 -
                          e. harta pailit Perseroan yang telah dinyatakan pailit
                          berada dalam keadaan insolvensi sebagaimana diatur
                          dalam Undang-Undang tentang Kepailitan dan Penundaan
                          Kewajiban Pembayaran Utang, atau f. ' dicabutnya
                          Perizinan Berusaha Perseroan sehingga mewajibkan
                          Perseroan melakukan likuidasi sesuai dengan ketentuan
                          peraturan perundang-undangan. Pasal 153H (1) Dalam hal
                          Perseroan untuk Usaha Mikro dan Kecil sudah tidak
                          memenuhi kriteria Usaha Mikro dan Kecil sebagaimana
                          dimaksud dalam Pasal 153A, Perseroan harus mengubah
                          statusnya menjadi Perseroan sebagaimana dimaksud dalam
                          ketentuan peraturan perundang-undangan yang berlaku.
                          (2) Ketentuan lebih lanjut mengenai pengubahan status
                          Perseroan untuk Usaha Mikro dan Kecil menjadi
                          Perseroan diatur dalam Peraturan Pemerintah. Pasal
                          1531 (l) Perseroan untuk Usaha Mikro dan Kecil
                          diberikan keringanan biaya terkait pendirian badan
                          hukum. (2) Ketentuan lebih lanjut mengenai keringanan
                          biaya Perseroan untuk Usaha Mikro dan Kecil
                          sebagaimana dimaksud pada ayat (1) diatur sesuai
                          dengan ketentuan peraturan perundang-undangan di
                          bidang penerimaan negara bukan pajak. Pasal 153J (1)
                          Pemegang saham Perseroan untuk Usaha Mikro dan Kecil
                          tidak bertanggung jawab secara pribadi atas perikatan
                          yang dibuat atas nama Perseroan dan tidak bertanggung
                          jawab atas kerugian Perseroan melebihi saham yang
                          dimiliki. REPUBLIK INDONESIA - 616 - (2) — Ketentuan
                          sebagaimana dimaksud pada ayat (1) tidak berlaku
                          apabila: a. persyaratan Perseroan sebagai badan hukum
                          belum atau tidak terpenuhi, b. pemegang saham yang
                          bersangkutan, baik langsung maupun tidak langsung
                          dengan iktikad buruk memanfaatkan Perseroan untuk
                          kepentingan pribadi, C. pemegang saham yang
                          bersangkutan terlibat dalam perbuatan melawan hukum
                          yang dilakukan oleh Perseroan, atau d. pemegang saham
                          yang bersangkutan, baik langsung maupun tidak langsung
                          secara melawan hukum menggunakan kekayaan Perseroan,
                          yang mengakibatkan kekayaan Perseroan menjadi tidak
                          cukup untuk melunasi utang Perseroan.
