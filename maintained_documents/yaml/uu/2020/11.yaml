                    - _type: pasal
                      _key: 18
                      isi:
                        _type: amendPoints
                        description:
                          _type: referenceText
                          references: []
                          text: >-
                            Beberapa ketentuan dalam Undang-Undang Nomor 27
                            Tahun 2007 tentang Pengelolaan Wilayah Pesisir dan
                            Pulau-Pulau Kecil (Lembaran Negara Republik
                            Indonesia Tahun 2007 Nomor 84, Tambahan Lembaran
                            Negara Republik Indonesia Nomor 4739) sebagaimana
                            telah diubah dengan Undang-Undang Nomor 1 Tahun 2014
                            tentang Perubahan Atas Undang-Undang Nomor 27 Tahun
                            2007 tentang Pengelolaan Wilayah Pesisir dan
                            Pulau-Pulau Kecil (Lembaran Negara Republik
                            Indonesia Tahun 2014 Nomor 2, Tambahan Lembaran
                            Negara Republik Indonesia Nomor 5490) diubah sebagai
                            berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengelolaan Wilayah Pesisir dan
                                      Pulau-Pulau Kecil adalah suatu
                                      pengoordinasian perencanaan, pemanfaatan,
                                      pengawasan, dan pengendalian sumber daya
                                      pesisir dan pulau-pulau kecil yang
                                      dilakukan oleh Pemerintah dan Pemerintah
                                      Daerah, antarsektor, antara ekosistem
                                      darat dan laut, serta antara ilmu
                                      pengetahuan dan manajemen untuk
                                      meningkatkan kesejahteraan rakyat.
                                - _type: numPoint
                                  _key: '2'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Wilayah Pesisir adalah daerah peralihan
                                      antara Ekosistem darat dan laut yang
                                      dipengaruhi oleh perubahan di darat dan
                                      laut.
                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pulau Kecil adalah pulau dengan luas lebih
                                      kecil atau sama dengan 2.000 km? (dua ribu
                                      kilo meter persegi) beserta kesatuan
                                      Ekosistemnya.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Sumber Daya Pesisir dan Pulau-Pulau Kecil
                                      adalah sumber daya hayati, sumber daya
                                      nonhayati: sumber daya buatan, dan
                                      jasa-jasa lingkungan: sumber daya hayati
                                      meliputi ikan, terumbu karang, padang
                                      lamun, mangrove dan biota laut lain:
                                      sumber daya nonhayati meliputi pasir, air
                                      laut, mineral dasar laut, sumber daya
                                      buatan meliputi infrastruktur laut yang
                                      terkait dengan kelautan dan perikanan, dan
                                      jasa-jasa lingkungan berupa keindahan
                                      alam, permukaan dasar laut tempat
                                      instalasi bawah air yang terkait dengan
                                      kelautan dan perikanan serta energi
                                      gelombang laut yang terdapat di Wilayah
                                      Pesisir.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ekosistem adalah kesatuan komunitas
                                      tumbuh- tumbuhan, hewan, organisme dan non
                                      organisme lain serta proses yang
                                      menghubungkannya dalam membentuk
                                      keseimbangan, stabilitas, dan
                                      produktivitas.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Bioekoregion adalah bentang alam yang
                                      berada di dalam satu hamparan kesatuan
                                      ekologis yang ditetapkan oleh batas-batas
                                      alam, seperti daerah aliran sungai, teluk,
                                      dan arus.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perairan Pesisir adalah laut yang
                                      berbatasan dengan daratan meliputi
                                      perairan sejauh 12 (dua belas) mil laut
                                      diukur dari garis pantai, perairan yang
                                      menghubungkan pantai dan pulau-pulau,
                                      estuari, teluk, perairan dangkal, rawa
                                      payau, dan laguna.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan adalah bagian Wilayah Pesisir dan
                                      Pulau-Pulau Kecil yang memiliki fungsi
                                      tertentu yang ditetapkan berdasarkan
                                      kriteria karakteristik fisik, biologi,
                                      sosial, dan ekonomi untuk dipertahankan
                                      keberadaannya.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan Pemanfaatan Umum adalah bagian
                                      dari Wilayah Pesisir yang ditetapkan
                                      peruntukkannya bagi berbagai sektor
                                      kegiatan.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan Strategis Nasional Tertentu adalah
                                      Kawasan yang terkait dengan kedaulatan
                                      negara, pengendalian lingkungan hidup,
                                      dan/atau situs warisan dunia, yang
                                      pengembangannya diprioritaskan bagi
                                      kepentingan nasional.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Zona adalah ruang yang penggunaannya
                                      disepakati bersama antara berbagai
                                      pemangku kepentingan dan telah ditetapkan
                                      status hukumnya.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Zonasi adalah suatu bentuk rekayasa teknik
                                      pemanfaatan ruang melalui penetapan
                                      batas-batas fungsional sesuai dengan
                                      potensi sumber daya dan daya dukung serta
                                      proses-proses ekologis yang berlangsung
                                      sebagai satu kesatuan dalam Ekosistem
                                      pesisir.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Rencana Strategis adalah rencana yang
                                      memuat arah kebijakan lintas sektor untuk
                                      Kawasan perencanaan pembangunan melalui
                                      penetapan tujuan, sasaran dan strategi
                                      yang luas, serta target pelaksanaan dengan
                                      indikator yang tepat untuk memantau
                                      rencana tingkat nasional.
                                - _type: numPoint
                                  _key: '14'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Rencana Zonasi yang selanjutnya disingkat
                                      RZ adalah rencana yang menentukan arah
                                      penggunaan sumber daya setiap satuan
                                      perencanaan disertai dengan penetapan
                                      struktur dan pola ruang pada Kawasan
                                      perencanaan yang memuat kegiatan yang
                                      boleh dilakukan dan tidak boleh dilakukan
                                      serta kegiatan yang hanya dapat dilakukan
                                      setelah memperoleh Perizinan Berusaha
                                      terkait pemanfaatan di laut. 14A. Rencana
                                      Zonasi Kawasan Strategis Nasional Tertentu
                                      yang selanjutnya disingkat RZ KSNT adalah
                                      rencana yang disusun untuk menentukan
                                      arahan pemanfaatan ruang di kawasan
                                      strategis nasional tertentu.
                                - _type: numPoint
                                  _key: '15'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Rencana Pengelolaan adalah rencana yang
                                      memuat susunan kerangka kebijakan,
                                      prosedur, dan tanggung jawab dalam rangka
                                      pengoordinasian pengambilan keputusan di
                                      antara berbagai lembaga/instansi
                                      pemerintah mengenai kesepakatan penggunaan
                                      sumber daya atau kegiatan pembangunan di
                                      zona yang ditetapkan.
                                - _type: numPoint
                                  _key: '16'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Rencana Aksi Pengelolaan adalah tindak
                                      lanjut rencana Pengelolaan Wilayah Pesisir
                                      — dan Pulau-Pulau Kecil yang memuat
                                      tujuan, sasaran, anggaran, dan jadwal
                                      untuk satu atau beberapa tahun ke depan
                                      secara terkoordinasi untuk melaksanakan
                                      berbagai kegiatan yang diperlukan oleh
                                      instansi Pemerintah, Pemerintah Daerah,
                                      dan pemangku kepentingan lainnya guna
                                      mencapai hasil pengelolaan sumber daya
                                      pesisir dan pulau-pulau kecil di setiap
                                      Kawasan perencanaan.
                                - _type: numPoint
                                  _key: '17'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: Dihapus.
                                - _type: numPoint
                                  _key: '18'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: Dihapus. 18A. Dihapus.
                                - _type: numPoint
                                  _key: '19'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Konservasi Wilayah Pesisir dan Pulau-Pulau
                                      Kecil adalah upaya pelindungan,
                                      pelestarian, dan pemanfaatan Wilayah
                                      Pesisir dan Pulau-Pulau Kecil serta
                                      ekosistemnya untuk menjamin keberadaan,
                                      ketersediaan, dan kesinambungan Sumber
                                      Daya Pesisir dan Pulau-Pulau Kecil dengan
                                      tetap memelihara dan meningkatkan kualitas
                                      nilai dan keanekaragamannya.
                                - _type: numPoint
                                  _key: '20'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan Konservasi di Wilayah Pesisir dan
                                      Pulau- Pulau Kecil adalah kawasan pesisir
                                      dan pulau-pulau kecil dengan ciri khas
                                      tertentu yang dilindungi untuk mewujudkan
                                      Pengelolaan Wilayah Pesisir dan
                                      Pulau-Pulau Kecil secara berkelanjutan.
                                - _type: numPoint
                                  _key: '21'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Sempadan Pantai adalah daratan sepanjang
                                      tepian yang lebarnya proporsional dengan
                                      bentuk dan kondisi fisik pantai, minimal
                                      100 (seratus) meter dari titik pasang
                                      tertinggi ke arah darat.
                                - _type: numPoint
                                  _key: '22'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Rehabilitasi Sumber Daya Pesisir dan
                                      Pulau-Pulau Kecil adalah proses pemulihan
                                      dan perbaikan kondisi Ekosistem atau
                                      populasi yang telah rusak walaupun
                                      hasilnya berbeda dari kondisi semula.
                                - _type: numPoint
                                  _key: '23'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Reklamasi adalah kegiatan yang dilakukan
                                      oleh Setiap Orang dalam rangka
                                      meningkatkan manfaat sumber daya lahan
                                      ditinjau dari sudut lingkungan dan sosial
                                      ekonomi dengan cara pengurugan,
                                      pengeringan lahan atau drainase.
                                - _type: numPoint
                                  _key: '24'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Daya Dukung Wilayah Pesisir dan
                                      Pulau-Pulau Kecil adalah kemampuan Wilayah
                                      Pesisir dan Pulau-Pulau Kecil untuk
                                      mendukung perikehidupan manusia dan
                                      makhluk hidup lain.
                                - _type: numPoint
                                  _key: '25'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Mitigasi Bencana adalah upaya untuk
                                      mengurangi risiko bencana, baik secara
                                      struktur atau fisik melalui pembangunan
                                      fisik alami dan/atau buatan maupun
                                      nonstruktur atau nonfisik melalui
                                      peningkatan kemampuan menghadapi ancaman
                                      bencana di Wilayah Pesisir dan Pulau-Pulau
                                      Kecil.
                                - _type: numPoint
                                  _key: '26'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Bencana Pesisir adalah kejadian karena
                                      peristiwa alam atau karena perbuatan
                                      Setiap Orang yang menimbulkan perubahan
                                      sifat fisik dan/atau hayati Pesisir dan
                                      mengakibatkan korban jiwa, harta, dan/atau
                                      kerusakan di Wilayah Pesisir dan Pulau-
                                      Pulau Kecil.
                                - _type: numPoint
                                  _key: '27'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Dampak Besar adalah terjadinya perubahan
                                      negatif fungsi lingkungan dalam skala yang
                                      luas dan intensitas lama yang diakibatkan
                                      oleh suatu usaha dan/atau kegiatan di
                                      Wilayah Pesisir dan Pulau- Pulau Kecil.
                                      27A. Dampak Penting dan Cakupan yang Luas
                                      serta Bernilai Strategis adalah perubahan
                                      yang berpengaruh terhadap kondisi biofisik
                                      seperti perubahan iklim, ekosistem, dan
                                      dampak sosial ekonomi masyarakat bagi
                                      kehidupan generasi sekarang dan generasi
                                      yang akan datang.
                                - _type: numPoint
                                  _key: '28'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pencemaran Pesisir adalah masuknya atau
                                      dimasukkannya makhluk hidup, zat, energi,
                                      dan/atau komponen lain ke dalam lingkungan
                                      Pesisir akibat adanya kegiatan Setiap
                                      Orang sehingga kualitas Pesisir turun
                                      sampai ke tingkat tertentu yang
                                      menyebabkan lingkungan Pesisir tidak dapat
                                      berfungsi sesuai dengan peruntukannya.
                                - _type: numPoint
                                  _key: '29'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Akreditasi adalah prosedur pengakuan suatu
                                      kegiatan yang secara konsisten telah
                                      memenuhi standar baku sistem Pengelolaan
                                      Wilayah Pesisir dan Pulau-Pulau Kecil yang
                                      meliputi penilaian, penghargaan, dan
                                      insentif terhadap program pengelolaan yang
                                      dilakukan oleh Masyarakat secara sukarela.
                                - _type: numPoint
                                  _key: '30'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemangku Kepentingan Utama adalah para
                                      pengguna Sumber Daya Pesisir dan
                                      Pulau-Pulau Kecil yang mempunyai
                                      kepentingan langsung dalam mengoptimalkan
                                      pemanfaatan Sumber Daya Pesisir dan
                                      Pulau-Pulau Kecil, seperti nelayan
                                      tradisional, nelayan modern, pembudi daya
                                      ikan, pengusaha pariwisata, pengusaha
                                      perikanan, dan Masyarakat.
                                - _type: numPoint
                                  _key: '31'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemberdayaan Masyarakat adalah upaya
                                      pemberian fasilitas, dorongan, atau
                                      bantuan kepada Masyarakat dan nelayan
                                      tradisional agar mampu menentukan pilihan
                                      yang terbaik dalam memanfaatkan Sumber
                                      Daya Pesisir dan Pulau- Pulau Kecil secara
                                      lestari.
                                - _type: numPoint
                                  _key: '32'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Masyarakat adalah masyarakat yang terdiri
                                      atas Masyarakat Hukum Adat, Masyarakat
                                      Lokal, dan Masyarakat Tradisional yang
                                      bermukim di wilayah pesisir dan
                                      pulau-pulau kecil.
                                - _type: numPoint
                                  _key: '33'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Masyarakat Hukum Adat adalah sekelompok
                                      orang yang secara turun-temurun bermukim
                                      di wilayah geografis tertentu di Negara
                                      Kesatuan Republik Indonesia karena adanya
                                      ikatan pada asal usul leluhur, hubungan
                                      yang kuat dengan tanah, wilayah, sumber
                                      daya alam, memiliki pranata pemerintahan
                                      adat, dan tatanan hukum adat di wilayah
                                      adatnya sesuai dengan ketentuan peraturan
                                      perundang-undangan.
                                - _type: numPoint
                                  _key: '34'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Masyarakat Lokal adalah kelompok
                                      Masyarakat yang menjalankan tata kehidupan
                                      sehari-hari berdasarkan kebiasaan yang
                                      sudah diterima sebagai nilai-nilai yang
                                      berlaku umum, tetapi tidak sepenuhnya
                                      bergantung pada Sumber Daya Pesisir dan
                                      Pulau-Pulau Kecil tertentu.
                                - _type: numPoint
                                  _key: '35'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Masyarakat Tradisional adalah Masyarakat
                                      perikanan tradisional yang masih diakui
                                      hak tradisionalnya dalam melakukan
                                      kegiatan penangkapan ikan atau kegiatan
                                      lainnya yang sah di daerah tertentu yang
                                      berada dalam perairan kepulauan sesuai
                                      dengan kaidah hukum laut internasional.
                                - _type: numPoint
                                  _key: '36'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kearifan Lokal adalah nilai-nilai luhur
                                      yang masih berlaku dalam tata kehidupan
                                      Masyarakat.
                                - _type: numPoint
                                  _key: '37'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Gugatan Perwakilan adalah gugatan yang
                                      berupa hak kelompok kecil Masyarakat untuk
                                      bertindak mewakili Masyarakat dalam jumlah
                                      besar dalam upaya mengajukan tuntutan
                                      berdasarkan kesamaan permasalahan, fakta
                                      hukum, dan tuntutan ganti kerugian.
                                - _type: numPoint
                                  _key: '38'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Setiap Orang adalah orang perseorangan
                                      atau korporasi, baik yang berbadan hukum
                                      maupun yang tidak berbadan hukum.
                                - _type: numPoint
                                  _key: '39'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Dewan Perwakilan Rakyat, selanjutnya
                                      disebut DPR, adalah Dewan Perwakilan
                                      Rakyat sebagaimana dimaksud dalam
                                      Undang-Undang Dasar Negara Republik
                                      Indonesia Tahun 1945.
                                - _type: numPoint
                                  _key: '40'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Pusat adalah Presiden Republik
                                      Indonesia yang memegang kekuasaan
                                      pemerintahan negara Republik Indonesia
                                      yang dibantu oleh Wakil Presiden dan
                                      menteri sebagaimana dimaksud dalam
                                      Undang-Undang Dasar Negara Republik
                                      Indonesia Tahun 1945.
                                - _type: numPoint
                                  _key: '41'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Daerah adalah kepala daerah
                                      sebagai unsur penyelenggara Pemerintahan
                                      Daerah yang memimpin pelaksanaan urusan
                                      pemerintahan yang menjadi kewenangan
                                      daerah otonom.
                                - _type: numPoint
                                  _key: '42'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintahan Daerah adalah penyelenggaraan
                                      urusan pemerintahan oleh Pemerintah Daerah
                                      dan dewan perwakilan rakyat daerah menurut
                                      asas otonomi dan tugas pembantuan dengan
                                      prinsip otonomi seluas-luasnya dalam
                                      sistem dan prinsip Negara Kesatuan
                                      Republik Indonesia sebagaimana dimaksud
                                      dalam Undang-Undang Dasar Negara Republik
                                      Indonesia Tahun 1945.
                                - _type: numPoint
                                  _key: '43'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Mitra Bahari adalah jejaring pemangku
                                      kepentingan di bidang Pengelolaan Wilayah
                                      Pesisir dan Pulau- Pulau Kecil dalam
                                      penguatan kapasitas sumber daya manusia,
                                      lembaga, pendidikan, penyuluhan,
                                      pendampingan, pelatihan, penelitian
                                      terapan, dan pengembangan rekomendasi
                                      kebijakan.
                                - _type: numPoint
                                  _key: '44'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Menteri adalah menteri yang
                                      menyelenggarakan urusan pemerintahan di
                                      bidang kelautan dan perikanan.
