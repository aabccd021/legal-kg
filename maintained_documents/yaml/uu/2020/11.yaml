                                sehingga berbunyi sebagai berikut: Pasal 7A ( 1)
                                RZWP-3-K sebagaimana g dimaksud dalam Pasal 7
                                ayat y (1) huruf a diintegrasikan ke dalam
                                Rencana Tata Ruang Wilayah Provinsi. (2) RZ KSN
                                sebagaimana dimaksud dalam Pasal 7 ayat (1)
                                huruf b diintegrasikan ke dalam Rencana Tata
                                Ruang Kawasan Strategis Nasional. (3) RZ KSNT
                                sebagaimana dimaksud dalam Pasal 7 ayat (1)
                                huruf 'c diserasikan, diselaraskan, dan
                                diseimbangkan dengan rencana tata ruang, rencana
                                zonasi kawasan antarwilayah, dan rencana tata
                                ruang laut. (4) Dalam hal RZWP-3-K sebagaimana
                                dimaksud pada ayat (1) sudah ditetapkan,
                                pengintegrasian dilakukan pada saat peninjauan
                                kembali Rencana Tata Ruang Wilayah Provinsi. (5)
                                Dalam hal RZ KSN sebagaimana dimaksud pada ayat
                                (2) sudah ditetapkan, pengintegrasian dilakukan
                                pada saat peninjauan kembali Rencana Tata Ruang
                                Kawasan Strategis Nasional. Pasal 7B Perencanaan
                                Pengelolaan Wilayah Pesisir dan Pulau-Pulau
                                Kecil sebagaimana dimaksud dalam Pasal 7 ayat
                                (1) dilakukan dengan mempertimbangkan: a.
                                keserasian, keselarasan, dan keseimbangan dengan
                                daya dukung ekosistem, fungsi pemanfaatan dan
                                fungsi perlindungan, dimensi ruang dan waktu,
                                dimensi teknologi dan sosial budaya, serta
                                fungsi pertahanan dan keamanan, b. keterpaduan
                                pemanfaatan berbagai jenis sumber daya, fungsi,
                                estetika lingkungan, dan kualitas ruang perairan
                                dan sumber daya pesisir dan pulau-pulau kecil,
                                dan c. kewajiban untuk mengalokasikan ruang dan
                                akses Masyarakat dalam pemanfaatan ruang
                                perairan dan sumber daya pesisir dan pulau-pulau
                                kecil yang mempunyai fungsi sosial dan ekonomi.
                                Pasal 7C Ketentuan lebih lanjut mengenai
                                Perencanaan Pengelolaan Wilayah Pesisir dan
                                Pulau-Pulau Kecil sebagaimana dimaksud dalam
                                Pasal 7, Pasal 7A, dan Pasal 7B diatur dalam
                                Peraturan Pemerintah.
