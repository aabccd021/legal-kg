                    - _type: pasal
                      _key: 20
                      isi:
                        _type: amendPoints
                        description:
                          _type: referenceText
                          references: []
                          text: >-
                            Beberapa ketentuan dalam Undang-Undang Nomor 4 Tahun
                            2011 tentang Informasi Geospasial (Lembaran Negara
                            Republik Indonesia Tahun 2011 Nomor 49, Tambahan
                            Lembaran Negara Republik Indonesia Nomor 5214)
                            diubah sebagai berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Spasial adalah aspek keruangan suatu objek
                                      atau kejadian yang mencakup lokasi, letak,
                                      dan posisinya.
                                - _type: numPoint
                                  _key: '2'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Geospasial atau ruang kebumian adalah
                                      aspek keruangan yang menunjukkan lokasi,
                                      letak, dan posisi suatu objek atau
                                      kejadian yang berada di bawah, pada, atau
                                      di atas permukaan bumi yang dinyatakan
                                      dalam sistem koordinat tertentu.
                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Data Geospasial yang selanjutnya disingkat
                                      DG adalah data tentang lokasi geografis,
                                      dimensi atau ukuran, dan/atau
                                      karakteristik objek alam dan/atau buatan
                                      manusia yang berada di bawah, pada, atau
                                      di atas permukaan bumi.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Informasi Geospasial yang selanjutnya
                                      disingkat IG adalah DG yang sudah diolah
                                      sehingga dapat digunakan sebagai alat
                                      bantu dalam perumusan kebijakan,
                                      pengambilan keputusan, dan/atau
                                      pelaksanaan kegiatan yang berhubungan
                                      dengan ruang kebumian.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Informasi Geospasial Dasar yang
                                      selanjutnya disingkat IGD adalah IG yang
                                      berisi tentang objek yang dapat dilihat
                                      secara langsung atau diukur dari
                                      kenampakan fisik di muka bumi dan yang
                                      tidak berubah dalam waktu yang relatif
                                      lama.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Informasi Geospasial Tematik yang
                                      selanjutnya disingkat IGT adalah IG yang
                                      menggambarkan satu atau lebih tema
                                      tertentu yang dibuat mengacu pada IGD.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
