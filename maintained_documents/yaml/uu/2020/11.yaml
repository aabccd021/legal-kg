                                      kegiatan pembangunan, pemanfaatan,
                                      pelestarian, dan pembongkaran.
                                - _type: ayat
                                  _key: 2
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Dalam penyelenggaraan bangunan gedung
                                      sebagaimana dimaksud pada ayat (1),
                                      penyelenggara berkewajiban memenuhi
                                      standar teknis bangunan gedung.
                                - _type: ayat
                                  _key: 3
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penyelenggara bangunan gedung terdiri atas
                                      pemilik bangunan gedung, Penyedia Jasa
                                      Konstruksi, Profesi Ahli, Penilik,
                                      pengkaji teknis, dan pengguna bangunan
                                      gedung.
                                - _type: ayat
                                  _key: 4
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Dalam hal terdapat perubahan standar
                                      teknis bangunan gedung, pemilik bangunan
                                      gedung yang belum memenuhi standar teknis
                                      sebagaimana dimaksud pada ayat (2) tetap
                                      harus memenuhi ketentuan standar teknis
                                      secara bertahap.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 34 diubah sehingga berbunyi
                                sebagai berikut:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 32
                            _pasalKey: '35'
                            isi:
                              _type: ayats
                              ayats:
                                - _type: ayat
                                  _key: 1
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembangunan bangunan gedung
                                      diselenggarakan melalui tahapan
                                      perencanaan, pelaksanaan, dan pengawasan.
                                - _type: ayat
                                  _key: 2
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembangunan bangunan gedung dapat
                                      dilakukan, baik di tanah milik sendiri
                                      maupun di tanah milik pihak lain.
                                - _type: ayat
                                  _key: 3
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembangunan bangunan gedung di atas tanah
                                      milik pihak lain sebagaimana dimaksud pada
                                      ayat (2) dilakukan berdasarkan perjanjian
                                      tertulis antara pemilik tanah dan pemilik
                                      bangunan gedung.
                                - _type: ayat
                                  _key: 4
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perencanaan sebagaimana dimaksud pada ayat
                                      (1) harus dilakukan oleh penyedia jasa
                                      perencana konstruksi yang memenuhi syarat
                                      dan standar kompetensi sesuai dengan
                                      ketentuan peraturan perundang-undangan.
                                - _type: ayat
                                  _key: 5
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penyedia jasa perencana konstruksi
                                      sebagaimana dimaksud pada ayat (4) harus
                                      merencanakan bangunan gedung dengan acuan
                                      standar teknis bangunan gedung sebagaimana
                                      dimaksud dalam Pasal 7 ayat (1).
                                - _type: ayat
                                  _key: 6
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Dalam hal bangunan gedung direncanakan
                                      tidak sesuai dengan standar teknis
                                      sebagaimana dimaksud dalam Pasal 7 ayat
                                      (1), bangunan gedung harus dilengkapi
                                      hasil pengujian untuk mendapatkan
                                      persetujuan rencana teknis dari Pemerintah
                                      Pusat.
                                - _type: ayat
                                  _key: 7
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Hasil perencanaan harus dikonsultasikan
                                      dengan Pemerintah Pusat dan Pemerintah
                                      Daerah sesuai dengan kewenangannya
                                      berdasarkan norma, standar, prosedur, dan
                                      kriteria yang ditetapkan oleh Pemerintah
                                      Pusat untuk mendapatkan pernyataan
                                      pemenuhan standar teknis bangunan gedung.
                                - _type: ayat
                                  _key: 8
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Dalam hal perencanaan bangunan gedung yang
                                      menggunakan prototipe yang ditetapkan
                                      Pemerintah Pusat, perencanaan bangunan
                                      gedung tidak memerlukan kewajiban
                                      konsultasi dan tidak memerlukan
                                      pemeriksaan pemenuhan standar.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 35 diubah sehingga berbunyi
                                sebagai berikut:
                          - _type: amendPoint
                            _nomorKey: 33
                            _operation: delete
                            _pasalKey: '36'
                            isi:
                              _type: referenceText
                              references: []
                              text: 33. Pasal 36 dihapus.
                          - _type: amendPoint
                            _operation: insert
                            _nomorKey: 34
                            _pasalKeys:
                              - 36A
                              - 36B
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                34. Di antara Pasal 36 dan Pasal 37 disisipkan 2
                                (dua) pasal, yakni Pasal 36A dan Pasal 36B yang
                                berbunyi sebagai berikut: Pasal 36A (1)
                                Pelaksanaan konstruksi sebagaimana dimaksud
                                dalam Pasal 35 ayat (1) dilakukan setelah
                                mendapatkan Persetujuan Bangunan Gedung. (2)
                                Persetujuan sebagaimana dimaksud pada ayat (1)
                                diperoleh setelah mendapatkan pernyataan
                                pemenuhan standar teknis bangunan gedung dari
                                Pemerintah Pusat atau Pemerintah Daerah sesuai
                                kewenangannya berdasarkan norma, standar,
                                prosedur, dan kriteria yang ditetapkan oleh
                                Pemerintah Pusat. (3) Persetujuan sebagaimana
                                dimaksud pada ayat (1) dimohonkan kepada
                                Pemerintah Pusat atau Pemerintah Daerah sesuai
                                dengan kewenangannya berdasarkan norma, standar,
                                prosedur, dan kriteria yang ditetapkan oleh
                                Pemerintah Pusat melalui sistem elektronik yang
                                diselenggarakan oleh Pemerintah Pusat. Pasal 36B
                                (1) Pelaksanaan bangunan gedung dilakukan oleh
                                penyedia jasa pelaksana konstruksi yang memenuhi
                                syarat dan standar kompetensi sesuai dengan
                                ketentuan peraturan perundang-undangan. (2)
                                Penyedia jasa pengawasan atau manajemen
                                konstruksi melakukan kegiatan pengawasan dan
                                bertanggung jawab untuk melaporkan setiap
                                tahapan pekerjaan. (3) Pemerintah Pusat atau
                                Pemerintah Daerah sesuai dengan kewenangannya
                                berdasarkan norma, standar, prosedur, dan
                                kriteria yang ditetapkan oleh Pemerintah Pusat
                                melakukan inspeksi pada setiap tahapan
                                sebagaimana dimaksud pada ayat (2) sebagai
                                pengawasan yang dapat menyatakan lanjut atau
                                tidaknya pekerjaan konstruksi ke tahap
                                berikutnya. (4) Tahapan sebagaimana dimaksud
                                pada ayat (3) meliputi: a. pekerjaan struktur
                                bawah: b. pekerjaan basemen jika ada: C.
                                pekerjaan struktur atas: dan d. pengujian. (5)
                                Dalam melaksanakan inspeksi sebagaimana dimaksud
                                pada ayat (3) Pemerintah Pusat atau Pemerintah
                                Daerah sesuai dengan kewenangannya menugaskan
                                Penilik berdasarkan norma, standar, prosedur,
                                dan kriteria yang ditetapkan oleh Pemerintah
                                Pusat. (6) Dalam hal pelaksanaan diperlukan
                                adanya perubahan dan/atau penyesuaian terhadap
                                rencana teknis, penyedia jasa perencana wajib
                                melaporkan kepada Pemerintah Pusat atau
                                Pemerintah Daerah sesuai dengan kewenanganya
                                untuk mendapatkan persetujuan sebelum
                                pelaksanaan perubahan dapat dilanjutkan
                                berdasarkan norma, standar, prosedur, dan
                                kriteria yang ditetapkan oleh Pemerintah Pusat.
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 35
                            _pasalKey: '37'
                            isi:
                              _type: ayats
