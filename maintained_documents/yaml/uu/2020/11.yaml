                        text: >-
                          15. Ketentuan Pasal 59 diubah sehingga berbunyi
                          sebagai berikut: Pasal 59 (1) Perjanjian kerja untuk
                          waktu tertentu hanya dapat dibuat untuk pekerjaan
                          tertentu yang menurut jenis dan sifat atau kegiatan
                          pekerjaannya akan selesai dalam waktu tertentu, yaitu
                          sebagai berikut: a. pekerjaan yang sekali selesai atau
                          yang sementara sifatnya, b. pekerjaaan yang
                          diperkirakan penyelesaiannya dalam waktu yang tidak
