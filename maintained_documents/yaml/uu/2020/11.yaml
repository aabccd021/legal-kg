                              text: >-
                                4. Ketentuan Pasal 43 diubah sehingga berbunyi
                                sebagai berikut: Pasal 43 (1) Perencanaan ruang
                                Laut sebagaimana dimaksud dalam Pasal 42 ayat
                                (2) meliputi: a. perencanaan tata ruang Laut
                                nasional: b. perencanaan zonasi wilayah pesisir
                                dan pulau- pulau kecil, dan REPUBLIK INDONESIA
                                -62 - C. perencanaan zonasi kawasan Laut. (2)
                                Perencanaan tata ruang Laut nasional sebagaimana
                                dimaksud pada ayat (1) huruf a merupakan
                                perencanaan untuk menghasilkan rencana tata
                                ruang Laut nasional yang diintegrasikan ke dalam
                                perencanaan tata ruang wilayah nasional. (3)
                                Perencanaan zonasi wilayah pesisir dan
                                pulau-pulau kecil sebagaimana dimaksud pada ayat
                                (1) huruf b menghasilkan rencana zonasi wilayah
                                pesisir dan pulau-pulau kecil yang
                                diintegrasikan ke dalam perencanaan tata ruang
                                wilayah provinsi. (4) Perencanaan zonasi kawasan
                                Laut sebagaimana dimaksud pada ayat (1) huruf c
                                merupakan perencanaan untuk menghasilkan rencana
                                zonasi kawasan strategis nasional, rencana
                                zonasi kawasan strategis nasional tertentu, dan
                                rencana zonasi kawasan antarwilayah. (5) Rencana
                                zonasi kawasan strategis nasional diintegrasikan
                                ke dalam rencana tata ruang kawasan strategis
                                nasional. (6) Dalam hal perencanaan tata ruang
                                Laut nasional sebagaimana dimaksud pada ayat (1)
                                huruf a sudah ditetapkan, pengintegrasian
                                dilakukan pada saat peninjauan kembali Rencana
                                Tata Ruang Wilayah Nasional. (7) Dalam hal
                                rencana zonasi kawasan strategis nasional
                                sebagaimana dimaksud pada ayat (4) sudah
                                ditetapkan, pengintegrasian dilakukan pada saat
                                peninjauan kembali rencana tata ruang kawasan
                                strategis nasional. (8) Ketentuan lebih lanjut
                                mengenai perencanaan ruang Laut sebagaimana
                                dimaksud pada ayat (1) diatur dalam Peraturan
                                Pemerintah.
