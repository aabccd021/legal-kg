                              text: >-
                                3. Ketentuan Pasal 8 diubah sehingga berbunyi
                                sebagai berikut: Pasal 8 (1) Wewenang Pemerintah
                                Pusat dalam penyelenggaraan penataan ruang
                                meliputi: REPUBLIK INDONESIA -19 - a.
                                pengaturan, pembinaan, dan pengawasan terhadap
                                pelaksanaan penataan ruang wilayah nasional,
                                provinsi, dan kabupaten/kota, serta terhadap
