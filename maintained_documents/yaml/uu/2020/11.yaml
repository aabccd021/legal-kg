                        text: >-
                          4. Ketentuan Pasal 13 diubah sehingga berbunyi sebagai
                          berikut: Pasal 13 (1) Dalam jangka waktu 5 (lima)
                          tahun setelah saat terutangnya pajak atau berakhirnya
                          Masa Pajak, bagian Tahun Pajak, atau Tahun Pajak,
                          Direktur Jenderal Pajak dapat menerbitkan Surat
                          Ketetapan Pajak Kurang Bayar dalam hal-hal sebagai
                          berikut: a. apabila berdasarkan hasil pemeriksaan,
                          pajak yang terutang tidak atau kurang dibayar, b.
                          apabila Surat Pemberitahuan tidak disampaikan dalam
                          jangka waktu sebagaimana dimaksud dalam Pasal 3 ayat
                          (3) dan setelah ditegur secara tertulis tidak
                          disampaikan pada waktunya sebagaimana ditentukan dalam
                          Surat Teguran, Cc. apabila berdasarkan hasil
                          pemeriksaan mengenai Pajak Pertambahan Nilai dan Pajak
                          Penjualan Atas Barang Mewah ternyata tidak seharusnya
                          dikompensasikan selisih lebih pajak atau tidak
                          seharusnya dikenai tarif 0Yo (nol persen), d. apabila
                          kewajiban sebagaimana dimaksud dalam Pasal 28 atau
                          Pasal 29 tidak dipenuhi sehingga tidak dapat diketahui
                          besarnya pajak yang terutang, e. apabila kepada Wajib
                          Pajak diterbitkan Nomor Pokok Wajib Pajak dan/atau
                          dikukuhkan sebagai Pengusaha Kena Pajak secara jabatan
                          sebagaimana dimaksud dalam Pasal 2 ayat (4a): atau
                          REPUBLIK INDONESIA - 656 - f. Pengusaha Kena Pajak
                          tidak melakukan penyerahan Barang Kena Pajak dan/atau
                          Jasa Kena Pajak dan/atau ekspor Barang Kena Pajak
                          dan/atau Jasa Kena Pajak dan telah diberikan
                          pengembalian Pajak Masukan atau telah mengkreditkan
                          Pajak Masukan sebagaimana dimaksud dalam Pasal 9 ayat
                          (6e) Undang- Undang Pajak Pertambahan Nilai 1984 dan
                          perubahannya. (2) Jumlah kekurangan pajak yang
                          terutang dalam Surat Ketetapan Pajak Kurang Bayar
                          sebagaimana dimaksud pada ayat (1) huruf a dan huruf e
                          ditambah dengan sanksi administrasi berupa bunga
                          sebesar tarif bunga per bulan yang ditetapkan oleh
                          Menteri Keuangan dihitung sejak saat terutangnya pajak
                          atau berakhirnya Masa Pajak, bagian Tahun Pajak, atau
                          Tahun Pajak sampai dengan diterbitkannya Surat
                          Ketetapan Pajak Kurang Bayar, dan dikenakan paling
                          lama 24 (dua puluh empat) bulan serta bagian dari
                          bulan dihitung penuh 1 (satu) bulan. (2a) Jumlah
                          kekurangan pajak yang terutang dalam Surat Ketetapan
                          Pajak Kurang Bayar sebagaimana dimaksud pada ayat (1)
                          huruf f ditambah dengan sanksi administrasi berupa
                          bunga sebesar tarif bunga per bulan yang ditetapkan
                          oleh Menteri Keuangan dihitung sejak saat jatuh tempo
                          pembayaran kembali berakhir sampai dengan tanggal
                          diterbitkannya Surat Ketetapan Pajak Kurang Bayar, dan
                          dikenakan paling lama 24 (dua puluh empat) bulan serta
                          bagian dari bulan dihitung penuh 1 (satu) bulan. (2b)
                          Tarif bunga per bulan yang ditetapkan oleh Menteri
                          Keuangan sebagaimana dimaksud pada ayat (2) dan ayat
                          (2a) dihitung berdasarkan suku bunga acuan ditambah
                          154 (lima belas persen) dan dibagi 12 (dua belas) yang
                          berlaku pada tanggal dimulainya penghitungan sanksi.
                          G0 REPUBLIK INDONESIA - 657 - (3) Jumlah pajak dalam
                          Surat Ketetapan Pajak Kurang Bayar sebagaimana
                          dimaksud pada ayat (1) huruf b, huruf c, dan huruf d
                          ditambah dengan sanksi administrasi berupa kenaikan
                          sebesar: a. 50” (lima puluh persen) dari Pajak
                          Penghasilan yang tidak atau kurang dibayar dalam satu
                          Tahun Pajak, b. 10060 (seratus persen) dari Pajak
                          Penghasilan yang tidak atau kurang dipotong, tidak
                          atau kurang dipungut, tidak atau kurang disetor, dan
                          dipotong atau dipungut tetapi tidak atau kurang
                          disetor, atau c. 100760 (seratus persen) dari Pajak
                          Pertambahan Nilai Barang dan Jasa dan Pajak Penjualan
                          Atas Barang Mewah yang tidak atau kurang dibayar. (Ba)
                          Dalam hal terdapat penerapan sanksi administrasi
                          berupa bunga dan kenaikan berdasarkan hasil
                          pemeriksaan Pajak Pertambahan Nilai dan Pajak
                          Penjualan Atas Barang Mewah sebagaimana dimaksud pada
                          ayat (1) huruf a dan huruf c, hanya diterapkan satu
                          jenis sanksi administrasi yang tertinggi nilai besaran
                          sanksinya. (4) Besarnya pajak yang terutang yang
                          diberitahukan oleh Wajib Pajak dalam Surat
                          Pemberitahuan menjadi pasti sesuai dengan ketentuan
                          peraturan perundang-undangan perpajakan apabila dalam
                          jangka waktu 5 (lima) tahun sebagaimana dimaksud pada
                          ayat (1), setelah saat terutangnya pajak atau
                          berakhirnya Masa Pajak, bagian Tahun Pajak, atau Tahun
                          Pajak tidak diterbitkan surat ketetapan pajak, kecuali
                          Wajib Pajak melakukan tindak pidana di bidang
                          perpajakan dalam Masa Pajak, bagian Tahun Pajak, atau
                          Tahun Pajak dimaksud. (5) Dihapus. (6) Tata cara
                          penerbitan Surat Ketetapan Pajak Kurang Bayar
                          sebagaimana dimaksud pada ayat (1) diatur dengan atau
                          berdasarkan Peraturan Menteri Keuangan. REPUBLIK
                          INDONESIA - 658 -
