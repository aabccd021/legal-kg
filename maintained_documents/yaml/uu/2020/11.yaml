              - _type: pasal
                _key: 113
                isi:
                  _type: amendPoints
                  description:
                    _type: referenceText
                    references: []
                    text: >-
                      Beberapa ketentuan dalam Undang-Undang Nomor 6 Tahun 1983
                      tentang Ketentuan Umum dan Tata Cara Perpajakan (Lembaran
                      Negara Republik Indonesia Tahun 1983 Nomor 49, Tambahan
                      Lembaran Negara Republik Indonesia Nomor 3262) sebagaimana
                      telah beberapa kali diubah, terakhir dengan Undang-Undang
                      Nomor 16 Tahun 2009 tentang Penetapan Peraturan Pemerintah
                      Pengganti Undang-Undang Nomor 5 Tahun 2008 tentang
                      Perubahan Keempat atas Undang- Undang Nomor 6 Tahun 1983
                      tentang Ketentuan Umum dan Tata Cara Perpajakan Menjadi
                      Undang-Undang (Lembaran Negara Republik Indonesia Tahun
                      2009 Nomor 62, Tambahan Lembaran Negara Republik Indonesia
                      Nomor 4999) diubah sebagai berikut:
                  isi:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 1
                      _pasalKey: '8'
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Wajib Pajak dengan kemauan sendiri dapat
                                membetulkan Surat Pemberitahuan yang telah
                                disampaikan dengan menyampaikan pernyataan
                                tertulis dengan syarat Direktur Jenderal Pajak
                                belum melakukan tindakan pemeriksaan. (la) Dalam
                                hal pembetulan Surat Pemberitahuan sebagaimana
                                dimaksud pada ayat (1) menyatakan rugi atau
                                lebih bayar, pembetulan Surat Pemberitahuan
                                harus disampaikan paling lama 2 (dua) tahun
                                sebelum daluwarsa penetapan.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal Wajib Pajak membetulkan sendiri Surat
                                Pemberitahuan Tahunan yang mengakibatkan utang
                                pajak menjadi lebih besar, kepadanya dikenai
                                sanksi administrasi berupa bunga sebesar tarif
                                bunga per bulan yang ditetapkan oleh Menteri
                                Keuangan atas jumlah pajak yang kurang dibayar,
                                dihitung sejak saat penyampaian Surat
                                Pemberitahuan berakhir sampai dengan tanggal
                                pembayaran, dan dikenakan paling lama 24 (dua
                                puluh empat) bulan, serta bagian dari bulan
                                dihitung penuh 1 (satu) bulan. (2a) Dalam hal
                                Wajib Pajak membetulkan sendiri Surat
                                Pemberitahuan Masa yang mengakibatkan utang
                                pajak menjadi lebih besar, kepadanya dikenai
                                sanksi administrasi berupa bunga sebesar tarif
                                bunga per bulan yang ditetapkan oleh Menteri
                                Keuangan atas jumlah pajak yang kurang dibayar,
                                dihitung sejak jatuh tempo pembayaran sampai
                                dengan tanggal pembayaran, dan dikenakan paling
                                lama 24 (dua puluh empat) bulan, serta bagian
                                dari bulan dihitung penuh 1 (satu) bulan. (2b)
                                Tarif bunga per bulan yang ditetapkan oleh
                                Menteri Keuangan sebagaimana dimaksud pada ayat
                                (2) dan ayat (2a) dihitung berdasarkan suku
                                bunga acuan ditambah 56 (lima persen) dan dibagi
                                12 (dua belas) yang berlaku pada tanggal
                                dimulainya penghitungan sanksi.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Walaupun telah dilakukan tindakan pemeriksaan
                                  bukti permulaan, Wajib Pajak dengan kemauan
                                  sendiri dapat mengungkapkan dengan pernyataan
                                  tertulis mengenai ketidakbenaran perbuatannya,
                                  yaitu sebagai berikut:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      tidak menyampaikan Surat Pemberitahuan,
                                      atau
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menyampaikan Surat Pemberitahuan yang
                                      isinya tidak benar atau tidak lengkap,
                                      atau melampirkan keterangan yang isinya
                                      tidak benar sebagaimana dimaksud dalam
                                      Pasal 38 atau Pasal 39 ayat (1) huruf c
                                      dan huruf d sepanjang mulainya penyidikan
                                      belum diberitahukan kepada Penuntut Umum
                                      melalui penyidik pejabat Polisi Negara
                                      Republik Indonesia. (3a) Pengungkapan
                                      ketidakbenaran perbuatan sebagaimana
                                      dimaksud pada ayat (3) disertai pelunasan
                                      kekurangan pembayaran jumlah pajak yang
                                      sebenarnya terutang beserta sanksi
                                      administrasi berupa denda sebesar 100»
                                      (seratus persen) dari jumlah pajak yang
                                      kurang dibayar.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Walaupun Direktur Jenderal Pajak telah
                                  melakukan pemeriksaan, dengan syarat Direktur
                                  Jenderal Pajak belum menerbitkan surat
                                  ketetapan pajak, Wajib Pajak dengan kesadaran
                                  sendiri dapat mengungkapkan dalam laporan
                                  tersendiri tentang ketidakbenaran pengisian
                                  Surat Pemberitahuan yang telah disampaikan
                                  sesuai dengan keadaan yang sebenarnya, yang
                                  dapat mengakibatkan:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      pajak-pajak yang masih harus dibayar
                                      menjadi lebih besar atau lebih kecil:
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      rugi berdasarkan ketentuan perpajakan
                                      menjadi lebih kecil atau lebih besar,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      . jumlah harta menjadi lebih besar atau
                                      lebih kecil: atau
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      jumlah modal menjadi lebih besar atau
                                      lebih kecil dan pemeriksaan tetap
                                      dilanjutkan.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Pajak yang kurang dibayar yang timbul sebagai
                                  akibat dari pengungkapan ketidakbenaran
                                  pengisian Surat Pemberitahuan sebagaimana
                                  dimaksud pada ayat (4) harus dilunasi oleh
                                  Wajib Pajak sebelum laporan tersendiri
                                  disampaikan beserta sanksi administrasi berupa
                                  bunga sebesar tarif bunga per bulan yang
                                  ditetapkan oleh Menteri Keuangan dari pajak
                                  yang kurang dibayar, yang dihitung sejak:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      batas waktu penyampaian Surat
                                      Pemberitahuan Tahunan berakhir sampai
                                      dengan tanggal pembayaran, untuk
                                      pengungkapan ketidakbenaran pengisian
                                      Surat Pemberitahuan Tahunan: atau
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      jatuh tempo pembayaran berakhir sampai
                                      dengan tanggal pembayaran, untuk
                                      pengungkapan ketidakbenaran pengisian
                                      Surat Pemberitahuan Masa dan dikenakan
                                      paling lama 24 (dua puluh empat) bulan,
                                      serta bagian dari bulan dihitung penuh 1
                                      (satu) bulan. (Sa) Tarif bunga per bulan
                                      yang ditetapkan oleh Menteri Keuangan
                                      sebagaimana dimaksud pada ayat (5)
                                      dihitung berdasarkan suku bunga acuan
                                      ditambah 1046 (sepuluh persen) dan dibagi
                                      12 (dua belas) yang berlaku pada tanggal
                                      dimulainya penghitungan sanksi.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Wajib Pajak dapat membetulkan Surat
                                Pemberitahuan Tahunan yang telah disampaikan,
                                dalam hal Wajib Pajak menerima surat ketetapan
                                pajak, Surat Keputusan Keberatan, Surat
                                Keputusan Pembetulan, Putusan Banding, atau
                                Putusan Peninjauan Kembali Tahun Pajak
                                sebelumnya atau beberapa Tahun Pajak sebelumnya,
                                yang menyatakan rugi fiskal yang berbeda dengan
                                rugi fiskal yang telah dikompensasikan dalam
                                Surat Pemberitahuan Tahunan yang akan dibetulkan
                                tersebut, dalam jangka waktu 3 (tiga) bulan
                                setelah menerima surat ketetapan pajak, Surat
                                Keputusan Keberatan, Surat Keputusan Pembetulan,
                                Putusan Banding, atau Putusan Peninjauan Kembali
                                dengan syarat Direktur Jenderal Pajak belum
                                melakukan tindakan pemeriksaan.
                      description:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan Pasal 8 diubah sehingga berbunyi sebagai
                          berikut:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 2
                      _pasalKey: '9'
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Menteri Keuangan menentukan tanggal jatuh tempo
                                pembayaran dan penyetoran pajak yang terutang
                                untuk suatu saat atau Masa Pajak bagi masing-
                                masing jenis pajak paling lama 15 (lima belas)
                                hari setelah saat terutangnya pajak atau
                                berakhirnya Masa Pajak.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Kekurangan pembayaran pajak yang terutang
                                berdasarkan Surat Pemberitahuan Tahunan Pajak
                                Penghasilan harus dibayar lunas sebelum Surat
                                Pemberitahuan Pajak Penghasilan disampaikan.
                                (2a) Pembayaran ... (2a) Pembayaran atau
                                penyetoran pajak sebagaimana dimaksud pada ayat
                                (1), yang dilakukan setelah tanggal jatuh tempo
                                pembayaran atau penyetoran pajak, dikenai sanksi
                                administrasi berupa bunga sebesar tarif bunga
                                per bulan yang ditetapkan oleh Menteri Keuangan
                                yang dihitung dari tanggal jatuh tempo
                                pembayaran sampai dengan tanggal pembayaran, dan
                                dikenakan paling lama 24 (dua puluh empat) bulan
                                serta bagian dari bulan dihitung penuh 1 (satu)
                                bulan. (2b) Atas pembayaran atau penyetoran
                                pajak sebagaimana dimaksud pada ayat (2) yang
                                dilakukan setelah tanggal jatuh tempo
