                        text: >-
                          11. Di antara Pasal 27A dan Pasal 28 disisipkan 1
                          (satu) pasal, yakni Pasal 27B sehingga berbunyi
                          sebagai berikut: Pasal 27B (1) Wajib Pajak diberikan
                          imbalan bunga dalam hal pengajuan keberatan,
                          permohonan banding, atau permohonan peninjauan kembali
                          yang dikabulkan sebagian atau seluruhnya sehingga
                          menyebabkan kelebihan pembayaran pajak. (2) Imbalan
                          bunga sebagaimana dimaksud pada ayat (1) diberikan
                          terhadap kelebihan pembayaran pajak paling banyak
                          sebesar jumlah lebih bayar yang disetujui Wajib Pajak
                          dalam pembahasan akhir hasil pemeriksaan atas Surat
                          Pemberitahuan yang menyatakan lebih bayar yang telah
                          diterbitkan: a. Surat Ketetapan Pajak Kurang Bayar, b.
                          Surat Ketetapan Pajak Kurang Bayar Tambahan, c. Surat
                          Ketetapan Pajak Lebih Bayar, atau d. Surat Ketetapan
                          Pajak Nihil. (3) Wajib Pajak diberi imbalan bunga
                          dalam hal permohonan pembetulan, permohonan
                          pengurangan atau pembatalan surat ketetapan pajak,
                          atau permohonan pengurangan atau pembatalan Surat
                          Tagihan Pajak yang dikabulkan sebagian atau seluruhnya
                          sehingga menyebabkan kelebihan pembayaran pajak. (4)
                          Imbalan bunga sebagaimana dimaksud pada ayat (1) dan
                          ayat (3) diberikan: a. berdasarkan tarif bunga per
                          bulan yang ditetapkan oleh Menteri Keuangan
                          berdasarkan suku bunga acuan dibagi 12 (dua belas),
                          dan b. diberikan paling lama 24 (dua puluh empat)
                          bulan, serta bagian dari bulan dihitung penuh 1 (satu)
                          bulan. (5) Tarif bunga per bulan sebagaimana dimaksud
                          pada ayat (4) yang digunakan sebagai dasar
                          penghitungan imbalan bunga adalah tarif bunga per
                          bulan yang berlaku pada tanggal dimulainya
                          penghitungan imbalan bunga. (6) Imbalan bunga
                          sebagaimana dimaksud pada ayat (1) dihitung sejak
                          tanggal penerbitan Surat Ketetapan Pajak Kurang Bayar,
                          Surat Ketetapan Pajak Kurang Bayar Tambahan, Surat
                          Ketetapan Pajak Lebih Bayar, atau Surat Ketetapan
                          Pajak Nihil sampai dengan tanggal diterbitkannya Surat
                          Keputusan Keberatan, Putusan Banding, atau Putusan
                          Peninjauan Kembali. (7) Imbalan bunga sebagaimana
                          dimaksud pada ayat (3) dihitung: a. sejak tanggal
                          pembayaran Surat Ketetapan Pajak Kurang Bayar atau
                          Surat Ketetapan Pajak Kurang Bayar Tambahan sampai
                          dengan tanggal diterbitkannya Surat Keputusan
                          Pembetulan, surat keputusan pengurangan, atau
                          pembatalan surat ketetapan pajak, b. sejak tanggal
                          penerbitan Surat Ketetapan Pajak Lebih Bayar atau
                          Surat Ketetapan Pajak Nihil sampai dengan tanggal
                          diterbitkannya Surat Keputusan Pembetulan, surat
                          keputusan pengurangan, atau pembatalan surat ketetapan
                          pajak, atau c. sejak tanggal pembayaran Surat Tagihan
                          Pajak sampai dengan tanggal diterbitkannya Surat
                          Keputusan Pembetulan, surat keputusan pengurangan,
                          atau pembatalan Surat Tagihan Pajak. (8) Ketentuan
                          lebih lanjut mengenai tata cara pemberian imbalan
                          bunga diatur dengan atau berdasarkan Peraturan Menteri
                          Keuangan.
