                            Beberapa ketentuan dalam Undang-Undang Nomor 32
                            Tahun 2014 tentang Kelautan (Lembaran Negara
                            Republik Indonesia Tahun 2014 Nomor 294, Tambahan
                            Lembaran Negara Republik Indonesia Nomor 5603)
                            diubah sebagai berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: referenceText
                              references:
                                - start: 13
                                  end: 20
