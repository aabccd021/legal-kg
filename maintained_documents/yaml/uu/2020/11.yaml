                        text: >-
                          4. Ketentuan Pasal 42 diubah sehingga berbunyi sebagai
                          berikut: Pasal 42 (1) Setiap pemberi kerja yang
                          mempekerjakan tenaga kerja asing wajib memiliki
                          rencana penggunaan tenaga kerja asing yang disahkan
                          oleh Pemerintah Pusat. (2) Pemberi kerja orang
                          perseorangan dilarang mempekerjakan tenaga kerja
                          asing. REPUBLIK INDONESIA - 536 - (3) Ketentuan
                          sebagaimana dimaksud pada ayat (1) tidak berlaku bagi:
                          a direksi atau komisaris dengan kepemilikan saham
                          tertentu atau pemegang saham sesuai dengan ketentuan
                          peraturan perundang- undangan, b. pegawai diplomatik
                          dan konsuler pada kantor perwakilan negara asing, atau
                          C. tenaga kerja asing yang dibutuhkan oleh pemberi
                          kerja pada jenis kegiatan produksi yang terhenti
                          karena keadaan darurat, vokasi, perusahaan rintisan
                          (start-up) berbasis teknologi, kunjungan bisnis, dan
                          penelitian untuk jangka waktu tertentu. (4) Tenaga
                          kerja asing dapat dipekerjakan di Indonesia hanya
                          dalam hubungan kerja untuk jabatan tertentu dan waktu
                          tertentu serta memiliki kompetensi sesuai dengan
                          jabatan yang akan diduduki. (5) Tenaga kerja asing
                          dilarang menduduki jabatan yang mengurusi personalia.
                          (6) Ketentuan mengenai jabatan tertentu dan waktu
                          tertentu sebagaimana dimaksud pada ayat (4) diatur
                          dalam Peraturan Pemerintah.
