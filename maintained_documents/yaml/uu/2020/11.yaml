                                sanksi administratif yang ditetapkan Pejabat
                                Imigrasi terhadap Orang Asing di luar proses
                                peradilan. SK No 052098 A
                          - _type: numPoint
                            _key: '32'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penyelundupan Manusia adalah perbuatan yang
                                bertujuan mencari keuntungan, baik secara
                                langsung maupun tidak langsung, untuk diri
                                sendiri atau untuk orang lain yang membawa
                                seseorang atau kelompok orang, baik secara
                                terorganisasi maupun tidak terorganisasi, atau
                                memerintahkan orang lain untuk membawa seseorang
                                atau kelompok orang, baik secara terorganisasi
                                maupun tidak terorganisasi, yang tidak memiliki
                                hak secara sah untuk memasuki Wilayah Indonesia
                                atau keluar Wilayah Indonesia dan/atau masuk
                                wilayah negara lain yang orang tersebut tidak
                                memiliki hak untuk memasuki wilayah tersebut
                                secara sah, baik dengan menggunakan dokumen sah
                                maupun dokumen palsu, atau tanpa menggunakan
                                Dokumen Perjalanan, baik melalui pemeriksaan
                                imigrasi maupun tidak.
                          - _type: numPoint
                            _key: '33'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Rumah Detensi Imigrasi adalah unit pelaksana
