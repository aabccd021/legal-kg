                                INDONESIA -29 - (9) Dalam hal rencana tata ruang
                                wilayah provinsi sebagaimana dimaksud pada ayat
                                (8) belum ditetapkan oleh Gubernur, rencana tata
                                ruang wilayah provinsi ditetapkan oleh
