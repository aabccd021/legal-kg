                              _structureType: pasal
                          - start: 118
                            end: 125
                            node:
                              _key: 1
                              parentDocument: *ref_0
                              _structureType: pasal
                        text: >-
                          1. Di antara Pasal 1 angka 19 dan Pasal 1 angka 20
                          disisipkan 1 (satu) angka baru, yakni angka 19a
                          sehingga berbunyi: Pasal 1 Dalam Undang-Undang ini
                          yang dimaksud dengan: 1. Administrasi Pemerintahan
                          adalah tata laksana dalam pengambilan keputusan
                          dan/atau tindakan oleh badan dan/atau pejabat
                          pemerintahan. 2. Fungsi Pemerintahan adalah fungsi
                          dalam melaksanakan Administrasi Pemerintahan yang
                          meliputi fungsi pengaturan, pelayanan, pembangunan,
                          pemberdayaan, dan pelindungan. 3. Badan dan/atau
                          Pejabat Pemerintahan adalah unsur yang melaksanakan
                          Fungsi Pemerintahan, baik di lingkungan pemerintah
                          maupun penyelenggara negara lainnya. 4. Atasan Pejabat
                          adalah atasan pejabat langsung yang mempunyai
                          kedudukan dalam organisasi atau strata pemerintahan
                          yang lebih tinggi. 5. Wewenang adalah hak yang
                          dimiliki oleh Badan dan/atau Pejabat Pemerintahan atau
                          penyelenggara negara lainnya untuk mengambil keputusan
                          dan/atau tindakan dalam penyelenggaraan pemerintahan.
                          6. Kewenangan Pemerintahan yang selanjutnya disebut
                          Kewenangan adalah kekuasaan Badan dan/atau Pejabat
                          Pemerintahan atau penyelenggara negara lainnya untuk
                          bertindak dalam ranah hukum publik. 7. Keputusan
                          Administrasi Pemerintahan yang juga disebut Keputusan
                          Tata Usaha Negara atau Keputusan Administrasi Negara
                          yang selanjutnya disebut Keputusan adalah ketetapan
                          tertulis yang dikeluarkan oleh Badan dan/atau Pejabat
                          Pemerintahan dalam penyelenggaraan pemerintahan. |
                          REPUBLIK INDONESIA -751 - 8. Tindakan Administrasi
                          Pemerintahan yang selanjutnya disebut Tindakan adalah
                          perbuatan Pejabat Pemerintahan atau penyelenggara
                          negara lannya untuk melakukan dan/atau tidak melakukan
                          perbuatan konkret dalam rangka penyelenggaraan
                          pemerintahan. 9. Diskresi adalah Keputusan dan/atau
                          Tindakan yang ditetapkan dan/atau dilakukan oleh
                          Pejabat Pemerintahan untuk mengatasi persoalan konkret
                          yang dihadapi dalam penyelenggaraan pemerintahan dalam
                          hal peraturan perundang-undangan yang memberikan
                          pilihan, tidak mengatur, tidak lengkap atau tidak
                          jelas, dan/atau adanya stagnasi pemerintahan. 10.
                          Bantuan Kedinasan adalah kerja sama antara Badan
                          dan/atau Pejabat Pemerintahan guna kelancaran
                          pelayanan Administrasi Pemerintahan di suatu instansi
                          pemerintahan yang membutuhkan. 11. Keputusan Berbentuk
                          Elektronis adalah Keputusan yang dibuat atau
                          disampaikan dengan menggunakan atau memanfaatkan media
                          elektronik. 12. Legalisasi adalah pernyataan Badan
                          dan/atau Pejabat Pemerintahan mengenai keabsahan suatu
                          Salinan surat atau dokumen Administrasi Pemerintahan
                          yang dinyatakan sesuai dengan aslinya. 13. Sengketa
                          Kewenangan adalah klaim penggunaan Wewenang yang
                          dilakukan oleh 2 (dua) Pejabat Pemerintahan atau lebih
                          yang disebabkan oleh tumpang tindih atau tidak
                          jelasnya Pejabat Pemerintahan yang berwenang menangani
                          suatu urusan pemerintahan. 14. Konflik Kepentingan
                          adalah kondisi Pejabat Pemerintahan yang memiliki
                          kepentingan pribadi untuk menguntungkan diri sendiri
                          dan/atau orang lain dalam penggunaan Wewenang sehingga
                          dapat mempengaruhi netralitas dan kualitas Keputusan
                          dan/atau Tindakan yang dibuat dan/atau dilakukannya.
                          REPUBLIK INDONESIA - 752 - 15. Warga Masyarakat adalah
                          seseorang atau badan hukum perdata yang terkait dengan
                          Keputusan dan/atau Tindakan. 16. Upaya Administratif
                          adalah penyelesaian sengketa yang dilakukan dalam
                          lingkungan Administrasi Pemerintahan sebagai akibat
                          dikeluarkannya Keputusan dan/atau Tindakan yang
                          merugikan. 17. Asas-asas Umum Pemerintahan yang Baik
                          yang selanjutnya disingkat AUPB adalah prinsip yang
                          digunakan sebagai acuan penggunaan Wewenang bagi
                          Pejabat Pemerintahan dalam mengeluarkan Keputusan
                          dan/atau Tindakan dalam penyelenggaraan pemerintahan.
                          18. Pengadilan adalah Pengadilan Tata Usaha Negara.
                          19. Izin adalah Keputusan Pejabat Pemerintahan yang
                          berwenang sebagai wujud persetujuan atas permohonan
                          Warga Masyarakat sesuai dengan ketentuan peraturan
                          perundang-undangan. 19a. Standar adalah Keputusan
                          Pejabat Pemerintahan yang berwenang atau Lembaga yang
                          diakui oleh Pemerintah Pusat sebagai wujud persetujuan
                          atas pernyataan untuk pemenuhan seluruh persyaratan
                          yang ditetapkan sesuai dengan ketentuan peraturan
                          perundang-undangan. 20. Konsesi adalah Keputusan
                          Pejabat Pemerintahan yang berwenang sebagai wujud
                          persetujuan dari kesepakatan Badan dan/atau Pejabat
                          Pemerintahan dengan selain Badan dan/atau Pejabat
                          Pemerintahan dalam pengelolaan fasilitas umum dan/atau
                          sumber daya alam dan pengelolaan lainnya sesuai dengan
                          ketentuan peraturan perundang-undangan. 21. Dispensasi
                          adalah Keputusan Pejabat Pemerintahan yang berwenang
                          sebagai wujud persetujuan atas permohonan Warga
                          Masyarakat yang merupakan pengecualian terhadap suatu
                          larangan atau perintah sesuai dengan ketentuan
                          peraturan perundang- undangan. REPUBLIK INDONESIA -
                          153 - 22. Atribusi adalah pemberian Kewenangan kepada
                          Badan dan/atau Pejabat Pemerintahan oleh Undang-Undang
                          Dasar Negara Republik Indonesia Tahun 1945 atau
                          Undang-Undang. 23. Delegasi adalah pelimpahan
                          Kewenangan dari Badan dan/atau Pejabat Pemerintahan
                          yang lebih tinggi kepada Badan dan/atau Pejabat
                          Pemerintahan yang lebih rendah dengan tanggung jawab
                          dan tanggung gugat beralih sepenuhnya kepada penerima
                          delegasi. 24. Mandat adalah pelimpahan Kewenangan dari
                          Badan dan/atau Pejabat Pemerintahan yang lebih tinggi
                          kepada Badan dan/atau Pejabat Pemerintahan yang lebih
                          rendah dengan tanggung jawab dan tanggung gugat tetap
                          berada pada pemberi mandat. 25. Menteri adalah menteri
                          yang menyelenggarakan urusan pemerintahan di bidang
                          pendayagunaan aparatur negara.
