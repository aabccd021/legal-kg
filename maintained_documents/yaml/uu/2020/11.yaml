                                usaha ketenagalistrikan wajib memenuhi ketentuan
                                keselamatan ketenagalistrikan. (2) Ketentuan
                                keselamatan ketenagalistrikan sebagaimana
                                dimaksud pada ayat (1) bertujuan untuk
                                mewujudkan kondisi: a. andal dan aman bagi
                                instalasi, b. aman dari bahaya bagi manusia dan
                                makhluk hidup lainnya dari bahaya, dan Cc. ramah
                                lingkungan. (3) Ketentuan keselamatan
                                ketenagalistrikan sebagaimana dimaksud pada ayat
                                (1) meliputi: a. pemenuhan standardisasi
                                peralatan dan pemanfaat tenaga listrik, b.
                                pengamanan instalasi tenaga listrik, dan
                                REPUBLIK INDONESIA -261 - Cc. pengamanan
                                pemanfaat tenaga listrik. (4) Setiap instalasi
                                tenaga listrik yang beroperasi wajib memiliki
                                sertifikat laik operasi. (S) Setiap peralatan
                                dan pemanfaat tenaga listrik wajib memenuhi
                                ketentuan standar nasional Indonesia. (6) Setiap
                                tenaga teknik dalam usaha ketenagalistrikan
                                wajib memiliki sertifikat kompetensi. (7)
                                Ketentuan mengenai keselamatan
                                ketenagalistrikan, sertifikat laik operasi,
                                standar nasional Indonesia, dan sertifikat
                                kompetensi sebagaimana dimaksud pada ayat (1)
                                sampai dengan ayat (6) diatur dalam Peraturan
                                Pemerintah.
