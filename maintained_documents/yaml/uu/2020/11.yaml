                                    _structureType: pasal
                                - start: 112
                                  end: 119
                                  node:
                                    _key: 1
                                    parentDocument: *ref_0
                                    _structureType: pasal
                              text: >-
                                1. Ketentuan Pasal 1 angka 3, angka 5, angka 23,
                                dan angka 24 diubah sehingga Pasal 1 berbunyi
                                sebagai berikut: Pasal 1 Dalam Undang-Undang ini
                                yang dimaksud dengan: 1. Hutan adalah suatu
                                kesatuan ekosistem berupa hamparan lahan berisi
                                sumber daya alam hayati yang didominasi
                                pepohonan dalam komunitas alam lingkungannya
                                yang tidak dapat dipisahkan antara yang satu dan
                                yang lainnya. 2. Kawasan hutan adalah wilayah
                                tertentu yang ditetapkan oleh Pemerintah untuk
                                dipertahankan keberadaannya sebagai hutan tetap.
                                3. Perusakan hutan adalah proses, cara, atau
                                perbuatan merusak hutan melalui kegiatan
                                pembalakan liar, penggunaan kawasan hutan tanpa
                                Perizinan Berusaha atau penggunaan Perizinan
                                Berusaha yang bertentangan dengan maksud dan
                                tujuan pemberian Perizinan Berusaha di dalam
                                kawasan hutan yang telah ditetapkan, yang telah
                                ditunjuk, ataupun yang sedang diproses
                                penetapannya oleh Pemerintah Pusat. 4.
                                Pembalakan liar adalah semua kegiatan
                                pemanfaatan hasil hutan kayu secara tidak sah
                                yang terorganisasi. REPUBLIK INDONESIA - 200 -
                                5. Penggunaan kawasan hutan secara tidak sah
                                adalah kegiatan terorganisasi yang dilakukan di
                                dalam kawasan hutan untuk perkebunan dan/atau
                                pertambangan tanpa Perizinan Berusaha dari
                                Pemerintah Pusat. 6. Terorganisasi adalah
                                kegiatan yang dilakukan oleh suatu kelompok yang
                                terstruktur, yang terdiri atas 2 (dua) orang
                                atau lebih, dan yang bertindak secara
                                bersama-sama pada waktu tertentu dengan tujuan
                                melakukan perusakan hutan, tidak termasuk
                                kelompok masyarakat yang tinggal di dalam atau
                                di sekitar kawasan hutan yang melakukan
                                perladangan tradisional dan/atau melakukan
                                penebangan kayu untuk keperluan sendiri dan
                                tidak untuk tujuan komersial. 7. Pencegahan
                                perusakan hutan adalah segala upaya yang
                                dilakukan untuk menghilangkan kesempatan
                                terjadinya perusakan hutan. 8. Pemberantasan
                                perusakan hutan adalah segala upaya yang
                                dilakukan untuk menindak secara hukum terhadap
                                pelaku perusakan hutan baik langsung, tidak
                                langsung, maupun yang terkait lainnya. 9.
                                Pemanfaatan hutan adalah kegiatan untuk
                                memanfaatkan kawasan hutan, jasa lingkungan,
                                hasil hutan kayu dan bukan kayu, serta memungut
                                hasil hutan kayu dan bukan kayu secara optimal
                                dan adil untuk kesejahteraan masyarakat dengan
                                tetap menjaga kelestariannya. 10. Pemanfaatan
                                hasil hutan kayu adalah kegiatan untuk
                                memanfaatkan dan mengusahakan hasil hutan berupa
                                kayu melalui kegiatan penebangan, permudaan,
                                pengangkutan, pengolahan dan pemasaran dengan
                                tidak merusak lingkungan dan tidak mengurangi
                                fungsi pokoknya. 11. Perizinan Berusaha terkait
                                pemanfaatan hasil hutan adalah Perizinan
                                Berusaha dari Pemerintah untuk memanfaatkan
                                hasil hutan berupa kayu pada hutan produksi
                                melalui kegiatan pemanenan atau penebangan,
                                pengayaan, pemeliharaan, dan pemasaran. REPUBLIK
                                INDONESIA -201 - 12. Surat keterangan sahnya
                                hasil hutan adalah dokumen-dokumen yang
                                merupakan bukti legalitas hasil hutan pada
                                setiap segmen kegiatan dalam penatausahaan hasil
                                hutan. 13. Hasil hutan kayu adalah hasil hutan
                                berupa kayu bulat, kayu bulat kecil, kayu
                                olahan, atau kayu pacakan yang berasal dari
                                kawasan hutan. 14. Pohon adalah tumbuhan yang
                                batangnya berkayu dan dapat mencapai ukuran
                                diameter 10 (sepuluh) sentimeter atau lebih yang
                                diukur pada ketinggian 1,50 (satu koma lima
                                puluh) meter di atas permukaan tanah. 15. Polisi
                                Kehutanan adalah pejabat tertentu dalam lingkup
                                instansi kehutanan pusat dan/atau daerah yang
                                sesuai dengan sifat pekerjaannya
                                menyelenggarakan dan/atau melaksanakan usaha
                                pelindungan hutan yang oleh kuasa Undang-Undang
                                diberikan wewenang kepolisian khusus di bidang
                                kehutanan dan konservasi sumber daya alam hayati
                                dan ekosistemnya yang berada dalam satu kesatuan
                                komando. 16. Pejabat adalah orang yang
                                diperintahkan atau orang yang karena jabatannya
                                memiliki kewenangan dengan suatu tugas dan
                                tanggung jawab tertentu. 17. Pejabat Penyidik
                                Pegawai Negeri Sipil yang selanjutnya disingkat
                                PPNS adalah pejabat pegawai negeri sipil
                                tertentu dalam lingkup instansi kehutanan pusat
                                dan daerah yang oleh Undang- Undang diberi
                                wewenang khusus dalam penyidikan di bidang
                                kehutanan dan konservasi sumber daya alam hayati
                                dan ekosistemnya. 18. Saksi adalah orang yang
                                dapat memberikan keterangan guna kepentingan
                                penyelidikan, penyidikan, penuntutan, dan
                                peradilan tentang suatu perkara pidana yang
                                didengar, dilihat, dan dialami sendiri. 19.
                                Pelapor adalah orang yang memberitahukan adanya
                                dugaan, sedang, atau telah terjadinya perusakan
                                hutan kepada pejabat yang berwenang. REPUBLIK
                                INDONESIA - 202 - 20. Informan adalah orang yang
                                menginformasikan secara rahasia adanya dugaan,
                                sedang, atau telah terjadinya perusakan hutan
                                kepada pejabat yang berwenang. 21. Setiap orang
                                adalah orang perseorangan dan/atau korporasi
                                yang melakukan perbuatan perusakan hutan secara
                                terorganisasi di wilayah hukum Indonesia
                                dan/atau berakibat hukum di wilayah hukum
                                Indonesia. 22. Korporasi adalah kumpulan orang
                                dan/atau kekayaan yang teroganisasi, baik berupa
                                badan hukum maupun bukan badan hukum. 23.
                                Pemerintah Pusat adalah Presiden Republik
                                Indonesia yang memegang kekuasaan pemerintahan
                                negara Republik Indonesia yang dibantu oleh
                                wakil Presiden dan menteri sebagaimana dimaksud
                                dalam Undang- Undang Dasar Negara Republik
                                Indonesia Tahun 1945. 24. Pemerintah Daerah
                                adalah kepala daerah sebagai unsur penyelenggara
                                Pemerintahan Daerah yang memimpin pelaksanaan
                                urusan pemerintahan yang menjadi kewenangan
                                daerah otonom. 25. Menteri adalah menteri yang
                                menyelenggarakan urusan pemerintahan di bidang
                                kehutanan.
