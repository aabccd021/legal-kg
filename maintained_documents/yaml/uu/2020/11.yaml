                                memotret seseorang, i. mencari keterangan dan
                                barang bukti, J. menyelenggarakan Pusat
                                Informasi Kriminal Nasional: k. mengeluarkan
                                surat izin dan/atau surat keterangan yang
                                diperlukan dalam rangka pelayanan masyarakat, l.
                                memberikan bantuan pengamanan dalam sidang dan
                                pelaksanaan putusan pengadilan, kegiatan
                                instansi lain, serta kegiatan masyarakat, dan m.
                                menerima dan menyimpan barang temuan untuk
