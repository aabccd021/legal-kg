                              _type: referenceText
                              references: []
                              text: >-
                                Penumpang adalah setiap orang yang berada di
                                atas alat angkut, kecuali awak alat angkut.
                          - _type: numPoint
                            _key: '39'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Perwakilan Republik Indonesia adalah Kedutaan
                                Besar Republik Indonesia, Konsulat Jenderal
                                Republik Indonesia, dan Konsulat Republik
                                Indonesia.
