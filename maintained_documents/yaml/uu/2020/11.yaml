                                - _type: numPoint
                                  _key: '25'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Menteri adalah menteri yang bidang tugas
                                      dan tanggung jawabnya meliputi kegiatan
                                      usaha Minyak dan Gas Bumi.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
