                        text: >-
                          3. Ketentuan Pasal 82 diubah sehingga berbunyi sebagai
                          berikut: Pasal 82 (1) Lisensi-wajib merupakan Lisensi
                          untuk melaksanakan Paten yang diberikan berdasarkan
                          Keputusan Menteri atas dasar permohonan dengan alasan:
                          a. Paten tidak dilaksanakan di Indonesia sebagaimana
                          dimaksud dalam Pasal 20 dalam jangka waktu 36 (tiga
                          puluh enam) bulan setelah diberikan paten, b. Paten
                          telah dilaksanakan oleh Pemegang Paten atau penerima
                          Lisensi dalam bentuk dan dengan cara yang merugikan
                          kepentingan masyarakat, atau c. Paten hasil
                          pengembangan dari Paten yang telah diberikan
                          sebelumnya tidak bisa dilaksanakan tanpa menggunakan
                          Paten pihak lain yang masih dalam pelindungan. (2)
                          Permohonan Lisensi-wajib sebagaimana dimaksud pada
                          ayat (1) dikenai biaya.
