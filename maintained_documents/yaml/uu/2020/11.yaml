                        text: >-
                          20. Ketentuan Pasal 66 diubah sehingga berbunyi
                          sebagai berikut: Pasal 66 (1) Hubungan kerja antara
                          perusahaan alih daya dengan pekerja/buruh yang
                          dipekerjakannya didasarkan pada perjanjian kerja yang
                          dibuat secara tertulis, baik perjanjian kerja waktu
                          tertentu maupun perjanjian kerja waktu tidak tertentu.
                          (2) Pelindungan pekerja/buruh, upah dan kesejahteraan,
                          syarat-syarat kerja, serta perselisihan yang timbul
                          dilaksanakan sekurang-kurangnya sesuai dengan
                          ketentuan peraturan perundang-undangan dan menjadi
                          tanggung jawab perusahaan alih daya. (3 Dalam hal
                          perusahaan alih daya mempekerjakan pekerja/buruh
                          berdasarkan perjanjian kerja waktu tertentu
                          sebagaimana dimaksud pada ayat (1), perjanjian kerja
                          tersebut harus mensyaratkan pengalihan pelindungan
                          hak-hak bagi pekerja/buruh apabila terjadi pergantian
                          perusahaan alih daya dan sepanjang objek pekerjaannya
                          tetap ada. REPUBLIK INDONESIA -.542 - (4) Perusahaan
                          alih daya sebagaimana dimaksud pada ayat (l) berbentuk
                          badan hukum dan wajib memenuhi Perizinan Berusaha yang
                          diterbitkan oleh Pemerintah Pusat. (5) Perizinan
                          Berusaha sebagaimana dimaksud pada ayat (4) harus
                          memenuhi norma, standar, prosedur, dan kriteria yang
                          ditetapkan oleh Pemerintah Pusat. (6) Ketentuan lebih
                          lanjut mengenai pelindungan pekerja/buruh sebagaimana
                          dimaksud pada ayat (2) dan Perizinan Berusaha
                          sebagaimana dimaksud pada ayat (4) diatur dalam
                          Peraturan Pemerintah.
