                                    parentDocument: *ref_0
                                    _structureType: pasal
                              text: >-
                                1. Ketentuan Pasal 1 angka 21 dan angka 22
                                diubah, dan angka 23 dihapus sehingga Pasal 1
                                berbunyi sebagai berikut: Pasal 1 Dalam
                                Undang-Undang ini yang dimaksud dengan: 1.
                                Minyak Bumi adalah hasil proses alami berupa
                                hidrokarbon yang dalam kondisi tekanan dan
                                temperatur atmosfer berupa fasa cair atau padat,
                                termasuk aspal, lilin mineral atau ozokerit, dan
                                bitumen yang diperoleh dari proses penambangan,
                                tetapi tidak termasuk batubara atau endapan
                                hidrokarbon lain yang berbentuk padat yang
                                diperoleh dari kegiatan yang tidak berkaitan
                                dengan kegiatan usaha Minyak dan Gas Bumi.
                                REPUBLIK INDONESIA - 223 - 2. Gas Bumi adalah
                                hasil proses alami berupa hidrokarbon yang dalam
                                kondisi tekanan dan temperatur atmosfer berupa
                                fasa gas yang diperoleh dari proses penambangan
                                Minyak dan Gas Bumi. 3. Minyak dan Gas Bumi
                                adalah Minyak Bumi dan Gas Bumi. 4. Bahan Bakar
                                Minyak adalah bahan bakar yang berasal dan/atau
                                diolah dari Minyak Bumi. 5. Kuasa Pertambangan
                                adalah wewenang yang diberikan Negara kepada
                                Pemerintah untuk menyelenggarakan kegiatan
                                Eksplorasi dan Eksploitasi. 6. Survei Umum
                                adalah kegiatan lapangan yang meliputi
                                pengumpulan, analisis, dan penyajian data yang
                                berhubungan dengan informasi kondisi geologi
                                untuk memperkirakan letak dan potensi sumber
                                daya Minyak dan Gas Bumi di luar Wilayah Kerja.
                                7. Kegiatan Usaha Hulu adalah kegiatan usaha
                                yang berintikan atau bertumpu pada kegiatan
                                usaha Eksplorasi dan Eksploitasi. 8. Eksplorasi
                                adalah kegiatan yang bertujuan memperoleh
                                informasi mengenai kondisi geologi untuk
                                menemukan dan memperoleh perkiraan cadangan
                                Minyak dan Gas Bumi di Wilayah Kerja yang
                                ditentukan. 9. Eksploitasi adalah rangkaian
                                kegiatan yang bertujuan untuk menghasilkan
                                Minyak dan Gas Bumi dari Wilayah Kerja yang
                                ditentukan, yang terdiri atas pengeboran dan
                                penyelesaian sumur, pembangunan sarana
                                pengangkutan, penyimpanan, dan pengolahan untuk
                                pemisahan dan pemurnian Minyak dan Gas Bumi di
                                lapangan serta kegiatan lain yang mendukungnya.
                                10. Kegiatan Usaha Hilir adalah kegiatan usaha
                                yang berintikan atau bertumpu pada kegiatan
                                usaha Pengolahan, Pengangkutan, Penyimpanan,
                                dan/atau Niaga. REPUBLIK INDONESIA -224 - 11.
                                Pengolahan adalah kegiatan memurnikan,
                                memperoleh bagian-bagian, mempertinggi mutu, dan
                                mempertinggi nilai tambah Minyak Bumi dan/atau
                                Gas Bumi, tetapi tidak termasuk pengolahan
                                lapangan. 12. Pengangkutan adalah kegiatan
                                pemindahan Minyak Bumi, Gas Bumi, dan/atau hasil
                                olahannya dari Wilayah Kerja atau dari tempat
                                penampungan dan Pengolahan, termasuk
                                pengangkutan Gas Bumi melalui pipa transmisi dan
                                distribusi. 13. Penyimpanan adalah kegiatan
                                penerimaan, pengumpulan, penampungan, dan
                                pengeluaran Minyak Bumi dan/atau Gas Bumi. 14.
                                Niaga adalah kegiatan pembelian, penjualan,
                                ekspor, impor Minyak Bumi dan/atau hasil
                                olahannya, termasuk Niaga Gas Bumi melalui pipa.
                                15. Wilayah Hukum Pertambangan Indonesia adalah
                                seluruh wilayah daratan, perairan, dan landas
                                kontinen Indonesia. 16. Wilayah Kerja adalah
                                daerah tertentu di dalam Wilayah Hukum
                                Pertambangan Indonesia untuk pelaksanaan
                                Eksplorasi dan Eksploitasi. 17. Badan Usaha
                                adalah perusahaan berbentuk badan hukum yang
                                menjalankan jenis usaha bersifat tetap,
                                terus-menerus dan didirikan sesuai dengan
                                peraturan perundang-undangan yang berlaku serta
                                bekerja dan berkedudukan dalam wilayah Negara
                                Kesatuan Republik Indonesia. 18. Bentuk Usaha
                                Tetap adalah badan usaha yang didirikan dan
                                berbadan hukum di luar wilayah Negara Kesatuan
                                Republik Indonesia yang melakukan kegiatan di
                                wilayah Negara Kesatuan Republik Indonesia dan
                                wajib mematuhi peraturan perundang- undangan
                                yang berlaku di Republik Indonesia. 19. Kontrak
                                Kerja Sama adalah Kontrak Bagi Hasil atau bentuk
                                kontrak kerja sama lain dalam kegiatan
                                Eksplorasi dan Eksploitasi yang lebih
                                menguntungkan Negara dan hasilnya dipergunakan
                                untuk sebesar-besar kemakmuran rakyat. REPUBLIK
                                INDONESIA - 225 - 20. Izin Usaha adalah izin
                                yang diberikan kepada Badan Usaha untuk
                                melaksanakan Pengolahan, Pengangkutan,
                                Penyimpanan, dan/atau Niaga dengan tujuan
                                memperoleh keuntungan dan/atau laba. 21.
                                Pemerintah Pusat adalah Presiden Republik
                                Indonesia yang memegang kekuasaan pemerintahan
                                negara Republik Indonesia yang dibantu oleh
                                Wakil Presiden dan menteri sebagaimana dimaksud
                                dalam Undang- Undang Dasar Negara Republik
                                Indonesia Tahun 1945. 22. Pemerintah Daerah
                                adalah kepala daerah sebagai unsur penyelenggara
                                Pemerintahan Daerah yang memimpin pelaksanaan
                                urusan pemerintahan yang menjadi kewenangan
                                daerah otonom. 23. Dihapus. 24. Badan Pengatur
                                adalah suatu badan yang dibentuk untuk melakukan
                                pengaturan dan pengawasan terhadap penyediaan
                                dan pendistribusian Bahan Bakar Minyak dan Gas
                                Bumi pada Kegiatan Usaha Hilir. 25. Menteri
                                adalah menteri yang bidang tugas dan tanggung
                                jawabnya meliputi kegiatan usaha Minyak dan Gas
                                Bumi.
