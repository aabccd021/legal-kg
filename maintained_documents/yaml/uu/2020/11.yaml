                                      Kepulauan adalah suatu gugusan pulau,
                                      termasuk bagian pulau dan perairan di
                                      antara pulau-pulau tersebut, dan lain-lain
                                      wujud alamiah yang hubungannya satu sama
                                      lain demikian erat sehingga pulau-pulau,
                                      perairan, dan wujud alamiah lainnya itu
                                      merupakan satu kesatuan geografi, ekonomi,
                                      pertahanan, dan keamanan serta politik
                                      yang hakiki atau yang secara historis
                                      dianggap sebagai demikian.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Negara Kepulauan adalah negara yang
                                      seluruhnya terdiri atas satu atau lebih
                                      kepulauan dan dapat mencakup pulau-pulau
                                      lain.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembangunan Kelautan adalah pembangunan
                                      yang memberi arahan dalam pendayagunaan
                                      sumber daya Kelautan untuk mewujudkan
                                      pertumbuhan ekonomi, pemerataan
                                      kesejahteraan, dan keterpeliharaan daya
                                      dukung ekosistem pesisir dan Laut.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Sumber Daya Kelautan adalah sumber daya
                                      Laut, baik yang dapat diperbaharui maupun
                                      yang tidak dapat diperbaharui yang
                                      memiliki keunggulan komparatif dan
                                      kompetitif serta dapat dipertahankan dalam
                                      jangka panjang.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengelolaan Kelautan adalah
                                      penyelenggaraan kegiatan, penyediaan,
                                      pengusahaan, dan pemanfaatan Sumber Daya
                                      Kelautan serta konservasi Laut.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengelolaan Ruang Laut adalah perencanaan,
                                      pemanfaatan, pengawasan, dan pengendalian
                                      ruang Laut yang merupakan bagian integral
                                      dari pengelolaan tata ruang.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pelindungan Lingkungan Laut adalah upaya
                                      sistematis dan terpadu yang dilakukan
                                      untuk melestarikan Sumber Daya Kelautan
                                      dan mencegah terjadinya pencemaran
                                      dan/atau kerusakan lingkungan di Laut yang
                                      meliputi konservasi Laut, pengendalian
                                      pencemaran Laut, penanggulangan bencana
                                      Kelautan, pencegahan dan penanggulangan
                                      pencemaran, serta kerusakan dan bencana.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pencemaran Laut adalah masuk atau
                                      dimasukkannya makhluk hidup, zat, energi,
                                      dan/atau komponen lain ke dalam lingkungan
                                      Laut oleh kegiatan manusia sehingga
                                      melampaui baku mutu lingkungan Laut yang
                                      telah ditetapkan.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Pusat adalah Presiden Republik
                                      Indonesia yang memegang kekuasaan
                                      pemerintahan negara Republik Indonesia
                                      yang dibantu oleh Wakil Presiden dan
                                      menteri sebagaimana dimaksud dalam Undang-
                                      Undang Dasar Negara Republik Indonesia
                                      Tahun 1945.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Daerah adalah kepala daerah
                                      sebagai unsur penyelenggara Pemerintahan
                                      Daerah yang memimpin pelaksanaan urusan
                                      pemerintahan yang menjadi kewenangan
                                      daerah otonom.
                                - _type: numPoint
                                  _key: '14'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Menteri adalah menteri yang
                                      menyelenggarakan urusan pemerintahan di
                                      bidang Kelautan.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
