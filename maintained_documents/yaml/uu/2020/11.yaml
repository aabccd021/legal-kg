                  text: >-
                    Hak, izin, atau konsesi atas tanah dan/atau kawasan yang
                    dengan sengaja tidak diusahakan atau ditelantarkan dalam
                    jangka waktu paling lama 2 (dua) tahun sejak diberikan
                    dicabut dan dikembalikan kepada negara.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 71
                      end: 79
                      node:
                        _key: 1
                        parentPasal:
                          _key: 180
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Dalam pelaksanaan pengembalian kepada negara sebagaimana
                    dimaksud pada ayat (1), Pemerintah Pusat dapat menetapkan
                    hak, izin, atau konsesi tersebut sebagai aset Bank Tanah.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan lebih lanjut pencabutan hak, izin, atau konsesi
                    dan penetapannya sebagai aset Bank Tanah diatur dalam
                    Peraturan Pemerintah. REPUBLIK INDONESIA - 167 -
        - _type: pasal
          _key: 181
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pada saat berlakunya Undang-Undang ini, setiap peraturan
                    perundang-undangan di bawah Undang- Undang yang berlaku dan
                    bertentangan dengan ketentuan Undang-Undang ini atau
                    bertentangan dengan peraturan perundang-undangan yang lebih
                    tinggi, atau bertentangan dengan putusan pengadilan harus
                    dilakukan harmonisasi dan sinkronisasi yang dikoordinasikan
                    oleh kementerian atau lembaga yang menyelenggarakan urusan
                    pemerintahan di bidang pembentukan peraturan
                    perundang-undangan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Harmonisasi dan sinkronisasi yang berkaitan dengan peraturan
                    daerah dan/atau peraturan kepala daerah, dilaksanakan oleh
                    kementerian atau lembaga yang menyelenggarakan urusan
                    pemerintahan di bidang pembentukan peraturan
                    perundang-undangan bersama dengan kementerian yang
                    menyelenggarakan urusan pemerintahan dalam negeri.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 100
                      end: 108
                      node:
                        _key: 2
                        parentPasal: &ref_111
                          _key: 181
