                          pembiayaan yang dialokasikan kepada Usaha Mikro dan
                          Kecil dalam bentuk pemberian pinjaman, penjaminan,
                          hibah, dan pembiayaan lainnya. (4) Pemerintah Pusat,
                          Pemerintah Daerah, dan Dunia Usaha memberikan hibah,
                          mengusahakan bantuan luar negeri, dan mengusahakan
                          sumber pembiayaan lain yang sah serta tidak mengikat
                          untuk Usaha Mikro dan Kecil. REPUBLIK INDONESIA -578 -
