        - _type: bagian
          _key: 4
          _judul: >-
            Bagian Keempat Penyederhanaan Perizinan Berusaha Sektor serta
            Kemudahan dan Persyaratan Investasi
          isi:
            _type: paragrafs
            paragrafs:
              - _type: paragraf
                _key: 1
                _judul: Paragraf 1 Umum
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 26
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: 'Perizinan Berusaha terdiri atas sektor:'
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: kelautan dan perikanan,
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: pertanian,
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: 'kehutanan:'
                          - _type: alphaPoint
                            _key: d
                            isi:
                              _type: referenceText
                              references: []
                              text: energi dan sumber daya mineral,
                          - _type: alphaPoint
                            _key: e
                            isi:
                              _type: referenceText
                              references: []
                              text: ketenaganukliran,
                          - _type: alphaPoint
                            _key: f
                            isi:
                              _type: referenceText
                              references: []
                              text: ''' perindustrian,'
                          - _type: alphaPoint
                            _key: g
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                perdagangan, metrologi legal, jaminan produk
                                halal, dan standardisasi penilaian kesesuaian,
                          - _type: alphaPoint
                            _key: h
                            isi:
                              _type: referenceText
                              references: []
                              text: pekerjaan umum dan perumahan rakyat,
                          - _type: alphaPoint
                            _key: i
                            isi:
                              _type: referenceText
                              references: []
                              text: 'transportasi:'
                          - _type: alphaPoint
                            _key: j
                            isi:
                              _type: referenceText
                              references: []
                              text: '. kesehatan, obat dan makanan:'
                          - _type: alphaPoint
                            _key: k
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                pendidikan dan kebudayaan: l pariwisata, m.
                                keagamaan: n. pos, telekomunikasi, dan
                                penyiaran: dan O. pertahanan dan keamanan.
              - _type: paragraf
                _key: 2
                _judul: Paragraf 2 Kelautan dan Perikanan
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 27
                      isi:
                        _type: amendPoints
                        description:
                          _type: referenceText
                          references: []
                          text: >-
                            Untuk memberikan kemudahan bagi masyarakat terutama
                            Pelaku Usaha dalam mendapatkan Perizinan Berusaha
                            dan kemudahan persyaratan investasi dari sektor
                            kelautan dan perikanan, beberapa ketentuan dalam
                            Undang-Undang Nomor 31 Tahun 2004 tentang Perikanan
                            (Lembaran Negara Republik Indonesia Tahun 2004 Nomor
                            118, Tambahan Lembaran Negara Republik Indonesia
                            Nomor 4433) sebagaimana telah diubah dengan
                            Undang-Undang Nomor 45 Tahun 2009 tentang Perubahan
                            Atas Undang-Undang Nomor 31 Tahun 2004 tentang
                            Perikanan (Lembaran Negara Republik Indonesia Tahun
                            2009 Nomor 154, Tambahan Lembaran Negara Republik
                            Indonesia Nomor 5073) diubah sebagai berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perikanan adalah semua kegiatan yang
                                      berhubungan dengan pengelolaan dan
                                      pemanfaatan sumber daya ikan dan
                                      lingkungannya mulai dari praproduksi,
                                      produksi, pengolahan sampai dengan
                                      pemasaran, yang dilaksanakan dalam suatu
                                      sistem bisnis perikanan.
                                - _type: numPoint
                                  _key: '2'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Sumber daya ikan adalah potensi semua
                                      jenis ikan.
                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Lingkungan sumber daya ikan adalah
                                      perairan tempat kehidupan sumber daya
                                      ikan, termasuk biota dan faktor alamiah
                                      sekitarnya.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ikan adalah segala jenis organisme yang
                                      seluruh atau sebagian dari siklus hidupnya
                                      berada di dalam lingkungan perairan.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penangkapan ikan adalah kegiatan untuk
                                      memperoleh ikan di perairan yang tidak
                                      dalam keadaan dibudidayakan dengan alat
                                      atau cara apapun, termasuk kegiatan yang
                                      menggunakan kapal untuk memuat,
                                      mengangkut, menyimpan, mendinginkan,
                                      menangani, mengolah, dan/atau
                                      mengawetkannya.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembudidayaan ikan adalah kegiatan untuk
                                      memelihara, membesarkan, dan/atau
                                      membiakkan ikan serta memanen hasilnya
                                      dalam lingkungan yang terkontrol, termasuk
                                      kegiatan yang menggunakan kapal untuk
                                      memuat, mengangkut, menyimpan,
                                      mendinginkan, menangani, mengolah,
                                      dan/atau mengawetkannya.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengelolaan perikanan adalah semua upaya,
                                      termasuk proses yang terintegrasi dalam
                                      pengumpulan informasi, analisis,
                                      perencanaan, konsultasi, pembuatan
                                      keputusan, alokasi sumber daya ikan, dan
                                      implementasi serta penegakan hukum dari
                                      peraturan perundang-undangan di bidang
                                      perikanan, yang dilakukan oleh pemerintah
                                      atau otoritas lain yang diarahkan untuk
                                      mencapai kelangsungan produktivitas sumber
                                      daya hayati perairan dan tujuan yang telah
                                      disepakati.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Konservasi Sumber Daya Ikan adalah upaya
                                      pelindungan, pelestarian, dan pemanfaatan
                                      sumber daya ikan, termasuk ekosistem,
                                      jenis, dan genetik untuk menjamin
                                      keberadaan, ketersediaan, dan
                                      kesinambungannya dengan tetap memelihara
                                      dan meningkatkan kualitas nilai dan
                                      keanekaragaman sumber daya ikan.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kapal Perikanan adalah kapal, perahu, atau
                                      alat apung lain yang digunakan untuk
                                      melakukan penangkapan ikan, mendukung
                                      operasi penangkapan ikan, pembudidayaan
                                      ikan, pengangkutan ikan, pengolahan ikan,
                                      pelatihan perikanan, dan
                                      penelitian/eksplorasi perikanan.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Nelayan adalah orang yang mata
                                      pencahariannya melakukan penangkapan ikan.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Nelayan Kecil adalah orang yang mata
                                      pencahariannya melakukan penangkapan ikan
                                      untuk memenuhi kebutuhan hidup
                                      sehari-hari, baik yang menggunakan kapal
                                      penangkap Ikan maupun yang tidak
                                      menggunakan kapal penangkap Ikan.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembudi Daya Ikan adalah orang yang mata
                                      pencahariannya melakukan pembudidayaan
                                      ikan.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembudi Daya-Ikan Kecil adalah orang yang
                                      mata pencahariannya melakukan
                                      pembudidayaan ikan untuk memenuhi
                                      kebutuhan hidup sehari-hari.
                                - _type: numPoint
                                  _key: '14'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Setiap Orang adalah orang perseorangan
                                      atau korporasi.
                                - _type: numPoint
                                  _key: '15'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Korporasi adalah kumpulan orang dan/atau
                                      kekayaan yang terorganisasi, baik
                                      merupakan badan hukum maupun bukan badan
                                      hukum.
                                - _type: numPoint
                                  _key: '16'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: Dihapus.
                                - _type: numPoint
                                  _key: '17'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: Dihapus.
                                - _type: numPoint
                                  _key: '18'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: Dihapus.
                                - _type: numPoint
                                  _key: '19'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Laut Teritorial Indonesia adalah jalur
                                      laut selebar 12 (dua belas) mil laut yang
                                      diukur dari garis pangkal kepulauan
                                      Indonesia.
                                - _type: numPoint
                                  _key: '20'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perairan Indonesia adalah laut teritorial
                                      Indonesia beserta perairan kepulauan dan
                                      perairan pedalamannya.
                                - _type: numPoint
                                  _key: '21'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Zona Ekonomi Eksklusif Indonesia yang
                                      selanjutnya disingkat ZEEI adalah jalur di
                                      luar dan berbatasan dengan laut teritorial
                                      Indonesia sebagaimana ditetapkan
                                      berdasarkan undang-undang yang berlaku
                                      tentang perairan Indonesia yang meliputi
                                      dasar laut, tanah di bawahnya, dan air di
                                      atasnya dengan batas terluar 200 (dua
                                      ratus) mil laut yang diukur dari garis
                                      pangkal laut teritorial Indonesia.
                                - _type: numPoint
                                  _key: '22'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Laut Lepas adalah bagian dari laut yang
                                      tidak termasuk dalam ZEEI, laut teritorial
                                      Indonesia, perairan kepulauan Indonesia,
                                      dan perairan pedalaman Indonesia.
                                - _type: numPoint
                                  _key: '23'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pelabuhan Perikanan adalah tempat yang
                                      terdiri atas daratan dan perairan di
                                      sekitarnya dengan batas- batas tertentu
                                      sebagai tempat kegiatan pemerintahan dan
                                      kegiatan sistem bisnis perikanan yang
                                      digunakan sebagai tempat kapal perikanan
                                      bersandar, berlabuh, dan/atau bongkar muat
                                      ikan yang dilengkapi dengan fasilitas
                                      keselamatan pelayaran dan kegiatan
                                      penunjang perikanan.
                                - _type: numPoint
                                  _key: '24'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Menteri adalah menteri yang
                                      menyelenggarakan urusan pemerintahan di
                                      bidang perikanan.
                                - _type: numPoint
                                  _key: '25'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Pusat adalah Presiden Republik
                                      Indonesia yang memegang kekuasaan
                                      pemerintahan Negara Republik Indonesia
                                      yang dibantu oleh Wakil Presiden dan
                                      menteri sebagaimana dimaksud dalam Undang-
                                      Undang Dasar Negara Republik Indonesia
                                      Tahun 1945.
                                - _type: numPoint
                                  _key: '26'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Daerah adalah kepala daerah
                                      sebagai unsur penyelenggara pemerintahan
                                      daerah yang memimpin pelaksanaan urusan
                                      pemerintahan yang menjadi kewenangan
                                      daerah otonom.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 1 angka 11, angka 24, angka 25,
                                dan angka 26 diubah serta angka 16, angka 17,
                                dan angka 18 dihapus sehingga Pasal 1 berbunyi
                                sebagai berikut:
