                                dimaksud pada ayat (1) wajib memenuhi ketentuan
                                yang diatur dalam Undang-Undang Informasi dan
                                Transaksi Elektronik. (4) Data dan/atau
                                informasi sebagaimana dimaksud pada ayat (1)
                                paling sedikit memuat: a. identitas dan
                                legalitas Pelaku Usaha sebagai produsen atau
                                Pelaku Usaha Distribusi: b. persyaratan teknis
                                Barang yang ditawarkan, C. persyaratan teknis
                                atau kualifikasi Jasa yang ditawarkan: d. harga
                                dan cara pembayaran Barang dan/atau Jasa: dan e.
                                cara penyerahan Barang. REPUBLIK INDONESIA -293
                                - (5) Dalam hal terjadi sengketa terkait dengan
                                transaksi dagang melalui sistem elektronik,
                                orang atau badan usaha yang sedang bersengketa
                                dapat menyelesaikan sengketa tersebut melalui
                                pengadilan atau melalui mekanisme penyelesaian
                                sengketa lainnya. (6) Setiap Pelaku Usaha yang
                                memperdagangkan Barang dan/atau Jasa dengan
                                menggunakan sistem elektronik yang tidak
                                menyediakan data dan/atau informasi secara
                                lengkap dan benar sebagaimana dimaksud pada ayat
                                (1) dikenai sanksi administratif.
