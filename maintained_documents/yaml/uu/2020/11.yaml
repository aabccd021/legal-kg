                                Bagi... (Ba) Bagi Wajib Pajak usaha kecil dan
                                Wajib Pajak di daerah tertentu, jangka waktu
                                pelunasan sebagaimana dimaksud pada ayat (3)
                                dapat diperpanjang paling lama menjadi 2 (dua)
                                bulan yang ketentuannya diatur dengan atau
