                                sebagaimana dimaksud dalam Pasal 16 ayat (1)
                                diberikan oleh Pemerintah Pusat berdasarkan
                                rencana tata ruang wilayah nasional dan/atau
                                rencana tata ruang laut. (3) Dalam hal terdapat
                                perubahan ketentuan peraturan
                                perundangan-undangan yang menjadi acuan dalam
                                penetapan lokasi untuk kebijakan nasional yang
                                bersifat strategis sebagaimana dimaksud pada
                                ayat (1) dan ayat (2), lokasi untuk kebijakan
                                nasional yang bersifat strategis tersebut dalam
                                rencana tata ruang laut dan/atau rencana zonasi
