                          prosedur, dan kriteria sebagaimana dimaksud pada ayat
                          (1) huruf a mengacu atau mengadopsi praktik yang baik
                          (good practices). (3) Norma, standar, prosedur, dan
                          kriteria sebagaimana dimaksud pada ayat (1) huruf a
                          berbentuk ketentuan peraturan perundang-undangan yang
                          ditetapkan oleh Pemerintah Pusat sebagai aturan
                          pelaksanaan dalam penyelenggaraan urusan pemerintahan
                          konkuren yang menjadi kewenangan Pemerintah Pusat dan
                          yang menjadi kewenangan Pemerintah Daerah. (4)
                          Pemerintah Pusat dapat mendelegasikan peraturan
                          pelaksanaan norma, standar, prosedur, dan kriteria
                          sebagaimana dimaksud pada ayat (3) kepada kepala
                          daerah yang ditetapkan dengan Peraturan Kepala Daerah.
