                        text: >-
                          2. Ketentuan Pasal 4A diubah sehingga berbunyi sebagai
                          berikut: REPUBLIK INDONESIA - 635 - Pasal 4A (1)
                          Dihapus. (2) Jenis barang yang tidak dikenai Pajak
                          Pertambahan Nilai adalah barang tertentu dalam
                          kelompok barang sebagai berikut: a. barang hasil
                          pertambangan atau hasil pengeboran yang diambil
                          langsung dari sumbernya, tidak termasuk hasil
                          pertambangan batu bara, b. barang kebutuhan pokok yang
                          sangat dibutuhkan oleh rakyat banyak, c. makanan dan
                          minuman yang disajikan di hotel, restoran, rumah
                          makan, warung, dan sejenisnya, meliputi makanan dan
                          minuman baik yang dikonsumsi di tempat maupun tidak,
                          termasuk makanan dan minuman yang diserahkan oleh
                          usaha jasa boga atau katering, dan d. uang, emas
                          batangan, dan surat berharga. (3) Jenis jasa yang
                          tidak dikenai Pajak Pertambahan Nilai adalah jasa
                          tertentu dalam kelompok jasa sebagai berikut: a. jasa
                          pelayanan kesehatan medis, b. jasa pelayanan sosial,
                          C. jasa pengiriman surat dengan perangko, d. jasa
                          keuangan, e. jasa asuransi, f. jasa keagamaan, g. jasa
                          pendidikan, h. jasa kesenian dan hiburan, i. jasa
                          penyiaran yang tidak bersifat iklan, j. jasa angkutan
                          umum di darat dan di air serta jasa angkutan udara
                          dalam negeri yang menjadi bagian yang tidak
                          terpisahkan dari jasa angkutan udara luar negeri,
                          REPUBLIK INDONESIA - 636 - k. jasa tenaga kerja, Il.
                          jasa perhotelan, m. jasa yang disediakan oleh
                          pemerintah dalam rangka menjalankan pemerintahan
                          secara umum, n. jasa penyediaan tempat parkir, Oo.
                          jasa telepon umum dengan menggunakan uang logam, p.
                          jasa pengiriman uang dengan wesel pos, dan g. jasa
                          boga atau katering.
