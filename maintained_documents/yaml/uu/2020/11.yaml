                                21. Ketentuan Pasal 30 diubah sehingga berbunyi
                                sebagai berikut: Pasal 30 (1) Penggunaan tanah
                                oleh pemegang Perizinan Berusaha untuk kegiatan
                                penyediaan tenaga listrik untuk melaksanakan
                                haknya sebagaimana dimaksud dalam Pasal 27
                                dilakukan dengan memberikan ganti rugi hak atas
                                tanah atau kompensasi kepada pemegang hak atas
                                tanah, bangunan, dan tanaman sesuai dengan
                                ketentuan peraturan perundang-undangan. REPUBLIK
                                INDONESIA - 258 - (2) Ganti rugi hak atas tanah
                                sebagaimana dimaksud pada ayat (1) diberikan
                                untuk tanah yang dipergunakan secara langsung
                                oleh pemegang Perizinan Berusaha untuk kegiatan
                                penyediaan tenaga listrik dan bangunan serta
                                tanaman di atas tanah. (3) Kompensasi
                                sebagaimana dimaksud pada ayat (1) diberikan
                                untuk penggunaan tanah secara tidak langsung
                                oleh pemegang Perizinan Berusaha untuk kegiatan
                                penyediaan tenaga listrik yang mengakibatkan
                                berkurangnya nilai ekonomis atas tanah,
                                bangunan, dan tanaman yang dilintasi transmisi
                                tenaga listrik. (4) Ketentuan lebih lanjut
                                mengenai perhitungan kompensasi sebagaimana
                                dimaksud pada ayat (3) diatur dalam Peraturan
                                Pemerintah. (S5) Dalam hal tanah yang digunakan
                                pelaku usaha untuk kegiatan penyediaan tenaga
                                listrik terdapat bagian tanah yang dikuasai oleh
                                pemegang hak atas tanah atau pemakai tanah
                                negara, sebelum memulai kegiatan, pemegang
                                Perizinan Berusaha untuk kegiatan penyediaan
                                tenaga listrik wajib menyelesaikan masalah tanah
                                tersebut sesuai dengan ketentuan peraturan
                                perundang-undangan di bidang pertanahan. (6)
                                Dalam hal tanah yang digunakan pemegang
                                Perizinan Berusaha untuk kegiatan penyediaan
                                tenaga listrik terdapat tanah ulayat,
                                penyelesaiannya dilakukan berdasarkan ketentuan
                                peraturan perundang- undangan di bidang
                                pertanahan dengan memperhatikan ketentuan hukum
                                adat setempat.
