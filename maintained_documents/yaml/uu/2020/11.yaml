                    text: >-
                      Beberapa ketentuan dalam Undang-Undang Nomor 7 Tahun 2016
                      tentang Perlindungan dan Pemberdayaan Nelayan, Pembudi
                      Daya Ikan, dan Petambak Garam (Lembaran Negara Republik
                      Indonesia Tahun 2016 Nomor 68, Tambahan Lembaran Negara
                      Republik Indonesia Nomor 5870) diubah sebagai berikut:
                  isi:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 1
                      _pasalKey: '1'
                      isi:
                        _type: referenceText
                        references:
                          - start: 13
                            end: 20
