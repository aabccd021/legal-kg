                                - (2) Pengawasan dan pengendalian sebagaimana
                                dimaksud pada ayat (1) dilakukan untuk
                                mengetahui pemenuhan dan kepatuhan terhadap
                                peraturan di bidang Perindustrian yang
                                dilaksanakan oleh Perusahaan Industri dan
                                Perusahaan Kawasan Industri. (3) Pemenuhan dan
                                kepatuhan terhadap peraturan di bidang
                                Perindustrian yang dilaksanakan oleh Perusahaan
                                Industri dan Perusahaan Kawasan Industri
                                sebagaimana dimaksud pada ayat (2) paling
                                sedikit meliputi: a. sumber daya manusia
                                Industri: b. pemanfaatan sumber daya alam, C.
                                manajemen energi, d. manajemen air, e. SNI,
                                spesifikasi teknis, dan/atau pedoman tata cara,
                                f. Data Industri dan Data Kawasan Industri: g.
                                standar Industri Hijau, h. standar Kawasan
                                Industri: i. Perizinan Berusaha untuk kegiatan
                                usaha Industri dan Perizinan Berusaha untuk
                                kegiatan usaha Kawasan Industri: dan Jj-
                                keamanan dan keselamatan alat, proses, hasil
                                produksi, penyimpanan, dan pengangkutan. (4)
                                Dalam pelaksanaan pengawasan dan pengendalian
                                sebagaimana dimaksud pada ayat (1), Pemerintah
                                Pusat dapat menunjuk lembaga terakreditasi. (5)
                                Ketentuan lebih lanjut mengenai tata cara
                                pengawasan dan pengendalian usaha Industri dan
                                usaha Kawasan Industri diatur dalam Peraturan
                                Pemerintah. REPUBLIK INDONESIA - 280 -
              - _type: paragraf
                _key: 8
                _judul: >-
                  Paragraf 8 Perdagangan, Metrologi Legal, Jaminan Produk Halal,
                  dan Standardisasi dan Penilaian Kesesuaian
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 45
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Untuk memberikan kemudahan bagi masyarakat terutama
                          Pelaku Usaha dalam mendapatkan Perizinan Berusaha dari
                          sektor perdagangan, metrologi legal, jaminan produk
                          halal, dan standardisasi dan penilaian kesesuaian,
                          Undang-Undang ini mengubah, menghapus, atau menetapkan
                          pengaturan baru beberapa ketentuan yang diatur dalam:
                          a. Undang-Undang Nomor 7 Tahun 2014 tentang
                          Perdagangan (Lembaran Negara Republik Indonesia Tahun
                          2014 Nomor 45, Tambahan Lembaran Negara Republik
                          Indonesia Nomor 5512), b. Undang-Undang Nomor 2 Tahun
                          1981 tentang Metrologi Legal (Lembaran Negara Republik
                          Indonesia Tahun 1981 Nomor 11, Tambahan Lembaran
                          Negara Republik Indonesia Nomor 3193), dan c.
                          Undang-Undang Nomor 33 Tahun 2014 tentang Jaminan
                          Produk Halal (Lembaran Negara Republik Indonesia Tahun
                          2014 Nomor 295, Tambahan Lembaran Negara Republik
                          Indonesia Nomor 5604).
