                              text: >-
                                37. Ketentuan Pasal 39 diubah sehingga berbunyi
                                sebagai berikut: Pasal 39 (1) Bangunan gedung
                                dapat dibongkar apabila: a. tidak laik fungsi
                                dan tidak dapat diperbaiki: b. berpotensi
                                menimbulkan bahaya dalam pemanfaatan bangunan
                                gedung dan/atau lingkungannya: c. tidak memiliki
                                Persetujuan Bangunan Gedung: atau REPUBLIK
                                INDONESIA - 109 - d. ditemukan ketidaksesuaian
                                antara pelaksanaan dan rencana teknis bangunan
                                gedung yang tercantum dalam persetujuan saat
                                dilakukan inspeksi bangunan gedung. (2) Bangunan
                                gedung yang dapat dibongkar sebagaimana dimaksud
                                pada ayat (1) huruf a dan huruf b ditetapkan
                                oleh Pemerintah Pusat atau Pemerintah Daerah
                                sesuai dengan kewenangannya berdasarkan hasil
                                pengkajian teknis dan berdasarkan norma,
                                standar, prosedur, dan kriteria yang ditetapkan
                                oleh Pemerintah Pusat. (3) Pengkajian teknis
                                bangunan gedung sebagaimana dimaksud pada ayat
                                (2), kecuali untuk rumah tinggal, dilakukan oleh
                                pengkaji teknis. 4) Pembongkaran bangunan gedung
                                yang mempunyai dampak luas terhadap keselamatan
                                umum dan lingkungan harus dilaksanakan
                                berdasarkan rencana teknis pembongkaran yang
                                telah disetujui oleh Pemerintah Pusat dan
                                Pemerintah Daerah sesuai dengan kewenangannya
                                berdasarkan norma, standar, prosedur, dan
                                kriteria yang ditetapkan oleh Pemerintah Pusat.
                                (S5) Ketentuan lebih lanjut mengenai tata cara
                                pembongkaran bangunan gedung sebagaimana
                                dimaksud pada ayat (1), ayat (2), ayat (3), dan
                                ayat (4) diatur dalam Peraturan Pemerintah.
