                        text: >-
                          3. Ketentuan Pasal 11 diubah sehingga berbunyi sebagai
                          berikut: Pasal 11 (1) Atas permohonan Wajib Pajak,
                          kelebihan pembayaran pajak sebagaimana dimaksud dalam
                          Pasal 17, Pasal 17B, Pasal 17C, atau Pasal 17D
                          dikembalikan dengan ketentuan bahwa apabila ternyata
                          Wajib Pajak mempunyai utang pajak, langsung
                          diperhitungkan untuk melunasi terlebih dahulu utang
                          pajak tersebut. (la) Kelebihan pembayaran pajak
                          sebagai akibat adanya Surat Keputusan Keberatan, Surat
                          Keputusan Pembetulan, Surat Keputusan Pengurangan
                          Sanksi Administrasi, Surat Keputusan Penghapusan
                          Sanksi Administrasi, Surat Keputusan Pengurangan
                          Ketetapan Pajak, Surat Keputusan Pembatalan Ketetapan
                          Pajak, dan Putusan Banding atau Putusan Peninjauan
                          Kembali, serta Surat Keputusan Pemberian Imbalan Bunga
                          dikembalikan kepada Wajib Pajak dengan ketentuan jika
                          ternyata Wajib Pajak mempunyai utang pajak langsung
                          diperhitungkan untuk melunasi terlebih dahulu utang
                          pajak tersebut. REPUBLIK INDONESIA - 654 - (2)
                          Pengembalian kelebihan pembayaran pajak sebagaimana
                          dimaksud pada ayat (1) dan ayat (la) dilakukan paling
                          lama 1 (satu) bulan sejak permohonan pengembalian
                          kelebihan pembayaran pajak diterima sehubungan dengan
                          diterbitkannya Surat Ketetapan Pajak Lebih Bayar
                          sebagaimana dimaksud dalam Pasal 17 ayat (1), atau
                          sejak diterbitkannya Surat Ketetapan Pajak Lebih Bayar
                          sebagaimana dimaksud dalam Pasal 17 ayat (2) dan Pasal
                          17B, atau sejak diterbitkannya Surat Keputusan
                          Pengembalian Pendahuluan Kelebihan Pajak sebagaimana
                          dimaksud dalam Pasal 17C atau Pasal 17D, atau sejak
                          diterbitkannya Surat Keputusan Keberatan, Surat
                          Keputusan Pembetulan, Surat Keputusan Pengurangan
                          Sanksi Administrasi, Surat Keputusan Penghapusan
                          Sanksi Administrasi, Surat Keputusan Pengurangan
                          Ketetapan Pajak, Surat Keputusan Pembatalan Ketetapan
                          Pajak atau Surat Keputusan Pemberian Imbalan Bunga,
                          atau sejak diterimanya Putusan Banding atau Putusan
                          Peninjauan Kembali yang menyebabkan kelebihan
                          pembayaran pajak. (3) Apabila pengembalian kelebihan
                          pembayaran pajak dilakukan setelah jangka waktu 1
                          (satu) bulan, Pemerintah memberikan imbalan bunga
                          sebesar tarif bunga per bulan yang ditetapkan oleh
                          Menteri Keuangan atas keterlambatan pengembalian
                          kelebihan pembayaran pajak dihitung sejak batas waktu
                          penerbitan Surat Keputusan Pengembalian Kelebihan
                          Pembayaran Pajak berakhir sampai dengan saat dilakukan
                          pengembalian kelebihan dan diberikan paling lama 24
                          (dua puluh empat) bulan, serta bagian dari bulan
                          dihitung penuh 1 (satu) bulan. (Ba) Tarif bunga per
                          bulan yang ditetapkan oleh Menteri Keuangan
                          sebagaimana dimaksud pada ayat (3) dihitung
                          berdasarkan suku bunga acuan dibagi 12 (dua belas)
                          yang berlaku pada tanggal dimulainya penghitungan
                          imbalan bunga. REPUBLIK INDONESIA - 655 - (4) Tata
                          cara penghitungan dan pengembalian kelebihan
                          pembayaran pajak diatur dengan atau berdasarkan
                          Peraturan Menteri Keuangan.
