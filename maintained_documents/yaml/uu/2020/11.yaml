                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Bagi barang yang membahayakan kesehatan,
                                keselamatan, keamanan, dan/atau lingkungan dapat
                                dikenai pembatasan apabila barang dimaksud bukan
                                merupakan bahan baku bagi kegiatan usaha dan
                                institusi teknis terkait secara khusus
                                memberlakukan ketentuan pembatasan di KEK.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pelaksanaan ketentuan mengenai impor dan ekspor
                                dilakukan melalui sistem elektronik yang
                                terintegrasi secara nasional.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemerintah Pusat mengembangkan sistem elektronik
                                yang terintegrasi secara nasional sebagaimana
                                dimaksud pada ayat (4).
                      description:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan Pasal 27 diubah sehingga berbunyi sebagai
                          berikut:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 22
                      _pasalKey: '30'
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Wajib pajak yang melakukan kegiatan usaha di KEK
                                diberi fasilitas Pajak Penghasilan.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Selain fasilitas Pajak Penghasilan sebagaimana
                                dimaksud pada ayat (1), dapat diberikan tambahan
                                fasilitas Pajak Penghasilan sesuai dengan jenis
                                kegiatan usaha di KEK.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan lebih lanjut mengenai pemberian
                                fasilitas Pajak Penghasilan sebagaimana dimaksud
                                pada ayat (1) dan ayat (2) diatur dalam atau
                                berdasarkan Peraturan Pemerintah.
                      description:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan Pasal 30 diubah sehingga berbunyi sebagai
                          berikut:
                    - _type: amendPoint
                      _nomorKey: 23
                      _operation: delete
                      _pasalKey: '31'
                      isi:
                        _type: referenceText
                        references: []
                        text: 23. Pasal 31 dihapus.
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 24
                      _pasalKey: '32'
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Impor barang ke KEK diberi fasilitas berupa:'
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: pembebasan atau penangguhan bea masuk,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      pembebasan cukai sepanjang barang tersebut
                                      merupakan bahan baku atau bahan penolong
                                      produksi,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      tidak dipungut Pajak Pertambahan Nilai
                                      atau Pajak Pertambahan Nilai dan Pajak
                                      Penjualan atas Barang Mewah untuk barang
                                      kena pajak, dan
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: tidak dipungut Pajak Penghasilan impor.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penyerahan Barang Kena Pajak berwujud dari
                                Tempat Lain dalam Daerah Pabean, Kawasan
                                Perdagangan Bebas dan Pelabuhan Bebas, dan
                                Tempat Penimbunan Berikat ke KEK diberikan
                                fasilitas tidak dipungut Pajak Pertambahan Nilai
                                atau Pajak Pertambahan Nilai dan Pajak Penjualan
                                atas Barang Mewah.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemanfaatan Barang Kena Pajak tidak berwujud
                                serta Jasa Kena Pajak di KEK diberi fasilitas
                                tidak dipungut Pajak Pertambahan Nilai atau
                                Pajak Pertambahan Nilai dan Pajak Penjualan atas
                                Barang Mewah.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penyerahan Barang Kena Pajak berwujud, Barang
                                Kena Pajak tidak berwujud, dan Jasa Kena Pajak
                                dari KEK ke Tempat Lain dalam Daerah Pabean
                                dikenai Pajak Pertambahan Nilai atau Pajak
                                Pertambahan Nilai dan Pajak Penjualan atas
                                Barang Mewah kecuali ditujukan ke kawasan atau
                                pihak yang mendapatkan fasilitas Pajak
                                Pertambahan Nilai atau Pajak Pertambahan Nilai
                                dan Pajak Penjualan atas Barang Mewah.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan mengenai kriteria dan perincian Barang
                                Kena Pajak berwujud, Barang Kena Pajak tidak
                                berwujud, dan/atau Jasa Kena Pajak sebagaimana
                                dimaksud pada ayat (1), ayat (2), dan ayat (3)
                                diatur dalam atau berdasarkan Peraturan
                                Pemerintah.
                      description:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan Pasal 32 diubah sehingga berbunyi sebagai
                          berikut:
                    - _type: amendPoint
                      _operation: insert
                      _nomorKey: 25
                      _pasalKeys:
                        - 32A
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          25. Di antara Pasal 32 dan Pasal 33 disisipkan 1
                          (satu) pasal, yakni Pasal 32A sehingga berbunyi
                          sebagai berikut: Pasal 32A (l) Impor barang konsumsi
                          ke KEK yang kegiatan utamanya bukan produksi dan
                          pengolahan diberi fasilitas: a. bagi barang konsumsi
                          yang bukan Barang Kena Cukai dengan jumlah dan jenis
                          tertentu sesuai dengan bidang usahanya diberi
                          fasilitas pembebasan bea masuk dan tidak dipungut
                          pajak dalam rangka impor, dan b. bagi barang konsumsi
                          yang berupa Barang Kena Cukai dikenakan cukai dan
                          diberi fasilitas pembebasan bea masuk dan tidak
                          dipungut pajak dalam rangka impor. (2) Barang konsumsi
                          asal impor yang dikeluarkan ke tempat lain dalam
                          daerah pabean harus dilunasi bea masuk, dan/atau pajak
                          dalam rangka impor.
                    - _type: amendPoint
                      _operation: insert
                      _nomorKey: 26
                      _pasalKeys:
                        - 33A
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          26. Di antara Pasal 33 dan Pasal 34 disisipkan 1
                          (satu) pasal, yakni Pasal 33A sehingga berbunyi
                          sebagai berikut: Pasal 33A (1) Administrator dapat
                          ditetapkan untuk melakukan kegiatan pelayanan
                          kepabeanan mandiri berdasarkan kriteria yang
                          ditetapkan oleh menteri yang menyelenggarakan urusan
                          pemerintahan di bidang keuangan. (2) Pengawasan dan
                          pelayanan atas perpindahan barang di dalam KEK
                          dilakukan secara manual dan/atau menggunakan teknologi
                          informasi yang terhubung dengan kementerian yang
                          menyelenggarakan urusan pemerintahan di bidang
                          keuangan.
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 27
                      _pasalKey: '35'
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Wajib pajak yang melakukan usaha di KEK diberi
                                insentif berupa pembebasan atau keringanan pajak
                                daerah dan retribusi daerah sesuai dengan
                                ketentuan peraturan perundang-undangan.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Insentif sebagaimana dimaksud pada ayat (1)
                                dapat berupa pengurangan Bea Perolehan Hak atas
                                Tanah dan Bangunan dan pengurangan Pajak Bumi
                                dan Bangunan.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
