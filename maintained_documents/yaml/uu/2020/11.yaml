                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Menteri Dalam Negeri dan Menteri Keuangan
                                melakukan evaluasi Peraturan Daerah Provinsi/
                                Kabupaten/Kota tentang Pajak dan Retribusi yang
                                telah berlaku untuk menguji kesesuaian antara
                                Peraturan Daerah dimaksud dan kepentingan umum
                                serta antara ketentuan peraturan perundang-
                                undangan yang lebih tinggi dan kebijakan fiskal
                                nasional.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal berdasarkan evaluasi sebagaimana
                                dimaksud pada ayat (1) dan ayat (2), Peraturan
                                Daerah bertentangan dengan kepentingan umum,
                                peraturan perundang-undangan yang lebih tinggi,
                                dan/atau kebijakan fiskal nasional, Menteri
                                Keuangan merekomendasikan dilakukannya perubahan
                                atas Peraturan Daerah dimaksud kepada Menteri
                                Dalam Negeri.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penyampaian rekomendasi perubahan Peraturan
                                Daerah oleh Menteri Keuangan kepada Menteri
                                Dalam Negeri sebagaimana dimaksud pada ayat (3)
                                dilakukan paling lambat 20 (dua puluh) hari
                                kerja sejak tanggal diterimanya Peraturan Daerah
                                sebagaimana dimaksud pada ayat (1).
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Berdasarkan rekomendasi perubahan Peraturan
                                Daerah yang disampaikan oleh Menteri Keuangan,
                                Menteri Dalam Negeri memerintahkan
                                gubernur/bupati/wali kota untuk melakukan
                                perubahan Peraturan Daerah dalam waktu 15 (lima
                                belas) hari kerja.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Jika dalam waktu 15 (lima belas) hari kerja,
                                gubernur/bupati/wali kota tidak melakukan
                                perubahan atas Peraturan Daerah tersebut,
                                Menteri Dalam Negeri menyampaikan rekomendasi
                                pemberian sanksi kepada Menteri Keuangan.
                      description:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan Pasal 158 diubah sehingga berbunyi sebagai
                          berikut:
                    - _type: amendPoint
