                                Pasal 106 (1) Perusahaan Industri yang akan
                                menjalankan Industri wajib berlokasi di Kawasan
                                Industri. (2) Kewajiban berlokasi di Kawasan
                                Industri sebagaimana dimaksud pada ayat (1)
                                dikecualikan bagi Perusahaan Industri yang akan
                                menjalankan Industri dan berlokasi di daerah
