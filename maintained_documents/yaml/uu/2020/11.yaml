                        text: >-
                          5. Di antara Pasal 157 ayat (5) dan ayat (6)
                          disisipkan 1 (satu) ayat, yakni ayat (Sa) sehingga
                          berbunyi sebagai berikut: REPUBLIK INDONESIA -671 -
                          Pasal 157 (1) Rancangan Peraturan Daerah provinsi
                          tentang Pajak dan Retribusi yang telah disetujui
                          bersama oleh gubernur dan DPRD provinsi sebelum
                          ditetapkan disampaikan kepada Menteri Dalam Negeri dan
                          Menteri Keuangan paling lambat 3 (tiga) hari kerja
                          terhitung sejak tanggal persetujuan dimaksud. (2)
                          Rancangan Peraturan Daerah kabupaten/kota tentang
                          Pajak dan Retribusi yang telah disetujui bersama oleh
                          bupati/wali kota dan DPRD kabupaten/kota sebelum
                          ditetapkan disampaikan kepada gubernur, Menteri Dalam
                          Negeri, dan Menteri Keuangan paling lambat 3 (tiga)
                          hari kerja terhitung sejak tanggal persetujuan
                          dimaksud. (3) Menteri Dalam Negeri melakukan evaluasi
                          terhadap Rancangan Peraturan Daerah sebagaimana
                          dimaksud pada ayat (1) untuk menguji kesesuaian
                          Rancangan Peraturan Daerah dengan ketentuan
                          Undang-Undang ini, kepentingan umum, dan/atau
                          peraturan perundang-undangan lain yang lebih tinggi.
                          (4) Gubernur melakukan evaluasi terhadap Rancangan
                          Peraturan Daerah sebagaimana dimaksud pada ayat (2)
                          untuk menguji kesesuaian Rancangan Peraturan Daerah
                          dengan ketentuan Undang-Undang ini, kepentingan umum,
                          dan/atau peraturan perundang- undangan lain yang lebih
                          tinggi. (S5) Menteri Dalam Negeri dan gubernur dalam
                          melakukan evaluasi sebagaimana dimaksud pada ayat (3)
                          dan ayat (4) berkoordinasi dengan Menteri Keuangan.
                          (Sa) Dalam pelaksanaan koordinasi sebagaimana dimaksud
                          pada ayat (5), Menteri Keuangan melakukan evaluasi
                          dari sisi kebijakan fiskal nasional. (6) Hasil
                          evaluasi yang telah dikoordinasikan dengan Menteri
                          Keuangan sebagaimana dimaksud pada ayat (5) dapat
                          berupa persetujuan atau penolakan. REPUBLIK INDONESIA
                          -672 - (7) Hasil evaluasi sebagaimana dimaksud pada
                          ayat (7) disampaikan oleh Menteri Dalam Negeri kepada
                          gubernur untuk Rancangan Peraturan Daerah provinsi dan
                          oleh gubernur kepada bupati/wali kota untuk Rancangan
                          Peraturan Daerah kabupaten/kota dalam jangka waktu
                          paling lambat 15 (lima belas) hari kerja sejak
                          diterimanya Rancangan Peraturan Daerah dimaksud dengan
                          tembusan kepada Menteri Keuangan. (8) Hasil evaluasi
                          berupa penolakan sebagaimana dimaksud pada ayat (7)
                          disampaikan dengan disertai alasan penolakan. (9)
                          Dalam hal hasil evaluasi berupa persetujuan
                          sebagaimana dimaksud pada ayat (7), Rancangan
                          Peraturan Daerah dimaksud dapat langsung ditetapkan.
                          (10) Dalam hal hasil evaluasi berupa penolakan
                          sebagaimana dimaksud pada ayat (7), Rancangan
                          Peraturan Daerah dimaksud dapat diperbaiki oleh
                          gubernur, bupati/wali kota bersama DPRD yang
                          bersangkutan, untuk kemudian disampaikan kembali
                          kepada Menteri Dalam Negeri dan Menteri Keuangan untuk
                          Rancangan Peraturan Daerah provinsi dan kepada
                          gubernur dan Menteri Keuangan untuk Rancangan
                          Peraturan Daerah kabupaten/kota.
