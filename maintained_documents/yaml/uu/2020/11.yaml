                              text: >-
                                S1. Ketentuan Pasal 118 diubah sehingga berbunyi
                                sebagai berikut: REPUBLIK INDONESIA - 436 -
                                Pasal 118 (1) Pemegang Perizinan Berusaha
                                angkutan udara niaga wajib: a. melakukan
                                kegiatan angkutan udara secara nyata paling
                                lambat 12 (dua belas) bulan sejak Perizinan
                                Berusaha diterbitkan dengan mengoperasikan
                                minimal jumlah pesawat udara yang dimiliki dan
                                dikuasai sesuai dengan lingkup usaha atau
                                kegiatannya, b. memiliki dan menguasai pesawat
                                udara dengan jumlah tertentu, Cc. mematuhi
                                ketentuan wajib angkut, penerbangan sipil, dan
                                ketentuan lain sesuai dengan peraturan
                                perundang-undangan, d. menutup asuransi tanggung
                                jawab pengangkut dengan nilai pertanggungan
                                sebesar santunan penumpang angkutan udara niaga
                                yang dibuktikan dengan perjanjian penutupan
                                asuransi, e. melayani calon penumpang secara
                                adil tanpa diskriminasi atas dasar suku, agama,
                                ras, antargolongan, serta strata ekonomi dan
                                sosial, f. menyerahkan laporan kegiatan angkutan
                                udara, termasuk keterlambatan dan pembatalan
                                penerbangan setiap jangka waktu tertentu kepada
                                Pemerintah Pusat: g. menyerahkan laporan kinerja
                                keuangan yang telah diaudit oleh kantor akuntan
                                publik terdaftar yang sekurang-kurangnya memuat
                                neraca, laporan rugi laba, arus kas, dan
                                perincian biaya, setiap tahun paling lambat
                                akhir bulan April tahun berikutnya kepada
                                Pemerintah Pusat, h. melaporkan apabila terjadi
                                perubahan penanggung jawab atau pemilik badan
                                usaha angkutan udara niaga, domisili badan usaha
                                angkutan udara niaga, dan pemilikan pesawat
                                udara kepada Pemerintah Pusat, dan REPUBLIK
                                INDONESIA - 437 - i. memenuhi standar pelayanan
                                yang ditetapkan. (2) Pemegang izin kegiatan
                                angkutan udara bukan niaga yang dilakukan oleh
                                Pemerintah Pusat, pemerintah daerah, badan
                                usaha, dan lembaga tertentu wajib: a.
                                mengoperasikan pesawat udara paling lambat 12
                                (dua belas) bulan setelah izin kegiatan
                                diterbitkan, b. mematuhi peraturan
                                perundang-undangan di bidang penerbangan sipil
                                dan peraturan perundang-undangan lain yang
                                berlaku, Cc. menyerahkan laporan kegiatan
                                angkutan udara setiap bulan paling lambat
                                tanggal 10 (sepuluh) bulan berikutnya kepada
                                Pemerintah Pusat, dan d. melaporkan apabila
                                terjadi perubahan penanggung jawab, kepemilikan
                                pesawat udara, dan/atau domisili kantor pusat
                                kegiatan kepada Pemerintah Pusat. (3) Pemegang
                                izin kegiatan angkutan udara bukan niaga yang
                                dilakukan oleh orang perseorangan wajib: a.
                                mengoperasikan pesawat udara paling lambat 12
                                (dua belas) bulan setelah izin diterbitkan, b.
                                mematuhi peraturan perundang-undangan di bidang
                                penerbangan sipil dan peraturan
                                perundang-undangan lain, Cc. menyerahkan laporan
