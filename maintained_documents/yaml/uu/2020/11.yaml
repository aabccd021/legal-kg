                              text: pelabuhan,
                          - _type: alphaPoint
                            _key: d
                            isi:
                              _type: referenceText
                              references: []
                              text: 'stasiun kereta api:'
                          - _type: alphaPoint
                            _key: e
                            isi:
                              _type: referenceText
                              references: []
                              text: tempat istirahat dan pelayanan jalan tol, dan
                          - _type: alphaPoint
                            _key: f
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                ' infrastruktur publik lainnya yang ditetapkan
                                oleh Pemerintah Pusat dan/atau Pemerintah Daerah
                                sesuai dengan kewenangannya.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          — Alokasi penyediaan tempat promosi dan pengembangan
                          Usaha Mikro dan Kecil pada infrastruktur publik
                          sebagaimana dimaksud pada ayat (1) paling sedikit 30Y6
                          (tiga puluh persen) dari luas tempat perbelanjaan
                          dan/atau promosi yang strategis pada infrastruktur
                          publik yang bersangkutan.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          “ Ketentuan mengenai penyediaan tempat promosi dan
                          pengembangan Usaha Mikro dan Kecil pada infrastruktur
                          publik pada ayat (1) dan besaran alokasi sebagaimana
                          dimaksud pada ayat (2) diatur dalam Peraturan
                          Pemerintah.
