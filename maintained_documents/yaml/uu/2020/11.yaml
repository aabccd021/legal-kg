                          dengan pekerja/buruh lainnya di dalam satu perusahaan,
                          g mendirikan, menjadi anggota dan/atau pengurus
                          serikat pekerja/serikat buruh, pekerja/buruh melakukan
                          kegiatan serikat pekerja/serikat buruh di luar jam
                          kerja, atau di dalam jam kerja atas kesepakatan
                          pengusaha, atau berdasarkan ketentuan yang diatur
                          dalam perjanjian kerja, peraturan perusahaan, atau
                          perjanjian kerja bersama: h. mengadukan pengusaha
                          kepada pihak yang berwajib mengenai perbuatan
                          pengusaha yang melakukan tindak pidana kejahatan, ii
                          berbeda paham, agama, aliran politik, suku, warna
                          kulit, golongan, jenis kelamin, kondisi fisik, atau
                          status perkawinan, dan J- dalam keadaan cacat tetap,
