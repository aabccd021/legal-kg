                          references: []
                          text: >-
                            Dalam rangka pemberdayaan Usaha Mikro dan Kecil,
                            Pemerintah Pusat, Pemerintah Daerah, badan usaha
                            milik negara, badan usaha milik daerah dan/atau
                            badan usaha swasta wajib mengalokasikan penyediaan
                            tempat promosi, tempat usaha, dan/atau pengembangan
                            Usaha Mikro dan Kecil pada infrastruktur publik yang
                            mencakup:
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: terminal,
                          - _type: alphaPoint
                            _key: b
