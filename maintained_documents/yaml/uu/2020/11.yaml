                              text: >-
                                19. Ketentuan Pasal 78 diubah sehingga berbunyi
                                sebagai berikut: Pasal 78 (1) Setiap orang yang
                                dengan sengaja melanggar ketentuan sebagaimana
                                dimaksud dalam Pasal 50 ayat (1) diancam dengan
                                pidana penjara paling lama 10 (sepuluh) tahun
                                dan denda paling banyak Rp5.000.000.000,00 (lima
                                miliar rupiah). REPUBLIK INDONESIA - 197 - (2)
                                Setiap orang yang dengan sengaja melanggar
                                ketentuan sebagaimana dimaksud dalam Pasal 50
                                ayat (2) huruf a diancam dengan pidana penjara
                                paling lama 10 (sepuluh) tahun dan denda paling
                                banyak Rp7.500.000.000,00 (tujuh miliar lima
                                ratus juta rupiah). (3) Setiap orang yang dengan
                                sengaja melanggar ketentuan sebagaimana dimaksud
                                dalam Pasal 50 ayat (2) huruf b diancam dengan
                                pidana penjara paling lama 15 (lima belas) tahun
                                dan denda paling banyak Rp7.500.000.000,00
                                (tujuh miliar lima ratus juta rupiah). (4)
                                Setiap orang yang karena kelalaiannya melanggar
                                ketentuan sebagaimana dimaksud dalam Pasal 50
                                ayat (2) huruf b diancam dengan pidana penjara
                                paling lama 5 (lima) tahun dan denda paling
                                banyak Rp3.500.000.000,00 (tiga miliar lima
                                ratus juta rupiah). (5) Setiap orang yang dengan
                                sengaja melanggar ketentuan sebagaimana dimaksud
                                dalam Pasal 50 ayat (2) huruf c diancam dengan
                                pidana penjara paling lama 5 (lima) tahun dan
                                denda paling banyak Rp3.500.000.000,00 (tiga
                                miliar lima ratus juta rupiah). (6) Setiap orang
                                yang dengan sengaja melanggar ketentuan
                                sebagaimana dimaksud dalam Pasal 50 ayat (2)
                                huruf d diancam dengan pidana penjara paling
                                lama 5 (lima) tahun dan denda paling banyak
                                Rp3.500.000.000,00 (tiga miliar lima ratus juta
                                rupiah). (7) Setiap orang yang dengan sengaja
                                melanggar ketentuan sebagaimana dimaksud dalam
                                Pasal 38 ayat (4) diancam dengan pidana penjara
                                paling lama 10 (sepuluh) tahun dan denda paling
