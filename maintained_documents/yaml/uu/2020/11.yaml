                              text: >-
                                34. Di antara Pasal 36 dan Pasal 37 disisipkan 2
                                (dua) pasal, yakni Pasal 36A dan Pasal 36B yang
                                berbunyi sebagai berikut: REPUBLIK INDONESIA -
                                106 - Pasal 36A (1) Pelaksanaan konstruksi
                                sebagaimana dimaksud dalam Pasal 35 ayat (1)
                                dilakukan setelah mendapatkan Persetujuan
                                Bangunan Gedung. (2) Persetujuan sebagaimana
                                dimaksud pada ayat (1) diperoleh setelah
                                mendapatkan pernyataan pemenuhan standar teknis
                                bangunan gedung dari Pemerintah Pusat atau
                                Pemerintah Daerah sesuai kewenangannya
                                berdasarkan norma, standar, prosedur, dan
                                kriteria yang ditetapkan oleh Pemerintah Pusat.
                                (3) Persetujuan sebagaimana dimaksud pada ayat
                                (1) dimohonkan kepada Pemerintah Pusat atau
                                Pemerintah Daerah sesuai dengan kewenangannya
                                berdasarkan norma, standar, prosedur, dan
                                kriteria yang ditetapkan oleh Pemerintah Pusat
                                melalui sistem elektronik yang diselenggarakan
                                oleh Pemerintah Pusat. Pasal 36B (1) Pelaksanaan
                                bangunan gedung dilakukan oleh penyedia jasa
                                pelaksana konstruksi yang memenuhi syarat dan
                                standar kompetensi sesuai dengan ketentuan
                                peraturan perundang-undangan. (2) Penyedia jasa
                                pengawasan atau manajemen konstruksi melakukan
                                kegiatan pengawasan dan bertanggung jawab untuk
                                melaporkan setiap tahapan pekerjaan. (3)
                                Pemerintah Pusat atau Pemerintah Daerah sesuai
                                dengan kewenangannya berdasarkan norma, standar,
                                prosedur, dan kriteria yang ditetapkan oleh
                                Pemerintah Pusat melakukan inspeksi pada setiap
                                tahapan sebagaimana dimaksud pada ayat (2)
                                sebagai pengawasan yang dapat menyatakan lanjut
                                atau tidaknya pekerjaan konstruksi ke tahap
                                berikutnya. (4) Tahapan sebagaimana dimaksud
                                pada ayat (3) meliputi: a. pekerjaan struktur
                                bawah: b. pekerjaan basemen jika ada: REPUBLIK
                                INDONESIA - 107 - C. pekerjaan struktur atas:
                                dan d. pengujian. (5) Dalam melaksanakan
                                inspeksi sebagaimana dimaksud pada ayat (3)
                                Pemerintah Pusat atau Pemerintah Daerah sesuai
                                dengan kewenangannya menugaskan Penilik
                                berdasarkan norma, standar, prosedur, dan
                                kriteria yang ditetapkan oleh Pemerintah Pusat.
                                (6) Dalam hal pelaksanaan diperlukan adanya
                                perubahan dan/atau penyesuaian terhadap rencana
                                teknis, penyedia jasa perencana wajib melaporkan
                                kepada Pemerintah Pusat atau Pemerintah Daerah
                                sesuai dengan kewenanganya untuk mendapatkan
                                persetujuan sebelum pelaksanaan perubahan dapat
                                dilanjutkan berdasarkan norma, standar,
                                prosedur, dan kriteria yang ditetapkan oleh
                                Pemerintah Pusat.
