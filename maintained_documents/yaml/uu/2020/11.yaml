                        text: >-
                          9. Ketentuan Pasal 19 diubah sehingga berbunyi sebagai
                          berikut: Pasal 19 (1) Apabila Surat Ketetapan Pajak
                          Kurang Bayar atau Surat Ketetapan Pajak Kurang Bayar
                          Tambahan, serta Surat Keputusan Pembetulan, Surat
                          Keputusan Keberatan, Putusan Banding atau Putusan
                          Peninjauan Kembali, yang menyebabkan jumlah pajak yang
                          masih harus dibayar bertambah, pada saat jatuh tempo
                          pelunasan tidak atau kurang dibayar, atas jumlah pajak
                          yang tidak atau kurang dibayar itu dikenai sanksi
                          administratif berupa bunga sebesar tarif bunga per
                          bulan yang ditetapkan oleh Menteri Keuangan untuk
                          seluruh masa, yang dihitung dari tanggal jatuh tempo
                          sampai dengan tanggal pembayaran atau tanggal
                          diterbitkannya Surat Tagihan Pajak, dan dikenakan
                          paling lama 24 (dua puluh empat) bulan serta bagian
                          dari bulan dihitung penuh 1 (satu) bulan. (2) Dalam
                          hal Wajib Pajak diperbolehkan mengangsur atau menunda
                          pembayaran pajak juga dikenai sanksi administratif
                          berupa bunga sebesar tarif bunga per bulan yang
                          ditetapkan oleh Menteri Keuangan dari jumlah pajak
                          yang masih harus dibayar dan dikenakan paling lama 24
                          (dua puluh empat) bulan serta bagian dari bulan
                          dihitung penuh 1 (satu) bulan. (3) Dalam hal Wajib
                          Pajak diperbolehkan menunda penyampaian Surat
                          Pemberitahuan Tahunan dan ternyata penghitungan
                          sementara pajak yang terutang sebagaimana dimaksud
                          dalam Pasal 3 ayat (5) kurang dari jumlah pajak yang
                          sebenarnya terutang atas kekurangan pembayaran pajak
                          tersebut, Wajib Pajak dikenai bunga sebesar tarif
                          bunga per bulan yang ditetapkan oleh Menteri Keuangan
                          yang dihitung dari saat berakhirnya batas waktu
                          penyampaian Surat Pemberitahuan Tahunan sebagaimana
                          dimaksud dalam Pasal 3 ayat (3) huruf b dan huruf c
                          sampai dengan tanggal dibayarnya kekurangan pembayaran
                          tersebut dan dikenakan paling lama 24 (dua puluh
                          empat) bulan serta bagian dari bulan dihitung penuh 1
                          (satu) bulan. REPUBLIK INDONESIA - 665 - (4) Tarif
                          bunga per bulan yang ditetapkan oleh Menteri Keuangan
                          sebagaimana dimaksud pada ayat (1), ayat (2), dan ayat
                          (3) dihitung berdasarkan suku bunga acuan dibagi 12
                          (dua belas) yang berlaku pada tanggal dimulainya
                          penghitungan sanksi.
