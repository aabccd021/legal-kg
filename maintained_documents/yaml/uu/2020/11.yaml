                                pada ayat (1) dilaksanakan oleh: a. Menteri
                                Keuangan selaku Bendahara Umum Negara sesuai
                                dengan ketentuan peraturan perundang- undangan
                                yang mengatur mengenai investasi Pemerintah
                                Pusat, dan/atau b. lembaga yang diberikan
                                kewenangan khusus (sui generis) dalam rangka
                                pengelolaan investasi, yang selanjutnya disebut
                                Lembaga.
                          - _type: ayat
