                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal Keputusan dibuat dalam bentuk
                                elektronis, tidak dibuat Keputusan dalam bentuk
                                tertulis.
                      description:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan Pasal 38 diubah sehingga berbunyi sebagai
                          berikut:
                    - _type: amendPoint
                      _operation: insert
                      _nomorKey: 5
                      _pasalKeys:
                        - 39A
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          5. Di antara Pasal 39 dan Pasal 40 disisipkan 1 (satu)
                          pasal, yakni Pasal 39A yang berbunyi sebagai berikut:
                          Pasal 39A (1) Badan dan/atau Pejabat Pemerintahan
                          wajib melakukan pembinaan dan pengawasan atas
                          pelaksanaan Izin, Standar, Dispensasi, dan/atau
                          Konsesi. (2) Pembinaan dan pengawasan terhadap Izin,
                          Standar, Dispensasi, dan/atau Konsesi sebagaimana
                          dimaksud pada ayat (1) dapat dikerjasamakan dengan
                          atau dilakukan oleh profesi yang memiliki sertifikat
                          keahlian sesuai dengan bidang pengawasan. (3)
                          Ketentuan mengenai jenis, bentuk, dan mekanisme
                          pembinaan dan pengawasan atas Izin, Standar,
                          Dispensasi, dan/atau Konsesi yang dapat dilakukan oleh
                          profesi sebagaimana dimaksud pada ayat (2) diatur
                          dalam Peraturan Presiden.
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 6
                      _pasalKey: '53'
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Batas waktu kewajiban untuk menetapkan dan/atau
                                melakukan Keputusan dan/atau Tindakan diberikan
                                sesuai dengan ketentuan peraturan perundang-
                                undangan.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Jika ketentuan peraturan perundang-undangan
                                tidak menentukan batas waktu kewajiban
                                sebagaimana dimaksud pada ayat (1), Badan
                                dan/atau Pejabat Pemerintahan wajib menetapkan
                                dan/atau melakukan Keputusan dan/atau Tindakan
                                dalam waktu paling lama 5 (lima) hari kerja
                                setelah permohonan diterima secara lengkap oleh
                                Badan dan/atau Pejabat Pemerintahan.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal permohonan diproses melalui sistem
                                elektronik dan seluruh persyaratan dalam sistem
                                elektronik telah terpenuhi, sistem elektronik
                                menetapkan Keputusan dan/atau Tindakan sebagai
                                Keputusan atau Tindakan Badan atau Pejabat
                                Pemerintahan yang berwenang.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Apabila dalam batas waktu sebagaimana dimaksud
                                pada ayat (2), Badan dan/atau Pejabat
                                Pemerintahan tidak menetapkan dan/atau melakukan
                                Keputusan dan/atau Tindakan, permohonan dianggap
                                dikabulkan secara hukum.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan lebih lanjut mengenai bentuk penetapan
                                Keputusan dan/atau Tindakan yang dianggap
                                dikabulkan secara hukum sebagaimana dimaksud
                                pada ayat (3) diatur dalam Peraturan Presiden.
