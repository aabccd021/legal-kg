                              text: >-
                                2. Ketentuan Pasal 13 diubah sehingga berbunyi
                                sebagai berikut: Pasal 13 (1) Penyediaan dan
                                pengembangan Benih dan/atau Bibit dilakukan
                                dengan memperhatikan keberlanjutan pengembangan
                                usaha Peternak mikro, kecil, dan menengah. (2)
                                Pemerintah Pusat dan Pemerintah Daerah sesuai
                                dengan kewenangannya wajib untuk melakukan
                                pengembangan usaha pembenihan dan/atau
                                pembibitan dengan melibatkan peran serta
                                masyarakat untuk menjamin ketersediaan Benih,
                                Bibit, dan/atau bakalan. REPUBLIK INDONESIA -178
                                - (3) Dalam hal usaha pembenihan dan/atau
                                pembibitan oleh masyarakat belum berkembang,
                                Pemerintah Pusat dan Pemerintah Daerah membentuk
                                unit pembenihan dan/atau pembibitan. (4) Setiap
                                Benih atau Bibit yang beredar wajib memiliki
                                sertifikat layak Benih atau Bibit yang memuat
                                keterangan mengenai silsilah dan ciri-ciri
                                keunggulan tertentu. (5) Sertifikat layak Benih
                                atau Bibit sebagaimana dimaksud pada ayat (4)
                                dikeluarkan oleh lembaga sertifikasi Benih atau
                                Bibit yang terakreditasi. (6) Setiap orang
                                dilarang mengedarkan Benih atau Bibit yang tidak
                                memenuhi kewajiban sertifikat Layak Benih atau
                                Bibit sebagaimana dimaksud pada ayat (S5).
