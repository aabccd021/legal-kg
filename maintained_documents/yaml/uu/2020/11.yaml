                isi:
                  _type: amendPoints
                  description:
                    _type: referenceText
                    references: []
                    text: >-
                      Beberapa ketentuan dalam Undang-Undang Nomor 6 Tahun 2011
                      tentang Keimigrasian (Lembaran Negara Republik Indonesia
                      Tahun 2011 Nomor 52, Tambahan Lembaran Negara Republik
                      Indonesia Nomor 5216) diubah sebagai berikut:
                  isi:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 1
                      _pasalKey: '1'
                      isi:
                        _type: referenceText
                        references:
                          - start: 13
                            end: 20
                            node:
                              _key: 1
                              parentDocument: *ref_0
                              _structureType: pasal
                          - start: 80
                            end: 87
                            node:
                              _key: 1
                              parentDocument: *ref_0
                              _structureType: pasal
                          - start: 114
                            end: 121
                            node:
                              _key: 1
                              parentDocument: *ref_0
                              _structureType: pasal
                        text: >-
                          1. Ketentuan Pasal 1 angka 14, angka 18, angka 21, dan
                          angka 30 diubah sehingga Pasal 1 berbunyi sebagai
                          berikut: Pasal 1 Dalam Undang-Undang ini yang dimaksud
                          dengan: 1. Keimigrasian adalah hal ihwal lalu lintas
                          orang yang masuk atau keluar Wilayah Indonesia serta
                          pengawasannya dalam rangka menjaga tegaknya kedaulatan
                          negara. 2. Wilayah Negara Republik Indonesia yang
                          selanjutnya disebut Wilayah Indonesia adalah seluruh
                          wilayah Indonesia serta zona tertentu yang ditetapkan
                          berdasarkan undang-undang. 3. Fungsi Keimigrasian
                          adalah bagian dari urusan pemerintahan negara dalam
                          memberikan pelayanan Keimigrasian, penegakan hukum,
                          keamanan negara, dan fasilitator pembangunan
                          kesejahteraan masyarakat. 4. Menteri adalah menteri
                          yang menyelenggarakan urusan pemerintahan di bidang
                          hukum dan hak asasi manusia. 5. Direktur Jenderal
                          adalah Direktur Jenderal Imigrasi. 6. Direktorat
                          Jenderal Imigrasi adalah unsur pelaksana tugas dan
                          fungsi Kementerian Hukum dan Hak Asasi Manusia di
                          bidang Keimigrasian. REPUBLIK INDONESIA - 593 - 7.
                          Pejabat Imigrasi adalah pegawai yang telah melalui
                          pendidikan khusus Keimigrasian dan memiliki keahlian
                          teknis Keimigrasian serta memiliki wewenang untuk
                          melaksanakan tugas dan tanggung jawab berdasarkan
                          Undang-Undang ini. 8. Penyidik Pegawai Negeri Sipil
                          Keimigrasian yang selanjutnya disebut dengan PPNS
                          Keimigrasian adalah Pejabat Imigrasi yang diberi
                          wewenang oleh undang-undang untuk melakukan penyidikan
                          tindak pidana Keimigrasian. 9. Orang Asing adalah
                          orang yang bukan warga negara Indonesia. 10. Sistem
                          Informasi Manajemen Keimigrasian adalah sistem
                          teknologi informasi dan komunikasi yang digunakan
                          untuk mengumpulkan, mengolah, dan menyajikan informasi
                          guna mendukung operasional, manajemen, dan pengambilan
                          keputusan dalam melaksanakan Fungsi Keimigrasian. 11.
                          Kantor Imigrasi adalah unit pelaksana teknis yang
                          menjalankan Fungsi Keimigrasian di daerah kabupaten,
                          kota, atau kecamatan. 12. Tempat Pemeriksaan Imigrasi
                          adalah tempat pemeriksaan di pelabuhan laut, bandar
                          udara, pos lintas batas, atau tempat lain sebagai
                          tempat masuk dan keluar Wilayah Indonesia. 13. Dokumen
                          Perjalanan adalah dokumen resmi yang dikeluarkan oleh
                          pejabat yang berwenang dari suatu negara, Perserikatan
                          Bangsa-Bangsa, atau organisasi internasional lainnya
                          untuk melakukan perjalanan antarnegara yang memuat
                          identitas pemegangnya. 14. Dokumen Keimigrasian adalah
                          Dokumen Perjalanan Republik Indonesia dan Izin Tinggal
                          yang dikeluarkan oleh Pejabat Imigrasi atau pejabat
                          dinas luar negeri. REPUBLIK INDONESIA - 594 - 15.
                          Dokumen Perjalanan Republik Indonesia adalah Paspor
                          Republik Indonesia dan Surat Perjalanan Laksana Paspor
                          Republik Indonesia. 16. Paspor Republik Indonesia yang
                          selanjutnya disebut Paspor adalah dokumen yang
                          dikeluarkan oleh Pemerintah Republik Indonesia kepada
                          warga negara Indonesia untuk melakukan perjalanan
                          antarnegara yang berlaku selama jangka waktu tertentu.
                          17. Surat Perjalanan Laksana Paspor Republik Indonesia
                          yang selanjutnya disebut Surat Perjalanan Laksana
                          Paspor adalah dokumen pengganti paspor yang diberikan
                          dalam keadaan tertentu yang berlaku selama jangka
                          waktu tertentu. 18. Visa Republik Indonesia yang
                          selanjutnya disebut Visa adalah keterangan tertulis,
                          baik secara manual maupun elektronik yang diberikan
                          oleh pejabat yang berwenang untuk melakukan perjalanan
                          ke Wilayah Indonesia dan menjadi dasar untuk pemberian
                          Izin Tinggal. 19. Tanda Masuk adalah tanda tertentu
                          berupa cap yang dibubuhkan pada Dokumen Perjalanan
                          warga negara Indonesia dan Orang Asing, baik manual
                          maupun elektronik, yang diberikan oleh Pejabat
                          Imigrasi sebagai tanda bahwa yang bersangkutan masuk
                          Wilayah Indonesia. 20. Tanda Keluar adalah tanda
                          tertentu berupa cap yang dibubuhkan pada Dokumen
                          Perjalanan warga negara Indonesia dan Orang Asing,
                          baik manual maupun elektronik, yang diberikan oleh
                          Pejabat Imigrasi sebagai tanda bahwa yang bersangkutan
                          keluar Wilayah Indonesia. 21. Izin Tinggal adalah izin
                          yang diberikan kepada Orang Asing oleh Pejabat
                          Imigrasi atau pejabat dinas luar negeri baik secara
                          manual maupun elektronik untuk berada di Wilayah
                          Indonesia. SK No 052097 A REPUBLIK INDONESIA - 595 -
                          22. Pernyataan Integrasi adalah pernyataan Orang Asing
                          kepada Pemerintah Republik Indonesia sebagai salah
                          satu syarat memperoleh Izin Tinggal Tetap. 23. Izin
                          Tinggal Tetap adalah izin yang diberikan kepada Orang
                          Asing tertentu untuk bertempat tinggal dan menetap di
                          Wilayah Indonesia sebagai penduduk Indonesia. 24. Izin
                          Masuk Kembali adalah izin tertulis yang diberikan oleh
                          Pejabat Imigrasi kepada Orang Asing pemegang Izin
                          Tinggal terbatas dan Izin Tinggal Tetap untuk masuk
                          kembali ke Wilayah Indonesia. 25. Korporasi adalah
                          kumpulan orang dan/atau kekayaan yang terorganisasi,
                          baik merupakan badan hukum maupun bukan badan hukum.
                          26. Penjamin adalah orang atau Korporasi yang
                          bertanggung jawab atas keberadaan dan kegiatan Orang
                          Asing selama berada di Wilayah Indonesia. 27. Alat
                          Angkut adalah kapal laut, pesawat udara, atau sarana
                          transportasi lain yang lazim digunakan, baik untuk
                          mengangkut orang maupun barang. 28. Pencegahan adalah
                          larangan sementara terhadap orang untuk keluar dari
                          Wilayah Indonesia berdasarkan alasan Keimigrasian atau
                          alasan lain yang ditentukan oleh undang-undang. 29.
                          Penangkalan adalah larangan terhadap Orang Asing untuk
                          masuk Wilayah Indonesia berdasarkan alasan
                          Keimigrasian. 30. Intelijen Keimigrasian adalah
                          kegiatan penyelidikan Keimigrasian dan pengamanan
                          Keimigrasian dalam rangka penyajian informasi melalui
                          analisis guna menetapkan perkiraan keadaan
                          Keimigrasian yang dihadapi atau yang akan dihadapi.
                          31. Tindakan Administratif Keimigrasian adalah sanksi
                          administratif yang ditetapkan Pejabat Imigrasi
                          terhadap Orang Asing di luar proses peradilan. SK No
                          052098 A REPUBLIK INDONESIA - 596 - 32. Penyelundupan
                          Manusia adalah perbuatan yang bertujuan mencari
                          keuntungan, baik secara langsung maupun tidak
                          langsung, untuk diri sendiri atau untuk orang lain
                          yang membawa seseorang atau kelompok orang, baik
                          secara terorganisasi maupun tidak terorganisasi, atau
                          memerintahkan orang lain untuk membawa seseorang atau
                          kelompok orang, baik secara terorganisasi maupun tidak
                          terorganisasi, yang tidak memiliki hak secara sah
                          untuk memasuki Wilayah Indonesia atau keluar Wilayah
                          Indonesia dan/atau masuk wilayah negara lain yang
                          orang tersebut tidak memiliki hak untuk memasuki
                          wilayah tersebut secara sah, baik dengan menggunakan
                          dokumen sah maupun dokumen palsu, atau tanpa
                          menggunakan Dokumen Perjalanan, baik melalui
                          pemeriksaan imigrasi maupun tidak. 33. Rumah Detensi
                          Imigrasi adalah unit pelaksana teknis yang menjalankan
                          Fungsi Keimigrasian sebagai tempat penampungan
                          sementara bagi Orang Asing yang dikenai Tindakan
                          Administratif Keimigrasian. 34. Ruang Detensi Imigrasi
                          adalah tempat penampungan sementara bagi Orang Asing
                          yang dikenai Tindakan Administratif Keimigrasian yang
                          berada di Direktorat Jenderal Imigrasi dan Kantor
                          Imigrasi. 35. Deteni adalah Orang Asing penghuni Rumah
                          Detensi Imigrasi atau Ruang Detensi Imigrasi yang
                          telah mendapatkan keputusan pendetensian dari Pejabat
                          Imigrasi. 36. Deportasi adalah tindakan paksa
                          mengeluarkan Orang Asing dari Wilayah Indonesia. 37.
                          Penanggung Jawab Alat Angkut adalah pemilik, pengurus,
                          agen, nakhoda, kapten kapal, kapten pilot, atau
                          pengemudi alat angkut yang bersangkutan. SK No 052099
                          A REPUBLIK INDONESIA - 597 - 38. Penumpang adalah
                          setiap orang yang berada di atas alat angkut, kecuali
                          awak alat angkut. 39. Perwakilan Republik Indonesia
                          adalah Kedutaan Besar Republik Indonesia, Konsulat
                          Jenderal Republik Indonesia, dan Konsulat Republik
                          Indonesia.
