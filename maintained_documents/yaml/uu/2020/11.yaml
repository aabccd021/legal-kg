                        text: >-
                          8. Ketentuan Pasal 17B diubah sehingga Pasal 17B
                          berbunyi sebagai berikut: REPUBLIK INDONESIA - 662 -
                          Pasal 17B (1) Direktur Jenderal Pajak setelah
                          melakukan pemeriksaan atas permohonan pengembalian
                          kelebihan pembayaran pajak, selain permohonan
                          pengembalian kelebihan pembayaran pajak dari Wajib
                          Pajak sebagaimana dimaksud dalam Pasal 17C dan Wajib
                          Pajak sebagaimana dimaksud dalam Pasal 17D, harus
                          menerbitkan surat ketetapan pajak paling lama 12 (dua
                          belas) bulan sejak surat permohonan diterima secara
                          lengkap. (la) Ketentuan sebagaimana dimaksud pada ayat
                          (1) tidak berlaku terhadap Wajib Pajak yang sedang
                          dilakukan pemeriksaan bukti permulaan tindak pidana di
                          bidang perpajakan yang ketentuannya diatur dengan atau
                          berdasarkan Peraturan Menteri Keuangan. (2) Apabila
                          setelah melampaui jangka waktu sebagaimana dimaksud
                          pada ayat (1) Direktur Jenderal Pajak tidak memberi
                          suatu keputusan, permohonan pengembalian kelebihan
                          pembayaran pajak dianggap dikabulkan dan Surat
                          Ketetapan Pajak Lebih Bayar harus diterbitkan paling
                          lama 1 (satu) bulan setelah jangka waktu tersebut
                          berakhir. (3) Apabila Surat Ketetapan Pajak Lebih
                          Bayar terlambat diterbitkan sebagaimana dimaksud pada
                          ayat (2), kepada Wajib Pajak diberi imbalan bunga
                          sebesar tarif bunga per bulan yang ditetapkan oleh
                          Menteri Keuangan dihitung sejak berakhirnya jangka
                          waktu sebagaimana dimaksud pada ayat (2) sampai dengan
                          saat diterbitkan Surat Ketetapan Pajak Lebih Bayar.
                          (4) Apabila pemeriksaan bukti permulaan tindak pidana
                          di bidang perpajakan sebagaimana dimaksud pada ayat
                          (la): a. tidak dilanjutkan dengan penyidikan, b.
                          dilanjutkan dengan penyidikan, tetapi tidak
                          dilanjutkan dengan penuntutan tindak pidana di bidang
                          perpajakan, atau REPUBLIK INDONESIA - 663 - c.
                          dilanjutkan dengan penyidikan dan penuntutan tindak
                          pidana di bidang perpajakan, tetapi diputus bebas atau
                          lepas dari segala tuntutan hukum berdasarkan putusan
                          pengadilan yang telah mempunyai kekuatan hukum tetap
                          dan dalam hal kepada Wajib Pajak diterbitkan Surat
                          Ketetapan Pajak Lebih Bayar, kepada Wajib Pajak
                          diberikan imbalan bunga sebesar tarif bunga per bulan
                          yang ditetapkan oleh Menteri Keuangan dihitung sejak
                          berakhirnya jangka waktu 12 (dua belas) bulan
                          sebagaimana dimaksud pada ayat (1) sampai dengan saat
                          diterbitkan Surat Ketetapan Pajak Lebih Bayar. (S5)
                          Imbalan bunga sebagaimana dimaksud pada ayat (4) tidak
                          diberi dalam hal pemeriksaan bukti permulaan tindak
                          pidana di bidang perpajakan: a. tidak dilanjutkan
                          dengan penyidikan karena Wajib Pajak dengan kemauan
                          sendiri mengungkapkan ketidakbenaran perbuatannya
                          sebagaimana dimaksud dalam Pasal 8 ayat (3): atau b.
                          dilanjutkan dengan penyidikan, tetapi tidak
                          dilanjutkan dengan penuntutan tindak pidana di bidang
                          perpajakan karena dilakukan penghentian penyidikan
                          tindak pidana di bidang perpajakan sebagaimana
                          dimaksud dalam Pasal 44B. (6) Imbalan bunga
                          sebagaimana dimaksud pada ayat (3) dan ayat (4)
                          diberikan paling lama 24 (dua puluh empat) bulan,
                          serta bagian dari bulan dihitung penuh 1 (satu) bulan.
                          (7) Tarif bunga per bulan yang ditetapkan oleh Menteri
                          Keuangan sebagaimana dimaksud pada ayat (3) dan ayat
                          (4) dihitung berdasarkan suku bunga acuan dibagi 12
                          (dua belas) yang berlaku pada tanggal dimulainya
                          penghitungan imbalan bunga. REPUBLIK INDONESIA - 664 -
