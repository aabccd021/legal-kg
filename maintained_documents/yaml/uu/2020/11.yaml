                                18. Ketentuan Pasal 42 diubah sehingga berbunyi
                                sebagai berikut: REPUBLIK INDONESIA - 237 -
                                Pasal 42 (1) Dalam hal akan menggunakan
                                bidang-bidang tanah negara, hak atas tanah,
                                tanah ulayat, dan/atau Kawasan Hutan di dalam
                                Wilayah Kerja, pemegang Perizinan Berusaha
                                terkait pemanfaatan langsung atau pemegang
                                Perizinan Berusaha terkait panas bumi harus
                                terlebih dahulu melakukan penyelesaian
                                penggunaan lahan dengan pemakai tanah di atas
                                tanah negara atau pemegang hak atau Perizinan
                                Berusaha di bidang kehutanan sesuai dengan
                                ketentuan peraturan perundang-undangan. (2)
                                Dalam hal Pemerintah Pusat melakukan Eksplorasi
                                untuk menetapkan Wilayah Kerja sebagaimana
                                dimaksud dalam Pasal 17 ayat (1), sebelum
                                melakukan Eksplorasi, Menteri melakukan
                                penyelesaian penggunaan lahan dengan pemakai
                                tanah di atas tanah negara atau pemegang hak
                                atau Perizinan Berusaha di bidang kehutanan
                                sesuai dengan ketentuan peraturan
                                perundang-undangan. (3) Penyelesaian sebagaimana
                                dimaksud pada ayat (l) dan ayat (2) dilakukan
                                secara musyawarah dan mufakat dengan cara jual
                                beli, tukar-menukar, ganti rugi yang layak,
                                pengakuan, atau bentuk penggantian lain kepada
                                pemakai tanah di atau tanah negara atau pemegang
                                hak. (4) Dalam hal kegiatan pengusahaan Panas
                                Bumi dilakukan oleh badan usaha milik negara
                                yang mendapat penugasan khusus dari Pemerintah,
                                penyediaan tanah dilakukan sesuai dengan
                                ketentuan peraturan perundang-undangan.
