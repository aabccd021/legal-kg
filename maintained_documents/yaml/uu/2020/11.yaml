                                      ditetapkan Pemerintah Pusat sebagai tempat
                                      badan usaha melakukan usaha distribusi
                                      dan/atau penjualan tenaga listrik.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
