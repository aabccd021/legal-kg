                                    _structureType: ayat
                              text: >-
                                Maksud dan tujuan investasi Pemerintah Pusat
                                sebagaimana dimaksud pada ayat (1) meliputi: a.
                                memperoleh manfaat ekonomi, manfaat sosial,
                                dan/atau manfaat lainnya yang ditetapkan
                                sebelumnya, REPUBLIK INDONESIA -735 - b.
                                memberikan sumbangan bagi perkembangan
                                perekonomian nasional pada umumnya dan
                                penerimaan negara pada khususnya, Cc. memperoleh
                                keuntungan, dan/atau d. menyelenggarakan
                                kemanfaatan umum, tetapi tidak terbatas pada
                                penciptaan lapangan kerja.
