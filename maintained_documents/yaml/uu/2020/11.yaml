                          relokasi. (3) Ganti Kerugian atas Objek Pengadaan
                          Tanah sebagaimana dimaksud pada ayat (1) huruf b dapat
                          diberikan dalam bentuk sebagaimana dimaksud dalam
                          Pasal 36. (4) Ganti Kerugian atas Objek Pengadaan
                          Tanah Kas Desa sebagaimana dimaksud pada ayat (1)
                          huruf c dapat diberikan dalam bentuk sebagaimana
                          dimaksud dalam Pasal 36. (5) Nilai Ganti Kerugian
                          sebagaimana dimaksud pada ayat (2), ayat (3), dan ayat
                          (4) didasarkan atas hasil penilaian Ganti Kerugian
                          sebagaimana dimaksud dalam Pasal 34 ayat (2). (6)
