        - _type: bagian
          _key: 2
          _judul: Bagian Kedua Kemudahan Proyek Strategis Nasional
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 173
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pemerintah Pusat atau Pemerintah Daerah sesuai dengan
                          kewenangannya berdasarkan norma, standar, prosedur,
                          dan kriteria yang ditetapkan oleh Pemerintah Pusat
                          bertanggung jawab dalam menyediakan lahan dan
                          Perizinan Berusaha bagi proyek strategis nasional dari
                          Pemerintah Pusat, Pemerintah Daerah, Badan Usaha Milik
                          Negara, atau Badan Usaha Milik Daerah.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal pengadaan tanah belum dapat dilaksanakan
                          oleh Pemerintah Pusat atau Pemerintah Daerah sesuai
                          dengan kewenangannya berdasarkan norma, standar,
                          prosedur, dan kriteria yang ditetapkan oleh Pemerintah
                          Pusat, pengadaan tanah untuk proyek strategis nasional
                          dapat dilakukan oleh badan usaha.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengadaan tanah untuk proyek strategis nasional
                          sebagaimana dimaksud pada ayat (1) dan ayat (2)
                          dilaksanakan dengan mempertimbangkan prinsip kemampuan
                          keuangan negara dan kesinambungan fiskal.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal pengadaan tanah sebagaimana dimaksud pada
                          ayat (2) dilakukan oleh badan usaha, mekanisme
                          pengadaan tanah dilaksanakan sesuai dengan ketentuan
                          peraturan perundang-undangan mengenai pengadaan tanah
                          untuk kepentingan umum.
                    - _type: ayat
                      _key: 5
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan lebih lanjut mengenai pengadaan tanah dan
                          Perizinan Berusaha bagi proyek strategis nasional
                          diatur dalam Peraturan Pemerintah.
  - _type: bab
    _key: 11
    _judul: PELAKSANAAN ADMINISTRASI PEMERINTAHAN UNTUK MENDUKUNG CIPTA KERJA
    isi:
      _type: bagians
      bagians:
        - _type: bagian
          _key: 1
          _judul: Bagian Kesatu Umum
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 174
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dengan berlakunya Undang-Undang ini, kewenangan menteri,
                    kepala lembaga, atau Pemerintah Daerah yang telah ditetapkan
                    dalam undang-undang untuk menjalankan atau membentuk
                    peraturan perundang-undangan harus dimaknai sebagai
