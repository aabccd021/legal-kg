                    - start: 87
                      end: 95
                      node:
                        _key: 1
                        parentPasal: *ref_111
                        _structureType: ayat
                  text: >-
                    Ketentuan lebih lanjut mengenai harmonisasi dan sinkronisasi
                    sebagaimana dimaksud pada ayat (1) dan ayat (2) diatur dalam
                    Peraturan Pemerintah.
        - _type: pasal
          _key: 182
          isi:
            _type: referenceText
            references: []
            text: >-
              Dalam rangka pembentukan Peraturan Pemerintah, Pemerintah Pusat
              dapat berkonsultasi dengan: a. Pimpinan Dewan Perwakilan Rakyat
              dan alat kelengkapan DPR yang menangani bidang legislasi: dan/atau
              b. Pimpinan Dewan Perwakilan Daerah dan alat kelengkapan DPD yang
              menangani bidang legislasi.
        - _type: pasal
          _key: 183
          isi:
            _type: referenceText
            references: []
            text: >-
              Pemerintah Pusat harus melaporkan pelaksanaan Undang- Undang ini
              kepada: a. Dewan Perwakilan Rakyat melalui alat kelengkapan yang
              menangani bidang legislasi, dan/atau REPUBLIK INDONESIA - 168 - b.
              Dewan Perwakilan Daerah melalui alat kelengkapan yang menangani
              bidang legislasi paling lama 1 (satu) tahun terhitung sejak
              Undang-Undang ini berlaku.
