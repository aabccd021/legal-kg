                                dengan pidana kurungan paling lama 1 (satu)
                                tahun atau denda paling banyak Rp100.000.000,00
                                (seratus juta rupiah).
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 162 diubah sehingga berbunyi
                                sebagai berikut:
                        documentNode:
                          _documentType: uu
                          nomor: 4
                          tahun: 2009
                    - _type: pasal
                      _key: 40
                      isi:
                        _type: amendPoints
                        description:
                          _type: referenceText
                          references: []
                          text: >-
                            Beberapa ketentuan dalam Undang-Undang Nomor 22
                            Tahun 2001 tentang Minyak dan Gas Bumi (Lembaran
                            Negara Republik Indonesia Tahun 2001 Nomor 136,
                            Tambahan Lembaran Negara Republik Indonesia Nomor
                            4152) diubah sebagai berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Minyak Bumi adalah hasil proses alami
                                      berupa hidrokarbon yang dalam kondisi
                                      tekanan dan temperatur atmosfer berupa
                                      fasa cair atau padat, termasuk aspal,
                                      lilin mineral atau ozokerit, dan bitumen
                                      yang diperoleh dari proses penambangan,
                                      tetapi tidak termasuk batubara atau
                                      endapan hidrokarbon lain yang berbentuk
                                      padat yang diperoleh dari kegiatan yang
                                      tidak berkaitan dengan kegiatan usaha
                                      Minyak dan Gas Bumi.
                                - _type: numPoint
                                  _key: '2'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Gas Bumi adalah hasil proses alami berupa
                                      hidrokarbon yang dalam kondisi tekanan dan
                                      temperatur atmosfer berupa fasa gas yang
                                      diperoleh dari proses penambangan Minyak
                                      dan Gas Bumi.
                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Minyak dan Gas Bumi adalah Minyak Bumi dan
                                      Gas Bumi.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Bahan Bakar Minyak adalah bahan bakar yang
                                      berasal dan/atau diolah dari Minyak Bumi.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kuasa Pertambangan adalah wewenang yang
                                      diberikan Negara kepada Pemerintah untuk
                                      menyelenggarakan kegiatan Eksplorasi dan
                                      Eksploitasi.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Survei Umum adalah kegiatan lapangan yang
                                      meliputi pengumpulan, analisis, dan
                                      penyajian data yang berhubungan dengan
                                      informasi kondisi geologi untuk
                                      memperkirakan letak dan potensi sumber
                                      daya Minyak dan Gas Bumi di luar Wilayah
                                      Kerja.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kegiatan Usaha Hulu adalah kegiatan usaha
                                      yang berintikan atau bertumpu pada
                                      kegiatan usaha Eksplorasi dan Eksploitasi.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Eksplorasi adalah kegiatan yang bertujuan
                                      memperoleh informasi mengenai kondisi
                                      geologi untuk menemukan dan memperoleh
                                      perkiraan cadangan Minyak dan Gas Bumi di
                                      Wilayah Kerja yang ditentukan.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Eksploitasi adalah rangkaian kegiatan yang
                                      bertujuan untuk menghasilkan Minyak dan
                                      Gas Bumi dari Wilayah Kerja yang
                                      ditentukan, yang terdiri atas pengeboran
                                      dan penyelesaian sumur, pembangunan sarana
                                      pengangkutan, penyimpanan, dan pengolahan
                                      untuk pemisahan dan pemurnian Minyak dan
                                      Gas Bumi di lapangan serta kegiatan lain
                                      yang mendukungnya.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kegiatan Usaha Hilir adalah kegiatan usaha
                                      yang berintikan atau bertumpu pada
                                      kegiatan usaha Pengolahan, Pengangkutan,
                                      Penyimpanan, dan/atau Niaga.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengolahan adalah kegiatan memurnikan,
                                      memperoleh bagian-bagian, mempertinggi
                                      mutu, dan mempertinggi nilai tambah Minyak
                                      Bumi dan/atau Gas Bumi, tetapi tidak
                                      termasuk pengolahan lapangan.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengangkutan adalah kegiatan pemindahan
                                      Minyak Bumi, Gas Bumi, dan/atau hasil
                                      olahannya dari Wilayah Kerja atau dari
                                      tempat penampungan dan Pengolahan,
                                      termasuk pengangkutan Gas Bumi melalui
                                      pipa transmisi dan distribusi.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penyimpanan adalah kegiatan penerimaan,
                                      pengumpulan, penampungan, dan pengeluaran
                                      Minyak Bumi dan/atau Gas Bumi.
                                - _type: numPoint
                                  _key: '14'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Niaga adalah kegiatan pembelian,
                                      penjualan, ekspor, impor Minyak Bumi
                                      dan/atau hasil olahannya, termasuk Niaga
                                      Gas Bumi melalui pipa.
                                - _type: numPoint
                                  _key: '15'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Wilayah Hukum Pertambangan Indonesia
                                      adalah seluruh wilayah daratan, perairan,
                                      dan landas kontinen Indonesia.
                                - _type: numPoint
                                  _key: '16'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Wilayah Kerja adalah daerah tertentu di
                                      dalam Wilayah Hukum Pertambangan Indonesia
                                      untuk pelaksanaan Eksplorasi dan
                                      Eksploitasi.
                                - _type: numPoint
                                  _key: '17'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Badan Usaha adalah perusahaan berbentuk
                                      badan hukum yang menjalankan jenis usaha
                                      bersifat tetap, terus-menerus dan
                                      didirikan sesuai dengan peraturan
                                      perundang-undangan yang berlaku serta
                                      bekerja dan berkedudukan dalam wilayah
                                      Negara Kesatuan Republik Indonesia.
                                - _type: numPoint
                                  _key: '18'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Bentuk Usaha Tetap adalah badan usaha yang
                                      didirikan dan berbadan hukum di luar
                                      wilayah Negara Kesatuan Republik Indonesia
                                      yang melakukan kegiatan di wilayah Negara
                                      Kesatuan Republik Indonesia dan wajib
                                      mematuhi peraturan perundang- undangan
                                      yang berlaku di Republik Indonesia.
                                - _type: numPoint
                                  _key: '19'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kontrak Kerja Sama adalah Kontrak Bagi
                                      Hasil atau bentuk kontrak kerja sama lain
                                      dalam kegiatan Eksplorasi dan Eksploitasi
                                      yang lebih menguntungkan Negara dan
                                      hasilnya dipergunakan untuk sebesar-besar
                                      kemakmuran rakyat.
                                - _type: numPoint
                                  _key: '20'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Izin Usaha adalah izin yang diberikan
                                      kepada Badan Usaha untuk melaksanakan
                                      Pengolahan, Pengangkutan, Penyimpanan,
                                      dan/atau Niaga dengan tujuan memperoleh
                                      keuntungan dan/atau laba.
                                - _type: numPoint
                                  _key: '21'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Pusat adalah Presiden Republik
                                      Indonesia yang memegang kekuasaan
                                      pemerintahan negara Republik Indonesia
                                      yang dibantu oleh Wakil Presiden dan
                                      menteri sebagaimana dimaksud dalam Undang-
                                      Undang Dasar Negara Republik Indonesia
                                      Tahun 1945.
                                - _type: numPoint
                                  _key: '22'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Daerah adalah kepala daerah
                                      sebagai unsur penyelenggara Pemerintahan
                                      Daerah yang memimpin pelaksanaan urusan
                                      pemerintahan yang menjadi kewenangan
                                      daerah otonom.
                                - _type: numPoint
                                  _key: '23'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: Dihapus.
                                - _type: numPoint
                                  _key: '24'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Badan Pengatur adalah suatu badan yang
                                      dibentuk untuk melakukan pengaturan dan
                                      pengawasan terhadap penyediaan dan
                                      pendistribusian Bahan Bakar Minyak dan Gas
