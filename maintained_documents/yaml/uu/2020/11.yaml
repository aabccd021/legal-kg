                              text: >-
                                1. Ketentuan Pasal 5 diubah sehingga berbunyi
                                sebagai berikut: Pasal 5 (1) Untuk mencapai
                                tujuan sebagaimana dimaksud dalam Pasal 4 ayat
                                (1) huruf a, Pemerintah Pusat memiliki
                                kewenangan: a. mengembangkan struktur usaha Jasa
                                Konstruksi: b. mengembangkan sistem persyaratan
                                usaha Jasa Konstruksi, Cc. menyelenggarakan
                                Perizinan Berusaha dalam rangka registrasi badan
                                usaha Jasa Konstruksi: d. menyelenggarakan
                                Perizinan Berusaha terkait Jasa Konstruksi: e.
                                menyelenggarakan pemberian lisensi bagi lembaga
                                yang melaksanakan sertifikasi badan usaha, f.
                                mengembangkan sistem rantai pasok Jasa
                                Konstruksi: g. mengembangkan sistem permodalan
                                dan sistem penjaminan usaha Jasa Konstruksi: h.
                                memberikan dukungan dan pelindungan bagi pelaku
                                usaha Jasa Konstruksi nasional dalam mengakses
                                pasar Jasa Konstruksi internasional, i.
                                mengembangkan sistem pengawasan tertib usaha
                                Jasa Konstruksi: J. menyelenggarakan penerbitan
                                Perizinan Berusaha dalam rangka penanaman modal
                                asing, k. menyelenggarakan pengawasan tertib
                                usaha Jasa Konstruksi asing dan Jasa Konstruksi
                                kualifikasi besar: l. menyelenggarakan
                                pengembangan layanan usaha Jasa Konstruksi:
                                REPUBLIK INDONESIA - 334 - m. mengumpulkan dan
                                mengembangkan sistem informasi yang terkait
                                dengan pasar Jasa Konstruksi di negara yang
                                potensial untuk pelaku usaha Jasa Konstruksi
                                nasional: n. mengembangkan sistem kemitraan
                                antara usaha Jasa Konstruksi nasional dan
                                internasional: O. menjamin terciptanya
                                persaingan yang sehat dalam pasar Jasa
                                Konstruksi: p. mengembangkan segmentasi pasar
                                Jasa Konstruksi nasional, d- memberikan
                                pelindungan hukum bagi pelaku usaha Jasa
                                Konstruksi nasional yang mengakses pasar Jasa
                                Konstruksi internasional, dan r.
                                menyelenggarakan registrasi pengalaman badan
                                usaha. (2) Untuk mencapai tujuan sebagaimana
                                dimaksud dalam Pasal 4 ayat (1) huruf b,
                                Pemerintah Pusat memiliki kewenangan: a.
                                mengembangkan sistem pemilihan Penyedia Jasa
                                dalam penyelenggaraan Jasa Konstruksi: b.
                                mengembangkan Kontrak Kerja Konstruksi yang
                                menjamin kesetaraan hak dan kewajiban antara
                                Pengguna Jasa dan Penyedia Jasa: Cc. mendorong
                                digunakannya alternatif penyelesaian sengketa
                                penyelenggaraan Jasa Konstruksi di luar
                                pengadilan: dan d. mengembangkan sistem kinerja
                                Penyedia Jasa dalam penyelenggaraan Jasa
                                Konstruksi. (3) Untuk mencapai tujuan
                                sebagaimana dimaksud dalam Pasal 4 ayat (1)
                                huruf c, Pemerintah Pusat memiliki kewenangan:
                                a. mengembangkan Standar Keamanan, Keselamatan,
                                Kesehatan, dan Keberlanjutan dalam
                                penyelenggaraan Jasa Konstruksi: REPUBLIK
                                INDONESIA - 335 - b. menyelenggarakan pengawasan
                                penerapan Standar Keamanan, Keselamatan,
                                Kesehatan, dan Keberlanjutan dalam
                                penyelenggaraan dan pemanfaatan Jasa Konstruksi
                                oleh badan usaha Jasa Konstruksi, Cc.
                                menyelenggarakan registrasi penilai ahli, dan d.
                                menetapkan penilai ahli yang teregistrasi dalam
                                hal terjadi Kegagalan Bangunan. (4) Untuk
                                mencapai tujuan sebagaimana dimaksud dalam Pasal
                                4 ayat (1) huruf d, Pemerintah Pusat memiliki
                                kewenangan: a. mengembangkan standar kompetensi
                                kerja dan pelatihan Jasa Konstruksi: b.
                                memberdayakan lembaga pendidikan dan pelatihan
                                kerja konstruksi nasional, Cc. menyelenggarakan
                                pelatihan tenaga kerja konstruksi strategis dan
