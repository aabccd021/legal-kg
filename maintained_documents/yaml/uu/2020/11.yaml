                          Indonesia adalah setiap warga negara Indonesia yang
                          akan, sedang, atau telah melakukan pekerjaan dengan
                          menerima upah di luar wilayah Republik Indonesia. 3.
                          Keluarga Pekerja Migran Indonesia adalah suami, istri,
                          anak, atau orang tua termasuk hubungan karena putusan
                          dan/atau penetapan pengadilan, baik yang berada di
                          Indonesia maupun yang tinggal bersama Pekerja Migran
                          Indonesia di luar negeri. REPUBLIK INDONESIA - 568 -
                          4. Pekerja Migran Indonesia Perseorangan adalah
                          Pekerja Migran Indonesia yang akan bekerja ke luar
                          negeri tanpa melalui pelaksana penempatan. 5.
                          Pelindungan Pekerja Migran Indonesia adalah segala
                          upaya untuk melindungi kepentingan Calon Pekerja
                          Migran Indonesia dan/atau Pekerja Migran Indonesia dan
                          keluarganya dalam mewujudkan terjaminnya pemenuhan
                          haknya dalam keseluruhan kegiatan sebelum bekerja,
                          selama bekerja, dan setelah bekerja dalam aspek hukum,
                          ekonomi, dan sosial. 6. Pelindungan Sebelum Bekerja
                          adalah keseluruhan aktivitas untuk memberikan
                          pelindungan sejak pendaftaran sampai pemberangkatan.
                          7. Pelindungan Selama Bekerja adalah keseluruhan
                          aktivitas untuk memberikan pelindungan selama Pekerja
                          Migran Indonesia dan anggota keluarganya berada di
                          luar negeri. 8. Pelindungan Setelah Bekerja: adalah
                          keseluruhan aktivitas untuk memberikan pelindungan
                          sejak Pekerja Migran Indonesia dan anggota keluarganya
                          tiba di debarkasi di Indonesia hingga kembali ke
                          daerah asal, termasuk pelayanan lanjutan menjadi
                          pekerja produktif. 9. Perusahaan Penempatan Pekerja
                          Migran Indonesia adalah badan usaha berbadan hukum
                          perseroan terbatas yang telah memperoleh izin tertulis
                          dari Pemerintah Pusat untuk menyelenggarakan pelayanan
                          penempatan Pekerja Migran Indonesia. 10. Mitra Usaha
                          adalah instansi dan/atau badan usaha berbentuk badan
                          hukum di negara tujuan penempatan yang bertanggung
                          jawab menempatkan Pekerja Migran Indonesia pada
                          pemberi kerja. 11. Pemberi Kerja adalah instansi
                          pemerintah, badan hukum pemerintah, badan hukum
                          swasta, dan/atau perseorangan di negara tujuan
                          penempatan yang mempekerjakan Pekerja Migran
                          Indonesia. REPUBLIK INDONESIA - 569 - 12. Perjanjian
                          Kerja Sama Penempatan adalah perjanjian tertulis
                          antara Perusahaan Penempatan Pekerja Migran Indonesia
                          dan Mitra Usaha atau Pemberi Kerja yang memuat hak dan
                          kewajiban setiap pihak dalam rangka penempatan dan
                          Pelindungan Pekerja Migran Indonesia di negara tujuan
                          penempatan. 13. Perjanjian Penempatan Pekerja Migran
                          Indonesia yang selanjutnya disebut Perjanjian
                          Penempatan adalah perjanjian tertulis antara pelaksana
                          penempatan Pekerja Migran Indonesia dan Calon Pekerja
                          Migran Indonesia yang memuat hak dan kewajiban setiap
                          pihak, dalam rangka penempatan Pekerja Migran
                          Indonesia di negara tujuan penempatan sesuai dengan
                          ketentuan peraturan perundang-undangan. 14. Perjanjian
                          Kerja adalah perjanjian tertulis antara Pekerja Migran
                          Indonesia dan Pemberi Kerja yang memuat syarat kerja,
                          hak, dan kewajiban setiap pihak, serta jaminan
                          keamanan dan keselamatan selama bekerja sesuai dengan
                          ketentuan peraturan perundang-undangan. 15. Visa Kerja
                          adalah izin tertulis yang diberikan oleh pejabat yang
                          berwenang di suatu negara tujuan penempatan yang
                          memuat persetujuan untuk masuk dan melakukan pekerjaan
                          di negara yang bersangkutan. 16. Surat Izin Perusahaan
                          Penempatan Pekerja Migran Indonesia yang selanjutnya
                          disebut SIP3MI adalah izin tertulis yang diberikan
                          oleh Pemerintah Pusat kepada badan usaha berbadan
                          hukum Indonesia yang akan menjadi Perusahaan
                          Penempatan Pekerja Migran Indonesia. 17. Surat Izin
                          Perekrutan Pekerja Migran Indonesia yang selanjutnya
                          disebut SIP2MI adalah izin yang diberikan oleh kepala
                          Badan kepada Perusahaan Penempatan Pekerja Migran
                          Indonesia yang digunakan untuk menempatkan Calon
                          Pekerja Migran Indonesia. 18. Jaminan Sosial adalah
                          salah satu bentuk pelindungan sosial untuk menjamin
                          seluruh rakyat agar dapat memenuhi kebutuhan dasar
                          hidupnya yang layak. REPUBLIK INDONESIA - 570 - 19.
                          Orang adalah orang perseorangan dan/atau korporasi.
                          20. Badan Penyelenggara Jaminan Sosial adalah badan
                          hukum yang menyelenggarakan program Jaminan Sosial
                          Pekerja Migran Indonesia. 21. Pemerintah Pusat adalah
                          Presiden Republik Indonesia yang memegang kekuasaan
                          pemerintahan negara Republik Indonesia yang dibantu
                          oleh Wakil Presiden dan menteri sebagaimana dimaksud
                          dalam Undang- Undang Dasar Negara Republik Indonesia
                          Tahun 1945. 22. Pemerintah Daerah adalah kepala daerah
                          sebagai unsur penyelenggara pemerintahan daerah yang
                          memimpin pelaksanaan urusan pemerintahan yang menjadi
                          kewenangan daerah otonom. 23. Pemerintah Desa adalah
                          kepala desa atau yang disebut dengan nama lain dibantu
                          perangkat desa sebagai unsur penyelenggara
                          pemerintahan desa. 24. Perwakilan Republik Indonesia
                          di Luar Negeri yang selanjutnya disebut Perwakilan
                          Republik Indonesia adalah perwakilan diplomatik dan
                          perwakilan konsuler Republik Indonesia yang secara
                          resmi mewakili dan memperjuangkan kepentingan bangsa,
                          negara, dan pemerintah Republik Indonesia secara
                          keseluruhan di negara tujuan penempatan atau pada
                          organisasi internasional. 25. Menteri adalah menteri
                          yang menyelenggarakan urusan pemerintahan di bidang
                          ketenagakerjaan. 26. Badan adalah lembaga pemerintah
                          nonkementerian yang bertugas sebagai pelaksana
                          kebijakan dalam pelayanan dan Pelindungan Pekerja
                          Migran Indonesia secara terpadu.
