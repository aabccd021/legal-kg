                          ketentuan yang diatur dalam: a. Undang-Undang Nomor 39
                          Tahun 2014 tentang Perkebunan (Lembaran Negara
                          Republik Indonesia Tahun 2014 Nomor 308, Tambahan
                          Lembaran Negara Republik Indonesia Nomor 5613), b.
                          Undang-Undang Nomor 29 Tahun 2000 tentang Perlindungan
                          Varietas Tanaman (Lembaran Negara Republik Indonesia
                          Tahun 2000 Nomor 241, Tambahan Lembaran Negara
                          Republik Indonesia Nomor 4043), REPUBLIK INDONESIA -
                          146 - c. Undang-Undang Nomor 22 Tahun 2019 tentang
                          Sistem Budi Daya Pertanian Berkelanjutan (Lembaran
                          Negara Republik Indonesia Tahun 2019 Nomor 201,
                          Tambahan Lembaran Negara Republik Indonesia Nomor
                          6412): d. Undang-Undang Nomor 19 Tahun 2013 tentang
                          Perlindungan dan Pemberdayaan Petani (Lembaran Negara
                          Republik Indonesia Tahun 2013 Nomor 131, Tambahan
                          Lembaran Negara Republik Indonesia Nomor 5433), e.
                          Undang-Undang Nomor 13 Tahun 2010 tentang Hortikultura
                          (Lembaran Negara Republik Indonesia Tahun 2010 Nomor
                          132, Tambahan Lembaran Negara Republik Indonesia Nomor
                          5170): dan f. Undang-Undang Nomor 18 Tahun 2009
                          tentang Peternakan dan Kesehatan Hewan (Lembaran
