                              _structureType: pasal
                        text: >-
                          1. Ketentuan Pasal 1 angka 1 diubah sehingga berbunyi
                          sebagai berikut: Pasal 1 Dalam Undang-Undang ini yang
                          dimaksud dengan: 1. Perseroan Terbatas, yang
                          selanjutnya disebut Perseroan, adalah badan hukum yang
                          merupakan persekutuan modal, didirikan berdasarkan
                          perjanjian, melakukan kegiatan usaha dengan modal
                          dasar yang seluruhnya terbagi dalam saham atau Badan
                          Hukum perorangan yang memenuhi kriteria Usaha Mikro
                          dan Kecil sebagaimana diatur dalam peraturan
                          perundang- undangan mengenai Usaha Mikro dan Kecil. 2.
                          Organ Perseroan adalah Rapat Umum Pemegang Saham,
                          Direksi, dan Dewan Komisaris. 3. Tanggung Jawab Sosial
                          dan Lingkungan adalah komitmen Perseroan untuk
                          berperan serta dalam pembangunan ekonomi berkelanjutan
                          guna meningkatkan kualitas kehidupan dan lingkungan
                          yang bermanfaat, baik bagi Perseroan sendiri,
                          komunitas setempat, maupun masyarakat pada umumnya.
                          REPUBLIK INDONESIA - 609 - 4. Rapat Umum Pemegang
                          Saham, yang selanjutnya disebut RUPS, adalah Organ
                          Perseroan yang mempunyai wewenang yang tidak diberikan
                          kepada Direksi atau Dewan Komisaris dalam batas yang
                          ditentukan dalam undang-undang ini dan/atau anggaran
                          dasar. S5. Direksi adalah Organ Perseroan yang
                          berwenang dan bertanggung jawab penuh atas pengurusan
                          Perseroan untuk kepentingan Perseroan, sesuai dengan
                          maksud dan tujuan Perseroan serta mewakili Perseroan,
                          baik di dalam maupun di luar pengadilan sesuai dengan
                          ketentuan anggaran dasar. 6. Dewan Komisaris adalah
                          Organ Perseroan yang bertugas melakukan pengawasan
                          secara umum dan/atau khusus sesuai dengan anggaran
                          dasar serta memberi nasihat kepada Direksi. 7.
                          Perseroan Terbuka adalah Perseroan Publik atau
                          Perseroan yang melakukan penawaran umum saham, sesuai
                          dengan ketentuan peraturan perundang- undangan di
                          bidang pasar modal. 8. Perseroan Publik adalah
                          Perseroan yang memenuhi kriteria jumlah pemegang saham
                          dan modal disetor sesuai dengan ketentuan peraturan
                          perundang- undangan di bidang pasar modal. 9.
                          Penggabungan adalah perbuatan hukum yang dilakukan
                          oleh satu Perseroan atau lebih untuk menggabungkan
                          diri dengan Perseroan lain yang telah ada yang
                          mengakibatkan aktiva dan pasiva dari Perseroan yang
                          menggabungkan diri beralih karena hukum kepada
                          Perseroan yang menerima penggabungan dan selanjutnya
                          status badan hukum Perseroan yang menggabungkan diri
                          berakhir karena hukum. 10. Peleburan adalah perbuatan
                          hukum yang dilakukan oleh dua Perseroan atau lebih
                          untuk meleburkan diri dengan cara mendirikan satu
                          Perseroan baru yang karena hukum memperoleh aktiva dan
                          pasiva dari Perseroan yang meleburkan diri dan status
                          badan hukum Perseroan yang meleburkan diri berakhir
                          karena hukum. REPUBLIK INDONESIA - 610 - 11.
                          Pengambilalihan adalah perbuatan hukum yang dilakukan
                          oleh badan hukum atau orang perseorangan untuk
                          mengambil alih saham Perseroan yang mengakibatkan
                          beralihnya pengendalian atas Perseroan tersebut. 12.
                          Pemisahan adalah perbuatan hukum yang dilakukan oleh
                          Perseroan untuk memisahkan usaha yang mengakibatkan
                          seluruh aktiva dan pasiva Perseroan beralih karena
                          hukum kepada 2 (dua) Perseroan atau lebih atau
                          sebagian aktiva dan pasiva Perseroan beralih karena
                          hukum kepada 1 (satu) Perseroan atau lebih. 13. Surat
                          Tercatat adalah surat yang dialamatkan kepada penerima
                          dan dapat dibuktikan dengan tanda terima dari penerima
                          yang ditandatangani dengan menyebutkan tanggal
                          penerimaan. 14. Surat Kabar adalah surat kabar harian
                          berbahasa Indonesia yang beredar secara nasional. 15.
                          Hari adalah hari kalender. 16. Menteri adalah Menteri
                          yang tugas dan tanggung jawabnya di bidang hukum dan
                          hak asasi manusia.
