                                    _structureType: pasal
                              text: >-
                                1. Ketentuan Pasal 1 angka 11, angka 12, angka
                                35, angka 36, angka 37, dan angka 38 diubah
                                sehingga Pasal 1 berbunyi sebagai berikut: Pasal
                                1 Dalam Undang-Undang ini yang dimaksud dengan:
                                1. Lingkungan hidup adalah kesatuan ruang dengan
                                semua benda, daya, keadaan, dan makhluk hidup,
                                termasuk manusia dan perilakunya, yang
                                mempengaruhi alam itu sendiri, kelangsungan
                                perikehidupan, dan kesejahteraan manusia serta
                                makhluk hidup lain. 2. Perlindungan dan
                                pengelolaan lingkungan hidup adalah upaya
                                sistematis dan terpadu yang dilakukan untuk
                                melestarikan fungsi lingkungan hidup dan
                                mencegah terjadinya pencemaran dan/atau
                                kerusakan lingkungan hidup yang meliputi
                                perencanaan, pemanfaatan, pengendalian,
                                pemeliharaan, pengawasan, dan penegakan hukum.
                                REPUBLIK INDONESIA -74 - 3. Pembangunan
                                berkelanjutan adalah upaya sadar dan terencana
                                yang memadukan aspek lingkungan hidup, sosial,
                                dan ekonomi ke dalam strategi pembangunan untuk
                                menjamin keutuhan lingkungan hidup serta
                                keselamatan, kemampuan, kesejahteraan, dan mutu
                                hidup generasi masa kini dan generasi masa
                                depan. 4. Rencana perlindungan dan pengelolaan
                                lingkungan hidup yang selanjutnya disingkat
                                RPPLH adalah perencanaan tertulis yang memuat
                                potensi, masalah lingkungan hidup, serta upaya
                                perlindungan dan pengelolaannya dalam kurun
                                waktu tertentu. 5. Ekosistem adalah tatanan
                                unsur lingkungan hidup yang merupakan kesatuan
                                utuh-menyeluruh dan saling mempengaruhi dalam
                                membentuk keseimbangan, stabilitas, dan
                                produktivitas lingkungan hidup. 6. Pelestarian
                                fungsi lingkungan hidup adalah rangkaian upaya
                                untuk memelihara kelangsungan daya dukung dan
                                daya tampung lingkungan hidup. 7. Daya dukung
                                lingkungan hidup adalah kemampuan lingkungan
                                hidup untuk mendukung perikehidupan manusia,
                                makhluk hidup lain, dan keseimbangan
                                antarkeduanya. 8. Daya tampung lingkungan hidup
                                adalah kemampuan lngkungan hidup untuk menyerap
                                zat, energi, dan/atau komponen lain yang masuk
                                atau dimasukkan ke dalamnya. 0. Sumber daya alam
                                adalah unsur lingkungan hidup yang terdiri atas
                                sumber daya hayati dan nonhayati yang secara
                                keseluruhan membentuk kesatuan ekosistem. 10.
                                Kajian lingkungan hidup strategis yang
                                selanjutnya disingkat KLHS adalah rangkaian
                                analisis yang sistematis, menyeluruh, dan
                                partisipatif untuk memastikan bahwa prinsip
                                pembangunan berkelanjutan telah menjadi dasar
                                dan terintegrasi dalam pembangunan suatu wilayah
                                dan/atau kebijakan, rencana, dan/atau program.
                                REPUBLIK INDONESIA - 75 - 11. Analisis mengenai
                                dampak lingkungan hidup yang selanjutnya disebut
                                Amdal adalah Kajian mengenai dampak penting pada
                                lingkungan hidup dari suatu usaha dan/atau
                                kegiatan yang direncanakan, untuk digunakan
                                sebagai prasyarat pengambilan keputusan tentang
                                penyelenggaraan usaha dan/atau kegiatan serta
                                termuat dalam Perizinan Berusaha, atau
                                persetujuan Pemerintah Pusat atau Pemerintah
                                Daerah. 12. Upaya pengelolaan lingkungan hidup
                                dan upaya pemantauan lingkungan hidup yang
                                selanjutnya disebut UKL-UPL adalah rangkaian
                                proses pengelolaan dan pemantauan lingkungan
                                hidup yang dituangkan dalam bentuk standar untuk
                                digunakan sebagai prasyarat pengambilan
                                keputusan serta termuat dalam Perizinan
                                Berusaha, atau persetujuan Pemerintah Pusat atau
                                Pemerintah Daerah. 13. Baku mutu lingkungan
                                hidup adalah ukuran batas atau kadar makhluk
                                hidup, zat, energi, atau komponen yang ada atau
                                harus ada dan/atau unsur pencemar yang
                                ditenggang keberadaannya dalam suatu sumber daya
                                tertentu sebagai unsur lingkungan hidup. 14.
                                Pencemaran lingkungan hidup adalah masuk atau
                                dimasukkannya makhluk hidup, zat, energi,
                                dan/atau komponen lain ke dalam lingkungan hidup
                                oleh kegiatan manusia sehingga melampaui baku
                                mutu lingkungan hidup yang telah ditetapkan. 15.
                                Kriteria baku kerusakan lingkungan hidup adalah
                                ukuran batas perubahan sifat fisik, kimia,
                                dan/atau hayati lingkungan hidup yang dapat
                                ditenggang oleh llngkungan hidup untuk dapat
                                tetap melestarikan fungsinya. 16. Perusakan
                                lingkungan hidup adalah tindakan orang yang
                                menimbulkan perubahan langsung atau tidak
                                langsung terhadap sifat fisik, kimia, dan/atau
                                hayati lingkungan hidup sehingga melampaui
                                kriteria baku kerusakan lingkungan hidup.
                                REPUBLIK INDONESIA - 76 - 17. Kerusakan
                                lingkungan hidup adalah perubahan langsung
                                dan/atau tidak langsung terhadap sifat fisik,
                                kimia, dan/atau hayati lingkungan hidup yang
                                melampaui kriteria baku kerusakan lingkungan
                                hidup. 18. Konservasi sumber daya alam adalah
                                pengelolaan sumber daya alam untuk menjamin
                                pemanfaatannya secara bijaksana serta
                                kesinambungan ketersediaannya dengan tetap
                                memelihara dan meningkatkan kualitas nilai serta
                                keanekaragamannya. 19. Perubahan iklim adalah
                                berubahnya iklim yang diakibatkan langsung atau
                                tidak langsung oleh aktivitas manusia sehingga
                                menyebabkan perubahan komposisi atmosfir secara
                                global dan selain itu juga berupa perubahan
                                variabilitas iklim alamiah yang teramati pada
                                kurun waktu yang dapat dibandingkan. 20. Limbah
                                adalah sisa suatu usaha dan/atau kegiatan. 21.
                                Bahan berbahaya dan beracun yang selanjutnya
                                disingkat B3 adalah zat, energi, dan/atau
                                komponen lan yang karena sifat, konsentrasi,
                                dan/atau jumlahnya, baik secara langsung maupun
                                tidak langsung, dapat mencemarkan dan/atau
                                merusak lingkungan hidup, dan/atau membahayakan
                                lingkungan hidup, kesehatan, serta kelangsungan
                                hidup manusia dan makhluk hidup lain. 22. Limbah
                                bahan berbahaya dan beracun yang selanjutnya
                                disebut Limbah B3 adalah sisa suatu usaha
                                dan/atau kegiatan yang mengandung B3. 23.
                                Pengelolaan limbah B3 adalah kegiatan yang
                                meliputi pengurangan, penyimpanan, pengumpulan,
                                pengangkutan, pemanfaatan, pengolahan, dan/atau
                                penimbunan. 24. Dumping (pembuangan) adalah
                                kegiatan membuang, menempatkan, dan/atau
                                memasukkan limbah dan/atau bahan dalam jumlah,
                                konsentrasi, waktu, dan lokasi tertentu dengan
                                persyaratan tertentu ke media lingkungan hidup
                                tertentu. REPUBLIK INDONESIA - 77 - 25. Sengketa
                                lingkungan hidup adalah perselisihan antara dua
                                pihak atau lebih yang timbul dari kegiatan yang
                                berpotensi dan/atau telah berdampak pada
                                lingkungan hidup. 26. Dampak lingkungan hidup
                                adalah pengaruh perubahan pada lingkungan hidup
                                yang diakibatkan oleh suatu usaha dan/atau
                                kegiatan. 27. Organisasi lingkungan hidup adalah
                                kelompok orang yang terorganisasi dan terbentuk
                                atas kehendak sendiri yang tujuan dan
                                kegiatannya berkaitan dengan lingkungan hidup.
                                28. Audit lingkungan hidup adalah evaluasi yang
                                dilakukan untuk menilai ketaatan penanggung
                                jawab usaha dan/atau kegiatan terhadap
                                persyaratan hukum dan kebijakan yang ditetapkan
                                oleh pemerintah. 29. Ekoregion adalah wilayah
                                geografis yang memiliki kesamaan ciri iklim,
                                tanah, air, flora, dan fauna asli, serta pola
                                interaksi manusia dengan alam yang menggambarkan
                                integritas sistem alam dan lingkungan hidup. 30.
                                Kearifan lokal adalah nilai-nilai luhur yang
                                berlaku dalam tata kehidupan masyarakat untuk
                                antara lain melindungi dan mengelola lingkungan
                                hidup secara lestari. 31. Masyarakat hukum adat
                                adalah kelompok masyarakat yang secara turun
                                temurun bermukim di wilayah geografis tertentu
                                karena adanya ikatan pada asal usul leluhur,
                                adanya hubungan yang kuat dengan lingkungan
                                hidup, serta adanya sistem nilai yang menentukan
                                pranata ekonomi, politik, sosial, dan hukum. 32.
                                Setiap orang adalah orang perseorangan atau
                                badan usaha, baik yang berbadan hukum maupun
                                yang tidak berbadan hukum. 33. Instrumen ekonomi
                                lingkungan hidup adalah seperangkat kebijakan
                                ekonomi untuk mendorong Pemerintah, pemerintah
                                daerah, atau setiap orang ke arah pelestarian
                                fungsi lingkungan hidup. REPUBLIK INDONESIA -78
                                - 34. Ancaman serius adalah ancaman yang
                                berdampak luas terhadap lingkungan hidup dan
                                menimbulkan keresahan masyarakat. 35.
                                Persetujuan Lingkungan adalah Keputusan
                                Kelayakan Lingkungan Hidup atau Pernyataan
                                Kesanggupan Pengelolaan Lingkungan Hidup yang
                                telah mendapatkan persetujuan dari Pemerintah
                                Pusat atau Pemerintah Daerah. 36. Pemerintah
                                Pusat adalah Presiden Republik Indonesia yang
                                memegang kekuasaan pemerintahan negara Republik
                                Indonesia yang dibantu oleh Wakil Presiden dan
                                menteri sebagaimana dimaksud dalam Undang-
                                Undang Dasar Negara Republik Indonesia Tahun
                                1945. 37. Pemerintah Daerah adalah kepala daerah
                                sebagai unsur penyelenggara Pemerintahan Daerah
                                yang memimpin pelaksanaan urusan pemerintahan
                                yang menjadi kewenangan daerah otonom. 38.
                                Menteri adalah menteri yang menyelenggarakan
                                urusan pemerintahan di bidang perlindungan dan
                                pengelolaan lingkungan hidup.
