        - _type: bagian
          _key: 2
          _judul: Bagian Kedua Keimigrasian
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 106
                isi:
                  _type: amendPoints
                  description:
                    _type: referenceText
                    references: []
                    text: >-
                      Beberapa ketentuan dalam Undang-Undang Nomor 6 Tahun 2011
                      tentang Keimigrasian (Lembaran Negara Republik Indonesia
                      Tahun 2011 Nomor 52, Tambahan Lembaran Negara Republik
                      Indonesia Nomor 5216) diubah sebagai berikut:
                  isi:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 1
                      _pasalKey: '1'
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                        isi:
                          - _type: numPoint
                            _key: '1'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Keimigrasian adalah hal ihwal lalu lintas orang
                                yang masuk atau keluar Wilayah Indonesia serta
                                pengawasannya dalam rangka menjaga tegaknya
                                kedaulatan negara.
                          - _type: numPoint
                            _key: '2'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Wilayah Negara Republik Indonesia yang
                                selanjutnya disebut Wilayah Indonesia adalah
                                seluruh wilayah Indonesia serta zona tertentu
                                yang ditetapkan berdasarkan undang-undang.
                          - _type: numPoint
                            _key: '3'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Fungsi Keimigrasian adalah bagian dari urusan
                                pemerintahan negara dalam memberikan pelayanan
                                Keimigrasian, penegakan hukum, keamanan negara,
                                dan fasilitator pembangunan kesejahteraan
                                masyarakat.
                          - _type: numPoint
                            _key: '4'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Menteri adalah menteri yang menyelenggarakan
                                urusan pemerintahan di bidang hukum dan hak
                                asasi manusia.
                          - _type: numPoint
                            _key: '5'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Direktur Jenderal adalah Direktur Jenderal
                                Imigrasi.
                          - _type: numPoint
                            _key: '6'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Direktorat Jenderal Imigrasi adalah unsur
                                pelaksana tugas dan fungsi Kementerian Hukum dan
                                Hak Asasi Manusia di bidang Keimigrasian.
                          - _type: numPoint
                            _key: '7'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pejabat Imigrasi adalah pegawai yang telah
                                melalui pendidikan khusus Keimigrasian dan
                                memiliki keahlian teknis Keimigrasian serta
                                memiliki wewenang untuk melaksanakan tugas dan
                                tanggung jawab berdasarkan Undang-Undang ini.
                          - _type: numPoint
                            _key: '8'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penyidik Pegawai Negeri Sipil Keimigrasian yang
                                selanjutnya disebut dengan PPNS Keimigrasian
                                adalah Pejabat Imigrasi yang diberi wewenang
                                oleh undang-undang untuk melakukan penyidikan
                                tindak pidana Keimigrasian.
                          - _type: numPoint
                            _key: '9'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Orang Asing adalah orang yang bukan warga negara
                                Indonesia.
                          - _type: numPoint
                            _key: '10'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Sistem Informasi Manajemen Keimigrasian adalah
                                sistem teknologi informasi dan komunikasi yang
                                digunakan untuk mengumpulkan, mengolah, dan
                                menyajikan informasi guna mendukung operasional,
                                manajemen, dan pengambilan keputusan dalam
                                melaksanakan Fungsi Keimigrasian.
                          - _type: numPoint
                            _key: '11'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Kantor Imigrasi adalah unit pelaksana teknis
                                yang menjalankan Fungsi Keimigrasian di daerah
                                kabupaten, kota, atau kecamatan.
                          - _type: numPoint
                            _key: '12'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Tempat Pemeriksaan Imigrasi adalah tempat
                                pemeriksaan di pelabuhan laut, bandar udara, pos
                                lintas batas, atau tempat lain sebagai tempat
                                masuk dan keluar Wilayah Indonesia.
                          - _type: numPoint
                            _key: '13'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dokumen Perjalanan adalah dokumen resmi yang
                                dikeluarkan oleh pejabat yang berwenang dari
                                suatu negara, Perserikatan Bangsa-Bangsa, atau
                                organisasi internasional lainnya untuk melakukan
                                perjalanan antarnegara yang memuat identitas
                                pemegangnya.
                          - _type: numPoint
                            _key: '14'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dokumen Keimigrasian adalah Dokumen Perjalanan
                                Republik Indonesia dan Izin Tinggal yang
                                dikeluarkan oleh Pejabat Imigrasi atau pejabat
                                dinas luar negeri.
                          - _type: numPoint
                            _key: '15'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dokumen Perjalanan Republik Indonesia adalah
                                Paspor Republik Indonesia dan Surat Perjalanan
                                Laksana Paspor Republik Indonesia.
                          - _type: numPoint
                            _key: '16'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Paspor Republik Indonesia yang selanjutnya
                                disebut Paspor adalah dokumen yang dikeluarkan
                                oleh Pemerintah Republik Indonesia kepada warga
                                negara Indonesia untuk melakukan perjalanan
                                antarnegara yang berlaku selama jangka waktu
                                tertentu.
                          - _type: numPoint
                            _key: '17'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Surat Perjalanan Laksana Paspor Republik
                                Indonesia yang selanjutnya disebut Surat
                                Perjalanan Laksana Paspor adalah dokumen
                                pengganti paspor yang diberikan dalam keadaan
                                tertentu yang berlaku selama jangka waktu
                                tertentu.
                          - _type: numPoint
                            _key: '18'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Visa Republik Indonesia yang selanjutnya disebut
                                Visa adalah keterangan tertulis, baik secara
                                manual maupun elektronik yang diberikan oleh
                                pejabat yang berwenang untuk melakukan
                                perjalanan ke Wilayah Indonesia dan menjadi
                                dasar untuk pemberian Izin Tinggal.
                          - _type: numPoint
                            _key: '19'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Tanda Masuk adalah tanda tertentu berupa cap
                                yang dibubuhkan pada Dokumen Perjalanan warga
                                negara Indonesia dan Orang Asing, baik manual
                                maupun elektronik, yang diberikan oleh Pejabat
                                Imigrasi sebagai tanda bahwa yang bersangkutan
                                masuk Wilayah Indonesia.
                          - _type: numPoint
                            _key: '20'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Tanda Keluar adalah tanda tertentu berupa cap
                                yang dibubuhkan pada Dokumen Perjalanan warga
                                negara Indonesia dan Orang Asing, baik manual
                                maupun elektronik, yang diberikan oleh Pejabat
                                Imigrasi sebagai tanda bahwa yang bersangkutan
                                keluar Wilayah Indonesia.
                          - _type: numPoint
                            _key: '21'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Izin Tinggal adalah izin yang diberikan kepada
                                Orang Asing oleh Pejabat Imigrasi atau pejabat
                                dinas luar negeri baik secara manual maupun
                                elektronik untuk berada di Wilayah Indonesia. SK
                                No 052097 A
                          - _type: numPoint
                            _key: '22'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pernyataan Integrasi adalah pernyataan Orang
                                Asing kepada Pemerintah Republik Indonesia
                                sebagai salah satu syarat memperoleh Izin
                                Tinggal Tetap.
                          - _type: numPoint
                            _key: '23'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Izin Tinggal Tetap adalah izin yang diberikan
                                kepada Orang Asing tertentu untuk bertempat
                                tinggal dan menetap di Wilayah Indonesia sebagai
                                penduduk Indonesia.
                          - _type: numPoint
                            _key: '24'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Izin Masuk Kembali adalah izin tertulis yang
                                diberikan oleh Pejabat Imigrasi kepada Orang
                                Asing pemegang Izin Tinggal terbatas dan Izin
                                Tinggal Tetap untuk masuk kembali ke Wilayah
                                Indonesia.
                          - _type: numPoint
