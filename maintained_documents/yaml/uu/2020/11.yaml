                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal untuk kepentingan umum dan/atau Proyek
                                Strategis Nasional, Lahan Pertanian Pangan
                                Berkelanjutan sebagaimana dimaksud pada ayat (1)
                                dapat dialihfungsikan dan dilaksanakan sesuai
                                dengan ketentuan peraturan perundang-undangan.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Pengalihfungsian Lahan yang sudah ditetapkan
                                  sebagai Lahan Pertanian Pangan Berkelanjutan
                                  untuk kepentingan umum sebagaimana dimaksud
                                  pada ayat (2) hanya dapat dilakukan dengan
                                  syarat:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: dilakukan kajian kelayakan strategis,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: disusun rencana alih fungsi lahan,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      dibebaskan kepemilikan haknya dari
                                      pemilik, dan
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      disediakan lahan pengganti terhadap Lahan
                                      Pertanian Pangan Berkelanjutan yang
                                      dialihfungsikan.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal terjadi bencana sehingga pengalihan
