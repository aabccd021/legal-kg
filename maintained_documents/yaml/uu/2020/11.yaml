                          - _type: ayat
                            _key: 5
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Dalam rangka pengangkatan anggota Dewan
                                  Direktur untuk pertama kali, Dewan Pengawas
                                  menetapkan masa jabatan 5 (lima) anggota Dewan
                                  Direktur sebagai berikut:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      2 (dua) anggota diangkat untuk masa
                                      jabatan 5 (lima) tahun,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      2 (dua) anggota diangkat untuk masa
                                      jabatan 4 (empat) tahun, dan
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      1 (satu) anggota diangkat untuk masa
                                      jabatan 3 (tiga) tahun.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dewan Direktur sebagaimana dimaksud pada ayat
                                (1) bertugas untuk menyelenggarakan pengurusan
                                operasional Lembaga Pengelola Investasi.
                          - _type: ayat
                            _key: 7
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Dalam menjalankan tugas sebagaimana dimaksud
                                  pada ayat (6), Dewan Direktur berwenang:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      merumuskan dan menetapkan kebijakan
                                      lembaga,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      melaksanakan kebijakan dan pengurusan
                                      operasional lembaga,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menyusun dan mengusulkan remunerasi Dewan
                                      Pengawas dan Dewan Direktur kepada Dewan
                                      Pengawas,
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menyusun dan mengusulkan rencana kerja dan
                                      anggaran tahunan beserta indikator kinerja
                                      utama (key performance indicator) kepada
                                      Dewan Pengawas,
                                - _type: alphaPoint
                                  _key: e
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menyusun struktur organisasi lembaga dan
                                      menyelenggarakan manajemen kepegawaian
                                      termasuk pengangkatan, pemberhentian,
                                      sistem penggajian, remunerasi penghargaan,
                                      program pensiun dan tunjangan hari tua,
                                      serta penghasilan lainnya bagi pegawai
                                      Lembaga Pengelola Investasi, dan
                                - _type: alphaPoint
                                  _key: f
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      mewakili Lembaga Pengelola Investasi di
                                      dalam dan di luar pengadilan.
                          - _type: ayat
                            _key: 8
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dewan Direktur dapat mendelegasikan tugas
                                dan/atau wewenang pelaksanaan operasional
                                Lembaga Pengelola Investasi kepada pegawai
                                Lembaga Pengelola Investasi dan/atau pihak lain
                                yang khusus ditunjuk untuk itu.
                          - _type: ayat
                            _key: 9
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pembidangan setiap anggota Dewan Direktur
                                ditetapkan oleh Dewan Direktur.
                    - _type: pasal
                      _key: 168
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Untuk dapat diangkat sebagai anggota Dewan Pengawas
                            dari unsur profesional dan anggota Dewan Direktur,
                            calon anggota Dewan Pengawas dari unsur profesional
                            dan calon anggota Dewan Direktur harus memenuhi
                            persyaratan:
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: warga negara Indonesia,
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: mampu melakukan perbuatan hukum,
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: . sehat jasmani dan rohani,
                          - _type: alphaPoint
                            _key: d
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                berusia paling tinggi 65 (enam puluh lima) tahun
                                pada saat pengangkatan pertama,
                          - _type: alphaPoint
                            _key: e
                            isi:
                              _type: referenceText
                              references: []
                              text: bukan pengurus dan/atau anggota partai politik,
                          - _type: alphaPoint
                            _key: f
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                memiliki pengalaman dan/atau keahlian di bidang
                                investasi, ekonomi, keuangan, perbankan, hukum,
                                dan/atau organisasi perusahaan,
                          - _type: alphaPoint
                            _key: g
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                tidak pernah dipidana penjara karena melakukan
                                tindak pidana kejahatan,
                          - _type: alphaPoint
                            _key: h
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                tidak pernah dinyatakan pailit atau tidak pernah
                                menjadi pengurus perusahaan yang menyebabkan
                                perusahaan tersebut pailit, dan
                          - _type: alphaPoint
                            _key: i
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                tidak dinyatakan sebagai orang perseorangan yang
                                tercela di bidang investasi dan bidang lainnya
                                berdasarkan peraturan perundang-undangan.
                    - _type: pasal
                      _key: 169
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal diperlukan, Lembaga Pengelola
                                Investasi dapat membentuk Dewan Penasihat untuk
                                memberikan saran dan bimbingan kepada Lembaga
                                Pengelola Investasi dalam hal terkait investasi.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
