                              text: >-
                                35. Ketentuan Pasal 37 diubah sehingga berbunyi
                                sebagai berikut: Pasal 37 (1) Pemanfaatan
                                bangunan gedung dilakukan oleh pemilik dan/atau
                                pengguna bangunan gedung setelah bangunan gedung
                                tersebut mendapatkan sertifikat laik fungsi. (2)
                                Sertifikat laik fungsi sebagaimana dimaksud pada
                                ayat (1) diterbitkan oleh Pemerintah Pusat atau
                                Pemerintah Daerah sesuai kewenangannya
                                berdasarkan surat pernyataan kelaikan fungsi
                                yang diajukan oleh Penyedia Jasa Pengawasan atau
                                Manajemen Konstruksi kepada Pemerintah Pusat
                                atau Pemerintah Daerah sesuai kewenangannya
                                melalui sistem elektronik yang diselenggarakan
                                oleh Pemerintah Pusat, berdasarkan norma,
                                standar, prosedur, dan kriteria yang ditetapkan
                                oleh Pemerintah Pusat. REPUBLIK INDONESIA - 108
                                - (3) Surat pernyataan kelaikan fungsi
                                sebagaimana dimaksud pada ayat (2) diterbitkan
                                setelah inspeksi tahapan terakhir sebagaimana
                                dimaksud dalam Pasal 36B ayat (4) huruf d yang
                                menyatakan bangunan gedung memenuhi standar
                                teknis bangunan gedung. (4) Penerbitan
                                sertifikat laik fungsi bangunan gedung dilakukan
                                bersamaan dengan penerbitan surat bukti
                                kepemilikan bangunan gedung. (S5) Pemeliharaan,
                                perawatan, dan pemeriksaan secara berkala pada
                                bangunan gedung harus dilakukan untuk memastikan
                                bangunan gedung tetap memenuhi persyaratan laik
                                fungsi. (6) Dalam pemanfaatan bangunan gedung,
                                pemilik dan/atau pengguna bangunan gedung
                                mempunyai hak dan kewajiban sebagaimana diatur
                                dalam Undang-Undang ini.
