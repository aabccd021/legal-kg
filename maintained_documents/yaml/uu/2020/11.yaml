                              text: >-
                                1. Ketentuan Pasal 1 angka 11, angka 24, angka
                                25, dan angka 26 diubah serta angka 16, angka
                                17, dan angka 18 dihapus sehingga Pasal 1
                                berbunyi sebagai berikut: Pasal 1 Dalam
                                Undang-Undang ini yang dimaksud dengan: 1.
                                Perikanan adalah semua kegiatan yang berhubungan
                                dengan pengelolaan dan pemanfaatan sumber daya
                                ikan dan lingkungannya mulai dari praproduksi,
                                produksi, pengolahan sampai dengan pemasaran,
                                yang dilaksanakan dalam suatu sistem bisnis
                                perikanan. REPUBLIK INDONESIA -123 - 2. Sumber
                                daya ikan adalah potensi semua jenis ikan. 3.
                                Lingkungan sumber daya ikan adalah perairan
                                tempat kehidupan sumber daya ikan, termasuk
                                biota dan faktor alamiah sekitarnya. 4. Ikan
                                adalah segala jenis organisme yang seluruh atau
                                sebagian dari siklus hidupnya berada di dalam
                                lingkungan perairan. 5. Penangkapan ikan adalah
                                kegiatan untuk memperoleh ikan di perairan yang
                                tidak dalam keadaan dibudidayakan dengan alat
                                atau cara apapun, termasuk kegiatan yang
                                menggunakan kapal untuk memuat, mengangkut,
                                menyimpan, mendinginkan, menangani, mengolah,
                                dan/atau mengawetkannya. 6. Pembudidayaan ikan
                                adalah kegiatan untuk memelihara, membesarkan,
                                dan/atau membiakkan ikan serta memanen hasilnya
                                dalam lingkungan yang terkontrol, termasuk
                                kegiatan yang menggunakan kapal untuk memuat,
                                mengangkut, menyimpan, mendinginkan, menangani,
                                mengolah, dan/atau mengawetkannya. 7.
                                Pengelolaan perikanan adalah semua upaya,
                                termasuk proses yang terintegrasi dalam
                                pengumpulan informasi, analisis, perencanaan,
                                konsultasi, pembuatan keputusan, alokasi sumber
                                daya ikan, dan implementasi serta penegakan
                                hukum dari peraturan perundang-undangan di
                                bidang perikanan, yang dilakukan oleh pemerintah
                                atau otoritas lain yang diarahkan untuk mencapai
                                kelangsungan produktivitas sumber daya hayati
                                perairan dan tujuan yang telah disepakati. 8.
                                Konservasi Sumber Daya Ikan adalah upaya
                                pelindungan, pelestarian, dan pemanfaatan sumber
                                daya ikan, termasuk ekosistem, jenis, dan
                                genetik untuk menjamin keberadaan, ketersediaan,
                                dan kesinambungannya dengan tetap memelihara dan
                                meningkatkan kualitas nilai dan keanekaragaman
                                sumber daya ikan. REPUBLIK INDONESIA -124 - 9.
                                Kapal Perikanan adalah kapal, perahu, atau alat
                                apung lain yang digunakan untuk melakukan
                                penangkapan ikan, mendukung operasi penangkapan
                                ikan, pembudidayaan ikan, pengangkutan ikan,
                                pengolahan ikan, pelatihan perikanan, dan
                                penelitian/eksplorasi perikanan. 10. Nelayan
                                adalah orang yang mata pencahariannya melakukan
                                penangkapan ikan. 11. Nelayan Kecil adalah orang
                                yang mata pencahariannya melakukan penangkapan
                                ikan untuk memenuhi kebutuhan hidup sehari-hari,
                                baik yang menggunakan kapal penangkap Ikan
                                maupun yang tidak menggunakan kapal penangkap
                                Ikan. 12. Pembudi Daya Ikan adalah orang yang
                                mata pencahariannya melakukan pembudidayaan
                                ikan. 13. Pembudi Daya-Ikan Kecil adalah orang
                                yang mata pencahariannya melakukan pembudidayaan
                                ikan untuk memenuhi kebutuhan hidup sehari-hari.
                                14. Setiap Orang adalah orang perseorangan atau
                                korporasi. 15. Korporasi adalah kumpulan orang
                                dan/atau kekayaan yang terorganisasi, baik
                                merupakan badan hukum maupun bukan badan hukum.
                                16. Dihapus. 17. Dihapus. 18. Dihapus. 19. Laut
                                Teritorial Indonesia adalah jalur laut selebar
                                12 (dua belas) mil laut yang diukur dari garis
                                pangkal kepulauan Indonesia. 20. Perairan
                                Indonesia adalah laut teritorial Indonesia
                                beserta perairan kepulauan dan perairan
                                pedalamannya. REPUBLIK INDONESIA -125 - 21. Zona
                                Ekonomi Eksklusif Indonesia yang selanjutnya
                                disingkat ZEEI adalah jalur di luar dan
                                berbatasan dengan laut teritorial Indonesia
                                sebagaimana ditetapkan berdasarkan undang-undang
                                yang berlaku tentang perairan Indonesia yang
                                meliputi dasar laut, tanah di bawahnya, dan air
                                di atasnya dengan batas terluar 200 (dua ratus)
                                mil laut yang diukur dari garis pangkal laut
                                teritorial Indonesia. 22. Laut Lepas adalah
                                bagian dari laut yang tidak termasuk dalam ZEEI,
                                laut teritorial Indonesia, perairan kepulauan
                                Indonesia, dan perairan pedalaman Indonesia. 23.
                                Pelabuhan Perikanan adalah tempat yang terdiri
                                atas daratan dan perairan di sekitarnya dengan
                                batas- batas tertentu sebagai tempat kegiatan
                                pemerintahan dan kegiatan sistem bisnis
                                perikanan yang digunakan sebagai tempat kapal
                                perikanan bersandar, berlabuh, dan/atau bongkar
                                muat ikan yang dilengkapi dengan fasilitas
                                keselamatan pelayaran dan kegiatan penunjang
                                perikanan. 24. Menteri adalah menteri yang
                                menyelenggarakan urusan pemerintahan di bidang
                                perikanan. 25. Pemerintah Pusat adalah Presiden
                                Republik Indonesia yang memegang kekuasaan
                                pemerintahan Negara Republik Indonesia yang
                                dibantu oleh Wakil Presiden dan menteri
                                sebagaimana dimaksud dalam Undang- Undang Dasar
                                Negara Republik Indonesia Tahun 1945. 26.
                                Pemerintah Daerah adalah kepala daerah sebagai
                                unsur penyelenggara pemerintahan daerah yang
                                memimpin pelaksanaan urusan pemerintahan yang
                                menjadi kewenangan daerah otonom.
