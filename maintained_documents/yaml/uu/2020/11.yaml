                          text: >-
                            Beberapa ketentuan dalam Undang-Undang Nomor 18
                            Tahun 2013 tentang Pencegahan dan Pemberantasan
                            Perusakan Hutan (Lembaran Negara Republik Indonesia
                            Tahun 2013 Nomor 130, Tambahan Lembaran Negara
                            Republik Indonesia Nomor 5432) diubah sebagai
                            berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: referenceText
                              references:
                                - start: 13
                                  end: 20
                                  node:
                                    _key: 1
                                    parentDocument: *ref_0
                                    _structureType: pasal
                                - start: 78
                                  end: 85
                                  node:
                                    _key: 1
