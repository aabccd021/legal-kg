                  text: Selain berdasarkan asas sebagaimana dimaksud pada ayat
        - _type: pasal
          _key: 3
          isi:
            _type: referenceText
            references: []
            text: >-
              Undang-Undang ini dibentuk dengan tujuan untuk: a. menciptakan dan
              meningkatkan lapangan kerja dengan memberikan kemudahan,
              pelindungan, dan pemberdayaan terhadap koperasi dan UMK-M serta
              industri dan perdagangan nasional sebagai upaya untuk dapat
              menyerap tenaga kerja Indonesia yang seluas-luasnya dengan tetap
              memperhatikan keseimbangan dan kemajuan antardaerah dalam kesatuan
              ekonomi nasional, b. menjamin setiap warga negara memperoleh
              pekerjaan, serta mendapat imbalan dan perlakuan yang adil dan
              layak dalam hubungan kerja, c. melakukan penyesuaian berbagai
              aspek pengaturan yang berkaitan dengan keberpihakan, penguatan,
              dan perlindungan bagi koperasi dan UMK-M serta industri nasional:
              dan d. melakukan penyesuaian berbagai aspek pengaturan yang
              berkaitan dengan peningkatan ekosistem investasi, kemudahan dan
              percepatan proyek strategis nasional yang berorientasi pada
              kepentingan nasional yang berlandaskan pada ilmu pengetahuan dan
              teknologi nasional dengan berpedoman pada haluan ideologi
              Pancasila.
        - _type: pasal
          _key: 4
          isi:
            _type: referenceText
            references:
              - start: 56
                end: 63
                node:
                  _key: 3
                  parentDocument: *ref_0
                  _structureType: pasal
            text: >-
              Dalam rangka mencapai tujuan sebagaimana dimaksud dalam Pasal 3,
              ruang lingkup Undang-Undang ini mengatur kebijakan strategis Cipta
              Kerja yang meliputi: a. peningkatan ekosistem investasi dan
              kegiatan berusaha, b. ketenagakerjaan, c. kemudahan, pelindungan,
              serta pemberdayaan koperasi dan UMK-M, d. kemudahan berusaha: e.
              dukungan riset dan inovasi, f. pengadaan tanah, g. kawasan
              ekonomi: h. investasi Pemerintah Pusat dan percepatan proyek
              strategis nasional, REPUBLIK INDONESIA -6- Ii. pelaksanaan
              administrasi pemerintahan: dan J. pengenaan sanksi.
        - _type: pasal
          _key: 5
          isi:
            _type: referenceText
            references:
              - start: 41
                end: 48
                node:
                  _key: 4
                  parentDocument: *ref_0
                  _structureType: pasal
            text: >-
              Ruang lingkup sebagaimana dimaksud dalam Pasal 4 meliputi bidang
              hukum yang diatur dalam undang-undang terkait.
