                              text: >-
                                16. Ketentuan Pasal 26 diubah sehingga berbunyi
                                sebagai berikut: REPUBLIK INDONESIA - 30 - Pasal
                                26 (1) Rencana tata ruang wilayah kabupaten
                                memuat: a. tujuan, kebijakan, dan strategi
                                penataan ruang wilayah kabupaten, b. rencana
                                struktur ruang wilayah kabupaten yang meliputi
                                sistem perkotaan di wilayahnya yang terkait
                                dengan kawasan perdesaan dan sistem jaringan
                                prasarana wilayah kabupaten, Cc. rencana pola
                                ruang wilayah kabupaten yang meliputi kawasan
                                lindung kabupaten dan kawasan budi daya
                                kabupaten, d. arahan pemanfaatan ruang wilayah
                                kabupaten yang berisi indikasi program utama
                                jangka menengah lima tahunan: dan e. ketentuan
                                pengendalian pemanfaatan ruang wilayah kabupaten
                                yang berisi ketentuan umum zonasi, ketentuan
                                Kesesuaian Kegiatan Pemanfaatan Ruang, ketentuan
                                insentif dan disinsentif, serta arahan sanksi.
                                (2) Rencana tata ruang wilayah kabupaten menjadi
                                pedoman untuk: a. penyusunan rencana pembangunan
                                jangka panjang daerah, b. penyusunan rencana
                                pembangunan jangka menengah daerah, Cc.
                                pemanfaatan ruang dan pengendalian pemanfaatan
                                ruang di wilayah kabupaten: d. pewujudan
                                keterpaduan, keterkaitan, dan keseimbangan
                                antarsektor, dan e. penetapan lokasi dan fungsi
                                ruang untuk investasi. (3) Rencana tata ruang
                                wilayah kabupaten menjadi dasar untuk Kesesuaian
                                Kegiatan Pemanfaatan Ruang dan administrasi
                                pertanahan. (4) Jangka waktu rencana tata ruang
                                wilayah kabupaten adalah 20 (dua puluh) tahun.
                                REPUBLIK INDONESIA -31 - (S5) Rencana tata ruang
                                wilayah kabupaten ditinjau kembali 1 (satu) kali
                                pada setiap periode 5 (lima) tahunan. (6)
                                Peninjauan kembali Rencana tata ruang wilayah
                                kabupaten dapat dilakukan lebih dari 1 (satu)
                                kali dalam periode 5 (lima) tahun apabila
                                terjadi perubahan lingkungan strategis berupa:
                                a. bencana alam yang ditetapkan dengan peraturan
                                perundang-undangan: b. perubahan batas
                                teritorial negara yang ditetapkan dengan
                                Undang-Undang: Cc. perubahan batas wilayah
                                daerah yang ditetapkan dengan Undang-Undang: dan
                                d. perubahan kebijakan nasional yang bersifat
                                strategis. (7) Rencana tata ruang wilayah
                                kabupaten ditetapkan dengan Peraturan Daerah
                                Kabupaten. (8) Peraturan Daerah Kabupaten
                                sebagaimana dimaksud pada ayat (6) wajib
                                ditetapkan paling lama 2 (dua) bulan setelah
                                mendapat persetujuan substansi dari Pemerintah
                                Pusat. (9) Dalam hal Peraturan Daerah Kabupaten
                                sebagaimana dimaksud pada ayat (7) belum
                                ditetapkan, Bupati menetapkan rencana tata ruang
                                wilayah kabupaten paling lama 3 (tiga) bulan
                                setelah mendapat persetujuan substansi dari
                                Pemerintah Pusat. (10) Dalam hal rencana tata
                                ruang wilayah kabupaten sebagaimana dimaksud
                                pada ayat (9) belum ditetapkan oleh Bupati,
                                rencana tata ruang wilayah kabupaten ditetapkan
                                oleh Pemerintah Pusat paling lama 4 (empat)
                                bulan setelah mendapat persetujuan substansi
                                dari Pemerintah Pusat.
