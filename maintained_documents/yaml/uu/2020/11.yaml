                              text: >-
                                5. Ketentuan Pasal 36 diubah sehingga berbunyi
                                sebagai berikut: REPUBLIK INDONESIA - 313 -
                                Pasal 36 (1) Dalam hal pembangunan perumahan
                                dengan hunian berimbang tidak dalam 1 (satu)
                                hamparan, pembangunan rumah umum harus
                                dilaksanakan dalam 1 (satu) daerah
                                kabupaten/kota. (2) Dalam hal rumah sederhana
                                tidak dapat dibangun dalam bentuk rumah tunggal
                                atau rumah deret, dapat dikonversi dalam: a.
                                bentuk rumah susun umum yang dibangun dalam satu
                                hamparan yang sama, atau b. bentuk dana untuk
                                pembangunan rumah umum. (3) Pengelolaan dana
                                dari konversi sebagaimana dimaksud pada ayat (2)
                                huruf b dilaksanakan oleh badan percepatan
                                penyelenggaraan perumahan. (4) Dalam hal rumah
                                sederhana tidak dapat dibangun dalam bentuk
                                rumah tunggal atau rumah deret, dapat dikonversi
                                dalam bentuk rumah susun umum. (5) Pembangunan
                                rumah umum sebagaimana dimaksud pada ayat (1)
                                harus mempunyai akses menuju pusat pelayanan
                                atau tempat kerja. (6) Pembangunan perumahan
                                dengan hunian berimbang sebagaimana dimaksud
                                pada ayat (1) dilakukan oleh badan hukum yang
                                sama. 7) Ketentuan lebih lanjut mengenai g
                                pembangunan perumahan dengan hunian berimbang
                                diatur dalam Peraturan Pemerintah.
