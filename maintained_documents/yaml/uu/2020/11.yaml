                        text: >-
                          1. Ketentuan Pasal 44 diubah sehingga berbunyi sebagai
                          berikut: REPUBLIK INDONESIA - 701 - Pasal 44 (l) Lahan
                          yang sudah ditetapkan sebagai Lahan Pertanian Pangan
                          Berkelanjutan dilindungi dan dilarang dialihfungsikan.
                          (2) Dalam hal untuk kepentingan umum dan/atau Proyek
                          Strategis Nasional, Lahan Pertanian Pangan
                          Berkelanjutan sebagaimana dimaksud pada ayat (1) dapat
                          dialihfungsikan dan dilaksanakan sesuai dengan
                          ketentuan peraturan perundang-undangan. (3)
                          Pengalihfungsian Lahan yang sudah ditetapkan sebagai
                          Lahan Pertanian Pangan Berkelanjutan untuk kepentingan
                          umum sebagaimana dimaksud pada ayat (2) hanya dapat
                          dilakukan dengan syarat: a. dilakukan kajian kelayakan
                          strategis, b. disusun rencana alih fungsi lahan, c.
                          dibebaskan kepemilikan haknya dari pemilik, dan d.
                          disediakan lahan pengganti terhadap Lahan Pertanian
                          Pangan Berkelanjutan yang dialihfungsikan. (4) Dalam
                          hal terjadi bencana sehingga pengalihan fungsi lahan
                          untuk infrastruktur tidak dapat ditunda, persyaratan
                          sebagaimana dimaksud pada ayat (3) huruf a dan huruf b
                          tidak diberlakukan. (S5) Penyediaan lahan pengganti
                          terhadap Lahan Pertanian Pangan Berkelanjutan yang
                          dialihfungsikan untuk infrastruktur akibat bencana
                          sebagaimana dimaksud pada ayat (4) dilakukan paling
                          lama 24 (dua puluh empat) bulan setelah alih fungsi
                          dilakukan. (6) Pembebasan kepemilikan hak atas tanah
                          yang dialihfungsikan sebagaimana dimaksud pada ayat
                          (3) huruf c dilakukan dengan pemberian ganti rugi
                          sesuai dengan ketentuan peraturan perundang- undangan.
                          REPUBLIK INDONESIA - 702 -
