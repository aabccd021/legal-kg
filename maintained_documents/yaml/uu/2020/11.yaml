                                sebagai berikut: a. 2 (dua) anggota diangkat
                                untuk masa jabatan 5 (lima) tahun, b. 2 (dua)
                                anggota diangkat untuk masa jabatan 4 (empat)
                                tahun, dan c. 1 (satu) anggota diangkat untuk
