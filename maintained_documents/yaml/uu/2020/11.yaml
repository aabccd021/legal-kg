                  _key: 5
                  _structureType: ayat
            text: >-
              Setiap pemegang Perizinan Berusaha yang dalam melaksanakan
              kegiatan/usahanya menimbulkan dampak. kerusakan pada lingkungan
              hidup, selain dikenai sanksi administratif sebagaimana dimaksud
