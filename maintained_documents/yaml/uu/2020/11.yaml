                                merumuskan dan menetapkan kebijakan lembaga, b.
                                melaksanakan kebijakan dan pengurusan
                                operasional lembaga, c. menyusun dan mengusulkan
                                remunerasi Dewan Pengawas dan Dewan Direktur
