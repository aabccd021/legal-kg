                        text: >-
                          25. Di antara Pasal 88 dan Pasal 89 disisipkan 5
                          (lima) pasal, yakni Pasal 88A, Pasal 88B, Pasal 88C,
                          Pasal 88D, dan Pasal 88E sehingga berbunyi sebagai
                          berikut: Pasal 88A (1) Hak pekerja/buruh atas upah
                          timbul pada saat terjadi hubungan kerja antara
                          pekerja/buruh dengan pengusaha dan berakhir pada saat
                          putusnya hubungan kerja. (2) — Setiap pekerja/buruh
                          berhak memperoleh upah yang sama untuk pekerjaan yang
                          sama nilainya. (3) Pengusaha wajib membayar upah
                          kepada pekerja/buruh sesuai dengan kesepakatan. (4)
                          Pengaturan pengupahan yang ditetapkan atas kesepakatan
                          antara pengusaha dan pekerja/buruh atau serikat
                          pekerja/serikat buruh tidak boleh lebih rendah dari
                          ketentuan pengupahan yang ditetapkan dalam peraturan
                          perundang-undangan. (5) “Dalam hal kesepakatan
                          sebagaimana dimaksud pada ayat (4) lebih rendah atau
                          bertentangan dengan peraturan perundang-undangan,
                          kesepakatan tersebut batal demi hukum dan pengaturan
                          pengupahan dilaksanakan sesuai dengan ketentuan
                          peraturan perundang-undangan. (6) Pengusaha yang
                          karena kesengajaan atau kelalaiannya mengakibatkan
                          keterlambatan pembayaran upah, dikenakan denda sesuai
                          dengan persentase tertentu dari upah pekerja/ buruh.
                          REPUBLIK INDONESIA - 546 - (7) Pekerja/buruh yang
                          melakukan pelanggaran karena kesengajaan atau
                          kelalaiannya dapat dikenakan denda. (8 Pemerintah
                          mengatur pengenaan denda kepada pengusaha dan/atau
                          pekerja/ buruh dalam pembayaran upah. Pasal 88B (1)
                          Upah ditetapkan berdasarkan: a satuan waktu, dan/atau
                          b. satuan hasil. (2) — Ketentuan lebih lanjut mengenai
                          upah berdasarkan satuan waktu dan/atau satuan hasil
                          sebagaimana dimaksud pada ayat (1) diatur dalam
                          Peraturan Pemerintah. Pasal 88C (1) Gubernur wajib
                          menetapkan upah minimum provinsi. (2) Gubernur dapat
                          menetapkan upah minimum kabupaten/kota dengan syarat
                          tertentu. (35 — Upah minimum sebagaimana dimaksud pada
                          ayat (1) dan ayat (2) ditetapkan berdasarkan kondisi
                          ekonomi dan ketenagakerjaan. (4) Syarat tertentu
                          sebagaimana dimaksud pada ayat (2) meliputi
                          pertumbuhan ekonomi daerah atau inflasi pada
                          kabupaten/kota yang bersangkutan. (5) Upah minimum
                          kabupaten/kota sebagaimana dimaksud pada ayat (2)
                          harus lebih tinggi dari upah minimum provinsi. (6)
                          Kondisi ekonomi dan ketenagakerjaan sebagaimana
                          dimaksud pada ayat (3) menggunakan data yang bersumber
                          dari lembaga yang berwenang di bidang statistik.
                          REPUBLIK INDONESIA -547 - (7) Ketentuan lebih lanjut
                          mengenai tata cara penetapan upah minimum sebagaimana
                          dimaksud pada ayat (3) dan syarat tertentu sebagaimana
                          dimaksud pada ayat (4) diatur dalam Peraturan
                          Pemerintah. Pasal 88D (l) “Upah minimum sebagaimana
                          dimaksud dalam Pasal 88C ayat (1) dan ayat (2)
                          dihitung dengan menggunakan formula perhitungan upah
                          minimum. (2) — Formula perhitungan upah minimum
                          sebagaimana dimaksud pada ayat (1) memuat variabel
                          pertumbuhan ekonomi atau inflasi. (3) — Ketentuan
                          lebih lanjut mengenai formula perhitungan upah minimum
                          diatur dalam Peraturan Pemerintah. Pasal 88E (1) “—
                          Upah minimum sebagaimana dimaksud dalam Pasal 88C ayat
                          (1) dan ayat (2) berlaku bagi pekerja/ buruh dengan
                          masa kerja kurang dari 1 (satu) tahun pada perusahaan
                          yang bersangkutan. (2) Pengusaha dilarang membayar
                          upah lebih rendah dari upah minimum.
