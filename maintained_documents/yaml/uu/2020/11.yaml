                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Korporasi adalah kumpulan orang dan/atau
                                kekayaan yang terorganisasi, baik merupakan
                                badan hukum maupun bukan badan hukum.
                          - _type: numPoint
                            _key: '26'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penjamin adalah orang atau Korporasi yang
                                bertanggung jawab atas keberadaan dan kegiatan
                                Orang Asing selama berada di Wilayah Indonesia.
                          - _type: numPoint
                            _key: '27'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Alat Angkut adalah kapal laut, pesawat udara,
                                atau sarana transportasi lain yang lazim
                                digunakan, baik untuk mengangkut orang maupun
                                barang.
                          - _type: numPoint
                            _key: '28'
