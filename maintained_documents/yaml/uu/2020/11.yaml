                              text: >-
                                1. Ketentuan Pasal 1 angka 14 dan angka 15
                                diubah serta angka 13 dihapus sehingga Pasal 1
                                berbunyi sebagai berikut: Pasal 1 Dalam
                                Undang-Undang ini yang dimaksud dengan: 1.
                                Spasial adalah aspek keruangan suatu objek atau
                                kejadian yang mencakup lokasi, letak, dan
                                posisinya. 2. Geospasial atau ruang kebumian
                                adalah aspek keruangan yang menunjukkan lokasi,
                                letak, dan posisi suatu objek atau kejadian yang
                                berada di bawah, pada, atau di atas permukaan
                                bumi yang dinyatakan dalam sistem koordinat
                                tertentu. 3. Data Geospasial yang selanjutnya
                                disingkat DG adalah data tentang lokasi
                                geografis, dimensi atau ukuran, dan/atau
                                karakteristik objek alam dan/atau buatan manusia
                                yang berada di bawah, pada, atau di atas
                                permukaan bumi. 4. Informasi Geospasial yang
                                selanjutnya disingkat IG adalah DG yang sudah
                                diolah sehingga dapat digunakan sebagai alat
                                bantu dalam perumusan kebijakan, pengambilan
                                keputusan, dan/atau pelaksanaan kegiatan yang
                                berhubungan dengan ruang kebumian. S5. Informasi
                                Geospasial Dasar yang selanjutnya disingkat IGD
                                adalah IG yang berisi tentang objek yang dapat
                                dilihat secara langsung atau diukur dari
                                kenampakan fisik di muka bumi dan yang tidak
                                berubah dalam waktu yang relatif lama. 6.
                                Informasi Geospasial Tematik yang selanjutnya
                                disingkat IGT adalah IG yang menggambarkan satu
                                atau lebih tema tertentu yang dibuat mengacu
                                pada IGD. REPUBLIK INDONESIA - 68 - 7. Skala
                                adalah angka perbandingan antara jarak dalam
                                suatu IG dengan jarak sebenarnya di muka bumi.
                                8. Titik Kontrol Geodesi adalah posisi di muka
                                bumi yang ditandai dengan bentuk fisik tertentu
                                yang dijadikan sebagai kerangka acuan posisi
                                untuk IG. 9. Jaring Kontrol Horizontal Nasional
                                yang selanjutnya disingkat JKHN adalah sebaran
                                titik kontrol geodesi horizontal yang terhubung
                                satu sama lain dalam satu kerangka referensi.
                                10. Jaring Kontrol Vertikal Nasional yang
                                selanjutnya disingkat JKVN adalah sebaran titik
                                kontrol geodesi vertikal yang terhubung satu
                                sama lain dalam satu kerangka referensi. 11.
                                Jaring Kontrol Gayaberat Nasional yang
                                selanjutnya disingkat JKGN adalah sebaran titik
                                kontrol geodesi gayaberat yang terhubung satu
                                sama lain dalam satu kerangka referensi. 12.
                                Peta Rupabumi Indonesia adalah peta dasar yang
                                memberikan informasi yang mencakup wilayah
                                darat, pantai dan laut. 13. Dihapus. 14.
                                Pemerintah Pusat adalah Presiden Republik
                                Indonesia yang memegang kekuasaan pemerintahan
                                negara Republik Indonesia yang dibantu oleh
                                Wakil Presiden dan menteri sebagaimana dimaksud
                                dalam Undang- Undang Dasar Negara Republik
                                Indonesia Tahun 1945. 15. Pemerintah Daerah
                                adalah kepala daerah sebagai unsur penyelenggara
                                Pemerintahan Daerah yang memimpin pelaksanaan
                                urusan pemerintahan yang menjadi kewenangan
                                daerah otonom. 16. Badan adalah lembaga
                                pemerintah nonkementerian yang mempunyai tugas,
                                fungsi, dan kewenangan yang membidangi urusan
                                tertentu dalam hal ini bidang penyelenggaraan
                                IGD. 17. Instansi Pemerintah adalah kementerian
                                dan lembaga pemerintah nonkementerian. 18.
                                Setiap orang adalah orang perseorangan, kelompok
                                orang, atau badan usaha. REPUBLIK INDONESIA - 69
                                - 19. Badan Usaha adalah badan usaha milik
                                negara, badan usaha milik daerah, atau badan
                                usaha yang berbadan hukum.
