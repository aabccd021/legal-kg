                                yang melakukan peningkatan nilai tambah batu
                                bara sebagaimana dimaksud dalam Pasal 102 ayat
                                (2), dapat diberikan perlakuan tertentu terhadap
                                kewajiban penerimaan negara sebagaimana dimaksud
                                dalam Pasal 128. (2) Pemberian perlakuan
                                tertentu terhadap kewajiban penerimaan negara
                                sebagaimana dimaksud pada ayat (1) untuk
                                kegiatan peningkatan nilai tambah batu bara
                                dapat berupa pengenaan royalti sebesar 076 (nol
                                persen). (3) Ketentuan lebih lanjut mengenai
                                perlakuan tertentu sebagaimana dimaksud pada
                                ayat (1) diatur dalam Peraturan Pemerintah.
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 2
                            _pasalKey: '162'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Setiap orang yang merintangi atau mengganggu
                                kegiatan usaha pertambangan dari pemegang IUP,
                                IUPK, IPR atau SIPB yang telah memenuhi
                                syarat-syarat sebagaimana dimaksud dalam Pasal
