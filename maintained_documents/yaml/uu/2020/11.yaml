                                provisi di bidang kehutanan. (S5) Ketentuan
                                lebih lanjut mengenai pungutan sebagaimana
                                dimaksud pada ayat (1), ayat (2), ayat (3), dan
                                ayat (4) diatur dalam Peraturan Pemerintah.
