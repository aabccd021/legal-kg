                                29. Ketentuan Pasal 46 diubah sehingga berbunyi
                                sebagai berikut: REPUBLIK INDONESIA - 262 -
                                Pasal 46 (1) Pemerintah Pusat atau Pemerintah
                                Daerah berdasarkan norma, standar, prosedur, dan
                                kriteria yang ditetapkan oleh Pemerintah Pusat
                                melakukan pembinaan dan pengawasan terhadap
                                usaha penyediaan tenaga listrik dalam hal: a.
                                penyediaan dan pemanfaatan sumber energi untuk
                                pembangkit tenaga listrik: b. pemanfaatan
                                jaringan tenaga listrik untuk kepentingan
                                telekomunikasi, multimedia, dan informatika: Cc.
                                pemenuhan kecukupan pasokan tenaga listrik, d.
                                pemenuhan persyaratan keteknikan, e. pemenuhan
                                aspek pelindungan lingkungan hidup, f. '
                                pengutamaan pemanfaatan barang dan jasa dalam
                                negeri, g. penggunaan tenaga kerja asing, h.
                                pemenuhan tingkat mutu dan keandalan penyediaan
                                tenaga listrik, i. pemenuhan persyaratan
                                perizinan, j-. penerapan tarif tenaga listrik:
                                dan k. pemenuhan mutu jasa yang diberikan oleh
                                usaha penunjang tenaga listrik. (2) Dalam
                                melakukan pengawasan sebagaimana dimaksud pada
                                ayat (1), Pemerintah Pusat atau Pemerintah
                                Daerah sesuai kewenangannya berdasarkan norma,
                                standar, prosedur, dan kriteria yang ditetapkan
                                oleh Pemerintah Pusat dapat: a. melakukan
                                inspeksi pengawasan di lapangan: b. meminta
                                laporan pelaksanaan usaha di bidang
                                ketenagalistrikan, c. melakukan penelitian dan
                                evaluasi atas laporan pelaksanaan usaha di
                                bidang ketenagalistrikan: dan REPUBLIK INDONESIA
                                - 263 - d. memberikan sanksi administratif
                                terhadap pelanggaran ketentuan Perizinan
                                Berusaha. (3) Dalam melaksanakan pengawasan
                                keteknikan sebagaimana dimaksud pada ayat (1),
                                Pemerintah Pusat dan/atau Pemerintah Daerah
                                dibantu oleh inspektur ketenagalistrikan
                                dan/atau Penyidik Pegawai Negeri Sipil. (4)
                                Pemerintah Pusat dapat mendelegasikan kewenangan
                                pembinaan dan pengawasan sebagaimana dimaksud
                                pada ayat (1) kepada Pemerintah Daerah. (5)
                                Ketentuan lebih lanjut mengenai pembinaan dan
                                pengawasan diatur dalam Peraturan Pemerintah.
