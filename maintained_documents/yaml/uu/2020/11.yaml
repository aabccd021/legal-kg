                                Pasal 57 (1) Barang yang diperdagangkan di dalam
                                negeri harus memenuhi: a. SNI yang telah
                                diberlakukan secara wajib, atau b. persyaratan
                                teknis yang telah diberlakukan secara wajib. (2)
                                Pelaku Usaha dilarang memperdagangkan Barang di
                                dalam negeri yang tidak memenuhi SNI yang telah
                                diberlakukan secara wajib atau persyaratan
                                teknis yang telah diberlakukan secara wajib. (3)
                                Pemberlakuan SNI atau persyaratan teknis
                                sebagaimana dimaksud pada ayat (1) ditetapkan
                                oleh Pemerintah Pusat. (4) Pemberlakuan SNI atau
                                persyaratan teknis sebagaimana dimaksud pada
                                ayat (3) dilakukan dengan mempertimbangkan
                                aspek: a. keamanan, keselamatan, kesehatan, dan
                                lingkungan hidup, b. daya saing produsen
                                nasional dan persaingan usaha yang sehat: c.
                                kemampuan dan kesiapan dunia usaha nasional,
                                dan/atau d. kesiapan infrastruktur lembaga
                                penilaian kesesuaian. (5) Barang yang telah
                                diberlakukan SNI atau persyaratan teknis secara
                                wajib sebagaimana dimaksud pada ayat (1) wajib
                                dibubuhi tanda SNI atau tanda kesesuaian atau
                                dilengkapi sertifikat kesesuaian yang diakui
                                oleh Pemerintah Pusat. (6) Barang yang
                                diperdagangkan dan belum diberlakukan SNI secara
                                wajib dapat dibubuhi tanda SNI atau tanda
                                kesesuaian sepanjang telah dibuktikan dengan
                                sertifikat produk penggunaan tanda SNI atau
                                sertifikat kesesuaian. REPUBLIK INDONESIA - 290
                                - (7) Pelaku Usaha yang memperdagangkan Barang
                                yang telah diberlakukan SNI atau persyaratan
                                teknis secara wajib, tetapi tidak membubuhi
                                tanda SNI, tanda kesesuaian atau tidak
                                melengkapi sertifikat kesesuaian sebagaimana
                                dimaksud pada ayat (5) dikenai sanksi
                                administratif.
