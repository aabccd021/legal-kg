                        text: >-
                          44. Ketentuan Pasal 156 diubah sehingga berbunyi
                          sebagai berikut: REPUBLIK INDONESIA - 556 - Pasal 156
                          (1) Dalam hal terjadi pemutusan hubungan kerja,
                          pengusaha wajib membayar uang pesangon dan/atau uang
                          penghargaan masa kerja dan uang penggantian hak yang
                          seharusnya diterima. (2) Uang pesangon sebagaimana
                          dimaksud pada ayat (1) diberikan dengan ketentuan
                          sebagai berikut: a. masa kerja kurang dari 1 (satu)
                          tahun, 1 (satu) bulan upah, b. masa kerja 1 (satu)
                          tahun atau lebih tetapi kurang dari 2 (dua) tahun, 2
                          (dua) bulan upah, Cc. masa kerja 2 (dua) tahun atau
                          lebih tetapi kurang dari 3 (tiga) tahun, 3 (tiga)
                          bulan upah, d. masa kerja 3 (tiga) tahun atau lebih
                          tetapi kurang dari 4 (empat) tahun, 4 (empat) bulan
                          upah, e. masa kerja 4 (empat) tahun atau lebih tetapi
                          kurang dari 5 (lima) tahun, 5 (lima) bulan upah, f.
                          masa kerja 5 (lima) tahun atau lebih, tetapi kurang
                          dari 6 (enam) tahun, 6 (enam) bulan upah, g masa kerja
                          6 (enam) tahun atau lebih tetapi kurang dari 7 (tujuh)
                          tahun, 7 (tujuh) bulan upah, h. masa kerja 7 (tujuh)
                          tahun atau lebih tetapi kurang dari 8 (delapan) tahun,
                          8 (delapan) bulan upah, 1 masa kerja 8 (delapan) tahun
                          atau lebih, 9 (sembilan) bulan upah. (3) Uang
                          penghargaan masa kerja sebagaimana dimaksud pada ayat
                          (1) diberikan dengan ketentuan sebagai berikut: a.
                          masa kerja 3 (tiga) tahun atau lebih tetapi kurang
                          dari 6 (enam) tahun, 2 (dua) bulan upah, b. masa kerja
                          6 (enam) tahun atau lebih tetapi kurang dari 9
                          (sembilan) tahun, 3 (tiga) bulan upah, REPUBLIK
                          INDONESIA - 557 - Cc. masa kerja 9 (sembilan) tahun
                          atau lebih tetapi kurang dari 12 (dua belas) tahun, 4
                          (empat) bulan upah, d. masa kerja 12 (duabelas) tahun
                          atau lebih tetapi kurang dari 15 (lima belas) tahun, 5
                          (lima) bulan upah, e. masa kerja 15 (lima belas) tahun
                          atau lebih tetapi kurang dari 18 (delapan belas)
                          tahun, 6 (enam) bulan upah, f. masa kerja 18 (delapan
                          belas) tahun atau lebih tetapi kurang dari 21 (dua
                          puluh satu) tahun, 7 (tujuh) bulan upah, g “ masa
                          kerja 21 (dua puluh satu) tahun atau lebih tetapi
                          kurang dari 24 (dua puluh empat) tahun, 8 (delapan)
                          bulan upah, h. masa kerja 24 (dua puluh empat) tahun
                          atau lebih, 10 (sepuluh) bulan upah. (4) Uang
                          penggantian hak yang seharusnya diterima sebagaimana
                          dimaksud pada ayat (1) meliputi: a. cuti tahunan yang
                          belum diambil dan belum gugur, b. biaya atau ongkos
                          pulang untuk pekerja/buruh dan keluarganya ke tempat
                          pekerja/buruh diterima bekerja, c. hal-hal lain yang
                          ditetapkan dalam perjanjian kerja, peraturan
                          perusahaan, atau perjanjian kerja bersama. (5)
                          Ketentuan lebih lanjut mengenai pemberian uang
                          pesangon, uang penghargaan masa kerja, dan uang
                          penggantian hak sebagaimana dimaksud pada ayat (2),
                          ayat (3), dan ayat (4) diatur dalam Peraturan
                          Pemerintah.
