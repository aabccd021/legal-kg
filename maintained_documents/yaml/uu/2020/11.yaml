          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 84
                isi:
                  _type: amendPoints
                  description:
                    _type: referenceText
                    references: []
                    text: >-
                      Beberapa ketentuan dalam Undang-Undang Nomor 18 Tahun 2017
                      tentang Pelindungan Pekerja Migran Indonesia (Lembaran
                      Negara Republik Indonesia Tahun 2017 Nomor 242, Tambahan
                      Lembaran Negara Republik Indonesia 6141) diubah sebagai
                      berikut:
                  isi:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 1
                      _pasalKey: '1'
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                        isi:
                          - _type: numPoint
                            _key: '1'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Calon Pekerja Migran Indonesia adalah setiap
                                tenaga kerja Indonesia yang memenuhi syarat
                                sebagai pencari kerja yang akan bekerja di luar
                                negeri dan terdaftar di instansi pemerintah
                                kabupaten/kota yang bertanggung jawab di bidang
                                ketenagakerjaan.
                          - _type: numPoint
                            _key: '2'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pekerja Migran Indonesia adalah setiap warga
                                negara Indonesia yang akan, sedang, atau telah
                                melakukan pekerjaan dengan menerima upah di luar
                                wilayah Republik Indonesia.
                          - _type: numPoint
                            _key: '3'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Keluarga Pekerja Migran Indonesia adalah suami,
                                istri, anak, atau orang tua termasuk hubungan
                                karena putusan dan/atau penetapan pengadilan,
                                baik yang berada di Indonesia maupun yang
                                tinggal bersama Pekerja Migran Indonesia di luar
                                negeri.
                          - _type: numPoint
                            _key: '4'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pekerja Migran Indonesia Perseorangan adalah
                                Pekerja Migran Indonesia yang akan bekerja ke
                                luar negeri tanpa melalui pelaksana penempatan.
                          - _type: numPoint
                            _key: '5'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pelindungan Pekerja Migran Indonesia adalah
                                segala upaya untuk melindungi kepentingan Calon
                                Pekerja Migran Indonesia dan/atau Pekerja Migran
                                Indonesia dan keluarganya dalam mewujudkan
                                terjaminnya pemenuhan haknya dalam keseluruhan
                                kegiatan sebelum bekerja, selama bekerja, dan
                                setelah bekerja dalam aspek hukum, ekonomi, dan
                                sosial.
                          - _type: numPoint
                            _key: '6'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pelindungan Sebelum Bekerja adalah keseluruhan
                                aktivitas untuk memberikan pelindungan sejak
                                pendaftaran sampai pemberangkatan.
                          - _type: numPoint
                            _key: '7'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pelindungan Selama Bekerja adalah keseluruhan
                                aktivitas untuk memberikan pelindungan selama
                                Pekerja Migran Indonesia dan anggota keluarganya
                                berada di luar negeri.
                          - _type: numPoint
                            _key: '8'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pelindungan Setelah Bekerja: adalah keseluruhan
                                aktivitas untuk memberikan pelindungan sejak
                                Pekerja Migran Indonesia dan anggota keluarganya
                                tiba di debarkasi di Indonesia hingga kembali ke
                                daerah asal, termasuk pelayanan lanjutan menjadi
                                pekerja produktif.
                          - _type: numPoint
                            _key: '9'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Perusahaan Penempatan Pekerja Migran Indonesia
                                adalah badan usaha berbadan hukum perseroan
                                terbatas yang telah memperoleh izin tertulis
                                dari Pemerintah Pusat untuk menyelenggarakan
                                pelayanan penempatan Pekerja Migran Indonesia.
                          - _type: numPoint
                            _key: '10'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Mitra Usaha adalah instansi dan/atau badan usaha
                                berbentuk badan hukum di negara tujuan
                                penempatan yang bertanggung jawab menempatkan
                                Pekerja Migran Indonesia pada pemberi kerja.
                          - _type: numPoint
                            _key: '11'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemberi Kerja adalah instansi pemerintah, badan
                                hukum pemerintah, badan hukum swasta, dan/atau
                                perseorangan di negara tujuan penempatan yang
                                mempekerjakan Pekerja Migran Indonesia.
                          - _type: numPoint
                            _key: '12'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Perjanjian Kerja Sama Penempatan adalah
                                perjanjian tertulis antara Perusahaan Penempatan
                                Pekerja Migran Indonesia dan Mitra Usaha atau
                                Pemberi Kerja yang memuat hak dan kewajiban
                                setiap pihak dalam rangka penempatan dan
                                Pelindungan Pekerja Migran Indonesia di negara
                                tujuan penempatan.
                          - _type: numPoint
                            _key: '13'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Perjanjian Penempatan Pekerja Migran Indonesia
                                yang selanjutnya disebut Perjanjian Penempatan
                                adalah perjanjian tertulis antara pelaksana
                                penempatan Pekerja Migran Indonesia dan Calon
                                Pekerja Migran Indonesia yang memuat hak dan
                                kewajiban setiap pihak, dalam rangka penempatan
                                Pekerja Migran Indonesia di negara tujuan
                                penempatan sesuai dengan ketentuan peraturan
                                perundang-undangan.
                          - _type: numPoint
                            _key: '14'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
