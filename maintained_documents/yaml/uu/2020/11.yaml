                                9. Ketentuan Pasal 55 diubah sehingga berbunyi
                                sebagai berikut: Pasal 55 (1) Orang perseorangan
                                yang memiliki rumah umum dengan kemudahan yang
                                diberikan Pemerintah Pusat atau Pemerintah
                                Daerah hanya dapat menyewakan dan/atau
                                mengalihkan kepemilikannya atas rumah kepada
                                pihak lain dalam hal: a. pewarisan, atau b.
                                penghunian setelah jangka waktu paling sedikit 5
                                (lima) tahun. REPUBLIK INDONESIA - 316 - (2)
                                Dalam hal dilakukan pengalihan kepemilikan
                                sebagaimana dimaksud pada ayat (1) huruf b,
                                pengalihannya wajib dilaksanakan oleh lembaga
                                yang ditunjuk atau dibentuk oleh Pemerintah
                                Pusat atau Pemerintah Daerah dalam bidang
                                perumahan dan permukiman. (3) Jika pemilik
                                meninggalkan rumah secara terus- menerus dalam
                                waktu paling lama 1 (satu) tahun tanpa memenuhi
                                kewajiban berdasarkan perjanjian, Pemerintah
                                Pusat atau Pemerintah Daerah berwenang mengambil
                                alih kepemilikan rumah tersebut. (4) Rumah yang
                                telah diambil alih oleh Pemerintah Pusat atau
                                Pemerintah Daerah sebagaimana dimaksud pada ayat
                                (2) wajib didistribusikan kembali kepada MBR.
                                (S5) Ketentuan lebih lanjut mengenai penunjukkan
                                dan pembentukan lembaga, kemudahan, dan/atau
                                bantuan pembangunan dan perolehan rumah MBR
                                diatur dalam Peraturan Presiden.
