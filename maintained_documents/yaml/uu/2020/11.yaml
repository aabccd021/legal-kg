_node:
  _documentType: uu
  tahun: 2020
  nomor: 11
babs:
  - _type: bab
    _key: 1
    _judul: KETENTUAN UMUM
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 1
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
            isi:
              - _type: numPoint
                _key: '1'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Cipta Kerja adalah upaya penciptaan kerja melalui usaha
                    kemudahan, perlindungan, dan pemberdayaan koperasi dan usaha
                    mikro, kecil, dan menengah, peningkatan ekosistem investasi
                    dan kemudahan berusaha, dan investasi Pemerintah Pusat dan
                    percepatan proyek strategis nasional.
              - _type: numPoint
                _key: '2'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Koperasi adalah koperasi sebagaimana dimaksud dalam
                    Undang-Undang tentang Perkoperasian.
              - _type: numPoint
                _key: '3'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Usaha Mikro, Kecil, dan Menengah yang selanjutnya disingkat
                    UMK-M adalah usaha mikro, usaha kecil, dan usaha menengah
                    sebagaimana dimaksud dalam Undang- Undang tentang Usaha
                    Mikro, Kecil, dan Menengah.
              - _type: numPoint
                _key: '4'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perizinan Berusaha adalah legalitas yang diberikan kepada
                    Pelaku Usaha untuk memulai dan menjalankan usaha dan/atau
                    kegiatannya.
              - _type: numPoint
                _key: '5'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah Pusat adalah Presiden Republik Indonesia yang
                    memegang kekuasaan pemerintahan negara Republik Indonesia
                    yang dibantu oleh Wakil Presiden dan menteri sebagaimana
                    dimaksud dalam Undang-Undang Dasar Negara Republik Indonesia
                    Tahun 1945.
              - _type: numPoint
                _key: '6'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintahan Daerah adalah penyelenggaraan urusan
                    pemerintahan oleh Pemerintah Daerah dan dewan perwakilan
                    rakyat daerah menurut asas otonomi dan tugas pembantuan
                    dengan prinsip otonomi seluas-luasnya dalam sistem dan
                    prinsip Negara Kesatuan Republik Indonesia sebagaimana
                    dimaksud dalam Undang-Undang Dasar Negara Republik Indonesia
                    Tahun 1945.
              - _type: numPoint
                _key: '7'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah Daerah adalah kepala daerah sebagai unsur
                    penyelenggara Pemerintahan Daerah yang memimpin pelaksanaan
                    urusan pemerintahan yang menjadi kewenangan daerah otonom.
              - _type: numPoint
                _key: '8'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelaku Usaha adalah orang perseorangan atau badan usaha yang
                    melakukan usaha dan/atau kegiatan pada bidang tertentu.
              - _type: numPoint
                _key: '9'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Badan Usaha adalah badan usaha berbentuk badan hukum atau
                    tidak berbentuk badan hukum yang didirikan di wilayah Negara
                    Kesatuan Republik Indonesia dan melakukan usaha dan/atau
                    kegiatan pada bidang tertentu.
              - _type: numPoint
                _key: '10'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Rencana Detail Tata Ruang yang selanjutnya disingkat RDTR
                    adalah rencana secara terperinci tentang tata ruang wilayah
                    kabupaten/kota yang dilengkapi dengan peraturan zonasi
                    kabupaten/kota.
              - _type: numPoint
                _key: '11'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Persetujuan Bangunan Gedung adalah perizinan yang diberikan
                    kepada pemilik bangunan gedung untuk membangun baru,
                    mengubah, memperluas, mengurangi, dan/atau merawat bangunan
                    gedung sesuai dengan standar teknis Bangunan Gedung.
              - _type: numPoint
                _key: '12'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Hari adalah hari kerja sesuai dengan yang ditetapkan oleh
                    Pemerintah Pusat.
  - _type: bab
    _key: 2
    _judul: ASAS, TUJUAN, DAN RUANG LINGKUP
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 2
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: 'Undang-Undang ini diselenggarakan berdasarkan asas:'
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: pemerataan hak,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: 'kepastian hukum:'
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: 'kemudahan berusaha:'
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: 'kebersamaan: dan'
                    - _type: alphaPoint
                      _key: e
                      isi:
                        _type: referenceText
                        references: []
                        text: kemandirian.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Selain berdasarkan asas sebagaimana dimaksud pada ayat (1),
                    penyelenggaraan Cipta Kerja dilaksanakan berdasarkan asas
                    lain sesuai dengan bidang hukum yang diatur dalam
                    undang-undang yang bersangkutan.
        - _type: pasal
          _key: 3
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: 'Undang-Undang ini dibentuk dengan tujuan untuk:'
            isi:
              - _type: alphaPoint
                _key: a
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    menciptakan dan meningkatkan lapangan kerja dengan
                    memberikan kemudahan, pelindungan, dan pemberdayaan terhadap
                    koperasi dan UMK-M serta industri dan perdagangan nasional
                    sebagai upaya untuk dapat menyerap tenaga kerja Indonesia
                    yang seluas-luasnya dengan tetap memperhatikan keseimbangan
                    dan kemajuan antardaerah dalam kesatuan ekonomi nasional,
              - _type: alphaPoint
                _key: b
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    menjamin setiap warga negara memperoleh pekerjaan, serta
                    mendapat imbalan dan perlakuan yang adil dan layak dalam
                    hubungan kerja,
              - _type: alphaPoint
                _key: c
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    melakukan penyesuaian berbagai aspek pengaturan yang
                    berkaitan dengan keberpihakan, penguatan, dan perlindungan
                    bagi koperasi dan UMK-M serta industri nasional: dan
              - _type: alphaPoint
                _key: d
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    melakukan penyesuaian berbagai aspek pengaturan yang
                    berkaitan dengan peningkatan ekosistem investasi, kemudahan
                    dan percepatan proyek strategis nasional yang berorientasi
                    pada kepentingan nasional yang berlandaskan pada ilmu
                    pengetahuan dan teknologi nasional dengan berpedoman pada
                    haluan ideologi Pancasila.
        - _type: pasal
          _key: 4
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: >-
                Dalam rangka mencapai tujuan sebagaimana dimaksud dalam Pasal 3,
                ruang lingkup Undang-Undang ini mengatur kebijakan strategis
                Cipta Kerja yang meliputi:
            isi:
              - _type: alphaPoint
                _key: a
                isi:
                  _type: referenceText
                  references: []
                  text: peningkatan ekosistem investasi dan kegiatan berusaha,
              - _type: alphaPoint
                _key: b
                isi:
                  _type: referenceText
                  references: []
                  text: ketenagakerjaan,
              - _type: alphaPoint
                _key: c
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    kemudahan, pelindungan, serta pemberdayaan koperasi dan
                    UMK-M,
              - _type: alphaPoint
                _key: d
                isi:
                  _type: referenceText
                  references: []
                  text: 'kemudahan berusaha:'
              - _type: alphaPoint
                _key: e
                isi:
                  _type: referenceText
                  references: []
                  text: dukungan riset dan inovasi,
              - _type: alphaPoint
                _key: f
                isi:
                  _type: referenceText
                  references: []
                  text: pengadaan tanah,
              - _type: alphaPoint
                _key: g
                isi:
                  _type: referenceText
                  references: []
                  text: 'kawasan ekonomi:'
              - _type: alphaPoint
                _key: h
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    investasi Pemerintah Pusat dan percepatan proyek strategis
                    nasional, Ii. pelaksanaan administrasi pemerintahan: dan J.
                    pengenaan sanksi.
        - _type: pasal
          _key: 5
          isi:
            _type: referenceText
            references: []
            text: >-
              Ruang lingkup sebagaimana dimaksud dalam Pasal 4 meliputi bidang
              hukum yang diatur dalam undang-undang terkait.
  - _type: bab
    _key: 3
    _judul: PENINGKATAN EKOSISTEM INVESTASI DAN KEGIATAN BERUSAHA
    isi:
      _type: bagians
      bagians:
        - _type: bagian
          _key: 1
          _judul: Bagian Kesatu Umum
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 6
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Peningkatan ekosistem investasi dan kegiatan berusaha
                      sebagaimana dimaksud dalam Pasal 5 ayat (1) huruf a
                      meliputi:
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: penerapan Perizinan Berusaha berbasis risiko,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: 'penyederhanaan persyaratan dasar Perizinan Berusaha:'
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: penyederhanaan Perizinan Berusaha sektor, dan
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: penyederhanaan persyaratan investasi.
        - _type: bagian
          _key: 2
          _judul: Bagian Kedua Penerapan Perizinan Berusaha Berbasis Risiko
          isi:
            _type: paragrafs
            paragrafs:
              - _type: paragraf
                _key: 1
                _judul: Paragraf 1 Umum
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 7
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Perizinan Berusaha berbasis risiko sebagaimana
                                dimaksud dalam Pasal 6 huruf a dilakukan
                                berdasarkan penetapan tingkat risiko dan
                                peringkat skala usaha kegiatan usaha.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penetapan tingkat risiko dan peringkat skala
                                usaha sebagaimana dimaksud pada ayat (1)
                                diperoleh berdasarkan penilaian tingkat bahaya
                                dan potensi terjadinya bahaya.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Penilaian tingkat bahaya sebagaimana dimaksud
                                  pada ayat (2) dilakukan terhadap aspek:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: kesehatan,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: keselamatan,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: lingkungan, dan/atau
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: pemanfaatan dan pengelolaan sumber daya.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Untuk kegiatan tertentu, penilaian tingkat
                                bahaya sebagaimana dimaksud pada ayat (3) dapat
                                mencakup aspek lainnya sesuai dengan sifat
                                kegiatan usaha.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Penilaian tingkat bahaya sebagaimana dimaksud
                                  pada ayat (3) dan ayat (4) dilakukan dengan
                                  memperhitungkan:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: jenis kegiatan usaha,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: kriteria kegiatan usaha,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: lokasi kegiatan usaha,
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: keterbatasan sumber daya, dan/atau
                                - _type: alphaPoint
                                  _key: e
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: risiko volatilitas.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Penilaian potensi terjadinya bahaya
                                  sebagaimana dimaksud pada ayat (2) meliputi:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: hampir tidak mungkin terjadi,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: kemungkinan kecil terjadi,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: . kemungkinan terjadi, atau
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: hampir pasti terjadi.
                          - _type: ayat
                            _key: 7
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Berdasarkan penilaian tingkat bahaya
                                  sebagaimana dimaksud pada ayat (3), ayat (4),
                                  dan ayat (S5), serta penilaian potensi
                                  terjadinya bahaya sebagaimana dimaksud pada
                                  ayat (6), tingkat risiko dan peringkat skala
                                  usaha kegiatan usaha ditetapkan menjadi:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: kegiatan usaha berisiko rendah,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: kegiatan usaha berisiko menengah, atau
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: kegiatan usaha berisiko tinggi.
              - _type: paragraf
                _key: 2
                _judul: Paragraf 2 Perizinan Berusaha Kegiatan Usaha Berisiko Rendah
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 8
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Perizinan Berusaha untuk kegiatan usaha berisiko
                                rendah sebagaimana dimaksud dalam Pasal 7 ayat
                                (7) huruf a berupa pemberian nomor induk
                                berusaha yang merupakan legalitas pelaksanaan
                                kegiatan berusaha.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Nomor induk berusaha sebagaimana dimaksud pada
                                ayat (1) merupakan bukti registrasi/pendaftaran
                                Pelaku Usaha untuk melakukan kegiatan usaha dan
                                sebagai identitas bagi Pelaku Usaha dalam
                                pelaksanaan kegiatan usahanya.
              - _type: paragraf
                _key: 3
                _judul: Paragraf 3 Perizinan Berusaha Kegiatan Usaha Berisiko Menengah
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 9
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Perizinan Berusaha untuk kegiatan usaha
                                  berisiko menengah sebagaimana dimaksud dalam
                                  Pasal 7 ayat (7) huruf b meliputi:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      kegiatan usaha berisiko menengah rendah,
                                      dan
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: kegiatan usaha berisiko menengah tinggi.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Perizinan Berusaha untuk kegiatan usaha
                                  berisiko menengah rendah sebagaimana dimaksud
                                  pada ayat (1) huruf a berupa pemberian:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: 'nomor induk berusaha: dan'
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: sertifikat standar.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Perizinan Berusaha untuk kegiatan usaha
                                  berisiko menengah tinggi sebagaimana dimaksud
                                  pada ayat (1) huruf b berupa pemberian:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: 'nomor induk berusaha: dan'
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: sertifikat standar.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Sertifikat standar sebagaimana dimaksud pada
                                ayat (2) huruf b merupakan pernyataan Pelaku
                                Usaha untuk memenuhi standar usaha dalam rangka
                                melakukan kegiatan usaha.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Sertifikat standar sebagaimana dimaksud pada
                                ayat (3) huruf b merupakan sertifikat standar
                                usaha yang diterbitkan Pemerintah Pusat atau
                                Pemerintah Daerah sesuai kewenangannya
                                berdasarkan hasil verifikasi pemenuhan standar
                                pelaksanaan kegiatan usaha oleh Pelaku Usaha.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal kegiatan usaha berisiko menengah
                                memerlukan standardisasi produk sebagaimana
                                dimaksud pada ayat (2) huruf b dan ayat (3)
                                huruf b, Pemerintah Pusat menerbitkan sertifikat
                                standar produk berdasarkan hasil verifikasi
                                pemenuhan standar yang wajib dipenuhi oleh
                                Pelaku Usaha sebelum melakukan kegiatan
                                komersialisasi produk.
              - _type: paragraf
                _key: 4
                _judul: Paragraf 4 Perizinan Berusaha Kegiatan Usaha Berisiko Tinggi
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 10
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Perizinan Berusaha untuk kegiatan usaha
                                  berisiko tinggi sebagaimana dimaksud dalam
                                  Pasal 7 ayat (7) huruf c berupa pemberian:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: 'nomor induk berusaha: dan'
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: izin.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Izin sebagaimana dimaksud pada ayat (1) huruf b
                                merupakan persetujuan Pemerintah Pusat atau
                                Pemerintah Daerah untuk pelaksanaan kegiatan
                                usaha yang wajib dipenuhi oleh Pelaku Usaha
                                sebelum melaksanakan kegiatan usahanya.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal kegiatan usaha berisiko tinggi
                                memerlukan pemenuhan standar usaha dan standar
                                produk, Pemerintah Pusat atau Pemerintah Daerah
                                menerbitkan sertifikat standar usaha dan
                                sertifikat standar produk berdasarkan hasil
                                verifikasi pemenuhan standar.
              - _type: paragraf
                _key: 5
                _judul: Paragraf 5 Pengawasan
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 11
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengawasan terhadap setiap kegiatan usaha dilakukan
                          dengan pengaturan frekuensi pelaksanaan berdasarkan
                          tingkat risiko sebagaimana dimaksud dalam Pasal 7 ayat
                          (7) dan mempertimbangkan tingkat kepatuhan Pelaku
                          Usaha.
              - _type: paragraf
                _key: 6
                _judul: Paragraf 6 Peraturan Pelaksanaan
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 12
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan lebih lanjut mengenai Perizinan Berusaha
                          berbasis risiko sebagaimana dimaksud dalam Pasal 7,
                          Pasal 8, Pasal 9, dan Pasal 10, serta tata cara
                          pengawasan sebagaimana dimaksud dalam Pasal 11 diatur
                          dalam Peraturan Pemerintah.
        - _type: bagian
          _key: 3
          _judul: Bagian Ketiga Penyederhanaan Persyaratan Dasar Perizinan Berusaha
          isi:
            _type: paragrafs
            paragrafs:
              - _type: paragraf
                _key: 1
                _judul: Paragraf 1 Umum
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 13
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Penyederhanaan persyaratan dasar Perizinan Berusaha
                            sebagaimana dimaksud dalam Pasal 6 huruf b meliputi:
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: kesesuaian kegiatan pemanfaatan ruang,
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: 'persetujuan lingkungan: dan'
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Persetujuan Bangunan Gedung dan sertifikat laik
                                fungsi.
              - _type: paragraf
                _key: 2
                _judul: Paragraf 2 Kesesuaian Kegiatan Pemanfaatan Ruang
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 14
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Kesesuaian kegiatan pemanfaatan ruang
                                sebagaimana dimaksud dalam Pasal 13 huruf a
                                merupakan kesesuaian rencana lokasi kegiatan
                                dan/atau usahanya dengan RDTR.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemerintah Daerah wajib menyusun dan menyediakan
                                RDTR dalam bentuk digital dan sesuai standar.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penyediaan RDTR dalam bentuk digital sebagaimana
                                dimaksud pada ayat (2) dilakukan sesuai dengan
                                standar dan dapat diakses dengan mudah oleh
                                masyarakat untuk mendapatkan informasi mengenai
                                kesesuaian rencana lokasi kegiatan dan/atau
                                usahanya dengan RDTR.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: ' bentuk digital sebagaimana dimaksud pada ayat (2) ke dalam sistem Perizinan Berusaha secara elektronik.'
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal Pelaku Usaha mendapatkan informasi
                                rencana lokasi kegiatan usahanya sebagaimana
                                dimaksud pada ayat (3) telah sesuai dengan RDTR,
                                Pelaku Usaha mengajukan permohonan kesesuaian
                                kegiatan pemanfaatan ruang untuk kegiatan
                                usahanya melalui sistem Perizinan Berusaha
                                secara elektronik sebagaimana dimaksud pada ayat
                                (4) dengan mengisi koordinat lokasi yang
                                diinginkan untuk memperoleh konfirmasi
                                kesesuaian kegiatan pemanfaatan ruang.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Setelah memperoleh konfirmasi kesesuaian
                                kegiatan pemanfaatan ruang sebagaimana dimaksud
                                pada ayat (5), Pelaku Usaha mengajukan
                                permohonan Perizinan Berusaha.
                    - _type: pasal
                      _key: 15
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal Pemerintah Daerah belum menyusun dan
                                menyediakan RDTR sebagaimana dimaksud dalam
                                Pasal 14 ayat (2), Pelaku Usaha mengajukan
                                permohonan persetujuan kesesuaian kegiatan
                                pemanfaatan ruang untuk kegiatan usahanya kepada
                                Pemerintah Pusat melalui sistem Perizinan
                                Berusaha secara elektronik sesuai dengan
                                ketentuan peraturan perundang-undangan.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemerintah Pusat memberikan persetujuan
                                kesesuaian kegiatan pemanfaatan ruang
                                sebagaimana dimaksud pada ayat (1) sesuai dengan
                                rencana tata ruang.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Rencana tata ruang sebagaimana dimaksud pada
                                  ayat (2) terdiri atas:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: 'rencana tata ruang wilayah nasional:'
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: rencana tata ruang pulau/kepulauanj,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      . rencana tata ruang kawasan strategis
                                      nasional,
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      rencana tata ruang wilayah provinsi,
                                      dan/atau
                                - _type: alphaPoint
                                  _key: e
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: rencana tata ruang wilayah kabupaten/kota.
                    - _type: pasal
                      _key: 16
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Dalam rangka penyederhanaan persyaratan dasar
                            Perizinan Berusaha serta untuk memberikan kepastian
                            dan kemudahan bagi Pelaku Usaha dalam memperoleh
                            kesesuaian kegiatan pemanfaatan ruang, Undang-Undang
                            ini mengubah, menghapus, dan/atau menetapkan
                            pengaturan baru beberapa ketentuan yang diatur
                            dalam:
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Undang-Undang Nomor 26 Tahun 2007 tentang
                                Penataan Ruang (Lembaran Negara Republik
                                Indonesia Tahun 2007 Nomor 68, Tambahan Lembaran
                                Negara Republik Indonesia Nomor 4725):
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Undang-Undang Nomor 27 Tahun 2007 tentang
                                Pengelolaan Wilayah Pesisir dan Pulau-Pulau
                                Kecil (Lembaran Negara Republik Indonesia Tahun
                                2007 Nomor 84, Tambahan Lembaran Negara Republik
                                Indonesia Nomor 4739) sebagaimana telah diubah
                                dengan Undang- Undang Nomor 1 Tahun 2014 tentang
                                Perubahan Atas Undang-Undang Nomor 27 Tahun 2007
                                tentang Pengelolaan Wilayah Pesisir dan
                                Pulau-Pulau Kecil (Lembaran Negara Republik
                                Indonesia Tahun 2014 Nomor 2, Tambahan Lembaran
                                Negara Republik Indonesia Nomor 5490),
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Undang-Undang Nomor 32 Tahun 2014 tentang
                                Kelautan (Lembaran Negara Republik Indonesia
                                Tahun 2014 Nomor 294, Tambahan Lembaran Negara
                                Republik Indonesia Nomor 5603), dan
                          - _type: alphaPoint
                            _key: d
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Undang-Undang Nomor 4 Tahun 2011 tentang
                                Informasi Geospasial (Lembaran Negara Republik
                                Indonesia Tahun 2011 Nomor 49, Tambahan Lembaran
                                Negara Republik Indonesia Nomor 5214).
                    - _type: pasal
                      _key: 17
                      isi:
                        _type: amendPoints
                        description:
                          _type: referenceText
                          references: []
                          text: >-
                            Beberapa ketentuan dalam Undang-Undang Nomor 26
                            Tahun 2007 tentang Penataan Ruang (Lembaran Negara
                            Republik Indonesia Tahun 2007 Nomor 68, Tambahan
                            Lembaran Negara Republik Indonesia Nomor 4725)
                            diubah sebagai berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ruang adalah wadah yang meliputi ruang
                                      darat, ruang laut, dan ruang udara,
                                      termasuk ruang di dalam bumi sebagai satu
                                      kesatuan wilayah, tempat manusia dan
                                      makhluk lain hidup, melakukan kegiatan,
                                      dan memelihara kelangsungan hidupnya.
                                - _type: numPoint
                                  _key: '2'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Tata ruang adalah wujud struktur ruang dan
                                      pola ruang.
                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Struktur ruang adalah susunan pusat-pusat
                                      permukiman dan sistem jaringan prasarana
                                      dan sarana yang berfungsi sebagai
                                      pendukung kegiatan sosial ekonomi
                                      masyarakat yang secara hierarki memiliki
                                      hubungan fungsional.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pola ruang adalah distribusi peruntukan
                                      ruang dalam suatu wilayah yang meliputi
                                      peruntukan ruang untuk fungsi lindung dan
                                      peruntukan ruang untuk fungsi budi daya.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penataan ruang adalah suatu sistem
                                      perencanaan tata ruang, pemanfaatan ruang,
                                      dan pengendalian pemanfaatan ruang.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penyelenggaraan penataan ruang adalah
                                      kegiatan yang meliputi pengaturan,
                                      pembinaan, pelaksanaan, dan pengawasan
                                      penataan ruang.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Pusat adalah Presiden Republik
                                      Indonesia yang memegang kekuasaan
                                      pemerintahan negara Republik Indonesia
                                      yang dibantu oleh Wakil Presiden dan
                                      menteri sebagaimana dimaksud dalam Undang-
                                      Undang Dasar Negara Republik Indonesia
                                      Tahun 1945.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Daerah adalah kepala daerah
                                      sebagai unsur penyelenggara Pemerintahan
                                      Daerah yang memimpin pelaksanaan urusan
                                      pemerintahan yang menjadi kewenangan
                                      daerah otonom.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengaturan penataan ruang adalah upaya
                                      pembentukan landasan hukum bagi Pemerintah
                                      Pusat, Pemerintah Daerah, dan masyarakat
                                      dalam penataan ruang.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembinaan penataan ruang adalah upaya
                                      untuk meningkatkan kinerja penataan ruang
                                      yang diselenggarakan oleh Pemerintah
                                      Pusat, Pemerintah Daerah, dan masyarakat.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pelaksanaan penataan ruang adalah upaya
                                      pencapaian tujuan penataan ruang melalui
                                      pelaksanaan perencanaan tata ruang,
                                      pemanfaatan ruang, dan pengendalian
                                      pemanfaatan ruang.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengawasan penataan ruang adalah upaya
                                      agar penyelenggaraan penataan ruang dapat
                                      diwujudkan sesuai dengan ketentuan
                                      peraturan perundang- undangan.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perencanaan tata ruang adalah suatu proses
                                      untuk menentukan struktur ruang dan pola
                                      ruang yang meliputi penyusunan dan
                                      penetapan rencana tata ruang.
                                - _type: numPoint
                                  _key: '14'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemanfaatan ruang adalah upaya untuk
                                      mewujudkan struktur ruang dan pola ruang
                                      sesuai dengan rencana tata ruang melalui
                                      penyusunan dan pelaksanaan program beserta
                                      pembiayaannya.
                                - _type: numPoint
                                  _key: '15'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengendalian pemanfaatan ruang adalah
                                      upaya untuk mewujudkan tertib tata ruang.
                                - _type: numPoint
                                  _key: '16'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Rencana tata ruang adalah hasil
                                      perencanaan tata ruang.
                                - _type: numPoint
                                  _key: '17'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Wilayah adalah ruang yang merupakan
                                      kesatuan geografis beserta segenap unsur
                                      terkait yang batas dan sistemnya
                                      ditentukan berdasarkan aspek administratif
                                      dan/atau aspek fungsional.
                                - _type: numPoint
                                  _key: '18'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Sistem wilayah adalah struktur ruang dan
                                      pola ruang yang mempunyai jangkauan
                                      pelayanan pada tingkat wilayah.
                                - _type: numPoint
                                  _key: '19'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Sistem internal perkotaan adalah struktur
                                      ruang dan pola ruang yang mempunyai
                                      jangkauan pelayanan pada tingkat internal
                                      perkotaan.
                                - _type: numPoint
                                  _key: '20'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan adalah wilayah yang memiliki
                                      fungsi utama lindung atau budi daya.
                                - _type: numPoint
                                  _key: '21'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan lindung adalah wilayah yang
                                      ditetapkan dengan fungsi utama melindungi
                                      kelestarian lingkungan hidup yang mencakup
                                      sumber daya alam dan sumber daya buatan.
                                - _type: numPoint
                                  _key: '22'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan budi daya adalah wilayah yang
                                      ditetapkan dengan fungsi utama untuk
                                      dibudidayakan atas dasar kondisi dan
                                      potensi sumber daya alam, sumber daya
                                      manusia, dan sumber daya buatan.
                                - _type: numPoint
                                  _key: '23'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan perdesaan adalah wilayah yang
                                      mempunyai kegiatan utama pertanian,
                                      termasuk pengelolaan sumber daya alam
                                      dengan susunan fungsi kawasan sebagai
                                      tempat permukiman perdesaan, pelayanan
                                      jasa pemerintahan, pelayanan sosial, dan
                                      kegiatan ekonomi.
                                - _type: numPoint
                                  _key: '24'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan agropolitan adalah kawasan yang
                                      terdiri atas satu atau lebih pusat
                                      kegiatan pada wilayah perdesaan sebagai
                                      sistem produksi pertanian dan pengelolaan
                                      sumber daya alam tertentu yang ditunjukkan
                                      oleh adanya keterkaitan fungsional dan
                                      hierarki keruangan satuan sistem
                                      permukiman dan sistem agrobisnis.
                                - _type: numPoint
                                  _key: '25'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan perkotaan adalah wilayah yang
                                      mempunyai kegiatan utama bukan pertanian
                                      dengan susunan fungsi kawasan sebagai
                                      tempat permukiman perkotaan, pemusatan dan
                                      distribusi pelayanan jasa pemerintahan,
                                      pelayanan sosial, dan kegiatan ekonomi.
                                - _type: numPoint
                                  _key: '26'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan metropolitan adalah kawasan
                                      perkotaan yang terdiri atas sebuah kawasan
                                      perkotaan yang berdiri sendiri atau
                                      kawasan perkotaan inti dengan kawasan
                                      perkotaan di sekitarnya yang saling
                                      memiliki keterkaitan fungsional yang
                                      dihubungkan dengan sistem jaringan
                                      prasarana wilayah yang terintegrasi dengan
                                      jumlah penduduk secara keseluruhan
                                      sekurang-kurangnya 1.000.000 (satu juta)
                                      jiwa.
                                - _type: numPoint
                                  _key: '27'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan megapolitan adalah kawasan yang
                                      terbentuk dari 2 (dua) atau lebih kawasan
                                      metropolitan yang memiliki hubungan
                                      fungsional dan membentuk sebuah sistem.
                                - _type: numPoint
                                  _key: '28'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan strategis nasional adalah wilayah
                                      yang penataan ruangnya diprioritaskan
                                      karena mempunyai pengaruh sangat penting
                                      secara nasional terhadap kedaulatan
                                      negara, pertahanan, dan keamanan negara,
                                      ekonomi, sosial, budaya, dan/atau
                                      lingkungan, termasuk wilayah yang telah
                                      ditetapkan sebagai warisan dunia.
                                - _type: numPoint
                                  _key: '29'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan strategis provinsi adalah wilayah
                                      yang penataan ruangnya diprioritaskan
                                      karena mempunyai pengaruh sangat penting
                                      dalam lingkup provinsi terhadap ekonomi,
                                      sosial, budaya, dan/atau lingkungan.
                                - _type: numPoint
                                  _key: '30'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kawasan strategis kabupaten/kota adalah
                                      wilayah yang penataan ruangnya
                                      diprioritaskan karena mempunyai pengaruh
                                      sangat penting dalam lingkup
                                      kabupaten/kota terhadap ekonomi, sosial,
                                      budaya, dan/atau lingkungan.
                                - _type: numPoint
                                  _key: '31'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ruang terbuka hijau adalah area
                                      memanjang/jalur dan/atau mengelompok yang
                                      penggunaannya lebih bersifat terbuka,
                                      tempat tumbuh tanaman, baik yang tumbuh
                                      secara alamiah maupun yang sengaja
                                      ditanam, dengan mempertimbangkan aspek
                                      fungsi ekologis, resapan air, ekonomi,
                                      sosial budaya, dan estetika.
                                - _type: numPoint
                                  _key: '32'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kesesuaian Kegiatan Pemanfaatan Ruang
                                      adalah kesesuaian antara rencana kegiatan
                                      pemanfaatan ruang dengan rencana tata
                                      ruang.
                                - _type: numPoint
                                  _key: '33'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Orang adalah orang perseorangan dan/atau
                                      korporasi.
                                - _type: numPoint
                                  _key: '34'
                                  isi:
                                    _type: referenceText
