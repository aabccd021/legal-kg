                          pekerja/buruh dengan alasan: REPUBLIK INDONESIA - 552
                          - a. berhalangan masuk kerja karena sakit menurut
                          keterangan dokter selama waktu tidak melampaui 12 (dua
                          belas) bulan secara terus-menerus, b. berhalangan
                          menjalankan pekerjaannya karena memenuhi kewajiban
