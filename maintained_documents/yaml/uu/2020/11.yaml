                        text: >-
                          42. Di antara Pasal 154 dan Pasal 155 disisipkan 1
                          (satu) pasal, yakni Pasal 154A sehingga berbunyi
                          sebagai berikut: Pasal 154A (1) Pemutusan hubungan
                          kerja dapat terjadi karena alasan: a. perusahaan
                          melakukan penggabungan, peleburan, pengambilalihan,
                          atau pemisahan perusahaan dan pekerja/buruh tidak
                          bersedia melanjutkan hubungan kerja atau pengusaha
                          tidak bersedia menerima pekerja/ buruh, b. perusahaan
                          melakukan efisiensi diikuti dengan penutupan
                          perusahaan atau tidak diikuti dengan penutupan
                          perusahaan yang disebabkan perusahaan mengalami
                          kerugian, C. perusahaan tutup yang disebabkan karena
                          perusahaan mengalami kerugian secara terus menerus
                          selama 2 (dua) tahun, d. perusahaan tutup yang
                          disebabkan keadaan memaksa (force majeur). e.
                          perusahaan dalam keadaan penundaan kewajiban
                          pembayaran utang, f. perusahaan pailit, g. adanya
                          permohonan pemutusan hubungan kerja yang diajukan oleh
                          pekerja/buruh dengan alasan pengusaha melakukan
                          perbuatan sebagai berikut: 1. menganiaya, menghina
                          secara kasar atau mengancam pekerja/ buruh, REPUBLIK
                          INDONESIA .554 - 2. membujuk dan/atau menyuruh
                          pekerja/buruh untuk melakukan perbuatan yang
                          bertentangan dengan peraturan perundang-undangan, 3.
                          tidak membayar upah tepat pada waktu yang telah
                          ditentukan selama 3 (tiga) bulan berturut-turut atau
                          lebih, meskipun pengusaha membayar upah secara tepat
                          waktu sesudah itu: 4. tidak melakukan kewajiban yang
                          telah dijanjikan kepada pekerja/ buruh, 5.
                          memerintahkan pekerja/ buruh untuk melaksanakan
                          pekerjaan di luar yang diperjanjikan, atau 6.
                          memberikan pekerjaan yang membahayakan jiwa,
                          keselamatan, kesehatan, dan kesusilaan pekerja/buruh
                          sedangkan pekerjaan tersebut tidak dicantumkan pada
                          perjanjian kerja, h. adanya putusan lembaga
                          penyelesaian perselisihan hubungan industrial yang
                          menyatakan pengusaha tidak melakukan perbuatan
                          sebagaimana dimaksud pada huruf g terhadap permohonan
                          yang diajukan oleh pekerja/buruh dan pengusaha
                          memutuskan untuk melakukan pemutusan hubungan kerja, 1
                          pekerja/buruh mengundurkan diri atas kemauan sendiri
                          dan harus memenuhi syarat: 1. mengajukan permohonan
                          pengunduran diri secara tertulis selambat-lambatnya 30
                          (tiga puluh) hari sebelum tanggal mulai pengunduran
                          diri, 2. tidak terikat dalam ikatan dinas, dan 3.
                          tetap melaksanakan kewajibannya sampai tanggal mulai
                          pengunduran diri, » REPUBLIK INDONESIA - 555 - j.
                          pekerja/buruh mangkir selama 5 (lima) hari kerja atau
                          lebih berturut-turut tanpa keterangan secara tertulis
                          yang dilengkapi dengan bukti yang sah dan telah
                          dipanggil oleh pengusaha 2 (dua) kali secara patut dan
                          tertulis, k. pekerja/buruh melakukan pelanggaran
                          ketentuan yang diatur dalam perjanjian kerja,
                          peraturan perusahaan, atau perjanjian kerja bersama
                          dan sebelumnya telah diberikan surat peringatan
                          pertama, kedua, dan ketiga secara berturut-turut
                          masing-masing berlaku untuk paling lama 6 (enam) bulan
                          kecuali ditetapkan lain dalam perjanjian kerja,
                          peraturan perusahaan, atau perjanjian kerja bersama,
                          l. pekerja/buruh tidak dapat melakukan pekerjaan
                          selama 6 (enam) bulan akibat ditahan pihak yang
                          berwajib karena diduga melakukan tindak pidana, m.
                          pekerja/buruh mengalami sakit berkepanjangan atau
                          cacat akibat kecelakaan kerja dan tidak dapat
                          melakukan pekerjaannya setelah melampaui batas 12 (dua
                          belas) bulan, n. pekerja/buruh memasuki usia pensiun,
                          atau Oo. pekerja/buruh meninggal dunia. (2) Selain
                          alasan pemutusan hubungan kerja sebagaimana dimaksud
                          pada ayat (1), dapat ditetapkan alasan pemutusan
                          hubungan kerja lainnya dalam perjanjian kerja,
                          peraturan perusahaan, atau perjanjian kerja bersama
                          sebagaimana dimaksud dalam Pasal 61 ayat (1). (3)
                          Ketentuan lebih lanjut mengenai tata cara pemutusan
                          hubungan kerja diatur dalam Peraturan Pemerintah.
