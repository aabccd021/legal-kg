                          induk berusaha, Usaha Mikro dan Kecil wajib memiliki
                          sertifikat sertifikasi standar dan/atau izin. (8)
                          Pemerintah Pusat dan Pemerintah Daerah sesuai dengan
                          kewenangannya berdasarkan norma, standar, prosedur,
                          dan kriteria yang ditetapkan oleh Pemerintah Pusat
                          memfasilitasi sertifikasi standar dan/atau izin
                          sebagaimana dimaksud pada ayat (5). (9) Ketentuan
                          lebih lanjut mengenai perizinan tunggal sebagaimana
                          dimaksud pada ayat (5) dan fasilitasi sertifikasi
                          standar dan/atau izin sebagaimana dimaksud pada ayat
                          (8) diatur dalam Peraturan Pemerintah.
