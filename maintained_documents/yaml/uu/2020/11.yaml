                                mempunyai kewajiban: a. memberikan informasi
                                yang benar tentang pelayanan Rumah Sakit kepada
                                masyarakat, b. memberi pelayanan kesehatan yang
                                aman, bermutu, anti diskriminasi, dan efektif
                                dengan mengutamakan kepentingan pasien sesuai
                                dengan standar pelayanan Rumah Sakit, c.
                                memberikan pelayanan gawat darurat kepada pasien
                                sesuai dengan kemampuan pelayanannya, REPUBLIK
                                INDONESIA - 459 - d. berperan aktif dalam
                                memberikan pelayanan kesehatan pada bencana
                                sesuai dengan kemampuan pelayanannya, e.
                                menyediakan sarana dan pelayanan bagi masyarakat
                                tidak mampu atau miskin, fl. melaksanakan fungsi
                                sosial antara lain dengan memberikan fasilitas
                                pelayanan pasien tidak mampu/miskin, pelayanan
                                gawat darurat tanpa uang muka, ambulan gratis,
                                pelayanan korban bencana dan kejadian luar
                                biasa, atau bakti sosial bagi misi kemanusiaan,
                                g. membuat, melaksanakan, dan menjaga standar
                                mutu pelayanan kesehatan di Rumah Sakit sebagai
                                acuan dalam melayani pasien, h. menyelenggarakan
                                rekam medis, Ii. menyediakan sarana dan
                                prasarana umum yang layak antara lain sarana
                                ibadah, parkir, ruang tunggu, sarana untuk orang
                                cacat, wanita menyusui, anak-anak, dan lanjut
                                usia, j- melaksanakan sistem rujukan, k. menolak
                                keinginan pasien yang bertentangan dengan
                                standar profesi dan etika serta ketentuan
                                peraturan perundang-undangan, Il. memberikan
                                informasi yang benar, jelas, dan jujur mengenai
                                hak dan kewajiban pasien: m. menghormati dan
                                melindungi hak pasien, n. melaksanakan etika
                                Rumah Sakit: O. memiliki sistem pencegahan
                                kecelakaan dan penanggulangan bencana, p.
                                melaksanakan program pemerintah di bidang
                                kesehatan, baik secara regional maupun nasional,
                                g. membuat daftar tenaga medis yang melakukan
                                praktik kedokteran atau kedokteran gigi dan
                                tenaga kesehatan lainnya, r. menyusun dan
                                melaksanakan peraturan internal Rumah Sakit:
                                REPUBLIK INDONESIA - 460 - s. melindungi dan
                                memberikan bantuan hukum bagi semua petugas
                                Rumah Sakit dalam melaksanakan tugas, dan t. '
                                memberlakukan seluruh lingkungan rumah sakit
                                sebagai kawasan tanpa rokok. (2) Pelanggaran
