                      description:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan Pasal 26 diubah sehingga berbunyi sebagai
                          berikut:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 21
                      _pasalKey: '27'
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Di dalam KEK berlaku ketentuan larangan impor
                                dan ekspor yang diatur berdasarkan ketentuan
                                peraturan perundang-undangan. |
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Terhadap impor barang ke KEK belum diberlakukan
