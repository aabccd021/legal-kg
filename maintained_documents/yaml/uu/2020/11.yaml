                    - _type: pasal
                      _key: 59
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Untuk memberikan kemudahan bagi masyarakat terutama
                          Pelaku Usaha dalam mendapatkan Perizinan Berusaha dari
                          sektor Kesehatan, Obat, dan Makanan, Undang-Undang ini
                          mengubah, menghapus, atau menetapkan pengaturan baru
                          beberapa ketentuan yang diatur dalam: a. Undang-Undang
                          Nomor 36 Tahun 2009 tentang Kesehatan (Lembaran Negara
                          Republik Indonesia Tahun 2009 Nomor 144, Tambahan
                          Lembaran Negara Republik Indonesia Nomor 5063),
                          REPUBLIK INDONESIA -451 - b. Undang-Undang Nomor 44
                          Tahun 2009 tentang Rumah Sakit (Lembaran Negara
                          Republik Indonesia Tahun 2009 Nomor 153, Tambahan
                          Lembaran Negara Republik Indonesia Nomor 5072), c.
                          Undang-Undang Nomor 5 Tahun 1997 tentang Psikotropika
                          (Lembaran Negara Republik Indonesia Tahun 1997 Nomor
                          10 Tambahan Lembaran Negara Republik Indonesia Nomor
                          3671), d. Undang-Undang Nomor 35 Tahun 2009 tentang
                          Narkotika (Lembaran Negara Republik Indonesia Tahun
                          2009 Nomor 143, Tambahan Lembaran Negara Republik
                          Indonesia Nomor 5062): dan e. Undang-Undang Nomor 18
                          Tahun 2012 tentang Pangan (Lembaran Negara Republik
                          Indonesia Tahun 2012 Nomor 227, Tambahan Lembaran
                          Negara Republik Indonesia Nomor 5360).
