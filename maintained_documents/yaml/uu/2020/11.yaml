                              text: >-
                                32. Di antara Pasal 82 dan Pasal 83 disisipkan 3
                                (tiga) pasal, yakni Pasal 82A, Pasal 82B, dan
                                Pasal 82C sehingga berbunyi sebagai berikut:
                                Pasal 82A Setiap orang yang melakukan usaha
                                dan/atau kegiatan tanpa memiliki: a. Perizinan
                                Berusaha, atau persetujuan Pemerintah Pusat atau
                                Pemerintah Daerah sebagaimana dimaksud dalam
                                Pasal 24 ayat (5), Pasal 34 ayat (3), Pasal 59
                                ayat (1) atau Pasal 59 ayat (4): atau b.
                                persetujuan dari Pemerintah Pusat atau
                                Pemerintah Daerah sebagaimana dimaksud dalam
                                Pasal 20 ayat (3) huruf b: dikenai sanksi
                                administratif. Pasal 82B (1) Setiap orang yang
                                melakukan usaha dan/atau kegiatan yang memiliki:
                                a. Perizinan Berusaha, atau persetujuan
                                Pemerintah Pusat atau Pemerintah Daerah
                                sebagaimana dimaksud dalam Pasal 24 ayat (5),
                                Pasal 34 ayat (3), Pasal 59 ayat (1), atau Pasal
                                59 ayat (4), b. persetujuan dari Pemerintah
                                Pusat atau Pemerintah Daerah sebagaimana
                                dimaksud dalam Pasal 20 ayat (3) huruf b: atau
                                Cc. persetujuan dari Pemerintah Pusat
                                sebagaimana dimaksud dalam Pasal 61 ayat (1):
                                REPUBLIK INDONESIA - 95 - yang tidak sesuai
                                dengan kewajiban dalam Perizinan Berusaha, atau
                                persetujuan Pemerintah Pusat atau Pemerintah
                                Daerah, dan/atau melanggar ketentuan peraturan
                                perundang-undangan di bidang perlindungan dan
                                pengelolaan lingkungan hidup, dikenai sanksi
                                administratif. (2) Setiap orang yang melakukan
                                pelanggaran larangan sebagaimana dimaksud dalam
                                Pasal 69, yaitu: a. melakukan perbuatan yang
                                mengakibatkan pencemaran dan/atau perusakan
                                lingkungan hidup sebagaimana dimaksud dalam
                                Pasal 69 huruf a, dimana perbuatan tersebut
                                dilakukan karena kelalaian dan tidak
                                mengakibatkan bahaya kesehatan manusia dan/atau
                                luka dan/atau luka berat, dan/atau matinya orang
                                dikenai sanksi administratif dan mewajibkan
                                kepada Penanggung Jawab perbuatan itu untuk
                                melakukan pemulihan fungsi lingkungan hidup
                                dan/atau tindakan lain yang diperlukan, atau b.
                                menyusun Amdal tanpa memiliki sertifikat
                                kompetensi penyusun Amdal sebagaimana dimaksud
                                dalam Pasal 69 huruf i dikenai sanksi
                                administratif. (3) Setiap orang yang karena
                                kelalaiannya melakukan perbuatan yang
                                mengakibatkan dilampauinya baku mutu udara
                                ambien, baku mutu air, baku mutu air laut, atau
                                kriteria baku kerusakan lingkungan hidup yang
                                tidak sesuai dengan Perizinan Berusaha yang
                                dimilikinya dikenai sanksi administratif. Pasal
                                820 (1) Sanksi administratif sebagaimana
                                dimaksud dalam Pasal 82A dan Pasal 82B ayat (1),
                                ayat (2), dan ayat (3) berupa: a. teguran
                                tertulis: b. paksaan pemerintah: c. denda
                                administratif: d. pembekuan Perizinan Berusaha,
                                dan/atau e. pencabutan Perizinan Berusaha.
                                REPUBLIK INDONESIA - 96 - (2) Ketentuan lebih
                                lanjut mengenai kriteria, jenis, besaran denda,
                                dan tata cara pengenaan sanksi administratif
                                sebagaimana dimaksud pada ayat (1) diatur dalam
                                Peraturan Pemerintah.
