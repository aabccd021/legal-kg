                                ternyata Wajib Pajak mempunyai utang pajak,
                                langsung diperhitungkan untuk melunasi terlebih
                                dahulu utang pajak tersebut. (la) Kelebihan
                                pembayaran pajak sebagai akibat adanya Surat
                                Keputusan Keberatan, Surat Keputusan Pembetulan,
                                Surat Keputusan Pengurangan Sanksi Administrasi,
                                Surat Keputusan Penghapusan Sanksi Administrasi,
                                Surat Keputusan Pengurangan Ketetapan Pajak,
                                Surat Keputusan Pembatalan Ketetapan Pajak, dan
                                Putusan Banding atau Putusan Peninjauan Kembali,
                                serta Surat Keputusan Pemberian Imbalan Bunga
                                dikembalikan kepada Wajib Pajak dengan ketentuan
                                jika ternyata Wajib Pajak mempunyai utang pajak
                                langsung diperhitungkan untuk melunasi terlebih
                                dahulu utang pajak tersebut.
