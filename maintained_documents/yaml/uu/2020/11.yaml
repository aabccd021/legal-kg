                          mengenai tata cara: a. evaluasi Rancangan Peraturan
                          Daerah mengenai Pajak Daerah dan Retribusi Daerah
                          sebagaimana dimaksud dalam Pasal 157, b. pengawasan
                          pelaksanaan Peraturan Daerah mengenai Pajak Daerah dan
                          Retribusi Daerah dan aturan pelaksanaannya sebagaimana
                          dimaksud dalam Pasal 158: dan C. pemberian sanksi
                          sebagaimana dimaksud dalam Pasal 159 diatur dalam
                          Peraturan Pemerintah.
