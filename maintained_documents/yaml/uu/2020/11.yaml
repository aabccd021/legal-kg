                                  dikreditkan dalam jangka waktu 3 (tiga) tahun
                                  tersebut menjadi tidak dapat dikreditkan. (6b)
                                  Dihapus. (6c) Jangka waktu sebagaimana
                                  dimaksud pada ayat (Sa) bagi sektor usaha
                                  tertentu dapat ditetapkan lebih dari 3 (tiga)
