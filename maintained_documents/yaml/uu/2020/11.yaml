                                Ketentuan Pasal 24 diubah sehingga berbunyi
                                sebagai berikut:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 8
                            _pasalKey: '26'
                            isi:
                              _type: ayats
                              ayats:
                                - _type: ayat
                                  _key: 1
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Eksportir Narkotika wajib memberikan Surat
                                      Persetujuan Ekspor Narkotika yang
                                      diterbitkan oleh Pemerintah Pusat dan
                                      dokumen atau Surat Persetujuan Impor
                                      Narkotika yang sah sesuai dengan ketentuan
                                      peraturan perundang-undangan di negara
                                      pengimpor kepada orang yang bertanggung
                                      jawab atas perusahaan pengangkutan ekspor.
                                - _type: ayat
                                  _key: 2
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Orang yang bertanggung jawab atas
                                      perusahaan pengangkutan ekspor wajib
                                      memberikan Surat Persetujuan Ekspor
                                      Narkotika yang diterbitkan oleh Pemerintah
                                      Pusat dan dokumen atau Surat Persetujuan
                                      Impor Narkotika yang sah sesuai dengan
                                      ketentuan peraturan perundang-undangan di
                                      negara pengimpor kepada penanggung jawab
                                      pengangkut.
                                - _type: ayat
                                  _key: 3
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penanggung jawab pengangkut Ekspor
                                      Narkotika wajib membawa dan bertanggung
                                      jawab atas kelengkapan Surat Persetujuan
                                      Ekspor Narkotika yang diterbitkan oleh
                                      Pemerintah Pusat dan dokumen atau Surat
                                      Persetujuan Impor Narkotika yang sah
                                      sesuai dengan. ketentuan peraturan
                                      perundang-undangan di negara pengimpor.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 26 diubah sehingga berbunyi
                                sebagai berikut:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 10
                            _pasalKey: '39'
                            isi:
                              _type: ayats
                              ayats:
                                - _type: ayat
                                  _key: 1
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Narkotika hanya dapat disalurkan oleh
                                      Industri Farmasi, Pedagang Besar Farmasi,
                                      dan sarana penyimpanan sediaan farmasi
                                      pemerintah sesuai dengan ketentuan dalam
                                      Undang-Undang ini.
                                - _type: ayat
                                  _key: 2
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Industri Farmasi, Pedagang Besar Farmasi,
                                      dan sarana penyimpanan sediaan farmasi
                                      pemerintah sebagaimana dimaksud pada ayat
                                      (1) wajib memenuhi Perizinan Berusaha dari
                                      Pemerintah Pusat.
                                - _type: ayat
                                  _key: 3
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ketentuan lebih lanjut mengenai Perizinan
                                      Berusaha sebagaimana dimaksud pada ayat
                                      (2) diatur dalam Peraturan Pemerintah.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 39 diubah sehingga berbunyi
                                sebagai berikut:
                        documentNode:
                          _documentType: uu
                          nomor: 35
                          tahun: 2009
                    - _type: pasal
                      _key: 64
                      isi:
                        _type: amendPoints
                        description:
                          _type: referenceText
                          references: []
                          text: >-
                            Beberapa ketentuan dalam Undang-Undang Nomor 18
                            Tahun 2012 tentang Pangan (Lembaran Negara Republik
                            Indonesia Tahun 2012 Nomor 227, Tambahan Lembaran
                            Negara Republik Indonesia Nomor 5360) diubah sebagai
                            berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pangan adalah segala sesuatu yang berasal
                                      dari sumber hayati produk pertanian,
                                      perkebunan, kehutanan, perikanan,
                                      peternakan, perairan, dan air, baik yang
                                      diolah maupun tidak diolah yang
                                      diperuntukkan sebagai makanan atau minuman
                                      bagi konsumsi manusia, termasuk bahan
                                      tambahan Pangan, bahan baku Pangan, dan
                                      bahan lainnya yang digunakan dalam
                                      penyiapan, pengolahan, dan/atau pembuatan
                                      makanan atau minuman.
                                - _type: numPoint
                                  _key: '2'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kedaulatan Pangan adalah hak negara dan
                                      bangsa yang secara mandiri menentukan
                                      kebijakan Pangan yang menjamin hak atas
                                      Pangan bagi rakyat dan yang memberikan hak
                                      bagi masyarakat untuk menentukan sistem
                                      Pangan yang sesuai dengan potensi sumber
                                      daya lokal.
                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kemandirian Pangan adalah kemampuan negara
                                      dan bangsa dalam memproduksi Pangan yang
                                      beraneka ragam dari dalam negeri yang
                                      dapat menjamin pemenuhan kebutuhan Pangan
                                      yang cukup sampai di tingkat perseorangan
                                      dengan memanfaatkan potensi sumber daya
                                      alam, manusia, sosial, ekonomi, dan
                                      kearifan lokal secara bermartabat.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ketahanan Pangan adalah kondisi
                                      terpenuhinya Pangan bagi negara sampai
                                      dengan perseorangan yang tercermin dari
                                      tersedianya Pangan yang cukup, baik jumlah
                                      maupun mutunya, aman, beragam, bergizi,
                                      merata, dan terjangkau serta tidak
                                      bertentangan dengan agama, keyakinan, dan
                                      budaya masyarakat untuk dapat hidup sehat,
                                      aktif, dan produktif secara berkelanjutan.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Keamanan Pangan adalah kondisi dan upaya
                                      yang diperlukan untuk mencegah Pangan dari
                                      kemungkinan cemaran biologis, kimia, dan
                                      benda lain yang dapat mengganggu,
                                      merugikan, dan membahayakan kesehatan
                                      manusia serta tidak bertentangan dengan
                                      agama, keyakinan, dan budaya masyarakat
                                      sehingga aman untuk dikonsumsi.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Produksi Pangan adalah kegiatan atau
                                      proses menghasilkan, menyiapkan, mengolah,
                                      membuat, mengawetkan, mengemas, mengemas
                                      kembali, dan/atau mengubah bentuk Pangan.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ketersediaan Pangan adalah kondisi
                                      tersedianya Pangan dari hasil produksi
                                      dalam negeri, Cadangan Pangan Nasional,
                                      dan Impor Pangan.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Cadangan Pangan Nasional adalah persediaan
                                      Pangan di seluruh wilayah Negara Kesatuan
                                      Republik Indonesia untuk konsumsi manusia
                                      dan untuk menghadapi masalah kekurangan
                                      Pangan, gangguan pasokan dan harga, serta
                                      keadaan darurat.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Cadangan Pangan Pemerintah adalah
                                      persediaan Pangan yang dikuasai dan
                                      dikelola oleh Pemerintah.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Cadangan Pangan Pemerintah Provinsi adalah
                                      persediaan Pangan yang dikuasai dan
                                      dikelola oleh pemerintah provinsi.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Cadangan Pangan Pemerintah Kabupaten/Kota
                                      adalah persediaan Pangan yang dikuasai dan
                                      dikelola oleh pemerintah kabupaten/kota.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Cadangan Pangan Pemerintah Desa adalah
                                      persediaan Pangan yang dikuasai dan
                                      dikelola oleh pemerintah desa.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Cadangan Pangan Masyarakat adalah
                                      persediaan Pangan yang dikuasai dan
                                      dikelola oleh masyarakat di tingkat
                                      pedagang, komunitas, dan rumah tangga.
                                - _type: numPoint
                                  _key: '14'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penyelenggaraan Pangan adalah kegiatan
                                      perencanaan, pelaksanaan, dan pengawasan
                                      dalam penyediaan, keterjangkauan,
                                      pemenuhan konsumsi Pangan dan Gizi, serta
                                      keamanan Pangan dengan melibatkan peran
                                      serta masyarakat yang terkoordinasi dan
                                      terpadu.
                                - _type: numPoint
                                  _key: '15'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pangan Pokok adalah Pangan yang
                                      diperuntukkan sebagai makanan utama
                                      sehari-hari sesuai dengan potensi sumber
                                      daya dan kearifan lokal.
                                - _type: numPoint
                                  _key: '16'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penganekaragaman Pangan adalah upaya
                                      peningkatan ketersediaan dan konsumsi
                                      Pangan yang beragam, bergizi seimbang, dan
                                      berbasis pada potensi sumber daya lokal.
                                - _type: numPoint
                                  _key: '17'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pangan Lokal adalah makanan yang
                                      dikonsumsi oleh masyarakat setempat sesuai
                                      dengan potensi dan kearifan lokal.
                                - _type: numPoint
                                  _key: '18'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pangan Segar adalah Pangan yang belum
                                      mengalami pengolahan yang dapat dikonsumsi
                                      langsung dan/atau yang dapat menjadi bahan
                                      baku pengolahan Pangan.
                                - _type: numPoint
                                  _key: '19'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pangan Olahan adalah makanan atau minuman
                                      hasil proses dengan cara atau metode
                                      tertentu dengan atau tanpa bahan tambahan.
                                - _type: numPoint
                                  _key: '20'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Petani adalah warga negara Indonesia, baik
                                      perseorangan maupun beserta keluarganya
                                      yang melakukan usaha tani di bidang
                                      Pangan.
                                - _type: numPoint
                                  _key: '21'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Nelayan adalah warga negara Indonesia,
                                      baik perseorangan maupun beserta
                                      keluarganya yang mata pencahariannya
                                      melakukan penangkapan ikan.
                                - _type: numPoint
                                  _key: '22'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembudi Daya Ikan adalah warga negara
                                      Indonesia, baik perseorangan maupun
                                      beserta keluarganya yang mata
                                      pencahariannya membesarkan, membiakkan,
                                      dan/atau memelihara ikan dan sumber hayati
                                      perairan lainnya serta memanen hasilnya
                                      dalam lingkungan yang terkontrol.
                                - _type: numPoint
                                  _key: '23'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perdagangan Pangan adalah setiap kegiatan
                                      atau serangkaian kegiatan dalam rangka
                                      penjualan dan/atau pembelian Pangan,
                                      termasuk penawaran untuk menjual Pangan
                                      dan kegiatan lain yang berkenaan dengan
                                      pemindahtanganan Pangan dengan memperoleh
                                      imbalan.
                                - _type: numPoint
                                  _key: '24'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ekspor Pangan adalah kegiatan mengeluarkan
                                      Pangan dari daerah pabean negara Republik
                                      Indonesia yang meliputi wilayah darat,
                                      perairan, dan ruang udara di atasnya,
                                      tempat-tempat tertentu di Zona Ekonomi
                                      Eksklusif, dan landas kontinen.
                                - _type: numPoint
                                  _key: '25'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Impor Pangan adalah kegiatan memasukkan
                                      Pangan ke dalam daerah pabean negara
                                      Republik Indonesia yang meliputi wilayah
                                      darat, perairan, dan ruang udara di
                                      atasnya, tempat-tempat tertentu di Zona
                                      Ekonomi Eksklusif, dan landas kontinen.
                                - _type: numPoint
                                  _key: '26'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Peredaran Pangan adalah setiap kegiatan
                                      atau serangkaian kegiatan dalam rangka
                                      penyaluran Pangan kepada masyarakat, baik
                                      diperdagangkan maupun tidak.
                                - _type: numPoint
                                  _key: '27'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Bantuan Pangan adalah Bantuan Pangan Pokok
                                      dan Pangan lainnya yang diberikan oleh
                                      Pemerintah, Pemerintah Daerah, dan/atau
                                      masyarakat dalam mengatasi Masalah Pangan
                                      dan Krisis Pangan, meningkatkan akses
                                      Pangan bagi masyarakat miskin dan/atau
                                      rawan Pangan dan Gizi, dan kerja sama
                                      internasional.
                                - _type: numPoint
                                  _key: '28'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Masalah Pangan adalah keadaan kekurangan,
                                      kelebihan, dan/atau ketidakmampuan
                                      perseorangan atau rumah tangga dalam
                                      memenuhi kebutuhan Pangan dan Keamanan
                                      Pangan.
                                - _type: numPoint
                                  _key: '29'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Krisis Pangan adalah kondisi kelangkaan
                                      Pangan yang dialami sebagian besar
                                      masyarakat di suatu wilayah yang
                                      disebabkan oleh, antara lain, kesulitan
                                      distribusi Pangan, dampak perubahan iklim,
                                      bencana alam dan lingkungan, dan konflik
                                      sosial, termasuk akibat perang.
                                - _type: numPoint
                                  _key: '30'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Sanitasi Pangan adalah upaya untuk
                                      menciptakan dan mempertahankan kondisi
                                      Pangan yang sehat dan higienis yang bebas
                                      dari bahaya cemaran biologis, kimia, dan
                                      benda lain.
                                - _type: numPoint
                                  _key: '31'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Persyaratan Sanitasi adalah standar
                                      kebersihan dan kesehatan yang harus
                                      dipenuhi untuk menjamin Sanitasi Pangan.
                                - _type: numPoint
                                  _key: '32'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Iradiasi Pangan adalah metode penanganan
                                      Pangan, baik dengan menggunakan zat
                                      radioaktif maupun akselerator untuk
                                      mencegah terjadinya pembusukan dan
                                      kerusakan, membebaskan Pangan dari jasad
                                      renik patogen, serta mencegah pertumbuhan
                                      tunas.
                                - _type: numPoint
                                  _key: '33'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Rekayasa Genetik Pangan adalah suatu
                                      proses yang melibatkan pemindahan gen
                                      (pembawa sifat) dari suatu jenis hayati ke
                                      jenis hayati lain yang berbeda atau sama
                                      untuk mendapatkan jenis baru yang mampu
                                      menghasilkan produk Pangan yang lebih
                                      unggul.
                                - _type: numPoint
                                  _key: '34'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pangan Produk Rekayasa Genetik adalah
                                      Pangan yang diproduksi atau yang
                                      menggunakan bahan baku, bahan tambahan
                                      Pangan, dan/atau bahan lain yang
                                      dihasilkan dari proses rekayasa genetik.
                                - _type: numPoint
                                  _key: '35'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kemasan Pangan adalah bahan yang digunakan
                                      untuk mewadahi dan/atau membungkus Pangan,
                                      baik yang bersentuhan langsung dengan
                                      Pangan maupun tidak.
                                - _type: numPoint
                                  _key: '36'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Mutu Pangan adalah nilai yang ditentukan
                                      atas dasar kriteria keamanan dan kandungan
                                      Gizi Pangan.
                                - _type: numPoint
                                  _key: '37'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Gizi adalah zat atau senyawa yang terdapat
                                      dalam Pangan yang terdiri atas
                                      karbohidrat, protein, lemak, vitamin,
                                      mineral, serat, air, dan komponen lain
                                      yang bermanfaat bagi pertumbuhan dan
                                      kesehatan manusia.
                                - _type: numPoint
                                  _key: '38'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Setiap Orang adalah orang perseorangan
                                      atau korporasi, baik yang berbadan hukum
                                      maupun yang tidak berbadan hukum.
                                - _type: numPoint
                                  _key: '39'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pelaku Usaha Pangan adalah Setiap Orang
                                      yang bergerak pada satu atau lebih
                                      subsistem agribisnis Pangan, yaitu
                                      penyedia masukan produksi, proses
                                      produksi, pengolahan, pemasaran,
                                      perdagangan, dan penunjang.
                                - _type: numPoint
                                  _key: '40'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Pusat, selanjutnya disebut
                                      Pemerintah, adalah Presiden Republik
                                      Indonesia yang memegang kekuasaan
                                      Pemerintahan negara Republik Indonesia
                                      sebagaimana dimaksud dalam Undang-Undang
                                      Dasar Negara Republik Indonesia Tahun
                                      1945.
                                - _type: numPoint
                                  _key: '41'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Daerah adalah kepala daerah
                                      sebagai unsur penyelenggara Pemerintahan
                                      Daerah yang memimpin pelaksanaan urusan
                                      pemerintahan yang menjadi kewenangan
                                      daerah otonom.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 1 angka 7 diubah sehingga Pasal
                                1 berbunyi sebagai berikut:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 2
                            _pasalKey: '14'
                            isi:
                              _type: ayats
                              ayats:
                                - _type: ayat
                                  _key: 1
                                  isi:
                                    _type: points
                                    _description:
                                      _type: referenceText
                                      references: []
                                      text: >-
                                        Sumber penyediaan Pangan diprioritaskan
                                        berasal dari:
                                    isi:
                                      - _type: alphaPoint
                                        _key: a
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: Produksi Pangan dalam negeri,
                                      - _type: alphaPoint
                                        _key: b
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: Cadangan Pangan Nasional, dan/atau
                                      - _type: alphaPoint
                                        _key: c
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: . Impor.
                                - _type: ayat
                                  _key: 2
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Sumber penyediaan Pangan sebagaimana
                                      dimaksud pada ayat (1) dilaksanakan dengan
                                      memperhatikan kepentingan Petani, Nelayan,
                                      Pembudi Daya Ikan, dan Pelaku Usaha Pangan
                                      mikro dan kecil melalui kebijakan tarif
                                      dan non tarif.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 14 diubah sehingga berbunyi
                                sebagai berikut:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 3
                            _pasalKey: '15'
                            isi:
                              _type: ayats
                              ayats:
                                - _type: ayat
                                  _key: 1
                                  isi:
                                    _type: referenceText
                                    references: []
