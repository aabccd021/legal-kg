                        text: >-
                          2. Ketentuan Pasal 4 diubah sehingga berbunyi sebagai
                          berikut: Pasal 4 (1) Yang menjadi objek pajak adalah
                          penghasilan, yaitu setiap tambahan kemampuan ekonomis
                          yang diterima atau diperoleh Wajib Pajak, baik yang
                          berasal dari Indonesia maupun dari luar Indonesia,
                          yang dapat dipakai untuk konsumsi atau untuk menambah
                          kekayaan Wajib Pajak yang bersangkutan, dengan nama
                          dan dalam bentuk apa pun, termasuk: a. penggantian
                          atau imbalan berkenaan dengan pekerjaan atau jasa yang
                          diterima atau diperoleh termasuk gaji, upah,
                          tunjangan, honorarium, komisi, bonus, gratifikasi,
                          uang pensiun, atau imbalan dalam bentuk lainnya,
                          kecuali ditentukan lain dalam Undang-Undang ini, b.
                          hadiah dari undian atau pekerjaan atau kegiatan, dan
                          penghargaan, c. laba usaha, d. keuntungan karena
                          penjualan atau karena pengalihan harta termasuk:
                          REPUBLIK INDONESIA - 621 - 1. keuntungan karena
                          pengalihan harta kepada perseroan, persekutuan, dan
                          badan lainnya sebagai pengganti saham atau penyertaan
                          modal: 2. keuntungan karena pengalihan harta kepada
                          pemegang saham, sekutu, atau anggota yang diperoleh
                          perseroan, persekutuan, dan badan lainnya, 3.
                          keuntungan karena likuidasi, penggabungan, peleburan,
                          pemekaran, pemecahan, pengambilalihan usaha, atau
                          reorganisasi dengan nama dan dalam bentuk apa pun, 4,
                          keuntungan karena pengalihan harta berupa hibah,
                          bantuan, atau sumbangan, kecuali yang diberikan kepada
                          keluarga sedarah dalam garis keturunan lurus satu
                          derajat dan badan keagamaan, badan pendidikan, badan
                          sosial termasuk yayasan, koperasi, atau orang pribadi
                          yang menjalankan usaha mikro dan kecil, yang
                          ketentuannya diatur lebih lanjut dengan Peraturan
                          Menteri Keuangan sepanjang tidak ada hubungan dengan
                          usaha, pekerjaan, kepemilikan, atau penguasaan di
                          antara pihak-pihak yang bersangkutan, dan 5.
                          keuntungan karena penjualan atau pengalihan sebagian
                          atau seluruh hak penambangan, tanda turut serta dalam
                          pembiayaan, atau permodalan dalam perusahaan
                          pertambangan, e. penerimaan kembali pembayaran pajak
                          yang telah dibebankan sebagai biaya dan pembayaran
                          tambahan pengembalian pajak, f. bunga termasuk
                          premium, diskonto, dan imbalan karena jaminan
                          pengembalian utang, g. dividen dengan nama dan dalam
                          bentuk apapun, termasuk dividen dari perusahaan
                          asuransi kepada pemegang polis: REPUBLIK INDONESIA -
                          622 - h. royalti atau imbalan atas penggunaan hak, i.
                          sewa dan penghasilan lain sehubungan dengan penggunaan
                          harta, j. penerimaan atau perolehan pembayaran
                          berkala, k. keuntungan karena pembebasan utang,
                          kecuali sampai dengan jumlah tertentu yang ditetapkan
                          dengan Peraturan Pemerintah, Il. keuntungan selisih
                          kurs mata uang asing, m. selisih lebih karena
                          penilaian kembali aktiva, n. premi asuransi, O. iuran
                          yang diterima atau diperoleh perkumpulan dari
                          anggotanya yang terdiri dari Wajib Pajak yang
                          menjalankan usaha atau pekerjaan bebas, p. tambahan
                          kekayaan neto yang berasal dari penghasilan yang belum
                          dikenakan pajak, g. penghasilan dari usaha berbasis
                          syariah, r. imbalan bunga sebagaimana dimaksud dalam
                          Undang-Undang yang mengatur mengenai ketentuan umum
                          dan tata cara perpajakan, dan Ss. surplus Bank
                          Indonesia. (la) Dikecualikan dari ketentuan
                          sebagaimana dimaksud pada ayat (1), warga negara asing
                          yang telah menjadi subjek pajak dalam negeri dikenai
                          Pajak Penghasilan hanya atas penghasilan yang diterima
                          atau diperoleh dari Indonesia dengan ketentuan: a.
                          memiliki keahlian tertentu, dan b. berlaku selama 4
                          (empat) tahun pajak yang dihitung sejak menjadi subjek
                          pajak dalam negeri. (1b) Termasuk dalam pengertian
                          penghasilan yang diterima atau diperoleh dari
                          Indonesia sebagaimana dimaksud pada ayat (la) berupa
                          penghasilan yang diterima atau diperoleh warga negara
                          asing sehubungan dengan pekerjaan, jasa, atau kegiatan
                          di Indonesia dengan nama dan dalam bentuk apapun yang
                          dibayarkan di luar Indonesia. REPUBLIK INDONESIA - 623
                          - (lc) Ketentuan sebagaimana dimaksud pada ayat (la)
                          tidak berlaku terhadap warga negara asing yang
                          memanfaatkan Persetujuan Penghindaran Pajak Berganda
                          antara pemerintah Indonesia dan pemerintah negara
                          mitra atau yurisdiksi mitra Persetujuan Penghindaran
                          Pajak Berganda tempat warga negara asing memperoleh
                          penghasilan dari luar Indonesia. (1d) Ketentuan lebih
                          lanjut mengenai kriteria keahlian tertentu serta tata
                          cara pengenaan Pajak Penghasilan bagi warga negara
                          asing sebagaimana dimaksud pada ayat (la) diatur dalam
                          Peraturan Menteri Keuangan. (2) Penghasilan di bawah
                          ini dapat dikenai pajak bersifat final: a. penghasilan
                          berupa bunga deposito dan tabungan lainnya, bunga
                          obligasi dan surat utang negara, dan bunga simpanan
                          yang dibayarkan oleh koperasi kepada anggota koperasi
                          orang pribadi, b. penghasilan berupa hadiah undian, C.
                          penghasilan dari transaksi saham dan sekuritas
                          lainnya, transaksi derivatif yang diperdagangkan di
                          bursa, dan transaksi penjualan saham atau pengalihan
                          penyertaan modal pada perusahaan pasangannya yang
                          diterima oleh perusahaan modal ventura, d. penghasilan
                          dari transaksi pengalihan harta berupa tanah dan/atau
                          bangunan, usaha jasa konstruksi, usaha real estate,
                          dan persewaan tanah dan/atau bangunan, dan e.
                          penghasilan tertentu lainnya, yang diatur dalam atau
                          berdasarkan Peraturan Pemerintah. (3) Yang
                          dikecualikan dari objek pajak adalah: REPUBLIK
                          INDONESIA - 624 - a. 1. bantuan atau sumbangan,
                          termasuk zakat yang diterima oleh badan amil zakat
                          atau lembaga amil zakat yang dibentuk atau disahkan
                          oleh pemerintah dan yang diterima oleh penerima zakat
                          yang berhak atau sumbangan keagamaan yang sifatnya
                          wajib bagi pemeluk agama yang diakui di Indonesia,
                          yang diterima oleh lembaga keagamaan yang dibentuk
                          atau disahkan oleh pemerintah dan yang diterima oleh
                          penerima sumbangan yang berhak, yang ketentuannya
                          diatur dengan atau berdasarkan Peraturan Pemerintah,
                          dan 2. harta hibahan yang diterima oleh keluarga
                          sedarah dalam garis keturunan lurus satu derajat,
                          badan keagamaan, badan pendidikan, badan sosial
                          termasuk yayasan, koperasi, atau orang pribadi yang
                          menjalankan usaha mikro dan kecil, yang ketentuannya
                          diatur dengan atau berdasarkan Peraturan Menteri
                          Keuangan sepanjang tidak ada hubungan dengan usaha,
                          pekerjaan, kepemilikan, atau penguasaan di antara
                          pihak-pihak yang bersangkutan, b. warisan: c. harta
                          termasuk setoran tunai yang diterima oleh badan
                          sebagaimana dimaksud dalam Pasal 2 ayat (1) huruf b
                          sebagai pengganti saham atau sebagai pengganti
                          penyertaan modal, d. penggantian atau imbalan
                          sehubungan dengan pekerjaan atau jasa yang diterima
                          atau diperoleh dalam bentuk natura dan/atau kenikmatan
                          dari Wajib Pajak atau Pemerintah, kecuali yang
                          diberikan oleh bukan Wajib Pajak, Wajib Pajak yang
                          dikenakan pajak secara final atau Wajib Pajak yang
                          menggunakan norma penghitungan khusus (deemed profit
                          sebagaimana dimaksud dalam Pasal 15: REPUBLIK
                          INDONESIA - 625 - e. pembayaran dari perusahaan
                          asuransi karena kecelakaan, sakit, atau karena
                          meninggalnya orang yang tertanggung, dan pembayaran
                          asuransi beasiswa, f. ' dividen atau penghasilan lain
                          dengan ketentuan sebagai berikut: 1. dividen yang
                          berasal dari dalam negeri yang diterima atau diperoleh
                          Wajib Pajak: a) orang pribadi dalam negeri sepanjang
                          dividen tersebut diinvestasikan di wilayah Negara
                          Kesatuan Republik Indonesia dalam jangka waktu
                          tertentu, dan/atau b) badan dalam negeri, 2. dividen
                          yang berasal dari luar negeri dan penghasilan setelah
                          pajak dari suatu bentuk usaha tetap di luar negeri
                          yang diterima atau diperoleh Wajib Pajak badan dalam
                          negeri atau Wajib Pajak orang pribadi dalam negeri,
                          sepanjang diinvestasikan atau digunakan untuk
                          mendukung kegiatan usaha lainnya di wilayah Negara
                          Kesatuan Republik Indonesia dalam jangka waktu
                          tertentu, dan memenuhi persyaratan berikut: a) dividen
                          dan penghasilan setelah pajak yang diinvestasikan
                          tersebut paling sedikit sebesar 306 (tiga puluh
                          persen) dari laba setelah pajak, atau b) dividen yang
                          berasal dari badan usaha di luar negeri yang sahamnya
                          tidak diperdagangkan di bursa efek diinvestasikan di
                          Indonesia sebelum Direktur Jenderal Pajak menerbitkan
                          surat ketetapan pajak atas dividen tersebut sehubungan
                          dengan penerapan Pasal 18 ayat (2) Undang-Undang ini,
                          REPUBLIK INDONESIA - 626 - 3. dividen yang berasal
                          dari luar negeri sebagaimana dimaksud pada angka 2
                          merupakan: a) dividen yang dibagikan berasal dari
                          badan usaha di luar negeri yang sahamnya
                          diperdagangkan di bursa efek, atau b) dividen yang
                          dibagikan berasal dari badan usaha di luar negeri yang
                          sahamnya tidak diperdagangkan di bursa efek sesuai
                          dengan proporsi kepemilikan saham, 4. dalam hal
                          dividen sebagaimana dimaksud pada angka 3 huruf b) dan
                          penghasilan setelah pajak dari suatu bentuk usaha
                          tetap di luar negeri sebagaimana dimaksud pada angka 2
                          diinvestasikan di wilayah Negara Kesatuan Republik
                          Indonesia kurang dari 30Y6 (tiga puluh persen) dari
                          jumlah laba setelah pajak sebagaimana dimaksud pada
                          angka 2 huruf a) berlaku ketentuan: a) atas dividen
                          dan penghasilan setelah pajak yang diinvestasikan
                          tersebut, dikecualikan dari pengenaan Pajak
                          Penghasilan, b) atas selisih dari 306 (tiga puluh
                          persen) laba setelah pajak dikurangi dengan dividen
                          dan/atau penghasilan setelah pajak yang diinvestasikan
                          sebagaimana dimaksud pada huruf a) dikenai Pajak
                          Penghasilan, dan Cc) atas sisa laba setelah pajak
                          dikurangi dengan dividen dan/atau penghasilan setelah
                          pajak yang diinvestasikan sebagaimana dimaksud pada
                          huruf a) serta atas selisih sebagaimana dimaksud pada
                          huruf b), tidak dikenai Pajak Penghasilan, REPUBLIK
                          INDONESIA - 627 - 5. dalam hal dividen sebagaimana
                          dimaksud pada angka 3 huruf b dan penghasilan setelah
                          pajak dari suatu bentuk usaha tetap di luar negeri
                          sebagaimana dimaksud pada angka 2, diinvestasikan di
                          wilayah Negara Kesatuan Republik Indonesia sebesar
                          lebih dari 306 (tiga puluh persen) dari jumlah laba
                          setelah pajak sebagaimana dimaksud pada angka 2 huruf
                          a) berlaku ketentuan: a) atas dividen dan penghasilan
                          setelah pajak yang diinvestasikan tersebut
                          dikecualikan dari pengenaan Pajak Penghasilan, dan b)
                          atas sisa laba setelah pajak dikurangi dengan dividen
                          dan/atau penghasilan setelah pajak yang diinvestasikan
                          sebagaimana dimaksud pada huruf a), tidak dikenai
                          Pajak Penghasilan, 6. dalam hal dividen yang berasal
                          dari badan usaha di luar negeri yang sahamnya tidak
                          diperdagangkan di bursa efek diinvestasikan di
                          Indonesia setelah Direktur Jenderal Pajak menerbitkan
                          surat ketetapan pajak atas dividen tersebut sehubungan
                          dengan penerapan Pasal 18 ayat (2) Undang-Undang ini,
                          dividen dimaksud tidak dikecualikan dari pengenaan
                          Pajak Penghasilan sebagaimana dimaksud pada angka 2,
                          7. pengenaan Pajak Penghasilan atas penghasilan dari
                          luar negeri tidak melalui bentuk usaha tetap yang
                          diterima atau diperoleh Wajib Pajak badan dalam negeri
                          atau Wajib Pajak orang pribadi dalam negeri
                          dikecualikan dari pengenaan Pajak Penghasilan dalam
                          hal penghasilan tersebut diinvestasikan di wilayah
                          Negara Kesatuan Republik Indonesia dalam jangka waktu
                          tertentu dan memenuhi persyaratan berikut: a)
                          penghasilan berasal dari usaha aktif di luar negeri,
                          dan REPUBLIK INDONESIA - 628 - b) bukan penghasilan
                          dari perusahaan yang dimiliki di luar negeri, 8. pajak
                          atas penghasilan yang telah dibayar atau terutang di
                          luar negeri atas penghasilan sebagaimana dimaksud pada
                          angka 2 dan angka 7, berlaku ketentuan: a) tidak dapat
                          diperhitungkan dengan Pajak Penghasilan yang terutang,
                          b) tidak dapat dibebankan sebagai biaya atau pengurang
                          penghasilan, dan/atau c) tidak dapat dimintakan
                          pengembalian kelebihan pembayaran pajak, 9. dalam hal
                          Wajib Pajak tidak menginvestasikan penghasilan dalam
                          jangka waktu tertentu sebagaimana dimaksud pada angka
                          2 dan angka 7, berlaku ketentuan: a) penghasilan dari
                          luar negeri tersebut merupakan penghasilan pada tahun
                          pajak diperoleh, dan b) Pajak atas penghasilan yang
                          telah dibayar atau terutang di luar negeri atas
                          penghasilan tersebut merupakan kredit pajak
                          sebagaimana dimaksud dalam Pasal 24 Undang-Undang ini,
                          10. ketentuan lebih lanjut mengenai: a) kriteria, tata
                          cara dan jangka waktu tertentu untuk investasi
                          sebagaimana dimaksud pada angka 1, angka 2, dan angka
                          7, b) tata cara pengecualian pengenaan pajak
                          penghasilan sebagaimana dimaksud pada angka 1, angka
                          2, dan angka 7, dan c) perubahan batasan dividen yang
                          diinvestasikan sebagaimana dimaksud pada angka 4 dan
                          angka 5, diatur dengan Peraturan Menteri Keuangan,
                          REPUBLIK INDONESIA - 629 - g. juran yang diterima atau
                          diperoleh dana pensiun yang pendiriannya telah
                          disahkan Menteri Keuangan, baik yang dibayar oleh
                          pemberi kerja maupun pegawai, h. penghasilan dari
                          modal yang ditanamkan oleh dana pensiun sebagaimana
                          dimaksud pada huruf g, dalam bidang-bidang tertentu
                          yang ditetapkan dengan Keputusan Menteri Keuangan, i.
                          bagian laba atau sisa hasil usaha yang diterima atau
                          diperoleh anggota dari koperasi, perseroan komanditer
                          yang modalnya tidak terbagi atas saham-saham,
                          persekutuan, perkumpulan, firma, dan kongsi, termasuk
                          pemegang unit penyertaan kontrak investasi kolektif,
                          j. dihapus, k. penghasilan yang diterima atau
                          diperoleh perusahaan modal ventura berupa bagian laba
                          dari badan pasangan usaha yang didirikan dan
                          menjalankan usaha atau kegiatan di Indonesia, dengan
                          syarat badan pasangan usaha tersebut: 1. merupakan
                          perusahaan mikro, kecil, menengah, atau yang
                          menjalankan kegiatan dalam sektor-sektor usaha yang
                          diatur dengan atau berdasarkan Peraturan Menteri
                          Keuangan, dan 2. sahamnya tidak diperdagangkan di
                          bursa efek di Indonesia: l. | beasiswa yang memenuhi
                          persyaratan tertentu yang ketentuannya diatur lebih
                          lanjut dengan atau berdasarkan Peraturan Menteri
                          Keuangan, REPUBLIK INDONESIA - 630 - m. sisa lebih
                          yang diterima atau diperoleh badan atau lembaga
                          nirlaba yang bergerak dalam bidang pendidikan dan/atau
                          bidang penelitian dan pengembangan, yang telah
                          terdaftar pada instansi yang membidanginya, yang
                          ditanamkan kembali dalam bentuk sarana dan prasarana
                          kegiatan pendidikan dan/atau penelitian dan
                          pengembangan, dalam jangka waktu paling lama 4 (empat)
                          tahun sejak diperolehnya sisa lebih tersebut, yang
                          ketentuannya diatur lebih lanjut dengan atau
                          berdasarkan Peraturan Menteri Keuangan, n. bantuan
                          atau santunan yang dibayarkan oleh Badan Penyelenggara
                          Jaminan Sosial kepada Wajib Pajak tertentu, yang
                          ketentuannya diatur lebih lanjut dengan atau
                          berdasarkan Peraturan Menteri Keuangan, o. dana
                          setoran Biaya Penyelenggaraan Ibadah Haji (BPIH)
                          dan/atau BPIH khusus, dan penghasilan dari
                          pengembangan keuangan haji dalam bidang atau instrumen
                          keuangan tertentu, diterima Badan Pengelola Keuangan
                          Haji (BPKH) yang ketentuannya diatur dengan atau
                          berdasarkan Peraturan Menteri Keuangan, dan p. sisa
                          lebih yang diterima/diperoleh badan atau lembaga
                          sosial dan keagamaan yang terdaftar pada instansi yang
                          membidanginya, yang ditanamkan kembali dalam bentuk
                          sarana dan prasarana sosial dan keagamaan dalam jangka
                          waktu paling lama 4 (empat) tahun sejak diperolehnya
                          sisa lebih tersebut, atau ditempatkan sebagai dana
                          abadi, yang ketentuannya diatur lebih lanjut dengan
                          atau berdasarkan Peraturan Menteri Keuangan.
