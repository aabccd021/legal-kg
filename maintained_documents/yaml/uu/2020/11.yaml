                        text: >-
                          1. Ketentuan Pasal 13 diubah sehingga berbunyi sebagai
                          berikut: Pasal 13 (1) Pelatihan kerja diselenggarakan
                          oleh: a. lembaga pelatihan kerja pemerintah, b.
                          lembaga pelatihan kerja swasta, atau c. lembaga
                          pelatihan kerja perusahaan. (2) Pelatihan kerja dapat
                          diselenggarakan di tempat pelatihan atau tempat kerja.
                          (3) Lembaga pelatihan kerja pemerintah sebagaimana
                          dimaksud pada ayat (1) huruf a dalam menyelenggarakan
                          pelatihan kerja dapat bekerja sama dengan swasta. (4)
