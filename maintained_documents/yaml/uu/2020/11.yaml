                              text: >-
                                6. Ketentuan Pasal 40 diubah sehingga berbunyi
                                sebagai berikut: Pasal 40 (1) Pelaksanaan
                                konstruksi Prasarana Sumber Daya Air dan
                                pelaksanaan nonkonstruksi dilakukan oleh
                                Pemerintah Pusat dan/atau Pemerintah Daerah
                                sesuai dengan kewenangannya berdasarkan program
                                dan rencana kegiatan. (2) Pelaksanaan konstruksi
                                Prasarana Sumber Daya Air dan pelaksanaan
                                nonkonstruksi sebagaimana dimaksud pada ayat (1)
                                dapat dilakukan dengan melibatkan peran serta
                                masyarakat. REPUBLIK INDONESIA - 357 - (3)
                                Setiap Orang atau kelompok masyarakat atas
                                prakarsa sendiri dapat melaksanakan kegiatan
                                konstruksi Prasarana Sumber Daya Air dan
                                pelaksanaan nonkonstruksi untuk kepentingan
                                sendiri berdasarkan Persetujuan atau Perizinan
                                Berusaha dari Pemerintah Pusat dan/atau
                                Pemerintah Daerah sesuai dengan kewenangannya
                                berdasarkan norma, standar, prosedur, dan
                                kriteria yang ditetapkan oleh Pemerintah Pusat.
