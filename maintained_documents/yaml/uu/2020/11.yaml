                  description:
                    _type: referenceText
                    references: []
                    text: >-
                      Beberapa ketentuan dalam Undang-Undang Nomor 30 Tahun 2014
                      tentang Administrasi Pemerintahan (Lembaran Negara
                      Republik Indonesia Tahun 2014 Nomor 292, Tambahan Lembaran
                      Negara Republik Indonesia Nomor 5601) diubah menjadi
                      sebagai berikut: REPUBLIK INDONESIA - 750 -
                  isi:
                    - _type: amendPoint
                      _operation: insert
                      _nomorKey: 1
                      _pasalKeys:
                        - '1'
                      isi:
                        _type: referenceText
                        references:
                          - start: 13
                            end: 20
                            node:
                              _key: 1
                              parentDocument: *ref_0
                              _structureType: pasal
                          - start: 34
                            end: 41
                            node:
                              _key: 1
