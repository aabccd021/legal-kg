                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Anggota Dewan Direktur diangkat untuk masa
                                jabatan 5 (lima) tahun dan hanya dapat diangkat
                                kembali untuk 1 (satu) kali masa jabatan
