                          Undang-Undang ini yang dimaksud dengan: 1. Calon
                          Pekerja Migran Indonesia adalah setiap tenaga kerja
                          Indonesia yang memenuhi syarat sebagai pencari kerja
                          yang akan bekerja di luar negeri dan terdaftar di
                          instansi pemerintah kabupaten/kota yang bertanggung
