                                pada ayat (1) Administrator menyampaikan laporan
                                kepada Dewan Nasional dengan tembusan kepada
                                Dewan Kawasan.
                      description:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan Pasal 23 diubah sehingga berbunyi sebagai
                          berikut:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 17
                      _pasalKey: '24'
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam melaksanakan pengawasan dan pengendalian
                          pengoperasionalan KEK sebagaimana dimaksud dalam Pasal
                          23 ayat (1) huruf c, Administrator berwenang untuk
                          mendapatkan laporan atau penjelasan dari Badan Usaha
                          dan/atau Pelaku Usaha mengenai kegiatannya.
                      description:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan Pasal 24 diubah sehingga berbunyi sebagai
                          berikut:
                    - _type: amendPoint
                      _operation: insert
                      _nomorKey: 18
                      _pasalKeys:
                        - 24A
                        - 24B
                        - 24C
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          18. Di antara Pasal 24 dan Pasal 25 disisipkan 3
                          (tiga) pasal, yakni Pasal 24A, Pasal 24B, dan Pasal
                          24C sehingga berbunyi sebagai berikut: Pasal 24A (1)
                          Pelaksanaan tugas Administrator dilakukan sesuai
                          dengan tata kelola pemerintahan dan asas-asas umum
                          pemerintahan yang baik sesuai dengan ketentuan
                          peraturan perundang-undangan. (2) Administrator dapat
                          dijabat oleh aparatur sipil negara atau nonaparatur
                          sipil negara yang memiliki kompetensi, kualifikasi,
                          dan persyaratan lain yang dipilih secara selektif
                          sesuai dengan kriteria dan kualifikasi yang ditentukan
                          oleh Dewan Nasional. Pasal 24B Ketentuan lebih lanjut
                          mengenai Administrator sebagaimana dimaksud dalam
                          Pasal 23, Pasal 24, dan Pasal 24A diatur dalam
                          Peraturan Pemerintah. Pasal 24C (1) Administrator
                          dapat menerapkan pola pengelolaan keuangan Badan
                          Layanan Umum. (2) Penerapan pola pengelolaan keuangan
                          Badan Layanan Umum sebagaimana dimaksud pada ayat (1)
                          diatur dalam Peraturan Pemerintah.
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 19
                      _pasalKey: '25'
