                                20. Di antara Pasal 110 dan Pasal 111 disisipkan
                                2 (dua) pasal, yakni Pasal 110A dan Pasal 110B
                                sehingga berbunyi sebagai berikut: Pasal 110A
                                (1) Setiap orang yang melakukan kegiatan usaha
                                yang telah terbangun dan memiliki Perizinan
                                Berusaha di dalam kawasan hutan sebelum
                                berlakunya Undang- Undang ini yang belum
                                memenuhi persyaratan sesuai dengan ketentuan
                                peraturan perundang-undangan di bidang
                                kehutanan, wajib menyelesaikan persyaratan
                                paling lambat 3 (tiga) tahun sejak Undang-Undang
                                ini berlaku. (2) Jika setelah lewat 3 (tiga)
                                tahun sejak berlakunya Undang-Undang ini tidak
                                menyelesaikan persyaratan sebagaimana dimaksud
                                pada ayat (1), pelaku dikenai sanksi
                                administratif, berupa: a. pembayaran denda
                                administratif, dan/atau b. pencabutan Perizinan
                                Berusaha. (3) Ketentuan lebih lanjut mengenai
                                tata cara pengenaan sanksi administratif dan
                                tata cara penerimaan negara bukan pajak yang
                                berasal dari denda administratif sebagaimana
                                dimaksud pada ayat (2) diatur dalam Peraturan
                                Pemerintah. Pasal 110B (1) Setiap orang yang
                                melakukan pelanggaran sebagaimana dimaksud dalam
                                Pasal 17 ayat (1) huruf b, huruf c, dan/atau
                                huruf e, dan/atau Pasal 17 ayat (2) huruf b,
                                huruf c, dan/atau huruf e, atau kegiatan lan di
                                kawasan hutan tanpa memiliki Perizinan Berusaha
                                yang dilakukan sebelum berlakunya Undang-Undang
                                ini dikenai sanksi administratif, berupa: a.
                                penghentian sementara kegiatan usaha, b.
                                pembayaran denda administatif, dan/atau Cc.
                                paksaan pemerintah. REPUBLIK INDONESIA - 220 -
                                (2) Dalam hal pelanggaran sebagaimana dimaksud
                                pada ayat (1) dilakukan oleh orang perseorangan
                                yang bertempat tinggal di dalam dan/atau di
                                sekitar kawasan hutan paling singkat 5 (lima)
                                tahun secara terus menerus dengan luasan paling
                                banyak 5 (lima) hektar, dikecualikan dari sanksi
                                administratif dan diselesaikan melalui penataan
                                kawasan hutan. (3) Ketentuan lebih lanjut
                                mengenai tata cara pengenaan sanksi
                                administratif dan tata cara penerimaan negara
                                bukan pajak yang berasal dari denda
                                administratif sebagaimana dimaksud pada ayat (1)
                                diatur dalam Peraturan Pemerintah.
