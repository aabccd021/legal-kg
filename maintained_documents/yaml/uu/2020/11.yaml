              - _type: paragraf
                _key: 3
                _judul: Paragraf 3 Persetujuan Lingkungan
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 21
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam rangka memberikan kemudahan bagi setiap orang
                          dalam memperoleh persetujuan lingkungan, Undang-Undang
                          ini mengubah, menghapus, atau menetapkan pengaturan
                          baru beberapa ketentuan terkait Perizinan Berusaha
                          yang diatur dalam Undang-Undang Nomor 32 Tahun 2009
                          tentang Perlindungan dan Pengelolaan Lingkungan Hidup
                          (Lembaran Negara Republik Indonesia Tahun 2009 Nomor
                          140, Tambahan Lembaran Negara Republik Indonesia Nomor
                          5059).
                    - _type: pasal
                      _key: 22
                      isi:
                        _type: amendPoints
                        description:
                          _type: referenceText
                          references: []
                          text: >-
                            Beberapa ketentuan dalam Undang-Undang Nomor 32
                            Tahun 2009 tentang Perlindungan dan Pengelolaan
                            Lingkungan Hidup (Lembaran Negara Republik Indonesia
                            Tahun 2009 Nomor 140, Tambahan Lembaran Negara
                            Republik Indonesia Nomor 5059) diubah sebagai
                            berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Lingkungan hidup adalah kesatuan ruang
                                      dengan semua benda, daya, keadaan, dan
                                      makhluk hidup, termasuk manusia dan
                                      perilakunya, yang mempengaruhi alam itu
                                      sendiri, kelangsungan perikehidupan, dan
                                      kesejahteraan manusia serta makhluk hidup
                                      lain.
                                - _type: numPoint
                                  _key: '2'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perlindungan dan pengelolaan lingkungan
                                      hidup adalah upaya sistematis dan terpadu
                                      yang dilakukan untuk melestarikan fungsi
                                      lingkungan hidup dan mencegah terjadinya
                                      pencemaran dan/atau kerusakan lingkungan
                                      hidup yang meliputi perencanaan,
                                      pemanfaatan, pengendalian, pemeliharaan,
                                      pengawasan, dan penegakan hukum.
                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembangunan berkelanjutan adalah upaya
                                      sadar dan terencana yang memadukan aspek
                                      lingkungan hidup, sosial, dan ekonomi ke
                                      dalam strategi pembangunan untuk menjamin
                                      keutuhan lingkungan hidup serta
                                      keselamatan, kemampuan, kesejahteraan, dan
                                      mutu hidup generasi masa kini dan generasi
                                      masa depan.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Rencana perlindungan dan pengelolaan
                                      lingkungan hidup yang selanjutnya
                                      disingkat RPPLH adalah perencanaan
                                      tertulis yang memuat potensi, masalah
                                      lingkungan hidup, serta upaya perlindungan
                                      dan pengelolaannya dalam kurun waktu
                                      tertentu.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ekosistem adalah tatanan unsur lingkungan
                                      hidup yang merupakan kesatuan
                                      utuh-menyeluruh dan saling mempengaruhi
                                      dalam membentuk keseimbangan, stabilitas,
                                      dan produktivitas lingkungan hidup.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pelestarian fungsi lingkungan hidup adalah
                                      rangkaian upaya untuk memelihara
                                      kelangsungan daya dukung dan daya tampung
                                      lingkungan hidup.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Daya dukung lingkungan hidup adalah
                                      kemampuan lingkungan hidup untuk mendukung
                                      perikehidupan manusia, makhluk hidup lain,
                                      dan keseimbangan antarkeduanya.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Daya tampung lingkungan hidup adalah
                                      kemampuan lngkungan hidup untuk menyerap
                                      zat, energi, dan/atau komponen lain yang
                                      masuk atau dimasukkan ke dalamnya.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Sumber daya alam adalah unsur lingkungan
                                      hidup yang terdiri atas sumber daya hayati
                                      dan nonhayati yang secara keseluruhan
                                      membentuk kesatuan ekosistem.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kajian lingkungan hidup strategis yang
                                      selanjutnya disingkat KLHS adalah
                                      rangkaian analisis yang sistematis,
                                      menyeluruh, dan partisipatif untuk
                                      memastikan bahwa prinsip pembangunan
                                      berkelanjutan telah menjadi dasar dan
                                      terintegrasi dalam pembangunan suatu
                                      wilayah dan/atau kebijakan, rencana,
                                      dan/atau program.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Analisis mengenai dampak lingkungan hidup
                                      yang selanjutnya disebut Amdal adalah
                                      Kajian mengenai dampak penting pada
                                      lingkungan hidup dari suatu usaha dan/atau
                                      kegiatan yang direncanakan, untuk
                                      digunakan sebagai prasyarat pengambilan
                                      keputusan tentang penyelenggaraan usaha
                                      dan/atau kegiatan serta termuat dalam
                                      Perizinan Berusaha, atau persetujuan
                                      Pemerintah Pusat atau Pemerintah Daerah.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Upaya pengelolaan lingkungan hidup dan
                                      upaya pemantauan lingkungan hidup yang
                                      selanjutnya disebut UKL-UPL adalah
                                      rangkaian proses pengelolaan dan
                                      pemantauan lingkungan hidup yang
                                      dituangkan dalam bentuk standar untuk
                                      digunakan sebagai prasyarat pengambilan
                                      keputusan serta termuat dalam Perizinan
                                      Berusaha, atau persetujuan Pemerintah
                                      Pusat atau Pemerintah Daerah.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Baku mutu lingkungan hidup adalah ukuran
                                      batas atau kadar makhluk hidup, zat,
                                      energi, atau komponen yang ada atau harus
                                      ada dan/atau unsur pencemar yang
                                      ditenggang keberadaannya dalam suatu
                                      sumber daya tertentu sebagai unsur
                                      lingkungan hidup.
                                - _type: numPoint
                                  _key: '14'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pencemaran lingkungan hidup adalah masuk
                                      atau dimasukkannya makhluk hidup, zat,
                                      energi, dan/atau komponen lain ke dalam
                                      lingkungan hidup oleh kegiatan manusia
                                      sehingga melampaui baku mutu lingkungan
                                      hidup yang telah ditetapkan.
                                - _type: numPoint
                                  _key: '15'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kriteria baku kerusakan lingkungan hidup
                                      adalah ukuran batas perubahan sifat fisik,
                                      kimia, dan/atau hayati lingkungan hidup
                                      yang dapat ditenggang oleh llngkungan
                                      hidup untuk dapat tetap melestarikan
                                      fungsinya.
                                - _type: numPoint
                                  _key: '16'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perusakan lingkungan hidup adalah tindakan
                                      orang yang menimbulkan perubahan langsung
                                      atau tidak langsung terhadap sifat fisik,
                                      kimia, dan/atau hayati lingkungan hidup
                                      sehingga melampaui kriteria baku kerusakan
                                      lingkungan hidup.
                                - _type: numPoint
                                  _key: '17'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kerusakan lingkungan hidup adalah
                                      perubahan langsung dan/atau tidak langsung
                                      terhadap sifat fisik, kimia, dan/atau
                                      hayati lingkungan hidup yang melampaui
                                      kriteria baku kerusakan lingkungan hidup.
                                - _type: numPoint
                                  _key: '18'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Konservasi sumber daya alam adalah
                                      pengelolaan sumber daya alam untuk
                                      menjamin pemanfaatannya secara bijaksana
                                      serta kesinambungan ketersediaannya dengan
                                      tetap memelihara dan meningkatkan kualitas
                                      nilai serta keanekaragamannya.
                                - _type: numPoint
                                  _key: '19'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perubahan iklim adalah berubahnya iklim
                                      yang diakibatkan langsung atau tidak
                                      langsung oleh aktivitas manusia sehingga
                                      menyebabkan perubahan komposisi atmosfir
                                      secara global dan selain itu juga berupa
                                      perubahan variabilitas iklim alamiah yang
                                      teramati pada kurun waktu yang dapat
                                      dibandingkan.
                                - _type: numPoint
                                  _key: '20'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Limbah adalah sisa suatu usaha dan/atau
                                      kegiatan.
                                - _type: numPoint
                                  _key: '21'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Bahan berbahaya dan beracun yang
                                      selanjutnya disingkat B3 adalah zat,
                                      energi, dan/atau komponen lan yang karena
                                      sifat, konsentrasi, dan/atau jumlahnya,
                                      baik secara langsung maupun tidak
                                      langsung, dapat mencemarkan dan/atau
                                      merusak lingkungan hidup, dan/atau
                                      membahayakan lingkungan hidup, kesehatan,
                                      serta kelangsungan hidup manusia dan
                                      makhluk hidup lain.
                                - _type: numPoint
                                  _key: '22'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Limbah bahan berbahaya dan beracun yang
                                      selanjutnya disebut Limbah B3 adalah sisa
                                      suatu usaha dan/atau kegiatan yang
                                      mengandung B3.
                                - _type: numPoint
                                  _key: '23'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengelolaan limbah B3 adalah kegiatan yang
                                      meliputi pengurangan, penyimpanan,
                                      pengumpulan, pengangkutan, pemanfaatan,
                                      pengolahan, dan/atau penimbunan.
                                - _type: numPoint
                                  _key: '24'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Dumping (pembuangan) adalah kegiatan
                                      membuang, menempatkan, dan/atau memasukkan
                                      limbah dan/atau bahan dalam jumlah,
                                      konsentrasi, waktu, dan lokasi tertentu
                                      dengan persyaratan tertentu ke media
                                      lingkungan hidup tertentu.
                                - _type: numPoint
                                  _key: '25'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Sengketa lingkungan hidup adalah
                                      perselisihan antara dua pihak atau lebih
                                      yang timbul dari kegiatan yang berpotensi
                                      dan/atau telah berdampak pada lingkungan
                                      hidup.
                                - _type: numPoint
                                  _key: '26'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Dampak lingkungan hidup adalah pengaruh
                                      perubahan pada lingkungan hidup yang
                                      diakibatkan oleh suatu usaha dan/atau
                                      kegiatan.
                                - _type: numPoint
                                  _key: '27'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Organisasi lingkungan hidup adalah
                                      kelompok orang yang terorganisasi dan
                                      terbentuk atas kehendak sendiri yang
                                      tujuan dan kegiatannya berkaitan dengan
                                      lingkungan hidup.
                                - _type: numPoint
                                  _key: '28'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Audit lingkungan hidup adalah evaluasi
                                      yang dilakukan untuk menilai ketaatan
                                      penanggung jawab usaha dan/atau kegiatan
                                      terhadap persyaratan hukum dan kebijakan
                                      yang ditetapkan oleh pemerintah.
                                - _type: numPoint
                                  _key: '29'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ekoregion adalah wilayah geografis yang
                                      memiliki kesamaan ciri iklim, tanah, air,
                                      flora, dan fauna asli, serta pola
                                      interaksi manusia dengan alam yang
                                      menggambarkan integritas sistem alam dan
                                      lingkungan hidup.
                                - _type: numPoint
                                  _key: '30'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kearifan lokal adalah nilai-nilai luhur
                                      yang berlaku dalam tata kehidupan
                                      masyarakat untuk antara lain melindungi
                                      dan mengelola lingkungan hidup secara
                                      lestari.
                                - _type: numPoint
                                  _key: '31'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Masyarakat hukum adat adalah kelompok
                                      masyarakat yang secara turun temurun
                                      bermukim di wilayah geografis tertentu
                                      karena adanya ikatan pada asal usul
                                      leluhur, adanya hubungan yang kuat dengan
                                      lingkungan hidup, serta adanya sistem
                                      nilai yang menentukan pranata ekonomi,
                                      politik, sosial, dan hukum.
                                - _type: numPoint
                                  _key: '32'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Setiap orang adalah orang perseorangan
                                      atau badan usaha, baik yang berbadan hukum
                                      maupun yang tidak berbadan hukum.
                                - _type: numPoint
                                  _key: '33'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Instrumen ekonomi lingkungan hidup adalah
                                      seperangkat kebijakan ekonomi untuk
                                      mendorong Pemerintah, pemerintah daerah,
                                      atau setiap orang ke arah pelestarian
                                      fungsi lingkungan hidup.
                                - _type: numPoint
                                  _key: '34'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ancaman serius adalah ancaman yang
                                      berdampak luas terhadap lingkungan hidup
                                      dan menimbulkan keresahan masyarakat.
                                - _type: numPoint
                                  _key: '35'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Persetujuan Lingkungan adalah Keputusan
                                      Kelayakan Lingkungan Hidup atau Pernyataan
                                      Kesanggupan Pengelolaan Lingkungan Hidup
                                      yang telah mendapatkan persetujuan dari
                                      Pemerintah Pusat atau Pemerintah Daerah.
                                - _type: numPoint
                                  _key: '36'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Pusat adalah Presiden Republik
                                      Indonesia yang memegang kekuasaan
                                      pemerintahan negara Republik Indonesia
                                      yang dibantu oleh Wakil Presiden dan
                                      menteri sebagaimana dimaksud dalam Undang-
                                      Undang Dasar Negara Republik Indonesia
                                      Tahun 1945.
                                - _type: numPoint
                                  _key: '37'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Daerah adalah kepala daerah
                                      sebagai unsur penyelenggara Pemerintahan
                                      Daerah yang memimpin pelaksanaan urusan
                                      pemerintahan yang menjadi kewenangan
                                      daerah otonom.
                                - _type: numPoint
                                  _key: '38'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Menteri adalah menteri yang
                                      menyelenggarakan urusan pemerintahan di
                                      bidang perlindungan dan pengelolaan
                                      lingkungan hidup.
