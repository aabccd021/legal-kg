                    mengembangkan kualitas Usaha Mikro, Kecil, dan Menengah yang
                    mempunyai nilai ekonomi dan berdaya saing tinggi: dan Cc.
                    mengoptimalkan pemanfaatan sumber daya manusia terdidik
                    dalam menggerakkan perekonomian dengan memanfaatkan ilmu
                    pengetahuan dan teknologi. REPUBLIK INDONESIA - 587 -
              - _type: pasal
