                              text: >-
                                Penetapan norma, standar, prosedur, dan kriteria
                                sebagaimana dimaksud pada ayat (1) huruf a
                                mengacu atau mengadopsi praktik yang baik (good
                                practices).
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Norma, standar, prosedur, dan kriteria
                                sebagaimana dimaksud pada ayat (1) huruf a
                                berbentuk ketentuan peraturan perundang-undangan
                                yang ditetapkan oleh Pemerintah Pusat sebagai
                                aturan pelaksanaan dalam penyelenggaraan urusan
