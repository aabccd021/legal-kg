                              text: >-
                                6. Ketentuan Pasal 29 diubah sehingga berbunyi
                                sebagai berikut: Pasal 29 (1) Budi Daya Ternak
                                hanya dapat dilakukan oleh peternak, perusahaan
                                peternakan, serta pihak tertentu untuk
                                kepentingan khusus. (2) Peternak yang melakukan
                                budi daya Ternak dengan jenis dan jumlah Ternak
                                di bawah skala usaha tertentu diberikan
                                Perizinan Berusaha oleh Pemerintah Pusat dan
                                Pemerintah Daerah kabupaten/kota sesuai dengan
                                kewenangannya berdasarkan norma, standar,
                                prosedur, dan kriteria yang ditetapkan oleh
                                Pemerintah Pusat. (3) Perusahaan peternakan yang
                                melakukan budi daya ternak dengan jenis dan
                                jumlah Ternak di atas skala usaha tertentu wajib
                                memenuhi Perizinan Berusaha oleh Pemerintah
                                Pusat. (4) Peternak, perusahaan peternakan, dan
                                pihak tertentu yang mengusahakan Ternak dengan
                                skala usaha tertentu wajib mengikuti tata cara
                                budi daya Ternak yang baik dengan tidak
                                mengganggu ketertiban umum sesuai dengan pedoman
                                yang ditetapkan oleh Pemerintah Pusat. (S5)
                                Pemerintah Pusat dan Pemerintah Daerah sesuai
                                dengan kewenangannya wajib untuk melindungi
                                usaha peternakan dalam negeri dari persaingan
                                tidak sehat diantara pelaku usaha. REPUBLIK
                                INDONESIA -181 -
