                                Ketentuan lebih lanjut mengenai kewajiban Rumah
                                Sakit sebagaimana dimaksud pada ayat (1) dan
                                pengenaan sanksi administratif sebagaimana
                                dimaksud pada ayat (2) diatur dalam Peraturan
