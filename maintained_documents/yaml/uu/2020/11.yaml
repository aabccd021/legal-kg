                                  (2a) Pengusaha Kena Pajak belum melakukan
                                  penyerahan Barang Kena Pajak dan/atau Jasa
                                  Kena Pajak dan/atau ekspor Barang Kena Pajak
                                  dan/atau Jasa Kena Pajak terkait dengan Pajak
