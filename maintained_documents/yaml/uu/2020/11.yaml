                                industri. (3) Pengecualian terhadap kewajiban
                                berlokasi di Kawasan Industri sebagaimana
                                dimaksud pada ayat (1) juga berlaku bagi: a.
                                Industri kecil dan Industri menengah yang tidak
                                berpotensi menimbulkan pencemaran lingkungan
                                hidup yang berdampak luas, atau b. Industri yang
                                menggunakan Bahan Baku khusus dan/atau proses
                                produksinya memerlukan lokasi khusus. (4)
