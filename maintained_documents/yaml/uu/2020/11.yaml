                                cagar budaya, e. mengubah fungsi bangunan
                                setelah mendapat persetujuan dari Pemerintah
                                Pusat: dan fi mendapatkan ganti rugi sesuai
                                dengan ketentuan peraturan perundang-undangan
                                dalam hal bangunan gedung dibongkar oleh
                                Pemerintah Pusat bukan karena kesalahan pemilik
                                bangunan gedung. (2) Dalam penyelenggaraan
                                bangunan gedung, pemilik bangunan gedung
                                mempunyai kewajiban: a. menyediakan rencana
                                teknis bangunan gedung yang memenuhi standar
                                teknis bangunan gedung yang ditetapkan sesuai
                                dengan fungsinya, b. memiliki Persetujuan
                                Bangunan Gedung: Cc. melaksanakan pembangunan
                                bangunan gedung sesuai dengan rencana teknis: d.
                                mendapat pengesahan dari Pemerintah Pusat atas
                                perubahan rencana teknis bangunan gedung yang
                                terjadi pada tahap pelaksanaan bangunan, dan e.
                                menggunakan penyedia jasa perencana, pelaksana,
                                pengawas, dan pengkajian teknis yang memenuhi
                                syarat sesuai dengan ketentuan peraturan
                                perundang-undangan untuk melaksanakan pekerjaan
                                terkait bangunan gedung.
