                          16. Ketentuan Pasal 61 diubah sehingga berbunyi
                          sebagai berikut: Pasal 61 (1) Perjanjian kerja
                          berakhir apabila: a. pekerja/buruh meninggal dunia, b.
                          berakhirnya jangka waktu perjanjian kerja, Cc.
                          selesainya suatu pekerjaan tertentu, d. adanya putusan
                          pengadilan dan/atau putusan lembaga penyelesaian
                          perselisihan hubungan industrial yang telah mempunyai
                          kekuatan hukum tetap, atau e. adanya keadaan atau
                          kejadian tertentu yang dicantumkan dalam perjanjian
                          kerja, peraturan perusahaan, atau perjanjian kerja
                          bersama yang dapat menyebabkan berakhirnya hubungan
                          kerja. (2) Perjanjian kerja tidak berakhir karena
                          meninggalnya pengusaha atau beralihnya hak atas
                          perusahaan yang disebabkan penjualan, pewarisan, atau
                          hibah. (3) Dalam hal terjadi pengalihan perusahaan,
                          hak-hak pekerja/buruh menjadi tanggung jawab pengusaha
                          baru, kecuali ditentukan lain dalam perjanjian
                          pengalihan yang tidak mengurangi hak-hak pekerja/
                          buruh. (4) Dalam hal pengusaha orang perseorangan
                          meninggal dunia, ahli waris pengusaha dapat mengakhiri
                          perjanjian kerja setelah merundingkan dengan
                          pekerja/buruh. (5) Dalam hal pekerja/buruh meninggal
                          dunia, ahli waris pekerja/buruh berhak mendapatkan
                          hak-haknya sesuai dengan peraturan perundang-undangan
                          atau hak-hak yang telah diatur dalam perjanjian kerja,
                          peraturan perusahaan, atau perjanjian kerja bersama.
