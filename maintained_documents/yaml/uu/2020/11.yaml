                                sebagaimana dimaksud dalam Pasal 35 diterbitkan
                                oleh Pemerintah Pusat. (2) Persetujuan
                                Kesesuaian Kegiatan Pemanfaatan Ruang yang tidak
                                sesuai dengan rencana tata ruang wilayah
                                dibatalkan oleh Pemerintah Pusat. (3)
                                Persetujuan Kesesuaian Kegiatan Pemanfaatan
                                Ruang yang dikeluarkan dan/atau diperoleh dengan
                                tidak melalui prosedur yang benar, batal demi
                                hukum. REPUBLIK INDONESIA - 33 - (4) Persetujuan
                                Kesesuaian Kegiatan Pemanfaatan Ruang yang
                                diperoleh melalui prosedur yang benar tetapi
                                kemudian terbukti tidak sesuai dengan rencana
                                tata ruang wilayah, dibatalkan oleh Pemerintah
                                Pusat. (S) Terhadap kerugian yang ditimbulkan
                                akibat pembatalan persetujuan sebagaimana
                                dimaksud pada ayat (2) dan ayat (4), dapat
                                dimintakan ganti kerugian yang layak kepada
                                instansi pemberi persetujuan. (6) Kegiatan
                                pemanfaatan ruang yang tidak sesuai lagi akibat
                                adanya perubahan rencana tata ruang wilayah
                                dapat dibatalkan oleh Pemerintah Pusat dengan
                                memberikan ganti kerugian yang layak. (7) Setiap
                                pejabat pemerintah yang berwenang dilarang
                                menerbitkan persetujuan Kesesuaian Kegiatan
                                Pemanfaatan Ruang yang tidak sesuai dengan
                                rencana tata ruang. (8) Ketentuan lebih lanjut
                                mengenai prosedur perolehan persetujuan
                                Kesesuaian Kegiatan Pemanfaatan Ruang dan tata
                                cara pemberian ganti kerugian yang layak
                                sebagaimana dimaksud pada ayat (5) dan ayat (6)
                                diatur dalam Peraturan Pemerintah.
