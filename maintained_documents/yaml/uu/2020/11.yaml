                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perusakan hutan adalah proses, cara, atau
                                      perbuatan merusak hutan melalui kegiatan
                                      pembalakan liar, penggunaan kawasan hutan
                                      tanpa Perizinan Berusaha atau penggunaan
                                      Perizinan Berusaha yang bertentangan
                                      dengan maksud dan tujuan pemberian
                                      Perizinan Berusaha di dalam kawasan hutan
                                      yang telah ditetapkan, yang telah
                                      ditunjuk, ataupun yang sedang diproses
                                      penetapannya oleh Pemerintah Pusat.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembalakan liar adalah semua kegiatan
                                      pemanfaatan hasil hutan kayu secara tidak
                                      sah yang terorganisasi.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penggunaan kawasan hutan secara tidak sah
                                      adalah kegiatan terorganisasi yang
                                      dilakukan di dalam kawasan hutan untuk
                                      perkebunan dan/atau pertambangan tanpa
                                      Perizinan Berusaha dari Pemerintah Pusat.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Terorganisasi adalah kegiatan yang
                                      dilakukan oleh suatu kelompok yang
                                      terstruktur, yang terdiri atas 2 (dua)
                                      orang atau lebih, dan yang bertindak
                                      secara bersama-sama pada waktu tertentu
                                      dengan tujuan melakukan perusakan hutan,
                                      tidak termasuk kelompok masyarakat yang
                                      tinggal di dalam atau di sekitar kawasan
                                      hutan yang melakukan perladangan
                                      tradisional dan/atau melakukan penebangan
                                      kayu untuk keperluan sendiri dan tidak
                                      untuk tujuan komersial.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pencegahan perusakan hutan adalah segala
                                      upaya yang dilakukan untuk menghilangkan
                                      kesempatan terjadinya perusakan hutan.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemberantasan perusakan hutan adalah
                                      segala upaya yang dilakukan untuk menindak
                                      secara hukum terhadap pelaku perusakan
                                      hutan baik langsung, tidak langsung,
                                      maupun yang terkait lainnya.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemanfaatan hutan adalah kegiatan untuk
                                      memanfaatkan kawasan hutan, jasa
                                      lingkungan, hasil hutan kayu dan bukan
                                      kayu, serta memungut hasil hutan kayu dan
                                      bukan kayu secara optimal dan adil untuk
                                      kesejahteraan masyarakat dengan tetap
                                      menjaga kelestariannya.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemanfaatan hasil hutan kayu adalah
                                      kegiatan untuk memanfaatkan dan
                                      mengusahakan hasil hutan berupa kayu
                                      melalui kegiatan penebangan, permudaan,
                                      pengangkutan, pengolahan dan pemasaran
                                      dengan tidak merusak lingkungan dan tidak
                                      mengurangi fungsi pokoknya.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perizinan Berusaha terkait pemanfaatan
                                      hasil hutan adalah Perizinan Berusaha dari
                                      Pemerintah untuk memanfaatkan hasil hutan
                                      berupa kayu pada hutan produksi melalui
                                      kegiatan pemanenan atau penebangan,
                                      pengayaan, pemeliharaan, dan pemasaran.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Surat keterangan sahnya hasil hutan adalah
                                      dokumen-dokumen yang merupakan bukti
                                      legalitas hasil hutan pada setiap segmen
                                      kegiatan dalam penatausahaan hasil hutan.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Hasil hutan kayu adalah hasil hutan berupa
                                      kayu bulat, kayu bulat kecil, kayu olahan,
                                      atau kayu pacakan yang berasal dari
                                      kawasan hutan.
                                - _type: numPoint
                                  _key: '14'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pohon adalah tumbuhan yang batangnya
                                      berkayu dan dapat mencapai ukuran diameter
                                      10 (sepuluh) sentimeter atau lebih yang
                                      diukur pada ketinggian 1,50 (satu koma
                                      lima puluh) meter di atas permukaan tanah.
                                - _type: numPoint
                                  _key: '15'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Polisi Kehutanan adalah pejabat tertentu
                                      dalam lingkup instansi kehutanan pusat
                                      dan/atau daerah yang sesuai dengan sifat
                                      pekerjaannya menyelenggarakan dan/atau
                                      melaksanakan usaha pelindungan hutan yang
                                      oleh kuasa Undang-Undang diberikan
                                      wewenang kepolisian khusus di bidang
                                      kehutanan dan konservasi sumber daya alam
                                      hayati dan ekosistemnya yang berada dalam
                                      satu kesatuan komando.
                                - _type: numPoint
                                  _key: '16'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pejabat adalah orang yang diperintahkan
                                      atau orang yang karena jabatannya memiliki
                                      kewenangan dengan suatu tugas dan tanggung
                                      jawab tertentu.
                                - _type: numPoint
                                  _key: '17'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pejabat Penyidik Pegawai Negeri Sipil yang
                                      selanjutnya disingkat PPNS adalah pejabat
                                      pegawai negeri sipil tertentu dalam
                                      lingkup instansi kehutanan pusat dan
                                      daerah yang oleh Undang- Undang diberi
                                      wewenang khusus dalam penyidikan di bidang
                                      kehutanan dan konservasi sumber daya alam
                                      hayati dan ekosistemnya.
                                - _type: numPoint
                                  _key: '18'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Saksi adalah orang yang dapat memberikan
                                      keterangan guna kepentingan penyelidikan,
                                      penyidikan, penuntutan, dan peradilan
                                      tentang suatu perkara pidana yang
                                      didengar, dilihat, dan dialami sendiri.
                                - _type: numPoint
                                  _key: '19'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pelapor adalah orang yang memberitahukan
                                      adanya dugaan, sedang, atau telah
                                      terjadinya perusakan hutan kepada pejabat
                                      yang berwenang.
                                - _type: numPoint
                                  _key: '20'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Informan adalah orang yang
                                      menginformasikan secara rahasia adanya
                                      dugaan, sedang, atau telah terjadinya
                                      perusakan hutan kepada pejabat yang
                                      berwenang.
                                - _type: numPoint
                                  _key: '21'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Setiap orang adalah orang perseorangan
                                      dan/atau korporasi yang melakukan
                                      perbuatan perusakan hutan secara
                                      terorganisasi di wilayah hukum Indonesia
                                      dan/atau berakibat hukum di wilayah hukum
                                      Indonesia.
                                - _type: numPoint
                                  _key: '22'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Korporasi adalah kumpulan orang dan/atau
                                      kekayaan yang teroganisasi, baik berupa
                                      badan hukum maupun bukan badan hukum.
                                - _type: numPoint
                                  _key: '23'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Pusat adalah Presiden Republik
                                      Indonesia yang memegang kekuasaan
                                      pemerintahan negara Republik Indonesia
                                      yang dibantu oleh wakil Presiden dan
                                      menteri sebagaimana dimaksud dalam Undang-
                                      Undang Dasar Negara Republik Indonesia
                                      Tahun 1945.
                                - _type: numPoint
                                  _key: '24'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Daerah adalah kepala daerah
                                      sebagai unsur penyelenggara Pemerintahan
                                      Daerah yang memimpin pelaksanaan urusan
                                      pemerintahan yang menjadi kewenangan
                                      daerah otonom.
                                - _type: numPoint
                                  _key: '25'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Menteri adalah menteri yang
                                      menyelenggarakan urusan pemerintahan di
                                      bidang kehutanan.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 1 angka 3, angka 5, angka 23,
                                dan angka 24 diubah sehingga Pasal 1 berbunyi
                                sebagai berikut:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 2
                            _pasalKey: '7'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pencegahan perusakan hutan dilakukan oleh
                                masyarakat, badan hukum, dan/atau korporasi yang
                                memperoleh Perizinan Berusaha terkait
                                pemanfaatan hutan.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 7 diubah sehingga berbunyi
                                sebagai berikut:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 3
                            _pasalKey: '12'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Setiap orang dilarang:'
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      melakukan penebangan pohon dalam kawasan
                                      hutan yang tidak sesuai dengan Perizinan
                                      Berusaha terkait pemanfaatan hutan,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      melakukan penebangan pohon dalam kawasan
                                      hutan tanpa memiliki Perizinan Berusaha
                                      dari Pemerintah Pusat,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      melakukan penebangan pohon dalam kawasan
                                      hutan secara tidak sah:
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      memuat, membongkar, mengeluarkan,
                                      mengangkut, menguasai, dan/atau memiliki
                                      hasil penebangan di kawasan hutan tanpa
                                      Perizinan Berusaha dari Pemerintah Pusat:
                                - _type: alphaPoint
                                  _key: e
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      mengangkut, menguasai, atau memiliki hasil
                                      hutan kayu yang tidak dilengkapi secara
                                      bersama surat keterangan sahnya hasil
                                      hutan:
                                - _type: alphaPoint
                                  _key: f
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      membawa alat-alat yang lazim digunakan
                                      untuk menebang, memotong, atau membelah
                                      pohon di dalam kawasan hutan tanpa
                                      Perizinan Berusaha dari Pemerintah Pusat:
                                - _type: alphaPoint
                                  _key: g
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      membawa alat-alat berat dan/atau alat-alat
                                      lainnya yang lazim atau patut diduga akan
                                      digunakan untuk mengangkut hasil hutan di
                                      dalam kawasan hutan tanpa Perizinan
                                      Berusaha dari Pemerintah Pusat,
                                - _type: alphaPoint
                                  _key: h
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      memanfaatkan hasil hutan kayu yang diduga
                                      berasal dari hasil pembalakan liar,
                                - _type: alphaPoint
                                  _key: i
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      mengedarkan kayu hasil pembalakan liar
                                      melalui darat, perairan, atau udara,
                                - _type: alphaPoint
                                  _key: j
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menyelundupkan kayu yang berasal dari atau
                                      masuk ke wilayah Negara Kesatuan Republik
                                      Indonesia melalui sungai, darat, laut,
                                      atau udara,
                                - _type: alphaPoint
                                  _key: k
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menerima, membeli, menjual, menerima
                                      tukar, menerima titipan, dan/atau memiliki
                                      hasil hutan yang diketahui berasal dari
                                      pembalakan liar,
                                - _type: alphaPoint
                                  _key: l
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      membeli, memasarkan, dan/atau mengolah
                                      hasil hutan kayu yang berasal dari kawasan
                                      hutan yang diambil atau dipungut secara
                                      tidak sah, dan/atau
                                - _type: alphaPoint
                                  _key: m
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menerima, menjual, menerima tukar,
                                      menerima titipan, menyimpan, dan/atau
                                      memiliki hasil hutan kayu yang berasal
                                      dari kawasan hutan yang diambil atau
                                      dipungut secara tidak sah.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 12 diubah sehingga berbunyi
                                sebagai berikut:
                          - _type: amendPoint
                            _operation: insert
                            _nomorKey: 4
                            _pasalKeys:
                              - 12A
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                4. Di antara Pasal 12 dan Pasal 13 disisipkan 1
                                (satu) pasal, yakni Pasal 12A sehingga berbunyi
                                sebagai berikut: Pasal 12A (1) Orang
                                perseorangan yang bertempat tinggal di dalam
                                dan/atau di sekitar kawasan hutan paling singkat
                                5 lima) tahun secara terus menerus yang
                                melakukan pelanggaran terhadap ketentuan Pasal
                                12 huruf a sampai dengan huruf f dan/atau huruf
                                h dikenai sanksi administratif. (2) Pengenaan
                                sanksi administratif sebagaimana dimaksud pada
                                ayat (1) dikecualikan terhadap: a. orang
                                perseorangan atau kelompok masyarakat yang
                                bertempat tinggal di dalam dan/atau di sekitar
                                kawasan hutan paling singkat 5 (lima) tahun
                                secara terus-menerus dan terdaftar dalam
                                kebijakan penataan kawasan hutan, atau b. orang
                                perseorangan yang telah mendapatkan sanksi
                                sosial atau sanksi adat.
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 5
                            _pasalKey: '17'
                            isi:
                              _type: ayats
                              ayats:
                                - _type: ayat
                                  _key: 1
                                  isi:
                                    _type: points
                                    _description:
                                      _type: referenceText
                                      references: []
                                      text: 'Setiap orang dilarang:'
                                    isi:
                                      - _type: alphaPoint
                                        _key: a
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: >-
                                            membawa alat-alat berat dan/atau
                                            alat-alat lain yang lazim atau patut
                                            diduga akan digunakan untuk melakukan
                                            kegiatan penambangan dan/atau mengangkut
                                            hasil tambang di dalam kawasan hutan
                                            tanpa Perizinan Berusaha dari Pemerintah
                                            Pusat:
                                      - _type: alphaPoint
                                        _key: b
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: >-
                                            melakukan kegiatan penambangan di dalam
                                            kawasan hutan tanpa Perizinan Berusaha
                                            dari Pemerintah Pusat:
                                      - _type: alphaPoint
                                        _key: c
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: >-
                                            . mengangkut dan/atau menerima titipan
                                            hasil tambang yang berasal dari kegiatan
                                            penambangan di dalam kawasan hutan tanpa
                                            Perizinan Berusaha dari Pemerintah
                                            Pusat,
                                      - _type: alphaPoint
                                        _key: d
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: >-
                                            menjual, menguasai, memiliki, dan/atau
                                            menyimpan hasil tambang yang berasal
                                            dari kegiatan penambangan di dalam
                                            kawasan hutan tanpa Perizinan Berusaha
                                            dari Pemerintah Pusat: dan/atau
                                      - _type: alphaPoint
                                        _key: e
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: >-
                                            membeli, memasarkan, dan/atau mengolah
                                            hasil tambang dari kegiatan penambangan
                                            di dalam kawasan hutan tanpa Perizinan
                                            Berusaha dari Pemerintah Pusat.
                                - _type: ayat
                                  _key: 2
                                  isi:
                                    _type: points
                                    _description:
                                      _type: referenceText
                                      references: []
                                      text: 'Setiap orang dilarang:'
                                    isi:
                                      - _type: alphaPoint
                                        _key: a
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: >-
                                            membawa alat-alat berat dan/atau
                                            alat-alat laannya yang lazim atau patut
                                            diduga akan digunakan untuk melakukan
                                            kegiatan perkebunan dan/atau mengangkut
                                            hasil kebun di dalam kawasan hutan tanpa
                                            Perizinan Berusaha dari Pemerintah
                                            Pusat:
                                      - _type: alphaPoint
                                        _key: b
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: >-
                                            melakukan kegiatan perkebunan tanpa
                                            Perizinan Berusaha dari Pemerintah Pusat
                                            di dalam kawasan hutan:
                                      - _type: alphaPoint
                                        _key: c
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: >-
                                            . mengangkut dan/atau menerima titipan
                                            hasil perkebunan yang berasal dari
                                            kegiatan perkebunan di dalam kawasan
                                            hutan tanpa Perizinan Berusaha dari
                                            Pemerintah Pusat:
                                      - _type: alphaPoint
                                        _key: d
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: >-
                                            menjual, menguasai, memiliki, dan/atau
                                            menyimpan hasil perkebunan yang berasal
                                            dari kegiatan perkebunan di dalam
                                            kawasan hutan tanpa Perizinan Berusaha
                                            dari Pemerintah Pusat: dan/atau
                                      - _type: alphaPoint
                                        _key: e
                                        isi:
                                          _type: referenceText
                                          references: []
                                          text: >-
                                            membeli, memasarkan, dan/atau mengolah
                                            hasil kebun dari perkebunan yang berasal
                                            dari kegiatan perkebunan di dalam
                                            kawasan hutan tanpa Perizinan Berusaha
                                            dari Pemerintah Pusat.
                            description:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan Pasal 17 diubah sehingga berbunyi
                                sebagai berikut:
                          - _type: amendPoint
                            _operation: insert
                            _nomorKey: 6
                            _pasalKeys:
                              - 17A
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                6. Di antara Pasal 17 dan Pasal 18 disisipkan 1
                                (satu) pasal, yakni Pasal 17A sehingga berbunyi
                                sebagai berikut: Pasal 17A (1) Orang
                                perseorangan yang bertempat tinggal di dalam
                                dan/atau di sekitar kawasan hutan paling singkat
                                5 (lima) tahun secara terus menerus yang
                                melakukan pelanggaran terhadap Pasal 17 ayat (2)
                                huruf b, huruf c, dan/atau huruf d dikenai
                                sanksi administratif. (2) Pengenaan sanksi
                                administratif — sebagaimana dimaksud pada ayat
                                (1) dikecualikan terhadap: a. orang perseorangan
                                atau kelompok masyarakat yang bertempat tinggal
                                di dalam dan/atau di sekitar kawasan hutan
                                paling singkat 5 (lima) tahun secara
                                terus-menerus dan terdaftar dalam kebijakan
                                penataan kawasan hutan, atau b. orang
                                perseorangan yang telah mendapatkan sanksi
                                sosial atau sanksi adat.
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 7
                            _pasalKey: '18'
                            isi:
                              _type: ayats
                              ayats:
                                - _type: ayat
                                  _key: 1
                                  isi:
                                    _type: points
                                    _description:
                                      _type: referenceText
                                      references: []
                                      text: >-
                                        Selain dikenai sanksi pidana,
                                        pelanggaran terhadap ketentuan
                                        sebagaimana dimaksud dalam Pasal 12
                                        huruf a, huruf b, huruf c, Pasal 17 ayat
                                        (1) huruf b, huruf c, huruf e, atau
                                        Pasal 17 ayat (2) huruf b, huruf c, atau
                                        huruf e serta kegiatan lain di kawasan
                                        hutan tanpa Perizinan Berusaha yang
                                        dilakukan oleh badan hukum atau
                                        korporasi dikenai sanksi administratif
