                    Pasal 99 meliputi: a. penciptaan dan penumbuhan usaha baru
                    serta penguatan kapasitas pelaku usaha pemula yang berdaya
                    saing tinggi, b. penciptaan dan penumbuhan usaha baru yang
                    mempunyai nilai ekonomi dan berdaya saing tinggi, dan Cc.
                    peningkatan nilai tambah pengelolaan potensi ekonomi melalui
                    pemanfaatan ilmu pengetahuan dan teknologi.
