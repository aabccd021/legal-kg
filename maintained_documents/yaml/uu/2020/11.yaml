                                Ruminansia Indukan ke dalam wilayah Negara
                                Kesatuan Republik Indonesia dapat berasal dari
                                suatu negara yang telah memenuhi persyaratan dan
                                tata cara pemasukannya. (2) Persyaratan dan tata
                                cara pemasukan Ternak Ruminansia Indukan dari
                                luar negeri ke dalam wilayah Negara Kesatuan
                                Republik Indonesia ditetapkan berdasarkan
                                analisis risiko di bidang Kesehatan Hewan oleh
                                Otoritas Veteriner. (3) Pemasukan Ternak
                                Ruminansia Indukan yang berasal dari suatu
                                negara sebagaimana dimaksud pada ayat (1),
                                selain harus memenuhi ketentuan sebagaimana
                                dimaksud pada ayat (2) juga harus terlebih
                                dahulu: a. dinyatakan bebas Penyakit Hewan
                                Menular di negara asal oleh Otoritas Veteriner
                                negara asal sesuai dengan ketentuan yang
                                ditetapkan badan kesehatan hewan dunia dan
                                diakui oleh Otoritas Veteriner Indonesia: b.
                                dilakukan penguatan sistem dan pelaksanaan
                                surveilan di dalam negeri, dan c. ditetapkan
                                tempat pemasukan tertentu. (4) Setiap Orang yang
                                melakukan pemasukan Ternak Ruminansia Indukan
                                sebagaimana dimaksud pada ayat (l) wajib
                                memenuhi Perizinan Berusaha dari Pemerintah
                                Pusat. (5) Ketentuan lebih lanjut mengenai
                                pemasukan Ternak Ruminansia Indukan ke dalam
                                wilayah Negara Kesatuan Republik Indonesia dan
                                Perizinan Berusaha diatur dalam Peraturan
                                Pemerintah. REPUBLIK INDONESIA - 183 -
