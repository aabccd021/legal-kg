                              text: >-
                                20. Ketentuan Pasal 80 diubah sehingga berbunyi
                                sebagai berikut: Pasal 80 (1) Setiap perbuatan
                                melanggar hukum yang diatur dalam Undang-Undang
                                ini, dengan tidak mengurangi sanksi pidana
                                sebagaimana diatur dalam Pasal 78, mewajibkan
                                kepada penanggung jawab perbuatan itu untuk
                                membayar ganti rugi sesuai dengan tingkat
                                kerusakan atau akibat yang ditimbulkan kepada
                                negara untuk biaya rehabilitasi, pemulihan
                                kondisi hutan, atau tindakan lain yang
                                diperlukan. (2) Setiap pemegang Perizinan
                                Berusaha pemanfaatan hutan yang diatur dalam
                                Undang-Undang ini apabila melanggar ketentuan di
                                luar ketentuan pidana sebagaimana diatur dalam
                                Pasal 78 dikenai sanksi administratif. REPUBLIK
                                INDONESIA -199 - (3) Ketentuan lebih lanjut
                                mengenai tata cara ganti rugi sebagaimana
                                dimaksud pada ayat (1) dan tata cara pengenaan
                                sanksi administratif — sebagaimana dimaksud pada
                                ayat (2) diatur dalam Peraturan Pemerintah.
