                                Dewan Kawasan dengan melibatkan provinsi yang
                                bersangkutan.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dewan Kawasan sebagaimana dimaksud pada ayat (1)
