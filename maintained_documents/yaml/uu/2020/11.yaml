                                    _structureType: pasal
                              text: >-
                                1. Ketentuan Pasal 1 angka 3 diubah, serta
                                disisipkan 1 (satu) angka, yakni angka 14
                                sehingga Pasal 1 berbunyi sebagai berikut: Pasal
                                1 Dalam Undang-Undang ini yang dimaksud dengan:
                                l. Arsitektur adalah wujud hasil penerapan ilmu
                                pengetahuan, teknologi, dan seni secara utuh
                                dalam menggubah ruang dan lingkungan binaan
                                sebagai bagian dari kebudayaan dan peradaban
                                manusia yang memenuhi kaidah fungsi, kaidah
                                konstruksi, dan kaidah estetika serta mencakup
                                faktor keselamatan, keamanan, kesehatan,
                                kenyamanan, dan kemudahan. 2. Praktik Arsitek
                                adalah penyelenggaraan kegiatan untuk
                                menghasilkan karya Arsitektur yang meliputi
                                perencanaan, perancangan, pengawasan, dan/atau
                                pengkajian untuk bangunan gedung dan
                                lingkungannya, serta yang terkait dengan kawasan
                                dan kota. 3. Arsitek adalah seseorang yang telah
                                memenuhi syarat dan ditetapkan oleh Dewan untuk
                                melakukan Praktik Arsitek. 4. Arsitek Asing
                                adalah Arsitek berkewarganegaraan asing yang
                                melakukan Praktik Arsitek di Indonesia. 5. Uji
                                Kompetensi adalah penilaian kompetensi Arsitek
                                yang terukur dan objektif untuk menilai capaian
                                kompetensi dalam bidang Arsitektur dengan
                                mengacu pada standar kompetensi Arsitek. 6.
                                Surat Tanda Registrasi Arsitek adalah bukti
                                tertulis bagi Arsitek untuk melakukan Praktik
                                Arsitek. REPUBLIK INDONESIA - 116 - 7. Lisensi
                                adalah bukti tertulis yang berlaku sebagai surat
                                tanda penanggung jawab Praktik Arsitek dalam
                                penyelenggaraan izin mendirikan bangunan dan
                                perizinan lain. 8. Pengembangan Keprofesian
                                Berkelanjutan adalah upaya pemeliharaan
                                kompetensi Arsitek untuk menjalankan Praktik
                                Arsitek secara berkesinambungan. 9. Pengguna
                                Jasa Arsitek adalah pihak yang menggunakan jasa
                                Arsitek berdasarkan perjanjian kerja. 10.
                                Organisasi Profesi adalah Ikatan Arsitek
                                Indonesia. 11. Pemerintah Pusat adalah Presiden
                                Republik Indonesia yang memegang kekuasaan
                                pemerintahan negara Republik Indonesia yang
                                dibantu oleh Wakil Presiden dan menteri
                                sebagaimana dimaksud dalam Undang- Undang Dasar
                                Negara Republik Indonesia Tahun 1945. 12.
                                Pemerintah Daerah adalah kepala daerah sebagai
                                unsur penyelenggara Pemerintahan Daerah yang
                                memimpin pelaksanaan urusan pemerintahan yang
                                menjadi kewenangan daerah otonom. 13. Menteri
                                adalah menteri yang menyelenggarakan urusan
                                pemerintahan di bidang pekerjaan umum. 14. Dewan
                                Arsitek Indonesia yang selanjutnya disebut Dewan
                                adalah dewan yang dibentuk oleh Organisasi
                                Profesi dengan tugas dan fungsi membantu
                                Pemerintah Pusat dalam penyelenggaraan
                                keprofesian Arsitek.
