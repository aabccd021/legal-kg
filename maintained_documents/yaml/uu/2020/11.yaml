                            _key: 1
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Modal awal Lembaga Pengelola Investasi dapat
                                  berupa:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: 'dana tunai:'
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: barang milik negara,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      piutang negara pada badan usaha milik
                                      negara atau perseroan terbatas, dan/atau
                                - _type: alphaPoint
