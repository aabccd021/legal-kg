                              text: >-
                                14. Ketentuan Pasal 56 diubah sehingga berbunyi
                                sebagai berikut: Pasal 56 (1) Pengelolaan rumah
                                susun meliputi kegiatan operasional,
                                pemeliharaan, dan perawatan bagian bersama,
                                benda bersama, dan tanah bersama. (2)
                                Pengelolaan rumah susun sebagaimana dimaksud
                                pada ayat (1) harus dilaksanakan oleh pengelola
                                yang berbadan hukum, kecuali rumah susun umum
                                sewa, rumah susun khusus, dan rumah susun
                                negara. (3) Badan hukum sebagaimana dimaksud
                                pada ayat (2) harus mendaftar dan mendapatkan
                                Perizinan Berusaha dari bupati/wali kota sesuai
                                dengan norma, standar, prosedur, dan kriteria
                                yang ditetapkan oleh Pemerintah Pusat. (4)
                                Khusus untuk Provinsi Daerah Khusus Ibukota
                                Jakarta, badan hukum sebagaimana dimaksud pada
                                ayat (2) harus mendaftar dan mendapatkan
                                Perizinan Berusaha dari Gubernur sesuai dengan
                                norma, standar, prosedur, dan kriteria yang
                                ditetapkan oleh Pemerintah Pusat. (S) Ketentuan
                                lebih lanjut mengenai Perizinan Berusaha
                                sebagaimana dimaksud pada ayat (3) dan ayat (4)
                                diatur dalam Peraturan Pemerintah.
