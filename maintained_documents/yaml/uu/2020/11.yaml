                        text: >-
                          1. Ketentuan Pasal 8 diubah sehingga berbunyi sebagai
                          berikut: REPUBLIK INDONESIA . 648 - Pasal 8 (1) Wajib
                          Pajak dengan kemauan sendiri dapat membetulkan Surat
                          Pemberitahuan yang telah disampaikan dengan
                          menyampaikan pernyataan tertulis dengan syarat
                          Direktur Jenderal Pajak belum melakukan tindakan
                          pemeriksaan. (la) Dalam hal pembetulan Surat
                          Pemberitahuan sebagaimana dimaksud pada ayat (1)
                          menyatakan rugi atau lebih bayar, pembetulan Surat
                          Pemberitahuan harus disampaikan paling lama 2 (dua)
                          tahun sebelum daluwarsa penetapan. (2) Dalam hal Wajib
                          Pajak membetulkan sendiri Surat Pemberitahuan Tahunan
                          yang mengakibatkan utang pajak menjadi lebih besar,
                          kepadanya dikenai sanksi administrasi berupa bunga
                          sebesar tarif bunga per bulan yang ditetapkan oleh
                          Menteri Keuangan atas jumlah pajak yang kurang
                          dibayar, dihitung sejak saat penyampaian Surat
                          Pemberitahuan berakhir sampai dengan tanggal
                          pembayaran, dan dikenakan paling lama 24 (dua puluh
                          empat) bulan, serta bagian dari bulan dihitung penuh 1
                          (satu) bulan. (2a) Dalam hal Wajib Pajak membetulkan
                          sendiri Surat Pemberitahuan Masa yang mengakibatkan
                          utang pajak menjadi lebih besar, kepadanya dikenai
                          sanksi administrasi berupa bunga sebesar tarif bunga
                          per bulan yang ditetapkan oleh Menteri Keuangan atas
                          jumlah pajak yang kurang dibayar, dihitung sejak jatuh
                          tempo pembayaran sampai dengan tanggal pembayaran, dan
                          dikenakan paling lama 24 (dua puluh empat) bulan,
                          serta bagian dari bulan dihitung penuh 1 (satu) bulan.
                          (2b) Tarif bunga per bulan yang ditetapkan oleh
                          Menteri Keuangan sebagaimana dimaksud pada ayat (2)
                          dan ayat (2a) dihitung berdasarkan suku bunga acuan
                          ditambah 56 (lima persen) dan dibagi 12 (dua belas)
                          yang berlaku pada tanggal dimulainya penghitungan
                          sanksi. REPUBLIK INDONESIA - 649 - (3) Walaupun telah
                          dilakukan tindakan pemeriksaan bukti permulaan, Wajib
                          Pajak dengan kemauan sendiri dapat mengungkapkan
                          dengan pernyataan tertulis mengenai ketidakbenaran
                          perbuatannya, yaitu sebagai berikut: a. tidak
                          menyampaikan Surat Pemberitahuan, atau b. menyampaikan
                          Surat Pemberitahuan yang isinya tidak benar atau tidak
                          lengkap, atau melampirkan keterangan yang isinya tidak
                          benar sebagaimana dimaksud dalam Pasal 38 atau Pasal
                          39 ayat (1) huruf c dan huruf d sepanjang mulainya
                          penyidikan belum diberitahukan kepada Penuntut Umum
                          melalui penyidik pejabat Polisi Negara Republik
                          Indonesia. (3a) Pengungkapan ketidakbenaran perbuatan
                          sebagaimana dimaksud pada ayat (3) disertai pelunasan
                          kekurangan pembayaran jumlah pajak yang sebenarnya
                          terutang beserta sanksi administrasi berupa denda
                          sebesar 100» (seratus persen) dari jumlah pajak yang
                          kurang dibayar. (4) Walaupun Direktur Jenderal Pajak
                          telah melakukan pemeriksaan, dengan syarat Direktur
                          Jenderal Pajak belum menerbitkan surat ketetapan
                          pajak, Wajib Pajak dengan kesadaran sendiri dapat
                          mengungkapkan dalam laporan tersendiri tentang
                          ketidakbenaran pengisian Surat Pemberitahuan yang
                          telah disampaikan sesuai dengan keadaan yang
                          sebenarnya, yang dapat mengakibatkan: a. pajak-pajak
                          yang masih harus dibayar menjadi lebih besar atau
                          lebih kecil: b. rugi berdasarkan ketentuan perpajakan
                          menjadi lebih kecil atau lebih besar, Cc. jumlah harta
                          menjadi lebih besar atau lebih kecil: atau REPUBLIK
                          INDONESIA - 650 - d. jumlah modal menjadi lebih besar
                          atau lebih kecil dan pemeriksaan tetap dilanjutkan.
                          (5) Pajak yang kurang dibayar yang timbul sebagai
                          akibat dari pengungkapan ketidakbenaran pengisian
                          Surat Pemberitahuan sebagaimana dimaksud pada ayat (4)
                          harus dilunasi oleh Wajib Pajak sebelum laporan
                          tersendiri disampaikan beserta sanksi administrasi
                          berupa bunga sebesar tarif bunga per bulan yang
                          ditetapkan oleh Menteri Keuangan dari pajak yang
                          kurang dibayar, yang dihitung sejak: a. batas waktu
                          penyampaian Surat Pemberitahuan Tahunan berakhir
                          sampai dengan tanggal pembayaran, untuk pengungkapan
                          ketidakbenaran pengisian Surat Pemberitahuan Tahunan:
                          atau b. jatuh tempo pembayaran berakhir sampai dengan
                          tanggal pembayaran, untuk pengungkapan ketidakbenaran
                          pengisian Surat Pemberitahuan Masa dan dikenakan
                          paling lama 24 (dua puluh empat) bulan, serta bagian
                          dari bulan dihitung penuh 1 (satu) bulan. (Sa) Tarif
                          bunga per bulan yang ditetapkan oleh Menteri Keuangan
                          sebagaimana dimaksud pada ayat (5) dihitung
                          berdasarkan suku bunga acuan ditambah 1046 (sepuluh
                          persen) dan dibagi 12 (dua belas) yang berlaku pada
                          tanggal dimulainya penghitungan sanksi. REPUBLIK
                          INDONESIA - 651 - (6) Wajib Pajak dapat membetulkan
                          Surat Pemberitahuan Tahunan yang telah disampaikan,
                          dalam hal Wajib Pajak menerima surat ketetapan pajak,
                          Surat Keputusan Keberatan, Surat Keputusan Pembetulan,
                          Putusan Banding, atau Putusan Peninjauan Kembali Tahun
                          Pajak sebelumnya atau beberapa Tahun Pajak sebelumnya,
                          yang menyatakan rugi fiskal yang berbeda dengan rugi
                          fiskal yang telah dikompensasikan dalam Surat
                          Pemberitahuan Tahunan yang akan dibetulkan tersebut,
                          dalam jangka waktu 3 (tiga) bulan setelah menerima
                          surat ketetapan pajak, Surat Keputusan Keberatan,
                          Surat Keputusan Pembetulan, Putusan Banding, atau
                          Putusan Peninjauan Kembali dengan syarat Direktur
                          Jenderal Pajak belum melakukan tindakan pemeriksaan.
