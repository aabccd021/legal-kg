                        text: >-
                          3. Ketentuan Pasal 26 diubah sehingga berbunyi sebagai
                          berikut: REPUBLIK INDONESIA - 631 - Pasal 26 (1) Atas
                          penghasilan tersebut di bawah ini, dengan nama dan
                          dalam bentuk apa pun, yang dibayarkan, disediakan
                          untuk dibayarkan, atau telah jatuh tempo pembayarannya
                          oleh badan pemerintah, subjek pajak dalam negeri,
                          penyelenggara kegiatan, bentuk usaha tetap, atau
                          perwakilan perusahaan luar negeri lainnya kepada Wajib
                          Pajak luar negeri selain bentuk usaha tetap di
                          Indonesia dipotong pajak sebesar 20Y5 (dua puluh
                          persen) dari jumlah bruto oleh pihak yang wajib
                          membayarkan: a. dividen: b. bunga termasuk premium,
                          diskonto, dan imbalan sehubungan dengan jaminan
                          pengembalian utang, C. royalti, sewa, dan penghasilan
                          lain sehubungan dengan penggunaan harta, d. imbalan
                          sehubungan dengan jasa, pekerjaan, dan kegiatan, e.
                          hadiah dan penghargaan, f. ' pensiun dan pembayaran
                          berkala lainnya, g. premi swap dan transaksi lindung
                          nilai lainnya, dan/atau h. keuntungan karena
                          pembebasan utang. (la) Negara domisili dari Wajib
                          Pajak luar negeri selain yang menjalankan usaha atau
                          melakukan kegiatan usaha melalui bentuk usaha tetap di
                          Indonesia sebagaimana dimaksud pada ayat (1) adalah
                          negara tempat tinggal atau tempat kedudukan Wajib
                          Pajak luar negeri yang sebenarnya menerima manfaat
                          dari penghasilan tersebut (beneficial owner). (1b)
                          Tarif ... REPUBLIK INDONESIA - 632 - (lb) Tarif
                          sebesar 20Y6 (dua puluh persen) dari jumlah bruto oleh
                          pihak yang wajib membayarkan bunga termasuk premium,
                          diskonto, dan imbalan sehubungan dengan jaminan
                          pengembalian utang sebagaimana dimaksud pada ayat (1)
                          huruf b dapat diturunkan dengan Peraturan Pemerintah.
                          (2) Atas penghasilan dari penjualan atau pengalihan
                          harta di Indonesia, kecuali yang diatur dalam Pasal 4
                          ayat (2), yang diterima atau diperoleh Wajib Pajak
                          luar negeri selain bentuk usaha tetap di Indonesia,
                          dan premi asuransi yang dibayarkan kepada perusahaan
                          asuransi luar negeri dipotong pajak 206 (dua puluh
                          persen) dari perkiraan penghasilan neto. (2a) Atas
                          penghasilan dari penjualan atau pengalihan saham
                          sebagaimana dimaksud dalam Pasal 18 ayat (3c) dipotong
                          pajak sebesar 20” (dua puluh persen) dari perkiraan
                          penghasilan neto. (3) Pelaksanaan ketentuan
                          sebagaimana dimaksud pada ayat (2) dan ayat (2a)
                          diatur dengan atau berdasarkan Peraturan Menteri
                          Keuangan. (4) Penghasilan Kena Pajak sesudah dikurangi
                          pajak dari suatu bentuk usaha tetap di Indonesia
                          dikenai pajak sebesar 206 (dua puluh persen), kecuali
                          penghasilan tersebut ditanamkan kembali di Indonesia,
                          yang ketentuannya diatur lebih lanjut dengan atau
                          berdasarkan Peraturan Menteri Keuangan. (5) Pemotongan
                          pajak sebagaimana dimaksud pada ayat (1), ayat (2),
                          ayat (2a), dan ayat (4) bersifat final, kecuali: a.
                          pemotongan atas penghasilan sebagaimana dimaksud dalam
                          Pasal 5 ayat (1) huruf b dan huruf c, dan b.
                          pemotongan atas penghasilan yang diterima atau
                          diperoleh orang pribadi atau badan luar negeri yang
                          berubah status menjadi Wajib Pajak dalam negeri atau
                          bentuk usaha tetap. REPUBLIK INDONESIA - 633 -
