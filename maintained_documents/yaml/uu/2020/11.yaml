                          text: >-
                            Beberapa ketentuan dalam Undang-Undang Nomor 30
                            Tahun 2009 tentang Ketenagalistrikan (Lembaran
                            Negara Republik Indonesia Tahun 2009 Nomor 133,
                            Tambahan Lembaran Negara Republik Indonesia Nomor
                            5052) diubah sebagai berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: referenceText
                              references:
                                - start: 13
                                  end: 20
                                  node:
                                    _key: 1
                                    parentDocument: *ref_0
                                    _structureType: pasal
                                - start: 104
                                  end: 111
                                  node:
                                    _key: 1
                                    parentDocument: *ref_0
                                    _structureType: pasal
                                - start: 138
                                  end: 145
                                  node:
                                    _key: 1
                                    parentDocument: *ref_0
                                    _structureType: pasal
                              text: >-
                                1. Ketentuan Pasal 1 angka 10, angka 12, angka
                                15, dan angka 16 diubah, serta angka 11 dihapus
                                sehingga Pasal 1 berbunyi sebagai berikut: Pasal
                                1 Dalam Undang-Undang ini yang dimaksud dengan:
                                1. Ketenagalistrikan adalah segala sesuatu yang
                                menyangkut penyediaan dan pemanfaatan tenaga
                                listrik serta usaha penunjang tenaga listrik.
                                REPUBLIK INDONESIA - 244 - 2. Tenaga listrik
                                adalah suatu bentuk energi sekunder yang
                                dibangkitkan, ditransmisikan, dan
                                didistribusikan untuk segala macam keperluan,
                                tetapi tidak meliputi listrik yang dipakai untuk
                                komunikasi, elektronika, atau isyarat. 3. Usaha
                                penyediaan tenaga listrik adalah pengadaan
                                tenaga listrik meliputi pembangkitan, transmisi,
                                distribusi, dan penjualan tenaga listrik kepada
                                konsumen. 4. Pembangkitan tenaga listrik adalah
                                kegiatan memproduksi tenaga listrik. S.
                                Transmisi tenaga listrik adalah penyaluran
                                tenaga listrik dari pembangkitan ke sistem
                                distribusi atau ke konsumen, atau penyaluran
                                tenaga listrik antarsistem. 6. Distribusi tenaga
                                listrik adalah penyaluran tenaga listrik dari
                                sistem transmisi atau dari pembangkitan ke
                                konsumen. 7. Konsumen adalah setiap orang atau
                                badan yang membeli tenaga listrik dari pemegang
                                izin usaha penyediaan tenaga listrik. 8. Usaha
                                penjualan tenaga listrik adalah kegiatan usaha
                                penjualan tenaga listrik kepada konsumen. 9.
                                Rencana umum ketenagalistrikan adalah rencana
                                pengembangan sistem penyediaan tenaga listrik
                                yang meliputi bidang pembangkitan, transmisi,
                                dan distribusi tenaga listrik yang diperlukan
                                untuk memenuhi kebutuhan tenaga listrik. 10.
                                Perizinan Berusaha terkait ketenagalistrikan
                                adalah perizinan untuk melakukan kegiatan usaha
                                penyediaan tenaga listrik untuk kepentingan
                                umum, usaha penyediaan tenaga listrik untuk
                                kepentingan sendiri, dan/atau usaha jasa
                                penunjang tenaga listrik. 11. Dihapus. REPUBLIK
                                INDONESIA - 245 - 12. Wilayah usaha adalah
                                wilayah yang ditetapkan Pemerintah Pusat sebagai
                                tempat badan usaha melakukan usaha distribusi
                                dan/atau penjualan tenaga listrik. 13. Ganti
                                rugi hak atas tanah adalah penggantian atas
                                pelepasan atau penyerahan hak atas tanah berikut
                                bangunan, tanaman, dan/atau benda lain yang
                                terdapat di atas tanah tersebut. 14. Kompensasi
                                adalah pemberian sejumlah uang kepada pemegang
                                hak atas tanah berikut bangunan, tanaman,
                                dan/atau benda lain yang terdapat di atas tanah
                                tersebut karena tanah tersebut digunakan secara
                                tidak langsung untuk pembangunan
                                ketenagalistrikan tanpa dilakukan pelepasan atau
                                penyerahan hak atas tanah. 15. Pemerintah Pusat
                                adalah Presiden Republik Indonesia yang memegang
                                kekuasaan pemerintah negara Republik Indonesia
                                yang dibantu oleh Wakil Presiden dan menteri
                                sebagaimana dimaksud dalam Undang- Undang Dasar
                                Negara Republik Indonesia Tahun 1945. 16.
                                Pemerintah Daerah adalah kepala daerah sebagai
                                unsur penyelenggara Pemerintahan Daerah yang
                                memimpin pelaksanaan urusan pemerintahan yang
                                menjadi kewenangan daerah otonom. 17. Menteri
                                adalah menteri yang membidangi urusan
                                ketenagalistrikan. 18. Setiap orang adalah orang
                                perseorangan atau badan, baik yang berbadan
                                hukum maupun yang bukan berbadan hukum.
