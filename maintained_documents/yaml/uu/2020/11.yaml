    _judul: KETENTUAN UMUM
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 1
          isi:
            _type: referenceText
            references: []
            text: >-
              Dalam Undang-Undang ini yang dimaksud dengan: 1. Cipta Kerja
              adalah upaya penciptaan kerja melalui usaha kemudahan,
              perlindungan, dan pemberdayaan koperasi dan usaha mikro, kecil,
              dan menengah, peningkatan ekosistem investasi dan kemudahan
              berusaha, dan investasi Pemerintah Pusat dan percepatan proyek
              strategis nasional. 2. Koperasi adalah koperasi sebagaimana
              dimaksud dalam Undang-Undang tentang Perkoperasian. 3. Usaha
              Mikro, Kecil, dan Menengah yang selanjutnya disingkat UMK-M adalah
              usaha mikro, usaha kecil, dan usaha menengah sebagaimana dimaksud
              dalam Undang- Undang tentang Usaha Mikro, Kecil, dan Menengah. 4.
              Perizinan Berusaha adalah legalitas yang diberikan kepada Pelaku
              Usaha untuk memulai dan menjalankan usaha dan/atau kegiatannya.
              S5. Pemerintah Pusat adalah Presiden Republik Indonesia yang
              memegang kekuasaan pemerintahan negara Republik Indonesia yang
              dibantu oleh Wakil Presiden dan menteri sebagaimana dimaksud dalam
              Undang-Undang Dasar Negara Republik Indonesia Tahun 1945. 6.
              Pemerintahan Daerah adalah penyelenggaraan urusan pemerintahan
              oleh Pemerintah Daerah dan dewan perwakilan rakyat daerah menurut
              asas otonomi dan tugas pembantuan dengan prinsip otonomi
              seluas-luasnya dalam sistem dan prinsip Negara Kesatuan Republik
              Indonesia sebagaimana dimaksud dalam Undang-Undang Dasar Negara
              Republik Indonesia Tahun 1945. 7. Pemerintah Daerah adalah kepala
              daerah sebagai unsur penyelenggara Pemerintahan Daerah yang
              memimpin pelaksanaan urusan pemerintahan yang menjadi kewenangan
              daerah otonom. 8. Pelaku Usaha adalah orang perseorangan atau
              badan usaha yang melakukan usaha dan/atau kegiatan pada bidang
              tertentu. REPUBLIK INDONESIA -4- 9. Badan Usaha adalah badan usaha
              berbentuk badan hukum atau tidak berbentuk badan hukum yang
              didirikan di wilayah Negara Kesatuan Republik Indonesia dan
              melakukan usaha dan/atau kegiatan pada bidang tertentu. 10.
              Rencana Detail Tata Ruang yang selanjutnya disingkat RDTR adalah
              rencana secara terperinci tentang tata ruang wilayah
              kabupaten/kota yang dilengkapi dengan peraturan zonasi
              kabupaten/kota. 11. Persetujuan Bangunan Gedung adalah perizinan
              yang diberikan kepada pemilik bangunan gedung untuk membangun
              baru, mengubah, memperluas, mengurangi, dan/atau merawat bangunan
              gedung sesuai dengan standar teknis Bangunan Gedung. 12. Hari
              adalah hari kerja sesuai dengan yang ditetapkan oleh Pemerintah
              Pusat.
