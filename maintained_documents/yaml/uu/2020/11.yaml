                                pengendalian pemanfaatan ruang kawasan strategis
                                nasional. (4) Dalam rangka penyelenggaraan
                                penataan ruang, Pemerintah Pusat berwenang
                                menyusun dan menetapkan pedoman bidang penataan
                                ruang. REPUBLIK INDONESIA -20 - (5) Dalam
                                pelaksanaan wewenang sebagaimana dimaksud pada
                                ayat (1), ayat (2), ayat (3), dan ayat (4),
                                Pemerintah Pusat: a. menyebarluaskan informasi
                                yang berkaitan dengan: 1. rencana umum dan
                                rencana rinci tata ruang dalam rangka
                                pelaksanaan penataan ruang wilayah nasional, dan
                                2. pedoman bidang penataan ruang. b. menetapkan
                                standar pelayanan minimal bidang penataan ruang.
                                (6) Ketentuan lebih lanjut mengenai kewenangan
                                penyelenggaraan penataan ruang diatur dalam
                                Peraturan Pemerintah.
