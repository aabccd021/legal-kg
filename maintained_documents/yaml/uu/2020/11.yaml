              - _type: paragraf
                _key: 14
                _judul: Paragraf 14 Keagamaan
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 68
                      isi:
                        _type: amendPoints
                        description:
                          _type: referenceText
                          references: []
                          text: >-
                            Untuk memberikan kemudahan bagi masyarakat terutama
                            Pelaku Usaha dalam mendapatkan Perizinan Berusaha
                            dari sektor keagamaan, beberapa ketentuan dalam
                            Undang- Undang Nomor 8 Tahun 2019 tentang
                            Penyelenggaraan Ibadah Haji dan Umrah (Lembaran
                            Negara Republik Indonesia Tahun 2019 Nomor 75,
                            Tambahan Lembaran Negara Republik Indonesia Nomor
                            6388) diubah sebagai berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ibadah Haji adalah rukun Islam kelima bagi
                                      orang Islam yang mampu untuk melaksanakan
                                      serangkaian ibadah tertentu di Baitullah,
                                      masyair, serta tempat, waktu, dan syarat
                                      tertentu.
                                - _type: numPoint
                                  _key: '2'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Ibadah Umrah adalah berkunjung ke
                                      Baitullah di luar musim haji dengan niat
                                      melaksanakan umrah yang dilanjutkan dengan
                                      melakukan tawaf, sai, dan tahalul.
                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penyelenggaraan Ibadah Haji dan Umrah
                                      adalah kegiatan perencanaan,
                                      pengorganisasian, pelaksanaan, pengawasan,
                                      evaluasi, serta pelaporan Ibadah Haji dan
                                      Ibadah Umrah.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Jemaah Haji adalah warga negara yang
                                      beragama Islam dan telah mendaftarkan diri
                                      untuk menunaikan Ibadah Haji sesuai dengan
                                      persyaratan yang ditetapkan.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Jemaah Haji Reguler adalah Jemaah Haji
                                      yang menjalankan Ibadah Haji yang
                                      diselenggarakan oleh Menteri.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Jemaah Haji Khusus adalah Jemaah Haji yang
                                      menjalankan Ibadah Haji yang
                                      diselenggarakan oleh penyelenggara Ibadah
                                      Haji khusus.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Jemaah Umrah adalah seseorang yang
                                      melaksanakan Ibadah Umrah.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penyelenggaraan Ibadah Haji Reguler adalah
                                      Penyelenggaraan Ibadah Haji yang
                                      dilaksanakan oleh Menteri dengan
                                      pengelolaan, pembiayaan, dan pelayanan
                                      yang bersifat umum.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Petugas Penyelenggara Ibadah Haji yang
                                      selanjutnya disingkat PPIH adalah petugas
                                      yang diangkat dan/atau ditetapkan oleh
                                      Menteri yang bertugas melakukan pembinaan,
                                      pelayanan dan pelindungan, serta
                                      pengendalian dan pengoordinasian
                                      pelaksanaan operasional Ibadah Haji di
                                      dalam negeri dan/atau di Arab Saudi.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penyelenggaraan Ibadah Haji Khusus adalah
                                      Penyelenggaraan Ibadah Haji yang
                                      dilaksanakan oleh penyelenggara Ibadah
                                      Haji khusus dengan pengelolaan,
                                      pembiayaan, dan pelayanan yang bersifat
                                      khusus.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penyelenggara Ibadah Haji Khusus yang
                                      selanjutnya disingkat PIHK adalah badan
                                      hukum yang memiliki Perizinan Berusaha
                                      untuk melaksanakan Ibadah Haji khusus.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Biaya Perjalanan Ibadah Haji yang
                                      selanjutnya disebut Bipih adalah sejumlah
                                      uang yang harus dibayar oleh warga negara
                                      yang akan menunaikan Ibadah Haji.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Biaya Penyelenggaraan Ibadah Haji yang
                                      selanjutnya disingkat BPIH adalah sejumlah
                                      dana yang digunakan untuk operasional
                                      Penyelenggaraan Ibadah Haji.
                                - _type: numPoint
                                  _key: '14'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Nilai Manfaat adalah dana yang diperoleh
                                      dari hasil pengembangan keuangan haji yang
                                      dilakukan melalui penempatan dan/atau
                                      investasi.
                                - _type: numPoint
                                  _key: '15'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Dana Efisiensi adalah dana yang diperoleh
                                      dari hasil efisiensi biaya operasional
                                      penyelenggaraan Ibadah Haji.
                                - _type: numPoint
                                  _key: '16'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Biaya Perjalanan Ibadah Haji Khusus yang
                                      selanjutnya disebut Bipih Khusus adalah
                                      sejumlah uang yang harus dibayar oleh
                                      Jemaah Haji yang akan menunaikan Ibadah
                                      Haji khusus.
                                - _type: numPoint
                                  _key: '17'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Bank Penerima Setoran Biaya Perjalanan
                                      Ibadah Haji yang selanjutnya disingkat BPS
                                      Bipih adalah bank umum syariah dan/atau
                                      unit usaha syariah yang ditunjuk oleh
                                      Badan Pengelola Keuangan Haji.
                                - _type: numPoint
                                  _key: '18'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Setoran Jemaah adalah sejumlah uang yang
                                      diserahkan oleh Jemaah Haji melalui BPS
                                      Bipih.
                                - _type: numPoint
                                  _key: '19'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penyelenggara Perjalanan Ibadah Umrah yang
                                      selanjutnya disingkat PPIU adalah biro
                                      perjalanan wisata yang memiliki Perizinan
                                      Berusaha untuk menyelenggarakan perjalanan
                                      Ibadah Umrah.
                                - _type: numPoint
                                  _key: '20'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Kelompok Bimbingan Ibadah Haji dan Umrah
                                      yang selanjutnya disingkat KBIHU adalah
                                      kelompok yang menyelengarakan bimbingan
                                      Ibadah Haji dan Umrah yang telah memenuhi
                                      Perizinan Berusaha.
