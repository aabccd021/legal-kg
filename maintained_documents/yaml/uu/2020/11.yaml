                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menyelenggarakan pengelolaan pelayanan
                                      sarana dan prasarana kepada Pelaku Usaha,
                                      dan
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
