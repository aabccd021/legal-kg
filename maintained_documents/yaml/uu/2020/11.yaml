                                    _structureType: pasal
                              text: >-
                                1. Ketentuan Pasal 1 angka 9 dan angka 12 diubah
                                sehingga Pasal 1 berbunyi sebagai berikut: Pasal
                                1 Dalam Undang-Undang ini yang dimaksud dengan:
                                1. Laut adalah ruang perairan di muka bumi yang
                                menghubungkan daratan dengan daratan dan
                                bentuk-bentuk alamiah lainnya, yang merupakan
                                kesatuan geografis dan ekologis beserta segenap
                                unsur terkait, dan yang batas dan sistemnya
                                ditentukan oleh peraturan perundang-undangan dan
                                hukum internasional. 2. Kelautan adalah hal yang
                                berhubungan dengan Laut dan/atau kegiatan di
                                wilayah Laut yang meliputi dasar Laut dan tanah
                                di bawahnya, kolom air dan permukaan Laut,
                                termasuk wilayah pesisir dan pulau-pulau kecil.
                                3. Pulau adalah wilayah daratan yang terbentuk
                                secara alamiah yang dikelilingi air dan berada
                                di atas permukaan air pada waktu air pasang.
                                REPUBLIK INDONESIA -59 - 4. Kepulauan adalah
                                suatu gugusan pulau, termasuk bagian pulau dan
                                perairan di antara pulau-pulau tersebut, dan
                                lain-lain wujud alamiah yang hubungannya satu
                                sama lain demikian erat sehingga pulau-pulau,
                                perairan, dan wujud alamiah lainnya itu
                                merupakan satu kesatuan geografi, ekonomi,
                                pertahanan, dan keamanan serta politik yang
                                hakiki atau yang secara historis dianggap
                                sebagai demikian. 5. Negara Kepulauan adalah
                                negara yang seluruhnya terdiri atas satu atau
                                lebih kepulauan dan dapat mencakup pulau-pulau
                                lain. 6. Pembangunan Kelautan adalah pembangunan
                                yang memberi arahan dalam pendayagunaan sumber
                                daya Kelautan untuk mewujudkan pertumbuhan
                                ekonomi, pemerataan kesejahteraan, dan
                                keterpeliharaan daya dukung ekosistem pesisir
                                dan Laut. 7. Sumber Daya Kelautan adalah sumber
                                daya Laut, baik yang dapat diperbaharui maupun
                                yang tidak dapat diperbaharui yang memiliki
                                keunggulan komparatif dan kompetitif serta dapat
                                dipertahankan dalam jangka panjang. 8.
                                Pengelolaan Kelautan adalah penyelenggaraan
                                kegiatan, penyediaan, pengusahaan, dan
                                pemanfaatan Sumber Daya Kelautan serta
                                konservasi Laut. 9. Pengelolaan Ruang Laut
                                adalah perencanaan, pemanfaatan, pengawasan, dan
                                pengendalian ruang Laut yang merupakan bagian
                                integral dari pengelolaan tata ruang. 10.
                                Pelindungan Lingkungan Laut adalah upaya
                                sistematis dan terpadu yang dilakukan untuk
                                melestarikan Sumber Daya Kelautan dan mencegah
                                terjadinya pencemaran dan/atau kerusakan
                                lingkungan di Laut yang meliputi konservasi
                                Laut, pengendalian pencemaran Laut,
                                penanggulangan bencana Kelautan, pencegahan dan
                                penanggulangan pencemaran, serta kerusakan dan
                                bencana. REPUBLIK INDONESIA - 60 - 11.
                                Pencemaran Laut adalah masuk atau dimasukkannya
                                makhluk hidup, zat, energi, dan/atau komponen
                                lain ke dalam lingkungan Laut oleh kegiatan
                                manusia sehingga melampaui baku mutu lingkungan
                                Laut yang telah ditetapkan. 12. Pemerintah Pusat
                                adalah Presiden Republik Indonesia yang memegang
                                kekuasaan pemerintahan negara Republik Indonesia
                                yang dibantu oleh Wakil Presiden dan menteri
                                sebagaimana dimaksud dalam Undang- Undang Dasar
                                Negara Republik Indonesia Tahun 1945. 13.
                                Pemerintah Daerah adalah kepala daerah sebagai
                                unsur penyelenggara Pemerintahan Daerah yang
                                memimpin pelaksanaan urusan pemerintahan yang
                                menjadi kewenangan daerah otonom. 14. Menteri
                                adalah menteri yang menyelenggarakan urusan
                                pemerintahan di bidang Kelautan.
