                                mengangkut tumbuh-tumbuhan dan satwa liar yang
                                tidak dilindungi undang-undang yang berasal dari
                                kawasan hutan tanpa persetujuan pejabat yang
                                berwenang. (3) Ketentuan tentang mengeluarkan,
                                membawa, dan/atau mengangkut tumbuhan dan/atau
                                satwa yang dilindungi diatur sesuai dengan
                                ketentuan peraturan perundang-undangan.
