                                kepada Presiden untuk ditetapkan dengan
                                Keputusan Presiden.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dewan Kawasan sebagaimana dimaksud pada ayat (1)
                                dan ayat (2) bertanggung jawab kepada Dewan
                                Nasional.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Untuk membantu pelaksanaan tugas Dewan Kawasan,
                                dibentuk Sekretariat Dewan Kawasan.
                      description:
                        _type: referenceText
