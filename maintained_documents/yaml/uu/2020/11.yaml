                _key: 103
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Jalan Tol antarkota harus dilengkapi dengan Tempat
                          Istirahat, Pelayanan untuk kepentingan pengguna Jalan
                          Tol, serta menyediakan tempat promosi dan pengembangan
                          Usaha Mikro, Usaha Kecil, dan Usaha Menengah.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengusahaan tempat promosi dan pengembangan Usaha
                          Mikro, Usaha Kecil, dan Usaha Menengah, Tempat
                          Istirahat dan Pelayanan sebagaimana dimaksud pada ayat
                          (1) dilakukan dengan mengalokasikan lahan pada Jalan
                          Tol paling sedikit 306 (tiga puluh persen) dari total
                          luas lahan area komersial untuk Usaha Mikro, Usaha
                          Kecil, dan Usaha Menengah, baik untuk Jalan Tol yang
                          telah beroperasi maupun untuk Jalan Tol yang masih
                          dalam tahap perencanaan dan konstruksi.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          — Penyediaan tempat promosi dan pengembangan Usaha
                          Mikro, Usaha Kecil, dan Usaha Menengah sebagaimana
                          dimaksud pada ayat (2) dilakukan dengan partisipasi
                          Usaha Mikro dan Kecil melalui pola kemitraan.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Penanaman dan pemeliharaan tanaman di Tempat Istirahat
                          dan Pelayanan sebagaimana dimaksud pada ayat (1) dapat
                          dilakukan oleh Usaha Mikro, Usaha Kecil, dan Usaha
                          Menengah.
              - _type: pasal
