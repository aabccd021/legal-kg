                          percobaan atau penjajakan, atau e. pekerjaan yang
                          jenis dan sifat atau kegiatannya bersifat tidak tetap.
                          (2) Perjanjian kerja untuk waktu tertentu tidak dapat
                          diadakan untuk pekerjaan yang bersifat tetap. (3)
                          Perjanjian kerja untuk waktu tertentu yang tidak
                          memenuhi ketentuan sebagaimana dimaksud pada ayat (1)
                          dan ayat (2) demi hukum menjadi perjanjian kerja waktu
                          tidak tertentu. (4) Ketentuan lebih lanjut mengenai
