        - _type: bagian
          _key: 5
          _judul: Bagian Kelima Perseroan Terbatas
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 109
                isi:
                  _type: amendPoints
                  description:
                    _type: referenceText
                    references: []
                    text: >-
                      Beberapa ketentuan dalam Undang-Undang Nomor 40 Tahun 2007
                      tentang Perseroan Terbatas (Lembaran Negara Republik
                      Indonesia Tahun 2007 Nomor 40, Tambahan Lembaran Negara
                      Republik Indonesia Nomor 4756) diubah sebagai berikut:
                  isi:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 1
                      _pasalKey: '1'
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                        isi:
                          - _type: numPoint
                            _key: '1'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Perseroan Terbatas, yang selanjutnya disebut
                                Perseroan, adalah badan hukum yang merupakan
                                persekutuan modal, didirikan berdasarkan
                                perjanjian, melakukan kegiatan usaha dengan
                                modal dasar yang seluruhnya terbagi dalam saham
                                atau Badan Hukum perorangan yang memenuhi
                                kriteria Usaha Mikro dan Kecil sebagaimana
                                diatur dalam peraturan perundang- undangan
                                mengenai Usaha Mikro dan Kecil.
                          - _type: numPoint
                            _key: '2'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Organ Perseroan adalah Rapat Umum Pemegang
                                Saham, Direksi, dan Dewan Komisaris.
                          - _type: numPoint
                            _key: '3'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Tanggung Jawab Sosial dan Lingkungan adalah
                                komitmen Perseroan untuk berperan serta dalam
                                pembangunan ekonomi berkelanjutan guna
                                meningkatkan kualitas kehidupan dan lingkungan
                                yang bermanfaat, baik bagi Perseroan sendiri,
                                komunitas setempat, maupun masyarakat pada
                                umumnya.
                          - _type: numPoint
                            _key: '4'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Rapat Umum Pemegang Saham, yang selanjutnya
                                disebut RUPS, adalah Organ Perseroan yang
                                mempunyai wewenang yang tidak diberikan kepada
                                Direksi atau Dewan Komisaris dalam batas yang
                                ditentukan dalam undang-undang ini dan/atau
                                anggaran dasar.
                          - _type: numPoint
                            _key: '5'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Direksi adalah Organ Perseroan yang berwenang
                                dan bertanggung jawab penuh atas pengurusan
                                Perseroan untuk kepentingan Perseroan, sesuai
                                dengan maksud dan tujuan Perseroan serta
                                mewakili Perseroan, baik di dalam maupun di luar
                                pengadilan sesuai dengan ketentuan anggaran
                                dasar.
                          - _type: numPoint
                            _key: '6'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dewan Komisaris adalah Organ Perseroan yang
                                bertugas melakukan pengawasan secara umum
                                dan/atau khusus sesuai dengan anggaran dasar
                                serta memberi nasihat kepada Direksi.
                          - _type: numPoint
                            _key: '7'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Perseroan Terbuka adalah Perseroan Publik atau
                                Perseroan yang melakukan penawaran umum saham,
                                sesuai dengan ketentuan peraturan perundang-
                                undangan di bidang pasar modal.
                          - _type: numPoint
                            _key: '8'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Perseroan Publik adalah Perseroan yang memenuhi
                                kriteria jumlah pemegang saham dan modal disetor
                                sesuai dengan ketentuan peraturan perundang-
                                undangan di bidang pasar modal.
                          - _type: numPoint
                            _key: '9'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penggabungan adalah perbuatan hukum yang
                                dilakukan oleh satu Perseroan atau lebih untuk
                                menggabungkan diri dengan Perseroan lain yang
                                telah ada yang mengakibatkan aktiva dan pasiva
                                dari Perseroan yang menggabungkan diri beralih
                                karena hukum kepada Perseroan yang menerima
                                penggabungan dan selanjutnya status badan hukum
                                Perseroan yang menggabungkan diri berakhir
                                karena hukum.
                          - _type: numPoint
                            _key: '10'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Peleburan adalah perbuatan hukum yang dilakukan
                                oleh dua Perseroan atau lebih untuk meleburkan
                                diri dengan cara mendirikan satu Perseroan baru
                                yang karena hukum memperoleh aktiva dan pasiva
                                dari Perseroan yang meleburkan diri dan status
                                badan hukum Perseroan yang meleburkan diri
                                berakhir karena hukum.
                          - _type: numPoint
                            _key: '11'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pengambilalihan adalah perbuatan hukum yang
                                dilakukan oleh badan hukum atau orang
                                perseorangan untuk mengambil alih saham
                                Perseroan yang mengakibatkan beralihnya
                                pengendalian atas Perseroan tersebut.
                          - _type: numPoint
                            _key: '12'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemisahan adalah perbuatan hukum yang dilakukan
                                oleh Perseroan untuk memisahkan usaha yang
                                mengakibatkan seluruh aktiva dan pasiva
                                Perseroan beralih karena hukum kepada 2 (dua)
                                Perseroan atau lebih atau sebagian aktiva dan
