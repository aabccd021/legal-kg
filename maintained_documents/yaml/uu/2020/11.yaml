                                Pasal 17B, atau sejak diterbitkannya Surat
                                Keputusan Pengembalian Pendahuluan Kelebihan
                                Pajak sebagaimana dimaksud dalam Pasal 17C atau
                                Pasal 17D, atau sejak diterbitkannya Surat
