                    text: >-
                      Beberapa ketentuan dalam Undang-Undang Nomor 40 Tahun 2007
                      tentang Perseroan Terbatas (Lembaran Negara Republik
                      Indonesia Tahun 2007 Nomor 40, Tambahan Lembaran Negara
                      Republik Indonesia Nomor 4756) diubah sebagai berikut:
                  isi:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 1
                      _pasalKey: '1'
                      isi:
                        _type: referenceText
                        references:
                          - start: 13
                            end: 20
                            node:
                              _key: 1
                              parentDocument: *ref_0
                              _structureType: pasal
                          - start: 71
