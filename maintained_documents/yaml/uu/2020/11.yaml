                        text: >-
                          4. Ketentuan Pasal 13 diubah sehingga berbunyi sebagai
                          berikut: REPUBLIK INDONESIA - 645 - Pasal 13 (1)
                          Pengusaha Kena Pajak wajib membuat Faktur Pajak untuk
                          setiap: a. penyerahan Barang Kena Pajak sebagaimana
                          dimaksud dalam Pasal 4 ayat (1) huruf a atau huruf f
                          dan/atau Pasal 16D, b. penyerahan Jasa Kena Pajak
                          sebagaimana dimaksud dalam Pasal 4 ayat (1) huruf c,
                          c. ekspor Barang Kena Pajak Tidak Berwujud sebagaimana
                          dimaksud dalam Pasal 4 ayat (1) huruf g, dan/atau d.
                          ekspor Jasa Kena Pajak sebagaimana dimaksud dalam
                          Pasal 4 ayat (1) huruf h. (la) Faktur Pajak
                          sebagaimana dimaksud pada ayat (1) harus dibuat pada:
                          a. saat penyerahan Barang Kena Pajak dan/atau
                          penyerahan Jasa Kena Pajak, b. saat penerimaan
                          pembayaran dalam hal penerimaan pembayaran terjadi
                          sebelum penyerahan Barang Kena Pajak dan/atau sebelum
                          penyerahan Jasa Kena Pajak, C. saat penerimaan
                          pembayaran termin dalam hal penyerahan sebagian tahap
                          pekerjaan, atau d. saat lain yang diatur dengan atau
                          berdasarkan Peraturan Menteri Keuangan. (2)
                          Dikecualikan dari ketentuan sebagaimana dimaksud pada
                          ayat (1), Pengusaha Kena Pajak dapat membuat 1 (satu)
                          Faktur Pajak meliputi seluruh penyerahan yang
                          dilakukan kepada pembeli Barang Kena Pajak atau
                          penerima Jasa Kena Pajak yang sama selama 1 (satu)
                          bulan kalender. (2a) Faktur Pajak sebagaimana dimaksud
                          pada ayat (2) harus dibuat paling lama pada akhir
                          bulan penyerahan. REPUBLIK INDONESIA - 646 - (3)
                          Dihapus. (4) Dihapus. (5) Dalam Faktur Pajak harus
                          dicantumkan keterangan tentang penyerahan Barang Kena
                          Pajak dan/atau penyerahan Jasa Kena Pajak yang paling
                          sedikit memuat: a. nama, alamat, dan Nomor Pokok Wajib
                          Pajak yang menyerahkan Barang Kena Pajak atau Jasa
                          Kena Pajak, b. identitas pembeli Barang Kena Pajak
                          atau penerima Jasa Kena Pajak yang meliputi: 1. nama,
                          alamat, dan Nomor Pokok Wajib Pajak atau nomor induk
                          kependudukan atau nomor paspor bagi subjek pajak luar
                          negeri orang pribadi, atau 2. nama dan alamat, dalam
                          hal pembeli Barang Kena Pajak atau penerima Jasa Kena
                          Pajak merupakan subjek pajak luar negeri badan atau
                          bukan merupakan subjek pajak sebagaimana dimaksud
                          dalam Pasal 3 Undang-Undang mengenai Pajak
                          Penghasilan, Cc. jenis barang atau jasa, jumlah Harga
                          Jual atau Penggantian, dan potongan harga, d. Pajak
                          Pertambahan Nilai yang dipungut, e. Pajak Penjualan
                          atas Barang Mewah yang dipungut, f. ' kode, nomor
                          seri, dan tanggal pembuatan Faktur Pajak, dan g. nama
                          dan tanda tangan yang berhak menandatangani Faktur
                          Pajak. REPUBLIK INDONESIA - 647 - (Sa) Pengusaha Kena
                          Pajak pedagang eceran dapat membuat Faktur Pajak tanpa
                          mencantumkan keterangan mengenai identitas pembeli
                          serta nama dan tanda tangan penjual dalam hal
                          melakukan penyerahan Barang Kena Pajak dan/atau Jasa
                          Kena Pajak kepada pembeli dengan karakteristik
                          konsumen akhir yang diatur lebih lanjut dengan
                          Peraturan Menteri Keuangan. (6) Direktur Jenderal
                          Pajak dapat menetapkan dokumen tertentu yang
                          kedudukannya dipersamakan dengan Faktur Pajak. (7)
                          Dihapus. (8) Ketentuan lebih lanjut mengenai tata cara
                          pembuatan Faktur Pajak dan tata cara pembetulan atau
                          penggantian Faktur Pajak diatur dengan atau
                          berdasarkan Peraturan Menteri Keuangan. (9) Faktur
                          Pajak harus memenuhi persyaratan formal dan material.
