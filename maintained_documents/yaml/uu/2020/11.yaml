                        description:
                          _type: referenceText
                          references: []
                          text: >-
                            Beberapa ketentuan dalam Undang-Undang Nomor 28
                            Tahun 2002 tentang Bangunan Gedung (Lembaran Negara
                            Republik Indonesia Tahun 2002 Nomor 134, Tambahan
                            Lembaran Negara Republik Indonesia Nomor 4247)
                            diubah sebagai berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Bangunan gedung adalah wujud fisik hasil
                                      pekerjaan konstruksi yang menyatu dengan
                                      tempat kedudukannya, sebagian atau
                                      seluruhnya berada di atas dan/atau di
                                      dalam tanah dan/atau air, yang berfungsi
                                      sebagai tempat manusia melakukan
                                      kegiatannya, baik untuk hunian atau tempat
                                      tinggal, kegiatan keagamaan, kegiatan
                                      usaha, kegiatan sosial, budaya, maupun
                                      kegiatan khusus.
                                - _type: numPoint
                                  _key: '2'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Penyelenggaraan bangunan gedung adalah
                                      kegiatan pembangunan yang meliputi
                                      perencanaan teknis dan pelaksanaan
                                      konstruksi, serta kegiatan pemanfaatan,
                                      pelestarian, dan pembongkaran.
                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemanfaatan bangunan gedung adalah
                                      kegiatan memanfaatkan bangunan gedung
                                      sesuai dengan fungsi yang telah
                                      ditetapkan, termasuk kegiatan
                                      pemeliharaan, perawatan, dan pemeriksaan
                                      secara berkala.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemeliharaan adalah kegiatan menjaga
                                      keandalan bangunan gedung beserta
                                      prasarana dan sarananya agar selalu laik
                                      fungsi.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Perawatan adalah kegiatan memperbaiki
                                      dan/atau mengganti bagian bangunan gedung,
                                      komponen, bahan bangunan, dan/atau
                                      prasarana dan sarana agar bangunan gedung
                                      tetap laik fungsi.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemeriksaan berkala adalah kegiatan
                                      pemeriksaan keandalan seluruh atau
                                      sebagian bangunan gedung, komponen, bahan
                                      bangunan, dan/atau prasarana dan sarananya
                                      dalam tenggang waktu tertentu guna
                                      menyatakan kelaikan fungsi bangunan
                                      gedung.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pelestarian adalah kegiatan perawatan,
                                      pemugaran, serta pemeliharaan bangunan
                                      gedung dan lingkungannya untuk
                                      mengembalikan keandalan bangunan tersebut
                                      sesuai dengan aslinya atau sesuai dengan
                                      keadaan menurut periode yang dikehendaki.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pembongkaran adalah kegiatan membongkar
                                      atau merobohkan seluruh atau sebagian
                                      bangunan gedung, komponen, bahan bangunan,
                                      dan/atau prasarana dan sarananya.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemilik bangunan gedung adalah orang,
                                      badan hukum, kelompok orang, atau
                                      perkumpulan, yang menurut hukum sah
                                      sebagai pemilik bangunan gedung.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengguna bangunan gedung adalah pemilik
                                      bangunan gedung dan/atau bukan pemilik
                                      bangunan gedung berdasarkan kesepakatan
                                      dengan pemilik bangunan gedung, yang
                                      menggunakan dan/atau mengelola bangunan
                                      gedung atau bagian bangunan gedung sesuai
                                      dengan fungsi yang ditetapkan.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengkaji Teknis adalah orang perseorangan
                                      atau badan usaha, baik yang berbadan hukum
                                      maupun tidak berbadan hukum, yang
                                      mempunyai sertifikat kompetensi kerja
                                      kualifikasi ahli atau sertifikat badan
                                      usaha untuk melaksanakan pengkajian teknis
                                      atas kelaikan fungsi Bangunan Gedung.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Masyarakat adalah perseorangan, kelompok,
                                      badan hukum atau usaha, dan lembaga atau
                                      organisasi yang kegiatannya di bidang
                                      bangunan gedung, termasuk masyarakat hukum
                                      adat dan masyarakat ahli, yang
                                      berkepentingan dengan penyelenggaraan
                                      bangunan gedung.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Prasarana dan sarana bangunan gedung
                                      adalah fasilitas kelengkapan di dalam dan
                                      di luar bangunan gedung yang mendukung
                                      pemenuhan terselenggaranya fungsi bangunan
                                      gedung.
                                - _type: numPoint
                                  _key: '14'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Pusat adalah Presiden Republik
                                      Indonesia yang memegang kekuasaan
                                      pemerintahan negara Republik Indonesia
                                      yang dibantu oleh Wakil Presiden dan
                                      menteri sebagaimana dimaksud dalam Undang-
                                      Undang Dasar Negara Republik Indonesia
                                      Tahun 1945.
                                - _type: numPoint
                                  _key: '15'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Daerah adalah kepala daerah
                                      sebagai unsur penyelenggara Pemerintahan
                                      Daerah yang memimpin pelaksanaan urusan
                                      pemerintahan yang menjadi kewenangan
                                      daerah otonom.
                                - _type: numPoint
                                  _key: '16'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
