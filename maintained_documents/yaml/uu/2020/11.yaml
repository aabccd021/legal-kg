                                Pemerintah Pusat dan Pemerintah Daerah
                                memberikan fasilitasi dan/atau kemudahan kepada
                                penyelenggara telekomunikasi untuk melakukan
                                pembangunan infrastruktur telekomunikasi secara
                                transparan, akuntabel, dan efisien. (2) Dalam
                                penyelenggaraan telekomunikasi, Pemerintah Pusat
                                dan Pemerintah Daerah dapat berperan serta untuk
                                menyediakan fasilitas bersama infrastruktur
                                pasif telekomunikasi untuk digunakan oleh
                                penyelenggara telekomunikasi secara bersama
                                dengan biaya terjangkau. (3) Ketentuan lebih
                                lanjut mengenai peran Pemerintah Pusat dan
                                Pemerintah Daerah sebagaimana dimaksud pada ayat
                                (1) dan ayat (2) diatur dalam Peraturan
                                Pemerintah. Pasal 34B (1) Pelaku Usaha yang
                                memiliki infrastruktur pasif yang dapat
                                digunakan untuk keperluan telekomunikasi wajib
                                membuka akses pemanfaatan infrastruktur pasif
                                dimaksud kepada penyelenggara telekomunikasi.
                                (2) Pelaku Usaha yang memiliki infrastruktur
                                selain sebagaimana dimaksud pada ayat (1) di
                                bidang telekomunikasi dan/atau penyiaran dapat
                                membuka akses pemanfaatan infrastruktur dimaksud
                                kepada penyelenggara telekomunikasi dan/atau
                                penyelenggara penyiaran. REPUBLIK INDONESIA -
                                512 - (3) Pemanfaatan infrastruktur pasif
                                sebagaimana dimaksud pada ayat (1) dilakukan
                                berdasarkan kerja sama para pihak secara adil,
                                wajar, dan non- diskriminatif. (4) Pemanfaatan
                                infrastruktur sebagaimana dimaksud pada ayat (2)
                                dilakukan berdasarkan kerja sama para pihak. (5)
                                Ketentuan lebih lanjut mengenai pemanfaatan
                                infrastruktur sebagaimana dimaksud pada ayat
                                (1), ayat (2), ayat (3), dan ayat (4) diatur
                                dalam Peraturan Pemerintah.
