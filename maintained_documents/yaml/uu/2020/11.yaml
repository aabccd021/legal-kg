                        text: >-
                          1. Ketentuan Pasal 1 angka 6 diubah sehingga Pasal 1
                          berbunyi sebagai berikut: Pasal 1 Dalam Undang-Undang
                          ini yang dimaksud dengan: 1. Desa adalah desa dan desa
                          adat atau yang disebut dengan nama lain, selanjutnya
                          disebut Desa, adalah kesatuan masyarakat hukum yang
                          memiliki batas wilayah yang berwenang untuk mengatur
                          dan mengurus urusan pemerintahan, kepentingan
                          masyarakat setempat berdasarkan prakarsa masyarakat,
                          hak asal usul, dan/atau hak tradisional yang diakui
                          dan dihormati dalam sistem pemerintahan Negara
                          Kesatuan Republik Indonesia. 2. Pemerintahan Desa
                          adalah penyelenggaraan urusan pemerintahan dan
                          kepentingan masyarakat setempat dalam sistem
                          pemerintahan Negara Kesatuan Republik Indonesia. 3.
                          Pemerintah Desa adalah Kepala Desa atau yang disebut
                          dengan nama lain yang dibantu perangkat Desa sebagai
                          unsur penyelenggara Pemerintahan Desa. 4. Badan
                          Permusyawaratan Desa atau yang disebut dengan nama
                          lain adalah lembaga yang melaksanakan fungsi
                          pemerintahan yang anggotanya merupakan wakil dari
                          penduduk Desa berdasarkan keterwakilan wilayah dan
                          ditetapkan secara demokratis. S0 REPUBLIK INDONESIA -
                          682 - 5. Musyawarah Desa atau yang disebut dengan nama
                          lain adalah musyawarah antara Badan Permusyawaratan
                          Desa, Pemerintah Desa, dan unsur masyarakat yang
                          diselenggarakan oleh Badan Permusyawaratan Desa untuk
                          menyepakati hal yang bersifat strategis. 6. Badan
                          Usaha Milik Desa, yang selanjutnya disebut BUM Desa,
                          adalah Badan Hukum yang didirikan oleh desa dan/atau
                          bersama desa-desa guna mengelola usaha, memanfaatkan
                          aset, mengembangkan investasi dan produktivitas,
                          menyediakan jasa pelayanan, dan/atau menyediakan jenis
                          usaha lainnya untuk sebesar- besarnya kesejahteraan
                          masyarakat Desa. 7. Peraturan Desa adalah peraturan
                          perundang- undangan yang ditetapkan oleh Kepala Desa
                          setelah dibahas dan disepakati bersama Badan
                          Permusyawaratan Desa. 8. Pembangunan Desa adalah upaya
                          peningkatan kualitas hidup dan kehidupan untuk
                          sebesar- besarnya kesejahteraan masyarakat Desa. 9.
                          Kawasan Perdesaan adalah kawasan yang mempunyai
                          kegiatan utama pertanian, termasuk pengelolaan sumber
                          daya alam dengan susunan fungsi kawasan sebagai tempat
                          permukiman perdesaan, pelayanan jasa pemerintahan,
                          pelayanan sosial, dan kegiatan ekonomi. 10. Keuangan
                          Desa adalah semua hak dan kewajiban Desa yang dapat
                          dinilai dengan uang serta segala sesuatu berupa uang
                          dan barang yang berhubungan dengan pelaksanaan hak dan
                          kewajiban Desa. 11. Aset Desa adalah barang milik Desa
                          yang berasal dari kekayaan asli Desa, dibeli atau
                          diperoleh atas beban Anggaran Pendapatan dan Belanja
                          Desa atau perolehan hak lainnya yang sah. REPUBLIK
                          INDONESIA - 683 - 12. Pemberdayaan Masyarakat Desa
                          adalah upaya mengembangkan kemandirian dan
                          kesejahteraan masyarakat dengan meningkatkan
                          pengetahuan, sikap, keterampilan, perilaku, kemampuan,
                          kesadaran, serta memanfaatkan sumber daya melalui
                          penetapan kebijakan, program, kegiatan, dan
                          pendampingan yang sesuai dengan esensi masalah dan
                          prioritas kebutuhan masyarakat Desa. 13. Pemerintah
                          Pusat selanjutnya disebut Pemerintah adalah Presiden
                          Republik Indonesia yang memegang kekuasaan
                          pemerintahan negara Republik Indonesia sebagaimana
                          dimaksud dalam Undang-Undang Dasar Negara Republik
                          Indonesia Tahun 1945. 14. Pemerintahan Daerah adalah
                          Pemerintah Daerah dan Dewan Perwakilan Rakyat Daerah
                          yang menyelenggarakan urusan pemerintahan menurut asas
                          otonomi dan tugas pembantuan dengan prinsip otonomi
                          seluas-luasnya dalam sistem dan prinsip Negara
                          Kesatuan Republik Indonesia sebagaimana dimaksud dalam
                          Undang-Undang Dasar Negara Republik Indonesia Tahun
                          1945. 15. Pemerintah Daerah adalah kepala daerah
                          sebagai unsur penyelenggara Pemerintahan Daerah yang
                          memimpin pelaksanaan urusan pemerintahan yang menjadi
                          kewenangan daerah otonom. 16. Menteri adalah menteri
                          yang menangani Desa.
