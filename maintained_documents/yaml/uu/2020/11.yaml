                        text: >-
                          1. Ketentuan Pasal 2 diubah sehingga berbunyi sebagai
                          berikut: Pasal 2 (1) Yang menjadi subjek pajak adalah:
                          a. 1. orang pribadi, dan 2. warisan yang belum terbagi
                          sebagai satu kesatuan menggantikan yang berhak, b.
                          badan: dan c. bentuk usaha tetap. (la) Bentuk usaha
                          tetap merupakan subjek pajak yang perlakuan
                          perpajakannya dipersamakan dengan subjek pajak badan.
                          (2) Subjek pajak dibedakan menjadi subjek pajak dalam
                          negeri dan subjek pajak luar negeri. (3) — Subjek
                          pajak dalam negeri adalah: a. orang pribadi, baik yang
                          merupakan Warga Negara Indonesia maupun warga negara
                          asing yang: 1. bertempat tinggal di Indonesia, 2.
                          berada di Indonesia lebih dari 183 (seratus delapan
                          puluh tiga) hari dalam jangka waktu 12 (dua belas)
                          bulan: atau REPUBLIK INDONESIA - 618 - 3. dalam suatu
                          tahun pajak berada di Indonesia dan mempunyai niat
                          untuk bertempat tinggal di Indonesia, b. badan yang
                          didirikan atau bertempat kedudukan di Indonesia,
                          kecuali unit tertentu dari badan pemerintah yang
                          memenuhi kriteria: 1. pembentukannya berdasarkan
                          ketentuan peraturan perundang-undangan, 2.
                          pembiayaannya bersumber dari Anggaran Pendapatan dan
                          Belanja Negara atau Anggaran Pendapatan dan Belanja
                          Daerah, 3. penerimaannya dimasukkan dalam anggaran
                          Pemerintah Pusat atau Pemerintah Daerah, dan 4.
                          pembukuannya diperiksa oleh aparat pengawasan
                          fungsional negara, dan C. warisan yang belum terbagi
                          sebagai satu kesatuan menggantikan yang berhak. (4)
                          Subjek pajak luar negeri adalah: a. orang pribadi yang
                          tidak bertempat tinggal di Indonesia: b. warga negara
                          asing yang berada di Indonesia tidak lebih dari 183
                          (seratus delapan puluh tiga) hari dalam jangka waktu
                          12 (dua belas) bulan, Cc. Warga Negara Indonesia yang
                          berada di luar Indonesia lebih dari 183 (seratus
                          delapan puluh tiga) hari dalam jangka waktu 12 (dua
                          belas) bulan serta memenuhi persyaratan: 1. tempat
                          tinggal, 2. pusat kegiatan utama, 3. tempat
                          menjalankan kebiasan, 4. status subjek pajak: dan/atau
                          5. persyaratan tertentu lainnya yang ketentuan lebih
                          lanjut mengenai persyaratan tersebut diatur dalam
                          Peraturan Menteri Keuangan, dan REPUBLIK INDONESIA -
                          619 - d. badan yang tidak didirikan dan tidak
                          bertempat kedudukan di Indonesia yang menjalankan
                          usaha atau melakukan kegiatan melalui bentuk usaha
                          tetap di Indonesia atau yang dapat menerima atau
                          memperoleh penghasilan dari Indonesia tidak dari
                          menjalankan usaha atau melakukan kegiatan melalui
                          bentuk usaha tetap di Indonesia. (5) Bentuk usaha
                          tetap adalah bentuk usaha yang dipergunakan oleh orang
                          pribadi sebagaimana dimaksud pada ayat (4) huruf a,
                          huruf b, dan huruf c, dan badan sebagaimana dimaksud
                          pada ayat (4) huruf d untuk menjalankan usaha atau
                          melakukan kegiatan di Indonesia yang dapat berupa: a.
                          tempat kedudukan manajemen, b. cabang perusahaan, Cc.
                          kantor perwakilan, d. gedung kantor, e. pabrik, f. '
                          bengkel: g. gudang, h. ruang untuk promosi dan
                          penjualan, i. pertambangan dan penggalian sumber alam,
                          j-. wilayah kerja pertambangan minyak dan gas bumi, k.
                          perikanan, peternakan, pertanian, perkebunan, atau
                          kehutanan, Il. proyek konstruksi, instalasi, atau
                          proyek perakitan, m. pemberian jasa dalam bentuk apa
                          pun oleh pegawai atau orang lain sepanjang dilakukan
                          lebih dari 60 (enam puluh) hari dalam jangka waktu 12
                          (dua belas) bulan, n. orang atau badan yang bertindak
                          selaku agen yang kedudukannya tidak bebas, REPUBLIK
                          INDONESIA - 620 - O. agen atau pegawai dari perusahan
                          asuransi yang tidak didirikan dan tidak bertempat
                          kedudukan di Indonesia yang menerima premi asuransi
                          atau menanggung risiko di Indonesia, dan p. komputer,
                          agen elektronik, atau peralatan otomatis yang
                          dimiliki, disewa, atau digunakan oleh penyelenggara
                          transaksi elektronik untuk menjalankan kegiatan usaha
                          melalui internet. (6) Tempat tinggal orang pribadi
                          atau tempat kedudukan badan ditetapkan oleh Direktur
                          Jenderal Pajak menurut keadaan yang sebenarnya.
