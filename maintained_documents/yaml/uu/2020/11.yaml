                              text: >-
                                Fasilitas sebagaimana dimaksud pada ayat (4)
                                termasuk juga pembebasan cukai sesuai dengan
                                ketentuan perundang-undangan di bidang cukai.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemasukan dan pengeluaran barang ke dan dari
                                Kawasan Sabang ke Daerah Pabean diberlakukan
                                tata laksana kepabeanan di bidang impor dan
                                ekspor dan ketentuan di bidang cukai.
                          - _type: ayat
                            _key: 7
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemasukan barang konsumsi dari luar Daerah
                                Pabean untuk kebutuhan penduduk di Kawasan
                                Sabang diberikan pembebasan bea masuk, pajak
                                pertambahan nilai, dan pajak penjualan atas
                                barang mewah. (8 Jumlah dan jenis barang yang
                                diberi fasilitas sebagaimana dimaksud pada ayat
                                (7) ditetapkan oleh Badan Pengusahaan Kawasan
                                Sabang.
  - _type: bab
    _key: 10
    _judul: INVESTASI PEMERINTAH PUSAT DAN KEMUDAHAN PROYEK STRATEGIS NASIONAL
    isi:
      _type: bagians
      bagians:
        - _type: bagian
          _key: 1
          _judul: Bagian Kesatu Investasi Pemerintah Pusat
          isi:
            _type: paragrafs
            paragrafs:
              - _type: paragraf
                _key: 1
                _judul: Paragraf 1 Umum
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 154
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Investasi Pemerintah Pusat dilakukan dalam
                                rangka meningkatkan investasi dan penguatan
                                perekonomian untuk mendukung kebijakan strategis
                                penciptaan kerja.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Maksud dan tujuan investasi Pemerintah Pusat
                                  sebagaimana dimaksud pada ayat (1) meliputi:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      memperoleh manfaat ekonomi, manfaat
                                      sosial, dan/atau manfaat lainnya yang
                                      ditetapkan sebelumnya,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      memberikan sumbangan bagi perkembangan
                                      perekonomian nasional pada umumnya dan
                                      penerimaan negara pada khususnya,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: . memperoleh keuntungan, dan/atau
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menyelenggarakan kemanfaatan umum, tetapi
                                      tidak terbatas pada penciptaan lapangan
                                      kerja.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Investasi Pemerintah Pusat sebagaimana
                                  dimaksud pada ayat (1) dilaksanakan oleh:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Menteri Keuangan selaku Bendahara Umum
                                      Negara sesuai dengan ketentuan peraturan
                                      perundang- undangan yang mengatur mengenai
                                      investasi Pemerintah Pusat, dan/atau
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      lembaga yang diberikan kewenangan khusus
                                      (sui generis) dalam rangka pengelolaan
                                      investasi, yang selanjutnya disebut
                                      Lembaga.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Menteri Keuangan selaku Bendahara Umum Negara
                                  dan Lembaga dalam melaksanakan investasi
                                  sebagaimana dimaksud pada ayat (3) berwenang
                                  untuk:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      melakukan penempatan dana dalam bentuk
                                      instrumen keuangan,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: melakukan kegiatan pengelolaan aset,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      melakukan kerja sama dengan pihak lain
                                      termasuk entitas dana perwalian (trust
                                      fund),
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: 'menentukan calon mitra investasi:'
                                - _type: alphaPoint
                                  _key: e
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: memberikan dan menerima pinjaman, dan/atau
                                - _type: alphaPoint
                                  _key: f
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: ''' menatausahakan aset yang dimilikinya.'
                    - _type: pasal
                      _key: 155
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam melaksanakan investasi sebagaimana
                                dimaksud dalam Pasal 154 ayat (3) huruf a,
                                Menteri Keuangan dapat menetapkan dan/atau
                                menunjuk badan layanan umum, badan usaha milik
                                negara, dan/atau badan hukum lainnya.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Menteri Keuangan membentuk Rekening Investasi
                                Bendahara Umum Negara untuk menampung dana
                                investasi Pemerintah Pusat.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dana yang ditampung dalam Rekening Investasi
                                Bendahara Umum Negara sebagaimana dimaksud pada
                                ayat (2) dapat digunakan kembali secara langsung
                                untuk mendapatkan manfaat ekonomi, manfaat
                                sosial, dan/atau manfaat lainnya.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Tata kelola investasi Pemerintah Pusat oleh
                                Menteri Keuangan selaku Bendahara Umum Negara
                                sepanjang tidak diatur secara khusus berdasarkan
                                Undang-Undang ini dilaksanakan sesuai dengan
                                ketentuan peraturan perundang-undangan.
                    - _type: pasal
                      _key: 156
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam melaksanakan investasi sebagaimana
                                dimaksud dalam Pasal 154 ayat (3) huruf b,
                                Pemerintah Pusat membentuk Lembaga.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Lembaga sebagaimana dimaksud pada ayat (1)
                                merupakan badan hukum Indonesia yang sepenuhnya
                                dimiliki oleh Pemerintah Indonesia.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Lembaga sebagaimana dimaksud pada ayat (1)
                                bertanggung jawab kepada Presiden.
                    - _type: pasal
                      _key: 157
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Investasi Pemerintah Pusat yang dilakukan oleh
                                Lembaga sebagaimana dimaksud dalam Pasal 154
                                ayat (3) huruf b dapat bersumber dari aset
                                negara, aset badan usaha milik negara, dan/atau
                                sumber lain yang sah.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Aset negara dan aset badan usaha milik negara
                                yang dijadikan investasi Pemerintah Pusat pada
                                Lembaga sebagaimana dimaksud pada ayat (1)
                                dipindahtangankan menjadi aset Lembaga yang
                                selanjutnya menjadi milik dan tanggung jawab
                                Lembaga.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Aset negara dan aset badan usaha milik negara
                                yang dijadikan investasi Pemerintah Pusat pada
                                Lembaga, dengan persetujuan Lembaga dapat
                                dipindahtangankan secara langsung kepada
                                perusahaan patungan yang dibentuk oleh Lembaga.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemindahtanganan aset sebagaimana dimaksud pada
                                ayat (2) dan ayat (3) dilakukan dengan cara jual
                                beli, dijadikan penyertaan modal, atau cara lain
                                sesuai dengan ketentuan peraturan
                                perundang-undangan.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Aset negara yang dipindahtangankan menjadi aset
                                Lembaga sebagaimana dimaksud pada ayat (2) atau
                                menjadi aset perusahaan patungan yang dibentuk
                                oleh Lembaga sebagaimana dimaksud pada ayat (3)
                                tidak dalam sengketa dan tidak terdapat
                                kepemilikan atas hak istimewa pihak manapun.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Aset badan usaha milik negara yang
                                dipindahtangankan menjadi aset Lembaga
                                sebagaimana dimaksud pada ayat (2) atau menjadi
                                aset perusahaan patungan yang dibentuk oleh
                                Lembaga sebagaimana dimaksud pada ayat (3) tidak
                                dalam sengketa, tidak sedang dilakukan sita
                                pidana atau perdata, dan tidak terdapat
                                kepemilikan atas hak istimewa pihak manapun
                                kecuali disepakati oleh pemilik hak.
                          - _type: ayat
                            _key: 7
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan mengenai pemindahtanganan aset badan
                                usaha milik negara kepada Lembaga sebagaimana
                                dimaksud pada ayat (2) atau kepada perusahaan
                                patungan yang dibentuk oleh Lembaga sebagaimana
                                dimaksud pada ayat (3) ditetapkan dalam Rapat
                                Umum Pemegang Saham (RUPS) untuk Perusahaan
                                Perseroan (Persero) atau ditetapkan oleh menteri
                                yang menyelenggarakan urusan pemerintahan di
                                bidang badan usaha milik negara untuk Perusahaan
                                Umum (Perum).
                          - _type: ayat
                            _key: 8
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan lebih lanjut mengenai pemindahtanganan
                                aset negara kepada Lembaga sebagaimana dimaksud
                                pada ayat (2) atau kepada perusahaan patungan
                                yang dibentuk oleh Lembaga sebagaimana dimaksud
                                pada ayat (3) diatur dalam Peraturan Pemerintah.
                    - _type: pasal
                      _key: 158
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Modal Lembaga sebagaimana dimaksud dalam Pasal
                                154 ayat (3) huruf b berasal dari penyertaan
                                modal negara dan/atau sumber lainnya.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Setiap perubahan penyertaan modal negara pada
                                Lembaga, baik berupa pengurangan maupun
                                penambahan modal yang berasal dari sumber
                                sebagaimana dimaksud pada ayat (1) ditetapkan
                                dengan Peraturan Pemerintah.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Lembaga dapat melaksanakan investasi, baik
                                secara langsung maupun tidak langsung, melakukan
                                kerja sama dengan pihak ketiga, atau melalui
                                pembentukan entitas khusus yang berbentuk badan
                                hukum Indonesia atau badan hukum asing.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Keuntungan atau kerugian yang dialami Lembaga
                                dalam melaksanakan investasi sebagaimana
                                dimaksud pada ayat (3) merupakan keuntungan atau
                                kerugian Lembaga.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal Lembaga mengalami keuntungan
                                sebagaimana dimaksud pada ayat (4), sebagian
                                keuntungan ditetapkan sebagai laba bagian
                                Pemerintah Pusat untuk disetorkan ke kas negara,
                                setelah dilakukan pencadangan untuk menutup/
                                menanggung risiko kerugian dalam berinvestasi
                                dan/atau melakukan akumulasi modal.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penyertaan modal sebagaimana dimaksud pada ayat
                                (1) dan ayat (2) yang menjadi kekayaan Lembaga
                                dicatat dalam Laporan Keuangan Pemerintah Pusat.
                          - _type: ayat
                            _key: 7
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan lebih lanjut mengenai pencadangan
                                untuk menutup/ menanggung risiko kerugian dalam
                                berinvestasi dan/atau melakukan akumulasi modal
                                sebagaimana dimaksud pada ayat (5) diatur dengan
                                atau berdasarkan Peraturan Pemerintah.
                    - _type: pasal
                      _key: 159
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Untuk meningkatkan nilai aset, Lembaga dapat
                                melakukan pengelolaan aset melalui kerja sama
                                dengan pihak ketiga.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Kerja sama dengan pihak ketiga sebagaimana
                                  dimaksud pada ayat (1) dilaksanakan oleh
                                  Lembaga melalui:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: 'kuasa kelola:'
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: pembentukan perusahaan patungan, dan/atau
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: bentuk kerja sama lainnya.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal kerja sama dilakukan melalui
                                pembentukan perusahaan patungan sebagaimana
                                dimaksud pada ayat (2) huruf b, aset Lembaga
                                dapat dipindahtangankan untuk dijadikan
                                penyertaan modal dalam perusahaan patungan.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penyertaan modal sebagaimana dimaksud pada ayat
                                (3) dilakukan sesuai dengan ketentuan peraturan
                                perundang-undangan.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Aset yang dijadikan penyertaan modal
                                  sebagaimana dimaksud pada ayat (3) tidak boleh
                                  berada dalam keadaan:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: sengketa,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      disita, baik sita pidana maupun sita
                                      perdata,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      . terdapat kepemilikan atas hak istimewa
                                      pihak manapun, kecuali disepakati oleh
                                      pemilik hak, dan/atau
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      sedang dalam pengikatan sebagai jaminan
                                      utang, kecuali disepakati oleh kreditur.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan lebih lanjut mengenai tata cara
                                pengelolaan aset Lembaga diatur dengan atau
                                berdasarkan Peraturan Pemerintah.
                    - _type: pasal
                      _key: 160
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Aset Lembaga dapat berasal dari:'
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      penyertaan modal sebagaimana dimaksud
                                      dalam Pasal 158 ayat (1):
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      hasil pengembangan usaha dan pengembangan
                                      aset Lembaga,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      pemindahtanganan aset negara atau aset
                                      badan usaha milik negara,
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: hibah, dan/atau
                                - _type: alphaPoint
                                  _key: e
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: sumber lain yang sah.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Aset Lembaga dapat dijaminkan dalam rangka
                                penarikan pinjaman.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pihak manapun dilarang melakukan penyitaan aset
                                Lembaga, kecuali atas aset yang telah dijaminkan
                                dalam rangka pinjaman.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pengelolaan aset Lembaga sepenuhnya dilakukan
                                oleh organ Lembaga berdasarkan prinsip tata
                                kelola yang baik, akuntabel, dan transparan.
                    - _type: pasal
                      _key: 161
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pemeriksaan pengelolaan dan tanggung jawab keuangan
                          Lembaga dilakukan oleh akuntan publik yang terdaftar
                          pada Badan Pemeriksa Keuangan dan Otoritas Jasa
                          Keuangan.
                    - _type: pasal
                      _key: 162
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Organ dan pegawai Lembaga bukan merupakan
                                penyelengara negara, kecuali yang berasal dari
                                pejabat negara yang bersifat ex-officio.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Lembaga menetapkan sistem kepegawaian, sistem
                                penggajian, penghargaan, program pensiun dan
                                tunjangan hari tua, serta penghasilan lainnya
                                bagi pegawai Lembaga.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Lembaga tidak dapat dipailitkan, kecuali dapat
                                dibuktikan dalam kondisi insolven.
                    - _type: pasal
                      _key: 163
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Menteri Keuangan, pejabat Kementerian Keuangan, dan
                            organ dan pegawai Lembaga, tidak dapat dimintai
                            pertanggungjawaban hukum atas kerugian investasi
                            jika dapat membuktikan:
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                kerugian tersebut bukan karena kesalahan atau
                                kelalaiannya,
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                telah melakukan pengurusan dengan iktikad baik
                                dan kehati-hatian sesuai dengan maksud dan
                                tujuan investasi dan tata kelola,
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                tidak memiliki benturan kepentingan, baik
                                langsung maupun tidak langsung atas tindakan
                                pengelolaan investasi, dan
                          - _type: alphaPoint
                            _key: d
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                tidak memperoleh keuntungan pribadi secara tidak
                                sah.
                    - _type: pasal
                      _key: 164
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan lebih lanjut mengenai tata kelola
                                Lembaga diatur dengan atau berdasarkan Peraturan
                                Pemerintah.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Sepanjang diatur dalam Undang-Undang ini,
                                ketentuan peraturan perundang-undangan yang
                                mengatur mengenai pengelolaan keuangan negara,
                                kekayaan negara, dan/atau badan usaha milik
                                negara tidak berlaku bagi Lembaga.
              - _type: paragraf
                _key: 2
                _judul: Paragraf 2 Lembaga Pengelola Investasi
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 165
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam rangka pengelolaan investasi sebagaimana
                                dimaksud dalam Pasal 154 ayat (3) huruf b, untuk
                                pertama kali berdasarkan Undang-Undang ini
                                dibentuk Lembaga Pengelola Investasi.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pembentukan Lembaga Pengelola Investasi
                                dimaksudkan untuk meningkatkan dan
                                mengoptimalisasi nilai aset secara jangka
                                panjang dalam rangka mendukung pembangunan
                                secara berkelanjutan.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Organ Lembaga Pengelola Investasi terdiri
                                  atas:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: Dewan Pengawas, dan
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: Dewan Direktur.
                    - _type: pasal
                      _key: 166
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Dewan Pengawas sebagaimana dimaksud dalam
                                  Pasal 165 ayat (3) huruf a terdiri atas:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Menteri yang menyelenggarakan urusan
                                      pemerintahan di bidang keuangan negara
                                      sebagai ketua merangkap anggota,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Menteri yang menyelenggarakan urusan
                                      pemerintahan di bidang badan usaha milik
                                      negara sebagai anggota, dan
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      3 (tiga) orang yang berasal dari unsur
                                      profesional sebagai anggota.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Anggota Dewan Pengawas sebagaimana dimaksud pada
                                ayat (1) diangkat dan diberhentikan oleh
                                Presiden.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Untuk memilih anggota Dewan Pengawas dari unsur
                                profesional sebagaimana dimaksud pada ayat (1)
                                huruf c, Presiden membentuk panitia seleksi.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Panitia seleksi melakukan:'
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      pengumuman penerimaan dan pendaftaran
                                      calon,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: proses seleksi, dan
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: penyampaian nama calon kepada Presiden.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penyampaian nama calon kepada Presiden dilakukan
                                dalam jangka waktu paling lama 3 (tiga) bulan
                                sejak pembentukan panitia seleksi.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Presiden menyampaikan nama calon untuk
                                dikonsultasikan kepada Dewan Perwakilan Rakyat
                                Republik Indonesia dalam jangka waktu paling
                                lama 10 (sepuluh) hari kerja terhitung sejak
                                diterimanya daftar nama calon dari panitia
                                seleksi.
                          - _type: ayat
                            _key: 7
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dewan Perwakilan Rakyat Republik Indonesia
                                menyelenggarakan sesi konsultasi dengan Presiden
                                paling lama 10 (sepuluh) hari kerja terhitung
                                sejak diterimanya daftar nama calon dari
                                Presiden.
                          - _type: ayat
                            _key: 8
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Presiden menetapkan dan mengangkat anggota Dewan
                                Pengawas dari unsur profesional dalam jangka
                                waktu paling lama 14 (empat belas) hari kerja
                                terhitung sejak konsultasi sebagaimana dimaksud
                                pada ayat (7) selesai dilaksanakan.
                          - _type: ayat
                            _key: 9
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal sesi konsultasi tidak terlaksana
                                sesuai jangka waktu yang ditentukan sebagaimana
                                dimaksud pada ayat (7), Presiden menetapkan dan
                                mengangkat anggota Dewan Pengawas dari unsur
                                profesional dalam jangka waktu paling lama 14
                                (empat belas) hari kerja sebagaimana dimaksud
                                pada ayat (8).
                          - _type: ayat
                            _key: 10
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan lebih lanjut mengenai seleksi anggota
                                Dewan Pengawas dari unsur profesional diatur
                                dalam Peraturan Pemerintah.
                          - _type: ayat
                            _key: 11
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Sesama anggota Dewan Pengawas dilarang saling
                                memiliki hubungan keluarga sampai derajat kedua
                                atau besan dengan sesama anggota Dewan Pengawas
                                dan/atau dengan anggota Dewan Direktur.
                          - _type: ayat
                            _key: 12
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Anggota Dewan Pengawas dari unsur profesional
                                diangkat untuk masa jabatan 5 (lima) tahun dan
                                hanya dapat diangkat kembali untuk 1 (satu) kali
                                masa jabatan berikutnya.
                          - _type: ayat
                            _key: 13
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Dalam rangka pengangkatan anggota Dewan
                                  Pengawas dari unsur profesional untuk pertama
                                  kali, Presiden menetapkan masa jabatan 3
                                  (tiga) anggota Dewan Pengawas sebagai berikut:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      1 (satu) anggota diangkat untuk masa
                                      jabatan 5 (lima) tahun,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      1 (satu) anggota diangkat untuk masa
                                      jabatan 4 (empat) tahun, dan
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      1 (satu) anggota diangkat untuk masa
                                      jabatan 3 (tiga) tahun.
                          - _type: ayat
                            _key: 14
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dewan Pengawas sebagaimana dimaksud pada ayat
                                (1) bertugas melakukan pengawasan atas
                                penyelenggaraan Lembaga Pengelola Investasi oleh
                                Dewan Direktur.
                          - _type: ayat
                            _key: 15
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Dalam melaksanakan tugas sebagaimana dimaksud
                                  pada ayat (14) Dewan Pengawas berwenang:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menyetujui rencana kerja dan anggaran
                                      tahunan beserta indikator kinerja utama
                                      (key performance indicator) yang diusulkan
                                      Dewan Direktur,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      melakukan evaluasi pencapaian indikator
                                      kinerja utama (key performance indicator),
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      . menerima dan mengevaluasi laporan
                                      pertanggungjawaban dari Dewan Direktur,
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menyampaikan laporan pertanggungjawaban
                                      Dewan Pengawas dan Dewan Direktur kepada
                                      Presiden,
                                - _type: alphaPoint
                                  _key: e
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menetapkan dan mengangkat anggota Dewan
                                      Penasihat,
                                - _type: alphaPoint
                                  _key: f
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      ' mengangkat dan memberhentikan Dewan
                                      Direktur:
                                - _type: alphaPoint
                                  _key: g
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menetapkan remunerasi Dewan Pengawas dan
                                      Dewan Direktur,
                                - _type: alphaPoint
                                  _key: h
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      mengusulkan peningkatan dan/atau
                                      pengurangan modal Lembaga kepada Presiden,
                                - _type: alphaPoint
                                  _key: i
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menyetujui laporan keuangan tahunan
                                      Lembaga,
                                - _type: alphaPoint
                                  _key: j
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      memberhentikan sementara satu atau lebih
                                      anggota Dewan Direktur dan menunjuk
                                      pengganti sementara untuk Dewan Direktur:
                                      dan
                                - _type: alphaPoint
                                  _key: k
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: menyetujui penunjukan auditor Lembaga.
                          - _type: ayat
                            _key: 16
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Untuk membantu Dewan Pengawas dalam melaksanakan
                                tugas dan wewenangnya, Dewan Pengawas dapat
                                membentuk komite.
                    - _type: pasal
                      _key: 167
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dewan Direktur sebagaimana dimaksud dalam Pasal
                                165 ayat (3) huruf b berjumlah 5 (lima) orang
                                dari unsur profesional.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Anggota Dewan Direktur sebagaimana dimaksud pada
                                ayat (1) diangkat dan diberhentikan oleh Dewan
                                Pengawas.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Sesama anggota Dewan Direktur dilarang saling
                                memiliki hubungan keluarga sampai derajat kedua
                                atau besan dengan sesama anggota Dewan Direktur
