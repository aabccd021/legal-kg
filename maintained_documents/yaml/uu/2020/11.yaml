                                bangunan gedung mempunyai hak: a. mendapatkan
                                pengesahan dari Pemerintah Pusat atas rencana
                                teknis bangunan gedung yang telah memenuhi
                                persyaratan: b. melaksanakan pembangunan
                                bangunan gedung sesuai dengan persetujuan yang
                                telah ditetapkan oleh Pemerintah Pusat: REPUBLIK
