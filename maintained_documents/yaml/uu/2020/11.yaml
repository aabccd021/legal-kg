                              text: >-
                                11. Ketentuan Pasal 20 diubah sehingga berbunyi
                                sebagai berikut: REPUBLIK INDONESIA -25 - Pasal
                                20 (1) Rencana Tata Ruang Wilayah Nasional
                                memuat: a. tujuan, kebijakan, dan strategi
                                penataan ruang wilayah nasional, b. rencana
                                struktur ruang wilayah nasional yang meliputi
                                sistem perkotaan nasional yang terkait dengan
                                kawasan perdesaan dalam wilayah pelayanannya dan
                                sistem jaringan prasarana utama, Cc. rencana
                                pola ruang wilayah nasional yang meliputi
                                kawasan lindung nasional dan kawasan budi daya
                                yang memiliki nilai strategis nasional, d.
                                penetapan kawasan strategis nasional, e. arahan
                                pemanfaatan ruang yang berisi indikasi program
                                utama jangka menengah lima tahunan, dan f.
                                arahan pengendalian pemanfaatan ruang wilayah
                                nasional yang berisi indikasi arahan zonasi
                                sistem nasional, arahan Kesesuaian Kegiatan
                                Pemanfaatan Ruang, arahan insentif dan
                                disinsentif, serta arahan sanksi. (2) Rencana
                                Tata Ruang Wilayah Nasional menjadi pedoman
                                untuk: a. penyusunan rencana pembangunan jangka
                                panjang nasional, b. penyusunan rencana
                                pembangunan jangka menengah nasional, Cc.
                                pemanfaatan ruang dan pengendalian pemanfaatan
                                ruang di wilayah nasional, d. pewujudan
                                keterpaduan, keterkaitan, dan keseimbangan
                                perkembangan antarwilayah provinsi, serta
                                keserasian antarsektor, e. penetapan lokasi dan
                                fungsi ruang untuk investasi: f. ' penataan
                                ruang kawasan strategis nasional, dan g.
                                penataan ruang wilayah provinsi dan
                                kabupaten/kota. REPUBLIK INDONESIA - 26 - (3)
                                Jangka waktu Rencana Tata Ruang Wilayah Nasional
                                adalah 20 (dua puluh) tahun. (4) Rencana Tata
                                Ruang Wilayah Nasional ditinjau kembali 1 (satu)
                                kali dalam setiap periode 5 (lima) tahunan. (5)
                                Peninjauan kembali rencana tata ruang dapat
                                dilakukan lebih dari 1 (satu) kali dalam periode
                                5 (lima) tahun apabila terjadi perubahan
                                lingkungan strategis berupa: a. bencana alam
                                skala besar yang ditetapkan dengan peraturan
                                perundang-undangan: b. perubahan batas
                                teritorial negara yang ditetapkan dengan
                                Undang-Undang, C. perubahan batas wilayah daerah
                                yang ditetapkan dengan Undang-Undang, dan d.
                                perubahan kebijakan nasional yang bersifat
                                strategis. (6) Rencana Tata Ruang Wilayah
                                Nasional ditetapkan dengan Peraturan Pemerintah.
