                                pada penetapan lokasi atau persetujuan
                                kesesuaian Kegiatan Pemanfaatan Ruang. REPUBLIK
                                INDONESIA - 317 - (3) Dalam hal tanah yang
                                langsung dikuasai negara sebagaimana dimaksud
                                pada ayat (1) terdapat garapan masyarakat, hak
                                atas tanah diberikan setelah pelaku pembangunan
                                perumahan dan permukiman selaku pemohon hak atas
                                tanah menyelesaikan ganti rugi atas seluruh
                                garapan masyarakat berdasarkan kesepakatan. (4)
                                Dalam hal tidak ada kesepakatan tentang ganti
                                rugi sebagaimana dimaksud pada ayat (3),
                                penyelesaiannya dilaksanakan sesuai dengan
                                ketentuan peraturan perundang-undangan.
