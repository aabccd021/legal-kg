                              text: >-
                                2. Ketentuan Pasal 6 diubah sehingga berbunyi
                                sebagai berikut: Pasal 6 (1) Penataan ruang
                                diselenggarakan dengan memperhatikan: a. kondisi
                                fisik wilayah Negara Kesatuan Republik Indonesia
                                yang rentan terhadap bencana, b. potensi sumber
                                daya alam, sumber daya manusia, dan sumber daya
                                buatan, kondisi ekonomi, sosial, budaya,
                                politik, hukum, pertahanan keamanan, dan
                                lingkungan hidup serta ilmu pengetahuan dan
                                teknologi sebagai satu kesatuan, dan C.
                                geostrategi, geopolitik, dan geoekonomi. (2)
                                Penataan ruang wilayah nasional, penataan ruang
                                wilayah provinsi, dan penataan ruang wilayah
                                kabupaten/kota dilakukan secara berjenjang dan
                                komplementer. REPUBLIK INDONESIA 18 - (3)
                                Penataan ruang wilayah secara berjenjang
                                sebagaimana dimaksud pada ayat (2) dilakukan
                                dengan cara rencana tata ruang wilayah nasional
                                dijadikan acuan dalam penyusunan rencana tata
                                ruang wilayah provinsi dan kabupaten/kota, dan
                                rencana tata ruang wilayah provinsi menjadi
                                acuan bagi penyusunan rencana tata ruang
                                kabupaten/kota. (4) Penataan ruang wilayah
                                secara komplementer sebagaimana dimaksud pada
                                ayat (2) merupakan penataan ruang wilayah
                                nasional, penataan ruang wilayah provinsi, dan
                                penataan ruang wilayah kabupaten/kota yang
                                disusun saling melengkapi satu sama lain dan
                                bersinergi sehingga tidak terjadi tumpang tindih
                                pengaturan rencana tata ruang. (5) Penataan
                                ruang wilayah nasional meliputi ruang wilayah
                                yurisdiksi dan wilayah kedaulatan nasional yang
                                mencakup ruang darat, ruang laut, dan ruang
                                udara, termasuk ruang di dalam bumi sebagai satu
                                kesatuan. (6) Penataan ruang wilayah provinsi
                                dan kabupaten/kota meliputi ruang darat, ruang
                                laut, dan ruang udara, termasuk ruang di dalam
                                bumi sebagai satu kesatuan. (7) Pengelolaan
                                sumber daya ruang laut dan ruang udara diatur
                                dengan Undang-Undang tersendiri. (8) Dalam hal
                                terjadi ketidaksesuaian antara pola ruang
                                rencana tata ruang dan kawasan hutan, izin
                                dan/atau hak atas tanah, penyelesaian
                                ketidaksesuaian tersebut diatur dalam Peraturan
                                Pemerintah.
