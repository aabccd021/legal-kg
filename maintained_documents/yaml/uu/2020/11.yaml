                  text: >-
                    2. Ketentuan Pasal 66 diubah sehingga berbunyi sebagai
                    berikut: Pasal 66 (1) Pemerintah Pusat dapat memberikan
                    penugasan khusus kepada BUMN untuk menyelenggarakan fungsi
                    kemanfaatan umum serta riset dan inovasi nasional. (2)
                    Penugasan khusus kepada BUMN sebagaimana dimaksud pada ayat
                    (1) dilakukan dengan tetap memperhatikan maksud dan tujuan,
                    kegiatan usaha BUMN, serta mempertimbangkan kemampuan BUMN.
                    (3) Rencana penugasan khusus sebagaimana dimaksud pada ayat
                    (1) dikaji bersama antara BUMN yang bersangkutan dengan
                    Pemerintah Pusat. (4) Apabila penugasan tersebut secara
                    finansial tidak fisibel, Pemerintah Pusat harus memberikan
                    kompensasi atas semua biaya yang telah dikeluarkan oleh BUMN
                    tersebut, termasuk margin yang diharapkan sepanjang dalam
                    tingkat kewajaran sesuai dengan penugasan yang diberikan.
                    (5) Penugasan kepada BUMN sebagaimana dimaksud pada ayat (1)
                    harus terlebih dahulu mendapatkan persetujuan RUPS atau
                    Menteri. (6) BUMN dalam melaksanakan penugasan khusus
                    sebagaimana dimaksud pada ayat (1) dapat bekerja sama
                    dengan: REPUBLIK INDONESIA - 689 - a. badan usaha milik
                    swasta, b. badan usaha milik daerah, c. koperasi, d. BUMN,
                    e. lembaga penelitian dan pengembangan, f. lembaga
                    pengkajian dan penerapan, dan/atau g. perguruan tinggi.
