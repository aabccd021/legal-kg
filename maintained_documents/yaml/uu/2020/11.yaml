      pasals:
        - _type: pasal
          _key: 177
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah Pusat wajib melakukan pengawasan dan pembinaan
                    terhadap setiap pelaksanaan Perizinan Berusaha yang
                    dilakukan oleh pemegang Perizinan Berusaha.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 63
                      end: 71
                      node:
                        _key: 1
                        parentPasal: &ref_109
                          _key: 177
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Pelaksanaan pengawasan dan pembinaan sebagaimana dimaksud
                    pada ayat (1) dilakukan oleh Aparatur Sipil Negara sesuai
                    dengan kewenangannya.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 98
                      end: 106
                      node:
                        _key: 2
                        parentPasal: *ref_109
                        _structureType: ayat
                  text: >-
                    Aparatur Sipil Negara dalam melaksanakan tugas pengawasan
                    dan pembinaan sebagaimana dimaksud pada ayat (2) dapat
                    bekerja sama dengan profesi bersertifikat sesuai dengan
                    bidang pengawasan dan pembinaan yang dilakukan.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references:
                    - start: 247
                      end: 255
                      node:
                        _key: 1
                        parentPasal: *ref_109
                        _structureType: ayat
                  text: >-
                    Dalam hal Aparatur Sipil Negara dan profesi bersertifikat
                    dalam melaksanakan tugasnya menemukan pelanggaran terhadap
                    ketentuan yang tertuang dalam setiap Perizinan Berusaha yang
                    dilakukan oleh pemegang Perizinan Berusaha sebagaimana
                    dimaksud pada ayat (1), Aparatur Sipil Negara sesuai dengan
                    kewenangannya dapat memberikan sanksi administratif kepada
                    pemegang Perizinan Berusaha. REPUBLIK INDONESIA - 765 -
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references:
                    - start: 47
                      end: 55
                      node:
                        _key: 4
                        parentPasal: *ref_109
                        _structureType: ayat
                  text: >-
                    Sanksi administratif sebagaimana dimaksud pada ayat (4)
                    dapat berupa: a. peringatan, b. penghentian sementara
                    kegiatan berusaha, Cc. pengenaan denda administratif, d.
                    pengenaan daya paksa polisional, e. pencabutan Lisensi /
                    Sertifikasi/ Persetujuan, dan/atau f. pencabutan Perizinan
                    Berusaha.
              - _type: ayat
                _key: 6
                isi:
                  _type: referenceText
                  references:
                    - start: 169
                      end: 177
                      node:
                        _key: 4
                        parentPasal: *ref_109
                        _structureType: ayat
                    - start: 99
                      end: 107
                      node:
                        _key: 1
                        parentPasal: *ref_109
                        _structureType: ayat
                  text: >-
                    Kewenangan Pemerintah Pusat dalam melaksanakan pengawasan.
                    dan pembinaan sebagaimana dimaksud pada ayat (1) dan
                    pengenaan sanksi administratif sebagaimana dimaksud pada
                    ayat (4) dapat dilimpahkan kepada Pemerintah Daerah sesuai
                    dengan ketentuan peraturan perundang-undangan.
              - _type: ayat
                _key: 7
