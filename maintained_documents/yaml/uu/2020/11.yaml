                              text: >-
                                8. Ketentuan Pasal 26 diubah sehingga berbunyi
                                sebagai berikut: Pasal 26 (1) Eksportir
                                Narkotika wajib memberikan Surat Persetujuan
                                Ekspor Narkotika yang diterbitkan oleh
                                Pemerintah Pusat dan dokumen atau Surat
                                Persetujuan Impor Narkotika yang sah sesuai
                                dengan ketentuan peraturan perundang-undangan di
                                negara pengimpor kepada orang yang bertanggung
                                jawab atas perusahaan pengangkutan ekspor. (2)
                                Orang yang bertanggung jawab atas perusahaan
                                pengangkutan ekspor wajib memberikan Surat
                                Persetujuan Ekspor Narkotika yang diterbitkan
                                oleh Pemerintah Pusat dan dokumen atau Surat
                                Persetujuan Impor Narkotika yang sah sesuai
                                dengan ketentuan peraturan perundang-undangan di
                                negara pengimpor kepada penanggung jawab
                                pengangkut. (3) Penanggung jawab pengangkut
                                Ekspor Narkotika wajib membawa dan bertanggung
                                jawab atas kelengkapan Surat Persetujuan Ekspor
                                Narkotika yang diterbitkan oleh Pemerintah Pusat
                                dan dokumen atau Surat Persetujuan Impor
                                Narkotika yang sah sesuai dengan. ketentuan
                                peraturan perundang-undangan di negara
                                pengimpor.
