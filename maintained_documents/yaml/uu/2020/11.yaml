                        text: >-
                          3. Ketentuan Pasal 9 diubah sehingga berbunyi sebagai
                          berikut: Pasal 9 (1) Dihapus. (2) Pajak Masukan dalam
                          suatu Masa Pajak dikreditkan dengan Pajak Keluaran
                          dalam Masa Pajak yang sama. (2a) Bagi Pengusaha Kena
                          Pajak yang belum melakukan penyerahan Barang Kena
                          Pajak dan/atau Jasa Kena Pajak dan/atau ekspor Barang
                          Kena Pajak dan/atau Jasa Kena Pajak, Pajak Masukan
                          atas perolehan Barang Kena Pajak dan/atau Jasa Kena
                          Pajak, impor Barang Kena Pajak, serta pemanfaatan
                          Barang Kena Pajak Tidak Berwujud dan/atau pemanfaatan
                          Jasa Kena Pajak dari luar Daerah Pabean di dalam
                          Daerah Pabean dapat dikreditkan sepanjang memenuhi
                          ketentuan pengkreditan sesuai dengan Undang-Undang
                          ini. (2b) Pajak Masukan yang dikreditkan harus
                          menggunakan Faktur Pajak yang memenuhi persyaratan
                          sebagaimana dimaksud dalam Pasal 13 ayat (S5) dan ayat
                          (9). REPUBLIK INDONESIA - 637 - (3) Apabila dalam
                          suatu Masa Pajak, Pajak Keluaran lebih besar daripada
                          Pajak Masukan, selisihnya merupakan Pajak Pertambahan
                          Nilai yang harus disetor oleh Pengusaha Kena Pajak.
                          (4) Apabila dalam suatu Masa Pajak, Pajak Masukan yang
                          dapat dikreditkan lebih besar daripada Pajak Keluaran,
                          selisihnya merupakan kelebihan pajak yang
                          dikompensasikan ke Masa Pajak berikutnya. (4a) Atas
                          kelebihan Pajak Masukan sebagaimana dimaksud pada ayat
                          (4) dapat diajukan permohonan pengembalian pada akhir
                          tahun buku. (4b) Dikecualikan dari ketentuan
                          sebagaimana dimaksud pada ayat (4) dan ayat (Ya), atas
                          kelebihan Pajak Masukan dapat diajukan permohonan
                          pengembalian pada setiap Masa Pajak oleh: a. Pengusaha
                          Kena Pajak yang melakukan ekspor Barang Kena Pajak
                          Berwujud, b. Pengusaha Kena Pajak yang melakukan
                          penyerahan Barang Kena Pajak dan/atau penyerahan Jasa
                          Kena Pajak kepada Pemungut Pajak Pertambahan Nilai, c.
                          Pengusaha Kena Pajak yang melakukan penyerahan Barang
                          Kena Pajak dan/atau penyerahan Jasa Kena Pajak yang
                          Pajak Pertambahan Nilainya tidak dipungut, d.
                          Pengusaha Kena Pajak yang melakukan ekspor Barang Kena
                          Pajak Tidak Berwujud, e. Pengusaha Kena Pajak yang
                          melakukan ekspor Jasa Kena Pajak, dan/atau f. Dihapus.
                          (4c) Pengembalian ... REPUBLIK INDONESIA - 638 - (4c)
                          Pengembalian kelebihan Pajak Masukan kepada Pengusaha
                          Kena Pajak sebagaimana dimaksud pada ayat (4b) huruf a
                          sampai dengan huruf e, yang mempunyai kriteria sebagai
                          Pengusaha Kena Pajak berisiko rendah, dilakukan dengan
                          pengembalian pendahuluan kelebihan pajak sesuai
                          ketentuan sebagaimana dimaksud dalam Pasal 17C ayat
                          (1) Undang-Undang Nomor 6 Tahun 1983 tentang Ketentuan
                          Umum dan Tata Cara Perpajakan dan perubahannya. (4d)
                          Ketentuan mengenai Pengusaha Kena Pajak berisiko
                          rendah yang diberikan pengembalian pendahuluan
                          kelebihan pajak sebagaimana dimaksud pada ayat (4c)
                          diatur dengan Peraturan Menteri Keuangan. (4e)
                          Direktur Jenderal Pajak dapat melakukan pemeriksaan
                          terhadap Pengusaha Kena Pajak sebagaimana dimaksud
                          pada ayat (4c) dan menerbitkan surat ketetapan pajak
                          setelah melakukan pengembalian pendahuluan kelebihan
                          pajak. (4f) Apabila berdasarkan hasil pemeriksaan
                          sebagaimana dimaksud pada ayat (4e), Direktur Jenderal
                          Pajak menerbitkan Surat Ketetapan Pajak Kurang Bayar,
                          jumlah kekurangan pajak ditambah dengan sanksi
                          administrasi berupa bunga sebagaimana dimaksud dalam
                          Pasal 13 ayat (2) Undang-Undang Nomor 6 Tahun 1983
                          tentang Ketentuan Umum dan Tata Cara Perpajakan dan
                          perubahannya. (S5) Apabila dalam suatu Masa Pajak
                          Pengusaha Kena Pajak selain melakukan penyerahan yang
                          terutang pajak juga melakukan penyerahan yang tidak
                          terutang pajak, sepanjang bagian penyerahan yang
                          terutang pajak dapat diketahui dengan pasti dari
                          pembukuannya, jumlah Pajak Masukan yang dapat
                          dikreditkan adalah Pajak Masukan yang berkenaan dengan
                          penyerahan yang terutang pajak. REPUBLIK INDONESIA -
                          639 - (6) Apabila dalam suatu Masa Pajak Pengusaha
                          Kena Pajak selain melakukan penyerahan yang terutang
                          pajak juga melakukan penyerahan yang tidak terutang
                          pajak, sedangkan Pajak Masukan untuk penyerahan yang
                          terutang pajak tidak dapat diketahui dengan pasti,
                          jumlah Pajak Masukan yang dapat dikreditkan untuk
                          penyerahan yang terutang pajak dihitung dengan
                          menggunakan pedoman yang diatur dengan Peraturan
                          Menteri Keuangan. (6a) Apabila sampai dengan jangka
                          waktu 3 (tiga) tahun sejak Masa Pajak pengkreditan
                          pertama kali Pajak Masukan sebagaimana dimaksud pada
                          ayat (2a) Pengusaha Kena Pajak belum melakukan
                          penyerahan Barang Kena Pajak dan/atau Jasa Kena Pajak
                          dan/atau ekspor Barang Kena Pajak dan/atau Jasa Kena
                          Pajak terkait dengan Pajak Masukan tersebut, Pajak
                          Masukan yang telah dikreditkan dalam jangka waktu 3
                          (tiga) tahun tersebut menjadi tidak dapat dikreditkan.
                          (6b) Dihapus. (6c) Jangka waktu sebagaimana dimaksud
                          pada ayat (Sa) bagi sektor usaha tertentu dapat
                          ditetapkan lebih dari 3 (tiga) tahun. (6d) Ketentuan
                          sebagaimana dimaksud pada ayat (6a) berlaku juga bagi
                          Pengusaha Kena Pajak yang melakukan pembubaran
                          (pengakhiran) usaha, melakukan pencabutan Pengusaha
                          Kena Pajak, atau dilakukan pencabutan Pengusaha Kena
                          Pajak secara jabatan dalam jangka waktu 3 (tiga) tahun
                          sejak Masa Pajak pengkreditan pertama kali Pajak
                          Masukan. (S&e) Pajak Masukan yang tidak dapat
                          dikreditkan sebagaimana dimaksud pada ayat (6a): a.
                          wajib dibayar kembali ke kas negara oleh Pengusaha
                          Kena Pajak, dalam hal Pengusaha Kena Pajak: REPUBLIK
                          INDONESIA - 640 - 1. telah menerima pengembalian
                          kelebihan pembayaran pajak atas Pajak Masukan
                          dimaksud, dan/atau 2. telah mengkreditkan Pajak
                          Masukan dimaksud dengan Pajak Keluaran yang terutang
                          dalam suatu Masa Pajak, dan/atau b. tidak dapat
                          dikompensasikan ke Masa Pajak berikutnya dan tidak
                          dapat diajukan permohonan pengembalian, setelah jangka
                          waktu 3 (tiga) tahun sebagaimana dimaksud pada ayat
                          (6a) berakhir atau pada saat pembubaran (pengakhiran)
                          usaha, atau pencabutan Pengusaha Kena Pajak
                          sebagaimana dimaksud pada ayat (6d) oleh Pengusaha
                          Kena Pajak, dalam hal Pengusaha Kena Pajak melakukan
                          kompensasi atas kelebihan pembayaran pajak dimaksud.
                          (6f) Pembayaran kembali Pajak Masukan sebagaimana
                          dimaksud pada ayat (6e) huruf a dilakukan paling
                          lambat: a. akhir bulan berikutnya setelah tanggal
                          berakhirnya jangka waktu 3 (tiga) tahun sebagaimana
                          dimaksud pada ayat (6a), b. akhir bulan berikutnya
                          setelah tanggal berakhirnya jangka waktu bagi sektor
                          usaha tertentu sebagaimana dimaksud pada ayat (6c),
                          atau c. akhir bulan berikutnya setelah tanggal
                          pembubaran (pengakhiran) usaha atau pencabutan
                          Pengusaha Kena Pajak sebagaimana dimaksud pada ayat
                          (Ed). (6g) Dalam... REPUBLIK INDONESIA - 641 - (6g)
                          Dalam hal Pengusaha Kena Pajak tidak melaksanakan
                          kewajiban pembayaran kembali sesuai dengan jangka
                          waktu sebagaimana dimaksud pada ayat (Ef), Direktur
                          Jenderal Pajak menerbitkan Surat Ketetapan Pajak
                          Kurang Bayar atas jumlah pajak yang seharusnya dibayar
                          kembali sebagaimana dimaksud pada ayat (6e) huruf a
                          oleh Pengusaha Kena Pajak ditambah sanksi administrasi
                          berupa bunga sebagaimana dimaksud dalam Pasal 13 ayat
                          (2a) Undang- Undang Nomor 6 Tahun 1983 tentang
                          Ketentuan Umum dan Tata Cara Perpajakan dan
                          perubahannya. (7) Besarnya Pajak Masukan yang dapat
                          dikreditkan oleh Pengusaha Kena Pajak yang peredaran
                          usahanya dalam 1 (satu) tahun tidak melebihi jumlah
                          tertentu, kecuali Pengusaha Kena Pajak sebagaimana
                          dimaksud pada ayat (7a) dapat dihitung dengan
                          menggunakan pedoman penghitungan pengkreditan Pajak
                          Masukan. (7a) Besarnya Pajak Masukan yang dapat
                          dikreditkan oleh Pengusaha Kena Pajak yang melakukan
                          kegiatan usaha tertentu dihitung dengan menggunakan
                          pedoman penghitungan pengkreditan Pajak Masukan. (7b)
                          Ketentuan mengenai peredaran usaha sebagaimana
                          dimaksud pada ayat (7), kegiatan usaha tertentu
                          sebagaimana dimaksud pada ayat (7a), dan pedoman
                          penghitungan pengkreditan Pajak Masukan sebagaimana
                          dimaksud pada ayat (7) dan ayat (7a) diatur dengan
                          atau berdasarkan Peraturan Menteri Keuangan. (8)
                          Pengkreditan Pajak Masukan sebagaimana dimaksud pada
                          ayat (2) tidak dapat diberlakukan bagi pengeluaran
                          untuk: a. dihapus, REPUBLIK INDONESIA . 642 - b.
                          perolehan Barang Kena Pajak atau Jasa Kena Pajak yang
                          tidak mempunyai hubungan langsung dengan kegiatan
                          usaha, Cc. perolehan dan pemeliharaan kendaraan
                          bermotor berupa sedan dan station wagon, kecuali
                          merupakan barang dagangan atau disewakan: d. dihapus,
                          e. dihapus, f. ' perolehan Barang Kena Pajak atau Jasa
                          Kena Pajak yang Faktur Pajaknya tidak memenuhi
                          ketentuan sebagaimana dimaksud dalam Pasal 13 ayat (5)
                          atau ayat (9) atau tidak mencantumkan nama, alamat,
                          dan Nomor Pokok Wajib Pajak pembeli Barang Kena Pajak
                          atau penerima Jasa Kena Pajak, g. pemanfaatan Barang
                          Kena Pajak Tidak Berwujud atau pemanfaatan Jasa Kena
                          Pajak dari luar Daerah Pabean yang Faktur Pajaknya
                          tidak memenuhi ketentuan sebagaimana dimaksud dalam
                          Pasal 13 ayat (6), h. dihapus, i. dihapus, dan j.
                          dihapus. (9) Pajak Masukan yang dapat dikreditkan
                          tetapi belum dikreditkan dengan Pajak Keluaran pada
                          Masa Pajak yang sama dapat dikreditkan pada Masa Pajak
                          berikutnya paling lama 3 (tiga) Masa Pajak setelah
                          berakhirnya Masa Pajak saat Faktur Pajak dibuat
                          sepanjang belum dibebankan sebagai biaya atau belum
                          ditambahkan (dikapitalisasi) dalam harga perolehan
                          Barang Kena Pajak atau Jasa Kena Pajak serta memenuhi
                          ketentuan pengkreditan sesuai dengan Undang-Undang
                          ini. REPUBLIK INDONESIA - 643 - (9a) Pajak Masukan
                          atas perolehan Barang Kena Pajak dan/atau Jasa Kena
                          Pajak, impor Barang Kena Pajak serta pemanfaatan
                          Barang Kena Pajak Tidak Berwujud dan/atau pemanfaatan
                          Jasa Kena Pajak dari luar Daerah Pabean di dalam
                          Daerah Pabean sebelum Pengusaha dikukuhkan sebagai
                          Pengusaha Kena Pajak, dapat dikreditkan oleh Pengusaha
                          Kena Pajak dengan menggunakan pedoman pengkreditan
                          Pajak Masukan sebesar 800 (delapan puluh persen) dari
                          Pajak Keluaran yang seharusnya dipungut. (9b) Pajak
                          Masukan atas perolehan Barang Kena Pajak dan/atau Jasa
                          Kena Pajak, impor Barang Kena Pajak, serta pemanfaatan
                          Barang Kena Pajak Tidak Berwujud dan/atau pemanfaatan
                          Jasa Kena Pajak dari luar Daerah Pabean di dalam
                          Daerah Pabean yang tidak dilaporkan dalam Surat
                          Pemberitahuan Masa Pajak Pertambahan Nilai yang
                          diberitahukan dan/atau ditemukan pada waktu dilakukan
                          pemeriksaan dapat dikreditkan oleh Pengusaha Kena
                          Pajak sepanjang memenuhi ketentuan pengkreditan sesuai
                          dengan Undang- Undang ini. (9c) Pajak Masukan atas
                          perolehan Barang Kena Pajak dan/atau Jasa Kena Pajak,
                          impor Barang Kena Pajak, serta pemanfaatan Barang Kena
                          Pajak Tidak Berwujud dan/atau pemanfaatan Jasa Kena
                          Pajak dari luar Daerah Pabean di dalam Daerah Pabean
                          yang ditagih dengan penerbitan ketetapan pajak dapat
                          dikreditkan oleh Pengusaha Kena Pajak sebesar jumlah
                          pokok Pajak Pertambahan Nilai yang tercantum dalam
                          ketetapan pajak dengan ketentuan ketetapan pajak
                          dimaksud telah dilakukan pelunasan dan tidak dilakukan
                          upaya hukum serta memenuhi ketentuan pengkreditan
                          sesuai dengan Undang- Undang ini. (10) Dihapus. (11)
                          Dihapus. (12) Dihapus. REPUBLIK INDONESIA - 644 - (13)
                          Ketentuan lebih lanjut mengenai: a. kriteria belum
                          melakukan penyerahan Barang Kena Pajak dan/atau Jasa
                          Kena Pajak dan/atau ekspor Barang Kena Pajak dan/atau
                          Jasa Kena Pajak sebagaimana dimaksud pada ayat (2a),
                          b. penghitungan dan tata cara pengembalian kelebihan
                          Pajak Masukan sebagaimana dimaksud pada ayat (Ya),
                          ayat (4b), dan ayat (4), C. penentuan sektor usaha
                          tertentu sebagaimana dimaksud pada ayat (6c), d. tata
                          cara pembayaran kembali Pajak Masukan sebagaimana
                          dimaksud pada ayat (6e) huruf a, dan e. tata cara
                          pengkreditan Pajak Masukan sebagaimana dimaksud pada
                          ayat (9a), ayat (9b), dan ayat (9c) diatur dengan atau
                          berdasarkan Peraturan Menteri Keuangan. (14) Dalam hal
                          terjadi pengalihan Barang Kena Pajak dalam rangka
                          penggabungan, peleburan, pemekaran, pemecahan, dan
                          pengambilalihan usaha, Pajak Masukan atas Barang Kena
                          Pajak yang dialihkan yang belum dikreditkan oleh
                          Pengusaha Kena Pajak yang mengalihkan dapat
                          dikreditkan oleh Pengusaha Kena Pajak yang menerima
                          pengalihan sepanjang Faktur Pajaknya diterima setelah
                          terjadinya pengalihan dan Pajak Masukan tersebut belum
                          dibebankan sebagai biaya atau dikapitalisasi.
