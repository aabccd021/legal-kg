                          pada ayat (1) huruf b dibantu oleh kementerian dan
                          lembaga pemerintah nonkementerian. (6) Pelaksanaan
                          kewenangan yang dilakukan oleh lembaga pemerintah
                          nonkementerian sebagaimana dimaksud pada ayat (5)
                          harus dikoordinasikan dengan kementerian terkait.
                          REPUBLIK INDONESIA - 159 - (7) Penetapan norma,
                          standar, prosedur, dan kriteria sebagaimana dimaksud
                          pada ayat (1) huruf a dilakukan paling lama 2 (dua)
                          tahun terhitung sejak peraturan pemerintah mengenai
                          pelaksanaan urusan pemerintahan konkuren diundangkan.
