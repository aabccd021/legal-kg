                          text: >-
                            Beberapa ketentuan dalam Undang-Undang Nomor 26
                            Tahun 2007 tentang Penataan Ruang (Lembaran Negara
                            Republik Indonesia Tahun 2007 Nomor 68, Tambahan
                            Lembaran Negara Republik Indonesia Nomor 4725)
                            diubah sebagai berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: referenceText
                              references:
                                - start: 13
                                  end: 20
                                  node:
                                    _key: 1
                                    parentDocument: *ref_0
                                    _structureType: pasal
                                - start: 68
                                  end: 75
                                  node:
                                    _key: 1
                                    parentDocument: *ref_0
                                    _structureType: pasal
                                - start: 102
                                  end: 109
                                  node:
                                    _key: 1
                                    parentDocument: *ref_0
                                    _structureType: pasal
                              text: >-
                                1. Ketentuan Pasal 1 angka 7, angka 8, dan angka
                                32 diubah sehingga Pasal 1 berbunyi sebagai
                                berikut: Pasal 1 Dalam Undang-Undang ini yang
                                dimaksud dengan: 1. Ruang adalah wadah yang
                                meliputi ruang darat, ruang laut, dan ruang
                                udara, termasuk ruang di dalam bumi sebagai satu
                                kesatuan wilayah, tempat manusia dan makhluk
                                lain hidup, melakukan kegiatan, dan memelihara
                                kelangsungan hidupnya. 2. Tata ruang adalah
                                wujud struktur ruang dan pola ruang. 3. Struktur
                                ruang adalah susunan pusat-pusat permukiman dan
                                sistem jaringan prasarana dan sarana yang
                                berfungsi sebagai pendukung kegiatan sosial
                                ekonomi masyarakat yang secara hierarki memiliki
                                hubungan fungsional. 4. Pola ruang adalah
                                distribusi peruntukan ruang dalam suatu wilayah
                                yang meliputi peruntukan ruang untuk fungsi
                                lindung dan peruntukan ruang untuk fungsi budi
                                daya. REPUBLIK INDONESIA -14 - S5. Penataan
                                ruang adalah suatu sistem perencanaan tata
                                ruang, pemanfaatan ruang, dan pengendalian
                                pemanfaatan ruang. 6. Penyelenggaraan penataan
                                ruang adalah kegiatan yang meliputi pengaturan,
                                pembinaan, pelaksanaan, dan pengawasan penataan
                                ruang. 7. Pemerintah Pusat adalah Presiden
                                Republik Indonesia yang memegang kekuasaan
                                pemerintahan negara Republik Indonesia yang
                                dibantu oleh Wakil Presiden dan menteri
                                sebagaimana dimaksud dalam Undang- Undang Dasar
                                Negara Republik Indonesia Tahun 1945. 8.
                                Pemerintah Daerah adalah kepala daerah sebagai
                                unsur penyelenggara Pemerintahan Daerah yang
                                memimpin pelaksanaan urusan pemerintahan yang
                                menjadi kewenangan daerah otonom. 9. Pengaturan
                                penataan ruang adalah upaya pembentukan landasan
                                hukum bagi Pemerintah Pusat, Pemerintah Daerah,
                                dan masyarakat dalam penataan ruang. 10.
                                Pembinaan penataan ruang adalah upaya untuk
                                meningkatkan kinerja penataan ruang yang
                                diselenggarakan oleh Pemerintah Pusat,
                                Pemerintah Daerah, dan masyarakat. l1.
                                Pelaksanaan penataan ruang adalah upaya
                                pencapaian tujuan penataan ruang melalui
                                pelaksanaan perencanaan tata ruang, pemanfaatan
                                ruang, dan pengendalian pemanfaatan ruang. 12.
                                Pengawasan penataan ruang adalah upaya agar
                                penyelenggaraan penataan ruang dapat diwujudkan
                                sesuai dengan ketentuan peraturan perundang-
                                undangan. 13. Perencanaan tata ruang adalah
                                suatu proses untuk menentukan struktur ruang dan
                                pola ruang yang meliputi penyusunan dan
                                penetapan rencana tata ruang. 14. Pemanfaatan
                                ruang adalah upaya untuk mewujudkan struktur
                                ruang dan pola ruang sesuai dengan rencana tata
                                ruang melalui penyusunan dan pelaksanaan program
                                beserta pembiayaannya. REPUBLIK INDONESIA -15 -
                                15. Pengendalian pemanfaatan ruang adalah upaya
                                untuk mewujudkan tertib tata ruang. 16. Rencana
                                tata ruang adalah hasil perencanaan tata ruang.
                                17. Wilayah adalah ruang yang merupakan kesatuan
                                geografis beserta segenap unsur terkait yang
                                batas dan sistemnya ditentukan berdasarkan aspek
                                administratif dan/atau aspek fungsional. 18.
                                Sistem wilayah adalah struktur ruang dan pola
                                ruang yang mempunyai jangkauan pelayanan pada
                                tingkat wilayah. 19. Sistem internal perkotaan
                                adalah struktur ruang dan pola ruang yang
                                mempunyai jangkauan pelayanan pada tingkat
                                internal perkotaan. 20. Kawasan adalah wilayah
                                yang memiliki fungsi utama lindung atau budi
                                daya. 21. Kawasan lindung adalah wilayah yang
                                ditetapkan dengan fungsi utama melindungi
                                kelestarian lingkungan hidup yang mencakup
                                sumber daya alam dan sumber daya buatan. 22.
                                Kawasan budi daya adalah wilayah yang ditetapkan
                                dengan fungsi utama untuk dibudidayakan atas
                                dasar kondisi dan potensi sumber daya alam,
                                sumber daya manusia, dan sumber daya buatan. 23.
                                Kawasan perdesaan adalah wilayah yang mempunyai
                                kegiatan utama pertanian, termasuk pengelolaan
                                sumber daya alam dengan susunan fungsi kawasan
                                sebagai tempat permukiman perdesaan, pelayanan
                                jasa pemerintahan, pelayanan sosial, dan
                                kegiatan ekonomi. 24. Kawasan agropolitan adalah
                                kawasan yang terdiri atas satu atau lebih pusat
                                kegiatan pada wilayah perdesaan sebagai sistem
                                produksi pertanian dan pengelolaan sumber daya
                                alam tertentu yang ditunjukkan oleh adanya
                                keterkaitan fungsional dan hierarki keruangan
                                satuan sistem permukiman dan sistem agrobisnis.
                                REPUBLIK INDONESIA -16 - 25. Kawasan perkotaan
                                adalah wilayah yang mempunyai kegiatan utama
                                bukan pertanian dengan susunan fungsi kawasan
                                sebagai tempat permukiman perkotaan, pemusatan
                                dan distribusi pelayanan jasa pemerintahan,
                                pelayanan sosial, dan kegiatan ekonomi. 26.
                                Kawasan metropolitan adalah kawasan perkotaan
                                yang terdiri atas sebuah kawasan perkotaan yang
                                berdiri sendiri atau kawasan perkotaan inti
                                dengan kawasan perkotaan di sekitarnya yang
                                saling memiliki keterkaitan fungsional yang
                                dihubungkan dengan sistem jaringan prasarana
                                wilayah yang terintegrasi dengan jumlah penduduk
                                secara keseluruhan sekurang-kurangnya 1.000.000
                                (satu juta) jiwa. 27. Kawasan megapolitan adalah
                                kawasan yang terbentuk dari 2 (dua) atau lebih
                                kawasan metropolitan yang memiliki hubungan
                                fungsional dan membentuk sebuah sistem. 28.
                                Kawasan strategis nasional adalah wilayah yang
                                penataan ruangnya diprioritaskan karena
                                mempunyai pengaruh sangat penting secara
                                nasional terhadap kedaulatan negara, pertahanan,
                                dan keamanan negara, ekonomi, sosial, budaya,
                                dan/atau lingkungan, termasuk wilayah yang telah
                                ditetapkan sebagai warisan dunia. 29. Kawasan
                                strategis provinsi adalah wilayah yang penataan
                                ruangnya diprioritaskan karena mempunyai
                                pengaruh sangat penting dalam lingkup provinsi
                                terhadap ekonomi, sosial, budaya, dan/atau
                                lingkungan. 30. Kawasan strategis kabupaten/kota
                                adalah wilayah yang penataan ruangnya
                                diprioritaskan karena mempunyai pengaruh sangat
                                penting dalam lingkup kabupaten/kota terhadap
                                ekonomi, sosial, budaya, dan/atau lingkungan.
                                REPUBLIK INDONESIA -17 - 31. Ruang terbuka hijau
                                adalah area memanjang/jalur dan/atau mengelompok
                                yang penggunaannya lebih bersifat terbuka,
                                tempat tumbuh tanaman, baik yang tumbuh secara
                                alamiah maupun yang sengaja ditanam, dengan
                                mempertimbangkan aspek fungsi ekologis, resapan
                                air, ekonomi, sosial budaya, dan estetika. 32.
                                Kesesuaian Kegiatan Pemanfaatan Ruang adalah
                                kesesuaian antara rencana kegiatan pemanfaatan
                                ruang dengan rencana tata ruang. 33. Orang
                                adalah orang perseorangan dan/atau korporasi.
                                34. Menteri adalah menteri yang menyelenggarakan
                                urusan pemerintahan dalam bidang penataan ruang.
