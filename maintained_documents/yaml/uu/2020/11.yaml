                        description:
                          _type: referenceText
                          references: []
                          text: >-
                            Beberapa ketentuan dalam Undang-Undang 6 Tahun 2017
                            tentang Arsitek (Lembaran Negara Republik Indonesia
                            Tahun 2017 Nomor 179, Tambahan Lembaran Negara
                            Republik Indonesia Nomor 6108) diubah sebagai
                            berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Arsitektur adalah wujud hasil penerapan
                                      ilmu pengetahuan, teknologi, dan seni
                                      secara utuh dalam menggubah ruang dan
                                      lingkungan binaan sebagai bagian dari
                                      kebudayaan dan peradaban manusia yang
                                      memenuhi kaidah fungsi, kaidah konstruksi,
                                      dan kaidah estetika serta mencakup faktor
                                      keselamatan, keamanan, kesehatan,
                                      kenyamanan, dan kemudahan.
                                - _type: numPoint
                                  _key: '2'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Praktik Arsitek adalah penyelenggaraan
                                      kegiatan untuk menghasilkan karya
                                      Arsitektur yang meliputi perencanaan,
                                      perancangan, pengawasan, dan/atau
                                      pengkajian untuk bangunan gedung dan
                                      lingkungannya, serta yang terkait dengan
                                      kawasan dan kota.
                                - _type: numPoint
                                  _key: '3'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Arsitek adalah seseorang yang telah
                                      memenuhi syarat dan ditetapkan oleh Dewan
                                      untuk melakukan Praktik Arsitek.
                                - _type: numPoint
                                  _key: '4'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Arsitek Asing adalah Arsitek
                                      berkewarganegaraan asing yang melakukan
                                      Praktik Arsitek di Indonesia.
                                - _type: numPoint
                                  _key: '5'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Uji Kompetensi adalah penilaian kompetensi
                                      Arsitek yang terukur dan objektif untuk
                                      menilai capaian kompetensi dalam bidang
                                      Arsitektur dengan mengacu pada standar
                                      kompetensi Arsitek.
                                - _type: numPoint
                                  _key: '6'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Surat Tanda Registrasi Arsitek adalah
                                      bukti tertulis bagi Arsitek untuk
                                      melakukan Praktik Arsitek.
                                - _type: numPoint
                                  _key: '7'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Lisensi adalah bukti tertulis yang berlaku
                                      sebagai surat tanda penanggung jawab
                                      Praktik Arsitek dalam penyelenggaraan izin
                                      mendirikan bangunan dan perizinan lain.
                                - _type: numPoint
                                  _key: '8'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengembangan Keprofesian Berkelanjutan
                                      adalah upaya pemeliharaan kompetensi
                                      Arsitek untuk menjalankan Praktik Arsitek
                                      secara berkesinambungan.
                                - _type: numPoint
                                  _key: '9'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pengguna Jasa Arsitek adalah pihak yang
                                      menggunakan jasa Arsitek berdasarkan
                                      perjanjian kerja.
                                - _type: numPoint
                                  _key: '10'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Organisasi Profesi adalah Ikatan Arsitek
                                      Indonesia.
                                - _type: numPoint
                                  _key: '11'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Pusat adalah Presiden Republik
                                      Indonesia yang memegang kekuasaan
                                      pemerintahan negara Republik Indonesia
                                      yang dibantu oleh Wakil Presiden dan
                                      menteri sebagaimana dimaksud dalam Undang-
                                      Undang Dasar Negara Republik Indonesia
                                      Tahun 1945.
                                - _type: numPoint
                                  _key: '12'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Pemerintah Daerah adalah kepala daerah
                                      sebagai unsur penyelenggara Pemerintahan
                                      Daerah yang memimpin pelaksanaan urusan
                                      pemerintahan yang menjadi kewenangan
                                      daerah otonom.
                                - _type: numPoint
                                  _key: '13'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Menteri adalah menteri yang
                                      menyelenggarakan urusan pemerintahan di
                                      bidang pekerjaan umum.
                                - _type: numPoint
                                  _key: '14'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Dewan Arsitek Indonesia yang selanjutnya
                                      disebut Dewan adalah dewan yang dibentuk
                                      oleh Organisasi Profesi dengan tugas dan
                                      fungsi membantu Pemerintah Pusat dalam
                                      penyelenggaraan keprofesian Arsitek.
