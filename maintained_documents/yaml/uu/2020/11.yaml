                          Pemerintah Pusat. (2) Dalam memberikan pelayanan
                          Perizinan Berusaha sebagaimana dimaksud pada ayat (1),
                          Daerah membentuk unit pelayanan terpadu satu pintu.
                          (3) Pembentukan unit pelayanan terpadu satu pintu
                          sebagaimana dimaksud pada ayat (2) berpedoman pada
                          ketentuan peraturan perundang-undangan. (4) Pelayanan
                          Perizinan Berusaha sebagaimana dimaksud pada ayat (1)
                          wajib menggunakan sistem Perizinan Berusaha secara
                          elektronik yang dikelola oleh Pemerintah Pusat. (5)
                          Kepala daerah dapat mengembangkan sistem pendukung
                          pelaksanaan sistem Perizinan Berusaha terintegrasi
                          secara elektronik sebagaimana dimaksud pada ayat (4)
                          sesuai dengan standar yang ditetapkan Pemerintah
                          Pusat. REPUBLIK INDONESIA - 163 - (6) Kepala daerah
                          yang tidak memberikan pelayanan Perizinan Berusaha
                          sebagaimana dimaksud pada ayat (1) dan penggunaan
                          sistem Perizinan Berusaha terintegrasi secara
                          elektronik sebagaimana dimaksud pada ayat (4) dikenai
                          sanksi administratif. (7) Sanksi administratif
                          sebagaimana dimaksud pada ayat (6) berupa teguran
                          tertulis kepada gubernur oleh Menteri dan kepada
                          bupati/wali kota oleh gubernur sebagai wakil
                          Pemerintah Pusat untuk pelanggaran yang bersifat
                          administratif. (8) Teguran tertulis sebagaimana
                          dimaksud pada ayat (7) dapat diberikan oleh menteri
                          atau kepala lembaga yang membina dan mengawasi
                          Perizinan Berusaha sektor setelah berkoordinasi dengan
                          Menteri. (9) Dalam hal teguran tertulis sebagaimana
                          dimaksud pada ayat (7) dan ayat (8) telah disampaikan
                          2 (dua) kali berturut-turut dan tetap tidak
                          dilaksanakan oleh kepala daerah: a. menteri atau
                          kepala lembaga yang membina dan mengawasi Perizinan
                          Berusaha sektor mengambil alih pemberian Perizinan
                          Berusaha yang menjadi kewenangan gubernur, atau b.
                          gubernur sebagai wakil Pemerintah Pusat mengambil alih
                          pemberian Perizinan Berusaha yang menjadi kewenangan
                          bupati/wali kota. (10) Pengambilalihan pemberian
                          Perizinan Berusaha oleh menteri atau kepala lembaga
                          yang membina dan mengawasi Perizinan Berusaha sektor
                          sebagaimana dimaksud pada ayat (9) huruf a dilakukan
                          setelah berkoordinasi dengan Menteri.
