                        text: >-
                          6. Ketentuan Pasal 14 diubah sehingga berbunyi sebagai
                          berikut: Pasal 14 (1) Direktur Jenderal Pajak dapat
                          menerbitkan Surat Tagihan Pajak apabila: a. Pajak
                          Penghasilan dalam tahun berjalan tidak atau kurang
                          dibayar, b. dari hasil penelitian terdapat kekurangan
                          pembayaran pajak sebagai akibat salah tulis dan/atau
                          salah hitung, c. Wajib Pajak dikenai sanksi
                          administrasi berupa denda dan/atau bunga, d. pengusaha
                          yang telah dikukuhkan sebagai Pengusaha Kena Pajak,
                          tetapi tidak membuat faktur pajak atau terlambat
                          membuat faktur pajak, e. pengusaha yang telah
                          dikukuhkan sebagai Pengusaha Kena Pajak yang tidak
                          mengisi Faktur Pajak secara lengkap sebagaimana
                          dimaksud dalam Pasal 13 ayat (5) dan ayat (6)
                          Undang-Undang Pajak Pertambahan Nilai 1984 dan
                          perubahannya, selain identitas pembeli Barang Kena
                          Pajak atau penerima Jasa Kena Pajak serta nama dan
                          tanda tangan sebagaimana dimaksud dalam Pasal 13 ayat
                          (5) huruf b dan huruf g Undang-Undang Pajak
                          Pertambahan Nilai 1984 dan perubahannya dalam hal
                          penyerahan dilakukan oleh Pengusaha Kena Pajak
                          pedagang eceran, f. ' dihapus: g. dihapus, atau h.
                          terdapat imbalan bunga yang seharusnya tidak diberikan
                          kepada Wajib Pajak, dalam hal: REPUBLIK INDONESIA -
                          659 - 1. diterbitkan keputusan, 2. diterima putusan,
                          atau 3. ditemukan data atau informasi yang menunjukkan
                          adanya imbalan bunga yang seharusnya tidak diberikan
                          kepada Wajib Pajak. (2) Surat Tagihan Pajak
                          sebagaimana dimaksud pada ayat (1) mempunyai kekuatan
                          hukum yang sama dengan surat ketetapan pajak. (3)
                          Jumlah kekurangan pajak yang terutang dalam Surat
                          Tagihan Pajak sebagaimana dimaksud pada ayat (1) huruf
                          a dan huruf b ditambah dengan sanksi administratif
                          berupa bunga sebesar tarif bunga per bulan yang
                          ditetapkan oleh Menteri Keuangan dihitung sejak saat
                          terutangnya pajak atau berakhirnya Masa Pajak, bagian
                          Tahun Pajak, atau Tahun Pajak sampai dengan
                          diterbitkannya Surat Tagihan Pajak, dan dikenakan
                          paling lama 24 (dua puluh empat) bulan serta bagian
                          dari bulan dihitung penuh 1 (satu) bulan. (4) Terhadap
                          pengusaha atau Pengusaha Kena Pajak sebagaimana
                          dimaksud pada ayat (1) huruf d atau huruf e
                          masing-masing, selain wajib menyetor pajak yang
                          terutang, dikenai sanksi administratif berupa denda
                          sebesar 1” (satu persen) dari Dasar Pengenaan Pajak.
                          (5) Dihapus. (Sa) Tarif bunga per bulan yang
                          ditetapkan oleh Menteri Keuangan sebagaimana dimaksud
                          pada ayat (3) dihitung berdasarkan suku bunga acuan
                          ditambah 5Y0 (lima persen) dan dibagi 12 (dua belas)
                          yang berlaku pada tanggal dimulainya penghitungan
                          sanksi. (S5b) Surat Tagihan Pajak diterbitkan paling
                          lama 5 (lima) tahun setelah saat terutangnya pajak
                          atau berakhirnya Masa Pajak, bagian Tahun Pajak, atau
                          Tahun Pajak. REPUBLIK INDONESIA - 660 - (5c)
                          Dikecualikan dari ketentuan jangka waktu penerbitan
                          sebagaimana dimaksud pada ayat (bb): a. Surat Tagihan
                          Pajak atas sanksi administratif sebagaimana dimaksud
                          dalam Pasal 19 ayat (1) diterbitkan paling lama sesuai
                          dengan daluwarsa penagihan Surat Ketetapan Pajak
                          Kurang Bayar serta Surat Ketetapan Pajak Kurang Bayar
                          Tambahan, dan Surat Keputusan Pembetulan, Surat
                          Keputusan Keberatan, Putusan Banding, serta Putusan
                          Peninjauan Kembali yang menyebabkan jumlah pajak yang
                          masih harus dibayar bertambah, b. Surat Tagihan Pajak
                          atas sanksi administratif sebagaimana dimaksud dalam
                          Pasal 25 ayat (9) dapat diterbitkan paling lama 5
                          (lima) tahun sejak tanggal penerbitan Surat Keputusan
                          Keberatan apabila Wajib Pajak tidak mengajukan upaya
                          banding, dan c. Surat Tagihan Pajak atas sanksi
                          administratif sebagaimana dimaksud dalam Pasal 27 ayat
                          (Sd) dapat diterbitkan paling lama dalam jangka waktu
                          5 (lima) tahun sejak tanggal Putusan Banding diucapkan
                          oleh hakim Pengadilan Pajak dalam sidang terbuka untuk
                          umum. (6) Tata cara penerbitan Surat Tagihan Pajak
                          diatur dengan atau berdasarkan Peraturan Menteri
                          Keuangan.
