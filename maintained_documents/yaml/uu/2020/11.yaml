                                    _structureType: pasal
                              text: >-
                                1. Ketentuan Pasal 1 angka 7 diubah sehingga
                                Pasal 1 berbunyi sebagai berikut: Pasal 1 Dalam
                                Undang-Undang ini yang dimaksud dengan: 1.
                                Pangan adalah segala sesuatu yang berasal dari
                                sumber hayati produk pertanian, perkebunan,
                                kehutanan, perikanan, peternakan, perairan, dan
                                air, baik yang diolah maupun tidak diolah yang
                                diperuntukkan sebagai makanan atau minuman bagi
                                konsumsi manusia, termasuk bahan tambahan
                                Pangan, bahan baku Pangan, dan bahan lainnya
                                yang digunakan dalam penyiapan, pengolahan,
                                dan/atau pembuatan makanan atau minuman.
                                REPUBLIK INDONESIA -471 - 2. Kedaulatan Pangan
                                adalah hak negara dan bangsa yang secara mandiri
                                menentukan kebijakan Pangan yang menjamin hak
                                atas Pangan bagi rakyat dan yang memberikan hak
                                bagi masyarakat untuk menentukan sistem Pangan
                                yang sesuai dengan potensi sumber daya lokal. 3.
                                Kemandirian Pangan adalah kemampuan negara dan
                                bangsa dalam memproduksi Pangan yang beraneka
                                ragam dari dalam negeri yang dapat menjamin
                                pemenuhan kebutuhan Pangan yang cukup sampai di
                                tingkat perseorangan dengan memanfaatkan potensi
                                sumber daya alam, manusia, sosial, ekonomi, dan
                                kearifan lokal secara bermartabat. 4. Ketahanan
                                Pangan adalah kondisi terpenuhinya Pangan bagi
                                negara sampai dengan perseorangan yang tercermin
                                dari tersedianya Pangan yang cukup, baik jumlah
                                maupun mutunya, aman, beragam, bergizi, merata,
                                dan terjangkau serta tidak bertentangan dengan
                                agama, keyakinan, dan budaya masyarakat untuk
                                dapat hidup sehat, aktif, dan produktif secara
                                berkelanjutan. 5. Keamanan Pangan adalah kondisi
                                dan upaya yang diperlukan untuk mencegah Pangan
                                dari kemungkinan cemaran biologis, kimia, dan
                                benda lain yang dapat mengganggu, merugikan, dan
                                membahayakan kesehatan manusia serta tidak
                                bertentangan dengan agama, keyakinan, dan budaya
                                masyarakat sehingga aman untuk dikonsumsi. 6.
                                Produksi Pangan adalah kegiatan atau proses
                                menghasilkan, menyiapkan, mengolah, membuat,
                                mengawetkan, mengemas, mengemas kembali,
                                dan/atau mengubah bentuk Pangan. 7. Ketersediaan
                                Pangan adalah kondisi tersedianya Pangan dari
                                hasil produksi dalam negeri, Cadangan Pangan
                                Nasional, dan Impor Pangan. 8. Cadangan Pangan
                                Nasional adalah persediaan Pangan di seluruh
                                wilayah Negara Kesatuan Republik Indonesia untuk
                                konsumsi manusia dan untuk menghadapi masalah
                                kekurangan Pangan, gangguan pasokan dan harga,
                                serta keadaan darurat. REPUBLIK INDONESIA -472 -
                                9. Cadangan Pangan Pemerintah adalah persediaan
                                Pangan yang dikuasai dan dikelola oleh
                                Pemerintah. 10. Cadangan Pangan Pemerintah
                                Provinsi adalah persediaan Pangan yang dikuasai
                                dan dikelola oleh pemerintah provinsi. 11.
                                Cadangan Pangan Pemerintah Kabupaten/Kota adalah
                                persediaan Pangan yang dikuasai dan dikelola
                                oleh pemerintah kabupaten/kota. 12. Cadangan
                                Pangan Pemerintah Desa adalah persediaan Pangan
                                yang dikuasai dan dikelola oleh pemerintah desa.
                                13. Cadangan Pangan Masyarakat adalah persediaan
                                Pangan yang dikuasai dan dikelola oleh
                                masyarakat di tingkat pedagang, komunitas, dan
                                rumah tangga. 14. Penyelenggaraan Pangan adalah
                                kegiatan perencanaan, pelaksanaan, dan
                                pengawasan dalam penyediaan, keterjangkauan,
                                pemenuhan konsumsi Pangan dan Gizi, serta
                                keamanan Pangan dengan melibatkan peran serta
                                masyarakat yang terkoordinasi dan terpadu. 15.
                                Pangan Pokok adalah Pangan yang diperuntukkan
                                sebagai makanan utama sehari-hari sesuai dengan
                                potensi sumber daya dan kearifan lokal. 16.
                                Penganekaragaman Pangan adalah upaya peningkatan
                                ketersediaan dan konsumsi Pangan yang beragam,
                                bergizi seimbang, dan berbasis pada potensi
                                sumber daya lokal. 17. Pangan Lokal adalah
                                makanan yang dikonsumsi oleh masyarakat setempat
                                sesuai dengan potensi dan kearifan lokal. 18.
                                Pangan Segar adalah Pangan yang belum mengalami
                                pengolahan yang dapat dikonsumsi langsung
                                dan/atau yang dapat menjadi bahan baku
                                pengolahan Pangan. 19. Pangan Olahan adalah
                                makanan atau minuman hasil proses dengan cara
                                atau metode tertentu dengan atau tanpa bahan
                                tambahan. 20. Petani adalah warga negara
                                Indonesia, baik perseorangan maupun beserta
                                keluarganya yang melakukan usaha tani di bidang
                                Pangan. REPUBLIK INDONESIA -473 - 21. Nelayan
                                adalah warga negara Indonesia, baik perseorangan
                                maupun beserta keluarganya yang mata
                                pencahariannya melakukan penangkapan ikan. 22.
                                Pembudi Daya Ikan adalah warga negara Indonesia,
                                baik perseorangan maupun beserta keluarganya
                                yang mata pencahariannya membesarkan,
                                membiakkan, dan/atau memelihara ikan dan sumber
                                hayati perairan lainnya serta memanen hasilnya
                                dalam lingkungan yang terkontrol. 23.
                                Perdagangan Pangan adalah setiap kegiatan atau
                                serangkaian kegiatan dalam rangka penjualan
                                dan/atau pembelian Pangan, termasuk penawaran
                                untuk menjual Pangan dan kegiatan lain yang
                                berkenaan dengan pemindahtanganan Pangan dengan
                                memperoleh imbalan. 24. Ekspor Pangan adalah
                                kegiatan mengeluarkan Pangan dari daerah pabean
                                negara Republik Indonesia yang meliputi wilayah
                                darat, perairan, dan ruang udara di atasnya,
                                tempat-tempat tertentu di Zona Ekonomi
                                Eksklusif, dan landas kontinen. 25. Impor Pangan
                                adalah kegiatan memasukkan Pangan ke dalam
                                daerah pabean negara Republik Indonesia yang
                                meliputi wilayah darat, perairan, dan ruang
                                udara di atasnya, tempat-tempat tertentu di Zona
                                Ekonomi Eksklusif, dan landas kontinen. 26.
                                Peredaran Pangan adalah setiap kegiatan atau
                                serangkaian kegiatan dalam rangka penyaluran
                                Pangan kepada masyarakat, baik diperdagangkan
                                maupun tidak. 27. Bantuan Pangan adalah Bantuan
                                Pangan Pokok dan Pangan lainnya yang diberikan
                                oleh Pemerintah, Pemerintah Daerah, dan/atau
                                masyarakat dalam mengatasi Masalah Pangan dan
                                Krisis Pangan, meningkatkan akses Pangan bagi
                                masyarakat miskin dan/atau rawan Pangan dan
                                Gizi, dan kerja sama internasional. 28. Masalah
                                Pangan adalah keadaan kekurangan, kelebihan,
                                dan/atau ketidakmampuan perseorangan atau rumah
                                tangga dalam memenuhi kebutuhan Pangan dan
                                Keamanan Pangan. REPUBLIK INDONESIA -474 - 29.
                                Krisis Pangan adalah kondisi kelangkaan Pangan
                                yang dialami sebagian besar masyarakat di suatu
                                wilayah yang disebabkan oleh, antara lain,
                                kesulitan distribusi Pangan, dampak perubahan
                                iklim, bencana alam dan lingkungan, dan konflik
                                sosial, termasuk akibat perang. 30. Sanitasi
                                Pangan adalah upaya untuk menciptakan dan
                                mempertahankan kondisi Pangan yang sehat dan
                                higienis yang bebas dari bahaya cemaran
                                biologis, kimia, dan benda lain. 31. Persyaratan
                                Sanitasi adalah standar kebersihan dan kesehatan
                                yang harus dipenuhi untuk menjamin Sanitasi
                                Pangan. 32. Iradiasi Pangan adalah metode
                                penanganan Pangan, baik dengan menggunakan zat
                                radioaktif maupun akselerator untuk mencegah
                                terjadinya pembusukan dan kerusakan, membebaskan
                                Pangan dari jasad renik patogen, serta mencegah
                                pertumbuhan tunas. 33. Rekayasa Genetik Pangan
                                adalah suatu proses yang melibatkan pemindahan
                                gen (pembawa sifat) dari suatu jenis hayati ke
                                jenis hayati lain yang berbeda atau sama untuk
                                mendapatkan jenis baru yang mampu menghasilkan
                                produk Pangan yang lebih unggul. 34. Pangan
                                Produk Rekayasa Genetik adalah Pangan yang
                                diproduksi atau yang menggunakan bahan baku,
                                bahan tambahan Pangan, dan/atau bahan lain yang
                                dihasilkan dari proses rekayasa genetik. 35.
                                Kemasan Pangan adalah bahan yang digunakan untuk
                                mewadahi dan/atau membungkus Pangan, baik yang
                                bersentuhan langsung dengan Pangan maupun tidak.
                                36. Mutu Pangan adalah nilai yang ditentukan
                                atas dasar kriteria keamanan dan kandungan Gizi
                                Pangan. 37. Gizi adalah zat atau senyawa yang
                                terdapat dalam Pangan yang terdiri atas
                                karbohidrat, protein, lemak, vitamin, mineral,
                                serat, air, dan komponen lain yang bermanfaat
                                bagi pertumbuhan dan kesehatan manusia. 38.
                                Setiap Orang adalah orang perseorangan atau
                                korporasi, baik yang berbadan hukum maupun yang
                                tidak berbadan hukum. REPUBLIK INDONESIA - 475 -
                                39. Pelaku Usaha Pangan adalah Setiap Orang yang
                                bergerak pada satu atau lebih subsistem
                                agribisnis Pangan, yaitu penyedia masukan
                                produksi, proses produksi, pengolahan,
                                pemasaran, perdagangan, dan penunjang. 40.
                                Pemerintah Pusat, selanjutnya disebut
                                Pemerintah, adalah Presiden Republik Indonesia
                                yang memegang kekuasaan Pemerintahan negara
                                Republik Indonesia sebagaimana dimaksud dalam
                                Undang-Undang Dasar Negara Republik Indonesia
                                Tahun 1945. 41. Pemerintah Daerah adalah kepala
                                daerah sebagai unsur penyelenggara Pemerintahan
                                Daerah yang memimpin pelaksanaan urusan
                                pemerintahan yang menjadi kewenangan daerah
                                otonom.
