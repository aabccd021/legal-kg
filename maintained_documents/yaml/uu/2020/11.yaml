                              text: >-
                                2. Ketentuan Pasal 32 diubah sehingga berbunyi
                                sebagai berikut: Pasal 32 (1) Dalam rangka
                                keselamatan pelayaran, semua bentuk bangunan dan
                                instalasi di Laut tidak mengganggu, baik Alur
                                Pelayaran maupun Alur Laut Kepulauan Indonesia.
                                (2) Area operasi dari bangunan dan instalasi di
                                Laut tidak melebihi daerah keselamatan yang
                                telah ditentukan. (3) Penggunaan area
                                operasional dari bangunan dan instalasi di Laut
                                yang melebihi daerah keselamatan yang telah
                                ditentukan sebagaimana dimaksud pada ayat (2)
                                harus mendapatkan persetujuan dari pihak yang
                                berwenang. (4) Pendirian dan/atau penempatan
                                bangunan Laut wajib mempertimbangkan kelestarian
                                sumber daya pesisir dan pulau-pulau kecil.
                                REPUBLIK INDONESIA -61 - (5) Ketentuan lebih
                                lanjut mengenai kriteria, persyaratan, dan
                                mekanisme pendirian dan/atau penempatan bangunan
                                di Laut diatur dalam Peraturan Pemerintah.
