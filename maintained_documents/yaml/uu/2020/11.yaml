          _judul: Bagian Ketiga Pemerintahan Daerah
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 176
                isi:
                  _type: amendPoints
                  description:
                    _type: referenceText
                    references: []
                    text: >-
                      Beberapa ketentuan dalam Undang Nomor 23 Tahun 2014
                      tentang Pemerintahan Daerah (Lembaran Negara Republik
                      Indonesia Tahun 2014 Nomor 244, Tambahan Lembaran Negara
                      Republik Indonesia Nomor 5587) sebagaimana telah diubah
                      terakhir dengan Undang-Undang Nomor 9 Tahun 2015 tentang
                      Perubahan Kedua atas Undang-Undang Nomor 23 Tahun 2014
                      tentang Pemerintahan Daerah (Lembaran Negara Republik
                      Indonesia Tahun 2015 Nomor 58, Tambahan Lembaran Negara
                      Republik Indonesia Nomor 5679) diubah sebagai berikut:
                  isi:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 1
                      _pasalKey: '16'
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Pemerintah Pusat dalam menyelenggarakan urusan
                                  pemerintahan konkuren sebagaimana dimaksud
                                  dalam Pasal 9 ayat (3) berwenang untuk:
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menetapkan norma, standar, prosedur, dan
                                      kriteria dalam rangka penyelenggaraan
