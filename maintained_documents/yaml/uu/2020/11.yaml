                        text: >-
                          23. Ketentuan Pasal 79 diubah sehingga berbunyi
                          sebagai berikut: Pasal 79 (l) Pengusaha wajib memberi:
                          a. waktu istirahat: dan b. cuti. (2) Waktu istirahat
                          sebagaimana dimaksud pada ayat (1) huruf a wajib
                          diberikan kepada pekerja/buruh paling sedikit
                          meliputi: a. istirahat antara jam kerja, paling
                          sedikit setengah jam setelah bekerja selama 4 (empat)
                          jam terus menerus, dan waktu istirahat tersebut tidak
                          termasuk jam kerja: dan REPUBLIK INDONESIA - 544 - b.
                          istirahat mingguan 1 (satu) hari untuk 6 (enam) hari
                          kerja dalam 1 (satu) minggu. (3) — Cuti sebagaimana
                          dimaksud pada ayat (1) huruf b yang wajib diberikan
                          kepada pekerja/buruh, yaitu cuti tahunan, paling
                          sedikit 12 (dua belas) hari kerja setelah
                          pekerja/buruh yang bersangkutan bekerja selama 12 (dua
                          belas) bulan secara terus menerus. (4) Pelaksanaan
                          cuti tahunan sebagaimana dimaksud pada ayat (3) diatur
                          dalam perjanjian kerja, peraturan perusahaan, atau
                          perjanjian kerja bersama. (5) Selain waktu istirahat
                          dan cuti sebagaimana dimaksud pada ayat (1), ayat (2),
                          dan ayat (3), perusahaan tertentu dapat memberikan
                          istirahat panjang yang diatur dalam perjanjian kerja,
                          peraturan perusahaan, atau perjanjian kerja bersama.
                          (6) Ketentuan lebih lanjut mengenai perusahaan
                          tertentu sebagaimana dimaksud pada ayat (5) diatur
                          dengan Peraturan Pemerintah.
