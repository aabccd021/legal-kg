                    - _type: pasal
                      _key: 35
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Untuk memberikan kemudahan bagi masyarakat terutama
                          Pelaku Usaha dalam mendapatkan Perizinan Berusaha dan
                          kemudahan persyaratan investasi dari sektor Kehutanan,
                          Undang-Undang ini mengubah, menghapus, atau menetapkan
                          pengaturan baru beberapa ketentuan dalam: a.
                          Undang-Undang Nomor 41 Tahun 1999 tentang Kehutanan
                          (Lembaran Negara Republik Indonesia Tahun 1999 Nomor
                          167, Tambahan Lembaran Negara Republik Indonesia Nomor
                          3888) sebagaimana diubah dengan Undang-Undang Nomor 19
                          Tahun 2004 tentang Peraturan Pemerintah Pengganti
                          Undang-Undang Nomor 1 Tahun 2004 tentang Perubahan
                          Atas Undang-Undang Nomor 41 Tahun 1999 tentang
                          Kehutanan menjadi Undang-Undang (Lembaran Negara
                          Republik Indonesia Tahun 2004 Nomor 86, Tambahan
                          Lembaran Negara Republik Indonesia Nomor 4374), dan
                          REPUBLIK INDONESIA - 138 - b. Undang-Undang Nomor 18
                          Tahun 2013 tentang Pencegahan dan Pemberantasan
                          Perusakan Hutan (Lembaran Negara Republik Indonesia
                          Tahun 2013 Nomor 130, Tambahan Lembaran Negara
                          Republik Indonesia Nomor 5432).
