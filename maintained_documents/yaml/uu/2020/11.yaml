                      description:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan Pasal 24 diubah sehingga berbunyi sebagai
                          berikut:
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 3
                      _pasalKey: '38'
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pejabat dan/atau Badan Pemerintahan dapat
                                membuat Keputusan Berbentuk Elektronis.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Keputusan Berbentuk Elektronis wajib dibuat atau
                                disampaikan terhadap Keputusan yang diproses
                                oleh sistem elektronik yang ditetapkan
                                Pemerintah Pusat.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Keputusan Berbentuk Elektronis berkekuatan hukum
                                sama dengan Keputusan yang tertulis dan berlaku
                                sejak diterimanya Keputusan tersebut oleh pihak
