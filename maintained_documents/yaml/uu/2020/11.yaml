                              _structureType: pasal
                        text: >-
                          1. Ketentuan Pasal 1 angka 4 diubah sehingga Pasal 1
                          berbunyi sebagai berikut: Pasal 1 Dalam Undang-Undang
                          ini yang dimaksud dengan: 1. Pelindungan Nelayan,
                          Pembudi Daya Ikan, dan Petambak Garam adalah segala
                          upaya untuk membantu Nelayan, Pembudi Daya Ikan, dan
                          Petambak Garam dalam menghadapi permasalahan kesulitan
                          melakukan Usaha Perikanan atau Usaha Pergaraman. 2.
                          Pemberdayaan Nelayan, Pembudi Daya Ikan, dan Petambak
                          Garam adalah segala upaya untuk meningkatkan kemampuan
                          Nelayan, Pembudi Daya Ikan, dan Petambak Garam untuk
                          melaksanakan Usaha Perikanan atau Usaha Pergaraman
                          secara lebih baik. 3. Nelayan adalah Setiap Orang yang
                          mata pencahariannya melakukan Penangkapan Ikan. 4.
                          Nelayan Kecil adalah orang yang mata pencahariannya
                          melakukan penangkapan ikan untuk memenuhi kebutuhan
                          hidup sehari-hari, baik yang menggunakan kapal
                          penangkap Ikan maupun yang tidak menggunakan kapal
                          penangkap Ikan. 5. Nelayan Tradisional adalah Nelayan
                          yang melakukan Penangkapan Ikan di perairan yang
                          merupakan hak Perikanan tradisional yang telah
                          dimanfaatkan secara turun-temurun sesuai dengan budaya
                          dan kearifan lokal. REPUBLIK INDONESIA - 676 - 6.
                          Nelayan Buruh adalah Nelayan yang menyediakan
                          tenaganya yang turut serta dalam usaha Penangkapan
                          Ikan. 7. Nelayan Pemilik adalah Nelayan yang memiliki
                          kapal penangkap Ikan yang digunakan dalam usaha
                          Penangkapan Ikan dan secara aktif melakukan
                          Penangkapan Ikan. 8. Penangkapan Ikan adalah kegiatan
                          untuk memperoleh Ikan di perairan yang tidak dalam
                          keadaan dibudidayakan dengan alat dan cara yang
                          mengedepankan asas keberlanjutan dan kelestarian,
                          termasuk kegiatan yang menggunakan kapal untuk memuat,
                          mengangkut, menyimpan, mendinginkan, menangani,
                          mengolah, dan/atau mengawetkannya. 9. Pembudi Daya
                          Ikan adalah Setiap Orang yang mata pencahariannya
                          melakukan Pembudidayaan Ikan air tawar, Ikan air
                          payau, dan Ikan air laut. 10. Pembudi Daya Ikan Kecil
                          adalah Pembudi Daya Ikan yang melakukan Pembudidayaan
                          Ikan untuk memenuhi kebutuhan hidup sehari-hari. 11.
                          Penggarap Lahan Budi Daya adalah Pembudi Daya Ikan
                          yang menyediakan tenaganya dalam Pembudidayaan Ikan.
                          12. Pemilik Lahan Budi Daya adalah Pembudi Daya Ikan
                          yang memiliki hak atau izin atas lahan dan secara
                          aktif melakukan kegiatan Pembudidayaan Ikan. 13.
                          Pembudidayaan Ikan adalah kegiatan untuk memelihara,
                          membesarkan, dan/atau membiakkan Ikan serta memanen
                          hasilnya dalam lingkungan yang terkontrol, termasuk
                          kegiatan yang menggunakan kapal untuk memuat,
                          mengangkut, menyimpan, mendinginkan, menangani,
                          mengolah, dan/atau mengawetkannya. 14. Petambak Garam
                          adalah Setiap Orang yang melakukan kegiatan Usaha
                          Pergaraman. 15.Petambak Garam Kecil adalah Petambak
                          Garam yang melakukan Usaha Pergaraman pada lahannya
                          sendiri dengan luas lahan paling luas 5 (lima) hektare
                          dan perebus Garam. REPUBLIK INDONESIA - 677 - 16.
                          Penggarap Tambak Garam adalah Petambak Garam yang
                          menyediakan tenaganya dalam Usaha Pergaraman. 17.
                          Pemilik Tambak Garam adalah Petambak Garam yang
                          memiliki hak atas lahan yang digunakan untuk produksi
                          Garam dan secara aktif melakukan Usaha Pergaraman. 18.
                          Ikan adalah segala jenis organisme yang seluruh atau
                          sebagian dari siklus hidupnya berada di dalam
                          lingkungan perairan. 19. Garam adalah senyawa kimia
                          yang komponen utamanya berupa natrium klorida dan
                          dapat mengandung unsur lain, seperti magnesium,
                          kalsium, besi, dan kalium dengan bahan tambahan atau
                          tanpa bahan tambahan iodium. 20. Perikanan adalah
                          semua kegiatan yang berhubungan dengan pengelolaan dan
                          pemanfaatan sumber daya Ikan dan lingkungannya mulai
                          dari praproduksi, produksi, pascaproduksi, dan
                          pengolahan sampai dengan pemasaran yang dilaksanakan
                          dalam suatu sistem bisnis Perikanan. 21. Pergaraman
                          adalah semua hal yang berhubungan dengan praproduksi,
                          produksi, pascaproduksi, pengolahan, dan pemasaran
                          Garam. 22.Usaha Perikanan adalah kegiatan yang
                          dilaksanakan dengan sistem bisnis Perikanan yang
                          meliputi praproduksi, produksi, pascaproduksi,
                          pengolahan, dan pemasaran. 23. Usaha Pergaraman adalah
                          kegiatan yang dilaksanakan dengan sistem bisnis
                          Pergaraman yang meliputi praproduksi, produksi,
                          pascaproduksi, pengolahan, dan pemasaran. 24.
                          Komoditas Perikanan adalah hasil dari Usaha Perikanan
                          yang dapat diperdagangkan, disimpan, dan/atau
                          dipertukarkan. 25.Komoditas Pergaraman adalah hasil
                          dari Usaha Pergaraman yang dapat diperdagangkan,
                          disimpan, dan/atau dipertukarkan. 26. Setiap Orang
                          adalah orang perseorangan atau korporasi, baik yang
                          berbentuk badan hukum maupun yang tidak berbadan
                          hukum. REPUBLIK INDONESIA -678 - 27. Pelaku Usaha
                          adalah orang perseorangan atau korporasi yang
                          melakukan usaha prasarana dan/atau sarana produksi
                          Perikanan, prasarana dan/atau sarana produksi Garam,
                          pengolahan, dan pemasaran hasil Perikanan, serta
                          produksi Garam yang berkedudukan di wilayah hukum
                          Republik Indonesia. 28. Kelembagaan adalah lembaga
                          yang ditumbuhkembangkan dari, oleh, dan untuk Nelayan,
                          Pembudi Daya Ikan, atau Petambak Garam atau
                          berdasarkan budaya dan kearifan lokal. 29. Asuransi
                          Perikanan adalah perjanjian antara Nelayan atau
                          Pembudi Daya Ikan dan pihak perusahaan asuransi untuk
                          mengikatkan diri dalam pertanggungan risiko
                          Penangkapan Ikan atau Pembudidayaan Ikan. 30. Asuransi
                          Pergaraman adalah perjanjian antara Petambak Garam dan
                          pihak perusahaan asuransi untuk mengikatkan diri dalam
                          pertanggungan risiko Usaha Pergaraman. 31. Penjaminan
                          adalah kegiatan pemberian jaminan oleh perusahaan
                          penjaminan atas pemenuhan kewajiban finansial Nelayan,
                          Pembudi Daya Ikan, dan Petambak Garam kepada
                          perusahaan pembiayaan dan bank. 32. Pemerintah Pusat
                          adalah Presiden Republik Indonesia yang memegang
                          kekuasaan pemerintahan negara Republik Indonesia yang
                          dibantu oleh Wakil Presiden dan menteri sebagaimana
                          dimaksud dalam Undang-Undang Dasar Negara Republik
                          Indonesia Tahun 1945. 33. Pemerintah Daerah adalah
                          kepala daerah sebagai unsur penyelenggara pemerintahan
                          daerah yang memimpin pelaksanaan urusan pemerintahan
                          yang menjadi kewenangan daerah otonom. 34. Menteri
                          adalah menteri yang menyelenggarakan urusan
                          pemerintahan di bidang kelautan dan Perikanan.
