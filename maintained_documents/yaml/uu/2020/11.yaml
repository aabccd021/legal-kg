                                dalam pelaksanaan penataan ruang nasional
                                meliputi: a. perencanaan tata ruang wilayah
                                nasional, b. pemanfaatan ruang wilayah nasional,
                                dan Cc. pengendalian pemanfaatan ruang wilayah
                                nasional. 3) Wewenang g Pemerintah Pusat dalam p
                                pelaksanaan penataan ruang kawasan strategis
                                nasional meliputi: a. penetapan kawasan
                                strategis nasional, b. perencanaan tata ruang
                                kawasan strategis nasional, Cc. pemanfaatan
