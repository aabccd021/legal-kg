                                1 Dalam Undang-Undang ini yang dimaksud dengan:
                                1. Bangunan gedung adalah wujud fisik hasil
                                pekerjaan konstruksi yang menyatu dengan tempat
                                kedudukannya, sebagian atau seluruhnya berada di
                                atas dan/atau di dalam tanah dan/atau air, yang
                                berfungsi sebagai tempat manusia melakukan
                                kegiatannya, baik untuk hunian atau tempat
                                tinggal, kegiatan keagamaan, kegiatan usaha,
                                kegiatan sosial, budaya, maupun kegiatan khusus.
                                REPUBLIK INDONESIA - 99 - 2. Penyelenggaraan
                                bangunan gedung adalah kegiatan pembangunan yang
                                meliputi perencanaan teknis dan pelaksanaan
                                konstruksi, serta kegiatan pemanfaatan,
                                pelestarian, dan pembongkaran. 3. Pemanfaatan
                                bangunan gedung adalah kegiatan memanfaatkan
                                bangunan gedung sesuai dengan fungsi yang telah
                                ditetapkan, termasuk kegiatan pemeliharaan,
                                perawatan, dan pemeriksaan secara berkala. 4.
                                Pemeliharaan adalah kegiatan menjaga keandalan
                                bangunan gedung beserta prasarana dan sarananya
                                agar selalu laik fungsi. S5. Perawatan adalah
                                kegiatan memperbaiki dan/atau mengganti bagian
                                bangunan gedung, komponen, bahan bangunan,
                                dan/atau prasarana dan sarana agar bangunan
                                gedung tetap laik fungsi. 6. Pemeriksaan berkala
                                adalah kegiatan pemeriksaan keandalan seluruh
                                atau sebagian bangunan gedung, komponen, bahan
                                bangunan, dan/atau prasarana dan sarananya dalam
                                tenggang waktu tertentu guna menyatakan kelaikan
                                fungsi bangunan gedung. 7. Pelestarian adalah
                                kegiatan perawatan, pemugaran, serta
                                pemeliharaan bangunan gedung dan lingkungannya
                                untuk mengembalikan keandalan bangunan tersebut
                                sesuai dengan aslinya atau sesuai dengan keadaan
                                menurut periode yang dikehendaki. 8.
                                Pembongkaran adalah kegiatan membongkar atau
                                merobohkan seluruh atau sebagian bangunan
                                gedung, komponen, bahan bangunan, dan/atau
                                prasarana dan sarananya. 9. Pemilik bangunan
                                gedung adalah orang, badan hukum, kelompok
                                orang, atau perkumpulan, yang menurut hukum sah
                                sebagai pemilik bangunan gedung. 10. Pengguna
                                bangunan gedung adalah pemilik bangunan gedung
                                dan/atau bukan pemilik bangunan gedung
                                berdasarkan kesepakatan dengan pemilik bangunan
                                gedung, yang menggunakan dan/atau mengelola
                                bangunan gedung atau bagian bangunan gedung
                                sesuai dengan fungsi yang ditetapkan. REPUBLIK
                                INDONESIA - 100 - 11. Pengkaji Teknis adalah
                                orang perseorangan atau badan usaha, baik yang
                                berbadan hukum maupun tidak berbadan hukum, yang
                                mempunyai sertifikat kompetensi kerja
                                kualifikasi ahli atau sertifikat badan usaha
                                untuk melaksanakan pengkajian teknis atas
                                kelaikan fungsi Bangunan Gedung. 12. Masyarakat
                                adalah perseorangan, kelompok, badan hukum atau
                                usaha, dan lembaga atau organisasi yang
                                kegiatannya di bidang bangunan gedung, termasuk
                                masyarakat hukum adat dan masyarakat ahli, yang
                                berkepentingan dengan penyelenggaraan bangunan
                                gedung. 13. Prasarana dan sarana bangunan gedung
                                adalah fasilitas kelengkapan di dalam dan di
                                luar bangunan gedung yang mendukung pemenuhan
                                terselenggaranya fungsi bangunan gedung. 14.
                                Pemerintah Pusat adalah Presiden Republik
                                Indonesia yang memegang kekuasaan pemerintahan
                                negara Republik Indonesia yang dibantu oleh
                                Wakil Presiden dan menteri sebagaimana dimaksud
                                dalam Undang- Undang Dasar Negara Republik
                                Indonesia Tahun 1945. 15. Pemerintah Daerah
                                adalah kepala daerah sebagai unsur penyelenggara
                                Pemerintahan Daerah yang memimpin pelaksanaan
                                urusan pemerintahan yang menjadi kewenangan
                                daerah otonom. 16. Penyedia Jasa Konstruksi
                                adalah pemberi layanan Jasa Konstruksi. 17.
                                Profesi Ahli adalah seseorang yang telah
                                memenuhi standar kompetensi dan ditetapkan oleh
                                lembaga yang diakreditasi oleh Pemerintah Pusat.
                                18. Penilik Bangunan Gedung yang selanjutnya
                                disebut Penilik adalah orang perseorangan yang
                                memiliki kompetensi, yang diberi tugas oleh
                                Pemerintah Pusat atau Pemerintah Daerah sesuai
                                dengan kewenangannya untuk melakukan inspeksi
                                terhadap penyelenggaraan Bangunan Gedung.
