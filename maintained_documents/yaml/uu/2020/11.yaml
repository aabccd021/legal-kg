                                    _structureType: pasal
                              text: >-
                                3. Ketentuan Pasal 12 diubah sehingga berbunyi
                                sebagai berikut: Pasal 12 Setiap orang dilarang:
                                REPUBLIK INDONESIA - 203 - a. melakukan
                                penebangan pohon dalam kawasan hutan yang tidak
                                sesuai dengan Perizinan Berusaha terkait
                                pemanfaatan hutan, b. melakukan penebangan pohon
                                dalam kawasan hutan tanpa memiliki Perizinan
                                Berusaha dari Pemerintah Pusat, c. melakukan
                                penebangan pohon dalam kawasan hutan secara
                                tidak sah: d. memuat, membongkar, mengeluarkan,
                                mengangkut, menguasai, dan/atau memiliki hasil
                                penebangan di kawasan hutan tanpa Perizinan
                                Berusaha dari Pemerintah Pusat: e. mengangkut,
                                menguasai, atau memiliki hasil hutan kayu yang
                                tidak dilengkapi secara bersama surat keterangan
                                sahnya hasil hutan: f. membawa alat-alat yang
                                lazim digunakan untuk menebang, memotong, atau
                                membelah pohon di dalam kawasan hutan tanpa
                                Perizinan Berusaha dari Pemerintah Pusat: g.
                                membawa alat-alat berat dan/atau alat-alat
                                lainnya yang lazim atau patut diduga akan
                                digunakan untuk mengangkut hasil hutan di dalam
                                kawasan hutan tanpa Perizinan Berusaha dari
                                Pemerintah Pusat, h. memanfaatkan hasil hutan
                                kayu yang diduga berasal dari hasil pembalakan
                                liar, i. mengedarkan kayu hasil pembalakan liar
                                melalui darat, perairan, atau udara, j.
                                menyelundupkan kayu yang berasal dari atau masuk
                                ke wilayah Negara Kesatuan Republik Indonesia
                                melalui sungai, darat, laut, atau udara, k.
                                menerima, membeli, menjual, menerima tukar,
                                menerima titipan, dan/atau memiliki hasil hutan
                                yang diketahui berasal dari pembalakan liar, l.
                                membeli, memasarkan, dan/atau mengolah hasil
                                hutan kayu yang berasal dari kawasan hutan yang
                                diambil atau dipungut secara tidak sah, dan/atau
                                REPUBLIK INDONESIA - 204 - m. menerima, menjual,
                                menerima tukar, menerima titipan, menyimpan,
                                dan/atau memiliki hasil hutan kayu yang berasal
                                dari kawasan hutan yang diambil atau dipungut
                                secara tidak sah.
