                                    _structureType: pasal
                                - start: 93
                                  end: 100
                                  node:
                                    _key: 1
                                    parentDocument: *ref_0
                                    _structureType: pasal
                              text: >-
                                1. Ketentuan Pasal 1 angka 11 dan angka 19
                                diubah sehingga Pasal 1 berbunyi sebagai
                                berikut: Pasal 1 Dalam Undang-Undang ini yang
                                dimaksud dengan: 1. Ibadah Haji adalah rukun
                                Islam kelima bagi orang Islam yang mampu untuk
                                melaksanakan serangkaian ibadah tertentu di
                                Baitullah, masyair, serta tempat, waktu, dan
                                syarat tertentu. 2. Ibadah Umrah adalah
                                berkunjung ke Baitullah di luar musim haji
                                dengan niat melaksanakan umrah yang dilanjutkan
                                dengan melakukan tawaf, sai, dan tahalul. 3.
                                Penyelenggaraan Ibadah Haji dan Umrah adalah
                                kegiatan perencanaan, pengorganisasian,
                                pelaksanaan, pengawasan, evaluasi, serta
                                pelaporan Ibadah Haji dan Ibadah Umrah. 4.
                                Jemaah Haji adalah warga negara yang beragama
                                Islam dan telah mendaftarkan diri untuk
                                menunaikan Ibadah Haji sesuai dengan persyaratan
                                yang ditetapkan. REPUBLIK INDONESIA -493 - 5.
                                Jemaah Haji Reguler adalah Jemaah Haji yang
                                menjalankan Ibadah Haji yang diselenggarakan
                                oleh Menteri. 6. Jemaah Haji Khusus adalah
                                Jemaah Haji yang menjalankan Ibadah Haji yang
                                diselenggarakan oleh penyelenggara Ibadah Haji
                                khusus. 7. Jemaah Umrah adalah seseorang yang
                                melaksanakan Ibadah Umrah. 8. Penyelenggaraan
                                Ibadah Haji Reguler adalah Penyelenggaraan
                                Ibadah Haji yang dilaksanakan oleh Menteri
                                dengan pengelolaan, pembiayaan, dan pelayanan
                                yang bersifat umum. 9. Petugas Penyelenggara
                                Ibadah Haji yang selanjutnya disingkat PPIH
                                adalah petugas yang diangkat dan/atau ditetapkan
                                oleh Menteri yang bertugas melakukan pembinaan,
                                pelayanan dan pelindungan, serta pengendalian
                                dan pengoordinasian pelaksanaan operasional
                                Ibadah Haji di dalam negeri dan/atau di Arab
                                Saudi. 10. Penyelenggaraan Ibadah Haji Khusus
                                adalah Penyelenggaraan Ibadah Haji yang
                                dilaksanakan oleh penyelenggara Ibadah Haji
                                khusus dengan pengelolaan, pembiayaan, dan
                                pelayanan yang bersifat khusus. 11.
                                Penyelenggara Ibadah Haji Khusus yang
                                selanjutnya disingkat PIHK adalah badan hukum
                                yang memiliki Perizinan Berusaha untuk
                                melaksanakan Ibadah Haji khusus. 12. Biaya
                                Perjalanan Ibadah Haji yang selanjutnya disebut
                                Bipih adalah sejumlah uang yang harus dibayar
                                oleh warga negara yang akan menunaikan Ibadah
                                Haji. 13. Biaya Penyelenggaraan Ibadah Haji yang
                                selanjutnya disingkat BPIH adalah sejumlah dana
                                yang digunakan untuk operasional Penyelenggaraan
                                Ibadah Haji. 14. Nilai Manfaat adalah dana yang
                                diperoleh dari hasil pengembangan keuangan haji
                                yang dilakukan melalui penempatan dan/atau
                                investasi. REPUBLIK INDONESIA - 494 - 15. Dana
                                Efisiensi adalah dana yang diperoleh dari hasil
                                efisiensi biaya operasional penyelenggaraan
                                Ibadah Haji. 16. Biaya Perjalanan Ibadah Haji
                                Khusus yang selanjutnya disebut Bipih Khusus
                                adalah sejumlah uang yang harus dibayar oleh
                                Jemaah Haji yang akan menunaikan Ibadah Haji
                                khusus. 17. Bank Penerima Setoran Biaya
                                Perjalanan Ibadah Haji yang selanjutnya
                                disingkat BPS Bipih adalah bank umum syariah
                                dan/atau unit usaha syariah yang ditunjuk oleh
                                Badan Pengelola Keuangan Haji. 18. Setoran
                                Jemaah adalah sejumlah uang yang diserahkan oleh
                                Jemaah Haji melalui BPS Bipih. 19. Penyelenggara
                                Perjalanan Ibadah Umrah yang selanjutnya
                                disingkat PPIU adalah biro perjalanan wisata
                                yang memiliki Perizinan Berusaha untuk
                                menyelenggarakan perjalanan Ibadah Umrah. 20.
                                Kelompok Bimbingan Ibadah Haji dan Umrah yang
                                selanjutnya disingkat KBIHU adalah kelompok yang
                                menyelengarakan bimbingan Ibadah Haji dan Umrah
                                yang telah memenuhi Perizinan Berusaha.
