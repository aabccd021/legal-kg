                          dimaksud pada ayat (1) huruf a dan lembaga pelatihan
                          kerja perusahaan sebagaimana dimaksud pada ayat (1)
                          huruf c mendaftarkan kegiatannya kepada instansi yang
                          bertanggung jawab di bidang ketenagakerjaan di
                          kabupaten/kota.
