                      _nomorKey: 3
                      _pasalKeys: []
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          3. Di antara Bab VII dan Bab VIII disisipkan 1 (satu)
                          bab, yakni Bab VIIA sehingga berbunyi sebagai berikut:
                          BAB VIIA KEBIJAKAN FISKAL NASIONAL YANG BERKAITAN
                          DENGAN PAJAK DAN RETRIBUSI
                    - _type: amendPoint
                      _operation: insert
                      _nomorKey: 4
                      _pasalKeys:
                        - 156A
                        - 156B
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          4. Di antara Pasal 156 dan Pasal 157 disisipkan 2
                          (dua) pasal yaitu Pasal 156A dan Pasal 156B sehingga
                          berbunyi sebagai berikut: Pasal 156A (1) Dalam rangka
                          pelaksanaan kebijakan fiskal nasional dan untuk
                          mendukung kebijakan kemudahan berinvestasi serta untuk
                          mendorong pertumbuhan industri dan/atau usaha yang
                          berdaya saing tinggi serta memberikan pelindungan dan
                          pengaturan yang berkeadilan, Pemerintah sesuai dengan
                          program prioritas nasional dapat melakukan penyesuaian
                          terhadap kebijakan Pajak dan Retribusi yang ditetapkan
                          oleh Pemerintah Daerah. (2) Kebijakan fiskal nasional
                          yang berkaitan dengan Pajak dan Retribusi sebagaimana
                          dimaksud pada ayat (1) berupa: a. dapat mengubah tarif
                          Pajak dan tarif Retribusi dengan penetapan tarif Pajak
                          dan tarif Retribusi yang berlaku secara nasional, dan
                          b. pengawasan dan evaluasi terhadap Peraturan Daerah
                          mengenai Pajak dan Retribusi yang menghambat ekosistem
                          investasi dan kemudahan dalam berusaha. (3) Penetapan
                          tarif Pajak yang berlaku secara nasional sebagaimana
                          dimaksud pada ayat (2) huruf a mencakup tarif atas
                          jenis Pajak Provinsi dan jenis Pajak Kabupaten/Kota
                          yang diatur dalam Pasal 2. (4) Penetapan tarif
                          Retribusi yang berlaku secara nasional sebagaimana
                          dimaksud pada ayat (2) huruf a mencakup objek
                          Retribusi sebagaimana dimaksud dalam Pasal 108. (5)
                          Ketentuan mengenai tata cara penetapan tarif Pajak dan
                          tarif Retribusi yang berlaku secara nasional
                          sebagaimana dimaksud pada ayat (1) diatur lebih lanjut
                          dalam Peraturan Pemerintah. Pasal 156B (1) Dalam
                          mendukung kebijakan kemudahan berinvestasi,
                          gubernur/bupati/wali kota dapat memberikan insentif
                          fiskal kepada pelaku usaha di daerahnya. (2) Insentif
                          fiskal sebagaimana dimaksud pada ayat (1) berupa
                          pengurangan, keringanan, dan pembebasan, atau
                          penghapusan pokok pajak dan/atau sanksinya. (3)
                          Insentif fiskal sebagaimana dimaksud pada ayat (2)
                          dapat diberikan atas permohonan wajib pajak atau
                          diberikan secara jabatan oleh kepala daerah
                          berdasarkan pertimbangan yang rasional. (4) Pemberian
                          insentif fiskal sebagaimana dimaksud pada ayat (2)
                          diberitahukan kepada DPRD dengan melampirkan
                          pertimbangan kepala daerah dalam memberikan insentif
                          fiskal tersebut. (5) Pemberian insentif fiskal
                          sebagaimana dimaksud pada ayat (2) ditetapkan dengan
                          Peraturan Kepala Daerah.
                    - _type: amendPoint
                      _operation: insert
                      _nomorKey: 5
                      _pasalKeys:
                        - '157'
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          5. Di antara Pasal 157 ayat (5) dan ayat (6)
                          disisipkan 1 (satu) ayat, yakni ayat (Sa) sehingga
                          berbunyi sebagai berikut: Pasal 157 (1) Rancangan
                          Peraturan Daerah provinsi tentang Pajak dan Retribusi
                          yang telah disetujui bersama oleh gubernur dan DPRD
                          provinsi sebelum ditetapkan disampaikan kepada Menteri
                          Dalam Negeri dan Menteri Keuangan paling lambat 3
                          (tiga) hari kerja terhitung sejak tanggal persetujuan
                          dimaksud. (2) Rancangan Peraturan Daerah
                          kabupaten/kota tentang Pajak dan Retribusi yang telah
                          disetujui bersama oleh bupati/wali kota dan DPRD
                          kabupaten/kota sebelum ditetapkan disampaikan kepada
                          gubernur, Menteri Dalam Negeri, dan Menteri Keuangan
                          paling lambat 3 (tiga) hari kerja terhitung sejak
                          tanggal persetujuan dimaksud. (3) Menteri Dalam Negeri
                          melakukan evaluasi terhadap Rancangan Peraturan Daerah
                          sebagaimana dimaksud pada ayat (1) untuk menguji
                          kesesuaian Rancangan Peraturan Daerah dengan ketentuan
                          Undang-Undang ini, kepentingan umum, dan/atau
                          peraturan perundang-undangan lain yang lebih tinggi.
                          (4) Gubernur melakukan evaluasi terhadap Rancangan
                          Peraturan Daerah sebagaimana dimaksud pada ayat (2)
                          untuk menguji kesesuaian Rancangan Peraturan Daerah
                          dengan ketentuan Undang-Undang ini, kepentingan umum,
                          dan/atau peraturan perundang- undangan lain yang lebih
                          tinggi. (S5) Menteri Dalam Negeri dan gubernur dalam
                          melakukan evaluasi sebagaimana dimaksud pada ayat (3)
                          dan ayat (4) berkoordinasi dengan Menteri Keuangan.
                          (Sa) Dalam pelaksanaan koordinasi sebagaimana dimaksud
                          pada ayat (5), Menteri Keuangan melakukan evaluasi
                          dari sisi kebijakan fiskal nasional. (6) Hasil
                          evaluasi yang telah dikoordinasikan dengan Menteri
                          Keuangan sebagaimana dimaksud pada ayat (5) dapat
                          berupa persetujuan atau penolakan. (7) Hasil evaluasi
                          sebagaimana dimaksud pada ayat (7) disampaikan oleh
                          Menteri Dalam Negeri kepada gubernur untuk Rancangan
                          Peraturan Daerah provinsi dan oleh gubernur kepada
                          bupati/wali kota untuk Rancangan Peraturan Daerah
                          kabupaten/kota dalam jangka waktu paling lambat 15
                          (lima belas) hari kerja sejak diterimanya Rancangan
                          Peraturan Daerah dimaksud dengan tembusan kepada
                          Menteri Keuangan. (8) Hasil evaluasi berupa penolakan
                          sebagaimana dimaksud pada ayat (7) disampaikan dengan
                          disertai alasan penolakan. (9) Dalam hal hasil
                          evaluasi berupa persetujuan sebagaimana dimaksud pada
                          ayat (7), Rancangan Peraturan Daerah dimaksud dapat
                          langsung ditetapkan. (10) Dalam hal hasil evaluasi
                          berupa penolakan sebagaimana dimaksud pada ayat (7),
                          Rancangan Peraturan Daerah dimaksud dapat diperbaiki
                          oleh gubernur, bupati/wali kota bersama DPRD yang
                          bersangkutan, untuk kemudian disampaikan kembali
                          kepada Menteri Dalam Negeri dan Menteri Keuangan untuk
                          Rancangan Peraturan Daerah provinsi dan kepada
                          gubernur dan Menteri Keuangan untuk Rancangan
                          Peraturan Daerah kabupaten/kota.
                    - _type: amendPoint
                      _operation: update
                      _nomorKey: 6
                      _pasalKey: '158'
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
