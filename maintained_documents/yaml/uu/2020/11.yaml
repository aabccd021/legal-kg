                          text: >-
                            Untuk memberikan kemudahan bagi masyarakat terutama
                            Pelaku Usaha dalam mendapatkan Perizinan Berusaha
                            dari sektor keagamaan, beberapa ketentuan dalam
                            Undang- Undang Nomor 8 Tahun 2019 tentang
                            Penyelenggaraan Ibadah Haji dan Umrah (Lembaran
                            Negara Republik Indonesia Tahun 2019 Nomor 75,
                            Tambahan Lembaran Negara Republik Indonesia Nomor
                            6388) diubah sebagai berikut:
                        isi:
                          - _type: amendPoint
                            _operation: update
                            _nomorKey: 1
                            _pasalKey: '1'
                            isi:
                              _type: referenceText
                              references:
                                - start: 13
                                  end: 20
                                  node:
                                    _key: 1
