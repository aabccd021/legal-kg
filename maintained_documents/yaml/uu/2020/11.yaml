                                ratus juta rupiah). (8) Setiap orang yang dengan
                                sengaja melanggar ketentuan sebagaimana dimaksud
                                dalam Pasal 50 ayat (2) huruf e diancam dengan
                                pidana penjara paling lama 3 (tiga) bulan dan
                                denda paling banyak Rp10.000.000,00 (sepuluh
                                juta rupiah). REPUBLIK INDONESIA -198 - (9)
                                Setiap orang yang dengan sengaja melanggar
                                ketentuan sebagaimana dimaksud dalam Pasal 50
                                ayat (2) huruf f diancam dengan pidana penjara
                                paling lama 3 (tiga) tahun dan denda paling
                                banyak Rp2.000.000.000,00 (dua miliar rupiah).
                                (10) Setiap orang yang dengan sengaja melanggar
                                ketentuan sebagaimana dimaksud dalam Pasal 50
                                ayat (2) huruf g diancam dengan pidana penjara
                                paling lama 1 (satu) tahun dan denda paling
                                banyak Rp100.000.000,00 (seratus juta rupiah).
                                (11) Tindak pidana sebagaimana dimaksud dalam
                                Pasal 50 ayat (1) dan ayat (2) apabila dilakukan
                                oleh korporasi dan/atau atas nama korporasi,
                                korporasi dan pengurusnya dikenai pidana dengan
                                pemberatan 1/3 (sepertiga) dari denda pidana
                                pokok. (12) Semua hasil hutan dari hasil
                                kejahatan dan pelanggaran dan/atau alat-alat
                                termasuk alat angkutnya yang dipergunakan untuk
                                melakukan kejahatan dan/atau pelanggaran
                                sebagaimana dimaksud dalam pasal ini dirampas
                                untuk negara.
