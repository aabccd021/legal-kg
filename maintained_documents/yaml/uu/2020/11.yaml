                          dengan kewenangannya memberikan insentif dalam bentuk
                          kemudahan persyaratan perizinan, keringanan tarif
                          sarana dan prasarana, dan bentuk insentif lainnya yang
                          sesuai dengan ketentuan peraturan perundang- undangan
                          kepada Dunia Usaha yang menyediakan pembiayaan bagi
                          Usaha Mikro dan Kecil.
