                  _type: referenceText
                  references:
                    - start: 132
                      end: 140
                      node:
                        _key: 4
                        parentPasal: *ref_109
                        _structureType: ayat
                  text: >-
                    Ketentuan lebih lanjut mengenai sanksi administratif lainnya
                    dan tata cara pengenaan sanksi administratif sebagaimana
                    dimaksud pada ayat (4) diatur dalam Peraturan Pemerintah.
        - _type: pasal
          _key: 178
          isi:
