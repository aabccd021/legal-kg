                                      pemilik dan/atau pengguna bangunan gedung
                                      setelah bangunan gedung tersebut
                                      mendapatkan sertifikat laik fungsi.
                                - _type: ayat
                                  _key: 2
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      Sertifikat laik fungsi sebagaimana
                                      dimaksud pada ayat (1) diterbitkan oleh
                                      Pemerintah Pusat atau Pemerintah Daerah
                                      sesuai kewenangannya berdasarkan surat
                                      pernyataan kelaikan fungsi yang diajukan
                                      oleh Penyedia Jasa Pengawasan atau
                                      Manajemen Konstruksi kepada Pemerintah
                                      Pusat atau Pemerintah Daerah sesuai
                                      kewenangannya melalui sistem elektronik
                                      yang diselenggarakan oleh Pemerintah
                                      Pusat, berdasarkan norma, standar,
                                      prosedur, dan kriteria yang ditetapkan
