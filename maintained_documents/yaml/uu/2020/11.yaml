                        text: >-
                          1. Ketentuan Pasal 1A diubah sehingga berbunyi sebagai
                          berikut: Pasal 1A (1) Yang termasuk dalam pengertian
                          penyerahan Barang Kena Pajak adalah: a. penyerahan hak
                          atas Barang Kena Pajak karena suatu perjanjian, b.
                          pengalihan Barang Kena Pajak karena suatu perjanjian
                          sewa beli dan/atau perjanjian sewa guna usaha
                          (leasing), Cc. penyerahan Barang Kena Pajak kepada
                          pedagang perantara atau melalui juru lelang, d.
                          pemakaian sendiri dan/atau pemberian cuma- cuma atas
                          Barang Kena Pajak, e. Barang Kena Pajak berupa
                          persediaan dan/atau aktiva yang menurut tujuan semula
                          tidak untuk diperjualbelikan, yang masih tersisa pada
                          saat pembubaran perusahaan, f. ' penyerahan Barang
                          Kena Pajak dari pusat ke cabang atau sebaliknya
                          dan/atau penyerahan Barang Kena Pajak antarcabang, SK
                          No 052136 A REPUBLIK INDONESIA - 634 - g. dihapus, dan
                          h. penyerahan Barang Kena Pajak oleh Pengusaha Kena
                          Pajak dalam rangka perjanjian pembiayaan yang
                          dilakukan berdasarkan prinsip syariah, yang
                          penyerahannya dianggap langsung dari Pengusaha Kena
                          Pajak kepada pihak yang membutuhkan Barang Kena Pajak.
                          (2) Yang tidak termasuk dalam pengertian penyerahan
                          Barang Kena Pajak adalah: a. penyerahan Barang Kena
                          Pajak kepada makelar sebagaimana dimaksud dalam Kitab
                          Undang-Undang Hukum Dagang, b. penyerahan Barang Kena
                          Pajak untuk jaminan utang-piutang, Cc. penyerahan
                          Barang Kena Pajak sebagaimana dimaksud pada ayat (1)
                          huruf f dalam hal Pengusaha Kena Pajak melakukan
                          pemusatan tempat pajak terutang, d. pengalihan Barang
                          Kena Pajak dalam rangka penggabungan, peleburan,
                          pemekaran, pemecahan, dan pengambilalihan usaha, serta
                          pengalihan Barang Kena Pajak untuk tujuan setoran
                          modal pengganti saham, dengan syarat pihak yang
                          melakukan pengalihan dan yang menerima pengalihan
                          adalah Pengusaha Kena Pajak, dan e. Barang Kena Pajak
                          berupa aktiva yang menurut tujuan semula tidak untuk
                          diperjualbelikan, yang masih tersisa pada saat
                          pembubaran perusahaan, dan yang Pajak Masukan atas
                          perolehannya tidak dapat dikreditkan sebagaimana
                          dimaksud dalam Pasal 9 ayat (8) huruf b dan huruf c.
