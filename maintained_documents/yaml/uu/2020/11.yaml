                        text: >-
                          45. Ketentuan Pasal 157 diubah sehingga berbunyi
                          sebagai berikut: REPUBLIK INDONESIA - 558 - Pasal 157
                          (1) Komponen upah yang digunakan sebagai dasar
                          perhitungan uang pesangon dan uang penghargaan masa
                          kerja terdiri atas: a. upah pokok, dan b. tunjangan
                          tetap yang diberikan kepada pekerja/buruh dan
                          keluarganya. (2) Dalam hal penghasilan pekerja/ buruh
                          dibayarkan atas dasar perhitungan harian, upah sebulan
                          sama dengan 30 (tiga puluh) dikalikan upah sehari. (3)
                          Dalam hal upah pekerja/buruh dibayarkan atas dasar
                          perhitungan satuan hasil, upah sebulan sama dengan
                          penghasilan rata-rata dalam 12 (dua belas) bulan
                          terakhir. (4) Dalam hal upah sebulan sebagaimana
                          dimaksud pada ayat (3) lebih rendah dari upah minimum,
                          upah yang menjadi dasar perhitungan pesangon adalah
                          upah minimum yang berlaku di wilayah domisili
                          perusahaan.
