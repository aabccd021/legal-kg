                              text: >-
                                1. Ketentuan Pasal 1 angka 14, angka 40, dan
                                angka 41 diubah, di antara angka 14 dan angka 15
                                disisipkan satu angka yakni angka 14A, serta
                                angka 17, angka 18, dan angka 18A dihapus
                                sehingga Pasal 1 berbunyi sebagai berikut: Pasal
                                1 Dalam Undang-Undang ini yang dimaksud dengan:
                                1. Pengelolaan Wilayah Pesisir dan Pulau-Pulau
                                Kecil adalah suatu pengoordinasian perencanaan,
                                pemanfaatan, pengawasan, dan pengendalian sumber
                                daya pesisir dan pulau-pulau kecil yang
                                dilakukan oleh Pemerintah dan Pemerintah Daerah,
                                antarsektor, antara ekosistem darat dan laut,
                                serta antara ilmu pengetahuan dan manajemen
                                untuk meningkatkan kesejahteraan rakyat.
                                REPUBLIK INDONESIA -40 - 2. Wilayah Pesisir
                                adalah daerah peralihan antara Ekosistem darat
                                dan laut yang dipengaruhi oleh perubahan di
                                darat dan laut. 3. Pulau Kecil adalah pulau
                                dengan luas lebih kecil atau sama dengan 2.000
                                km? (dua ribu kilo meter persegi) beserta
                                kesatuan Ekosistemnya. 4. Sumber Daya Pesisir
                                dan Pulau-Pulau Kecil adalah sumber daya hayati,
                                sumber daya nonhayati: sumber daya buatan, dan
                                jasa-jasa lingkungan: sumber daya hayati
                                meliputi ikan, terumbu karang, padang lamun,
                                mangrove dan biota laut lain: sumber daya
                                nonhayati meliputi pasir, air laut, mineral
                                dasar laut, sumber daya buatan meliputi
                                infrastruktur laut yang terkait dengan kelautan
                                dan perikanan, dan jasa-jasa lingkungan berupa
                                keindahan alam, permukaan dasar laut tempat
                                instalasi bawah air yang terkait dengan kelautan
                                dan perikanan serta energi gelombang laut yang
                                terdapat di Wilayah Pesisir. 5. Ekosistem adalah
                                kesatuan komunitas tumbuh- tumbuhan, hewan,
                                organisme dan non organisme lain serta proses
                                yang menghubungkannya dalam membentuk
                                keseimbangan, stabilitas, dan produktivitas. 6.
                                Bioekoregion adalah bentang alam yang berada di
                                dalam satu hamparan kesatuan ekologis yang
                                ditetapkan oleh batas-batas alam, seperti daerah
                                aliran sungai, teluk, dan arus. 7. Perairan
                                Pesisir adalah laut yang berbatasan dengan
                                daratan meliputi perairan sejauh 12 (dua belas)
                                mil laut diukur dari garis pantai, perairan yang
                                menghubungkan pantai dan pulau-pulau, estuari,
                                teluk, perairan dangkal, rawa payau, dan laguna.
                                8. Kawasan adalah bagian Wilayah Pesisir dan
                                Pulau-Pulau Kecil yang memiliki fungsi tertentu
                                yang ditetapkan berdasarkan kriteria
                                karakteristik fisik, biologi, sosial, dan
                                ekonomi untuk dipertahankan keberadaannya. 9.
                                Kawasan Pemanfaatan Umum adalah bagian dari
                                Wilayah Pesisir yang ditetapkan peruntukkannya
                                bagi berbagai sektor kegiatan. REPUBLIK
                                INDONESIA -41 - 10. Kawasan Strategis Nasional
                                Tertentu adalah Kawasan yang terkait dengan
                                kedaulatan negara, pengendalian lingkungan
                                hidup, dan/atau situs warisan dunia, yang
                                pengembangannya diprioritaskan bagi kepentingan
                                nasional. 11. Zona adalah ruang yang
                                penggunaannya disepakati bersama antara berbagai
                                pemangku kepentingan dan telah ditetapkan status
                                hukumnya. 12. Zonasi adalah suatu bentuk
                                rekayasa teknik pemanfaatan ruang melalui
                                penetapan batas-batas fungsional sesuai dengan
                                potensi sumber daya dan daya dukung serta
                                proses-proses ekologis yang berlangsung sebagai
                                satu kesatuan dalam Ekosistem pesisir. 13.
                                Rencana Strategis adalah rencana yang memuat
                                arah kebijakan lintas sektor untuk Kawasan
                                perencanaan pembangunan melalui penetapan
                                tujuan, sasaran dan strategi yang luas, serta
                                target pelaksanaan dengan indikator yang tepat
                                untuk memantau rencana tingkat nasional. 14.
                                Rencana Zonasi yang selanjutnya disingkat RZ
                                adalah rencana yang menentukan arah penggunaan
                                sumber daya setiap satuan perencanaan disertai
                                dengan penetapan struktur dan pola ruang pada
                                Kawasan perencanaan yang memuat kegiatan yang
                                boleh dilakukan dan tidak boleh dilakukan serta
                                kegiatan yang hanya dapat dilakukan setelah
                                memperoleh Perizinan Berusaha terkait
                                pemanfaatan di laut. 14A. Rencana Zonasi Kawasan
                                Strategis Nasional Tertentu yang selanjutnya
                                disingkat RZ KSNT adalah rencana yang disusun
                                untuk menentukan arahan pemanfaatan ruang di
                                kawasan strategis nasional tertentu. 15. Rencana
                                Pengelolaan adalah rencana yang memuat susunan
                                kerangka kebijakan, prosedur, dan tanggung jawab
                                dalam rangka pengoordinasian pengambilan
                                keputusan di antara berbagai lembaga/instansi
                                pemerintah mengenai kesepakatan penggunaan
                                sumber daya atau kegiatan pembangunan di zona
                                yang ditetapkan. REPUBLIK INDONESIA “42 - 16.
                                Rencana Aksi Pengelolaan adalah tindak lanjut
                                rencana Pengelolaan Wilayah Pesisir — dan
                                Pulau-Pulau Kecil yang memuat tujuan, sasaran,
                                anggaran, dan jadwal untuk satu atau beberapa
                                tahun ke depan secara terkoordinasi untuk
                                melaksanakan berbagai kegiatan yang diperlukan
                                oleh instansi Pemerintah, Pemerintah Daerah, dan
                                pemangku kepentingan lainnya guna mencapai hasil
                                pengelolaan sumber daya pesisir dan pulau-pulau
                                kecil di setiap Kawasan perencanaan. 17.
                                Dihapus. 18. Dihapus. 18A. Dihapus. 19.
                                Konservasi Wilayah Pesisir dan Pulau-Pulau Kecil
                                adalah upaya pelindungan, pelestarian, dan
                                pemanfaatan Wilayah Pesisir dan Pulau-Pulau
                                Kecil serta ekosistemnya untuk menjamin
                                keberadaan, ketersediaan, dan kesinambungan
                                Sumber Daya Pesisir dan Pulau-Pulau Kecil dengan
                                tetap memelihara dan meningkatkan kualitas nilai
                                dan keanekaragamannya. 20. Kawasan Konservasi di
                                Wilayah Pesisir dan Pulau- Pulau Kecil adalah
                                kawasan pesisir dan pulau-pulau kecil dengan
                                ciri khas tertentu yang dilindungi untuk
                                mewujudkan Pengelolaan Wilayah Pesisir dan
                                Pulau-Pulau Kecil secara berkelanjutan. 21.
                                Sempadan Pantai adalah daratan sepanjang tepian
                                yang lebarnya proporsional dengan bentuk dan
                                kondisi fisik pantai, minimal 100 (seratus)
                                meter dari titik pasang tertinggi ke arah darat.
                                22. Rehabilitasi Sumber Daya Pesisir dan
                                Pulau-Pulau Kecil adalah proses pemulihan dan
                                perbaikan kondisi Ekosistem atau populasi yang
                                telah rusak walaupun hasilnya berbeda dari
                                kondisi semula. 23. Reklamasi adalah kegiatan
                                yang dilakukan oleh Setiap Orang dalam rangka
                                meningkatkan manfaat sumber daya lahan ditinjau
                                dari sudut lingkungan dan sosial ekonomi dengan
                                cara pengurugan, pengeringan lahan atau
                                drainase. REPUBLIK INDONESIA -43 - 24. Daya
                                Dukung Wilayah Pesisir dan Pulau-Pulau Kecil
                                adalah kemampuan Wilayah Pesisir dan Pulau-Pulau
                                Kecil untuk mendukung perikehidupan manusia dan
                                makhluk hidup lain. 25. Mitigasi Bencana adalah
                                upaya untuk mengurangi risiko bencana, baik
                                secara struktur atau fisik melalui pembangunan
                                fisik alami dan/atau buatan maupun nonstruktur
                                atau nonfisik melalui peningkatan kemampuan
                                menghadapi ancaman bencana di Wilayah Pesisir
                                dan Pulau-Pulau Kecil. 26. Bencana Pesisir
                                adalah kejadian karena peristiwa alam atau
                                karena perbuatan Setiap Orang yang menimbulkan
                                perubahan sifat fisik dan/atau hayati Pesisir
                                dan mengakibatkan korban jiwa, harta, dan/atau
                                kerusakan di Wilayah Pesisir dan Pulau- Pulau
                                Kecil. 27. Dampak Besar adalah terjadinya
                                perubahan negatif fungsi lingkungan dalam skala
                                yang luas dan intensitas lama yang diakibatkan
                                oleh suatu usaha dan/atau kegiatan di Wilayah
                                Pesisir dan Pulau- Pulau Kecil. 27A. Dampak
                                Penting dan Cakupan yang Luas serta Bernilai
                                Strategis adalah perubahan yang berpengaruh
                                terhadap kondisi biofisik seperti perubahan
                                iklim, ekosistem, dan dampak sosial ekonomi
                                masyarakat bagi kehidupan generasi sekarang dan
                                generasi yang akan datang. 28. Pencemaran
                                Pesisir adalah masuknya atau dimasukkannya
                                makhluk hidup, zat, energi, dan/atau komponen
                                lain ke dalam lingkungan Pesisir akibat adanya
                                kegiatan Setiap Orang sehingga kualitas Pesisir
                                turun sampai ke tingkat tertentu yang
                                menyebabkan lingkungan Pesisir tidak dapat
                                berfungsi sesuai dengan peruntukannya. 29.
                                Akreditasi adalah prosedur pengakuan suatu
                                kegiatan yang secara konsisten telah memenuhi
                                standar baku sistem Pengelolaan Wilayah Pesisir
                                dan Pulau-Pulau Kecil yang meliputi penilaian,
                                penghargaan, dan insentif terhadap program
                                pengelolaan yang dilakukan oleh Masyarakat
                                secara sukarela. REPUBLIK INDONESIA -44 - 30.
                                Pemangku Kepentingan Utama adalah para pengguna
                                Sumber Daya Pesisir dan Pulau-Pulau Kecil yang
                                mempunyai kepentingan langsung dalam
                                mengoptimalkan pemanfaatan Sumber Daya Pesisir
                                dan Pulau-Pulau Kecil, seperti nelayan
                                tradisional, nelayan modern, pembudi daya ikan,
                                pengusaha pariwisata, pengusaha perikanan, dan
                                Masyarakat. 31. Pemberdayaan Masyarakat adalah
                                upaya pemberian fasilitas, dorongan, atau
                                bantuan kepada Masyarakat dan nelayan
                                tradisional agar mampu menentukan pilihan yang
                                terbaik dalam memanfaatkan Sumber Daya Pesisir
                                dan Pulau- Pulau Kecil secara lestari. 32.
                                Masyarakat adalah masyarakat yang terdiri atas
                                Masyarakat Hukum Adat, Masyarakat Lokal, dan
                                Masyarakat Tradisional yang bermukim di wilayah
                                pesisir dan pulau-pulau kecil. 33. Masyarakat
                                Hukum Adat adalah sekelompok orang yang secara
                                turun-temurun bermukim di wilayah geografis
                                tertentu di Negara Kesatuan Republik Indonesia
                                karena adanya ikatan pada asal usul leluhur,
                                hubungan yang kuat dengan tanah, wilayah, sumber
                                daya alam, memiliki pranata pemerintahan adat,
                                dan tatanan hukum adat di wilayah adatnya sesuai
                                dengan ketentuan peraturan perundang-undangan.
                                34. Masyarakat Lokal adalah kelompok Masyarakat
                                yang menjalankan tata kehidupan sehari-hari
                                berdasarkan kebiasaan yang sudah diterima
                                sebagai nilai-nilai yang berlaku umum, tetapi
                                tidak sepenuhnya bergantung pada Sumber Daya
                                Pesisir dan Pulau-Pulau Kecil tertentu. 35.
                                Masyarakat Tradisional adalah Masyarakat
                                perikanan tradisional yang masih diakui hak
                                tradisionalnya dalam melakukan kegiatan
                                penangkapan ikan atau kegiatan lainnya yang sah
                                di daerah tertentu yang berada dalam perairan
                                kepulauan sesuai dengan kaidah hukum laut
                                internasional. 36. Kearifan Lokal adalah
                                nilai-nilai luhur yang masih berlaku dalam tata
                                kehidupan Masyarakat. REPUBLIK INDONESIA -45 -
                                37. Gugatan Perwakilan adalah gugatan yang
                                berupa hak kelompok kecil Masyarakat untuk
                                bertindak mewakili Masyarakat dalam jumlah besar
                                dalam upaya mengajukan tuntutan berdasarkan
                                kesamaan permasalahan, fakta hukum, dan tuntutan
                                ganti kerugian. 38. Setiap Orang adalah orang
                                perseorangan atau korporasi, baik yang berbadan
                                hukum maupun yang tidak berbadan hukum. 39.
                                Dewan Perwakilan Rakyat, selanjutnya disebut
                                DPR, adalah Dewan Perwakilan Rakyat sebagaimana
                                dimaksud dalam Undang-Undang Dasar Negara
                                Republik Indonesia Tahun 1945. 40. Pemerintah
                                Pusat adalah Presiden Republik Indonesia yang
                                memegang kekuasaan pemerintahan negara Republik
                                Indonesia yang dibantu oleh Wakil Presiden dan
                                menteri sebagaimana dimaksud dalam Undang-Undang
                                Dasar Negara Republik Indonesia Tahun 1945. 41.
                                Pemerintah Daerah adalah kepala daerah sebagai
                                unsur penyelenggara Pemerintahan Daerah yang
                                memimpin pelaksanaan urusan pemerintahan yang
                                menjadi kewenangan daerah otonom. 42.
                                Pemerintahan Daerah adalah penyelenggaraan
                                urusan pemerintahan oleh Pemerintah Daerah dan
                                dewan perwakilan rakyat daerah menurut asas
                                otonomi dan tugas pembantuan dengan prinsip
                                otonomi seluas-luasnya dalam sistem dan prinsip
                                Negara Kesatuan Republik Indonesia sebagaimana
                                dimaksud dalam Undang-Undang Dasar Negara
                                Republik Indonesia Tahun 1945. 43. Mitra Bahari
                                adalah jejaring pemangku kepentingan di bidang
                                Pengelolaan Wilayah Pesisir dan Pulau- Pulau
                                Kecil dalam penguatan kapasitas sumber daya
                                manusia, lembaga, pendidikan, penyuluhan,
                                pendampingan, pelatihan, penelitian terapan, dan
                                pengembangan rekomendasi kebijakan. 44. Menteri
                                adalah menteri yang menyelenggarakan urusan
                                pemerintahan di bidang kelautan dan perikanan.
                                REPUBLIK INDONESIA -46 -
