                              text: >-
                                1. Ketentuan Pasal 8 diubah sehingga berbunyi
                                sebagai berikut: Pasal 8 (1) Hak rakyat atas Air
                                yang dijamin pemenuhannya oleh negara
                                sebagaimana dimaksud dalam Pasal 6 merupakan
                                kebutuhan pokok minimal sehari-hari. (2) Selaan
                                hak rakyat atas Air yang dijamin pemenuhannya
                                oleh negara sebagaimana dimaksud pada ayat (1)
                                negara memprioritaskan hak rakyat atas Air
                                sebagai berikut: a. kebutuhan pokok sehari hari,
                                b. pertanian rakyat, dan C. penggunaan Sumber
                                Daya Air untuk kebutuhan usaha guna memenuhi
                                kebutuhan pokok sehari- hari melalui Sistem
                                Penyediaan Air Minum. (3) Dalam hal ketersediaan
                                Air tidak mencukupi untuk prioritas pemenuhan
                                sebagaimana dimaksud pada ayat (2), pemenuhan
                                Air untuk kebutuhan pokok sehari- hari lebih
                                diprioritaskan dari yang lainnya. REPUBLIK
                                INDONESIA - 353 - (4) Dalam hal ketersediaan Air
                                mencukupi, setelah urutan prioritas pemenuhan
                                sebagaimana dimaksud pada ayat (2), urutan
                                prioritas selanjutnya adalah: a. penggunaan
                                Sumber Daya Air guna memenuhi kegiatan bukan
                                usaha untuk kepentingan publik, dan b.
                                penggunaan Sumber Daya Air untuk kebutuhan usaha
                                lainnya yang telah ditetapkan Perizinan
                                Berusaha. (5) Pemerintah Pusat atau Pemerintah
                                Daerah sesuai dengan norma, standar, prosedur,
                                dan kriteria yang ditetapkan oleh Pemerintah
                                Pusat menetapkan urutan prioritas pemenuhan Air
                                pada Wilayah Sungai sesuai dengan kewenangannya
                                berdasarkan ketentuan sebagaimana dimaksud pada
                                ayat (2), ayat (3), dan ayat (4). (6) Dalam
                                menetapkan prioritas pemenuhan Air sebagaimana
                                dimaksud pada ayat (5), Pemerintah Pusat atau
                                Pemerintah Daerah sesuai dengan norma, standar,
                                prosedur, dan kriteria yang ditetapkan oleh
                                Pemerintah Pusat terlebih dahulu memperhitungkan
                                keperluan Air untuk pemeliharaan Sumber Air dan
                                lingkungan hidup. (7) Hak rakyat atas Air bukan
                                merupakan hak kepemilikan atas Air, melainkan
                                hanya terbatas pada hak untuk memperoleh dan
                                menggunakan sejumlah kuota Air sesuai dengan
                                alokasi yang penetapannya diatur dalam Peraturan
                                Pemerintah. (8) Ketentuan lebih lanjut mengenai
                                penggunaan Sumber Daya Air untuk memenuhi
                                kebutuhan pokok sehari- hari, pertanian rakyat,
                                dan kebutuhan usaha guna memenuhi kebutuhan
                                pokok sehari-hari melalui Sistem Penyediaan Air
                                Minum, sebagaimana dimaksud pada ayat (2), serta
                                untuk memenuhi kegiatan bukan usaha untuk
                                kepentingan publik dan kebutuhan usaha lainnya
                                sebagaimana dimaksud pada ayat (4) diatur dalam
                                Peraturan Pemerintah. REPUBLIK INDONESIA - 354 -
