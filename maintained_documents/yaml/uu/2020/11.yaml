        - _type: bagian
          _key: 6
          _judul: Bagian Keenam Kemitraan
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 90
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    (1) Pemerintah Pusat dan Pemerintah Daerah sesuai dengan
                    kewenangannya wajib memfasilitasi, mendukung, dan
                    menstimulasi kegiatan kemitraan Usaha Menengah dan Usaha
                    Besar dengan Koperasi, Usaha Mikro, dan Usaha Kecil yang
                    bertujuan untuk meningkatkan kompetensi dan level usaha. (2)
                    Kemitraan sebagaimana dimaksud pada ayat (1) mencakup proses
                    alih keterampilan di bidang produksi dan pengolahan,
                    pemasaran, permodalan, sumber daya manusia, dan teknologi.
                    (3) — Pemerintah Pusat dan Pemerintah Daerah memberikan
                    insentif dan kemudahan berusaha dalam rangka kemitraan
                    sesuai dengan ketentuan peraturan perundang-undangan. (4)
                    Pemerintah Pusat dan Pemerintah Daerah sesuai dengan
                    kewenangannya melakukan pengawasan dan evaluasi terhadap
                    pelaksanaan kemitraan antara Usaha Menengah dan Usaha Besar
                    dengan Koperasi, Usaha Mikro, dan Usaha Kecil. (5)
                    Pemerintah Pusat mengatur pemberian insentif kepada Usaha
                    Menengah dan Usaha Besar yang melakukan kemitraan dengan
                    Koperasi, Usaha Mikro, dan Usaha Kecil melalui inovasi dan
                    pengembangan produk berorientasi ekspor, penyerapan tenaga
                    kerja, penggunaan teknologi tepat guna dan ramah lingkungan,
                    serta menyelenggarakan pendidikan dan pelatihan. (6)
                    Ketentuan lebih lanjut mengenai kemitraan diatur dalam
                    Peraturan Pemerintah.
