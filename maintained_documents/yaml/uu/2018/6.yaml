      description:
        type: text
        node:
          nodeType: text
          textName: description
          parentNode: *ref_2
        textString: ''
        references: []
      elements:
        - type: point
          node: &ref_3
            nodeType: point
            key: a
            parentPointSetNode: *ref_2
          content:
            type: text
            node:
              nodeType: text
              textName: text
              parentNode: *ref_3
            textString: >-
              bahwa dalam rangka pelaksanaan pembangunan manusia Indonesia seutuhnya diperlukan
              adanya pelindungan kesehatan bagi seluruh masyarakat Indonesia yang tersebar di
              berbagai pulau besar maupun kecil yang terletak pada posisi yang sangat strategis dan
              berada pada jalur perdagangan internasional, yang berperan penting dalam lalu lintas
              orang dan barang:
            references: []
        - type: point
          node: &ref_4
            nodeType: point
            key: b
            parentPointSetNode: *ref_2
          content:
            type: text
            node:
              nodeType: text
              textName: text
              parentNode: *ref_4
            textString: >-
              bahwa kemajuan teknologi transportasi dan era perdagangan bebas dapat berisiko
              menimbulkan gangguan kesehatan dan penyakit baru atau penyakit lama yang muncul
              kembali dengan penyebaran yang lebih cepat dan berpotensi menimbulkan kedaruratan
              kesehatan masyarakat, sehingga menuntut adanya upaya cegah tangkal penyakit dan faktor
              risiko kesehatan yang komprehensif dan terkoordinasi, serta membutuhkan sumber daya,
              peran serta masyarakat, dan kerja sama internasional,
            references: []
        - type: point
          node: &ref_5
            nodeType: point
            key: c
            parentPointSetNode: *ref_2
          content:
            type: text
            node:
              nodeType: text
              textName: text
              parentNode: *ref_5
            textString: >-
              bahwa sebagai bagian dari masyarakat dunia, Indonesia berkomitmen melakukan upaya
              untuk mencegah terjadinya — kedaruratan kesehatan masyarakat yang meresahkan dunia
              sebagaimana yang diamanatkan dalam regulasi internasional di bidang kesehatan, dan
              dalam melaksanakan amanat ini Indonesia harus menghormati sepenuhnya martabat, hak
              asasi manusia, dasar-dasar kebebasan seseorang, dan penerapannya secara universal,
            references: []
        - type: point
          node: &ref_6
            nodeType: point
            key: d
            parentPointSetNode: *ref_2
          content:
            type: text
            node:
              nodeType: text
              textName: text
              parentNode: *ref_6
            textString: >-
              bahwa Undang-Undang Nomor 1 Tahun 1962 tentang Karantina Laut dan Undang-Undang Nomor
              2 Tahun 1962 tentang Karantina Udara sudah tidak sesuai lagi dengan perkembangan,
              tuntutan, dan kebutuhan hukum dalam masyarakat, sehingga perlu dicabut dan diganti
              dengan undang-undang yang baru mengenai kekarantinaan kesehatan,
            references: []
        - type: point
          node: &ref_7
            nodeType: point
            key: e
            parentPointSetNode: *ref_2
          content:
            type: text
            node:
              nodeType: text
              textName: text
              parentNode: *ref_7
            textString: >-
              bahwa berdasarkan pertimbangan sebagaimana dimaksud dalam huruf a, huruf b, huruf c,
              dan huruf d, perlu membentuk Undang-Undang tentang Kekarantinaan Kesehatan,
            references: []
