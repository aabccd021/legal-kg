                                Kekarantinaan Kesehatan di Pos Lintas Batas
                                Darat Negara sebagaimana dimaksud pada ayat (1)
                                diatur dengan Peraturan Menteri.
                    - _type: pasal
                      _key: 36
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Setelah kedatangan Kendaraan Darat, pengemudi
                                wajib memberikan dokumen Deklarasi Kesehatan
                                Perlintasan Darat (Ground Crossing Declaration
                                of Health) kepada Pejabat Karantina Kesehatan.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Kendaraan Darat yang tidak ditemukan Faktor
                                Risiko Kesehatan Masyarakat dan/atau dokumen
                                Deklarasi Kesehatan Perlintasan Darat (Ground
                                Crossing Declaration of Health) sebagaimana
                                dimaksud pada ayat (1) dinyatakan lengkap
                                diberikan Persetujuan Karantina Kesehatan oleh
                                Pejabat Karantina Kesehatan. REPUBLIK INDONESIA
                                - 24 -
              - _type: paragraf
                _key: 2
                _judul: Paragraf 2 Keberangkatan Kendaraan Darat
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 37
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Sebelum keberangkatan Kendaraan Darat, pengemudi
                                wajib melengkapi Dokumen Karantina Kesehatan
                                yang masih berlaku.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Setelah Dokumen Karantina Kesehatan sebagaimana
                                dimaksud pada ayat (1) dinyatakan lengkap dan
                                tidak ditemukan indikasi Faktor Risiko Kesehatan
                                Masyarakat maka kepada pengemudi dapat diberikan
                                Persetujuan Karantina Kesehatan.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Kendaraan Darat yang ditemukan Faktor Risiko
                                Kesehatan Masyarakat harus dilakukan tindakan
                                Kekarantinaan Kesehatan sebagaimana dimaksud
                                dalam Pasal 15 ayat (2).
        - _type: bagian
          _key: 4
          _judul: Bagian Keempat Pengawasan Awak, Personel, dan Penumpang
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 38
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Awak, Personel, dan penumpang yang Terjangkit dan/atau
                          'Terpapar berdasarkan informasi awal mengenai
                          deklarasi kesehatan, pada saat kedatangan dilakukan
                          pemeriksaan kesehatan oleh Pejabat Karantina Kesehatan
                          yang berwenang di atas Alat Angkut.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Awak, Personel, dan/atau penumpang yang Terjangkit
                          dilakukan tindakan Kekarantinaan Kesehatan sesuai
                          indikasi. - 25 -
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Awak, Personel, dan/atau penumpang yang Terpapar
                          dilakukan tindakan sesuai dengan prosedur
                          penanggulangan kasus.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Terhadap Awak, Personel, dan/atau penumpang yang tidak
                          Terjangkit dan/atau tidak Terpapar dapat melanjutkan
                          perjalanannya dan diberikan kartu kewaspadaan
                          kesehatan.
                    - _type: ayat
                      _key: 5
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Jika ditemukan Awak, Personel, — dan/atau penumpang
                          yang Terjangkit dan/atau Terpapar, Pejabat Karantina
                          Kesehatan harus langsung berkoordinasi dengan pihak
                          yang terkait.
              - _type: pasal
                _key: 39
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Setiap orang yang datang dari negara dan/atau
                            wilayah Kedaruratan Kesehatan Masyarakat yang
                            meresahkan dunia dan/atau endemis, Pejabat Karantina
                            Kesehatan melakukan:
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: penapisan,
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: pemberian kartu kewaspadaan kesehatan,
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                pemberian informasi tentang cara pencegahan,
                                pengobatan, dan pelaporan suatu kejadian
                                Kedaruratan Kesehatan Masyarakat yang meresahkan
                                dunia: dan
                          - _type: alphaPoint
                            _key: d
                            isi:
                              _type: referenceText
                              references: []
                              text: pengambilan spesimen dan/atau sampel.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Apabila hasil penapisan terhadap orang ditemukan
                          gejala klinis sesuai dengan jenis penyakit Kedaruratan
                          Kesehatan Masyarakat yang meresahkan dunia, Pejabat
                          Karantina Kesehatan melakukan rujukan dan Isolasi.
                          REPUBLIK INDONESIA - 26 -
              - _type: pasal
                _key: 40
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal orang sebagaimana dimaksud dalam Pasal 38 dan
                    Pasal 39 tidak bersedia dilakukan tindakan Kekarantinaan
                    Kesehatan, Pejabat Karantina Kesehatan berwenang
                    mengeluarkan rekomendasi kepada pejabat imigrasi untuk
                    dilakukan deportasi.
              - _type: pasal
                _key: 41
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Setiap Awak, Personel, dan penumpang: ayang datang
                          dari negara endemis, negara Terjangkit, dan/atau
                          negara yang mewajibkan adanya vaksinasi, atau b.yang
                          akan berangkat ke negara endemis, negara Terjangkit,
                          dan/atau negara yang mewajibkan adanya vaksinasi,
                          wajib memiliki sertifikat vaksinasi internasional yang
                          masih berlaku.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Setiap Awak, Personel, dan/atau penumpang sebagaimana
                          dimaksud pada ayat (1) huruf a yang tidak memiliki
                          sertifikat vaksinasi internasional dilakukan tindakan
                          Kekarantinaan Kesehatan oleh Pejabat Karantina
                          Kesehatan.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Setiap Awak, Personel, dan/atau penumpang sebagaimana
                          dimaksud pada ayat (1) huruf b yang tidak memiliki
                          sertifikat vaksinasi internasional, dilakukan
                          penundaan keberangkatannya oleh Pejabat Karantina
                          Kesehatan.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Terhadap Awak, Personel, dan/atau penumpang
                          sebagaimana dimaksud pada ayat (3) harus diberikan
                          vaksinasi sesuai persyaratan dan standar yang berlaku.
                          (S5) Ketentuan .. REPUBLIK INDONESIA - 27 - (S)
                          Ketentuan mengenai tata laksana vaksinasi dan
                          pemberian sertifikat vaksinasi internasional diatur
                          dengan Peraturan Menteri. (6) Apabila Awak, Personel,
                          dan/atau penumpang sebagaimana dimaksud pada ayat (3)
                          menolak pemberian vaksin maka Pejabat Karantina
                          Kesehatan berwenang mengeluarkan rekomendasi kepada
                          pejabat imigrasi untuk dilakukan pembatalan
                          pemberangkatan.
              - _type: pasal
                _key: 42
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Setiap Awak, Personel, dan penumpang yang akan
                          berangkat harus dilakukan pengawasan.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pada saat pengawasan sebagaimana dimaksud pada ayat
                          (1) ditemukan Awak, Personel, dan/atau penumpang
                          memiliki Faktor Risiko Kesehatan Masyarakat, Pejabat
                          Karantina Kesehatan harus melakukan pemeriksaan medis.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Jika hasil pemeriksaan medis sebagaimana dimaksud pada
                          ayat (2), ditemukan penyakit yang berpotensi
                          menimbulkan Kedaruratan Kesehatan Masyarakat, dan/atau
                          tidak dipenuhi persyaratan kesehatan penerbangan atau
                          pelayaran pada Awak, Personel, dan/atau penumpang,
                          Pejabat Karantina Kesehatan harus merekomendasikan
                          kepada maskapai penerbangan atau agen pelayaran untuk
                          menunda keberangkatan Awak, Personel, dan/atau
                          penumpang tersebut dan harus segera melakukan tindakan
                          Kekarantinaan Kesehatan. -28 -
              - _type: pasal
                _key: 43
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Penundaan keberangkatan orang karena tidak memiliki
                          sertifikat vaksinasi internasional dan/atau dikenakan
                          tindakan Kekarantinaan Kesehatan dilakukan dengan
                          berkoordinasi dengan pihak imigrasi.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Terhadap orang sebagaimana dimaksud pada ayat (1)
                          wajib diberikan penjelasan oleh Pejabat Karantina
                          Kesehatan.
        - _type: bagian
          _key: 5
          _judul: Bagian Kelima Pengawasan Barang
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 44
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Setiap Barang yang memiliki Faktor Risiko Kesehatan
                    Masyarakat dalam Alat Angkut yang berada dalam Status
                    Karantina, Pejabat Karantina Kesehatan melakukan tindakan
                    Kekarantinaan Kesehatan sebagaimana dimaksud dalam Pasal 15
                    ayat (2) huruf c dan huruf d berkoordinasi dengan pihak yang
                    terkait.
              - _type: pasal
                _key: 45
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Jenazah dan/atau abu jenazah dalam Alat Angkut
                          dilakukan pemeriksaan terhadap dokumen penyebab
                          kematian sesuai dengan ketentuan peraturan
                          perundang-undangan.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Jika pada pemeriksaan dokumen penyebab kematian
                            sebagaimana dimaksud pada ayat (1) didapatkan:
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                dokumen tidak lengkap maka penanggung jawab Alat
                                Angkut harus melengkapi dokumen sesuai dengan
                                persyaratan yang berlaku: REPUBLIK INDONESIA -29
                                -
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                jenazah dan/atau abu jenazah tidak sesuai dengan
                                dokumen maka Pejabat Karantina Kesehatan dapat
                                berkoordinasi dengan pihak yang terkait,
                                dan/atau
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Faktor Risiko Kesehatan Masyarakat maka Pejabat
                                Karantina Kesehatan melakukan tindakan
                                Kekarantinaan Kesehatan.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Jika hasil pemeriksaan tidak didapatkan Faktor Risiko
                          Kesehatan Masyarakat atau setelah dilakukan tindakan
                          Kekarantinaan Kesehatan sebagaimana dimaksud pada ayat
                          (2) huruf c, Pejabat Karantina Kesehatan memberikan
                          surat persetujuan keluar atau masuk jenazah dan/atau
                          abu jenazah dari Pelabuhan, Bandar Udara, atau Pos
                          Lintas Batas Darat Negara.
              - _type: pasal
                _key: 46
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Jika terdapat Awak, Personel, dan/atau penumpang yang
                          meninggal dalam Alat Angkut yang datang, Pejabat
                          Karantina Kesehatan melakukan pemeriksaan jenazah
                          untuk mengetahui penyebab kematian.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal penyebab kematian berdasarkan hasil
                          pemeriksaan jenazah sebagaimana dimaksud pada ayat (1)
                          merupakan penyakit yang memiliki risiko Kedaruratan
                          Kesehatan Masyarakat maka dilakukan tindakan
                          Kekarantinaan Kesehatan.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Terhadap jenazah sebagaimana dimaksud pada ayat (l)
                          dikirim ke rumah sakit untuk dilakukan pemulasaraan
                          jenazah. REPUBLIK INDONESIA - 30 -
              - _type: pasal
                _key: 47
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan lebih lanjut mengenai pengawasan Barang dalam Alat
                    Angkut sebagaimana dimaksud dalam Pasal 44 sampai dengan
                    Pasal 46 diatur dengan Peraturan Menteri.
        - _type: bagian
          _key: 6
          _judul: Bagian Keenam Sanksi Administratif
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 48
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Setiap Nakhoda yang melanggar ketentuan sebagaimana
                            dimaksud dalam Pasal 19 ayat (2) atau Pasal 21
                            dikenai sanksi administratif berupa:
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: 'peringatan:'
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: 'denda administratif: dan/atau'
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: pencabutan izin.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Setiap Kapten Penerbang yang melanggar ketentuan
                            sebagaimana dimaksud dalam Pasal 28 ayat (2) atau
                            Pasal 29 dikenai sanksi administratif berupa:
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: 'peringatan:'
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                denda administratif, dan/atau Cc. pencabutan
                                izin.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Setiap Nakhoda yang tidak melengkapi Dokumen Karantina
                          Kesehatan sehingga dikeluarkan persetujuan karantina
                          terbatas sebagaimana dimaksud dalam Pasal 19 ayat (5)
                          huruf b dikenai denda administratif.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Setiap Kapten Penerbang yang tidak melengkapi Dokumen
                          Karantina Kesehatan sehingga dikeluarkan persetujuan
                          karantina terbatas sebagaimana dimaksud dalam Pasal 30
                          ayat (3) huruf b dikenai denda administratif. REPUBLIK
                          INDONESIA - 31 -
                    - _type: ayat
                      _key: 5
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Setiap pengemudi atau penanggung jawab kendaraan
                            darat yang tidak melengkapi Dokumen Karantina
                            Kesehatan sehingga tidak diberikan Persetujuan
                            Karantina Kesehatan sebagaimana dimaksud dalam Pasal
                            36 ayat (1) dikenai sanksi administratif berupa:
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: peringatan,
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                denda administratif, dan/atau Cc. pencabutan
                                izin.
                    - _type: ayat
                      _key: 6
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan lebih lanjut mengenai tata cara pengenaan
                          sanksi administratif sebagaimana dimaksud pada ayat
                          (1) sampai dengan ayat (5) diatur dengan Peraturan
                          Pemerintah.
  - _type: bab
    _key: 7
    _judul: PENYELENGGARAAN KEKARANTINAAN KESEHATAN DI WILAYAH
    isi:
      _type: bagians
      bagians:
        - _type: bagian
          _key: 1
          _judul: Bagian Kesatu Umum
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 49
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam rangka melakukan tindakan mitigasi faktor risiko
                          di wilayah pada situasi Kedaruratan Kesehatan
                          Masyarakat dilakukan Karantina Rumah, Karantina
                          Wilayah, Karantina Rumah Sakit, atau Pembatasan Sosial
                          Berskala Besar oleh Pejabat Karantina Kesehatan.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Karantina Rumah, Karantina Wilayah, Karantina Rumah
                          Sakit, atau Pembatasan Sosial Berskala Besar
                          sebagaimana dimaksud pada ayat (1) harus didasarkan
                          pada pertimbangan epidemiologis, besarnya ancaman,
                          efektifitas, dukungan sumber daya, teknis operasional,
                          pertimbangan ekonomi, sosial, budaya, dan keamanan.
                          REPUBLIK INDONESIA - 32 -
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Karantina Wilayah dan Pembatasan Sosial Berskala Besar
                          sebagaimana dimaksud pada ayat (1) ditetapkan oleh
                          Menteri.
        - _type: bagian
          _key: 2
          _judul: Bagian Kedua Karantina Rumah
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 50
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Karantina Rumah dilaksanakan pada situasi ditemukannya
                          kasus Kedaruratan Kesehatan Masyarakat yang terjadi
                          hanya di dalam satu rumah.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Karantina Rumah sebagaimana dimaksud pada ayat (1)
                          dilaksanakan terhadap seluruh orang dalam rumah,
                          Barang, atau Alat Angkut yang terjadi kontak erat
                          dengan kasus.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Terhadap kasus sebagaimana dimaksud pada ayat (1)
                          dirujuk ke rumah sakit yang memiliki kemampuan
                          menangani kasus.
              - _type: pasal
                _key: 51
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pejabat Karantina Kesehatan wajib memberikan
                          penjelasan kepada penghuni rumah sebelum melaksanakan
                          tindakan Karantina Rumah.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Penghuni rumah yang dikarantina selain kasus, dilarang
                          keluar rumah selama waktu yang telah ditetapkan oleh
                          Pejabat Karantina Kesehatan. REPUBLIK INDONESIA - 33 -
              - _type: pasal
                _key: 52
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
