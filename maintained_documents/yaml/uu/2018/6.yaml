              yang menyelenggarakan urusan pemerintahan di bidang kesehatan
              diberi wewenang khusus sebagai penyidik sebagaimana dimaksud dalam
              Undang-Undang yang mengatur mengenai hukum acara pidana untuk
              melakukan penyidikan tindak pidana di bidang Kekarantinaan
              Kesehatan. REPUBLIK INDONESIA - 47 -
        - _type: pasal
          _key: 85
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: 'PPNS Kekarantinaan Kesehatan berwenang:'
