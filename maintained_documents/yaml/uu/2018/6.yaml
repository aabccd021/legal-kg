                      Kekarantinaan Kesehatan:
                  isi:
                    - _type: numPoint
                      _key: '1'
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          ' mengambil foto dan sidik jari tersangka: m. meminta
                          keterangan dari masyarakat atau sumber yang
                          berkompeten: n. menghentikan penyidikan apabila tidak
                          terdapat cukup bukti yang membuktikan adanya tindak
                          pidana di bidang Kekarantinaan Kesehatan: dan /atau
                          Oo. mengadakan tindakan lain menurut hukum. REPUBLIK
                          INDONESIA
        - _type: pasal
