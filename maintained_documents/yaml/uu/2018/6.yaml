_node:
  _documentType: uu
  tahun: 2018
  nomor: 6
babs:
  - _type: bab
    _key: 1
    _judul: KETENTUAN UMUM
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 1
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: 'Dalam Undang-Undang ini yang dimaksud dengan:'
            isi:
              - _type: numPoint
                _key: '1'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Kekarantinaan Kesehatan adalah upaya mencegah dan menangkal
                    keluar atau masuknya penyakit dan/atau faktor risiko
                    kesehatan masyarakat yang berpotensi menimbulkan kedaruratan
                    kesehatan masyarakat.
              - _type: numPoint
                _key: '2'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Kedaruratan Kesehatan Masyarakat adalah kejadian kesehatan
                    masyarakat yang bersifat luar biasa dengan ditandai
                    penyebaran penyakit menular dan/atau kejadian yang
                    disebabkan oleh radiasi nuklir, pencemaran biologi,
                    kontaminasi kimia, bioterorisme, dan pangan yang menimbulkan
                    bahaya kesehatan dan berpotensi menyebar lintas wilayah atau
                    lintas negara.
              - _type: numPoint
                _key: '3'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pintu Masuk adalah tempat masuk dan keluarnya alat angkut,
                    orang, dan/atau barang, baik berbentuk pelabuhan, bandar
                    udara, maupun pos lintas batas darat negara.
              - _type: numPoint
                _key: '4'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Alat Angkut adalah kapal, pesawat udara, dan kendaraan darat
                    yang digunakan dalam melakukan perjalanan sesuai dengan
                    ketentuan peraturan perundang-undangan.
              - _type: numPoint
                _key: '5'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Barang adalah produk nyata, hewan, tumbuhan, dan jenazah
                    atau abu jenazah yang dibawa dan/atau dikirim melalui
                    perjalanan, termasuk benda/alat yang digunakan dalam Alat
                    Angkut. REPUBLIK INDONESIA -4-
              - _type: numPoint
                _key: '6'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Karantina adalah pembatasan kegiatan dan/atau pemisahan
                    seseorang yang terpapar penyakit menular sebagaimana
                    ditetapkan dalam peraturan perundang- undangan meskipun
                    belum menunjukkan gejala apapun atau sedang berada dalam
                    masa inkubasi, dan/atau pemisahan peti kemas, Alat Angkut,
                    atau Barang apapun yang diduga terkontaminasi dari orang
                    dan/atau Barang yang mengandung penyebab penyakit atau
                    sumber bahan kontaminasi lain untuk mencegah kemungkinan
                    penyebaran ke orang dan/atau Barang di sekitarnya.
              - _type: numPoint
                _key: '7'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Isolasi adalah pemisahan orang sakit dari orang sehat yang
                    dilakukan di fasilitas pelayanan kesehatan untuk mendapatkan
                    pengobatan dan perawatan.
              - _type: numPoint
                _key: '8'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Karantina Rumah adalah pembatasan penghuni dalam suatu rumah
                    beserta isinya yang diduga terinfeksi penyakit dan/atau
                    terkontaminasi sedemikian rupa untuk mencegah kemungkinan
                    penyebaran penyakit atau kontaminasi. 0. Karantina Rumah
                    Sakit adalah pembatasan seseorang dalam rumah sakit yang
                    diduga terinfeksi penyakit dan/atau terkontaminasi
                    sedemikian rupa untuk mencegah kemungkinan penyebaran
                    penyakit atau kontaminasi. 10. Karantina Wilayah adalah
                    pembatasan penduduk dalam suatu wilayah termasuk wilayah
                    Pintu Masuk beserta isinya yang diduga terinfeksi penyakit
                    dan/atau terkontaminasi sedemikian rupa untuk mencegah
                    kemungkinan penyebaran penyakit atau kontaminasi.
                    11.Pembatasan Sosial Berskala Besar adalah pembatasan
                    kegiatan tertentu penduduk dalam suatu wilayah yang diduga
                    terinfeksi penyakit dan/atau terkontaminasi sedemikian rupa
                    untuk mencegah kemungkinan penyebaran penyakit atau
                    kontaminasi. REPUBLIK INDONESIA -5- 12. Status Karantina
                    adalah keadaan Alat Angkut, orang, dan Barang yang berada di
                    suatu tempat untuk dilakukan Kekarantinaan Kesehatan. 13
                    .Zona Karantina adalah area atau tempat tertentu untuk dapat
                    menyelenggarakan tindakan Kekarantinaan Kesehatan. 14.
                    Persetujuan Karantina Kesehatan adalah surat pernyataan yang
                    diberikan oleh pejabat karantina kesehatan kepada penanggung
                    jawab Alat Angkut yang berupa pernyataan persetujuan bebas
                    karantina atau persetujuan karantina terbatas. 15 .Kapal
                    adalah kendaraan air dengan bentuk dan jenis tertentu, yang
                    digerakkan dengan tenaga angin, tenaga mekanik, energi
                    lainnya, ditarik atau ditunda termasuk kendaraan yang
                    berdaya dukung dinamis, kendaraan di bawah permukaan air,
                    serta alat apung dan bangunan terapung yang tidak berpindah-
                    pindah. 16. Pesawat Udara adalah setiap mesin atau alat yang
                    dapat terbang di atmosfer karena gaya angkat dari reaksi
                    udara, tetapi bukan karena reaksi udara terhadap permukaan
                    bumi yang digunakan untuk penerbangan. 17. Kendaraan Darat
                    adalah suatu sarana angkut di darat yang terdiri atas
                    kendaraan bermotor termasuk kendaraan yang berjalan di atas
                    rel dan kendaraan tidak bermotor. 18 .Awak Kapal yang
                    selanjutnya disebut Awak adalah orang yang bekerja atau
                    dipekerjakan di atas Kapal oleh pemilik atau operator Kapal
                    untuk melakukan tugas di atas Kapal sesuai dengan jabatannya
                    yang tercantum dalam buku sijil. REPUBLIK INDONESIA -6- 10.
                    Personel Pesawat Udara yang selanjutnya disebut Personel
                    adalah orang yang bekerja atau dipekerjakan di atas Pesawat
                    Udara oleh pemilik atau operator Pesawat Udara untuk
                    melakukan tugas di atas Pesawat Udara. 20. Nakhoda adalah
                    salah seorang dari Awak Kapal yang menjadi pemimpin
                    tertinggi di Kapal dan mempunyai wewenang dan tanggung jawab
                    tertentu sesuai dengan ketentuan peraturan
                    perundang-undangan. 21. Kapten Penerbang adalah penerbang
                    yang ditugaskan oleh perusahaan atau pemilik Pesawat Udara
                    untuk memimpin penerbangan dan bertanggung jawab penuh
                    terhadap keselamatan penerbangan selama pengoperasian
                    Pesawat Udara sesuai dengan ketentuan peraturan
                    perundang-undangan. 22. Pelabuhan adalah tempat yang terdiri
                    atas daratan dan/atau perairan dengan batas-batas tertentu
                    sebagai tempat kegiatan pemerintahan dan kegiatan
                    pengusahaan yang dipergunakan sebagai tempat Kapal
                    bersandar, naik turun penumpang, dan/atau bongkar muat
                    Barang, berupa terminal dan tempat berlabuh Kapal yang
                    dilengkapi dengan fasilitas keselamatan dan keamanan
                    pelayaran dan kegiatan penunjang pelabuhan serta sebagai
                    tempat perpindahan intra dan antarmoda transportasi. 23.
                    Bandar Udara adalah kawasan di daratan dan/atau perairan
                    dengan batas-batas tertentu yang digunakan sebagai tempat
                    Pesawat Udara mendarat dan lepas landas, naik turun
                    penumpang, bongkar muat Barang, dan tempat perpindahan intra
                    dan antarmoda transportasi, yang dilengkapi dengan fasilitas
                    keselamatan dan keamanan penerbangan, serta fasilitas pokok
                    dan fasilitas penunjang lainnya. REPUBLIK INDONESIA -7- 24.
                    Pos Lintas Batas Darat Negara adalah Pintu Masuk orang,
                    Barang, dan Alat Angkut melalui darat lintas negara. 25.
                    Pengawasan Kekarantinaan Kesehatan adalah kegiatan
                    pemeriksaan dokumen karantina kesehatan dan faktor risiko
                    kesehatan masyarakat terhadap Alat Angkut, orang, serta
                    Barang oleh pejabat karantina kesehatan. 26. Faktor Risiko
                    Kesehatan Masyarakat adalah hal, keadaan, atau peristiwa
                    yang dapat mempengaruhi kemungkinan timbulnya pengaruh buruk
                    terhadap kesehatan masyarakat. 27. Terjangkit adalah kondisi
                    seseorang yang menderita penyakit yang dapat menjadi sumber
                    penular penyakit yang berpotensi menyebabkan Kedaruratan
                    Kesehatan Masyarakat. 28. Terpapar adalah kondisi orang,
                    Barang, atau Alat Angkut yang terpajan, terkontaminasi,
                    dalam masa inkubasi, insektasi, pestasi, ratisasi, termasuk
                    kimia dan radiasi. 29. Pejabat Karantina Kesehatan adalah
                    pegawai negeri sipil yang bekerja di bidang kesehatan yang
                    diberi kewenangan oleh menteri yang menyelenggarakan urusan
                    pemerintahan di bidang kesehatan untuk melaksanakan
                    Kekarantinaan Kesehatan. 30. Dokumen Karantina Kesehatan
                    adalah surat keterangan kesehatan yang dimiliki setiap Alat
                    Angkut, orang, dan Barang yang memenuhi persyaratan baik
                    nasional maupun internasional. 31. Setiap Orang adalah orang
                    perseorangan dan/atau badan, baik yang berbentuk badan hukum
                    maupun tidak berbadan hukum. REPUBLIK INDONESIA -8- 32.
                    Penyidik '” Pegawai Negeri Sipil Kekarantinaan Kesehatan
                    yang selanjutnya disebut PPNS Kekarantinaan Kesehatan adalah
                    pejabat pegawai negeri sipil tertentu yang diberi wewenang
                    khusus oleh Undang-Undang ini untuk melakukan penyidikan
                    tindak pidana di bidang Kekarantinaan Kesehatan. 33.
                    Pemerintah Pusat adalah Presiden Republik Indonesia yang
                    memegang kekuasaan pemerintahan negara Republik Indonesia
                    yang dibantu oleh Wakil Presiden dan menteri sebagaimana
                    dimaksud dalam Undang- Undang Dasar Negara Republik
                    Indonesia Tahun 1945. 34. Pemerintah Daerah adalah kepala
                    daerah sebagai unsur penyelenggara Pemerintahan Daerah yang
                    memimpin pelaksanaan urusan pemerintahan yang menjadi
                    kewenangan daerah otonom. 35. Menteri adalah menteri yang
                    menyelenggarakan urusan pemerintahan di bidang kesehatan.
        - _type: pasal
          _key: 2
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: 'Kekarantinaan Kesehatan diselenggarakan dengan berasaskan:'
            isi:
              - _type: alphaPoint
                _key: a
                isi:
                  _type: referenceText
                  references: []
                  text: perikemanusiaan,
              - _type: alphaPoint
                _key: b
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    manfaat: Cc. pelindungan: d. keadilan: e. nondiskriminatif:
                    f. kepentingan umum: g. keterpaduan, h. kesadaran hukumj,
                    dan kedaulatan negara. REPUBLIK INDONESIA -9 -
        - _type: pasal
          _key: 3
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: 'Penyelenggaraan Kekarantinaan Kesehatan bertujuan untuk:'
            isi:
              - _type: alphaPoint
                _key: a
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    melindungi masyarakat dari penyakit dan/atau Faktor Risiko
                    Kesehatan Masyarakat yang berpotensi menimbulkan Kedaruratan
                    Kesehatan Masyarakat,
              - _type: alphaPoint
                _key: b
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    mencegah dan menangkal penyakit dan/atau Faktor Risiko
                    Kesehatan Masyarakat yang berpotensi menimbulkan Kedaruratan
                    Kesehatan Masyarakat, Cc. meningkatkan ketahanan nasional di
                    bidang kesehatan masyarakat, dan d. memberikan pelindungan
                    dan kepastian hukum bagi masyarakat dan petugas kesehatan.
  - _type: bab
    _key: 2
    _judul: TANGGUNG JAWAB PEMERINTAH PUSAT DAN PEMERINTAH DAERAH
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 4
          isi:
            _type: referenceText
            references: []
            text: >-
              Pemerintah Pusat dan Pemerintah Daerah bertanggung jawab
              melindungi kesehatan masyarakat dari penyakit dan/atau Faktor
              Risiko Kesehatan Masyarakat yang berpotensi menimbulkan
              Kedaruratan Kesehatan Masyarakat melalui penyelenggaraan
              Kekarantinaan Kesehatan.
        - _type: pasal
          _key: 5
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah Pusat bertanggung jawab menyelenggarakan
                    Kekarantinaan Kesehatan di Pintu Masuk dan di wilayah secara
                    terpadu. REPUBLIK INDONESIA -10-
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam menyelenggarakan Kekarantinaan Kesehatan sebagaimana
                    dimaksud pada ayat (1), Pemerintah Pusat dapat melibatkan
                    Pemerintah Daerah.
        - _type: pasal
          _key: 6
          isi:
            _type: referenceText
            references: []
            text: >-
              Pemerintah Pusat dan Pemerintah Daerah bertanggung jawab terhadap
              ketersediaan sumber daya yang diperlukan dalam penyelenggaraan
              Kekarantinaan Kesehatan.
  - _type: bab
    _key: 3
    _judul: HAK DAN KEWAJIBAN
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 7
          isi:
            _type: referenceText
            references: []
            text: >-
              Setiap Orang mempunyai hak memperoleh perlakuan yang sama dalam
              penyelenggaraan Kekarantinaan Kesehatan.
        - _type: pasal
          _key: 8
          isi:
            _type: referenceText
            references: []
            text: >-
              Setiap Orang mempunyai hak mendapatkan pelayanan kesehatan dasar
              sesuai kebutuhan medis, kebutuhan pangan, dan kebutuhan kehidupan
              sehari-hari lainnya selama Karantina.
        - _type: pasal
          _key: 9
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Setiap Orang wajib mematuhi penyelenggaraan Kekarantinaan
                    Kesehatan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Setiap Orang berkewajiban ikut serta dalam penyelenggaraan
                    Kekarantinaan Kesehatan. REPUBLIK INDONESIA -11-
  - _type: bab
    _key: 4
    _judul: KEDARURATAN KESEHATAN MASYARAKAT
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 10
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah Pusat menetapkan dan mencabut Kedaruratan
                    Kesehatan Masyarakat.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah Pusat menetapkan dan mencabut penetapan Pintu
                    Masuk dan/atau wilayah di dalam negeri yang Terjangkit
                    Kedaruratan Kesehatan Masyarakat.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Sebelum menetapkan Kedaruratan Kesehatan Masyarakat,
                    Pemerintah Pusat terlebih dahulu menetapkan jenis penyakit
                    dan faktor risiko yang dapat menimbulkan Kedaruratan
                    Kesehatan Masyarakat.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan lebih lanjut mengenai tata cara penetapan dan
                    pencabutan sebagaimana dimaksud pada ayat (1) dan ayat (2)
                    diatur dengan Peraturan Pemerintah.
        - _type: pasal
          _key: 11
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penyelenggaraan Kekarantinaan Kesehatan pada Kedaruratan
                    Kesehatan Masyarakat dilaksanakan oleh Pemerintah Pusat
                    secara cepat dan tepat berdasarkan besarnya ancaman,
                    efektivitas, dukungan sumber daya, dan teknik operasional
                    dengan mempertimbangkan kedaulatan negara, keamanan,
                    ekonomi, sosial, dan budaya.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penyelenggaraan Kekarantinaan Kesehatan sebagaimana dimaksud
                    pada ayat (l) dapat berkoordinasi dan bekerja sama dengan
                    dunia internasional. REPUBLIK INDONESIA -12 -
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan lebih lanjut mengenai penanggulangan Kedaruratan
                    Kesehatan Masyarakat diatur dengan Peraturan Pemerintah.
        - _type: pasal
          _key: 12
          isi:
            _type: referenceText
            references: []
            text: >-
              Dalam hal Kedaruratan Kesehatan Masyarakat merupakan kejadidin
              yang meresahkan dunia, Pemerintah Pusat memberitahukan kepada
              pihak internasional sesuai dengan ketentuan hukum internasional.
        - _type: pasal
          _key: 13
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pada kejadian Kedaruratan Kesehatan Masyarakat yang
                    meresahkan dunia, Pemerintah Pusat melakukan komunikasi,
                    koordinasi, dan kerja sama dengan negara lain dan/atau
                    organisasi internasional.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Komunikasi, koordinasi, dan kerja sama sebagaimana dimaksud
                    pada ayat (1) dilakukan untuk mengidentifikasi penyebab,
                    gejala dan tanda, faktor yang mempengaruhi, dan dampak yang
                    ditimbulkan, serta tindakan yang harus dilakukan.
        - _type: pasal
          _key: 14
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam keadaan Kedaruratan Kesehatan Masyarakat yang
                    meresahkan dunia, Pemerintah Pusat dapat menetapkan
                    Karantina Wilayah di Pintu Masuk.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan lebih lanjut mengenai tata cara pelaksanaan
                    Karantina Wilayah di Pintu Masuk sebagaimana dimaksud pada
                    ayat (1) diatur dengan Peraturan Pemerintah. REPUBLIK
                    INDONESIA -13 -
  - _type: bab
    _key: 5
    _judul: KEKARANTINAAN KESEHATAN DI PINTU MASUK DAN DI WILAYAH
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 15
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Kekarantinaan Kesehatan di Pintu Masuk dan di wilayah
                    dilakukan melalui kegiatan pengamatan penyakit dan Faktor
                    Risiko Kesehatan Masyarakat terhadap Alat Angkut, orang,
                    Barang, dan/atau lingkungan, serta respons terhadap
                    Kedaruratan Kesehatan Masyarakat dalam bentuk tindakan
                    Kekarantinaan Kesehatan.
              - _type: ayat
                _key: 2
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Tindakan Kekarantinaan Kesehatan sebagaimana dimaksud pada
                      ayat (1) berupa:
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Karantina, Isolasi, pemberian vaksinasi atau
                          profilaksis, rujukan, disinfeksi, dan/atau
                          dekontaminasi terhadap orang sesuai indikasi:
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: 'Pembatasan Sosial Berskala Besar:'
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          disinfeksi, dekontaminasi, disinseksi, dan/atau
                          deratisasi terhadap Alat Angkut dan Barang: dan/atau
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          penyehatan, pengamanan, dan pengendalian terhadap
                          media lingkungan.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penyehatan, pengamanan, dan pengendalian terhadap media
                    lingkungan sebagaimana dimaksud pada ayat (2) huruf d
                    dilaksanakan sesuai dengan ketentuan peraturan
                    perundang-undangan.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan lebih lanjut mengenai tindakan Kekarantinaan
                    Kesehatan sebagaimana dimaksud pada ayat (2) diatur dengan
                    Peraturan Menteri. REPUBLIK INDONESIA -14-
        - _type: pasal
          _key: 16
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tindakan Kekarantinaan Kesehatan terhadap Alat Angkut,
                    orang, Barang, dan/atau lingkungan ditetapkan oleh Pejabat
                    Karantina Kesehatan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tindakan Kekarantinaan Kesehatan sebagaimana dimaksud pada
