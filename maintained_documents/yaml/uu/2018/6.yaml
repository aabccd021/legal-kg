                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      memanggil, memeriksa, menggeledah, menangkap, atau menahan
                      seseorang yang disangka melakukan tindak pidana di bidang
                      Kekarantinaan Kesehatan: I. menahan, memeriksa, dan
                      menyita dokumen: g. menyuruh berhenti orang yang dicurigai
                      atau tersangka dan memeriksa identitas dirinya: h.
                      memeriksa atau menyita surat, dokumen, atau benda yang ada
                      hubungannya dengan tindak pidana Kekarantinaan Kesehatan:
                      i. memanggil seseorang untuk diperiksa dan didengar
                      keterangannya sebagai tersangka atau saksi: j.
                      mendatangkan ahli yang diperlukan dalam hubungannya dengan
                      pemeriksaan perkara: k. melakukan pemeriksaan di tempat
                      tertentu yang diduga terdapat surat, dokumen, atau benda
