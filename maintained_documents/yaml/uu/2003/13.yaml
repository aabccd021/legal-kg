babs:
  - _type: bab
    _key: 1
    _judul: KETENTUAN UMUM
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 1
          isi:
            _type: referenceText
            references:
              - start: 3678
                end: 3734
                node:
                  _documentType: uud
            text: >-
              Dalam undang undang ini yang dimaksud dengan : 1. Ketenagakerjaan
              adalah segala hal yang berhubungan dengan tenaga kerja pada waktu
              sebelum, selama, dan sesudah masa kerja. 2. Tenaga kerja adalah
              setiap orang yang mampu melakukan pekerjaan guna menghasilkan
              barang dan/atau jasa baik untuk memenuhi kebutuhan sendiri maupun
              untuk masyarakat. 3. Pekerja/buruh adalah setiap orang yang
              bekerja dengan menerima upah atau imbalan dalam bentuk lain. 4.
              Pemberi kerja adalah orang perseorangan, pengusaha, badan hukum,
              atau badan-badan lainnya yang mempekerjakan tenaga kerja dengan
              membayar upah atau imbalan dalam bentuk lain. 5. Pengusaha adalah
              : a. orang perseorangan, persekutuan, atau badan hukum yang
              menjalankan suatu perusahaan milik sendiri, b. orang perseorangan,
              persekutuan, atau badan hukum yang secara berdiri sendiri
              menjalankan perusahaan bukan miliknya, c. orang perseorangan,
              persekutuan, atau badan hukum yang berada di Indonesia mewakili
              perusahaan sebagaimana dimaksud dalam huruf a dan b yang
              berkedudukan di luar wilayah Indonesia. Perusahaan adalah : a.
              setiap bentuk usaha yang berbadan hukum atau tidak, milik orang
              perseorangan, milik persekutuan, atau milik badan hukum, baik
              milik swasta maupun milik negara yang mempekerjakan pekerja/buruh
              dengan membayar upah atau imbalan dalam bentuk lain: b.
              usaha-usaha sosial dan usaha-usaha lain yang mempunyai pengurus
              dan mempekerjakan orang lain dengan membayar upah atau imbalan
              dalam bentuk lain. Perencanaan tenaga kerja adalah proses
              penyusunan rencana ketenagakerjaan secara sistematis yang
              dijadikan dasar dan acuan dalam penyusunan kebijakan, strategi,
              dan pelaksanaan program pembangunan ketenagakerjaan yang
              berkesinambungan. Informasi ketenagakerjaan adalah gabungan,
              rangkaian, dan analisis data yang berbentuk angka yang telah
              diolah, naskah dan dokumen yang mempunyai arti, nilai dan makna
              tertentu mengenai ketenagakerjaan. Pelatihan kerja adalah
              keseluruhan kegiatan untuk memberi, memperoleh, meningkatkan,
              serta mengembangkan kompetensi kerja, produktivitas, disiplin,
              sikap, dan etos kerja pada tingkat keterampilan dan keahlian
              tertentu sesuai dengan jenjang dan kualifikasi jabatan atau
              pekerjaan. 10. Kompetensi kerja adalah kemampuan kerja setiap
              individu yang mencakup aspek pengetahuan, keterampilan, dan sikap
              kerja yang sesuai dengan standar yang ditetapkan. 11. Pemagangan
              adalah bagian dari sistem pelatihan kerja yang diselenggarakan
              secara terpadu antara pelatihan di lembaga pelatihan dengan
              bekerja secara langsung di bawah bimbingan dan pengawasan
              instruktur atau pekerja/buruh yang lebih berpengalaman, dalam
              proses produksi barang dan/atau jasa di perusahaan, dalam rangka
              menguasai keterampilan atau keahlian tertentu. 12. Pelayanan
              penempatan tenaga kerja adalah kegiatan untuk mempertemukan tenaga
              kerja dengan pemberi kerja, sehingga tenaga kerja dapat memperoleh
              pekerjaan yang sesuai dengan bakat, minat, dan kemampuannya, dan
              pemberi kerja dapat memperoleh tenaga kerja yang sesuai dengan
              kebutuhannya. 13. Tenaga kerja asing adalah warga negara asing
              pemegang visa dengan maksud bekerja di wilayah Indonesia. 14.
              Perjanjian kerja adalah perjanjian antara pekerja/buruh dengan
              pengusaha atau pemberi kerja yang memuat syarat syarat kerja, hak,
              dan kewajiban para pihak. 15. Hubungan kerja adalah hubungan
              antara pengusaha dengan pekerja/buruh berdasarkan perjanjian
              kerja, yang mempunyai unsur pekerjaan, upah, dan perintah. 16.
              Hubungan industrial adalah suatu sistem hubungan yang terbentuk
              antara para pelaku dalam proses produksi barang dan/atau jasa yang
              terdiri dari unsur pengusaha, pekerja/buruh, dan pemerintah yang
              didasarkan pada nilai nilai Pancasila dan Undang Undang Dasar
              Negara Republik Indonesia Tahun 1945. 17. Serikat pekerja/serikat
              buruh adalah organisasi yang dibentuk dari, oleh, dan untuk
              pekerja/buruh baik di perusahaan maupun di luar perusahaan, yang
              bersifat bebas, terbuka, mandiri, demokratis, dan bertanggung
              jawab guna memperjuangkan, membela serta melindungi hak dan
              kepentingan pekerja/buruh serta meningkatkan kesejahteraan
              pekerja/buruh dan keluarganya. 18. Lembaga kerja sama bipartit
              adalah forum komunikasi dan konsultasi mengenai hal-hal yang
              berkaitan dengan hubungan industrial di satu perusahaan yang
              anggotanya terdiri dari pengusaha dan serikat pekerja/ serikat
              buruh yang sudah tercatat instansi yang bertanggung jawab di
              bidang ketenagakerjaan atau unsur pekerja/buruh. 19. Lembaga kerja
              sama tripartit adalah forum komunikasi, konsultasi dan musyawarah
              tentang masalah ketenagakerjaan yang anggotanya terdiri dari unsur
              organisasi pengusaha, serikat pekerja/serikat buruh, dan
              pemerintah. 20. Peraturan perusahaan adalah peraturan yang dibuat
              secara tertulis oleh pengusaha yang memuat syarat syarat kerja dan
              tata tertib perusahaan. 21. Perjanjian kerja bersama adalah
              perjanjian yang merupakan hasil perundingan antara serikat
              pekerja/serikat buruh atau beberapa serikat pekerja/serikat buruh
              yang tercatat pada instansi yang bertanggung jawab di bidang
              ketenagakerjaan dengan pengusaha, atau beberapa pengusaha atau
              perkumpulan pengusaha yang memuat syarat syarat kerja, hak dan
              kewajiban kedua belah pihak. 22. Perselisihan hubungan industrial
              adalah perbedaan pendapat yang mengakibatkan pertentangan antara
              pengusaha atau gabungan pengusaha dengan pekerja/buruh atau
              serikat pekerja/serikat buruh karena adanya perselisihan mengenai
              hak, perselisihan kepentingan, dan perselisihan pemutusan hubungan
              kerja serta perselisihan antar serikat pekerja/serikat buruh hanya
              dalam satu perusahaan. 23. Mogok kerja adalah tindakan
              pekerja/buruh yang direncanakan dan dilaksanakan secara
              bersama-sama dan/atau oleh serikat pekerja/serikat buruh untuk
              menghentikan atau memperlambat pekerjaan. 24. Penutupan perusahaan
              (lock out) adalah tindakan pengusaha untuk menolak pekerja/buruh
              seluruhnya atau sebagian untuk menjalankan pekerjaan. 25.
              Pemutusan hubungan kerja adalah pengakhiran hubungan kerja karena
              suatu hal tertentu yang mengakibatkan berakhirnya hak dan
              kewajiban antara pekerja/buruh dan pengusaha. 26. Anak adalah
              setiap orang yang berumur dibawah 18 (delapan belas) tahun. 27.
              Siang hari adalah waktu antara pukul 06.00 sampai dengan pukul
              18.00. 28. 1 (satu) hari adalah waktu selama 24 (dua puluh empat)
              jam. 29. Seminggu adalah waktu selama 7 (tujuh) hari. 30. Upah
              adalah hak pekerja/buruh yang diterima dan dinyatakan dalam bentuk
              uang sebagai imbalan dari pengusaha atau pemberi kerja kepada
              pekerja/buruh yang ditetapkan dan dibayarkan menurut suatu
              perjanjian kerja, kesepakatan, atau peraturan perundang undangan,
              termasuk tunjangan bagi pekerja/buruh dan keluarganya atas suatu
              pekerjaan dan/atau jasa yang telah atau akan dilakukan. 31.
              Kesejahteraan pekerja/buruh adalah suatu pemenuhan kebutuhan
              dan/atau keperluan yang bersifat jasmaniah dan rohaniah, baik di
              dalam maupun di luar hubungan kerja, yang secara langsung atau
              tidak langsung dapat mempertinggi produktivitas kerja dalam
              lingkungan kerja yang aman dan sehat. 32. Pengawasan
              ketenagakerjaan adalah kegiatan mengawasi dan menegakkan
              pelaksanaan peraturan perundang undangan di bidang
              ketenagakerjaan. 33. Menteri adalah menteri yang bertanggung jawab
              di bidang ketenagakerjaan.
  - _type: bab
    _key: 2
    _judul: LANDASAN, ASAS, DAN TUJUAN
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 2
          isi:
            _type: referenceText
            references:
              - start: 55
                end: 111
                node:
                  _documentType: uud
            text: >-
              Pembangunan ketenagakerjaan berlandaskan Pancasila dan Undang
              Undang Dasar Negara Republik Indonesia Tahun 1945.
        - _type: pasal
          _key: 3
          isi:
            _type: referenceText
            references: []
            text: >-
              Pembangunan ketenagakerjaan diselenggarakan atas asas keterpaduan
              dengan melalui koordinasi fungsional lintas sektoral pusat dan
              daerah.
        - _type: pasal
          _key: 4
          isi:
            _type: referenceText
            references: []
            text: >-
              Pembangunan ketenagakerjaan bertujuan : a. memberdayakan dan
              mendayagunakan tenaga kerja secara optimal dan manusiawi: b.
              mewujudkan pemerataan kesempatan kerja dan penyediaan tenaga kerja
              yang sesuai dengan kebutuhan pembangunan nasional dan daerah, c.
              memberikan perlindungan kepada tenaga kerja dalam mewujudkan
              kesejahteraan: dan d. meningkatkan kesejahteraan tenaga kerja dan
              keluarganya.
  - _type: bab
    _key: 3
    _judul: KESEMPATAN DAN PERLAKUAN YANG SAMA
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 5
          isi:
            _type: referenceText
            references: []
            text: >-
              Setiap tenaga kerja memiliki kesempatan yang sama tanpa
              diskriminasi untuk memperoleh pekerjaan.
        - _type: pasal
          _key: 6
          isi:
            _type: referenceText
            references: []
            text: >-
              Setiap pekerja/buruh berhak memperoleh perlakuan yang sama tanpa
              diskriminasi dari pengusaha.
  - _type: bab
    _key: 4
    _judul: PERENCANAAN TENAGA KERJA DAN INFORMASI KETENAGAKERJAAN
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 7
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam rangka pembangunan ketenagakerjaan, pemerintah
                    menetapkan kebijakan dan menyusun perencanaan tenaga kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perencanaan tenaga kerja meliputi : a. perencanaan tenaga
                    kerja makro, dan b. perencanaan tenaga kerja mikro.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 198
                      end: 206
                      node:
                        _key: 1
                        parentPasal:
                          _key: 7
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Dalam penyusunan kebijakan, strategi, dan pelaksanaan
                    program pembangunan ketenagakerjaan yang berkesinambungan,
                    pemerintah harus berpedoman pada perencanaan tenaga kerja
                    sebagaimana dimaksud dalam ayat (1).
        - _type: pasal
          _key: 8
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perencanaan tenaga kerja disusun atas dasar informasi
                    ketenagakerjaan yang antara lain meliputi : a. penduduk dan
                    tenaga kerja, b. kesempatan kerja, c. pelatihan kerja
                    termasuk kompetensi kerja, d. produktivitas tenaga kerja, e.
                    hubungan industrial, f. kondisi lingkungan kerja, g.
                    pengupahan dan kesejahteraan tenaga kerja, dan h. jaminan
                    sosial tenaga kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 53
                      end: 61
                      node:
                        _key: 1
                        parentPasal: &ref_1
                          _key: 8
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Informasi ketenagakerjaan sebagaimana dimaksud dalam ayat
                    (1), diperoleh dari semua pihak yang terkait, baik instansi
                    pemerintah maupun swasta.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 151
                      end: 159
                      node:
                        _key: 1
                        parentPasal: *ref_1
                        _structureType: ayat
                  text: >-
                    Ketentuan mengenai tata cara memperoleh informasi
                    ketenagakerjaan dan penyusunan serta pelaksanaan perencanaan
                    tenaga kerja sebagaimana dimaksud dalam ayat (1) diatur
                    dengan Peraturan Pemerintah.
  - _type: bab
    _key: 5
    _judul: PELATIHAN KERJA
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 9
          isi:
            _type: referenceText
            references: []
            text: >-
              Pelatihan kerja diselenggarakan dan diarahkan untuk membekali,
              meningkatkan, dan mengembangkan kompetensi kerja guna meningkatkan
              kemampuan, produktivitas, dan kesejahteraan.
        - _type: pasal
          _key: 10
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelatihan kerja dilaksanakan dengan memperhatikan kebutuhan
                    pasar kerja dan dunia usaha, baik di da-lam maupun di luar
                    hubungan kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelatihan kerja diselenggarakan berdasarkan program
                    pelatihan yang mengacu pada standar kompetensi kerja.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: Pelatihan kerja dapat dilakukan secara berjenjang.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references:
                    - start: 91
                      end: 99
                      node:
                        _key: 2
                        parentPasal:
                          _key: 10
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Ketentuan mengenai tata cara penetapan standar kompetensi
                    kerja sebagaimana dimaksud dalam ayat (2) diatur dengan
                    Keputusan Menteri.
        - _type: pasal
          _key: 11
          isi:
            _type: referenceText
            references: []
            text: >-
              Setiap tenaga kerja berhak untuk memperoleh dan/atau meningkatkan
              dan/atau mengembangkan kompetensi kerja sesuai dengan bakat,
              minat, dan kemampuannya melalui pelatihan kerja.
        - _type: pasal
          _key: 12
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha bertanggung jawab atas peningkatan dan/atau
                    pengembangan kompetensi pekerjanya melalui pelatihan kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 72
                      end: 80
                      node:
                        _key: 1
                        parentPasal:
                          _key: 12
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Peningkatan dan/atau pengembangan kompetensi sebagaimana
                    dimaksud dalam ayat (1) diwajibkan bagi pengusaha yang
                    memenuhi persyaratan yang diatur dengan Keputusan Menteri.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Setiap pekerja/buruh memiliki kesempatan yang sama untuk
                    mengikuti pelatihan kerja sesuai dengan bi-dang tugasnya.
        - _type: pasal
          _key: 13
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    dalam menyelenggarakan pe-latihan kerja dapat bekerja sama
                    dengan swasta.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelatihan kerja dapat diselenggarakan di tempat pelatihan
                    atau tempat kerja.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga pelatihan kerja pemerintah sebagaimana dimaksud
                    dalam ayat
        - _type: pasal
          _key: 14
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga pelatihan kerja swasta dapat berbentuk badan hukum
                    Indonesia atau perorangan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 58
                      end: 66
                      node:
                        _key: 1
                        parentPasal: &ref_2
                          _key: 14
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Lembaga pelatihan kerja swasta sebagaimana dimaksud dalam
                    ayat (1) wajib memperoleh izin atau men daftar ke instansi
                    yang bertanggung jawab di bidang ketenagakerjaan di
                    kabupaten/kota.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga pelatihan kerja yang diselenggarakan oleh instansi
                    pemerintah mendaftarkan kegiatannya kepada instansi yang
                    bertanggung jawab di bidang ketenagakerjaan di
                    kabupaten/kota.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references:
                    - start: 119
                      end: 127
                      node:
                        _key: 3
                        parentPasal: *ref_2
                        _structureType: ayat
                    - start: 106
                      end: 114
                      node:
                        _key: 2
                        parentPasal: *ref_2
                        _structureType: ayat
                  text: >-
                    Ketentuan mengenai tata cara perizinan dan pendaftaran
                    lembaga pelatihan kerja sebagaimana dimaksud dalam ayat (2)
                    dan ayat (3) diatur dengan Keputusan Menteri.
        - _type: pasal
          _key: 15
          isi:
            _type: referenceText
            references: []
            text: >-
              Penyelenggara pelatihan kerja wajib memenuhi persyaratan : a.
              tersedianya tenaga kepelatihan, b. adanya kurikulum yang sesuai
              dengan tingkat pelatihan, c. tersedianya sarana dan prasarana
              pelatihan kerja, dan d. tersedianya dana bagi kelangsungan
              kegiatan penyelenggaraan pelatihan kerja.
        - _type: pasal
          _key: 16
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga pelatihan kerja swasta yang telah memperoleh izin
                    dan lembaga pelatihan kerja pemerintah yang telah terdaftar
                    dapat memperoleh akreditasi dari lembaga akreditasi.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 46
                      end: 54
                      node:
                        _key: 1
                        parentPasal: &ref_3
                          _key: 16
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Lembaga akreditasi sebagaimana dimaksud dalam ayat (1)
                    bersifat independen terdiri atas unsur masya rakat dan
                    pemerintah ditetapkan dengan Keputusan Menteri.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 72
                      end: 80
                      node:
                        _key: 2
                        parentPasal: *ref_3
                        _structureType: ayat
                  text: >-
                    Organisasi dan tata kerja lembaga akreditasi sebagaimana
                    dimaksud dalam ayat (2) diatur dengan Kepu tusan Menteri.
        - _type: pasal
          _key: 17
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references:
                    - start: 261
                      end: 268
                      node:
                        _key: 9
                        parentDocument: *ref_0
                        _structureType: pasal
                    - start: 336
                      end: 344
                      node:
                        _key: 15
                        parentDocument: *ref_0
                        _structureType: pasal
                  text: >-
                    Instansi yang bertanggung jawab di bidang ketenagakerjaan di
                    kabupaten/kota dapat menghentikan sementara pelaksanaan
                    penyelenggaraan pelatihan kerja, apabila dalam
                    pelaksanaannya ternyata : a. tidak sesuai dengan arah
                    pelatihan kerja sebagaimana dimaksud dalam Pasal 9: dan/atau
                    b. tidak memenuhi persyaratan sebagaimana dimaksud dalam
                    Pasal 15.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 93
                      end: 101
                      node:
                        _key: 1
                        parentPasal: &ref_4
                          _key: 17
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Penghentian sementara pelaksanaan penyelenggaraan pelatihan
                    kerja sebagaimana dimaksud dalam ayat (1), disertai alasan
                    dan saran perbaikan dan berlaku paling lama 6 (enam) bulan.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 163
                      end: 170
                      node:
                        _key: 9
                        parentDocument: *ref_0
                        _structureType: pasal
                    - start: 175
                      end: 183
                      node:
                        _key: 15
                        parentDocument: *ref_0
                        _structureType: pasal
                  text: >-
                    Penghentian sementara pelaksanaan penyelenggaraan pelatihan
                    kerja hanya dikenakan terhadap program pelatihan yang tidak
                    memenuhi syarat sebagaimana dimaksud dalam Pasal 9 dan Pasal
                    15.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references:
                    - start: 136
                      end: 144
                      node:
                        _key: 2
                        parentPasal: *ref_4
                        _structureType: ayat
                  text: >-
                    Bagi penyelenggara pelatihan kerja dalam waktu 6 (enam)
                    bulan tidak memenuhi dan melengkapi saran per baikan
                    sebagaimana dimaksud dalam ayat (2) dikenakan sanksi
                    penghentian program pelatihan.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references:
                    - start: 145
                      end: 153
                      node:
                        _key: 4
                        parentPasal: *ref_4
                        _structureType: ayat
                  text: >-
                    Penyelenggara pelatihan kerja yang tidak menaati dan tetap
                    melaksanakan program pelatihan kerja yang telah dihentikan
                    sebagaimana dimaksud dalam ayat (4) dikenakan sanksi
                    pencabutan izin dan pembatalan pendaftaran penyelenggara
                    pelatihan.
              - _type: ayat
                _key: 6
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai tata cara penghentian sementara,
                    penghentian, pencabutan izin, dan pembatalan pen daftaran
                    diatur dengan Keputusan Menteri.
        - _type: pasal
          _key: 18
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tenaga kerja berhak memperoleh pengakuan kompetensi kerja
                    setelah mengikuti pelatihan kerja yang di selenggarakan
                    lembaga pelatihan kerja pemerintah, lembaga pelatihan kerja
                    swasta, atau pelatihan di tempat kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 54
                      end: 62
                      node:
                        _key: 1
                        parentPasal: &ref_5
                          _key: 18
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Pengakuan kompetensi kerja sebagaimana dimaksud dalam ayat
                    (1) dilakukan melalui sertifikasi kompe tensi kerja.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 56
                      end: 64
                      node:
                        _key: 2
                        parentPasal: *ref_5
                        _structureType: ayat
                  text: >-
                    Sertifikasi kompetensi kerja sebagaimana dimaksud dalam ayat
                    (2) dapat pula diikuti oleh tenaga kerja yang telah
                    berpengalaman.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Untuk melaksanakan sertifikasi kompetensi kerja dibentuk
                    badan nasional sertifikasi profesi yang inde penden.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references:
                    - start: 90
                      end: 98
                      node:
                        _key: 4
                        parentPasal: *ref_5
                        _structureType: ayat
                  text: >-
                    Pembentukan badan nasional sertifikasi profesi yang
                    independen sebagaimana dimaksud dalam ayat (4) diatur dengan
                    Peraturan Pemerintah.
        - _type: pasal
          _key: 19
          isi:
            _type: referenceText
            references: []
            text: >-
              Pelatihan kerja bagi tenaga kerja penyandang cacat dilaksanakan
              dengan memperhatikan jenis, derajat kecacatan, dan kemampuan
              tenaga kerja penyandang cacat yang bersangkutan.
        - _type: pasal
          _key: 20
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Untuk mendukung peningkatan pelatihan kerja dalam rangka
                    pembangunan ketenagakerjaan, dikembang kan satu sistem
                    pelatihan kerja nasional yang merupakan acuan pelaksanaan
                    pelatihan kerja di semua bidang dan/atau sektor.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 113
                      end: 121
                      node:
                        _key: 1
                        parentPasal:
                          _key: 20
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Ketentuan mengenai bentuk, mekanisme, dan kelembagaan sistem
                    pelatihan kerja nasional sebagaimana dimaksud dalam ayat (1)
                    diatur dengan Peraturan Pemerintah.
        - _type: pasal
          _key: 21
          isi:
            _type: referenceText
            references: []
            text: Pelatihan kerja dapat diselenggarakan dengan sistem pemagangan.
        - _type: pasal
          _key: 22
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemagangan dilaksanakan atas dasar perjanjian pemagangan
                    antara peserta dengan pengusaha yang di buat secara
                    tertulis.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 49
                      end: 57
                      node:
                        _key: 1
                        parentPasal: &ref_6
                          _key: 22
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Perjanjian pemagangan sebagaimana dimaksud dalam ayat (1),
                    sekurang- kurangnya memuat ketentuan hak dan kewajiban
                    peserta dan pengusaha serta jangka waktu pemagangan.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 95
                      end: 103
                      node:
                        _key: 1
                        parentPasal: *ref_6
                        _structureType: ayat
                  text: >-
                    Pemagangan yang diselenggarakan tidak melalui perjanjian
                    pemagangan sebagaimana dimaksud dalam ayat (1), dianggap
                    tidak sah dan status peserta berubah menjadi pekerja/buruh
                    perusahaan yang bersangkutan.
        - _type: pasal
          _key: 23
          isi:
            _type: referenceText
            references: []
            text: >-
              Tenaga kerja yang telah mengikuti program pemagangan berhak atas
              pengakuan kualifikasi kompetensi kerja dari perusahaan atau
              lembaga sertifikasi.
        - _type: pasal
          _key: 24
          isi:
            _type: referenceText
            references: []
            text: >-
              Pemagangan dapat dilaksanakan di perusahaan sendiri atau di tempat
              penyelenggaraan pelatihan kerja, atau perusahaan lain, baik di
              dalam maupun di luar wilayah Indonesia.
        - _type: pasal
          _key: 25
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemagangan yang dilakukan di luar wilayah Indonesia wajib
                    mendapat izin dari Menteri atau pejabat yang ditunjuk.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 49
                      end: 57
                      node:
                        _key: 1
                        parentPasal: &ref_7
                          _key: 25
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Untuk memperoleh izin sebagaimana dimaksud dalam ayat (1),
                    penyelenggara pemagangan harus ber bentuk badan hukum
                    Indonesia sesuai dengan peraturan perundang-undangan yang
                    berlaku.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 116
                      end: 124
                      node:
                        _key: 2
                        parentPasal: *ref_7
                        _structureType: ayat
                    - start: 103
                      end: 111
                      node:
                        _key: 1
                        parentPasal: *ref_7
                        _structureType: ayat
                  text: >-
                    Ketentuan mengenai tata cara perizinan pemagangan di luar
                    wilayah Indonesia sebagaimana dimaksud dalam ayat (1) dan
                    ayat (2), diatur dengan Keputusan Menteri.
        - _type: pasal
          _key: 26
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penyelenggaraan pemagangan di luar wilayah Indonesia harus
                    memperhatikan : a. harkat dan martabat bangsa Indonesia, b.
                    penguasaan kompetensi yang lebih tinggi, dan c. perlindungan
                    dan kesejahteraan peserta pemagangan, termasuk melaksanakan
                    ibadahnya.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Menteri atau pejabat yang ditunjuk dapat menghentikan
                    pelaksanaan pemagangan di luar wilayah Indo nesia apabila di
                    dalam pelaksanaannya ternyata tidak sesuai dengan ketentuan
                    sebagaimana dimaksud dalam ayat @).
        - _type: pasal
          _key: 27
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Menteri dapat mewajibkan kepada perusahaan yang memenuhi
                    persyaratan untuk melaksanakan program pemagangan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 56
                      end: 64
                      node:
                        _key: 1
                        parentPasal:
                          _key: 27
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Dalam menetapkan persyaratan sebagaimana dimaksud dalam ayat
                    (1), Menteri harus memperhatikan ke pentingan perusahaan,
                    masyarakat, dan negara.
        - _type: pasal
          _key: 28
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Untuk memberikan saran dan pertimbangan dalam penetapan
                    kebijakan serta melakukan koordinasi pela tihan kerja dan
                    pemagangan dibentuk lembaga koordinasi pelatihan kerja
                    nasional.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 104
                      end: 112
                      node:
                        _key: 1
                        parentPasal:
                          _key: 28
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Pembentukan, keanggotaan, dan tata kerja lembaga koordinasi
                    pelatihan kerja sebagaimana dimaksud da lam ayat (1), diatur
                    dengan Keputusan Presiden.
        - _type: pasal
          _key: 29
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah Pusat dan/atau Pemerintah Daerah melakukan
                    pembinaan pelatihan kerja dan pemagangan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pembinaan pelatihan kerja dan pemagangan ditujukan ke arah
                    peningkatan relevansi, kualitas, dan efisien si
                    penyelenggaraan pelatihan kerja dan produktivitas.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 53
                      end: 61
                      node:
                        _key: 2
                        parentPasal:
                          _key: 29
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Peningkatan produktivitas sebagaimana dimaksud dalam ayat
                    (2), dilakukan melalui pengembangan buda ya produktif, etos
                    kerja, teknologi, dan efisiensi kegiatan ekonomi, menuju
                    terwujudnya produktivitas nasional.
        - _type: pasal
          _key: 30
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references:
                    - start: 60
                      end: 77
                      node:
                        parentPasal:
                          parentDocument: *ref_0
                          _key: 29
                          _structureType: pasal
                        _key: 2
                        _structureType: ayat
                  text: >-
                    Untuk meningkatkan produktivitas sebagaimana dimaksud dalam
                    Pasal 29 ayat (2) dibentuk lembaga pro duktivitas yang
                    bersifat nasional.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 49
                      end: 57
                      node:
                        _key: 1
                        parentPasal: &ref_8
                          _key: 30
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Lembaga produktivitas sebagaimana dimaksud dalam ayat (1)
                    berbentuk jejaring kelembagaan pelayanan peningkatan
                    produktivitas, yang bersifat lintas sektor maupun daerah.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 99
                      end: 107
                      node:
                        _key: 1
                        parentPasal: *ref_8
                        _structureType: ayat
                  text: >-
                    Pembentukan, keanggotaan, dan tata kerja lembaga
                    produktivitas nasional sebagaimana dimaksud dalam ayat (1),
                    diatur dengan Keputusan Presiden.
  - _type: bab
    _key: 6
    _judul: PENEMPATAN TENAGA KERJA
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 31
          isi:
            _type: referenceText
            references: []
            text: >-
              Setiap tenaga kerja mempunyai hak dan kesempatan yang sama untuk
              memilih, mendapatkan, atau pindah pekerjaan dan memperoleh
              penghasilan yang layak di dalam atau di luar negeri.
        - _type: pasal
          _key: 32
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penempatan tenaga kerja dilaksanakan berdasarkan asas
                    terbuka, bebas, obyektif, serta adil, dan setara tanpa
                    diskriminasi.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penempatan tenaga kerja diarahkan untuk menempatkan tenaga
                    kerja pada jabatan yang tepat sesuai de ngan keahlian,
                    keterampilan, bakat, minat, dan kemampuan dengan
                    memperhatikan harkat, martabat, hak asasi, dan perlindungan
                    hukum.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penempatan tenaga kerja dilaksanakan dengan memperhatikan
                    pemerataan kesempatan kerja dan penye diaan tenaga kerja
                    sesuai dengan kebutuhan program nasional dan daerah.
        - _type: pasal
          _key: 33
          isi:
            _type: referenceText
            references: []
            text: >-
              Penempatan tenaga kerja terdiri dari : a. penempatan tenaga kerja
              di dalam negeri, dan b. penempatan tenaga kerja di luar negeri.
        - _type: pasal
          _key: 34
          isi:
            _type: referenceText
            references:
              - start: 85
                end: 93
                node:
                  _key: 33
                  parentDocument: *ref_0
                  _structureType: pasal
            text: >-
              Ketentuan mengenai penempatan tenaga kerja di luar negeri
              sebagaimana dimaksud dalam Pasal 33 huruf b diatur dengan
              undang-undang.
        - _type: pasal
          _key: 35
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja yang memerlukan tenaga kerja dapat merekrut
                    sendiri tenaga kerja yang dibutuhkan atau melalui pelaksana
                    penempatan tenaga kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 61
                      end: 69
                      node:
                        _key: 1
                        parentPasal: &ref_9
                          _key: 35
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Pelaksana penempatan tenaga kerja sebagaimana dimaksud dalam
                    ayat (1) wajib memberikan perlindu ngan sejak rekrutmen
                    sampai penempatan tenaga kerja
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 41
                      end: 49
                      node:
                        _key: 1
                        parentPasal: *ref_9
                        _structureType: ayat
                  text: >-
                    Pemberi kerja sebagaimana dimaksud dalam ayat (1) dalam
                    mempekerjakan tenaga kerja wajib memberi kan perlindungan
                    yang mencakup kesejahteraan, keselamatan, dan kesehatan baik
                    mental maupun fisik tenaga kerja.
        - _type: pasal
          _key: 36
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references:
                    - start: 66
                      end: 83
                      node:
                        parentPasal:
                          parentDocument: *ref_0
                          _key: 35
                          _structureType: pasal
                        _key: 1
                        _structureType: ayat
                  text: >-
                    Penempatan tenaga kerja oleh pelaksana sebagaimana dimaksud
                    dalam Pasal 35 ayat (1) dilakukan dengan memberikan
                    pelayanan penempatan tenaga kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 61
                      end: 69
                      node:
                        _key: 1
                        parentPasal: &ref_10
                          _key: 36
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Pelayanan penempatan tenaga kerja sebagaimana dimaksud dalam
                    ayat (1) bersifat terpadu dalam satu sistem penempatan
                    tenaga kerja yang meliputi unsur-unsur : a. pencari kerja,
                    b. lowongan pekerjaan, c. informasi pasar kerja, d.
                    mekanisme antar kerja, dan e. kelembagaan penempatan tenaga
                    kerja.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 70
                      end: 78
                      node:
                        _key: 2
                        parentPasal: *ref_10
                        _structureType: ayat
                  text: >-
                    Unsur-unsur sistem penempatan tenaga kerja sebagaimana
                    dimaksud dalam ayat (2) dapat dilaksanakan secara terpisah
                    yang ditujukan untuk terwujudnya penempatan tenaga kerja.
        - _type: pasal
          _key: 37
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references:
                    - start: 61
                      end: 78
                      node:
                        parentPasal:
                          parentDocument: *ref_0
                          _key: 35
                          _structureType: pasal
                        _key: 1
                        _structureType: ayat
                  text: >-
                    Pelaksana penempatan tenaga kerja sebagaimana dimaksud dalam
                    Pasal 35 ayat (1) terdiri dari : a. instansi pemerintah yang
                    bertanggung jawab di bidang ketenaga- kerjaan, dan b.
                    lembaga swasta berbadan hukum.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 66
                      end: 82
                      node:
                        _key: b
                        parentPoints:
                          _key: 1
                          parentPasal:
                            _key: 37
                            parentDocument: *ref_0
                            _structureType: pasal
                          _structureType: ayat
                        _structureType: point
                  text: >-
                    Lembaga penempatan tenaga kerja swasta sebagaimana dimaksud
                    dalam ayat (1) huruf b dalam melak sanakan pelayanan
                    penempatan tenaga kerja wajib memiliki izin tertulis dari
                    Menteri atau pejabat yang ditunjuk.
        - _type: pasal
          _key: 38
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references:
                    - start: 61
                      end: 78
                      node:
                        parentPasal:
                          parentDocument: *ref_0
                          _key: 37
                          _structureType: pasal
                        _key: 1
                        _structureType: ayat
                  text: >-
                    Pelaksana penempatan tenaga kerja sebagaimana dimaksud dalam
                    Pasal 37 ayat (1) huruf a, dilarang memungut biaya
                    penempatan, baik langsung maupun tidak langsung, sebagian
                    atau keseluruhan kepada tenaga kerja dan pengguna tenaga
                    kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 66
                      end: 83
                      node:
                        parentPasal:
                          parentDocument: *ref_0
                          _key: 37
                          _structureType: pasal
                        _key: 1
                        _structureType: ayat
                  text: >-
                    Lembaga penempatan tenaga kerja swasta sebagaimana dimaksud
                    dalam Pasal 37 ayat (1) huruf b, hanya dapat memungut biaya
                    penempatan tenaga kerja dari pengguna tenaga kerja dan dari
                    tenaga kerja golongan dan jabatan tertentu.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 48
                      end: 56
                      node:
                        _key: 2
                        parentPasal:
                          _key: 38
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Golongan dan jabatan sebagaimana dimaksud dalam ayat (2)
                    ditetapkan dengan Keputusan Menteri.
  - _type: bab
    _key: 7
    _judul: PERLUASAN KESEMPATAN KERJA
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 39
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah bertanggung jawab mengupayakan perluasan
                    kesempatan kerja baik di dalam maupun di luar hubungan
                    kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah dan masyarakat bersama-sama mengupayakan
                    perluasan kesempatan kerja baik di dalam maupun di luar
                    hubungan kerja.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Semua kebijakan pemerintah baik pusat maupun daerah di
                    setiap sektor diarahkan untuk mewujudkan per luasan
                    kesempatan kerja baik di dalam maupun di luar hubungan
                    kerja.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga keuangan baik perbankan maupun non perbankan, dan
                    dunia usaha perlu membantu dan mem berikan kemudahan bagi
                    setiap kegiatan masyarakat yang dapat menciptakan atau
                    mengembangkan perluasan kesempatan kerja.
        - _type: pasal
          _key: 40
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    dilakukan dengan pola pembentukan dan pembinaan tenaga kerja
                    mandiri, penerapan sistem padat karya, penerapan teknologi
                    tepat guna, dan pendayagunaan tenaga kerja sukarela atau
                    pola lain yang dapat mendorong terciptanya perluasan
                    kesempatan kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penciptaan perluasan kesempatan kerja sebagaimana dimaksud
                    dalam ayat
        - _type: pasal
          _key: 41
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah menetapkan kebijakan ketenagakerjaan dan
                    perluasan kesempatan kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 98
                      end: 106
                      node:
                        _key: 1
                        parentPasal: &ref_11
                          _key: 41
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Pemerintah dan masyarakat bersama-sama mengawasi pelaksanaan
                    kebijakan sebagaimana dimaksud dalam ayat (1).
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 52
                      end: 60
                      node:
                        _key: 2
                        parentPasal: *ref_11
                        _structureType: ayat
                  text: >-
                    Dalam melaksanakan tugas sebagaimana dimaksud dalam ayat (2)
                    dapat dibentuk badan koordinasi yang beranggotakan unsur
                    pemerintah dan unsur masyarakat.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references:
                    - start: 107
                      end: 115
                      node:
                        _key: 39
                        parentDocument: *ref_0
                        _structureType: pasal
                    - start: 117
                      end: 125
                      node:
                        _key: 40
                        parentDocument: *ref_0
                        _structureType: pasal
                    - start: 131
                      end: 139
                      node:
                        _key: 3
                        parentPasal: *ref_11
                        _structureType: ayat
                  text: >-
                    Ketentuan mengenai perluasan kesempatan kerja, dan
                    pembentukan badan koordinasi sebagaimana dimaksud dalam
                    Pasal 39, Pasal 40, dan ayat (3) dalam pasal ini diatur
                    dengan Peraturan Pemerintah.
  - _type: bab
    _key: 8
    _judul: PENGGUNAAN TENAGA KERJA ASING
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 42
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Setiap pemberi kerja yang mempekerjakan tenaga kerja asing
                    wajib memiliki izin tertulis dari Menteri atau pejabat yang
                    ditunjuk.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja orang perseorangan dilarang mempekerjakan
                    tenaga kerja asing.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 51
                      end: 59
                      node:
                        _key: 1
                        parentPasal: &ref_12
                          _key: 42
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Kewajiban memiliki izin sebagaimana dimaksud dalam ayat (1),
                    tidak berlaku bagi perwakilan negara asing yang
                    mempergunakan tenaga kerja asing sebagai pegawai diplomatik
                    dan konsuler.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tenaga kerja asing dapat dipekerjakan di Indonesia hanya
                    dalam hubungan kerja untuk jabatan tertentu dan waktu
                    tertentu.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references:
                    - start: 82
                      end: 90
                      node:
                        _key: 4
                        parentPasal: *ref_12
                        _structureType: ayat
                  text: >-
                    Ketentuan mengenai jabatan tertentu dan waktu tertentu
                    sebagaimana dimaksud dalam ayat (4) ditetapkan dengan
                    Keputusan Menteri.
              - _type: ayat
                _key: 6
                isi:
                  _type: referenceText
                  references:
                    - start: 46
                      end: 54
                      node:
                        _key: 4
                        parentPasal: *ref_12
                        _structureType: ayat
                  text: >-
                    Tenaga kerja asing sebagaimana dimaksud dalam ayat (4) yang
                    masa kerjanya habis dan tidak dapat di perpanjang dapat
                    digantikan oleh tenaga kerja asing lainnya.
        - _type: pasal
          _key: 43
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references:
                    - start: 385
                      end: 393
                      node:
                        _key: 1
                        parentPasal:
                          _key: 43
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    sekurang-kurangnya me muat keterangan : a. alasan penggunaan
                    tenaga kerja asing, b. jabatan dan/atau kedudukan tenaga
                    kerja asing dalam struktur organisasi perusahaan yang
                    bersangkutan, c. jangka waktu penggunaan tenaga kerja asing,
                    dan d. penunjukan tenaga kerja warga negara Indonesia
                    sebagai pendamping tenaga kerja asing yang dipekerjakan. (3)
                    Ketentuan sebagaimana dimaksud dalam ayat (1) tidak berlaku
                    bagi instansi pemerintah, badan-badan internasional dan
                    perwakilan negara asing. (4) Ketentuan mengenai tata cara
                    pengesahan rencana penggunaan tenaga kerja asing diatur
                    dengan Keputu san Menteri.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Rencana penggunaan tenaga kerja asing sebagaimana dimaksud
                    dalam ayat
        - _type: pasal
          _key: 44
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja tenaga kerja asing wajib menaati ketentuan
                    mengenai jabatan dan standar kompetensi yang berlaku.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 77
                      end: 85
                      node:
                        _key: 1
                        parentPasal:
                          _key: 44
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Ketentuan mengenai jabatan dan standar kompetensi
                    sebagaimana dimaksud dalam ayat (1) diatur dengan Keputusan
                    Menteri.
        - _type: pasal
          _key: 45
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja tenaga kerja asing wajib : a. menunjuk tenaga
                    kerja warga negara Indonesia sebagai tenaga pendamping
                    tenaga kerja asing yang dipekerjakan untuk alih teknologi
                    dan alih keahlian dari tenaga kerja asing, dan b.
                    melaksanakan pendidikan dan pelatihan kerja bagi tenaga
                    kerja Indonesia sebagaimana dimaksud pada huruf a yang
                    sesuai dengan kualifikasi jabatan yang diduduki oleh tenaga
                    kerja asing.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 37
                      end: 45
                      node:
                        _key: 1
                        parentPasal:
                          _key: 45
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Ketentuan sebagaimana dimaksud dalam ayat (1) tidak berlaku
                    bagi tenaga kerja asing yang menduduki ja batan direksi
                    dan/atau komisaris.
        - _type: pasal
          _key: 46
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tenaga kerja asing dilarang menduduki jabatan yang mengurusi
                    personalia dan/atau jabatan-jabatan ter tentu.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 52
                      end: 60
                      node:
                        _key: 1
                        parentPasal:
                          _key: 46
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Jabatan-jabatan tertentu sebagaimana dimaksud dalam ayat (1)
                    diatur dengan Keputusan Menteri
        - _type: pasal
          _key: 47
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja wajib membayar kompensasi atas setiap tenaga
                    kerja asing yang dipekerjakannya.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 57
                      end: 65
                      node:
                        _key: 1
                        parentPasal: &ref_13
                          _key: 47
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Kewajiban membayar kompensasi sebagaimana dimaksud dalam
                    ayat (1) tidak berlaku bagi instansi pe merintah, perwakilan
                    negara asing, badan- badan internasional, lembaga sosial,
                    lembaga keagamaan, dan jabatan- jabatan tertentu di lembaga
                    pendidikan.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 93
                      end: 101
                      node:
                        _key: 2
                        parentPasal: *ref_13
                        _structureType: ayat
                  text: >-
                    Ketentuan mengenai jabatan-jabatan tertentu di lembaga
                    pendidikan sebagaimana dimaksud dalam ayat (2) diatur dengan
                    Keputusan Menteri.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai besarnya kompensasi dan penggunaannya
                    diatur dengan Peraturan Pemerintah.
        - _type: pasal
          _key: 48
          isi:
            _type: referenceText
            references: []
            text: >-
              Pemberi kerja yang mempekerjakan tenaga kerja asing wajib
              memulangkan tenaga kerja asing ke negara asalnya setelah hubungan
              kerjanya berakhir.
        - _type: pasal
          _key: 49
          isi:
            _type: referenceText
            references: []
            text: >-
              Ketentuan mengenai penggunaan tenaga kerja asing serta pelaksanaan
              pendidikan dan pelatihan tenaga kerja pendamping diatur dengan
              Keputusan Presiden.
  - _type: bab
    _key: 9
    _judul: HUBUNGAN KERJA
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 50
          isi:
            _type: referenceText
            references: []
            text: >-
              Hubungan kerja terjadi karena adanya perjanjian kerja antara
              pengusaha dan pekerja/buruh.
        - _type: pasal
          _key: 51
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: Perjanjian kerja dibuat secara tertulis atau lisan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja yang dipersyaratkan secara tertulis
                    dilaksanakan sesuai dengan peraturan perundang undangan yang
                    berlaku.
        - _type: pasal
          _key: 52
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja dibuat atas dasar : a. kesepakatan kedua
                    belah pihak, b. kemampuan atau kecakapan melakukan perbuatan
                    hukum, c. adanya pekerjaan yang diperjanjikan, dan d.
                    pekerjaan yang diperjanjikan tidak bertentangan dengan
                    ketertiban umum, kesusilaan, dan peraturan perundang
                    undangan yang berlaku.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 128
                      end: 129
                      node:
                        _key: b
                        parentPoints: &ref_14
                          _key: 1
                          parentPasal: &ref_15
                            _key: 52
                            parentDocument: *ref_0
                            _structureType: pasal
                          _structureType: ayat
                        _structureType: point
                    - start: 107
                      end: 123
                      node:
                        _key: a
                        parentPoints: *ref_14
                        _structureType: point
                  text: >-
                    Perjanjian kerja yang dibuat oleh para pihak yang
                    bertentangan dengan ketentuan sebagaimana dimaksud dalam
                    ayat (1) huruf a dan b dapat dibatalkan.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 128
                      end: 129
                      node:
                        _key: d
                        parentPoints: &ref_16
                          _key: 1
                          parentPasal: *ref_15
                          _structureType: ayat
                        _structureType: point
                    - start: 107
                      end: 123
                      node:
                        _key: c
                        parentPoints: *ref_16
                        _structureType: point
                  text: >-
                    Perjanjian kerja yang dibuat oleh para pihak yang
                    bertentangan dengan ketentuan sebagaimana dimaksud dalam
                    ayat (1) huruf c dan d batal demi hukum.
        - _type: pasal
          _key: 53
          isi:
            _type: referenceText
            references: []
            text: >-
              Segala hal dan/atau biaya yang diperlukan bagi pelaksanaan
              pembuatan perjanjian kerja dilaksanakan oleh dan menjadi tanggung
              jawab pengusaha.
        - _type: pasal
          _key: 54
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja yang dibuat secara tertulis sekurang
                    kurangnya memuat : a. nama, alamat perusahaan, dan jenis
                    usaha, b. nama, jenis kelamin, umur, dan alamat
                    pekerja/buruh, c. jabatan atau jenis pekerjaan, d. tempat
                    pekerjaan, e. besarnya upah dan cara pembayarannya, f.
                    syarat syarat kerja yang memuat hak dan kewajiban pengusaha
                    dan pekerja/buruh, g. mulai dan jangka waktu berlakunya
                    perjanjian kerja, h. tempat dan tanggal perjanjian kerja
                    dibuat, dan Ii. tanda tangan para pihak dalam perjanjian
                    kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 60
                      end: 76
                      node:
                        _key: e
                        parentPoints:
                          _key: 1
                          parentPasal: &ref_17
                            _key: 54
                            parentDocument: *ref_0
                            _structureType: pasal
                          _structureType: ayat
                        _structureType: point
                  text: >-
                    Ketentuan dalam perjanjian kerja sebagaimana dimaksud dalam
                    ayat (1) huruf e dan f, tidak boleh ber-tentangan dengan
                    peraturan perusahaan, perjanjian kerja bersama, dan
                    peraturan perundang undangan yang berlaku.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 44
                      end: 52
                      node:
                        _key: 1
                        parentPasal: *ref_17
                        _structureType: ayat
                  text: >-
                    Perjanjian kerja sebagaimana dimaksud dalam ayat (1) dibuat
                    sekurang kurangnya rangkap 2 (dua), yang mempunyai kekuatan
                    hukum yang sama, serta pekerja/buruh dan pengusaha masing
                    masing mendapat 1 (satu) perjanjian kerja.
        - _type: pasal
          _key: 55
          isi:
            _type: referenceText
            references: []
            text: >-
              Perjanjian kerja tidak dapat ditarik kembali dan/atau diubah,
              kecuali atas persetujuan para pihak.
        - _type: pasal
          _key: 56
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    didasarkan atas : a. Jangka waktu, atau b. selesainya suatu
                    pekerjaan tertentu.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu sebagaimana dimaksud
                    dalam ayat
        - _type: pasal
          _key: 57
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu dibuat secara tertulis
                    serta harus menggunakan bahasa Indonesia dan huruf latin.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 123
                      end: 131
                      node:
                        _key: 1
                        parentPasal:
                          _key: 57
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Perjanjian kerja untuk waktu tertentu yang dibuat tidak
                    tertulis bertentangan dengan ketentuan sebagai mana dimaksud
                    dalam ayat (1) dinyatakan sebagai perjanjian kerja untuk
                    waktu tidak tertentu.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal perjanjian kerja dibuat dalam bahasa Indonesia dan
                    bahasa asing, apabila kemudian terdapat perbedaan penafsiran
                    antara keduanya, maka yang berlaku perjanjian kerja yang
                    dibuat dalam bahasa Indonesia.
        - _type: pasal
          _key: 58
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu tidak dapat
                    mensyaratkan adanya masa percobaan kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 93
                      end: 101
                      node:
                        _key: 1
                        parentPasal:
                          _key: 58
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Dalam hal disyaratkan masa percobaan kerja dalam perjanjian
                    kerja sebagaimana dimaksud dalam ayat (1), masa percobaan
                    kerja yang disyaratkan batal demi hukum.
        - _type: pasal
          _key: 59
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu hanya dapat dibuat
                    untuk pekerjaan tertentu yang menurut jenis dan sifat atau
                    kegiatan pekerjaannya akan selesai dalam waktu tertentu,
                    yaitu : a. pekerjaan yang sekali selesai atau yang sementara
                    sifatnya, b. pekerjaan yang diperkirakan penyelesaiannya
                    dalam waktu yang tidak terlalu lama dan paling lama 3 (tiga)
                    tahun, Cc. pekerjaan yang bersifat musiman, atau d.
                    pekerjaan yang berhubungan dengan produk baru, kegiatan
                    baru, atau produk tambahan yang masih dalam percobaan atau
                    penjajakan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu tidak dapat diadakan
                    untuk pekerjaan yang bersifat tetap.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu dapat diperpanjang
                    atau diperbaharui.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja waktu tertentu yang didasarkan atas jangka
                    waktu tertentu dapat diadakan untuk paling lama 2 (dua)
                    tahun dan hanya boleh diperpanjang 1 (satu) kali untuk
                    jangka waktu paling lama 1 (satu) tahun.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha yang bermaksud memperpanjang perjanjian kerja
                    waktu tertentu tersebut, paling lama 7 (tujuh) hari sebelum
                    perjanjian kerja waktu tertentu berakhir telah
                    memberitahukan maksudnya secara tertulis kepada
                    pekerja/buruh yang bersangkutan.
              - _type: ayat
                _key: 6
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pembaruan perjanjian kerja waktu tertentu hanya dapat
                    diadakan setelah melebihi masa tenggang waktu 30 (tiga
                    puluh) hari berakhirnya perjanjian kerja waktu tertentu yang
                    lama, pembaruan perjanjian kerja waktu tertentu ini hanya
                    boleh dilakukan 1 (satu) kali dan paling lama 2 (dua) tahun.
              - _type: ayat
                _key: 7
                isi:
                  _type: referenceText
                  references:
                    - start: 139
                      end: 147
                      node:
                        _key: 6
                        parentPasal: &ref_18
                          _key: 59
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                    - start: 125
                      end: 133
                      node:
                        _key: 5
                        parentPasal: *ref_18
                        _structureType: ayat
                    - start: 115
                      end: 123
                      node:
                        _key: 4
