                  references: []
                  text: >-
                    Perjanjian kerja berakhir apabila : a. pekerja meninggal
                    dunia, b. berakhirnya jangka waktu perjanjian kerja, c.
                    adanya putusan pengadilan dan/atau putusan atau penetapan
                    lembaga penyelesaian perselisihan hubungan industrial yang
                    telah mempunyai kekuatan hukum tetap, atau d. adanya keadaan
                    atau kejadian tertentu yang dicantumkan dalam perjanjian
                    kerja, peraturan perusahaan, atau perjanjian kerja bersama
                    yang dapat menyebabkan berakhirnya hubungan kerja.
