  - _type: bab
    _key: 15
    _judul: PENYIDIKAN
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 182
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Selain penyidik pejabat Polisi Negara Republik Indonesia,
                    juga kepada pegawai pengawas ketenagakerjaan dapat diberi
                    wewenang khusus sebagai penyidik pegawai negeri sipil sesuai
                    dengan peraturan perundang- undangan yang berlaku.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references:
                    - start: 57
                      end: 65
                      node:
                        _key: 1
                        parentPasal: &ref_60
                          _key: 182
                          parentDocument: *ref_0
                          _structureType: pasal
                        _structureType: ayat
                  text: >-
                    Penyidik Pegawai Negeri Sipil sebagaimana dimaksud dalam
                    ayat (1) berwenang : a. melakukan pemeriksaan atas kebenaran
                    laporan serta keterangan tentang tindak pidana di bidang
                    ketenaga-kerjaan, b. melakukan pemeriksaan terhadap orang
                    yang diduga melakukan tindak pidana di bidang
                    ketenagakerjaan, c. meminta keterangan dan bahan bukti dari
                    orang atau badan hukum sehubungan dengan tindak pidana di
                    bidang ketenagakerjaan, d. melakukan pemeriksaan atau
                    penyitaan bahan atau barang bukti dalam perkara tindak
                    pidana di bidang ketenagakerjaan, e. melakukan pemeriksaan
                    atas surat dan/atau dokumen lain tentang tindak pidana di
                    bidang ketenagakerjaan, f. meminta bantuan tenaga ahli dalam
                    rangka pelaksanaan tugas penyidikan tindak pidana di bidang
                    ketenagakerjaan, dan g. menghentikan penyidikan apabila
                    tidak terdapat cukup bukti yang membuktikan tentang adanya
                    tindak pidana di bidang ketenagakerjaan.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references:
                    - start: 68
                      end: 76
                      node:
                        _key: 2
                        parentPasal: *ref_60
                        _structureType: ayat
                  text: >-
                    Kewenangan penyidik pegawai negeri sipil sebagaimana
                    dimaksud dalam ayat (2) dilaksanakan sesuai dengan peraturan
                    perundang-undangan yang berlaku.
