_node:
  _structureType: document
  _documentType: uu
  tahun: 2003
  nomor: 13
babs:
  - _type: bab
    _key: 1
    _judul: KETENTUAN UMUM
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 1
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: 'Dalam undang undang ini yang dimaksud dengan :'
            isi:
              - _type: numPoint
                _key: '1'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketenagakerjaan adalah segala hal yang berhubungan dengan
                    tenaga kerja pada waktu sebelum, selama, dan sesudah masa
                    kerja.
              - _type: numPoint
                _key: '2'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tenaga kerja adalah setiap orang yang mampu melakukan
                    pekerjaan guna menghasilkan barang dan/atau jasa baik untuk
                    memenuhi kebutuhan sendiri maupun untuk masyarakat.
              - _type: numPoint
                _key: '3'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pekerja/buruh adalah setiap orang yang bekerja dengan
                    menerima upah atau imbalan dalam bentuk lain.
              - _type: numPoint
                _key: '4'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja adalah orang perseorangan, pengusaha, badan
                    hukum, atau badan-badan lainnya yang mempekerjakan tenaga
                    kerja dengan membayar upah atau imbalan dalam bentuk lain.
              - _type: numPoint
                _key: '5'
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: 'Pengusaha adalah :'
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          orang perseorangan, persekutuan, atau badan hukum yang
                          menjalankan suatu perusahaan milik sendiri,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          orang perseorangan, persekutuan, atau badan hukum yang
                          secara berdiri sendiri menjalankan perusahaan bukan
                          miliknya,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          orang perseorangan, persekutuan, atau badan hukum yang
                          berada di Indonesia mewakili perusahaan sebagaimana
                          dimaksud dalam huruf a dan b yang berkedudukan di luar
                          wilayah Indonesia.
              - _type: numPoint
                _key: '6'
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: 'Perusahaan adalah :'
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          setiap bentuk usaha yang berbadan hukum atau tidak,
                          milik orang perseorangan, milik persekutuan, atau
                          milik badan hukum, baik milik swasta maupun milik
                          negara yang mempekerjakan pekerja/buruh dengan
                          membayar upah atau imbalan dalam bentuk lain:
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          usaha-usaha sosial dan usaha-usaha lain yang mempunyai
                          pengurus dan mempekerjakan orang lain dengan membayar
                          upah atau imbalan dalam bentuk lain.
              - _type: numPoint
                _key: '7'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perencanaan tenaga kerja adalah proses penyusunan rencana
                    ketenagakerjaan secara sistematis yang dijadikan dasar dan
                    acuan dalam penyusunan kebijakan, strategi, dan pelaksanaan
                    program pembangunan ketenagakerjaan yang berkesinambungan.
              - _type: numPoint
                _key: '8'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Informasi ketenagakerjaan adalah gabungan, rangkaian, dan
                    analisis data yang berbentuk angka yang telah diolah, naskah
                    dan dokumen yang mempunyai arti, nilai dan makna tertentu
                    mengenai ketenagakerjaan.
              - _type: numPoint
                _key: '9'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelatihan kerja adalah keseluruhan kegiatan untuk memberi,
                    memperoleh, meningkatkan, serta mengembangkan kompetensi
                    kerja, produktivitas, disiplin, sikap, dan etos kerja pada
                    tingkat keterampilan dan keahlian tertentu sesuai dengan
                    jenjang dan kualifikasi jabatan atau pekerjaan.
              - _type: numPoint
                _key: '10'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Kompetensi kerja adalah kemampuan kerja setiap individu yang
                    mencakup aspek pengetahuan, keterampilan, dan sikap kerja
                    yang sesuai dengan standar yang ditetapkan.
              - _type: numPoint
                _key: '11'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemagangan adalah bagian dari sistem pelatihan kerja yang
                    diselenggarakan secara terpadu antara pelatihan di lembaga
                    pelatihan dengan bekerja secara langsung di bawah bimbingan
                    dan pengawasan instruktur atau pekerja/buruh yang lebih
                    berpengalaman, dalam proses produksi barang dan/atau jasa di
                    perusahaan, dalam rangka menguasai keterampilan atau
                    keahlian tertentu.
              - _type: numPoint
                _key: '12'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelayanan penempatan tenaga kerja adalah kegiatan untuk
                    mempertemukan tenaga kerja dengan pemberi kerja, sehingga
                    tenaga kerja dapat memperoleh pekerjaan yang sesuai dengan
                    bakat, minat, dan kemampuannya, dan pemberi kerja dapat
                    memperoleh tenaga kerja yang sesuai dengan kebutuhannya.
              - _type: numPoint
                _key: '13'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tenaga kerja asing adalah warga negara asing pemegang visa
                    dengan maksud bekerja di wilayah Indonesia.
              - _type: numPoint
                _key: '14'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja adalah perjanjian antara pekerja/buruh
                    dengan pengusaha atau pemberi kerja yang memuat syarat
                    syarat kerja, hak, dan kewajiban para pihak.
              - _type: numPoint
                _key: '15'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Hubungan kerja adalah hubungan antara pengusaha dengan
                    pekerja/buruh berdasarkan perjanjian kerja, yang mempunyai
                    unsur pekerjaan, upah, dan perintah.
              - _type: numPoint
                _key: '16'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Hubungan industrial adalah suatu sistem hubungan yang
                    terbentuk antara para pelaku dalam proses produksi barang
                    dan/atau jasa yang terdiri dari unsur pengusaha,
                    pekerja/buruh, dan pemerintah yang didasarkan pada nilai
                    nilai Pancasila dan Undang Undang Dasar Negara Republik
                    Indonesia Tahun 1945. 5.
              - _type: numPoint
                _key: '17'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Serikat pekerja/serikat buruh adalah organisasi yang
                    dibentuk dari, oleh, dan untuk pekerja/buruh baik di
                    perusahaan maupun di luar perusahaan, yang bersifat bebas,
                    terbuka, mandiri, demokratis, dan bertanggung jawab guna
                    memperjuangkan, membela serta melindungi hak dan kepentingan
                    pekerja/buruh serta meningkatkan kesejahteraan pekerja/buruh
                    dan keluarganya.
              - _type: numPoint
                _key: '18'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga kerja sama bipartit adalah forum komunikasi dan
                    konsultasi mengenai hal-hal yang berkaitan dengan hubungan
                    industrial di satu perusahaan yang anggotanya terdiri dari
                    pengusaha dan serikat pekerja/ serikat buruh yang sudah
                    tercatat instansi yang bertanggung jawab di bidang
                    ketenagakerjaan atau unsur pekerja/buruh.
              - _type: numPoint
                _key: '19'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga kerja sama tripartit adalah forum komunikasi,
                    konsultasi dan musyawarah tentang masalah ketenagakerjaan
                    yang anggotanya terdiri dari unsur organisasi pengusaha,
                    serikat pekerja/serikat buruh, dan pemerintah.
              - _type: numPoint
                _key: '20'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Peraturan perusahaan adalah peraturan yang dibuat secara
                    tertulis oleh pengusaha yang memuat syarat syarat kerja dan
                    tata tertib perusahaan.
              - _type: numPoint
                _key: '21'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja bersama adalah perjanjian yang merupakan
                    hasil perundingan antara serikat pekerja/serikat buruh atau
                    beberapa serikat pekerja/serikat buruh yang tercatat pada
                    instansi yang bertanggung jawab di bidang ketenagakerjaan
                    dengan pengusaha, atau beberapa pengusaha atau perkumpulan
                    pengusaha yang memuat syarat syarat kerja, hak dan kewajiban
                    kedua belah pihak.
              - _type: numPoint
                _key: '22'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perselisihan hubungan industrial adalah perbedaan pendapat
                    yang mengakibatkan pertentangan antara pengusaha atau
                    gabungan pengusaha dengan pekerja/buruh atau serikat
                    pekerja/serikat buruh karena adanya perselisihan mengenai
                    hak, perselisihan kepentingan, dan perselisihan pemutusan
                    hubungan kerja serta perselisihan antar serikat
                    pekerja/serikat buruh hanya dalam satu perusahaan.
              - _type: numPoint
                _key: '23'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Mogok kerja adalah tindakan pekerja/buruh yang direncanakan
                    dan dilaksanakan secara bersama-sama dan/atau oleh serikat
                    pekerja/serikat buruh untuk menghentikan atau memperlambat
                    pekerjaan.
              - _type: numPoint
                _key: '24'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penutupan perusahaan (lock out) adalah tindakan pengusaha
                    untuk menolak pekerja/buruh seluruhnya atau sebagian untuk
                    menjalankan pekerjaan.
              - _type: numPoint
                _key: '25'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemutusan hubungan kerja adalah pengakhiran hubungan kerja
                    karena suatu hal tertentu yang mengakibatkan berakhirnya hak
                    dan kewajiban antara pekerja/buruh dan pengusaha.
              - _type: numPoint
                _key: '26'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Anak adalah setiap orang yang berumur dibawah 18 (delapan
                    belas) tahun.
              - _type: numPoint
                _key: '27'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Siang hari adalah waktu antara pukul 06.00 sampai dengan
                    pukul 18.00.
              - _type: numPoint
                _key: '28'
                isi:
                  _type: referenceText
                  references: []
                  text: 1 (satu) hari adalah waktu selama 24 (dua puluh empat) jam.
              - _type: numPoint
                _key: '29'
                isi:
                  _type: referenceText
                  references: []
                  text: Seminggu adalah waktu selama 7 (tujuh) hari.
              - _type: numPoint
                _key: '30'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Upah adalah hak pekerja/buruh yang diterima dan dinyatakan
                    dalam bentuk uang sebagai imbalan dari pengusaha atau
                    pemberi kerja kepada pekerja/buruh yang ditetapkan dan
                    dibayarkan menurut suatu perjanjian kerja, kesepakatan, atau
                    peraturan perundang undangan, termasuk tunjangan bagi
                    pekerja/buruh dan keluarganya atas suatu pekerjaan dan/atau
                    jasa yang telah atau akan dilakukan.
              - _type: numPoint
                _key: '31'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Kesejahteraan pekerja/buruh adalah suatu pemenuhan kebutuhan
                    dan/atau keperluan yang bersifat jasmaniah dan rohaniah,
                    baik di dalam maupun di luar hubungan kerja, yang secara
                    langsung atau tidak langsung dapat mempertinggi
                    produktivitas kerja dalam lingkungan kerja yang aman dan
                    sehat.
              - _type: numPoint
                _key: '32'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengawasan ketenagakerjaan adalah kegiatan mengawasi dan
                    menegakkan pelaksanaan peraturan perundang undangan di
                    bidang ketenagakerjaan.
              - _type: numPoint
                _key: '33'
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Menteri adalah menteri yang bertanggung jawab di bidang
                    ketenagakerjaan.
  - _type: bab
    _key: 2
    _judul: LANDASAN, ASAS, DAN TUJUAN
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 2
          isi:
            _type: referenceText
            references: []
            text: >-
              Pembangunan ketenagakerjaan berlandaskan Pancasila dan Undang
              Undang Dasar Negara Republik Indonesia Tahun 1945.
        - _type: pasal
          _key: 3
          isi:
            _type: referenceText
            references: []
            text: >-
              Pembangunan ketenagakerjaan diselenggarakan atas asas keterpaduan
              dengan melalui koordinasi fungsional lintas sektoral pusat dan
              daerah.
        - _type: pasal
          _key: 4
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: 'Pembangunan ketenagakerjaan bertujuan :'
            isi:
              - _type: alphaPoint
                _key: a
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    memberdayakan dan mendayagunakan tenaga kerja secara optimal
                    dan manusiawi:
              - _type: alphaPoint
                _key: b
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    mewujudkan pemerataan kesempatan kerja dan penyediaan tenaga
                    kerja yang sesuai dengan kebutuhan pembangunan nasional dan
                    daerah,
              - _type: alphaPoint
                _key: c
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    memberikan perlindungan kepada tenaga kerja dalam mewujudkan
                    kesejahteraan: dan
              - _type: alphaPoint
                _key: d
                isi:
                  _type: referenceText
                  references: []
                  text: meningkatkan kesejahteraan tenaga kerja dan keluarganya.
  - _type: bab
    _key: 3
    _judul: KESEMPATAN DAN PERLAKUAN YANG SAMA
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 5
          isi:
            _type: referenceText
            references: []
            text: >-
              Setiap tenaga kerja memiliki kesempatan yang sama tanpa
              diskriminasi untuk memperoleh pekerjaan.
        - _type: pasal
          _key: 6
          isi:
            _type: referenceText
            references: []
            text: >-
              Setiap pekerja/buruh berhak memperoleh perlakuan yang sama tanpa
              diskriminasi dari pengusaha.
  - _type: bab
    _key: 4
    _judul: PERENCANAAN TENAGA KERJA DAN INFORMASI KETENAGAKERJAAN
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 7
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam rangka pembangunan ketenagakerjaan, pemerintah
                    menetapkan kebijakan dan menyusun perencanaan tenaga kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: 'Perencanaan tenaga kerja meliputi :'
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: perencanaan tenaga kerja makro, dan
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: perencanaan tenaga kerja mikro.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam penyusunan kebijakan, strategi, dan pelaksanaan
                    program pembangunan ketenagakerjaan yang berkesinambungan,
                    pemerintah harus berpedoman pada perencanaan tenaga kerja
                    sebagaimana dimaksud dalam ayat (1).
        - _type: pasal
          _key: 8
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Perencanaan tenaga kerja disusun atas dasar informasi
                      ketenagakerjaan yang antara lain meliputi :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: penduduk dan tenaga kerja,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: kesempatan kerja,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: pelatihan kerja termasuk kompetensi kerja,
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: produktivitas tenaga kerja,
                    - _type: alphaPoint
                      _key: e
                      isi:
                        _type: referenceText
                        references: []
                        text: hubungan industrial,
                    - _type: alphaPoint
                      _key: f
                      isi:
                        _type: referenceText
                        references: []
                        text: kondisi lingkungan kerja,
                    - _type: alphaPoint
                      _key: g
                      isi:
                        _type: referenceText
                        references: []
                        text: pengupahan dan kesejahteraan tenaga kerja, dan
                    - _type: alphaPoint
                      _key: h
                      isi:
                        _type: referenceText
                        references: []
                        text: jaminan sosial tenaga kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Informasi ketenagakerjaan sebagaimana dimaksud dalam ayat
                    (1), diperoleh dari semua pihak yang terkait, baik instansi
                    pemerintah maupun swasta.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai tata cara memperoleh informasi
                    ketenagakerjaan dan penyusunan serta pelaksanaan perencanaan
                    tenaga kerja sebagaimana dimaksud dalam ayat (1) diatur
                    dengan Peraturan Pemerintah.
  - _type: bab
    _key: 5
    _judul: PELATIHAN KERJA
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 9
          isi:
            _type: referenceText
            references: []
            text: >-
              Pelatihan kerja diselenggarakan dan diarahkan untuk membekali,
              meningkatkan, dan mengembangkan kompetensi kerja guna meningkatkan
              kemampuan, produktivitas, dan kesejahteraan.
        - _type: pasal
          _key: 10
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelatihan kerja dilaksanakan dengan memperhatikan kebutuhan
                    pasar kerja dan dunia usaha, baik di da-lam maupun di luar
                    hubungan kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelatihan kerja diselenggarakan berdasarkan program
                    pelatihan yang mengacu pada standar kompetensi kerja.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: Pelatihan kerja dapat dilakukan secara berjenjang.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai tata cara penetapan standar kompetensi
                    kerja sebagaimana dimaksud dalam ayat (2) diatur dengan
                    Keputusan Menteri.
        - _type: pasal
          _key: 11
          isi:
            _type: referenceText
            references: []
            text: >-
              Setiap tenaga kerja berhak untuk memperoleh dan/atau meningkatkan
              dan/atau mengembangkan kompetensi kerja sesuai dengan bakat,
              minat, dan kemampuannya melalui pelatihan kerja.
        - _type: pasal
          _key: 12
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha bertanggung jawab atas peningkatan dan/atau
                    pengembangan kompetensi pekerjanya melalui pelatihan kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Peningkatan dan/atau pengembangan kompetensi sebagaimana
                    dimaksud dalam ayat (1) diwajibkan bagi pengusaha yang
                    memenuhi persyaratan yang diatur dengan Keputusan Menteri.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Setiap pekerja/buruh memiliki kesempatan yang sama untuk
                    mengikuti pelatihan kerja sesuai dengan bi-dang tugasnya.
        - _type: pasal
          _key: 13
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelatihan kerja diselenggarakan oleh lembaga pelatihan kerja
                    pemerintah dan/atau lembaga pelatihan kerja swasta.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelatihan kerja dapat diselenggarakan di tempat pelatihan
                    atau tempat kerja.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga pelatihan kerja pemerintah sebagaimana dimaksud
                    dalam ayat (l) dalam menyelenggarakan pe-latihan kerja dapat
                    bekerja sama dengan swasta.
        - _type: pasal
          _key: 14
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga pelatihan kerja swasta dapat berbentuk badan hukum
                    Indonesia atau perorangan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga pelatihan kerja swasta sebagaimana dimaksud dalam
                    ayat (1) wajib memperoleh izin atau men daftar ke instansi
                    yang bertanggung jawab di bidang ketenagakerjaan di
                    kabupaten/kota.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga pelatihan kerja yang diselenggarakan oleh instansi
                    pemerintah mendaftarkan kegiatannya kepada instansi yang
                    bertanggung jawab di bidang ketenagakerjaan di
                    kabupaten/kota.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai tata cara perizinan dan pendaftaran
                    lembaga pelatihan kerja sebagaimana dimaksud dalam ayat (2)
                    dan ayat (3) diatur dengan Keputusan Menteri.
        - _type: pasal
          _key: 15
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: 'Penyelenggara pelatihan kerja wajib memenuhi persyaratan :'
            isi:
              - _type: alphaPoint
                _key: a
                isi:
                  _type: referenceText
                  references: []
                  text: tersedianya tenaga kepelatihan,
              - _type: alphaPoint
                _key: b
                isi:
                  _type: referenceText
                  references: []
                  text: adanya kurikulum yang sesuai dengan tingkat pelatihan,
              - _type: alphaPoint
                _key: c
                isi:
                  _type: referenceText
                  references: []
                  text: tersedianya sarana dan prasarana pelatihan kerja, dan
              - _type: alphaPoint
                _key: d
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    tersedianya dana bagi kelangsungan kegiatan penyelenggaraan
                    pelatihan kerja.
        - _type: pasal
          _key: 16
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga pelatihan kerja swasta yang telah memperoleh izin
                    dan lembaga pelatihan kerja pemerintah yang telah terdaftar
                    dapat memperoleh akreditasi dari lembaga akreditasi.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga akreditasi sebagaimana dimaksud dalam ayat (1)
                    bersifat independen terdiri atas unsur masya rakat dan
                    pemerintah ditetapkan dengan Keputusan Menteri.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Organisasi dan tata kerja lembaga akreditasi sebagaimana
                    dimaksud dalam ayat (2) diatur dengan Kepu tusan Menteri.
        - _type: pasal
          _key: 17
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Instansi yang bertanggung jawab di bidang ketenagakerjaan
                      di kabupaten/kota dapat menghentikan sementara pelaksanaan
                      penyelenggaraan pelatihan kerja, apabila dalam
                      pelaksanaannya ternyata :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          tidak sesuai dengan arah pelatihan kerja sebagaimana
                          dimaksud dalam Pasal 9: dan/atau
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          tidak memenuhi persyaratan sebagaimana dimaksud dalam
                          Pasal 15.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penghentian sementara pelaksanaan penyelenggaraan pelatihan
                    kerja sebagaimana dimaksud dalam ayat (1), disertai alasan
                    dan saran perbaikan dan berlaku paling lama 6 (enam) bulan.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penghentian sementara pelaksanaan penyelenggaraan pelatihan
                    kerja hanya dikenakan terhadap program pelatihan yang tidak
                    memenuhi syarat sebagaimana dimaksud dalam Pasal 9 dan Pasal
                    15.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Bagi penyelenggara pelatihan kerja dalam waktu 6 (enam)
                    bulan tidak memenuhi dan melengkapi saran per baikan
                    sebagaimana dimaksud dalam ayat (2) dikenakan sanksi
                    penghentian program pelatihan.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penyelenggara pelatihan kerja yang tidak menaati dan tetap
                    melaksanakan program pelatihan kerja yang telah dihentikan
                    sebagaimana dimaksud dalam ayat (4) dikenakan sanksi
                    pencabutan izin dan pembatalan pendaftaran penyelenggara
                    pelatihan.
              - _type: ayat
                _key: 6
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai tata cara penghentian sementara,
                    penghentian, pencabutan izin, dan pembatalan pen daftaran
                    diatur dengan Keputusan Menteri.
        - _type: pasal
          _key: 18
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tenaga kerja berhak memperoleh pengakuan kompetensi kerja
                    setelah mengikuti pelatihan kerja yang di selenggarakan
                    lembaga pelatihan kerja pemerintah, lembaga pelatihan kerja
                    swasta, atau pelatihan di tempat kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengakuan kompetensi kerja sebagaimana dimaksud dalam ayat
                    (1) dilakukan melalui sertifikasi kompe tensi kerja.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Sertifikasi kompetensi kerja sebagaimana dimaksud dalam ayat
                    (2) dapat pula diikuti oleh tenaga kerja yang telah
                    berpengalaman.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Untuk melaksanakan sertifikasi kompetensi kerja dibentuk
                    badan nasional sertifikasi profesi yang inde penden.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pembentukan badan nasional sertifikasi profesi yang
                    independen sebagaimana dimaksud dalam ayat (4) diatur dengan
                    Peraturan Pemerintah.
        - _type: pasal
          _key: 19
          isi:
            _type: referenceText
            references: []
            text: >-
              Pelatihan kerja bagi tenaga kerja penyandang cacat dilaksanakan
              dengan memperhatikan jenis, derajat kecacatan, dan kemampuan
              tenaga kerja penyandang cacat yang bersangkutan.
        - _type: pasal
          _key: 20
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Untuk mendukung peningkatan pelatihan kerja dalam rangka
                    pembangunan ketenagakerjaan, dikembang kan satu sistem
                    pelatihan kerja nasional yang merupakan acuan pelaksanaan
                    pelatihan kerja di semua bidang dan/atau sektor.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai bentuk, mekanisme, dan kelembagaan sistem
                    pelatihan kerja nasional sebagaimana dimaksud dalam ayat (1)
                    diatur dengan Peraturan Pemerintah.
        - _type: pasal
          _key: 21
          isi:
            _type: referenceText
            references: []
            text: Pelatihan kerja dapat diselenggarakan dengan sistem pemagangan.
        - _type: pasal
          _key: 22
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemagangan dilaksanakan atas dasar perjanjian pemagangan
                    antara peserta dengan pengusaha yang di buat secara
                    tertulis.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian pemagangan sebagaimana dimaksud dalam ayat (1),
                    sekurang- kurangnya memuat ketentuan hak dan kewajiban
                    peserta dan pengusaha serta jangka waktu pemagangan.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemagangan yang diselenggarakan tidak melalui perjanjian
                    pemagangan sebagaimana dimaksud dalam ayat (1), dianggap
                    tidak sah dan status peserta berubah menjadi pekerja/buruh
                    perusahaan yang bersangkutan.
        - _type: pasal
          _key: 23
          isi:
            _type: referenceText
            references: []
            text: >-
              Tenaga kerja yang telah mengikuti program pemagangan berhak atas
              pengakuan kualifikasi kompetensi kerja dari perusahaan atau
              lembaga sertifikasi.
        - _type: pasal
          _key: 24
          isi:
            _type: referenceText
            references: []
            text: >-
              Pemagangan dapat dilaksanakan di perusahaan sendiri atau di tempat
              penyelenggaraan pelatihan kerja, atau perusahaan lain, baik di
              dalam maupun di luar wilayah Indonesia.
        - _type: pasal
          _key: 25
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemagangan yang dilakukan di luar wilayah Indonesia wajib
                    mendapat izin dari Menteri atau pejabat yang ditunjuk.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Untuk memperoleh izin sebagaimana dimaksud dalam ayat (1),
                    penyelenggara pemagangan harus ber bentuk badan hukum
                    Indonesia sesuai dengan peraturan perundang-undangan yang
                    berlaku.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai tata cara perizinan pemagangan di luar
                    wilayah Indonesia sebagaimana dimaksud dalam ayat (1) dan
                    ayat (2), diatur dengan Keputusan Menteri.
        - _type: pasal
          _key: 26
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Penyelenggaraan pemagangan di luar wilayah Indonesia harus
                      memperhatikan :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: harkat dan martabat bangsa Indonesia,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: penguasaan kompetensi yang lebih tinggi, dan
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          perlindungan dan kesejahteraan peserta pemagangan,
                          termasuk melaksanakan ibadahnya.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Menteri atau pejabat yang ditunjuk dapat menghentikan
                    pelaksanaan pemagangan di luar wilayah Indo nesia apabila di
                    dalam pelaksanaannya ternyata tidak sesuai dengan ketentuan
                    sebagaimana dimaksud dalam ayat @).
        - _type: pasal
          _key: 27
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Menteri dapat mewajibkan kepada perusahaan yang memenuhi
                    persyaratan untuk melaksanakan program pemagangan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam menetapkan persyaratan sebagaimana dimaksud dalam ayat
                    (1), Menteri harus memperhatikan ke pentingan perusahaan,
                    masyarakat, dan negara.
        - _type: pasal
          _key: 28
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Untuk memberikan saran dan pertimbangan dalam penetapan
                    kebijakan serta melakukan koordinasi pela tihan kerja dan
                    pemagangan dibentuk lembaga koordinasi pelatihan kerja
                    nasional.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pembentukan, keanggotaan, dan tata kerja lembaga koordinasi
                    pelatihan kerja sebagaimana dimaksud da lam ayat (1), diatur
                    dengan Keputusan Presiden.
        - _type: pasal
          _key: 29
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah Pusat dan/atau Pemerintah Daerah melakukan
                    pembinaan pelatihan kerja dan pemagangan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pembinaan pelatihan kerja dan pemagangan ditujukan ke arah
                    peningkatan relevansi, kualitas, dan efisien si
                    penyelenggaraan pelatihan kerja dan produktivitas.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Peningkatan produktivitas sebagaimana dimaksud dalam ayat
                    (2), dilakukan melalui pengembangan buda ya produktif, etos
                    kerja, teknologi, dan efisiensi kegiatan ekonomi, menuju
                    terwujudnya produktivitas nasional.
        - _type: pasal
          _key: 30
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Untuk meningkatkan produktivitas sebagaimana dimaksud dalam
                    Pasal 29 ayat (2) dibentuk lembaga pro duktivitas yang
                    bersifat nasional.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga produktivitas sebagaimana dimaksud dalam ayat (1)
                    berbentuk jejaring kelembagaan pelayanan peningkatan
                    produktivitas, yang bersifat lintas sektor maupun daerah.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pembentukan, keanggotaan, dan tata kerja lembaga
                    produktivitas nasional sebagaimana dimaksud dalam ayat (1),
                    diatur dengan Keputusan Presiden.
  - _type: bab
    _key: 6
    _judul: PENEMPATAN TENAGA KERJA
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 31
          isi:
            _type: referenceText
            references: []
            text: >-
              Setiap tenaga kerja mempunyai hak dan kesempatan yang sama untuk
              memilih, mendapatkan, atau pindah pekerjaan dan memperoleh
              penghasilan yang layak di dalam atau di luar negeri.
        - _type: pasal
          _key: 32
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penempatan tenaga kerja dilaksanakan berdasarkan asas
                    terbuka, bebas, obyektif, serta adil, dan setara tanpa
                    diskriminasi.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penempatan tenaga kerja diarahkan untuk menempatkan tenaga
                    kerja pada jabatan yang tepat sesuai de ngan keahlian,
                    keterampilan, bakat, minat, dan kemampuan dengan
                    memperhatikan harkat, martabat, hak asasi, dan perlindungan
                    hukum.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penempatan tenaga kerja dilaksanakan dengan memperhatikan
                    pemerataan kesempatan kerja dan penye diaan tenaga kerja
                    sesuai dengan kebutuhan program nasional dan daerah.
        - _type: pasal
          _key: 33
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: 'Penempatan tenaga kerja terdiri dari :'
            isi:
              - _type: alphaPoint
                _key: a
                isi:
                  _type: referenceText
                  references: []
                  text: penempatan tenaga kerja di dalam negeri, dan
              - _type: alphaPoint
                _key: b
                isi:
                  _type: referenceText
                  references: []
                  text: penempatan tenaga kerja di luar negeri.
        - _type: pasal
          _key: 34
          isi:
            _type: referenceText
            references: []
            text: >-
              Ketentuan mengenai penempatan tenaga kerja di luar negeri
              sebagaimana dimaksud dalam Pasal 33 huruf b diatur dengan
              undang-undang.
        - _type: pasal
          _key: 35
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja yang memerlukan tenaga kerja dapat merekrut
                    sendiri tenaga kerja yang dibutuhkan atau melalui pelaksana
                    penempatan tenaga kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelaksana penempatan tenaga kerja sebagaimana dimaksud dalam
                    ayat (1) wajib memberikan perlindu ngan sejak rekrutmen
                    sampai penempatan tenaga kerja
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja sebagaimana dimaksud dalam ayat (1) dalam
                    mempekerjakan tenaga kerja wajib memberi kan perlindungan
                    yang mencakup kesejahteraan, keselamatan, dan kesehatan baik
                    mental maupun fisik tenaga kerja.
        - _type: pasal
          _key: 36
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penempatan tenaga kerja oleh pelaksana sebagaimana dimaksud
                    dalam Pasal 35 ayat (1) dilakukan dengan memberikan
                    pelayanan penempatan tenaga kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Pelayanan penempatan tenaga kerja sebagaimana dimaksud
                      dalam ayat (1) bersifat terpadu dalam satu sistem
                      penempatan tenaga kerja yang meliputi unsur-unsur :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: pencari kerja,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: lowongan pekerjaan,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: informasi pasar kerja,
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: mekanisme antar kerja, dan
                    - _type: alphaPoint
                      _key: e
                      isi:
                        _type: referenceText
                        references: []
                        text: kelembagaan penempatan tenaga kerja.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Unsur-unsur sistem penempatan tenaga kerja sebagaimana
                    dimaksud dalam ayat (2) dapat dilaksanakan secara terpisah
                    yang ditujukan untuk terwujudnya penempatan tenaga kerja.
        - _type: pasal
          _key: 37
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Pelaksana penempatan tenaga kerja sebagaimana dimaksud
                      dalam Pasal 35 ayat (1) terdiri dari :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          instansi pemerintah yang bertanggung jawab di bidang
                          ketenaga- kerjaan, dan
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: lembaga swasta berbadan hukum.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga penempatan tenaga kerja swasta sebagaimana dimaksud
                    dalam ayat (1) huruf b dalam melak sanakan pelayanan
                    penempatan tenaga kerja wajib memiliki izin tertulis dari
                    Menteri atau pejabat yang ditunjuk.
        - _type: pasal
          _key: 38
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelaksana penempatan tenaga kerja sebagaimana dimaksud dalam
                    Pasal 37 ayat (1) huruf a, dilarang memungut biaya
                    penempatan, baik langsung maupun tidak langsung, sebagian
                    atau keseluruhan kepada tenaga kerja dan pengguna tenaga
                    kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga penempatan tenaga kerja swasta sebagaimana dimaksud
                    dalam Pasal 37 ayat (1) huruf b, hanya dapat memungut biaya
                    penempatan tenaga kerja dari pengguna tenaga kerja dan dari
                    tenaga kerja golongan dan jabatan tertentu.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Golongan dan jabatan sebagaimana dimaksud dalam ayat (2)
                    ditetapkan dengan Keputusan Menteri.
  - _type: bab
    _key: 7
    _judul: PERLUASAN KESEMPATAN KERJA
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 39
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah bertanggung jawab mengupayakan perluasan
                    kesempatan kerja baik di dalam maupun di luar hubungan
                    kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah dan masyarakat bersama-sama mengupayakan
                    perluasan kesempatan kerja baik di dalam maupun di luar
                    hubungan kerja.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Semua kebijakan pemerintah baik pusat maupun daerah di
                    setiap sektor diarahkan untuk mewujudkan per luasan
                    kesempatan kerja baik di dalam maupun di luar hubungan
                    kerja.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Lembaga keuangan baik perbankan maupun non perbankan, dan
                    dunia usaha perlu membantu dan mem berikan kemudahan bagi
                    setiap kegiatan masyarakat yang dapat menciptakan atau
                    mengembangkan perluasan kesempatan kerja.
        - _type: pasal
          _key: 40
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perluasan kesempatan kerja di luar hubungan kerja dilakukan
                    melalui penciptaan kegiatan yang produktif dan berkelanjutan
                    dengan mendayagunakan potensi sumber daya alam, sumber daya
                    manusia dan teknologi tepat guna.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penciptaan perluasan kesempatan kerja sebagaimana dimaksud
                    dalam ayat (l) dilakukan dengan pola pembentukan dan
                    pembinaan tenaga kerja mandiri, penerapan sistem padat
                    karya, penerapan teknologi tepat guna, dan pendayagunaan
                    tenaga kerja sukarela atau pola lain yang dapat mendorong
                    terciptanya perluasan kesempatan kerja.
        - _type: pasal
          _key: 41
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah menetapkan kebijakan ketenagakerjaan dan
                    perluasan kesempatan kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemerintah dan masyarakat bersama-sama mengawasi pelaksanaan
                    kebijakan sebagaimana dimaksud dalam ayat (1).
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam melaksanakan tugas sebagaimana dimaksud dalam ayat (2)
                    dapat dibentuk badan koordinasi yang beranggotakan unsur
                    pemerintah dan unsur masyarakat.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai perluasan kesempatan kerja, dan
                    pembentukan badan koordinasi sebagaimana dimaksud dalam
                    Pasal 39, Pasal 40, dan ayat (3) dalam pasal ini diatur
                    dengan Peraturan Pemerintah.
  - _type: bab
    _key: 8
    _judul: PENGGUNAAN TENAGA KERJA ASING
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 42
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Setiap pemberi kerja yang mempekerjakan tenaga kerja asing
                    wajib memiliki izin tertulis dari Menteri atau pejabat yang
                    ditunjuk.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja orang perseorangan dilarang mempekerjakan
                    tenaga kerja asing.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Kewajiban memiliki izin sebagaimana dimaksud dalam ayat (1),
                    tidak berlaku bagi perwakilan negara asing yang
                    mempergunakan tenaga kerja asing sebagai pegawai diplomatik
                    dan konsuler.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tenaga kerja asing dapat dipekerjakan di Indonesia hanya
                    dalam hubungan kerja untuk jabatan tertentu dan waktu
                    tertentu.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai jabatan tertentu dan waktu tertentu
                    sebagaimana dimaksud dalam ayat (4) ditetapkan dengan
                    Keputusan Menteri.
              - _type: ayat
                _key: 6
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tenaga kerja asing sebagaimana dimaksud dalam ayat (4) yang
                    masa kerjanya habis dan tidak dapat di perpanjang dapat
                    digantikan oleh tenaga kerja asing lainnya.
        - _type: pasal
          _key: 43
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja yang menggunakan tenaga kerja asing harus
                    memiliki rencana penggunaan tenaga kerja asing yang disahkan
                    oleh Menteri atau pejabat yang ditunjuk.
              - _type: ayat
                _key: 2
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Rencana penggunaan tenaga kerja asing sebagaimana dimaksud
                      dalam ayat (1) sekurang-kurangnya me muat keterangan :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: alasan penggunaan tenaga kerja asing,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          jabatan dan/atau kedudukan tenaga kerja asing dalam
                          struktur organisasi perusahaan yang bersangkutan,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: jangka waktu penggunaan tenaga kerja asing, dan
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          penunjukan tenaga kerja warga negara Indonesia sebagai
                          pendamping tenaga kerja asing yang dipekerjakan.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan sebagaimana dimaksud dalam ayat (1) tidak berlaku
                    bagi instansi pemerintah, badan-badan internasional dan
                    perwakilan negara asing.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai tata cara pengesahan rencana penggunaan
                    tenaga kerja asing diatur dengan Keputu san Menteri.
        - _type: pasal
          _key: 44
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja tenaga kerja asing wajib menaati ketentuan
                    mengenai jabatan dan standar kompetensi yang berlaku.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai jabatan dan standar kompetensi
                    sebagaimana dimaksud dalam ayat (1) diatur dengan Keputusan
                    Menteri.
        - _type: pasal
          _key: 45
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: 'Pemberi kerja tenaga kerja asing wajib :'
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          menunjuk tenaga kerja warga negara Indonesia sebagai
                          tenaga pendamping tenaga kerja asing yang dipekerjakan
                          untuk alih teknologi dan alih keahlian dari tenaga
                          kerja asing, dan
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          melaksanakan pendidikan dan pelatihan kerja bagi
                          tenaga kerja Indonesia sebagaimana dimaksud pada huruf
                          a yang sesuai dengan kualifikasi jabatan yang diduduki
                          oleh tenaga kerja asing.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan sebagaimana dimaksud dalam ayat (1) tidak berlaku
                    bagi tenaga kerja asing yang menduduki ja batan direksi
                    dan/atau komisaris.
        - _type: pasal
          _key: 46
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tenaga kerja asing dilarang menduduki jabatan yang mengurusi
                    personalia dan/atau jabatan-jabatan ter tentu.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Jabatan-jabatan tertentu sebagaimana dimaksud dalam ayat (1)
                    diatur dengan Keputusan Menteri
        - _type: pasal
          _key: 47
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemberi kerja wajib membayar kompensasi atas setiap tenaga
                    kerja asing yang dipekerjakannya.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Kewajiban membayar kompensasi sebagaimana dimaksud dalam
                    ayat (1) tidak berlaku bagi instansi pe merintah, perwakilan
                    negara asing, badan- badan internasional, lembaga sosial,
                    lembaga keagamaan, dan jabatan- jabatan tertentu di lembaga
                    pendidikan.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai jabatan-jabatan tertentu di lembaga
                    pendidikan sebagaimana dimaksud dalam ayat (2) diatur dengan
                    Keputusan Menteri.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai besarnya kompensasi dan penggunaannya
                    diatur dengan Peraturan Pemerintah.
        - _type: pasal
          _key: 48
          isi:
            _type: referenceText
            references: []
            text: >-
              Pemberi kerja yang mempekerjakan tenaga kerja asing wajib
              memulangkan tenaga kerja asing ke negara asalnya setelah hubungan
              kerjanya berakhir.
        - _type: pasal
          _key: 49
          isi:
            _type: referenceText
            references: []
            text: >-
              Ketentuan mengenai penggunaan tenaga kerja asing serta pelaksanaan
              pendidikan dan pelatihan tenaga kerja pendamping diatur dengan
              Keputusan Presiden.
  - _type: bab
    _key: 9
    _judul: HUBUNGAN KERJA
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 50
          isi:
            _type: referenceText
            references: []
            text: >-
              Hubungan kerja terjadi karena adanya perjanjian kerja antara
              pengusaha dan pekerja/buruh.
        - _type: pasal
          _key: 51
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: Perjanjian kerja dibuat secara tertulis atau lisan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja yang dipersyaratkan secara tertulis
                    dilaksanakan sesuai dengan peraturan perundang undangan yang
                    berlaku.
        - _type: pasal
          _key: 52
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: 'Perjanjian kerja dibuat atas dasar :'
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: kesepakatan kedua belah pihak,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: kemampuan atau kecakapan melakukan perbuatan hukum,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: adanya pekerjaan yang diperjanjikan, dan
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerjaan yang diperjanjikan tidak bertentangan dengan
                          ketertiban umum, kesusilaan, dan peraturan perundang
                          undangan yang berlaku.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja yang dibuat oleh para pihak yang
                    bertentangan dengan ketentuan sebagaimana dimaksud dalam
                    ayat (1) huruf a dan b dapat dibatalkan.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja yang dibuat oleh para pihak yang
                    bertentangan dengan ketentuan sebagaimana dimaksud dalam
                    ayat (1) huruf c dan d batal demi hukum.
        - _type: pasal
          _key: 53
          isi:
            _type: referenceText
            references: []
            text: >-
              Segala hal dan/atau biaya yang diperlukan bagi pelaksanaan
              pembuatan perjanjian kerja dilaksanakan oleh dan menjadi tanggung
              jawab pengusaha.
        - _type: pasal
          _key: 54
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Perjanjian kerja yang dibuat secara tertulis sekurang
                      kurangnya memuat :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: nama, alamat perusahaan, dan jenis usaha,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: nama, jenis kelamin, umur, dan alamat pekerja/buruh,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: jabatan atau jenis pekerjaan,
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: tempat pekerjaan,
                    - _type: alphaPoint
                      _key: e
                      isi:
                        _type: referenceText
                        references: []
                        text: besarnya upah dan cara pembayarannya,
                    - _type: alphaPoint
                      _key: f
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          syarat syarat kerja yang memuat hak dan kewajiban
                          pengusaha dan pekerja/buruh,
                    - _type: alphaPoint
                      _key: g
                      isi:
                        _type: referenceText
                        references: []
                        text: mulai dan jangka waktu berlakunya perjanjian kerja,
                    - _type: alphaPoint
                      _key: h
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          tempat dan tanggal perjanjian kerja dibuat, dan Ii.
                          tanda tangan para pihak dalam perjanjian kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan dalam perjanjian kerja sebagaimana dimaksud dalam
                    ayat (1) huruf e dan f, tidak boleh ber-tentangan dengan
                    peraturan perusahaan, perjanjian kerja bersama, dan
                    peraturan perundang undangan yang berlaku.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja sebagaimana dimaksud dalam ayat (1) dibuat
                    sekurang kurangnya rangkap 2 (dua), yang mempunyai kekuatan
                    hukum yang sama, serta pekerja/buruh dan pengusaha masing
                    masing mendapat 1 (satu) perjanjian kerja.
        - _type: pasal
          _key: 55
          isi:
            _type: referenceText
            references: []
            text: >-
              Perjanjian kerja tidak dapat ditarik kembali dan/atau diubah,
              kecuali atas persetujuan para pihak.
        - _type: pasal
          _key: 56
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja dibuat untuk waktu tertentu atau untuk
                    waktu tidak tertentu.
              - _type: ayat
                _key: 2
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Perjanjian kerja untuk waktu tertentu sebagaimana dimaksud
                      dalam ayat (l) didasarkan atas :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: Jangka waktu, atau
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: selesainya suatu pekerjaan tertentu.
        - _type: pasal
          _key: 57
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu dibuat secara tertulis
                    serta harus menggunakan bahasa Indonesia dan huruf latin.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu yang dibuat tidak
                    tertulis bertentangan dengan ketentuan sebagai mana dimaksud
                    dalam ayat (1) dinyatakan sebagai perjanjian kerja untuk
                    waktu tidak tertentu.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal perjanjian kerja dibuat dalam bahasa Indonesia dan
                    bahasa asing, apabila kemudian terdapat perbedaan penafsiran
                    antara keduanya, maka yang berlaku perjanjian kerja yang
                    dibuat dalam bahasa Indonesia.
        - _type: pasal
          _key: 58
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu tidak dapat
                    mensyaratkan adanya masa percobaan kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal disyaratkan masa percobaan kerja dalam perjanjian
                    kerja sebagaimana dimaksud dalam ayat (1), masa percobaan
                    kerja yang disyaratkan batal demi hukum.
        - _type: pasal
          _key: 59
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Perjanjian kerja untuk waktu tertentu hanya dapat dibuat
                      untuk pekerjaan tertentu yang menurut jenis dan sifat atau
                      kegiatan pekerjaannya akan selesai dalam waktu tertentu,
                      yaitu :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerjaan yang sekali selesai atau yang sementara
                          sifatnya,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerjaan yang diperkirakan penyelesaiannya dalam
                          waktu yang tidak terlalu lama dan paling lama 3 (tiga)
                          tahun,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: . pekerjaan yang bersifat musiman, atau
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerjaan yang berhubungan dengan produk baru,
                          kegiatan baru, atau produk tambahan yang masih dalam
                          percobaan atau penjajakan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu tidak dapat diadakan
                    untuk pekerjaan yang bersifat tetap.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu dapat diperpanjang
                    atau diperbaharui.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja waktu tertentu yang didasarkan atas jangka
                    waktu tertentu dapat diadakan untuk paling lama 2 (dua)
                    tahun dan hanya boleh diperpanjang 1 (satu) kali untuk
                    jangka waktu paling lama 1 (satu) tahun.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha yang bermaksud memperpanjang perjanjian kerja
                    waktu tertentu tersebut, paling lama 7 (tujuh) hari sebelum
                    perjanjian kerja waktu tertentu berakhir telah
                    memberitahukan maksudnya secara tertulis kepada
                    pekerja/buruh yang bersangkutan.
              - _type: ayat
                _key: 6
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pembaruan perjanjian kerja waktu tertentu hanya dapat
                    diadakan setelah melebihi masa tenggang waktu 30 (tiga
                    puluh) hari berakhirnya perjanjian kerja waktu tertentu yang
                    lama, pembaruan perjanjian kerja waktu tertentu ini hanya
                    boleh dilakukan 1 (satu) kali dan paling lama 2 (dua) tahun.
              - _type: ayat
                _key: 7
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tertentu yang tidak memenuhi
                    ketentuan sebagaimana dimaksud dalam ayat (1), ayat (2),
                    ayat (4), ayat (5), dan ayat (6) maka demi hukum menjadi
                    perjanjian kerja waktu tidak tertentu.
              - _type: ayat
                _key: 8
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Hal-hal lain yang belum diatur dalam Pasal ini akan diatur
                    lebih lanjut dengan Keputusan Menteri.
        - _type: pasal
          _key: 60
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja untuk waktu tidak tertentu dapat
                    mensyaratkan masa percobaan kerja paling lama 3 (tiga)
                    bulan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam masa percobaan kerja sebagaimana dimaksud dalam ayat
                    (1), pengusaha dilarang membayar upah di bawah upah minimum
                    yang berlaku.
        - _type: pasal
          _key: 61
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: 'Perjanjian kerja berakhir apabila :'
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: pekerja meninggal dunia,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: berakhirnya jangka waktu perjanjian kerja,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          adanya putusan pengadilan dan/atau putusan atau
                          penetapan lembaga penyelesaian perselisihan hubungan
                          industrial yang telah mempunyai kekuatan hukum tetap,
                          atau
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          adanya keadaan atau kejadian tertentu yang dicantumkan
                          dalam perjanjian kerja, peraturan perusahaan, atau
                          perjanjian kerja bersama yang dapat menyebabkan
                          berakhirnya hubungan kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perjanjian kerja tidak berakhir karena meninggalnya
                    pengusaha atau beralihnya hak atas perusahaan yang
                    disebabkan penjualan, pewarisan, atau hibah.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal terjadi pengalihan perusahaan maka hak-hak
                    pekerja/buruh menjadi tanggung jawab pengusaha baru, kecuali
                    ditentukan lain dalam perjanjian pengalihan yang tidak
                    mengurangi hak-hak pekerja/buruh.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal pengusaha, orang perseorangan, meninggal dunia,
                    ahli waris pengusaha dapat mengakhiri per-janjian kerja
                    setelah merundingkan dengan pekerja/buruh.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal pekerja/buruh meninggal dunia, ahli waris pekerja/
                    buruh berhak mendapatkan hak haknya se-suai dengan peraturan
                    perundang- undangan yang berlaku atau hak hak yang telah
                    diatur dalam perjanjian kerja, peraturan perusahaan, atau
                    perjanjian kerja bersama.
        - _type: pasal
          _key: 62
          isi:
            _type: referenceText
            references: []
            text: >-
              Apabila salah satu pihak mengakhiri hubungan kerja sebelum
              berakhirnya jangka waktu yang ditetapkan dalam perjanjian kerja
              waktu tertentu, atau berakhirnya hubungan kerja bukan karena
              ketentuan sebagaimana dimaksud dalam Pasal 61 ayat (1), pihak yang
              mengakhiri hubungan kerja diwajibkan membayar ganti rugi kepada
              pihak lainnya sebesar upah pekerja/buruh sampai batas waktu
              berakhirnya jangka waktu perjanjian kerja.
        - _type: pasal
          _key: 63
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal perjanjian kerja waktu tidak tertentu dibuat
                    secara lisan, maka pengusaha wajib membuat surat
                    pengangkatan bagi pekerja/buruh yang bersangkutan.
              - _type: ayat
                _key: 2
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Surat pengangkatan sebagaimana dimaksud dalam ayat (1),
                      sekurang kurangnya memuat keterangan :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: nama dan alamat pekerja/buruh,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: tanggal mulai bekerja,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: jenis pekerjaan, dan
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: besarnya upah.
        - _type: pasal
          _key: 64
          isi:
            _type: referenceText
            references: []
            text: >-
              Perusahaan dapat menyerahkan sebagian pelaksanaan pekerjaan kepada
              perusahaan lainnya melalui perjanjian pemborongan pekerjaan atau
              penyediaan jasa pekerja/buruh yang dibuat secara tertulis.
        - _type: pasal
          _key: 65
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penyerahan sebagian pelaksanaan pekerjaan kepada perusahaan
                    lain dilaksanakan melalui perjanjian pem borongan pekerjaan
                    yang dibuat secara tertulis.
              - _type: ayat
                _key: 2
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Pekerjaan yang dapat diserahkan kepada perusahaan lain
                      sebagaimana dimaksud dalam ayat (1) harus memenuhi
                      syarat-syarat sebagai berikut :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: dilakukan secara terpisah dari kegiatan utama,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          dilakukan dengan perintah langsung atau tidak langsung
                          dari pemberi pekerjaan,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          merupakan kegiatan penunjang perusahaan secara
                          keseluruhan, dan
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: tidak menghambat proses produksi secara langsung.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perusahaan lain sebagaimana dimaksud dalam ayat (1) harus
                    berbentuk badan hukum.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perlindungan kerja dan syarat-syarat kerja bagi
                    pekerja/buruh pada perusahaan lain sebagaimana dimak-sud
                    dalam ayat (2) sekurang- kurangnya sama dengan perlindungan
                    kerja dan syarat-syarat kerja pada perusahaan pemberi
                    pekerjaan atau sesuai dengan peraturan perundang- undangan
                    yang berlaku.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perubahan dan/atau penambahan syarat-syarat sebagaimana
                    dimaksud dalam ayat (2) diatur lebih lanjut dengan Keputusan
                    Menteri.
              - _type: ayat
                _key: 6
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Hubungan kerja dalam pelaksanaan pekerjaan sebagaimana
                    dimaksud dalam ayat (1) diatur dalam perjanjian kerja secara
                    tertulis antara perusahaan lain dan pekerja/buruh yang
                    dipekerjakannya.
              - _type: ayat
                _key: 7
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Hubungan kerja sebagaimana dimaksud dalam ayat (6) dapat
                    didasarkan atas perjanjian kerja waktu tidak tertentu atau
                    perjanjian kerja waktu tertentu apabila memenuhi persyaratan
                    sebagaimana dimaksud dalam Pasal 59.
              - _type: ayat
                _key: 8
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal ketentuan sebagaimana dimaksud dalam ayat (2) dan
                    ayat (3) tidak terpenuhi, maka demi hukum status hubungan
                    kerja pekerja/buruh dengan perusahaan penerima pemborongan
                    beralih menjadi hubungan kerja pekerja/buruh dengan
                    perusahaan pemberi pekerjaan.
              - _type: ayat
                _key: 9
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal hubungan kerja beralih ke perusahaan pemberi
                    pekerjaan sebagaimana dimaksud dalam ayat (8), maka hubungan
                    kerja pekerja/buruh dengan pemberi pekerjaan sesuai dengan
                    hubungan kerja sebagaimana dimaksud dalam ayat (7).
        - _type: pasal
          _key: 66
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pekerja/buruh dari perusahaan penyedia jasa pekerja/buruh
                    tidak boleh digunakan oleh pemberi kerja untuk melaksanakan
                    kegiatan pokok atau kegiatan yang berhubungan langsung
                    dengan proses produksi, kecuali untuk kegiatan jasa
                    penunjang atau kegiatan yang tidak berhubungan langsung
                    dengan proses produksi.
              - _type: ayat
                _key: 2
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Penyedia jasa pekerja/buruh untuk kegiatan jasa penunjang
                      atau kegiatan yang tidak berhubungan lang-sung dengan
                      proses produksi harus memenuhi syarat sebagai berikut :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          adanya hubungan kerja antara pekerja/buruh dan
                          perusahaan penyedia jasa pekerja/buruh,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          perjanjian kerja yang berlaku dalam hubungan kerja
                          sebagaimana dimaksud pada huruf a adalah perjanjian
                          kerja untuk waktu tertentu yang memenuhi persyaratan
                          sebagaimana dimaksud dalam Pasal 59 dan/atau
                          perjanjian kerja waktu tidak tertentu yang dibuat
                          secara tertulis dan ditandatangani oleh kedua belah
                          pihak,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          perlindungan upah dan kesejahteraan, syarat-syarat
                          kerja, serta perselisihan yang timbul menjadi tanggung
                          jawab perusahaan penyedia jasa pekerja/buruh, dan
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          perjanjian antara perusahaan pengguna jasa
                          pekerja/buruh dan perusahaan lain yang bertindak
                          sebagai perusahaan penyedia jasa pekerja/buruh dibuat
                          secara tertulis dan wajib memuat pasal-pasal
                          sebagaimana dimaksud dalam undang-undang ini.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penyedia jasa pekerja/buruh merupakan bentuk usaha yang
                    berbadan hukum dan memiliki izin dari instansi yang
                    bertanggung jawab di bidang ketenagakerjaan.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal ketentuan sebagaimana dimaksud dalam ayat (1),
                    ayat (2) huruf a, huruf b, dan huruf d serta ayat (3) tidak
                    terpenuhi, maka demi hukum status hubungan kerja antara
                    pekerja/buruh dan perusahaan penyedia jasa pekerja/buruh
                    beralih menjadi hubungan kerja antara pekerja/buruh dan
                    perusahaan pemberi pekerjaan.
  - _type: bab
    _key: 10
    _judul: PERLINDUNGAN, PENGUPAHAN, DAN KESEJAHTERAAN
    isi:
      _type: bagians
      bagians:
        - _type: bagian
          _key: 1
          _judul: Bagian Kesatu Perlindungan
          isi:
            _type: paragrafs
            paragrafs:
              - _type: paragraf
                _key: 1
                _judul: Paragraf 1 Penyandang Cacat
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 67
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pengusaha yang mempekerjakan tenaga kerja
                                penyandang cacat wajib memberikan perlindungan
                                sesuai dengan jenis dan derajat kecacatannya.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemberian perlindungan sebagaimana dimaksud
                                dalam ayat (1) dilaksanakan sesuai dengan
                                peraturan perundang-undangan yang berlaku.
              - _type: paragraf
                _key: 2
                _judul: Paragraf 2 Anak
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 68
                      isi:
                        _type: referenceText
                        references: []
                        text: Pengusaha dilarang mempekerjakan anak.
                    - _type: pasal
                      _key: 69
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan sebagaimana dimaksud dalam Pasal 68
                                dapat dikecualikan bagi anak yang berumur antara
                                13 (tiga belas) tahun sampai dengan 15 (lima
                                belas) tahun untuk melakukan pekerjaan ringan
                                sepanjang tidak mengganggu perkembangan dan
                                kesehatan fisik, mental, dan sosial.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Pengusaha yang mempekerjakan anak pada
                                  pekerjaan ringan sebagai-mana dimaksud dalam
                                  ayat (1) ha-rus memenuhi persyaratan :
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: izin tertulis dari orang tua atau wali,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      perjanjian kerja antara pengusaha dengan
                                      orang tua atau wali,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: waktu kerja maksimum 3 (tiga) jam,
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      dilakukan pada siang hari dan tidak
                                      mengganggu waktu sekolah,
                                - _type: alphaPoint
                                  _key: e
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: keselamatan dan kesehatan kerja,
                                - _type: alphaPoint
                                  _key: f
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: adanya hubungan kerja yang jelas, dan
                                - _type: alphaPoint
                                  _key: g
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      menerima upah sesuai dengan ketentuan yang
                                      berlaku.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan sebagaimana dimaksud dalam ayat (2)
                                huruf a, b, f, dan g dikecualikan bagi anak yang
                                bekerja pada usaha keluarganya.
                    - _type: pasal
                      _key: 70
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Anak dapat melakukan pekerjaan di tempat kerja
                                yang merupakan bagian dari kurikulum pendidikan
                                atau pelatihan yang disahkan oleh pejabat yang
                                berwenang.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Anak sebagaimana dimaksud dalam ayat (1) paling
                                sedikit berumur 14 (empat belas) tahun.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Pekerjaan sebagaimana dimaksud dalam ayat (1)
                                  dapat dilakukan dengan syarat :
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      diberi petunjuk yang jelas tentang cara
                                      pelaksanaan pekerjaan serta bimbingan dan
                                      pengawasan dalam melaksanakan pekerjaan,
                                      dan
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      diberi perlindungan keselamatan dan
                                      kesehatan kerja.
                    - _type: pasal
                      _key: 71
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Anak dapat melakukan pekerjaan untuk
                                mengembangkan bakat dan minatnya.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Pengusaha yang mempekerjakan anak sebagaimana
                                  dimaksud dalam ayat (1) wajib memenuhi syarat
                                  :
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      di bawah pengawasan langsung dari orang
                                      tua atau wali,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      waktu kerja paling lama 3 (tiga) jam
                                      sehari, dan
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      kondisi dan lingkungan kerja tidak
                                      mengganggu perkembangan fisik, mental,
                                      sosial, dan waktu sekolah.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Ketentuan mengenai anak yang bekerja untuk
                                mengembangkan bakat dan minat sebagaimana
                                dimaksud dalam ayat (1) dan ayat (2) diatur
                                dengan Keputusan Menteri.
                    - _type: pasal
                      _key: 72
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal anak dipekerjakan bersama-sama dengan
                          pekerja/buruh dewasa, maka tempat kerja anak harus
                          dipisahkan dari tempat kerja pekerja/buruh dewasa.
                    - _type: pasal
                      _key: 73
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Anak dianggap bekerja bilamana berada di tempat kerja,
                          kecuali dapat dibuktikan sebaliknya.
                    - _type: pasal
                      _key: 74
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Siapapun dilarang mempekerjakan dan melibatkan
                                anak pada pekerjaan- pekerjaan yang terburuk.
                          - _type: ayat
                            _key: 2
                            isi:
