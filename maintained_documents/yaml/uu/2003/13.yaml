            parentPointSetNode: *ref_2
          content:
            type: text
            node:
              nodeType: text
              textName: text
              parentNode: *ref_3
            textString: >-
              bahwa pembangunan nasional dilaksanakan dalam rangka pembangunan manusia Indonesia
              seutuhnya dan pembangunan masyarakat Indonesia seluruhnya untuk mewujudkan masyarakat
              yang sejahtera, adil, makmur, yang merata, baik materiil maupun spiritual berdasarkan
              Pancasila dan Undang Undang Dasar Negara Republik Indonesia Tahun 1945,
            references: []
        - type: point
          node: &ref_4
            nodeType: point
            key: b
            parentPointSetNode: *ref_2
          content:
            type: text
            node:
              nodeType: text
              textName: text
              parentNode: *ref_4
            textString: >-
              bahwa dalam pelaksanaan pembangunan nasional, tenaga kerja mempunyai peranan dan
              kedudukan yang sangat penting sebagai pelaku dan tujuan pembangunan,
            references: []
        - type: point
          node: &ref_5
            nodeType: point
            key: c
            parentPointSetNode: *ref_2
          content:
            type: text
            node:
              nodeType: text
              textName: text
              parentNode: *ref_5
            textString: >-
              . bahwa sesuai dengan peranan dan kedudukan tenaga kerja, diperlukan pembangunan
              ketenagakerjaan untuk meningkatkan kualitas tenaga kerja dan peransertanya dalam
              pembangunan serta peningkatan perlindungan tenaga kerja dan keluarganya sesuai dengan
              harkat dan martabat kemanusiaan:
            references: []
        - type: point
          node: &ref_6
            nodeType: point
            key: d
            parentPointSetNode: *ref_2
          content:
            type: text
            node:
              nodeType: text
              textName: text
              parentNode: *ref_6
            textString: >-
              bahwa perlindungan terhadap tenaga kerja dimaksudkan untuk menjamin hak hak dasar
              pekerja/buruh dan menjamin kesamaan kesempatan serta perlakuan tanpa diskriminasi atas
              dasar apapun untuk mewujudkan kesejahteraan pekerja/buruh dan keluarganya dengan tetap
              memperhatikan perkembangan kemajuan dunia usaha,
            references: []
        - type: point
          node: &ref_7
            nodeType: point
            key: e
            parentPointSetNode: *ref_2
          content:
            type: text
            node:
              nodeType: text
              textName: text
              parentNode: *ref_7
            textString: >-
              bahwa beberapa undang undang di bidang ketenagakerjaan dipandang sudah tidak sesuai
              lagi dengan kebutuhan dan tuntutan pembangunan ketenagakerjaan, oleh karena itu perlu
              dicabut dan/atau ditarik kembali:
            references: []
        - type: point
          node: &ref_8
            nodeType: point
            key: f
            parentPointSetNode: *ref_2
          content:
            type: text
            node:
              nodeType: text
              textName: text
              parentNode: *ref_8
            textString: >-
              bahwa berdasarkan pertimbangan sebagaimana tersebut pada huruf a, b, c, d, dan e perlu
              membentuk Undang undang tentang Ketenagakerjaan,
            references: []
