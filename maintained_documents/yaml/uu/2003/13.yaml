                    parentNode: *ref_4
                  textString: 'Dalam undang undang ini yang dimaksud dengan :'
                  references: []
                elements:
                  - type: point
                    node: &ref_5
                      nodeType: point
                      key: '1'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_5
                      textString: >-
                        Ketenagakerjaan adalah segala hal yang berhubungan dengan tenaga kerja pada
                        waktu sebelum, selama, dan sesudah masa kerja.
                      references: []
                  - type: point
                    node: &ref_6
                      nodeType: point
                      key: '2'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_6
                      textString: >-
                        Tenaga kerja adalah setiap orang yang mampu melakukan pekerjaan guna
                        menghasilkan barang dan/atau jasa baik untuk memenuhi kebutuhan sendiri
                        maupun untuk masyarakat.
                      references: []
                  - type: point
                    node: &ref_7
                      nodeType: point
                      key: '3'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_7
                      textString: >-
                        Pekerja/buruh adalah setiap orang yang bekerja dengan menerima upah atau
                        imbalan dalam bentuk lain.
                      references: []
                  - type: point
                    node: &ref_8
                      nodeType: point
                      key: '4'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_8
                      textString: >-
                        Pemberi kerja adalah orang perseorangan, pengusaha, badan hukum, atau
                        badan-badan lainnya yang mempekerjakan tenaga kerja dengan membayar upah
                        atau imbalan dalam bentuk lain.
                      references: []
                  - type: point
                    node: &ref_9
                      nodeType: point
                      key: '5'
                      parentPointSetNode: *ref_4
                    content:
                      type: pointSet
                      node: &ref_10
                        nodeType: pointSet
                        parentNode: *ref_9
                      description:
                        type: text
                        node:
                          nodeType: text
                          textName: description
                          parentNode: *ref_10
                        textString: 'Pengusaha adalah :'
                        references: []
                      elements:
                        - type: point
                          node: &ref_11
                            nodeType: point
                            key: a
                            parentPointSetNode: *ref_10
                          content:
                            type: text
                            node:
                              nodeType: text
                              textName: text
                              parentNode: *ref_11
                            textString: >-
                              orang perseorangan, persekutuan, atau badan hukum yang menjalankan
                              suatu perusahaan milik sendiri,
                            references: []
                        - type: point
                          node: &ref_12
                            nodeType: point
                            key: b
                            parentPointSetNode: *ref_10
                          content:
                            type: text
                            node:
                              nodeType: text
                              textName: text
                              parentNode: *ref_12
                            textString: >-
                              orang perseorangan, persekutuan, atau badan hukum yang secara berdiri
                              sendiri menjalankan perusahaan bukan miliknya,
                            references: []
                        - type: point
                          node: &ref_13
                            nodeType: point
                            key: c
                            parentPointSetNode: *ref_10
                          content:
                            type: text
                            node:
                              nodeType: text
                              textName: text
                              parentNode: *ref_13
                            textString: >-
                              orang perseorangan, persekutuan, atau badan hukum yang berada di
                              Indonesia mewakili perusahaan sebagaimana dimaksud dalam huruf a dan b
                              yang berkedudukan di luar wilayah Indonesia.
                            references: []
                  - type: point
                    node: &ref_14
                      nodeType: point
                      key: '6'
                      parentPointSetNode: *ref_4
                    content:
                      type: pointSet
                      node: &ref_15
                        nodeType: pointSet
                        parentNode: *ref_14
                      description:
                        type: text
                        node:
                          nodeType: text
                          textName: description
                          parentNode: *ref_15
                        textString: 'Perusahaan adalah :'
                        references: []
                      elements:
                        - type: point
                          node: &ref_16
                            nodeType: point
                            key: a
                            parentPointSetNode: *ref_15
                          content:
                            type: text
                            node:
                              nodeType: text
                              textName: text
                              parentNode: *ref_16
                            textString: >-
                              setiap bentuk usaha yang berbadan hukum atau tidak, milik orang
                              perseorangan, milik persekutuan, atau milik badan hukum, baik milik
                              swasta maupun milik negara yang mempekerjakan pekerja/buruh dengan
                              membayar upah atau imbalan dalam bentuk lain:
                            references: []
                        - type: point
                          node: &ref_17
                            nodeType: point
                            key: b
                            parentPointSetNode: *ref_15
                          content:
                            type: text
                            node:
                              nodeType: text
                              textName: text
                              parentNode: *ref_17
                            textString: >-
                              usaha-usaha sosial dan usaha-usaha lain yang mempunyai pengurus dan
                              mempekerjakan orang lain dengan membayar upah atau imbalan dalam
                              bentuk lain.
                            references: []
                  - type: point
                    node: &ref_18
                      nodeType: point
                      key: '7'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_18
                      textString: >-
                        Perencanaan tenaga kerja adalah proses penyusunan rencana ketenagakerjaan
                        secara sistematis yang dijadikan dasar dan acuan dalam penyusunan kebijakan,
                        strategi, dan pelaksanaan program pembangunan ketenagakerjaan yang
                        berkesinambungan.
                      references: []
                  - type: point
                    node: &ref_19
                      nodeType: point
                      key: '8'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_19
                      textString: >-
                        Informasi ketenagakerjaan adalah gabungan, rangkaian, dan analisis data yang
                        berbentuk angka yang telah diolah, naskah dan dokumen yang mempunyai arti,
                        nilai dan makna tertentu mengenai ketenagakerjaan.
                      references: []
                  - type: point
                    node: &ref_20
                      nodeType: point
                      key: '9'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_20
                      textString: >-
                        Pelatihan kerja adalah keseluruhan kegiatan untuk memberi, memperoleh,
                        meningkatkan, serta mengembangkan kompetensi kerja, produktivitas, disiplin,
                        sikap, dan etos kerja pada tingkat keterampilan dan keahlian tertentu sesuai
                        dengan jenjang dan kualifikasi jabatan atau pekerjaan.
                      references: []
                  - type: point
                    node: &ref_21
                      nodeType: point
                      key: '10'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_21
                      textString: >-
                        Kompetensi kerja adalah kemampuan kerja setiap individu yang mencakup aspek
                        pengetahuan, keterampilan, dan sikap kerja yang sesuai dengan standar yang
                        ditetapkan.
                      references: []
                  - type: point
                    node: &ref_22
                      nodeType: point
                      key: '11'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_22
                      textString: >-
                        Pemagangan adalah bagian dari sistem pelatihan kerja yang diselenggarakan
                        secara terpadu antara pelatihan di lembaga pelatihan dengan bekerja secara
                        langsung di bawah bimbingan dan pengawasan instruktur atau pekerja/buruh
                        yang lebih berpengalaman, dalam proses produksi barang dan/atau jasa di
                        perusahaan, dalam rangka menguasai keterampilan atau keahlian tertentu.
                      references: []
                  - type: point
                    node: &ref_23
                      nodeType: point
                      key: '12'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_23
                      textString: >-
                        Pelayanan penempatan tenaga kerja adalah kegiatan untuk mempertemukan tenaga
                        kerja dengan pemberi kerja, sehingga tenaga kerja dapat memperoleh pekerjaan
                        yang sesuai dengan bakat, minat, dan kemampuannya, dan pemberi kerja dapat
                        memperoleh tenaga kerja yang sesuai dengan kebutuhannya.
                      references: []
                  - type: point
                    node: &ref_24
                      nodeType: point
                      key: '13'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_24
                      textString: >-
                        Tenaga kerja asing adalah warga negara asing pemegang visa dengan maksud
                        bekerja di wilayah Indonesia.
                      references: []
                  - type: point
                    node: &ref_25
                      nodeType: point
                      key: '14'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_25
                      textString: >-
                        Perjanjian kerja adalah perjanjian antara pekerja/buruh dengan pengusaha
                        atau pemberi kerja yang memuat syarat syarat kerja, hak, dan kewajiban para
                        pihak.
                      references: []
                  - type: point
                    node: &ref_26
                      nodeType: point
                      key: '15'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_26
                      textString: >-
                        Hubungan kerja adalah hubungan antara pengusaha dengan pekerja/buruh
                        berdasarkan perjanjian kerja, yang mempunyai unsur pekerjaan, upah, dan
                        perintah.
                      references: []
                  - type: point
                    node: &ref_27
                      nodeType: point
                      key: '16'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_27
                      textString: >-
                        Hubungan industrial adalah suatu sistem hubungan yang terbentuk antara para
                        pelaku dalam proses produksi barang dan/atau jasa yang terdiri dari unsur
                        pengusaha, pekerja/buruh, dan pemerintah yang didasarkan pada nilai nilai
                        Pancasila dan Undang Undang Dasar Negara Republik Indonesia Tahun 1945. 5.
                      references: []
                  - type: point
                    node: &ref_28
                      nodeType: point
                      key: '17'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_28
                      textString: >-
                        Serikat pekerja/serikat buruh adalah organisasi yang dibentuk dari, oleh,
                        dan untuk pekerja/buruh baik di perusahaan maupun di luar perusahaan, yang
                        bersifat bebas, terbuka, mandiri, demokratis, dan bertanggung jawab guna
                        memperjuangkan, membela serta melindungi hak dan kepentingan pekerja/buruh
                        serta meningkatkan kesejahteraan pekerja/buruh dan keluarganya.
                      references: []
                  - type: point
                    node: &ref_29
                      nodeType: point
                      key: '18'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_29
                      textString: >-
                        Lembaga kerja sama bipartit adalah forum komunikasi dan konsultasi mengenai
                        hal-hal yang berkaitan dengan hubungan industrial di satu perusahaan yang
                        anggotanya terdiri dari pengusaha dan serikat pekerja/ serikat buruh yang
                        sudah tercatat instansi yang bertanggung jawab di bidang ketenagakerjaan
                        atau unsur pekerja/buruh.
                      references: []
                  - type: point
                    node: &ref_30
                      nodeType: point
                      key: '19'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_30
                      textString: >-
                        Lembaga kerja sama tripartit adalah forum komunikasi, konsultasi dan
                        musyawarah tentang masalah ketenagakerjaan yang anggotanya terdiri dari
                        unsur organisasi pengusaha, serikat pekerja/serikat buruh, dan pemerintah.
                      references: []
                  - type: point
                    node: &ref_31
                      nodeType: point
                      key: '20'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_31
                      textString: >-
                        Peraturan perusahaan adalah peraturan yang dibuat secara tertulis oleh
                        pengusaha yang memuat syarat syarat kerja dan tata tertib perusahaan.
                      references: []
                  - type: point
                    node: &ref_32
                      nodeType: point
                      key: '21'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_32
                      textString: >-
                        Perjanjian kerja bersama adalah perjanjian yang merupakan hasil perundingan
                        antara serikat pekerja/serikat buruh atau beberapa serikat pekerja/serikat
                        buruh yang tercatat pada instansi yang bertanggung jawab di bidang
                        ketenagakerjaan dengan pengusaha, atau beberapa pengusaha atau perkumpulan
                        pengusaha yang memuat syarat syarat kerja, hak dan kewajiban kedua belah
                        pihak.
                      references: []
                  - type: point
                    node: &ref_33
                      nodeType: point
                      key: '22'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_33
                      textString: >-
                        Perselisihan hubungan industrial adalah perbedaan pendapat yang
                        mengakibatkan pertentangan antara pengusaha atau gabungan pengusaha dengan
                        pekerja/buruh atau serikat pekerja/serikat buruh karena adanya perselisihan
                        mengenai hak, perselisihan kepentingan, dan perselisihan pemutusan hubungan
                        kerja serta perselisihan antar serikat pekerja/serikat buruh hanya dalam
                        satu perusahaan.
                      references: []
                  - type: point
                    node: &ref_34
                      nodeType: point
                      key: '23'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_34
                      textString: >-
                        Mogok kerja adalah tindakan pekerja/buruh yang direncanakan dan dilaksanakan
                        secara bersama-sama dan/atau oleh serikat pekerja/serikat buruh untuk
                        menghentikan atau memperlambat pekerjaan.
                      references: []
                  - type: point
                    node: &ref_35
                      nodeType: point
                      key: '24'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_35
                      textString: >-
                        Penutupan perusahaan (lock out) adalah tindakan pengusaha untuk menolak
                        pekerja/buruh seluruhnya atau sebagian untuk menjalankan pekerjaan.
                      references: []
                  - type: point
                    node: &ref_36
                      nodeType: point
                      key: '25'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_36
                      textString: >-
                        Pemutusan hubungan kerja adalah pengakhiran hubungan kerja karena suatu hal
                        tertentu yang mengakibatkan berakhirnya hak dan kewajiban antara
                        pekerja/buruh dan pengusaha.
                      references: []
                  - type: point
                    node: &ref_37
                      nodeType: point
                      key: '26'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_37
                      textString: Anak adalah setiap orang yang berumur dibawah 18 (delapan belas) tahun.
                      references: []
                  - type: point
                    node: &ref_38
                      nodeType: point
                      key: '27'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_38
                      textString: Siang hari adalah waktu antara pukul 06.00 sampai dengan pukul 18.00.
                      references: []
                  - type: point
                    node: &ref_39
                      nodeType: point
                      key: '28'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_39
                      textString: 1 (satu) hari adalah waktu selama 24 (dua puluh empat) jam.
                      references: []
                  - type: point
                    node: &ref_40
                      nodeType: point
                      key: '29'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_40
                      textString: Seminggu adalah waktu selama 7 (tujuh) hari.
                      references: []
                  - type: point
                    node: &ref_41
                      nodeType: point
                      key: '30'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_41
                      textString: >-
                        Upah adalah hak pekerja/buruh yang diterima dan dinyatakan dalam bentuk uang
                        sebagai imbalan dari pengusaha atau pemberi kerja kepada pekerja/buruh yang
                        ditetapkan dan dibayarkan menurut suatu perjanjian kerja, kesepakatan, atau
                        peraturan perundang undangan, termasuk tunjangan bagi pekerja/buruh dan
                        keluarganya atas suatu pekerjaan dan/atau jasa yang telah atau akan
                        dilakukan.
                      references: []
                  - type: point
                    node: &ref_42
                      nodeType: point
                      key: '31'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_42
                      textString: >-
                        Kesejahteraan pekerja/buruh adalah suatu pemenuhan kebutuhan dan/atau
                        keperluan yang bersifat jasmaniah dan rohaniah, baik di dalam maupun di luar
                        hubungan kerja, yang secara langsung atau tidak langsung dapat mempertinggi
                        produktivitas kerja dalam lingkungan kerja yang aman dan sehat.
                      references: []
                  - type: point
                    node: &ref_43
                      nodeType: point
                      key: '32'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_43
                      textString: >-
                        Pengawasan ketenagakerjaan adalah kegiatan mengawasi dan menegakkan
                        pelaksanaan peraturan perundang undangan di bidang ketenagakerjaan.
                      references: []
                  - type: point
                    node: &ref_44
                      nodeType: point
                      key: '33'
                      parentPointSetNode: *ref_4
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_44
                      textString: Menteri adalah menteri yang bertanggung jawab di bidang ketenagakerjaan.
                      references: []
