                        references: []
                        text: >-
                          Upah minimum sebagaimana dimaksud dalam ayat (1)
                          diarahkan kepada pencapaian kebutuhan hidup layak.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Upah minimum sebagaimana dimaksud dalam ayat (1)
                          ditetapkan oleh Gubernur dengan memperhatikan
                          rekomendasi dari Dewan Pengupahan Provinsi dan/atau
                          Bupati/Walikota.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Komponen serta pelaksanaan tahapan pencapaian
                          kebutuhan hidup layak sebagaimana dimaksud dalam ayat
                          (2) diatur dengan Keputusan Menteri.
              - _type: pasal
                _key: 90
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengusaha dilarang membayar upah lebih rendah dari
                          upah minimum sebagaimana dimaksud dalam Pasal 89.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Bagi pengusaha yang tidak mampu membayar upah minimum
                          sebagaimana dimaksud dalam Pasal 89 dapat dilakukan
                          penangguhan.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Tata cara penangguhan sebagaimana dimaksud dalam ayat
                          (2) diatur dengan Keputusan Menteri.
              - _type: pasal
                _key: 91
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengaturan pengupahan yang ditetapkan atas kesepakatan
                          antara pengusaha dan pekerja/buruh atau serikat
                          pekerja/serikat buruh tidak boleh lebih rendah dari
                          ketentuan pengupahan yang ditetapkan peraturan
                          perundang-undangan yang berlaku.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal kesepakatan sebagaimana dimaksud dalam ayat
                          (1) lebih rendah atau bertentangan dengan peraturan
                          perundang-undangan, kesepakatan tersebut batal demi
                          hukum, dan pengusaha wajib membayar upah pekerja/buruh
                          menurut peraturan perundang-undangan yang berlaku.
              - _type: pasal
                _key: 92
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengusaha menyusun struktur dan skala upah dengan
                          memperhatikan golongan, jabatan, masa kerja,
                          pendidikan, dan kompetensi.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengusaha melakukan peninjauan upah secara berkala
                          dengan mem- perhatikan kemampuan perusahaan dan
                          produktivitas.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan mengenai struktur dan skala upah sebagaimana
                          dimaksud dalam ayat (1) diatur dengan Keputusan
                          Menteri.
              - _type: pasal
                _key: 93
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Upah tidak dibayar apabila pekerja/buruh tidak
                          melakukan pekerjaan.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Ketentuan sebagaimana dimaksud dalam ayat (1) tidak
                            berlaku, dan pengusaha wajib membayar upah apabila :
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                pekerja/buruh sakit sehingga tidak dapat
                                melakukan pekerjaan,
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                pekerja/buruh perempuan yang sakit pada hari
                                pertama dan kedua masa haidnya sehingga tidak
                                dapat melakukan pekerjaan,
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                pekerja/buruh tidak masuk bekerja karena
                                pekerja/buruh menikah, menikahkan,
                                mengkhitankan, membaptiskan anaknya, isteri
                                melahirkan atau keguguran kandungan, suami atau
                                isteri atau anak atau menantu atau orang tua
                                atau mertua atau anggota keluarga dalam satu
                                rumah meninggal dunia,
                          - _type: alphaPoint
                            _key: d
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                pekerja/buruh tidak dapat melakukan pekerjaannya
                                karena sedang menjalankan kewajiban terhadap
                                negara,
                          - _type: alphaPoint
                            _key: e
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                pekerja/buruh tidak dapat melakukan pekerjaannya
                                karena menjalan- kan ibadah yang diperintahkan
                                agamanya,
                          - _type: alphaPoint
                            _key: f
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                pekerja/buruh bersedia melakukan pekerjaan yang
                                telah dijanjikan tetapi pengusaha tidak
                                mempekerjakannya, baik karena kesalahan sendiri
                                maupun halangan yang seharusnya dapat dihindari
                                pengusaha,
                          - _type: alphaPoint
                            _key: g
                            isi:
                              _type: referenceText
                              references: []
                              text: pekerja/buruh melaksanakan hak istirahat,
                          - _type: alphaPoint
                            _key: h
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  pekerja/buruh melaksanakan tugas serikat
                                  pekerja/serikat buruh atas persetujuan
                                  pengusaha, dan
                              isi:
                                - _type: numPoint
                                  _key: '1'
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      pekerja/buruh melaksanakan tugas
                                      pendidikan dari perusahaan.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Upah yang dibayarkan kepada pekerja/buruh yang sakit
                            sebagaimana dimaksud dalam ayat (2) huruf a sebagai
                            berikut :
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                untuk 4 (empat) bulan pertama, dibayar 10096
                                (seratus perseratus) dari upah,
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                untuk 4 (empat) bulan kedua, dibayar 7590 (tujuh
                                puluh lima perseratus) dari upah:
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                untuk 4 (empat) bulan ketiga, dibayar 5096 (lima
                                puluh perseratus) dari upah, dan
                          - _type: alphaPoint
                            _key: d
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                untuk bulan selanjutnya dibayar 2596 (dua puluh
                                lima perseratus) dari upah sebelum pemutusan
                                hubungan kerja dilakukan oleh pengusaha.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Upah yang dibayarkan kepada pekerja/buruh yang tidak
                            masuk bekerja sebagaimana dimaksud dalam ayat (2)
                            huruf c sebagai berikut :
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                pekerja/buruh menikah, dibayar untuk selama 3
                                (tiga) hari:
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                menikahkan anaknya, dibayar untuk selama 2 (dua)
                                hari,
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                mengkhitankan anaknya, dibayar untuk selama 2
                                (dua) hari
                          - _type: alphaPoint
                            _key: d
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                membaptiskan anaknya, dibayar untuk selama 2
                                (dua) hari,
                          - _type: alphaPoint
                            _key: e
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                isteri melahirkan atau keguguran kandungan,
                                dibayar untuk selama 2 (dua) hari:
                          - _type: alphaPoint
                            _key: f
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                suami/isteri, orang tua/mertua atau anak atau
                                menantu meninggal dunia, dibayar untuk selama 2
                                (dua) hari, dan
                          - _type: alphaPoint
                            _key: g
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                anggota keluarga dalam satu rumah meninggal
                                dunia, dibayar untuk selama 1 (satu) hari.
                    - _type: ayat
                      _key: 5
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengaturan pelaksanaan ketentuan sebagaimana dimaksud
                          dalam ayat (2) ditetapkan dalam perjanjian kerja,
                          peraturan perusahaan, atau perjanjian kerja bersama.
              - _type: pasal
                _key: 94
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal komponen upah terdiri dari upah pokok dan
                    tunjangan tetap maka besarnya upah pokok sedikit-dikitnya 75
                    96 (tujuh puluh lima perseratus) dari jumlah upah pokok dan
                    tunjangan tetap.
              - _type: pasal
                _key: 95
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pelanggaran yang dilakukan oleh pekerja/buruh karena
                          kesengajaan atau kelalaiannya dapat dikenakan denda.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengusaha yang karena kesengajaan atau kelalaiannya
                          mengakibatkan keterlambatan pembayaran upah, dikenakan
                          denda sesuai dengan persentase tertentu dari upah
                          pekerja/buruh.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pemerintah mengatur pengenaan denda kepada pengusaha
                          dan/atau pekerja/buruh, dalam pembayaran upah.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal perusahaan dinyatakan pailit atau
                          dilikuidasi berdasarkan peraturan perundang-undangan
                          yang berlaku, maka upah dan hak-hak lainnya dari
                          pekerja/buruh merupakan utang yang didahulukan pem-
                          bayarannya.
              - _type: pasal
                _key: 96
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Tuntutan pembayaran upah pekerja/buruh dan segala pembayaran
                    yang timbul dari hubungan kerja menjadi kadaluwarsa setelah
                    melampaui jangka waktu 2 (dua) tahun sejak timbulnya hak.
              - _type: pasal
                _key: 97
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai penghasilan yang layak, kebijakan
                    pengupahan, kebutuhan hidup layak, dan perlindungan
                    pengupahan sebagaimana dimaksud dalam Pasal 88, penetapan
                    upah minimum sebagaimana dimaksud dalam Pasal 89, dan
                    pengenaan denda sebagaimana dimaksud dalam Pasal 95 ayat
                    (1), ayat (2) dan ayat (3) diatur dengan Peraturan
                    Pemerintah.
              - _type: pasal
                _key: 98
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Untuk memberikan saran, pertimbangan, dan merumuskan
                          kebijakan pengupahan yang akan ditetapkan oleh
                          pemerintah, serta untuk pengembangan sistem pengupahan
                          nasional dibentuk Dewan Pengupahan Nasional, Provinsi,
                          dan Kabupaten/Kota.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Keanggotaan Dewan Pengupahan sebagaimana dimaksud
                          dalam ayat (1) terdiri dari unsur pemerintah,
                          organisasi pengusaha, serikat pekerja/-serikat buruh,
                          perguruan tinggi, dan pakar.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Keanggotaan Dewan Pengupahan tingkat Nasional diangkat
                          dan diberhentikan oleh Presiden, sedangkan keanggotaan
                          Dewan Pengupahan Provinsi, Kabupaten/Kota diangkat dan
                          diberhentikan oleh Gubenur/ Bupati/Walikota.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan mengenai tata cara pembentukan, komposisi
                          keanggotaan, tata cara pengangkatan dan pemberhentian
                          keanggotaan, serta tugas dan tata kerja Dewan
                          Pengupahan sebagaimana dimaksud dalam ayat (1) dan
                          ayat (2), diatur dengan Keputusan Presiden.
        - _type: bagian
          _key: 3
          _judul: Bagian Ketiga Kesejahteraan
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 99
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Setiap pekerja/buruh dan keluarganya berhak untuk
                          memperoleh jaminan sosial tenaga kerja.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Jaminan sosial tenaga kerja sebagaimana dimaksud dalam
                          ayat (1), dilaksanakan sesuai dengan peraturan
                          perundang-undangan yang berlaku.
              - _type: pasal
                _key: 100
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Untuk meningkatkan kesejahteraan bagi pekerja/buruh
                          dan keluarganya, pengusaha wajib menyediakan fasilitas
                          kesejahteraan.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Penyediaan fasilitas kesejahteraan sebagaimana
                          dimaksud dalam ayat (1), dilaksanakan dengan
                          memperhatikan kebutuhan pekerja/buruh dan ukuran
                          kemampuan perusahaan.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan mengenai Jenis dan kriteria fasilitas
                          kesejahteraan sesuai dengan kebutuhan pekerja/buruh
                          dan ukuran kemampuan perusahaan sebagaimana dimaksud
                          dalam ayat (1) dan ayat (2), diatur dengan Peraturan
                          Pemerintah.
              - _type: pasal
                _key: 101
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Untuk meningkatkan kesejahteraan pekerja/buruh,
                          dibentuk koperasi pekerja/buruh dan usaha-usaha
                          produktif di perusahaan.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pemerintah, pengusaha, dan pekerja/buruh atau serikat
                          pekerja/serikat buruh berupaya menumbuhkembangkan
                          koperasi pekerja/buruh, dan mengembangkan usaha
                          produktif sebagaimana dimaksud dalam ayat (1).
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pembentukan koperasi sebagaimana dimaksud dalam ayat
                          (1), dilaksanakan sesuai dengan peraturan
                          perundang-undangan yang berlaku.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Upaya-upaya untuk menumbuhkembangkan koperasi
                          pekerja/buruh sebagaimana dimaksud dalam ayat (2),
                          diatur dengan Peraturan Pemerintah.
  - _type: bab
    _key: 11
    _judul: HUBUNGAN INDUSTRIAL
    isi:
      _type: bagians
      bagians:
        - _type: bagian
          _key: 1
          _judul: Bagian Kesatu Umum
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 102
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam melaksanakan hubungan industrial, pemerintah
                          mempunyai fungsi menetapkan kebijakan, memberikan
                          pelayanan, — melaksanakan pengawasan, dan melakukan
                          penindakan terhadap pelanggaran peraturan
                          perundang-undangan ketenagakerjaan.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam melaksanakan hubungan industrial, pekerja/buruh
                          dan serikat pekerja/serikat buruhnya mempunyai fungsi
                          menjalankan pekerjaan sesuai dengan kewajibannya,
                          menjaga ketertiban demi kelangsungan produksi,
                          menyalurkan aspirasi secara demokratis, mengembangkan
                          keterampilan, dan keahliannya serta ikut memajukan
                          perusahaan dan memperjuangkan kesejahteraan anggota
                          beserta keluarganya.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam melaksanakan hubungan industrial, pengusaha dan
                          organisasi pengusahanya mempunyai fungsi menciptakan
                          kemitraan, mengembang- kan usaha, memperluas lapangan
                          kerja, dan memberikan kesejahteraan pekerja/buruh
                          secara terbuka, demokratis, dan berkeadilan.
              - _type: pasal
                _key: 103
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: 'Hubungan Industrial dilaksanakan melalui sarana :'
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: serikat pekerja/serikat buruh,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: organisasi pengusaha,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: . lembaga kerja sama bipartit,
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: embaga kerja sama tripartit,
                    - _type: alphaPoint
                      _key: e
                      isi:
                        _type: referenceText
                        references: []
                        text: peraturan perusahaan,
                    - _type: alphaPoint
                      _key: f
                      isi:
                        _type: referenceText
                        references: []
                        text: perjanjian kerja bersama,
                    - _type: alphaPoint
                      _key: g
                      isi:
                        _type: referenceText
                        references: []
                        text: 'peraturan perundang-undangan ketenagakerjaan: dan'
                    - _type: alphaPoint
                      _key: h
                      isi:
                        _type: referenceText
                        references: []
                        text: lembaga penyelesaian perselisihan hubungan industrial.
        - _type: bagian
          _key: 2
          _judul: Bagian Kedua Serikat Pekerja/Serikat Buruh
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 104
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Setiap pekerja/buruh berhak membentuk dan menjadi
                          anggota serikat pekerja/serikat buruh.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam melaksanakan fungsi sebagaimana dimaksud dalam
                          Pasal 102, serikat pekerja/serikat buruh ber-hak
                          menghimpun dan mengelola keuangan serta
                          mempertanggungjawabkan keuangan organisasi termasuk
                          dana mogok.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Besarnya dan tata cara pemungutan dana mogok
                          sebagaimana dimaksud dalam ayat (2) diatur dalam
                          ang-garan dasar dan/atau anggaran rumah tangga serikat
                          pekerja/serikat buruh yang bersangkutan.
        - _type: bagian
          _key: 3
          _judul: Bagian Ketiga Organisasi Pengusaha
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 105
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Setiap pengusaha berhak membentuk dan menjadi anggota
                          organisasi pengusaha.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan mengenai organisasi pengusaha diatur sesuai
                          dengan peraturan perundang-undangan yang ber-laku.
        - _type: bagian
          _key: 4
          _judul: Bagian Keempat Lembaga Kerja Sama Bipartit
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 106
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Setiap perusahaan yang mempekerjakan 50 (lima puluh)
                          orang pekerja/ buruh atau lebih wajib membentuk
                          lembaga kerja sama bipartit.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Lembaga kerja sama bipartit sebagaimana dimaksud dalam
                          ayat (1) berfungsi sebagai forum komunikasi, dan
                          konsultasi mengenai hal ketenagakerjaan di perusahaan.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Susunan keanggotaan lembaga kerja sama bipartit
                          sebagaimana dimaksud dalam ayat (2) terdiri dari unsur
                          pengusaha dan unsur pekerja/buruh yang ditunjuk oleh
                          pekerja/buruh secara demokratis untuk mewakili
                          kepentingan pekerja/buruh di perusahaan yang
                          bersangkutan.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan mengenai tata cara pembentukan dan susunan
                          keanggotaan lembaga kerja sama bipartit sebagaimana
                          dimaksud dalam ayat (1) dan ayat (3) diatur dengan
                          Keputusan Menteri.
        - _type: bagian
          _key: 5
          _judul: Bagian Kelima Lembaga Kerja Sama Tripartit
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 107
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Lembaga kerja sama tripartit memberikan pertimbangan,
                          saran, dan pendapat kepada pemerintah dan pihak
                          terkait dalam penyusunan kebijakan dan pemecahan
                          masalah ketenagakerjaan.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Lembaga Kerja sama Tripartit sebagaimana dimaksud
                            dalam ayat (1), terdiri dari :
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Lembaga Kerja sama Tripartit Nasional, Provinsi,
                                dan Kabupaten/ Kota: dan
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Lembaga Kerja sama Tripartit Sektoral Nasional,
                                Provinsi, dan Kabupaten/Kota.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Keanggotaan Lembaga Kerja sama Tripartit terdiri dari
                          unsur pemerintah, organisasi pengusaha, dan seri-kat
                          pekerja/serikat buruh.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Tata kerja dan susunan organisasi Lembaga Kerja sama
                          Tripartit sebagaimana dimaksud dalam ayat (1) diatur
                          dengan Peraturan Pemerintah.
        - _type: bagian
          _key: 6
          _judul: Bagian Keenam Peraturan Perusahaan
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 108
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengusaha yang mempekerjakan pekerja/buruh
                          sekurang-kurangnya 10 (sepuluh) orang wajib membuat
                          peraturan perusahaan yang mulai berlaku setelah
                          disahkan oleh Menteri atau pejabat yang ditunjuk.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Kewajiban membuat peraturan perusahaan sebagaimana
                          dimaksud dalam ayat (1) tidak berlaku bagi peru-sahaan
                          yang telah memiliki perjanjian kerja bersama.
              - _type: pasal
                _key: 109
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Peraturan perusahaan disusun oleh dan menjadi tanggung jawab
                    dari pengusaha yang bersangkutan.
              - _type: pasal
                _key: 110
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Peraturan perusahaan disusun dengan memperhatikan
                          saran dan pertimbangan dari wakil pekerja/buruh di
                          perusahaan yang bersangkutan.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal di perusahaan yang bersangkutan telah
                          terbentuk serikat pekerja/serikat buruh maka wakil
                          pe-kerja/buruh sebagaimana dimaksud dalam ayat (1)
                          adalah pengurus serikat pekerja/serikat buruh.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal di perusahaan yang bersangkutan belum
                          terbentuk serikat pekerja/serikat buruh, wakil
                          pekerja/ buruh sebagaimana dimaksud dalam ayat (1)
                          adalah pekerja/buruh yang dipilih secara demokratis
                          untuk mewakili kepentingan para pekerja/buruh di
                          perusahaan yang bersangkutan.
              - _type: pasal
                _key: 111
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: 'Peraturan perusahaan sekurang-kurangnya memuat :'
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: hak dan kewajiban pengusaha,
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: hak dan kewajiban pekerja/buruh,
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: syarat kerja,
                          - _type: alphaPoint
                            _key: d
                            isi:
                              _type: referenceText
                              references: []
                              text: 'tata tertib perusahaan: dan'
                          - _type: alphaPoint
                            _key: e
                            isi:
                              _type: referenceText
                              references: []
                              text: jangka waktu berlakunya peraturan perusahaan.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan dalam peraturan perusahaan tidak boleh
                          bertentangan dengan ketentuan peraturan perundang
                          undangan yang berlaku.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Masa berlaku peraturan perusahaan paling lama 2 (dua)
                          tahun dan wajib diperbaharui setelah habis masa
                          berlakunya.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Selama masa berlakunya peraturan perusahaan, apabila
                          serikat pekerja/ serikat buruh di perusahaan meng
                          hendaki perundingan pembuatan perjanjian kerja
                          bersama, maka pengusaha wajib melayani.
                    - _type: ayat
                      _key: 5
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal perundingan pembuatan perjanjian kerja
                          bersama sebagaimana dimaksud dalam ayat (4) tidak
                          mencapai kesepakatan, maka peraturan perusahaan tetap
                          berlaku sampai habis jangka waktu berlakunya.
              - _type: pasal
                _key: 112
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengesahan peraturan perusahaan oleh Menteri atau
                          pejabat yang ditunjuk sebagaimana dimaksud dalam Pasal
                          108 ayat (1) harus sudah diberikan dalam waktu paling
                          lama 30 (tiga puluh) hari kerja sejak naskah peraturan
                          perusahaan diterima.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Apabila peraturan perusahaan telah sesuai sebagaimana
                          ketentuan dalam Pasal 111 ayat (1) dan ayat (2), maka
                          dalam waktu 30 (tiga puluh) hari kerja sebagaimana
                          dimaksud pada ayat (1) sudah terlampaui dan peraturan
                          perusahaan belum disahkan oleh Menteri atau pejabat
                          yang ditunjuk, maka peraturan perusahaan dianggap
                          telah mendapatkan pengesahan.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal peraturan perusahaan belum memenuhi
                          persyaratan sebagaimana dimaksud dalam Pasal 111 ayat
                          (1) dan ayat (2) Menteri atau pejabat yang ditunjuk
                          harus memberitahukan secara tertulis kepada pengusaha
                          mengenai perbaikan peraturan perusahaan.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam waktu paling lama 14 (empat belas) hari kerja
                          sejak tanggal pemberitahuan diterima oleh pengusaha
                          sebagaimana dimaksud dalam ayat (3), pengusaha wajib
                          menyampaikan kembali peraturan perusahaan yang telah
                          diperbaiki kepada Menteri atau pejabat yang ditunjuk.
              - _type: pasal
                _key: 113
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Perubahan peraturan perusahaan sebelum berakhir jangka
                          waktu berlakunya hanya dapat dilakukan atas dasar
                          kesepakatan antara pengusaha dan wakil pekerja/buruh.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Peraturan perusahaan hasil perubahan sebagaimana
                          dimaksud dalam ayat (1) harus mendapat pengesa-han
                          dari Menteri atau pejabat yang ditunjuk.
              - _type: pasal
                _key: 114
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha wajib memberitahukan dan menjelaskan isi serta
                    memberikan naskah peraturan perusahaan atau perubahannya
                    kepada pekerja/buruh.
              - _type: pasal
                _key: 115
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai tata cara pembuatan dan pengesahan
                    peraturan perusahaan diatur dengan Keputusan Menteri.
        - _type: bagian
          _key: 7
          _judul: Bagian Ketujuh Perjanjian Kerja Bersama
          isi:
            _type: pasals
            pasals:
              - _type: pasal
                _key: 116
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Perjanjian kerja bersama dibuat oleh serikat
                          pekerja/serikat buruh atau beberapa serikat
                          pekerja/serikat buruh yang telah tercatat pada
                          instansi yang bertanggung jawab di bidang
                          ketenagakerjaan dengan pengusaha atau beberapa
                          pengusaha.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Penyusunan perjanjian kerja bersama sebagaimana
                          dimaksud dalam ayat (1) dilaksanakan secara
                          musya-warah.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Perjanjian kerja bersama sebagaimana dimaksud dalam
                          ayat (1) harus dibuat secara tertulis dengan huruf
                          latin dan menggunakan bahasa Indonesia.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal terdapat perjanjian kerja bersama yang
                          dibuat tidak menggunakan bahasa Indonesia, maka
                          per-janjian kerja bersama tersebut harus diterjemahkan
                          dalam bahasa Indonesia oleh penerjemah tersumpah dan
                          terjemahan tersebut dianggap sudah memenuhi ketentuan
                          sebagaimana dimaksud dalam ayat (3).
              - _type: pasal
                _key: 117
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal musyawarah sebagaimana dimaksud dalam Pasal 116
                    ayat (2) tidak mencapai kesepakatan, maka penyelesaiannya
                    dilakukan melalui prosedur penyelesaian perselisihan
                    hubungan industrial.
              - _type: pasal
                _key: 118
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam 1 (satu) perusahaan hanya dapat dibuat 1 (satu)
                    perjanjian kerja bersama yang berlaku bagi seluruh
                    pekerja/buruh di perusahaan.
              - _type: pasal
                _key: 119
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal di satu perusahaan hanya terdapat satu
                          serikat pekerja/serikat buruh, maka serikat
                          pekerja/seri-kat buruh tersebut berhak mewakili
                          pekerja/buruh dalam perundingan pembuatan perjanjian
                          kerja bersama dengan pengusaha apabila memiliki jumlah
                          anggota lebih dari 5090 (lima puluh perseratus) dari
                          jumlah seluruh pekerja/buruh di perusahaan yang
                          bersangkutan.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal di satu perusahaan hanya terdapat satu
                          serikat pekerja/serikat buruh sebagaimana dimaksud
                          pada ayat (1) tetapi tidak memiliki jumlah anggota
                          lebih dari 509 (lima puluh perseratus) dari jumlah
                          seluruh pekerja/buruh di perusahaan maka serikat
                          pekerja/serikat buruh dapat mewakili pekerja/buruh
                          dalam perundingan dengan pengusaha apabila serikat
                          pekerja/serikat buruh yang bersangkutan telah mendapat
                          dukungan lebih 5096 (lima puluh perseratus) dari
                          jumlah seluruh pekerja/buruh di perusahaan melalui
                          pemungutan suara.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal dukungan sebagaimana dimaksud dalam ayat (2)
                          tidak tercapai maka serikat pekerja/serikat buruh yang
                          bersangkutan dapat mengajukan kembali permintaan untuk
                          merundingkan perjanjian kerja bersama dengan pengusaha
                          setelah melampaui jangka waktu 6 (enam) bulan
                          terhitung sejak dilakukannya pemungutan suara dengan
                          mengikuti prosedur sebagaimana dimaksud dalam ayat
                          (2).
              - _type: pasal
                _key: 120
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal di satu perusahaan terdapat lebih dari 1
                          (satu) serikat pekerja/serikat buruh maka yang berhak
                          mewakili pekerja/buruh melakukan perundingan dengan
                          pengusaha yang jumlah keanggotaannya lebih dari 5046
                          (lima puluh perseratus) dari seluruh jumlah
                          pekerja/buruh di perusahaan tersebut.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal ketentuan sebagaimana dimaksud dalam ayat
                          (1) tidak terpenuhi, maka serikat pekerja/serikat
                          buruh dapat melakukan koalisi sehingga tercapai jumlah
                          lebih dari 504 (lima puluh perseratus) dari seluruh
                          jumlah pekerja/buruh di perusahaan tersebut untuk
                          mewakili dalam perundingan dengan pengusaha.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal ketentuan sebagaimana dimaksud dalam ayat
                          (1) atau ayat (2) tidak terpenuhi, maka para seri-kat
                          pekerja/serikat buruh membentuk tim perunding yang
                          keanggotaannya ditentukan secara proporsional
                          berdasarkan jumlah anggota masing-masing serikat
                          pekerja/serikat buruh.
              - _type: pasal
                _key: 121
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Keanggotaan serikat pekerja/serikat buruh sebagaimana
                    dimaksud dalam Pasal 119 dan Pasal 120 dibuktikan dengan
                    kartu tanda anggota.
              - _type: pasal
                _key: 122
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemungutan suara sebagaimana dimaksud dalam Pasal 119 ayat
                    (2) diselenggarakan oleh panitia yang terdiri dari
                    wakil-wakil pekerja/buruh dan pengurus serikat
                    pekerja/serikat buruh yang disaksikan oleh pihak pejabat
                    yang bertanggung jawab di bidang ketenagakerjaan dan
                    pengusaha.
              - _type: pasal
                _key: 123
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Masa berlakunya perjanjian kerja bersama paling lama 2
                          (dua) tahun.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Perjanjian kerja bersama sebagaimana dimaksud dalam
                          ayat (1) dapat diperpanjang masa berlakunya pa-ling
                          lama 1 (satu) tahun berdasarkan kesepakatan tertulis
                          antara pengusaha dengan serikat pekerja/serikat buruh.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Perundingan pembuatan perjanjian kerja bersama
                          berikutnya dapat dimulai paling cepat 3 (tiga) bulan
                          se-belum berakhirnya perjanjian kerja bersama yang
                          sedang berlaku.
                    - _type: ayat
                      _key: 4
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal perundingan sebagaimana dimaksud dalam ayat
                          (3) tidak mencapai kesepakatan maka perjan-jian kerja
                          bersama yang sedang berlaku, tetap berlaku untuk
                          paling lama 1 (satu) tahun.
              - _type: pasal
                _key: 124
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: 'Perjanjian kerja bersama paling sedikit memuat :'
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: hak dan kewajiban pengusaha,
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                hak dan kewajiban serikat pekerja/serikat buruh
                                serta pekerja/buruh,
                          - _type: alphaPoint
                            _key: c
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                jangka waktu dan tanggal mulai berlakunya
                                perjanjian kerja bersama, dan
                          - _type: alphaPoint
                            _key: d
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                tanda tangan para pihak pembuat perjanjian kerja
                                bersama.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Ketentuan dalam perjanjian kerja bersama tidak boleh
                          bertentangan dengan peraturan perundang-undangan yang
                          berlaku.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal isi perjanjian kerja bersama bertentangan
                          dengan peraturan perundang-undangan yang berlaku
                          sebagaimana dimaksud dalam ayat (2), maka ketentuan
                          yang bertentangan tersebut batal demi hukum dan yang
                          berlaku adalah ketentuan dalam peraturan
                          perundang-undangan.
              - _type: pasal
                _key: 125
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal kedua belah pihak sepakat mengadakan perubahan
                    perjanjian kerja bersama, maka perubahan tersebut merupakan
                    bagian yang tidak terpisahkan dari perjanjian kerja bersama
                    yang sedang berlaku.
              - _type: pasal
                _key: 126
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengusaha, serikat pekerja/serikat buruh dan
                          pekerja/buruh wajib melaksanakan ketentuan yang ada
                          da-lam perjanjian kerja bersama.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengusaha dan serikat pekerja/serikat buruh wajib
                          memberitahukan isi perjanjian kerja bersama atau
                          peru-bahannya kepada seluruh pekerja/ buruh.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengusaha harus mencetak dan membagikan naskah
                          perjanjian kerja bersama kepada setiap pekerja/ buruh
                          atas biaya perusahaan.
              - _type: pasal
                _key: 127
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Perjanjian kerja yang dibuat oleh pengusaha dan
                          pekerja/buruh tidak boleh bertentangan dengan
                          perjanjian kerja bersama.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal ketentuan dalam perjanjian kerja sebagaimana
                          dimaksud dalam ayat (1) bertentangan dengan perjanjian
                          kerja bersama, maka ketentuan dalam perjanjian kerja
                          tersebut batal demi hukum dan yang berlaku adalah
                          ketentuan dalam perjanjian kerja bersama.
              - _type: pasal
                _key: 128
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal perjanjian kerja tidak memuat aturan-aturan yang
                    diatur dalam perjanjian kerja bersama maka yang berlaku
                    adalah aturan-aturan dalam perjanjian kerja bersama.
              - _type: pasal
                _key: 129
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pengusaha dilarang mengganti perjanjian kerja bersama
                          dengan peraturan perusahaan, selama di perusa-haan
                          yang bersangkutan masih ada serikat pekerja/serikat
                          buruh.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal di perusahaan tidak ada lagi serikat
                          pekerja/serikat buruh dan perjanjian kerja bersama
                          diganti dengan peraturan perusahaan, maka ketentuan
                          yang ada dalam peraturan perusahaan tidak boleh lebih
                          rendah dari ketentuan yang ada dalam perjanjian kerja
                          bersama.
              - _type: pasal
                _key: 130
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal perjanjian kerja bersama yang sudah berakhir
                          masa berlakunya akan diperpanjang atau diper-baharui
                          dan di perusahaan tersebut hanya terdapat 1 (satu)
                          serikat pekerja/serikat buruh, maka perpanjangan atau
                          pembuatan pembaharuan perjanjian kerja bersama tidak
                          mensyaratkan ketentuan dalam Pasal 119.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal perjanjian kerja bersama yang sudah berakhir
                          masa berlakunya akan diperpanjang atau diper-baharui
                          dan di perusahaan tersebut terdapat lebih dari 1
                          (satu) serikat pekerja/serikat buruh dan serikat
                          pekerja/serikat buruh yang dulu berunding tidak lagi
                          memenuhi ketentuan Pasal 120 ayat (l), maka
                          perpanjangan atau pembuatan pembaharuan perjanjian
                          kerja bersama dilakukan oleh serikat pekerja/serikat
                          buruh yang anggotanya lebih 5096 (lima puluh
                          perseratus) dari jumlah seluruh pekerja/buruh di
                          perusahaan bersama-sama dengan serikat pekerja/serikat
                          buruh yang membuat perjanjian kerja bersama terdahulu
                          dengan membentuk tim perunding secara proporsional.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal perjanjian kerja bersama yang sudah berakhir
                          masa berlakunya akan diperpanjang atau diper-baharui
                          dan di perusahaan tersebut terdapat lebih dari 1
                          (satu) serikat pekerja/ serikat buruh dan tidak
                          satupun serikat pekerja/serikat buruh yang ada
                          memenuhi ketentuan Pasal 120 ayat (1), maka
                          perpanjangan atau pembuatan pembaharuan perjanjian
                          kerja bersama dilakukan menurut ketentuan Pasal 120
                          ayat (2) dan ayat (3).
              - _type: pasal
                _key: 131
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal terjadi pembubaran serikat pekerja/serikat
                          buruh atau pengalihan kepemilikan perusahaan maka
                          perjanjian kerja bersama tetap berlaku sampai
                          berakhirnya jangka waktu perjanjian kerja bersama.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal terjadi penggabungan perusahaan (merger) dan
                          masing-masing perusahaan mempunyai perjan-jian kerja
                          bersama maka perjanjian kerja bersama yang berlaku
                          adalah perjanjian kerja bersama yang lebih
                          menguntungkan pekerja/buruh.
                    - _type: ayat
                      _key: 3
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal terjadi penggabungan perusahaan (merger)
                          antara perusahaan yang mempunyai perjanjian kerja
                          bersama dengan perusahaan yang belum mempunyai
                          perjanjian kerja bersama maka perjanjian kerja bersama
                          tersebut berlaku bagi perusahaan yang bergabung
                          (merger) sampai dengan berakhirnya jangka waktu
                          perjanjian kerja bersama.
              - _type: pasal
                _key: 132
                isi:
                  _type: ayats
                  ayats:
                    - _type: ayat
                      _key: 1
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Perjanjian kerja bersama mulai berlaku pada hari
                          penandatanganan kecuali ditentukan lain dalam
                          perjanjian kerja bersama tersebut.
                    - _type: ayat
                      _key: 2
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Perjanjian kerja bersama yang ditandatangani oleh
                          pihak yang membuat perjanjian kerja bersama
                          selan-jutnya didaftarkan oleh pengusaha pada instansi
                          yang bertanggung jawab di bidang ketenagakerjaan.
              - _type: pasal
                _key: 133
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan mengenai persyaratan serta tata cara pembuatan,
                    perpanjangan, perubahan, dan pendaftaran perjanjian kerja
                    bersama diatur dengan Keputusan Menteri.
              - _type: pasal
                _key: 134
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam mewujudkan pelaksanaan hak dan kewajiban pekerja/buruh
                    dan pengusaha, pemerintah wajib melaksanakan pengawasan dan
                    penegakan peraturan perundang-undangan ketenagakerjaan.
              - _type: pasal
                _key: 135
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pelaksanaan — peraturan — perundang-undangan ketenagakerjaan
                    — dalam mewujudkan hubungan industrial merupakan tanggung
                    jawab pekerja/buruh, pengusaha, dan pemerintah.
        - _type: bagian
          _key: 8
          _judul: >-
            Bagian Kedelapan Lembaga Penyelesaian Perselisihan Hubungan
            Industrial
          isi:
            _type: paragrafs
            paragrafs:
              - _type: paragraf
                _key: 1
                _judul: Paragraf 1 Perselisihan Hubungan Industrial
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 136
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penyelesaian perselisihan hubungan industrial
                                wajib dilaksanakan oleh pengusaha dan
                                pekerja/buruh atau serikat pekerja/serikat buruh
                                secara musyawarah untuk mufakat.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal penyelesaian secara musyawarah untuk
                                mufakat sebagaimana dimaksud dalam ayat (1)
                                tidak tercapai, maka pengusaha dan pekerja/
                                buruh atau serikat pekerja/serikat buruh
                                menyelesaikan perselisihan hubungan industrial
                                melalui prosedur penyelesaian perselisihan
                                hubungan industrial yang diatur dengan
                                undang-undang.
              - _type: paragraf
                _key: 2
                _judul: Paragraf 2 Mogok Kerja
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 137
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Mogok kerja sebagai hak dasar pekerja/buruh dan
                          serikat pekerja/serikat buruh dilakukan secara sah,
                          tertib, dan damai sebagai akibat gagalnya perundingan.
                    - _type: pasal
                      _key: 138
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pekerja/buruh dan/atau serikat pekerja/serikat
                                buruh yang bermaksud mengajak pekerja/buruh lain
                                untuk mogok kerja pada saat mogok kerja
                                berlangsung dilakukan dengan tidak melanggar
                                hukum.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pekerja/buruh yang diajak mogok kerja
                                sebagaimana dimaksud dalam ayat (1), dapat
                                memenuhi atau tidak memenuhi ajakan tersebut.
                    - _type: pasal
                      _key: 139
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Pelaksanaan mogok kerja bagi pekerja/buruh yang
                          bekerja pada perusahaan yang melayani kepentingan umum
                          dan/atau perusahaan yang jenis kegiatan-nya
                          membahayakan keselamatan jiwa manusia diatur
                          sedemikian rupa sehingga tidak mengganggu kepentingan
                          umum dan/atau membahayakan keselamatan orang lain.
                    - _type: pasal
                      _key: 140
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Sekurang-kurangnya dalam waktu 7 (tujuh) hari
                                kerja sebelum mogok kerja dilaksanakan,
                                pekerja/buruh dan serikat pekerja/serikat buruh
                                wajib memberitahukan secara tertulis kepada
                                pengusaha dan instansi yang bertanggung jawab di
                                bidang ketenagakerjaan setempat.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Pemberitahuan sebagaimana dimaksud dalam ayat
                                  (1) sekurang-kurangnya memuat :
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      waktu (hari, tanggal, dan jam) dimulai dan
                                      diakhiri mogok kerja,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: tempat mogok kerja,
                                - _type: alphaPoint
                                  _key: c
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      alasan dan sebab-sebab mengapa harus
                                      melakukan mogok kerja, dan
                                - _type: alphaPoint
                                  _key: d
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      tanda tangan ketua dan sekretaris dan/atau
                                      masing-masing ketua dan sekretaris serikat
                                      pekerja/serikat buruh sebagai penanggung
                                      jawab mogok kerja.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal mogok kerja akan dilakukan oleh
                                pekerja/buruh yang tidak menjadi anggota serikat
                                pekerja/ serikat buruh, maka pemberitahuan
                                sebagaimana dimaksud dalam ayat (2)
                                ditandatangani oleh perwakilan pekerja/buruh
                                yang ditunjuk sebagai koordinator dan/atau
                                penanggung jawab mogok kerja.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Dalam hal mogok kerja dilakukan tidak
                                  sebagaimana dimaksud dalam ayat (l), maka demi
                                  menyelamat kan alat produksi dan aset
                                  perusahaan, pengusaha dapat mengambil tindakan
                                  sementara dengan cara :
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      melarang para pekerja/buruh yang mogok
                                      kerja berada di lokasi kegiatan proses
                                      produksi, atau
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      bila dianggap perlu melarang pekerja/buruh
                                      yang mogok kerja berada di lokasi
                                      perusahaan.
                    - _type: pasal
                      _key: 141
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Instansi pemerintah dan pihak perusahaan yang
                                menerima surat pemberitahuan mogok kerja
                                sebagaimana dimaksud dalam Pasal 140 wajib
                                memberikan tanda terima.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Sebelum dan selama mogok kerja berlangsung,
                                instansi yang bertanggung jawab di bidang
                                ketenagakerjaan wajib menyelesaikan masalah yang
                                menyebabkan timbulnya pemogokan dengan
                                mempertemukan dan merundingkannya dengan para
                                pihak yang berselisih.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal perundingan sebagaimana dimaksud dalam
                                ayat (2) menghasilkan kesepakatan, maka harus
                                dibuatkan perjanjian bersama yang ditandatangani
                                oleh para pihak dan pegawai dari instansi yang
                                bertanggung jawab di bidang ketenagakerjaan
                                sebagai saksi.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal perundingan sebagaimana dimaksud dalam
                                ayat (2) tidak menghasilkan kesepakatan, maka
                                pegawai dari instansi yang bertanggung jawab di
                                bidang ketenagakerjaan segera menyerahkan
                                masalah yang menyebabkan terjadinya mogok kerja
                                kepada lembaga penyelesaian perselisihan
                                hubungan industrial yang berwenang.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal perundingan tidak menghasilkan
                                kesepakatan sebagaimana dimaksud dalam ayat (4),
                                maka atas dasar perundingan antara pengusaha
                                dengan serikat pekerja/serikat buruh atau
                                penanggung jawab mogok kerja, mogok kerja dapat
                                diteruskan atau dihentikan untuk sementara atau
                                dihentikan sama sekali.
                    - _type: pasal
                      _key: 142
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Mogok kerja yang dilakukan tidak memenuhi
                                ketentuan sebagaimana dimaksud dalam Pasal 139
                                dan Pa-sal 140 adalah mogok kerja tidak sah.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Akibat hukum dari mogok kerja yang tidak sah
                                sebagaimana dimaksud dalam ayat (1) akan diatur
                                dengan Keputusan Menteri.
                    - _type: pasal
                      _key: 143
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Siapapun tidak dapat menghalang-halangi
                                pekerja/buruh dan serikat pekerja/serikat buruh
                                untuk mengguna kan hak mogok kerja yang
                                dilakukan secara sah, tertib, dan damai.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Siapapun dilarang melakukan penangkapan dan/atau
                                penahanan terhadap pekerja/buruh dan pengurus
                                serikat pekerja/serikat buruh yang melakukan
                                mogok kerja secara sah, tertib, dan damai sesuai
                                dengan peraturan perundang-undangan yang
                                berlaku.
                    - _type: pasal
                      _key: 144
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            Terhadap mogok kerja yang dilakukan sesuai dengan
                            ketentuan sebagaimana dimaksud dalam Pasal 140,
                            pengusaha dilarang :
                        isi:
                          - _type: alphaPoint
                            _key: a
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                mengganti pekerja/buruh yang mogok kerja dengan
                                pekerja/buruh lain dari luar perusahaan, atau
                          - _type: alphaPoint
                            _key: b
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                memberikan sanksi atau tindakan balasan dalam
                                bentuk apapun kepada pekerja/buruh dan pengurus
                                serikat pekerja/serikat buruh selama dan sesudah
                                melakukan mogok kerja.
                    - _type: pasal
                      _key: 145
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Dalam hal pekerja/buruh yang melakukan mogok kerja
                          secara sah dalam melakukan tuntutan hak normatif yang
                          sungguh-sungguh dilanggar oleh pengusaha,
                          pekerja/buruh berhak mendapatkan upah.
              - _type: paragraf
                _key: 3
                _judul: Paragraf 3 Penutupan Perusahaan (lock-out)
                isi:
                  _type: pasals
                  pasals:
                    - _type: pasal
                      _key: 146
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Penutupan perusahaan (lock out) merupakan hak
                                dasar pengusaha untuk menolak pekerja/buruh
                                sebagian atau seluruhnya untuk menjalankan
                                pekerjaan sebagai akibat gagalnya perundingan.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pengusaha tidak dibenarkan melakukan penutupan
                                perusahaan (lock out) sebagai tindakan balasan
                                sehubungan adanya tuntutan normatif dari
                                pekerja/buruh dan/atau serikat pekerja/serikat
                                buruh.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Tindakan penutupan perusahaan (lock out) harus
                                dilakukan sesuai dengan ketentuan hukum yang
                                berlaku.
                    - _type: pasal
                      _key: 147
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          Penutupan perusahaan (lock out) dilarang dilakukan
                          pada perusahaan- perusahaan yang melayani kepentingan
                          umum dan/atau jenis kegiatan yang membahayakan
                          keselamatan jiwa manusia, meliputi rumah sakit,
                          pelayanan jaringan air bersih, pusat pengendali
                          telekomunikasi, pusat penyedia tenaga listrik,
                          pengolahan minyak dan gas bumi, serta kereta api.
                    - _type: pasal
                      _key: 148
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pengusaha wajib memberitahukan secara tertulis
                                kepada pekerja/buruh dan/atau serikat
                                pekerja/serikat buruh, serta instansi yang
                                bertanggung jawab di bidang ketenagakerjaan
                                setempat sekurang-kurangnya 7 (tujuh) hari kerja
                                sebelum penutupan perusahaan (lock out)
                                dilaksanakan.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Pemberitahuan sebagaimana dimaksud dalam ayat
                                  (1) sekurang-kurangnya memuat :
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      waktu (hari, tanggal, dan jam) dimulai dan
                                      diakhiri penutupan perusahaan (lock out),
                                      dan
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      alasan dan sebab-sebab melakukan penutupan
                                      perusahaan (lock out).
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pemberitahuan sebagaimana dimaksud dalam ayat
                                (1) ditandatangani oleh pengusaha dan/atau
                                pimpinan perusahaan yang bersangkutan.
                    - _type: pasal
                      _key: 149
                      isi:
                        _type: ayats
                        ayats:
                          - _type: ayat
                            _key: 1
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Pekerja/buruh atau serikat pekerja/serikat buruh
                                dan instansi yang bertanggung jawab di bidang
                                ketenaga-kerjaan yang menerima secara langsung
                                surat pemberitahuan penutupan perusahaan (lock
                                out) sebagaimana dimaksud dalam Pasal 148 harus
                                memberikan tanda bukti penerimaan dengan
                                mencantumkan hari, tanggal, dan jam penerimaan.
                          - _type: ayat
                            _key: 2
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Sebelum dan selama penutupan perusahaan (lock
                                out) berlangsung, instansi yang bertanggung
                                jawab di bidang ketenagakerjaan berwenang
                                langsung menyelesaikan masalah yang menyebabkan
                                timbulnya penutupan perusahaan (lock out) dengan
                                mempertemukan dan merundingkannya dengan para
                                pihak yang berselisih.
                          - _type: ayat
                            _key: 3
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal perundingan sebagaimana dimaksud dalam
                                ayat (2) menghasilkan kesepakatan, maka harus
                                dibuat perjanjian bersama yang ditandatangani
                                oleh para pihak dan pegawai dari instansi yang
                                bertanggung jawab di bidang ketenagakerjaan
                                sebagai saksi.
                          - _type: ayat
                            _key: 4
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Dalam hal perundingan sebagaimana dimaksud dalam
                                ayat (2) tidak menghasilkan kesepakatan, maka
                                pegawai dari instansi yang bertanggung jawab di
                                bidang ketenagakerjaan segera menyerahkan
                                masalah yang menyebabkan terjadinya penutupan
                                perusahaan (lock out) kepada lembaga
                                penyelesaian perselisihan hubungan industrial.
                          - _type: ayat
                            _key: 5
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                Apabila perundingan tidak menghasilkan
                                kesepakatan sebagaimana dimaksud dalam ayat (4),
                                maka atas dasar perundingan antara pengusaha dan
                                serikat pekerja/serikat buruh, penutupan
                                perusahaan (lock out) dapat diteruskan atau
                                dihentikan untuk sementara atau dihentikan sama
                                sekali.
                          - _type: ayat
                            _key: 6
                            isi:
                              _type: points
                              _description:
                                _type: referenceText
                                references: []
                                text: >-
                                  Pemberitahuan sebagaimana dimaksud dalam Pasal
                                  148 ayat (1) dan ayat (2) tidak diperlukan
                                  apabila :
                              isi:
                                - _type: alphaPoint
                                  _key: a
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      pekerja/buruh atau serikat pekerja/serikat
                                      buruh melanggar prosedur mogok kerja
                                      sebagaimana dimaksud dalam Pasal 140,
                                - _type: alphaPoint
                                  _key: b
                                  isi:
                                    _type: referenceText
                                    references: []
                                    text: >-
                                      pekerja/buruh atau serikat pekerja/serikat
                                      buruh melanggar ketentuan normatif yang
                                      ditentukan dalam perjanjian kerja,
                                      peraturan perusahaan, perjanjian kerja
                                      bersama, atau peraturan perundang-undangan
                                      yang berlaku.
  - _type: bab
    _key: 12
    _judul: PEMUTUSAN HUBUNGAN KERJA
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 150
          isi:
            _type: referenceText
            references: []
            text: >-
              Ketentuan mengenai pemutusan hubungan kerja dalam undang-undang
              ini meliputi pemutusan hubungan kerja yang terjadi di badan usaha
              yang berbadan hukum atau tidak, milik orang perseorangan, milik
              persekutuan atau milik badan hukum, baik milik swasta maupun milik
              negara, maupun usaha-usaha sosial dan usaha-usaha lain yang
              mempunyai pengurus dan mempekerjakan orang lain dengan membayar
              upah atau imbalan dalam bentuk lain.
        - _type: pasal
          _key: 151
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha, pekerja/buruh, serikat pekerja/serikat buruh, dan
                    pemerintah, dengan segala upaya harus mengusahakan agar
                    jangan terjadi pemutusan hubungan kerja.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal segala upaya telah dilakukan, tetapi pemutusan
                    hubungan kerja tidak dapat dihindari, maka maksud pemutusan
                    hubungan kerja wajib dirundingkan oleh pengusaha dan serikat
                    pekerja/serikat buruh atau dengan pekerja/buruh apabila
                    pekerja/buruh yang bersangkutan tidak menjadi anggota
                    serikat pekerja/serikat buruh.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal perundingan sebagaimana dimaksud dalam ayat (2)
                    benar-benar tidak menghasilkan persetu-juan, pengusaha hanya
                    dapat memutuskan hubungan kerja dengan pekerja/buruh setelah
                    memperoleh penetapan dari lembaga penyelesaian perselisihan
                    hubungan industrial.
        - _type: pasal
          _key: 152
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Permohonan penetapan pemutusan hubungan kerja diajukan
                    secara tertulis kepada lembaga penyelesaian perselisihan
                    hubungan industrial disertai alasan yang menjadi dasarnya.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Permohonan penetapan sebagaimana dimaksud dalam ayat (1)
                    dapat diterima oleh lembaga penyelesaian perselisihan
                    hubungan industrial apabila telah dirundangkan sebagaimana
                    dimaksud dalam Pasal 151 ayat 2).
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Penetapan atas permohonan pemutusan hubungan kerja hanya
                    dapat diberikan oleh lembaga penyelesaian perselisihan
                    hubungan industrial jika ternyata maksud untuk memutuskan
                    hubungan kerja telah dirundingkan, tetapi perundingan
                    tersebut tidak menghasilkan kesepakatan.
        - _type: pasal
          _key: 153
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Pengusaha dilarang melakukan pemutusan hubungan kerja
                      dengan alasan :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerja/buruh berhalangan masuk kerja karena sakit
                          menurut keterangan dokter selama waktu tidak melampaui
                          12 (dua belas) bulan secara terus-menerus,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerja/buruh berhalangan menjalankan pekerjaannya
                          karena memenuhi kewajiban terhadap negara sesuai
                          dengan ketentuan peraturan perundang-undangan yang
                          berlaku,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerja/buruh menjalankan ibadah yang diperintahkan
                          agamanya,
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: pekerja/buruh menikah,
                    - _type: alphaPoint
                      _key: e
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerja/buruh perempuan hamil, melahirkan, gugur
                          kandungan, atau menyusui bayinya,
                    - _type: alphaPoint
                      _key: f
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerja/buruh mempunyai pertalian darah dan/atau
                          ikatan perkawinan dengan pekerja/buruh lainnya di
                          dalam satu perusahaan, kecuali telah diatur dalam
                          perjanjian kerja, peraturan perusahan, atau perjanjian
                          kerja bersama,
                    - _type: alphaPoint
                      _key: g
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerja/buruh mendirikan, menjadi anggota dan/atau
                          pengurus serikat pekerja/serikat buruh, pekerja/buruh
                          melakukan kegiatan serikat pekerja/serikat buruh di
                          luar jam kerja, atau di dalam jam kerja atas
                          kesepakatan pengusaha, atau berdasarkan ketentuan yang
                          diatur dalam perjanjian kerja, peraturan perusahaan,
                          atau perjanjian kerja bersama,
                    - _type: alphaPoint
                      _key: h
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerja/buruh yang mengadukan pengusaha kepada yang
                          berwajib mengenai perbuatan pengusaha yang melakukan
                          tindak pidana kejahatan,
                    - _type: alphaPoint
                      _key: i
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          karena perbedaan paham, agama, aliran politik, suku,
                          warna kulit, golongan, jenis kelamin, kondisi fisik,
                          atau status perkawinan,
                    - _type: alphaPoint
                      _key: j
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          pekerja/buruh dalam keadaan cacat tetap, sakit akibat
                          kecelakaan kerja, atau sakit karena hubungan kerja
                          yang menurut surat keterangan dokter yang jangka waktu
                          penyembuhannya belum dapat dipastikan.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemutusan hubungan kerja yang dilakukan dengan alasan
                    sebagaimana dimaksud dalam ayat (1) batal demi hukum dan
                    pengusaha wajib mempekerjakan kembali pekerja/buruh yang
                    bersangkutan.
        - _type: pasal
          _key: 154
          isi:
            _type: points
            _description:
              _type: referenceText
              references: []
              text: >-
                Penetapan sebagaimana dimaksud dalam Pasal 151 ayat (3) tidak
                diperlukan dalam hal :
            isi:
              - _type: alphaPoint
                _key: a
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    pekerja/buruh masih dalam masa percobaan kerja, bilamana
                    telah dipersyaratkan secara tertulis sebelumnya,
              - _type: alphaPoint
                _key: b
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    pekerja/buruh mengajukan permintaan pengunduran diri, secara
                    tertulis atas kemauan sendiri tanpa ada indikasi adanya
                    tekanan/intimidasi dari pengusaha, berakhirnya hubungan
                    kerja sesuai dengan perjanjian kerja waktu tertentu untuk
                    pertama kali,
              - _type: alphaPoint
                _key: c
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    pekerja/buruh mencapai usia pensiun sesuai dengan ketetapan
                    dalam perjanjian kerja, peraturan perusahaan, perjanjian
                    kerja bersama, atau peraturan perundang-undangan, atau
              - _type: alphaPoint
                _key: d
                isi:
                  _type: referenceText
                  references: []
                  text: pekerja/buruh meninggal dunia.
        - _type: pasal
          _key: 155
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemutusan hubungan kerja tanpa penetapan sebagaimana
                    dimaksud dalam Pasal 151 ayat (3) batal demi hukum.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Selama putusan lembaga penyelesaian perselisihan hubungan
                    industrial belum ditetapkan, baik pengusaha maupun
                    pekerja/buruh harus tetap melaksanakan segala kewajibannya.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha dapat melakukan penyimpangan terhadap ketentuan
                    sebagaimana dimaksud dalam ayat (2) berupa tindakan skorsing
                    kepada pekerja/buruh yang sedang dalam proses pemutusan
                    hubungan kerja dengan tetap wajib membayar upah beserta
                    hak-hak lainnya yang biasa diterima pekerja/buruh.
        - _type: pasal
          _key: 156
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal terjadi pemutusan hubungan kerja, pengusaha
                    diwajibkan membayar uang pesangon dan atau uang penghargaan
                    masa kerja dan uang penggantian hak yang seharusnya
                    diterima.
              - _type: ayat
                _key: 2
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Perhitungan uang pesangon sebagaimana dimaksud dalam ayat
                      (1) paling sedikit sebagai berikut :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja kurang dari 1 (satu) tahun, 1 (satu) bulan
                          upah:
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 1 (satu) tahun atau lebih tetapi kurang
                          dari 2 (dua) tahun, 2 (dua) bulan upah,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 2 (dua) tahun atau lebih tetapi kurang dari
                          3 (tiga) tahun, 3 (tiga) bulan upah,
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 3 (tiga) tahun atau lebih tetapi kurang
                          dari 4 (empat) tahun, 4 (empat) bulan upah,
                    - _type: alphaPoint
                      _key: e
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 4 (empat) tahun atau lebih tetapi kurang
                          dari 5 (lima) tahun, 5 (lima) bulan upah,
                    - _type: alphaPoint
                      _key: f
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 5 (lima) tahun atau lebih, tetapi kurang
                          dari 6 (enam) tahun, 6 (enam) bulan upah:
                    - _type: alphaPoint
                      _key: g
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 6 (enam) tahun atau lebih tetapi kurang
                          dari 7 (tujuh) tahun, 7 (tujuh) bulan upah.
                    - _type: alphaPoint
                      _key: h
                      isi:
                        _type: points
                        _description:
                          _type: referenceText
                          references: []
                          text: >-
                            masa kerja 7 (tujuh) tahun atau lebih tetapi kurang
                            dari 8 (delapan) tahun, 8 (delapan) bulan upah,
                        isi:
                          - _type: numPoint
                            _key: '1'
                            isi:
                              _type: referenceText
                              references: []
                              text: >-
                                masa kerja 8 (delapan) tahun atau lebih, 9
                                (sembilan) bulan upah.
              - _type: ayat
                _key: 3
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Perhitungan uang penghargaan masa kerja sebagaimana
                      dimaksud dalam ayat (1) ditetapkan sebagai be-rikut :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 3 (tiga) tahun atau lebih tetapi kurang
                          dari 6 (enam) tahun, 2 (dua) bulan upah:
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 6 (enam) tahun atau lebih tetapi kurang
                          dari 9 (sembilan) tahun, 3 (tiga) bulan upah,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 9 (sembilan) tahun atau lebih tetapi kurang
                          dari 12 (dua belas) tahun, 4 (empat) bulan upah,
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 12 (dua belas) tahun atau lebih tetapi
                          kurang dari 15 lima belas) tahun, 5 (lima) bulan upah,
                    - _type: alphaPoint
                      _key: e
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 15 (lima belas) tahun atau lebih tetapi
                          kurang dari 18 (delapan belas) tahun, 6 (enam) bulan
                          upah,
                    - _type: alphaPoint
                      _key: f
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 18 (delapan belas) tahun atau lebih tetapi
                          kurang dari 21 (dua puluh satu) tahun, 7 (tujuh) bulan
                          upah:
                    - _type: alphaPoint
                      _key: g
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 21 (dua puluh satu) tahun atau lebih tetapi
                          kurang dari 24 (dua puluh empat) tahun, 8 (delapan)
                          bulan upah,
                    - _type: alphaPoint
                      _key: h
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          masa kerja 24 (dua puluh empat) tahun atau lebih, 10
                          (sepuluh ) bulan upah.
              - _type: ayat
                _key: 4
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Uang penggantian hak yang seharusnya diterima sebagaimana
                      dimaksud dalam ayat (1) meliputi :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: cuti tahunan yang belum diambil dan belum gugur,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          biaya atau ongkos pulang untuk pekerja/buruh dan
                          keluarganya ketempat dimana pekerja/buruh diterima
                          bekerja,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          . penggantian perumahan serta pengobatan dan perawatan
                          ditetapkan 1590 (lima belas perseratus) dari uang
                          pesangon dan/atau uang penghargaan masa kerja bagi
                          yang memenuhi syarat,
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          hal-hal lain yang ditetapkan dalam perjanjian kerja,
                          peraturan perusahaan atau perjanjian kerja bersama.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Perubahan perhitungan uang pesangon, perhitungan uang
                    penghargaan masa kerja, dan uang penggantian hak sebagaimana
                    dimaksud dalam ayat (2), ayat (3), dan ayat (4) ditetapkan
                    dengan Peraturan Pemerintah.
        - _type: pasal
          _key: 157
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Komponen upah yang digunakan sebagai dasar perhitungan
                      uang pesangon, uang penghargaan masa kerja, dan uang
                      pengganti hak yang seharusnya diterima yang tertunda,
                      terdiri atas :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: upah pokok,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          segala macam bentuk tunjangan yang bersifat tetap yang
                          diberikan kepada pekerja/buruh dan keluarganya,
                          termasuk harga pembelian dari catu yang diberikan
                          kepada pekerja/buruh secara cuma-cuma, yang apabila
                          catu harus dibayar pekerja/buruh dengan subsidi, maka
                          sebagai upah dianggap selisih antara harga pembelian
                          dengan harga yang harus dibayar oleh pekerja/buruh.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal penghasilan pekerja/buruh dibayarkan atas dasar
                    perhitungan harian, maka penghasilan sebulan adalah sama
                    dengan 30 kali penghasilan sehari.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal upah pekerja/buruh dibayarkan atas dasar
                    perhitungan satuan hasil, potongan/borongan atau komisi,
                    maka penghasilan sehari adalah sama dengan pendapatan
                    rata-rata per hari selama 12 (dua belas) bulan terakhir,
                    dengan ketentuan tidak boleh kurang dari ketentuan upah
                    minimum provinsi atau kabupaten/kota.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal pekerjaan tergantung pada keadaan cuaca dan
                    upahnya didasarkan pada upah borongan, maka perhitungan upah
                    sebulan dihitung dari upah rata-rata 12 (dua belas) bulan
                    terakhir.
        - _type: pasal
          _key: 158
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Pengusaha dapat memutuskan hubungan kerja terhadap
                      pekerja/buruh dengan alasan pekerja/buruh telah melakukan
                      kesalahan berat sebagai berikut :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          melakukan penipuan, pencurian, atau penggelapan barang
                          dan/atau uang milik perusahaan,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          memberikan keterangan palsu atau yang dipalsukan
                          sehingga merugikan perusahaan,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          mabuk, meminum minuman keras yang memabukkan, memakai
                          dan/atau mengedarkan narkotika, psikotropika, dan zat
                          adiktif lainnya di lingkungan kerja,
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          melakukan perbuatan asusila atau perjudian di
                          lingkungan kerja,
                    - _type: alphaPoint
                      _key: e
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          menyerang, menganiaya, mengancam, atau mengintimidasi
                          teman sekerja atau pengusaha di lingkungan kerja,
                    - _type: alphaPoint
                      _key: f
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          membujuk teman sekerja atau pengusaha untuk melakukan
                          perbuatan yang bertentangan dengan peraturan
                          perundang-undangan,
                    - _type: alphaPoint
                      _key: g
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          dengan ceroboh atau sengaja merusak atau membiarkan
                          dalam keadaan bahaya barang milik perusahaan yang
                          menimbulkan kerugian bagi perusahaan,
                    - _type: alphaPoint
                      _key: h
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          dengan ceroboh atau sengaja membiarkan teman sekerja
                          atau pengusaha dalam keadaan bahaya di tempat kerja,
                    - _type: alphaPoint
                      _key: i
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          membongkar atau membocorkan rahasia perusahaan yang
                          seharusnya dirahasiakan kecuali untuk kepentingan
                          negara, atau
                    - _type: alphaPoint
                      _key: j
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          . melakukan perbuatan lainnya di lingkungan perusahaan
                          yang diancam pidana penjara 5 (lima) tahun atau lebih.
              - _type: ayat
                _key: 2
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Kesalahan berat sebagaimana dimaksud dalam ayat (1) harus
                      didukung dengan bukti sebagai berikut :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: pekerja/buruh tertangkap tangan,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          ada pengakuan dari pekerja/buruh yang bersangkutan,
                          atau
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          bukti lain berupa laporan kejadian yang dibuat oleh
                          pihak yang berwenang di perusahaan yang bersangkutan
                          dan didukung oleh sekurang-kurangnya 2 (dua) orang
                          saksi.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pekerja/buruh yang diputus hubungan kerjanya berdasarkan
                    alasan sebagaimana dimaksud dalam ayat (1), dapat memperoleh
                    uang penggantian hak sebagaimana dimaksud dalam Pasal 156
                    ayat (4).
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Bagi pekerja/buruh sebagaimana dimaksud dalam ayat (1) yang
                    tugas dan fungsinya tidak mewakili kepentingan pengusaha
                    secara langsung, selain uang penggantian hak sesuai dengan
                    ketentuan Pasal 156 ayat (4) diberikan uang pisah yang
                    besarnya dan pelaksanaannya diatur dalam perjanjian kerja,
                    peraturan perusahaan, atau perjanjian kerja bersama.
        - _type: pasal
          _key: 159
          isi:
            _type: referenceText
            references: []
            text: >-
              Apabila pekerja/buruh tidak menerima pemutusan hubungan kerja
              sebagaimana dimaksud dalam Pasal 158 ayat (1), pekerja/buruh yang
              bersangkutan dapat mengajukan gugatan ke lembaga penyelesaian
              perselisihan hubungan industrial.
        - _type: pasal
          _key: 160
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Dalam hal pekerja/buruh ditahan pihak yang berwajib karena
                      diduga melakukan tindak pidana bukan atas pengaduan
                      pengusaha, maka pengusaha tidak wajib membayar upah tetapi
                      wajib memberikan bantuan kepada keluarga pekerja/buruh
                      yang menjadi tanggungannya dengan ketentuan sebagai
                      berikut :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          untuk 1 (satu) orang tanggungan : 256 (dua puluh lima
                          perseratus) dari upah,
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          untuk 2 (dua) orang tanggungan : 3596 (tiga puluh lima
                          perseratus) dari upah,
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          untuk 3 (tiga) orang tanggungan : 4596 (empat puluh
                          lima perseratus) dari upah,
                    - _type: alphaPoint
                      _key: d
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          untuk 4 (empat) orang tanggungan atau lebih : 5090
                          (lima puluh perseratus) dari upah.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Bantuan sebagaimana dimaksud dalam ayat (1) diberikan untuk
                    paling lama 6 (enam) bulan takwin ter-hitung sejak hari
                    pertama pekerja/buruh ditahan oleh pihak yang berwajib.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha dapat melakukan pemutusan hubungan kerja terhadap
                    pekerja/buruh yang setelah 6 (enam) bulan tidak dapat
                    melakukan pekerjaan sebagaimana mestinya karena dalam proses
                    perkara pidana sebagaimana dimaksud dalam ayat (1).
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal pengadilan memutuskan perkara pidana sebelum masa
                    6 (enam) bulan sebagaimana dimaksud dalam ayat (3) berakhir
                    dan pekerja/buruh dinyatakan tidak bersalah, maka pengusaha
                    wajib mempekerjakan pekerja/buruh kembali.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal pengadilan memutuskan perkara pidana sebelum masa
                    6 (enam) bulan berakhir dan pekerja/ buruh dinyatakan
                    bersalah, maka pengusaha dapat melakukan pemutusan hubungan
                    kerja kepada pekerja/buruh yang bersangkutan.
              - _type: ayat
                _key: 6
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemutusan hubungan kerja sebagaimana dimaksud dalam ayat (3)
                    dan ayat (5) dilakukan tanpa penetapan lembaga penyelesaian
                    perselisihan hubungan industrial.
              - _type: ayat
                _key: 7
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha wajib membayar kepada pekerja/buruh yang mengalami
                    pemutusan hubungan kerja sebagai-mana dimaksud dalam ayat
                    (3) dan ayat (5), uang penghargaan masa kerja 1 (satu) kali
                    ketentuan Pasal 156 ayat (3) dan uang penggantian hak sesuai
                    ketentuan dalam Pasal 156 ayat 4.
        - _type: pasal
          _key: 161
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal pekerja/buruh melakukan pelanggaran ketentuan yang
                    diatur dalam perjanjian kerja, peraturan perusahaan atau
                    perjanjian kerja bersama, pengusaha dapat melakukan
                    pemutusan hubungan kerja, setelah kepada pekerja/buruh yang
                    bersangkutan diberikan surat peringatan pertama, kedua, dan
                    ketiga secara berturut-turut.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Surat peringatan sebagaimana dimaksud dalam ayat (1)
                    masing-masing berlaku untuk paling lama 6 (enam) bulan,
                    kecuali ditetapkan lain dalam perjanjian kerja, peraturan
                    perusahaan atau perjanjian kerja bersama.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pekerja/buruh yang mengalami pemutusan hubungan kerja dengan
                    alasan sebagaimana dimaksud dalam ayat (1) memperoleh uang
                    pesangon sebesar 1 (satu) kali ketentuan Pasal 156 ayat (2),
                    uang penghargaan masa kerja sebesar 1 (satu) kali ketentuan
                    Pasal 156 ayat (3) dan uang penggantian hak sesuai ketentuan
                    Pasal 156 ayat (4).
        - _type: pasal
          _key: 162
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pekerja/buruh yang mengundurkan diri atas kemauan sendiri,
                    memperoleh uang penggantian hak sesuai ketentuan Pasal 156
                    ayat (4).
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Bagi pekerja/buruh yang mengundurkan diri atas kemauan
                    sendiri, yang tugas dan fungsinya tidak me-wakili
                    kepentingan pengusaha secara langsung, selain menerima uang
                    penggantian hak sesuai ketentuan Pasal 156 ayat (4)
                    diberikan uang pisah yang besarnya dan pelaksanaannya diatur
                    dalam perjanjian kerja, peraturan perusahaan atau perjanjian
                    kerja bersama.
              - _type: ayat
                _key: 3
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Pekerja/buruh yang mengundurkan diri sebagaimana dimaksud
                      dalam ayat (1) harus memenuhi syarat :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          mengajukan permohonan pengunduran diri secara tertulis
                          selambat- lambatnya 30 (tiga puluh) hari sebelum
                          tanggal mulai pengunduran diri:
                    - _type: alphaPoint
                      _key: b
                      isi:
                        _type: referenceText
                        references: []
                        text: 'tidak terikat dalam ikatan dinas: dan'
                    - _type: alphaPoint
                      _key: c
                      isi:
                        _type: referenceText
                        references: []
                        text: >-
                          tetap melaksanakan kewajibannya sampai tanggal mulai
                          pengunduran diri.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemutusan hubungan kerja dengan alasan pengunduran diri atas
                    kemauan sendiri dilakukan tanpa pene-tapan lembaga
                    penyelesaian perselisihan hubungan industrial.
        - _type: pasal
          _key: 163
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha dapat melakukan pemutusan hubungan kerja terhadap
                    pekerja/buruh dalam hal terjadi peru-bahan status,
                    penggabungan, peleburan, atau perubahan kepemilikan
                    perusahaan dan pekerja/buruh tidak bersedia melanjutkan
                    hubungan kerja, maka pekerja/buruh berhak atas uang pesangon
                    sebesar 1 (satu) kali sesuai ketentuan Pasal 156 ayat (2),
                    uang perhargaan masa kerja 1 (satu) kali ketentuan Pasal 156
                    ayat (3) dan uang penggantian hak sesuai ketentuan dalam
                    Pasal 156 ayat (4).
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha dapat melakukan pemutusan hubungan kerja terhadap
                    pekerja/buruh karena perubahan status, penggabungan, atau
                    peleburan perusahaan, dan pengusaha tidak bersedia menerima
                    pekerja/buruh di perusahaannya, maka pekerja/buruh berhak
                    atas uang pesangon sebesar 2 (dua) kali ketentuan Pasal 156
                    ayat (2), uang penghargaan masa kerja 1 (satu) kali
                    ketentuan dalam Pasal 156 ayat (3), dan uang penggantian hak
                    sesuai ketentuan dalam Pasal 156 ayat (4).
        - _type: pasal
          _key: 164
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha dapat melakukan pemutusan hubungan kerja terhadap
                    pekerja/buruh karena perusahaan tutup yang disebabkan
                    perusahaan mengalami kerugian secara terus menerus selama 2
                    (dua) tahun, atau keadaan memaksa (force majeur), dengan
                    ketentuan pekerja/buruh berhak atas uang pesangon sebesar 1
                    (satu) kali ketentuan Pasal 156 ayat (2) uang penghargaan
                    masa kerja sebesar 1 (satu) kali ketentuan Pasal 156 ayat
                    (3) dan uang penggantian hak sesuai ketentuan Pasal 156 ayat
                    (4).
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Kerugian perusahaan sebagaimana dimaksud dalam ayat (1)
                    harus dibuktikan dengan laporan keuangan 2 (dua) tahun
                    terakhir yang telah diaudit oleh akuntan publik.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha dapat melakukan pemutusan hubungan kerja terhadap
                    pekerja/buruh karena perusahaan tutup bukan karena mengalami
                    kerugian 2 (dua) tahun berturut-turut atau bukan karena
                    keadaan memaksa (force majeur) tetapi perusahaan melakukan
                    efisiensi, dengan ketentuan pekerja/buruh berhak atas uang
                    pesangon sebesar 2 (dua) kali ketentuan Pasal 156 ayat (2),
                    uang penghargaan masa kerja sebesar 1 (satu) kali ketentuan
                    Pasal 156 ayat (3) dan uang penggantian hak sesuai ketentuan
                    Pasal 156 ayat (4).
        - _type: pasal
          _key: 165
          isi:
            _type: referenceText
            references: []
            text: >-
              Pengusaha dapat melakukan pemutusan hubungan kerja terhadap
              pekerja/ buruh karena perusahaan pailit, dengan ketentuan
              pekerja/buruh berhak atas uang pesangon sebesar 1 (satu) kali
              ketentuan Pasal 156 ayat (2), uang penghargaan masa kerja sebesar
              1 (satu) kali ketentuan Pasal 156 ayat (3) dan uang penggantian
              hak sesuai ketentuan Pasal 156 ayat (4).
        - _type: pasal
          _key: 166
          isi:
            _type: referenceText
            references: []
            text: >-
              Dalam hal hubungan kerja berakhir karena pekerja/buruh meninggal
              dunia, kepada ahli warisnya diberikan sejumlah uang yang besar
              perhitungannya sama dengan perhitungan 2 (dua) kali uang pesangon
              sesuai ketentuan Pasal 156 ayat (2), 1 (satu) kali uang
              penghargaan masa kerja sesuai ketentuan Pasal 156 ayat (3), dan
              uang penggantian hak sesuai ketentuan Pasal 156 ayat (4).
        - _type: pasal
          _key: 167
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha dapat melakukan pemutusan hubungan kerja terhadap
                    pekerja/buruh karena memasuki usia pensiun dan apabila
                    pengusaha telah mengikutkan pekerja/buruh pada program
                    pensiun yang iurannya dibayar penuh oleh pengusaha, maka
                    pekerja/buruh tidak berhak mendapatkan uang pesangon sesuai
                    ketentuan Pasal 156 ayat (2), uang penghargaan masa kerja
                    sesuai ketentuan Pasal 156 ayat (3), tetapi tetap berhak
                    atas uang penggantian hak sesuai ketentuan Pasal 156 ayat
                    (4).
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal besarnya jaminan atau manfaat pensiun yang
                    diterima sekaligus dalam program pensiun se-bagaimana
                    dimaksud dalam ayat (1) ternyata lebih kecil daripada jumlah
                    uang pesangon 2 (dua) kali ketentuan Pasal 156 ayat (2) dan
                    uang penghargaan masa kerja 1 (satu) kali ketentuan Pasal
                    156 ayat (3), dan uang penggantian hak sesuai ketentuan
                    Pasal 156 ayat (4), maka selisihnya dibayar oleh pengusaha.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal pengusaha telah mengikutsertakan pekerja/buruh
                    dalam program pensiun yang iurannya/premi-nya dibayar oleh
                    pengusaha dan pekerja/buruh, maka yang diperhitungkan dengan
                    uang pesangon yaitu uang pensiun yang premi/iurannya dibayar
                    oleh pengusaha.
              - _type: ayat
                _key: 4
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Ketentuan sebagaimana dimaksud dalam ayat (1), ayat (2), dan
                    ayat (3) dapat diatur lain dalam perjanjian kerja, peraturan
                    perusahaan, atau perjanjian kerja bersama.
              - _type: ayat
                _key: 5
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal pengusaha tidak mengikutsertakan pekerja/buruh
                    yang mengalami pemutusan hubungan kerja karena usia pensiun
                    pada program pensiun maka pengusaha wajib memberikan kepada
                    pekerja/buruh uang pesangon sebesar 2 (dua) kali ketentuan
                    Pasal 156 ayat (2), uang penghargaan masa kerja 1 (satu)
                    kali ketentuan Pasal 156 ayat (3) dan uang penggantian hak
                    sesuai ketentuan Pasal 156 ayat (4).
              - _type: ayat
                _key: 6
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Hak atas manfaat pensiun sebagaimana yang dimaksud dalam
                    ayat (1), ayat (2), ayat (3), dan ayat (4) ti-dak
                    menghilangkan hak pekerja/buruh atas jaminan hari tua yang
                    bersifat wajib sesuai dengan peraturan perundang-undangan
                    yang berlaku.
        - _type: pasal
          _key: 168
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pekerja/buruh yang mangkir selama 5 (lima) hari kerja atau
                    lebih berturut- turut tanpa keterangan secara ter tulis yang
                    dilengkapi dengan bukti yang sah dan telah dipanggil oleh
                    pengusaha 2 (dua) kali secara patut dan tertulis dapat
                    diputus hubungan kerjanya karena dikualifikasikan
                    mengundurkan diri.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Keterangan tertulis dengan bukti yang sah sebagaimana
                    dimaksud dalam ayat (1) harus diserahkan paling lambat pada
                    hari pertama pekerja/buruh masuk bekerja.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pemutusan hubungan kerja sebagaimana dimaksud dalam ayat (1)
                    pekerja/buruh yang bersangkutan berhak menerima uang
                    penggantian hak sesuai ketentuan Pasal 156 ayat (4) dan
                    diberikan uang pisah yang besarnya dan pelaksanaannya diatur
                    dalam perjanjian kerja, peraturan perusahaan, atau
                    perjanjian kerja bersama.
        - _type: pasal
          _key: 169
          isi:
            _type: ayats
            ayats:
              - _type: ayat
                _key: 1
                isi:
                  _type: points
                  _description:
                    _type: referenceText
                    references: []
                    text: >-
                      Pekerja/buruh dapat mengajukan permohonan pemutusan
                      hubungan kerja kepada lembaga penyelesaian perselisihan
                      hubungan industrial dalam hal pengusaha melakukan
                      perbuatan sebagai berikut :
                  isi:
                    - _type: alphaPoint
                      _key: a
                      isi:
                        _type: referenceText
