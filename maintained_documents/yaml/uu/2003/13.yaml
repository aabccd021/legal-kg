                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Pengusaha dapat memutuskan hubungan kerja terhadap
                    pekerja/buruh dengan alasan pekerja/buruh telah melakukan
                    kesalahan berat sebagai berikut : a. melakukan penipuan,
                    pencurian, atau penggelapan barang dan/atau uang milik
                    perusahaan, b. memberikan keterangan palsu atau yang
                    dipalsukan sehingga merugikan perusahaan, c. mabuk, meminum
                    minuman keras yang memabukkan, memakai dan/atau mengedarkan
                    narkotika, psikotropika, dan zat adiktif lainnya di
                    lingkungan kerja, d. melakukan perbuatan asusila atau
                    perjudian di lingkungan kerja, e. menyerang, menganiaya,
                    mengancam, atau mengintimidasi teman sekerja atau pengusaha
                    di lingkungan kerja, f. membujuk teman sekerja atau
                    pengusaha untuk melakukan perbuatan yang bertentangan dengan
                    peraturan perundang-undangan, g. dengan ceroboh atau sengaja
                    merusak atau membiarkan dalam keadaan bahaya barang milik
                    perusahaan yang menimbulkan kerugian bagi perusahaan, h.
                    dengan ceroboh atau sengaja membiarkan teman sekerja atau
                    pengusaha dalam keadaan bahaya di tempat kerja, i.
                    membongkar atau membocorkan rahasia perusahaan yang
                    seharusnya dirahasiakan kecuali untuk kepentingan negara,
                    atau j-. melakukan perbuatan lainnya di lingkungan
                    perusahaan yang diancam pidana penjara 5 (lima) tahun atau
                    lebih.
