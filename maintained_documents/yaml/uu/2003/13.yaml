  - _type: bab
    _key: 17
    _judul: KETENTUAN PERALIHAN
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 191
          isi:
            _type: referenceText
            references: []
            text: >-
              Semua peraturan pelaksanaan yang mengatur ketenagakerjaan tetap
              berlaku sepanjang tidak bertentangan dan/atau belum diganti dengan
              peraturan yang baru berdasarkan Undang undang ini.
  - _type: bab
    _key: 18
    _judul: KETENTUAN PENUTUP
    isi:
      _type: pasals
      pasals:
        - _type: pasal
          _key: 192
          isi:
            _type: referenceText
            references: []
            text: >-
              Pada saat mulai berlakunya Undang undang ini, maka : 1. Ordonansi
              tentang Pengerahan Orang Indonesia Untuk Melakukan Pekerjaan Di
              Luar Indonesia (Staatsblad Tahun 1887 Nomor 8), 2. Ordonansi
              tanggal 17 Desember 1925 Peraturan tentang Pembatasan Kerja Anak
              Dan Kerja Malam Bagi Wanita (Staatsblad Tahun 1925 Nomor 647), 3.
              Ordonansi Tahun 1926 Peraturan mengenai Kerja Anak anak Dan Orang
              Muda Di Atas Kapal (Staatsblad Tahun 1926 Nomor 87), 4. Ordonansi
              tanggal 4 Mei 1936 tentang Ordonansi untuk Mengatur Kegiatan
              kegiatan Mencari Calon Pekerja (Staatsblad Tahun 1936 Nomor 208):
              5. 5. Ordonansi tentang Pemulangan Buruh Yang Diterima Atau
              Dikerahkan Dari Luar Indonesia (Staatsblad Tahun 1939 Nomor 545),
              6. Ordonansi Nomor 9 Tahun 1949 tentang Pembatasan Kerja Anak anak
              (Staatsblad Tahun 1949 Nomor 8), 7. Undang undang Nomor 1 Tahun
              1951 tentang Pernyataan Berlakunya Undang undang Kerja Tahun 1948
              Nomor 12 Dari Republik Indonesia Untuk Seluruh Indonesia (Lembaran
              Negara Tahun 1951 Nomor 2), 8. Undang undang Nomor 21 Tahun 1954
              tentang Perjanjian Perburuhan Antara Serikat Buruh Dan Majikan
              (Lembaran Negara Tahun 1954 Nomor 69, Tambahan Lembaran Negara
              Nomor 598a), 9. Undang-undang Nomor 3 Tahun 1958 tentang
              Penempatan Tenaga Asing (Lembaran Negara Tahun 1958 Nomor 8 ), 10.
              Undang-undang Nomor 8 Tahun 1961 tentang Wajib Kerja Sarjana
              (Lembaran Negara Tahun 1961 Nomor 207, Tambahan Lembaran Negara
              Nomor 2270), 11. Undang undang Nomor 7 Pnps Tahun 1963 tentang
              Pencegahan Pemogokan dan/atau Penutupan (Lock Out) Di Perusahaan,
              Jawatan, dan Badan Yang Vital (Lembaran Negara Tahun 1963 Nomor
              67), 12. Undang undang Nomor 14 Tahun 1969 tentang Ketentuan
              ketentuan Pokok Mengenai Tenaga Kerja (Lembaran Negara Tahun 1969
              Nomor 55, Tambahan Lembaran Negara Nomor 2912), 13. Undang-undang
              Nomor 25 Tahun 1997 tentang Ketenagakerjaan (Lembaran Negara Tahun
              1997 Nomor 73, Tambahan Lembaran Negara Nomor 3702), 14.
              Undang-undang Nomor 11 Tahun 1998 tentang Perubahan Berlakunya
              Undang-undang Nomor 25 Tahun 1997 tentang Ketenagakerjaan
              (Lembaran Negara Tahun 1998 Nomor 184, Tambahan Lembaran Negara
              Nomor 3791), 15. Undang-undang Nomor 28 Tahun 2000 tentang
              Penetapan Peraturan Pemerintah Pengganti Undang-undang Nomor 3
              Tahun 2000 tentang Perubahan Atas Undang-undang Nomor 11 Tahun
              1998 tentang Perubahan Berlakunya Undang-undang Nomor 25 Tahun
              1997 tentang Ketenaga- kerjaan Menjadi Undang-undang (Lembaran
              Negara Tahun 2000 Nomor 240, Tambahan Lembaran Negara Nomor 4042),
              dinyatakan tidak berlaku lagi.
        - _type: pasal
          _key: 193
          isi:
            _type: referenceText
            references: []
            text: >-
              Undang undang ini mulai berlaku pada tanggal diundangkan. Agar
              setiap orang mengetahuinya, memerintahkan pengundangan undang
              undang ini dengan penempatannya dalam Lembaran Negara Republik
              Indonesia. Disahkan di Jakarta pada tanggal 25 Maret 2003 PRESIDEN
              REPUBLIK INDONESIA, ttd MEGAWATI SOEKARNOPUTRI LEMBARAN NEGARA
              REPUBLIK INDONESIA TAHUN 2003 NOMOR 39
