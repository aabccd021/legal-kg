                                _key: 93
                                parentDocument: *ref_0
                                _structureType: pasal
                              _structureType: ayat
                        text: >-
                          Ketentuan sebagaimana dimaksud dalam ayat (1) tidak
                          berlaku, dan pengusaha wajib membayar upah apabila :
                          a. pekerja/buruh sakit sehingga tidak dapat melakukan
                          pekerjaan, b. pekerja/buruh perempuan yang sakit pada
                          hari pertama dan kedua masa haidnya sehingga tidak
                          dapat melakukan pekerjaan, c. pekerja/buruh tidak
                          masuk bekerja karena pekerja/buruh menikah,
                          menikahkan, mengkhitankan, membaptiskan anaknya,
                          isteri melahirkan atau keguguran kandungan, suami atau
                          isteri atau anak atau menantu atau orang tua atau
                          mertua atau anggota keluarga dalam satu rumah
                          meninggal dunia, d. pekerja/buruh tidak dapat
                          melakukan pekerjaannya karena sedang menjalankan
                          kewajiban terhadap negara, e. pekerja/buruh tidak
                          dapat melakukan pekerjaannya karena menjalan- kan
                          ibadah yang diperintahkan agamanya, f. pekerja/buruh
                          bersedia melakukan pekerjaan yang telah dijanjikan
                          tetapi pengusaha tidak mempekerjakannya, baik karena
                          kesalahan sendiri maupun halangan yang seharusnya
                          dapat dihindari pengusaha, g. pekerja/buruh
                          melaksanakan hak istirahat, h. pekerja/buruh
                          melaksanakan tugas serikat pekerja/serikat buruh atas
                          persetujuan pengusaha, dan 1. pekerja/buruh
                          melaksanakan tugas pendidikan dari perusahaan.
