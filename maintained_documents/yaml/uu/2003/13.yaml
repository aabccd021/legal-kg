                  references: []
                  text: >-
                    Komponen upah yang digunakan sebagai dasar perhitungan uang
                    pesangon, uang penghargaan masa kerja, dan uang pengganti
                    hak yang seharusnya diterima yang tertunda, terdiri atas :
                    a. upah pokok, b. segala macam bentuk tunjangan yang
                    bersifat tetap yang diberikan kepada pekerja/buruh dan
                    keluarganya, termasuk harga pembelian dari catu yang
                    diberikan kepada pekerja/buruh secara cuma-cuma, yang
                    apabila catu harus dibayar pekerja/buruh dengan subsidi,
                    maka sebagai upah dianggap selisih antara harga pembelian
                    dengan harga yang harus dibayar oleh pekerja/buruh.
              - _type: ayat
                _key: 2
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal penghasilan pekerja/buruh dibayarkan atas dasar
                    perhitungan harian, maka penghasilan sebulan adalah sama
                    dengan 30 kali penghasilan sehari.
              - _type: ayat
                _key: 3
                isi:
                  _type: referenceText
                  references: []
                  text: >-
                    Dalam hal upah pekerja/buruh dibayarkan atas dasar
                    perhitungan satuan hasil, potongan/borongan atau komisi,
                    maka penghasilan sehari adalah sama dengan pendapatan
                    rata-rata per hari selama 12 (dua belas) bulan terakhir,
                    dengan ketentuan tidak boleh kurang dari ketentuan upah
                    minimum provinsi atau kabupaten/kota.
              - _type: ayat
                _key: 4
