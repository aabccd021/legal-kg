            title: >-
              Bagian Kedua Perpanjangan dan Perubahan Pengesahan Rencana Penggunaan Tenaga Kerja
              Asing Pasal 21 (1) Permohonan perpanjangan Pengesahan RPTKA diajukan oleh Pemberi
              Kerja TKA secara daring kepada Menteri atau pejabat yang ditunjuk. (2) Permohonan
              perpanjangan Pengesahan RPTKA sebagaimana dimaksud pada ayat (1) diajukan paling
              lambat 30 (tiga puluh) hari kerja sebelum jangka waktu berakhir. (3) Permohonan
              perpanjangan Pengesahan RPTKA sebagaimana dimaksud pada ayat (1) disampaikan oleh
              Pemberi Kerja TKA dengan memuat paling sedikit: a. identitas Pemberi Kerja TKA, b.
              alasan... b. alasan perpanjangan Pengesahan RPTKA, c. jabatan atau kedudukan TKA dalam
              struktur organisasi perusahaan, d. jumlah TKA, e. jangka waktu penggunaan TKA, f.
              lokasi kerja TKA, g. identitas Tenaga Kerja Pendamping TKA, dan h. realisasi
              penyerapan tenaga kerja Indonesia. (4) Permohonan perpanjangan Pengesahan RPTKA
              sebagaimana dimaksud pada ayat (3) disampaikan oleh Pemberi Kerja TKA dengan
              melampirkan dokumen paling sedikit: a. surat permohonan perpanjangan RPTKA, b.
              Pengesahan RPTKA yang masih berlaku, Cc. perjanjian kerja atau perjanjian lain, d.
              paspor TKA yang masih berlaku: e. kepesertaan program jaminan sosial, f. nomor pokok
              wajib pajak TKA dan Pemberi Kerja TKA, dan g. laporan realisasi pelaksanaan pendidikan
              dan pelatihan kerja bagi tenaga kerja Indonesia sesuai dengan kualifikasi jabatan yang
              diduduki oleh TKA. (S5) Dalam hal permohonan perpanjangan Pengesahan RPTKA dinyatakan
              lengkap dan benar, Menteri atau pejabat yang ditunjuk menerbitkan Pengesahan RPTKA
              perpanjangan paling lama 2 (dua) hari kerja. (6) Jangka waktu setiap Pengesahan RPTKA
              perpanjangan sebagaimana dimaksud pada ayat (5) diberikan paling lama 2 (dua) tahun
              dan Pengesahan RPTKA perpanjangan di KEK diberikan paling lama 5 (lima) tahun. (7)
              Pengesahan RPTKA perpanjangan digunakan sebagai rekomendasi untuk mendapatkan izin
              tinggal dalam rangka bekerja bagi TKA. (8) Menteri atau pejabat yang ditunjuk
              sebagaimana dimaksud pada ayat (5) menyampaikan data TKA yang akan dipekerjakan secara
              daring kepada menteri yang menyelenggarakan urusan pemerintahan di bidang hukum dan
              hak asasi manusia atau pejabat yang ditunjuk sebagai rekomendasi untuk mendapatkan
              izin tinggal dalam rangka bekerja. Pasal 22 (1) Pemberi Kerja TKA dapat mengajukan
              permohonan perubahan Pengesahan RPTKA secara daring kepada Menteri atau pejabat yang
              ditunjuk mengenai: a. alamat Pemberi Kerja TKA, b. identitas TKA, c. lokasi kerja TKA:
              dan/atau d. nama Tenaga Kerja Pendamping TKA yang dipekerjakan. (2) Perubahan
              Pengesahan RPTKA sebagaimana dimaksud pada ayat (1) diterbitkan oleh Menteri atau
              pejabat yang ditunjuk paling lama 2 (dua) hari kerja sejak permohonan dinyatakan
              lengkap dan benar.
