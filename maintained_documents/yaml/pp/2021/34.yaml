        PENDIDIKAN DAN PELATIHAN KERJA BAGI TENAGA KERJA PENDAMPING DAN TENAGA KERJA ASING Pasal 28
        (1) Penunjukan tenaga kerja Indonesia sebagai Tenaga Kerja Pendamping TKA dilaksanakan untuk
        alih teknologi dan alih keahlian. (2) Alih teknologi dan alih keahlian sebagaimana dimaksud
        pada ayat (1) dilaksanakan melalui pendidikan dan/atau pelatihan kerja kepada Tenaga Kerja
        Pendamping TKA sehingga memiliki kemampuan untuk mengimplementasikan teknologi yang
