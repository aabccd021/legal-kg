                parentBabNode: *ref_85
            title: >-
              Bagian Ketiga Dana Kompensasi Penggunaan Tenaga Kerja Asing Pasal 23 (1) Pemberi Kerja
              TKA wajib membayar DKPTKA atas setiap TKA yang dipekerjakan. (2) Pembayaran DKPTKA
              dilakukan sesuai dengan jangka waktu TKA bekerja di wilayah Indonesia. (3) Pembayaran
              DKPTKA sebagaimana dimaksud pada ayat (1) dibayarkan oleh Pemberi Kerja TKA setelah
              menerima kode billing pembayaran DKPTKA dari Menteri atau pejabat yang ditunjuk. (4)
              Kode billing pembayaran DKPTKA sebagaimana dimaksud pada ayat (3) disampaikan kepada
              Pemberi Kerja TKA setelah data calon TKA dan dokumen dinyatakan lengkap oleh Menteri
              atau pejabat yang ditunjuk. (S5) Pembayaran DKPTKA merupakan persyaratan Pengesahan
              RPTKA. (6) Ketentuan mengenai besaran dan penggunaan DKPTKA sebagaimana dimaksud pada
              ayat (1) dilaksanakan sesuai dengan ketentuan peraturan perundang-undangan. Pasal 24
              (1) Pembayaran DKPTKA oleh Pemberi Kerja TKA merupakan penerimaan negara bukan pajak
              atau pendapatan daerah berupa retribusi daerah. (2) DKPTKA sebagaimana dimaksud pada
              ayat (1) menjadi: a. penerimaan negara bukan pajak untuk Pengesahan RPTKA baru,
              Pengesahan RPTKA perpanjangan bagi TKA yang bekerja di lokasi lebih dari 1 (satu)
              provinsi, dan Pengesahan RPTKA KEK, b. pendapatan daerah provinsi untuk Pengesahan
              RPTKA perpanjangan bagi TKA yang bekerja di lokasi lebih dari 1 (satu) kabupaten/kota
              dalam 1 (satu) provinsi, dan c. pendapatan daerah kabupaten/kota untuk Pengesahan
              RPTKA perpanjangan bagi TKA yang bekerja di lokasi dalam 1 (satu) kabupaten/kota. (3)
              Pembayaran DKPTKA sebagaimana dimaksud pada ayat (1) untuk penerimaan negara bukan
              pajak dibayarkan melalui bank persepsi yang ditunjuk oleh Menteri dan untuk pendapatan
              daerah dibayarkan melalui bank yang ditunjuk oleh Pemerintah Daerah. Pasal 25 (1)
              Kewajiban membayar DKPTKA tidak berlaku bagi: a. instansi Pemerintah: b. perwakilan
              negara asing, c. badan internasional: d. lembaga sosial, e. lembaga keagamaan, dan f.
              jabatan tertentu di lembaga pendidikan. (2) Jabatan tertentu di lembaga pendidikan
              yang dibebaskan pembayaran DKPTKA sebagaimana dimaksud pada ayat (1) huruf f
              ditetapkan oleh Menteri setelah mendapatkan masukan dari kementerian yang
              menyelenggarakan urusan pemerintahan di bidang pendidikan. Pasal 26 Ketentuan lebih
              lanjut mengenai tata cara permohonan, perpanjangan, perubahan Pengesahan RPTKA, dan
              pembayaran DKPTKA sebagaimana dimaksud dalam Pasal 12 sampai dengan Pasal 25 diatur
              dengan Peraturan Menteri.
