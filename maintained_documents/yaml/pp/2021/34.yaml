        administratif dari Pengawas Ketenagakerjaan. Pasal 37 (1) Sanksi denda sebagaimana dimaksud
        dalam Pasal 36 ayat (1) huruf a dikenakan kepada Pemberi Kerja TKA yang melanggar ketentuan
        tidak memiliki Pengesahan RPTKA sebagaimana dimaksud dalam Pasal 6 ayat (1), Pasal 6 ayat
        (2), dan Pasal 19 ayat (6). (2) Besaran sanksi denda sebagaimana dimaksud pada ayat (1)
        dikenakan per jabatan per orang per bulan dengan ketentuan sebagai berikut: a. 1 (satu)
        bulan dikenai sanksi denda sebesar Rp6.000.000,00 (enam juta rupiah): b. 2 (dua) bulan
        dikenai sanksi denda sebesar Rp12.000.000,00 (dua belas juta rupiah): c. 3 (tiga) bulan
        dikenai sanksi denda sebesar Rp18.000.000,00 (delapan belas juta rupiah), d. 4 (empat) bulan
        dikenai sanksi denda sebesar Rp24.000.000,00 (dua puluh empat juta rupiah), e. 5 (lima)
        bulan dikenai sanksi denda sebesar Rp30.000.000,00 (tiga puluh juta rupiah), atau f. 6
        (enam) bulan dikenai sanksi denda sebesar Rp36.000.000,00 (tiga puluh enam juta rupiah). (3)
        Penghitungan besaran sanksi denda sebagaimana dimaksud pada ayat (2) dikenakan kepada
        Pemberi Kerja TKA dimulai sejak TKA memasuki wilayah Indonesia sampai dengan 6 (enam) bulan.
        (4) Sanksi denda sebagaimana dimaksud pada ayat (2) dibayarkan ke kas negara. (5) Pembayaran
        sanksi denda sebagaimana dimaksud pada ayat (2) dilakukan oleh Pemberi Kerja TKA paling lama
        2 (dua) minggu sejak diterima atau diumumkan pengenaan sanksi denda. Pasal 38 (1) Pemberi
        Kerja TKA yang tidak membayar sanksi denda dalam jangka waktu paling lama 2 (dua) minggu
        sebagaimana dimaksud dalam Pasal 37 ayat (5) dikenakan sanksi penghentian sementara proses
        permohonan Pengesahan RPTKA. (2) Pemberi Kerja TKA sebagaimana dimaksud pada ayat (l) tetap
        berkewajiban untuk membayar sanksi denda dan denda keterlambatan sebesar 24» (dua persen)
        per bulan dari jumlah sanksi denda yang harus dibayarkan. (3) Denda keterlambatan
        sebagaimana dimaksud pada ayat (2) dikenakan paling lama 6 (enam) bulan. (4) Apabila dalam
        jangka waktu 6 (enam) bulan sejak batas waktu pembayaran Pemberi Kerja TKA tidak membayar
        sanksi denda dan denda keterlambatan, Menteri atau pejabat yang ditunjuk menyerahkan
        penagihan kepada instansi yang berwenang mengurusi piutang negara untuk di proses lebih
        lanjut. Pasal 39 (1) Sanksi penghentian sementara proses permohonan Pengesahan RPTKA
        sebagaimana dimaksud dalam Pasal 36 ayat (1) huruf b dikenakan kepada Pemberi Kerja TKA yang
        melanggar ketentuan: a. tidak memfasilitasi pendidikan dan pelatihan bahasa Indonesia kepada
        TKA sebagaimana dimaksud dalam Pasal 7 ayat (2), b. tidak mendaftarkan TKA dalam program
        jaminan sosial nasional bagi TKA yang bekerja lebih dari 6 (enam) bulan atau program
        asuransi pada perusahaan asuransi bagi TKA yang bekerja kurang dari 6 (enam) bulan
        sebagaimana dimaksud dalam Pasal 8 ayat (1): c. tidak melaporkan setiap 1 (satu) tahun
        kepada Menteri atau pejabat yang ditunjuk untuk pelaksanaan penggunaan TKA, pelaksanaan
        pendidikan dan pelatihan kerja bagi Tenaga Kerja Pendamping TKA, dan pelaksanaan alih
        teknologi dan alih keahlian dari TKA kepada Tenaga Kerja Pendamping TKA sebagaimana dimaksud
        dalam Pasal 32 ayat (1), d. tidak melaporkan pelaksanaan penggunaan TKA untuk pekerjaan yang
        bersifat sementara setelah berakhirnya perjanjian kerja kepada Menteri atau pejabat yang
        ditunjuk sebagaimana dimaksud dalam Pasal 32 ayat (2), dan/atau e. tidak melaporkan kepada
        Menteri atau pejabat yang ditunjuk untuk perjanjian kerja TKA yang telah berakhir atau
        diakhiri sebelum jangka waktu perjanjian kerja berakhir sebagaimana dimaksud dalam Pasal 32
        ayat (3). (2) Sanksi penghentian sementara proses permohonan Pengesahan RPTKA sebagaimana
        dimaksud pada ayat (1) diberikan untuk jangka waktu paling lama 3 (tiga) bulan. (3) Sanksi
        penghentian sementara proses permohonan Pengesahan RPTKA sebagaimana dimaksud pada ayat (2)
        memuat kewajiban yang harus dilaksanakan oleh Pemberi Kerja TKA terhadap pelanggaran yang
        telah dilakukan. (4) Dalam hal Pemberi Kerja TKA tidak melaksanakan kewajiban sebagaimana
        dimaksud pada ayat (3) akan dikenakan sanksi pencabutan Pengesahan RPTKA. Pasal 40 (1)
        Sanksi pencabutan Pengesahan RPTKA sebagaimana dimaksud dalam Pasal 36 ayat (1) huruf c
        dikenakan kepada Pemberi Kerja TKA yang melanggar ketentuan: a. mempekerjakan TKA tidak
        sesuai dengan Pengesahan RPTKA sebagaimana dimaksud dalam Pasal 6 ayat (3), b. mempekerjakan
        TKA rangkap jabatan dalam perusahaan yang sama sebagaimana dimaksud dalam Pasal 10: c.
        mempekerjakan TKA pada jabatan yang mengurusi personalia sebagaimana dimaksud dalam Pasal 11
        ayat (1): dan/atau d. tidak membayar DKPTKA atas setiap TKA yang dipekerjakan sebagaimana
        dimaksud dalam Pasal 23 ayat (1). Pasal 41 Menteri atau pejabat yang ditunjuk menyampaikan
        pencabutan Pengesahan RPTKA kepada menteri yang menyelenggarakan urusan pemerintahan di
        bidang hukum dan hak asasi manusia atau pejabat yang ditunjuk untuk dilakukan tindakan
        keimigrasian sesuai dengan ketentuan peraturan perundang- undangan di bidang keimigrasian.
        Pasal 42 Ketentuan lebih lanjut mengenai tata cara pengenaan sanksi administratif
        sebagaimana dimaksud dalam Pasal 36 sampai dengan Pasal 41 diatur dengan Peraturan Menteri.
        BAB VIH PENDANAAN Pasal 43 Segala pendanaan yang diperlukan untuk pelaksanaan Peraturan
        Pemerintah ini dibebankan pada Anggaran Pendapatan dan Belanja Negara, Anggaran Pendapatan
        dan Belanja Daerah provinsi, serta sumber pendanaan lainnya yang sah sesuai dengan ketentuan
        peraturan perundang-undangan. BAB IX KETENTUAN LAIN-LAIN Pasal 44 Proses penggunaan TKA
        sebagaimana diatur dalam Peraturan Pemerintah ini dilakukan melalui penggunaan data secara
        bersama dan terintegrasi secara daring. BAB X KETENTUAN PERALIHAN Pasal 45 Pada saat
        Peraturan Pemerintah ini mulai berlaku: a. perizinan penggunaan TKA yang sudah terbit masih
        tetap berlaku sampai dengan habis masa berlakunya, dan b. perizinan penggunaan TKA yang
        sedang dalam proses permohonan disesuaikan dengan ketentuan dalam Peraturan Pemerintah ini.
        BAB XI KETENTUAN PENUTUP Pasal 46 Pada saat Peraturan Pemerintah ini mulai berlaku,
        Peraturan Presiden Nomor 20 Tahun 2018 tentang Penggunaan Tenaga Kerja Asing (Lembaran
        Negara Republik Indonesia Tahun 20 18 Nomor 39), dicabut dan dinyatakan tidak berlaku. Pasal
        47 Pada saat Peraturan Pemerintah ini mulai berlaku, Peraturan Daerah dan Peraturan Kepala
        Daerah yang mengatur mengenai retribusi yang berasal dari perpanjangan izin mempekerjakan
        TKA wajib menyesuaikan dengan ketentuan dalam Peraturan Pemerintah ini paling lambat 3
        (tiga) bulan terhitung sejak Peraturan Pemerintah ini berlaku. Pasal 48 Peraturan Pemerintah
        ini mulai berlaku pada tanggal 1 April 2021. Agar setiap orang mengetahuinya, memerintahkan
        pengundangan Peraturan Pemerintah ini dengan penempatannya dalam Lembaran Negara Republik
        Indonesia.
