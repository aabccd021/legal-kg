        kerja bagi Tenaga Kerja Pendamping TKA dapat dilaksanakan di dalam dan/atau di luar negeri.
        (2) Tenaga Kerja Pendamping TKA yang mengikuti pendidikan dan pelatihan kerja sebagaimana
        dimaksud pada ayat (1) mendapat sertifikat pendidikan dan pelatihan kerja dan/atau
        sertifikat kompetensi sesuai dengan ketentuan peraturan perundang-undangan. (3) Pelaksanaan
        pendidikan dan pelatihan kerja bagi Tenaga Kerja Pendamping TKA di dalam negeri sebagaimana
        dimaksud pada ayat (1) dilaksanakan sesuai dengan ketentuan peraturan perundang- undangan.
        Pasal 30 Pendidikan dan pelatihan bahasa Indonesia kepada TKA dapat dilaksanakan oleh
        Pemberi Kerja TKA atau bekerja sama dengan lembaga pendidikan atau lembaga pelatihan bahasa
        Indonesia. Pasal 31 Ketentuan lebih lanjut mengenai pelaksanaan pendidikan dan pelatihan
        kerja bagi Tenaga Kerja Pendamping TKA dan TKA sebagaimana dimaksud dalam Pasal 28 sampai
        dengan Pasal 30 diatur dengan Peraturan Menteri.
