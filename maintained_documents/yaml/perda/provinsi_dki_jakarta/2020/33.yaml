                      key: '3'
                      parentPointSetNode: *ref_16
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_19
                      textString: >-
                        Barang Penting adalah barang strategis yang berperan penting dalam
                        menentukan kelancaran pembangunan nasional. 4, Penduduk adalah setiap orang
                        yang berdomisili dan/atau berkegiatan di Provinsi DKI Jakarta. 5. Pelaku
                        Usaha adalah setiap orang perseorangan warga negara Indonesia atau badan
                        usaha yang berbentuk badan hukum atau bukan badan hukum yang didirikan dan
                        berkedudukan dalam wilayah hukum Negara Kesatuan Republik Indonesia yang
                        melakukan kegiatan usaha di bidang Perdagangan. 6. Provinsi Daerah Khusus
                        Ibukota Jakarta selanjutnya disebut Provinsi DKI Jakarta adalah provinsi
                        yang mempunyai kekhususan dalam penyelenggaraan pemerintahan daerah karena
                        kedudukannya sebagai Ibukota Negara Kesatuan Republik Indonesia. 7.
                        Pemerintah Provinsi Daerah Khusus Ibukota Jakarta selanjutnya disebut
                        Pemerintah Provinsi DKI Jakarta adalah Gubernur dan perangkat daerah
                        Provinsi DKI Jakarta sebagai unsur penyelenggara pemerintahan Provinsi DKI
                        Jakarta. 8. Gubernur adalah Kepala Daerah Provinsi DKI Jakarta yang karena
                        jabatannya berkedudukan juga sebagai wakil Pemerintah di wilayah Provinsi
                        DKI Jakarta. 9. Sekretaris Daerah adalah Sekretaris Daerah Provinsi DKI
                        Jakarta. 10. Perangkat Daerah adalah unsur pembantu Gubernur dan Dewan
                        Perwakilan Rakyat Daerah dalam penyelenggaraan urusan pemerintahan yang
                        menjadi kewenangan Daerah Provinsi DKI Jakarta. 11. Gugus Tugas Percepatan
                        Penanganan Corona Virus Disease (COVID-19) Provinsi DKI Jakarta yang
                        selanjutnya disebut Gugus Tugas COVID-19 tingkat Provinsi adalah Gugus Tugas
                        Percepatan Penanganan Corona Virus Disease (COVID-19) yang dibentuk
                        Pemerintah Provinsi DKI Jakarta untuk tingkat Provinsi. 12. Gugus Tugas
                        Percepatan Penanganan Corona Virus Disease (COVID-19) tingkat Kota
                        Administrasi/Kabupaten Administrasi yang selanjutnya disebut Gugus Tugas
                        COVID-19 tingkat Kota/Kabupaten Administrasi adalah Gugus Tugas Percepatan
                        Penanganan Corona Virus Disease (COVID-19) yang dibentuk Pemerintah
                        Kota/Kabupaten Administrasi untuk tingkat Kota/Kabupaten Administrasi.
