        kriteria: a. pelaksanaan PSBB sesuai dengan Peraturan Gubernur ini: b. jumlah kasus, dan c.
        sebaran kasus. Pasal 26 (1) Dalam pelaksanaan PSBB, masyarakat, Rukun Tetangga dan Rukun
        Warga turut berpartisipasi aktif melakukan pemantauan pelaksanaan PSBB. (2) Pemantauan
        pelaksanaan PSBB sebagaimana dimaksud pada ayat (1) dilaporkan melalui kanal penanganan
        pengaduan masyarakat yang dimiliki oleh Pemerintah Provinsi DKI Jakarta. (3) Hasil pelaporan
        oleh masyarakat sebagaimana dimaksud pada ayat (2) ditindaklanjuti oleh Gugus Tugas COVID-19
        tingkatan wilayah sesuai dengan kewenangan dan tanggung jawab. 19 BAB VII SANKSI Pasal 27
        Pelanggaran terhadap pelaksanaan PSBB dikenakan sanksi sesuai dengan ketentuan peraturan
        perundang-undangan, termasuk sanksi pidana. BAB VIH KETENTUAN PENUTUP Pasal 28 Peraturan
        Gubernur ini mulai berlaku pada tanggal diundangkan. Agar setiap orang mengetahuinya,
        memerintahkan pengundangan Peraturan Gubernur ini dengan penempatannya dalam Berita Daerah
        Provinsi Daerah Khusus Ibukota Jakarta.
