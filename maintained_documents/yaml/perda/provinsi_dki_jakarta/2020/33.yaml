                        nodeType: text
                        textName: text
                        parentNode: *ref_18
                      textString: >-
                        Barang Kebutuhan Pokok adalah barang yang menyangkut hajat hidup orang
                        banyak dengan skala pemenuhan kebutuhan yang tinggi serta menjadi faktor
                        pendukung kesejahteraan masyarakat.
                      references: []
                  - type: point
                    node: &ref_19
