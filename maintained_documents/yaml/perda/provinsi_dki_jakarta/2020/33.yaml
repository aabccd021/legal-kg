opText: |-
  SALINAN
  GUBERNUR PROVINSI DAERAH KHUSUS
  IBUKOTA JAKARTA
  PERATURAN GUBERNUR DAERAH KHUSUS
  IBUKOTA JAKARTA
  NOMOR 33 TAHUN 2020
  TENTANG
  PELAKSANAAN PEMBATASAN SOSIAL BERSKALA BESAR
  DALAM PENANGANAN CORONA VIRUS DISEASE 2019 (COVID-19)
  DI PROVINSI DAERAH KHUSUS IBUKOTA JAKARTA
  DENGAN RAHMAT TUHAN YANG MAHA ESA
  GUBERNUR DAERAH KHUSUS IBUKOTA JAKARTA,
  Menimbang : a. bahwa bahwa berdasarkan Keputusan Menteri Kesehatan
  Republik Indonesia Nomor HK.01.07 /MENKES/239/2020 telah
  ditetapkan Pembatasan Sosial Berskala Besar di wilayah
  Provinsi Daerah Khusus Ibukota Jakarta dalam rangka
  percepatan penanganan Corona Virus Disease 2019 (COVID-19),
  b. bahwa berdasarkan pertimbangan sebagaimana dimaksud
  dalam huruf a, perlu menetapkan Peraturan Gubernur tentang
  Pelaksanaan Pembatasan Sosial Berskala Besar Dalam
  Penanganan Corona Virus Disease 2019 (COVID-19) di Provinsi
  Daerah Khusus Ibukota Jakarta:
  Mengingat : 1. Undang-Undang Nomor 4 Tahun 1984 tentang Wabah Penyakit
  Menular (Lembaran Negara Republik Indonesia Tahun 1984
  Nomor 20, Tambahan Lembaran Negara Republik Indonesia
  Tahun 1984 Nomor 3723),
  2. Undang-Undang Nomor 29 Tahun 2007 tentang Pemerintahan
  Daerah Khusus Ibukota Jakarta sebagai Ibukota Negara
  Kesatuan Republik Indonesia (Lembaran Negara Republik
  Indonesia Tahun 2007 Nomor 93, Tambahan Lembaran Negara
  Republik Indonesia Nomor 4744),
  3. Undang-Undang Nomor 23 Tahun 2014 tentang Pemerintahan
  Daerah (Lembaran Negara Republik Indonesia Tahun 2014
  Nomor 244, Tambahan Lembaran Negara Republik Indonesia
  Nomor 5587) sebagaimana telah beberapa kali diubah terakhir
  dengan Undang-Undang Nomor 9 Tahun 2015 tentang
  Perubahan Kedua Atas Undang-Undang Nomor 23 Tahun 2014
  tentang Pemerintahan Daerah (Lembaran Negara Republik
  Indonesia Tahun 2015 Nomor 58, Tambahan Lembaran Negara
  Republik Indonesia Nomor 5679),
  4. Undang-Undang Nomor 6 Tahun 2018 tentang Kekarantinaan
  Kesehatan (Lembaran Negara Republik Indonesia Tahun 2018
  Nomor 128, Tambahan Lembaran Negara Republik Indonesia
  Nomor 6236),
  5. Peraturan Pemerintah Nomor 21 Tahun 2020 tentang
  Pembatasan Sosial Berskala Besar Dalam Rangka Percepatan
  Penanganan Corona Virus Disease 2019 (COVID-19) (Lembaran
  Negara Republik Indonesia Tahun 2020 Nomor 91, Tambahan
  Lembaran Negara Republik Indonesia Nomor 6487),
  6. Peraturan Menteri Kesehatan Nomor 9 Tahun 2020 tentang
  Pedoman Pembatasan Sosial Berskala Besar Dalam Rangka
  Percepatan Penanganan Corona Virus Disease 2019 (COVID-
  19) (Berita Negara Republik Indonesia Tahun 2020 Nomor
  326),
  MEMUTUSKAN:
  Menetapkan : PERATURAN GUBERNUR TENTANG PELAKSANAAN PEMBATASAN
  SOSIAL BERSKALA BESAR DALAM PENANGANAN CORONA
  VIRUS DISEASE 2019 (COVID-19) DI PROVINSI DAERAH KHUSUS
  IBUKOTA JAKARTA.
