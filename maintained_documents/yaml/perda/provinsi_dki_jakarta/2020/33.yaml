                        parentNode: *ref_17
                      textString: >-
                        Pembatasan Sosial Berskala Besar yang selanjutnya disingkat PSBB adalah
                        pembatasan kegiatan tertentu penduduk dalam suatu wilayah yang diduga
                        terinfeksi Corona Virus Disease 2019 (COVID-19) sedemikian rupa untuk
                        mencegah kemungkinan penyebaran Corona Virus Disease 2019 (COVID- 19).
