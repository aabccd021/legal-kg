      textString: >-
        : 1. Pasal 18 Ayat (6) Undang-Undang Dasar Negara Republik Indonesia Tahun 1945, 2.
        Undang-Undang Nomor 16 Tahun 1950 tentang Pembentukan Daerah-daerah Kota Besar dalam
        Lingkungan Propinsi Djawa Timur, Djawa Tengah, Djawa Barat dan Daerah Istimewa Yogyakarta,
        (Berita Negara Republik Indonesia Tahun 1950 Nomor 45) sebagaimana telah diubah beberapa
        kali terakhir dengan Undang- Undang Nomor 13 Tahun 1954 tentang Pengubahan Undang-Undang
        Nomor 16 dan 17 Tahun 1950 (Republik Indonesia Dahulu) tentang Pembentukan Kota-Kota Besar
        dan Kota-Kota Kecil di Djawa (Lembaran Negara Republik Indonesia Tahun 1954 Nomor 40,
        Tambahan Lembaran Negara Republik Indonesia Nomor 551), 3. Undang-Undang Nomor 24 Tahun 2007
        tentang Penanggulangan Bencana (Lembaran Negara Republik Indonesia Tahun 2007 Nomor 66,
        Tambahan Lembaran Negara Republik Indonesia Nomor 4723): 4. Undang-Undang Nomor 12 Tahun
        2011 tentang Pembentukan Peraturan Perundang-Undangan (Lembaran Negara Republik Indonesia
        Tahun 2011 Nomor 82, Tambahan Lembaran Negara Republik Indonesia Nomor 5234) sebagaimana
        telah diubah dengan Undang-Undang Nomor 15 Tahun 2019 tentang Perubahan Atas Undang- Undang
        Nomor 12 Tahun 2011 tentang Pembentukan Peraturan Perundang-Undangan (Lembaran Negara
        Republik Indonesia Tahun 2019 Nomor 183, Tambahan Lembaran Negara Republik Indonesia Nomor
        6398): 5. Undang-Undang Nomor 23 Tahun 2014 tentang Pemerintahan Daerah (Lembaran Negara
        Republik Indonesia Tahun 2014 Nomor 244, Tambahan Lembaran Negara Republik Indonesia Nomor
        5587), sebagaimana telah diubah beberapa kali terakhir dengan Undang- Undang Nomor 9 Tahun
        2015 tentang Perubahan Kedua Atas Undang-Undang Nomor 23 Tahun 2014 tentang Pemerintahan
        Daerah (Lembaran Negara Republik Indonesia Tahun 2015 Nomor 58, Tambahan Lembaran Negara
        Republik Indonesia Nomor 5679), 6. Undang-Undang Nomor 6 Tahun 2018 tentang Kekarantinaan
        Kesehatan (Lembaran Negara Republik Indonesia Tahun 2018 Nomor 128, Tambahan Lembaran 7.
        Peraturan Pemerintah Nomor 12 Tahun 2017 tentang Pembinaan dan Pengawasan Penyelenggaraan
        Pemerintahan Daerah (Lembaran Negara Republik Indonesia Tahun 2017 Nomor 73, Tambahan
        Lembaran Negara Republik Indonesia Nomor 6041), 8. Peraturan Presiden Nomor 17 Tahun 2018
        tentang Penyelenggaraan Penanggulangan Bencana Dalam Keadaan Tertentu (Lembaran Negara
        Republik Indonesia Tahun 2018 Nomor 34), 9. Peraturan Menteri Dalam Negeri Nomor 80 Tahun
        2015 tentang Pembentukan Produk Hukum Daerah (Berita Negara Republik Indonesia Tahun 2015
        Nomor 2036) sebagaimana telah diubah dengan Peraturan Menteri Dalam Negeri Nomor 120 Tahun
        2018 tentang Perubahan Atas Peraturan Menteri Dalam Negeri Nomor 80 Tahun 2015 tentang
        Pembentukan Produk Hukum Daerah (Berita Negara Republik Indonesia Tahun 2018 Nomor 157):
        10.Keputusan Presiden Nomor 7 Tahun 2020 tentang Gugus Tugas Percepatan Penanganan Corona
        virus disease 2019 (COVID-19) sebagaimana telah diubah dengan Keputusan Presiden Nomor 9
        Tahun 2020 tentang Perubahan atas Keputusan Presiden Nomor 7 Tahun 2020 tentang Gugus Tugas
        Percepatan Penanganan Corona virus disease 2019 (COVID-19), 11.Keputusan Presiden Nomor 12
        Tahun 2020 tentang Penetapan Bencana Nonalam Penyebaran Corona Virus Disease 2019 (COVID-19)
        Sebagai Bencana Nasional: 12. Keputusan Menteri Kesehatan Nomor HK.01.07 /MENKES/328/2020
        tentang Panduan Pencegahan Dan Pengendalian Corona Virus Disease 2019 (COVID-19) Di Tempat
        Kerja Perkantoran Dan Industri Dalam Mendukung Keberlangsungan Usaha Pada Situasi 13.
        Keputusan Menteri Dalam Negeri Nomor 440 — 830 Tahun 2020 tentang Pedoman Tatanan Normal
        Baru Produktif dan Aman Corona Virus Disease 2019 Bagi Aparatur Sipil Negara Di Lingkungan
        Kementerian Dalam Negeri dan MEMUTUSKAN: Menetapkan: PERATURAN WALIKOTA TENTANG PEDOMAN
        PENERAPAN MASYARAKAT PRODUKTIF DAN AMAN CORONA VIRUS DISEASE 2019.
