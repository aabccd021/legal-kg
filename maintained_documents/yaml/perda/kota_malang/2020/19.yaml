        karyawan, c. menyediakan layanan khusus bagi tamu yang ingin melakukan isolasi mandiri, .
        membatasi tamu hanya dapat berkegiatan dalam kamar hotel dengan memanfaatkan layanan kamar
        (room service), . kegiatan dan/atau fasilitas layanan hotel yang dapat menciptakan kerumunan
        orang dalam area hotel wajib menerapkan physical distancing dan membatasi peserta sebanyak
        50” (lima puluh persen) dari kapasitas, melarang tamu yang sakit atau menunjukkan gejala
        infeksi saluran nafas yaitu suhu tubuh 37,30C ke atas, demam, batuk, pilek, diare dan sakit
