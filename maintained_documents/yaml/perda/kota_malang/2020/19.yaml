        kegiatan di usaha pariwisata, n. kegiatan di toko obat/farmasi dan/atau fasilitas kesehatan,
        dan o. kegiatan lainnya. (4) Penetapan status pelaksanaan kegiatan sebagaimana dimaksud pada
        ayat (3), dengan Keputusan Walikota. Selama masa pandemi COVID-19, setiap orang wajib: a.
        melakukan cuci tangan menggunakan air mengalir dan sabun atau pembersih tangan (hand
