        terkait pedoman kegiatan untuk usaha pariwisata sebagaimana dimaksud pada ayat (1),
        tercantum dalam Lampiran II yang merupakan bagian tidak terpisahkan dari Peraturan Walikota
        ini. (3) Dikecualikan dari ketentuan sebagaimana dimaksud pada ayat (1), Terhadap kegiatan
