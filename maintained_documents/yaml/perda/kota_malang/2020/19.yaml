        dan/atau sampai keluarnya hasil SWAB Test dan dilakukan penyemprotan disinfektan. (4)
        Apabila hasil SWAB Test sebagaimana dimaksud pada ayat (3) dinyatakan negatif, maka toko
        swalayan dapat dibuka kembali. (5) Apabila hasil SWAB Test sebagaimana dimaksud pada ayat
