        2. Orang Dalam Pemantauan (ODP), atau 3. Pasien Dalam Pengawasan (PDP) dengan gejala ringan.
        Bagian Kedua Pedoman Pelaksanaan Pembelajaran di Sekolah dan/atau Institusi Pendidikan Pasal
