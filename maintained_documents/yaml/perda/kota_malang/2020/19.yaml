        keselamatan dan kesehatan kerja pagi hari atau safety morning talk, dan k. melakukan
        pemantauan kesehatan pekerja selama berada di kawasan proyek secara berkala. (2) Kegiatan
        konstruksi yang tidak dapat memenuhi ketentuan sebagaimana dimaksud pada ayat (1), dilarang
        untuk beroperasi sampai dengan terpenuhinya ketentuan tersebut. Bagian Ketigabelas Pedoman
        Kegiatan di Usaha Pariwisata Pasal 30 (1) Pedoman Kegiatan untuk Usaha Pariwisata, terdiri
        dari: a. pedoman kesehatan operasional, b. pedoman kesehatan staf dan/atau pegawai, c.
