        mengharuskan pekerja menggunakan masker, sarung tangan dan pakaian kerja sesuai pedoman
        keselamatan dan Kesehatan kerja, f. mengharuskan cuci tangan dengan sabun dan/atau pembersih
        tangan (hand sanitizer) termasuk menyediakan fasilitas cuci tangan yang memadai dan mudah di
        akses pada tempat kerja, g. melarang setiap orang, baik pekerja maupun pihak lainnya, yang
        memiliki suhu badan 37,30C ke atas untuk berada di dalam lokasi kerja, h. dalam hal terdapat
