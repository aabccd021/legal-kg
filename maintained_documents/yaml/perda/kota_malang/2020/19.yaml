        dilarang beroperasi sampai terpenuhinya ketentuan tersebut. Bagian Keempatbelas Pedoman
        Kegiatan di Toko Obat/Farmasi dan/atau Fasilitas Kesehatan Pasal 31 (1) Toko Obat/Farmasi
        dan/atau Fasilitas Kesehatan pada saat beroperasi wajib menerapkan protokol kesehatan yang
        ketat, antara lain: a. menerapkan pengaturan sirkulasi dan Batasan waktu kunjungan serta
        jumlah pengunjung maksimal 406 dari jumlah kunjungan pada saat kondisi normal dengan
        menerapkan control yang ketat pada pintu masuk dan pintu keluar yang diatur untuk mencegah
        terjadinya kerumunan sesuai dengan protokol Kesehatan. . memastikan semua Petugas dan
