        Bagian Keenam Pedoman Kegiatan di Toko Swalayan dan Mal/Pusat Perbelanjaan Pasal 21 (1)
        Dalam melayani pemenuhan kebutuhan penduduk selama masa pandemi COVID-19, toko swalayan
        mengikuti ketentuan protokol kesehatan sebagai berikut: a. melakukan pembatasan jam
        operasional antara pukul 07.00 WIB sampai dengan 21.00 WIB, b. mengutamakan pemesanan barang
        secara daring dan/atau jarak jauh dengan fasilitas layanan antar, c. menerapkan pengaturan
        sirkulasi dan batasan waktu kunjungan serta jumlah pengunjung maksimal 40Y (empat puluh
        persen) dari jumlah kunjungan pada saat kondisi normal dengan menerapkan kontrol yang ketat
        pada pintu masuk dan pintu keluar untuk mencegah terjadinya kerumunan, d. memastikan semua
        petugas dan pengelola toko negative COVID-19 berdasarkan bukti hasil tes Polymerase Chain
        Reaction (PCR)/Rapid Test yang dilakukan oleh Pemilik toko atau Dinas kesehatan, e. turut
        menjaga stabilitas ekonomi dan kemampuan daya beli konsumen barang dengan tidak menaikkan
        harga barang, f. melakukan penyemprotan disinfektan secara berkala setiap 2 (dua) hari
        sekali pada tempat usaha, g. melakukan deteksi dan pemantauan suhu tubuh karyawan dan
        konsumen yang memasuki toko swalayan dan pusat perbelanjaan serta memastikan karyawan yang
        bekerja tidak sedang mengalami sakit atau menunjukkan gejala suhu tubuh 37,30C ke atas,
        batuk, pilek, diare dan sesak nafas, h. mewajibkan pembeli menggunakan masker, i. tidak
        melayani pembeli yang tidak menggunakan masker, j. menerapkan pembatasan jarak antar sesama
        konsumen (physical distancing) yang datang ke toko swalayan dan pusat perbelanjaan paling
        sedikit dalam rentang 1 (satu) meter, k. mewajibkan setiap karyawan untuk menggunakan masker
        atau pelindung wajah/,face shield dan pakaian kerja sesuai pedoman keselamatan dan kesehatan
        kerja, l. melaksanakan anjuran cuci tangan dengan sabun dan/atau pembersih tangan (hand
        sanitizer) serta menyediakan fasilitas cuci tangan yang memadai dan mudah diakses oleh
        konsumen dan karyawan, m. menyediakan protokol kesehatan dalam bentuk tertulis: n.
        menerapkan pembatasan jarak pada saat melakukan transaksi pembayaran di kasir sebesar 1,5
        (satu koma lima) meter dan paling banyak 10 (sepuluh) orang, serta mengutamakan pembayaran
