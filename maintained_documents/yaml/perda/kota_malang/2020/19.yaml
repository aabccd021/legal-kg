                      references: []
                  - type: point
                    node: &ref_13
                      nodeType: point
                      key: '3'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_13
                      textString: Walikota adalah Walikota Malang.
                      references: []
                  - type: point
                    node: &ref_14
                      nodeType: point
                      key: '4'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_14
                      textString: >-
                        Gugus Tugas Percepatan Penanganan Corona Virus Disease 2019 (COVID-19)
                        Daerah yang selanjutnya disebut Gugus Tugas COVID-19 Daerah adalah lembaga
                        koordinatif yang bertugas mengkoordinasikan upaya pencegahan dan penanganan
                        Corona Virus Disease 2019 (COVID-19) Daerah.
                      references: []
                  - type: point
                    node: &ref_15
                      nodeType: point
                      key: '5'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_15
                      textString: >-
                        Corona Virus Disease 2019 yang selanjutnya disebut COVID- 19 adalah penyakit
                        menular yang disebabkan oleh Severe Acute Respiratory Syndrome-Corona
                        Virus-2.
                      references: []
                  - type: point
                    node: &ref_16
                      nodeType: point
                      key: '6'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_16
                      textString: >-
                        Kontak erat adalah seseorang yang melakukan kontak fisik atau berada dalam
                        ruangan atau berkunjung (dalam radius 1 (satu) meter dengan kasus pasien
                        dalam pengawasan atau konfirmasi) dalam 2 (dua) hari sebelum kasus timbul
                        gejala dan hingga 14 (empat belas) hari setelah kasus timbul gejala.
                      references: []
                  - type: point
                    node: &ref_17
                      nodeType: point
                      key: '7'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_17
                      textString: >-
                        Mitigasi adalah tindakan-tindakan untuk mengurangi atau meminimalkan dampak
                        dari suatu bencana terhadap masyarakat.
                      references: []
                  - type: point
                    node: &ref_18
                      nodeType: point
                      key: '8'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_18
                      textString: >-
                        Orang Tanpa Gejala yang selanjutnya disingkat OTG adalah orang yang memiliki
                        riwayat kontak erat dengan kasus konfirmasi COVID-19 (dengan PCR) tetapi
                        tidak memiliki gejala.
                      references: []
                  - type: point
                    node: &ref_19
                      nodeType: point
                      key: '9'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_19
                      textString: >-
                        Orang Dalam Pemantauan yang selanjutnya disingkat ODP adalah orang yang
                        mengalami demam (238”C) atau riwayat demam, atau gejala gangguan sistem
                        pernapasan seperti pilek/sakit tenggorokan/batuk dan tidak ada penyebab lain
                        berdasarkan gambaran klinis yang meyakinkan dan pada 14 (empat belas) hari
                        terakhir sebelum timbul gejala memiliki riwayat perjalanan atau tinggal di
                        negara/wilayah yang melaporkan transmisi local atau memiliki riwayat kontak
                        dengan kasus konfirmasi COVID-19.
                      references: []
                  - type: point
                    node: &ref_20
                      nodeType: point
                      key: '10'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_20
                      textString: >-
                        Pasien Dalam Pengawasan yang selanjutnya disingkat PDP adalah orang yang
                        mengalami demam (238'C) atau riwayat demam, disertai batuk/sesak nafas/sakit
                        tenggorokan/ pilek/ pneumonia ringan hingga berat dan tidak ada penyebab
                        lain berdasarkan gambaran klinis yang meyakinkan dan pada 14 (empat belas)
                        hari terakhir sebelum timbul gejala memiliki riwayat perjalanan atau tinggal
                        di negara/wilayah yang melaporkan transmisi lokal atau memiliki riwayat
                        kontak dengan kasus konfirmasi COVID-19.
                      references: []
                  - type: point
                    node: &ref_21
                      nodeType: point
                      key: '11'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_21
                      textString: >-
                        Kasus konfirmasi adalah pasien yang terinfeksi COVID-19 dengan hasil
                        pemeriksaan tes positif melalui pemeriksaan PCR.
                      references: []
                  - type: point
                    node: &ref_22
                      nodeType: point
                      key: '12'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_22
                      textString: >-
                        Isolasi mandiri adalah Pemisahan orang yang tidak sakit atau terinfeksi dari
                        orang lain sehingga mencegah penyebaran infeksi atau kontaminasi yang
                        dilakukan di rumah atau di tempat lain yang disediakan sebagai tempat
                        isolasi.
                      references: []
                  - type: point
                    node: &ref_23
                      nodeType: point
                      key: '13'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_23
                      textString: >-
                        Surveilans adalah kegiatan pengamatan yang sistematis dan terus menerus
                        terhadap data dan informasi tentang kejadian penyakit atau masalah kesehatan
                        dan kondisi yang mempengaruhi terjadinya peningkatan dan penularan penyakit
                        atau masalah kesehatan untuk memperoleh dan memberikan informasi guna
                        mengarahkan tindakan pengendalian dan penanggulangansecara efektif dan
                        efisien.
                      references: []
                  - type: point
                    node: &ref_24
                      nodeType: point
                      key: '14'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_24
                      textString: >-
                        Masa transisi adalah masa peralihan dari kondisi Pembatasan Sosial Berskala
                        Besar menuju Masyarakat Produktif dan Aman dalam Pandemi COVID-19.
                      references: []
                  - type: point
                    node: &ref_25
                      nodeType: point
                      key: '15'
                      parentPointSetNode: *ref_10
                    content:
                      type: text
                      node:
                        nodeType: text
                        textName: text
                        parentNode: *ref_25
                      textString: >-
                        Masa masyarakat produktif dan aman adalah masa pelaksanaan pedoman penerapan
                        masyarakat produktif dan aman dalam pandemi COVID-19.
                      references: []
