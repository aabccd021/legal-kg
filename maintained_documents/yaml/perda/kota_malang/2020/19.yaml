        di bawah 37,3”C, . menjaga jarak antrian di kasir minimal 1 (satu) meter dan maksimal 5
        orang, . mengatur tata letak kursi di ruang tunggu dan jarak antara kounter obat dengan
        konsumen minimal 1 meter, jarak meja konsultasi dengan kursi pasien minimal 1,5 (satu koma
        lima) meter dan dilengkapi penyekat berbahan plastik dan/atau dari bahan lainnya, melakukan
        pembersihan alat Kesehatan yang dipakai berulang-ulang dengan bahan disinfektan setiap akan
        digunakan pemeriksaan pada pasien berikutnya, dan j. tenaga Kesehatan di fasilitas Kesehatan
        mengarahkan dan merujuk pasien yang diduga terinfeksi COVID-19 atau memiliki kontak dengan
        pasien COVID-19 ke Pusat Kesehatan Masyarakat (Puskesmas) dan/atau Rumah (2) Fasilitas
        Kesehatan sebagaimana dimaksud pada ayat (1), juga harus mengikuti protokol kesehatan
        sebagai berikut: a. Pengelola Pelayanan Primer/Rujukan wajib untuk membentuk Satuan Kerja
        Pencegahan dan Pengendalian COVID-19 di masing-masing tempat kerja dengan uraian tugas
        sebagai berikut: 1. Melakukan penilaian resiko (Risk Assessmeni) terhadap pekerja dengan
        klasifikasi pekerjaan sebagai berikut: a) risiko pajanan rendah-pekerjaan yang aktifitas
        kerjanya tidak sering berhubungan/kontak dengan publik (pelanggan, klien atau masyarakat
        umum) dan rekan kerja lainnya. b) risiko pajanan sedang-pekerjaan yang sering
        berhubungan/kontak dengan masyarakat umum, atau rekan kerja lainnya, pengunjung, klien atau
        pelanggan, atau kontraktor. c) risiko pajanan tinggi-pekerjaan atau tugas kerja yang
        berpotensi tinggi untuk kontak dekat dengan orang-orang yang diketahui atau diduga
        terinfeksi COVID-19, serta kontak dengan benda dan permukaan yang mungkin terkontaminasi
        oleh virus. 2. Mengkoordinasikan pelaksanaan Self Assessment untuk seluruh pegawai/pekerja.
        3. Mengolah, menganalisa dan melaporkan hasil Self Assessment kepada pimpinan unit kerja
        sebagai dasar pengaturan kebijakan pelaksanaan pekerjaan di tempat kerja. 4. Bekerjasama
        dengan Tim Pencegahan dan Pengendalian Infeksi untuk melaksanakan protokol pengendalian
        infeksi di lingkungan fasilitas pelayanan 5. Mengkoordinasikan/melakukan pendataan: c)
        Pekerja memiliki riwayat penyakit kronis seperti hipertensi, jantung dan penyakit yang
        melemahkan sistem kekebalan tubuh lain. d) Pekerja yang dapat harus melaksanakan
        pekerjaannya di kantor dan yang dapat melaksanakan pekerjaannya dari rumah. BAB VI
        PENCEGAHAN DAN/ATAU PENANGANAN COVID-19 Pasal 32 Pencegahan dan/atau penanganan COVID-19 di
        Dearah dilakukan dengan cara: a. deteksi dini, dan b. isolasi.
      content:
        type: bagianSet
        node:
          nodeType: bagianSet
          parentBabNode: *ref_87
        elements:
          - type: bagian
            node: &ref_88
              nodeType: bagian
              key: 1
              parentBagianSetNode:
                nodeType: bagianSet
                parentBabNode: *ref_87
            title: >-
              Bagian Kesatu Deteksi Dini Pasal 33 (1) Deteksi dini sebagaimana dimaksud dalam Pasal
              32 ayat (1) huruf a dilakukan dengan: a. deteksi pasif, dan b. deteksi aktif. (2)
              Deteksi pasif merupakan pengumpulan data yang diperoleh dari Fasilitas Pelayanan
              Kesehatan. (3) Deteksi aktif merupakan pengumpulan data yang diperoleh langsung dari
              masyarakat atau sumber data lainnya. (4) Deteksi aktif sebagaimana dimaksud pada ayat
              (3), dilakukan melalui: a. pemeriksaan di akses keluar masuk Daerah, b. pemantauan
              yang dilakukan oleh Lurah, c. pemantauan yang dilakukan oleh Perguruan Tinggi, d.
              pelaporan secara mandiri. (5) Pelaporan secara mandiri sebagaimana dimaksud pada ayat
              (4) huruf d dilaksanakan oleh setiap orang yang datang dari luar Daerah.
            content:
              type: paragrafSet
              node:
                nodeType: paragrafSet
                parentBagianNode: *ref_88
              elements:
                - type: paragraf
                  node: &ref_89
                    nodeType: paragraf
                    key: 1
                    parentParagrafSetNode:
                      nodeType: paragrafSet
                      parentBagianNode: *ref_88
                  title: >-
                    Paragraf 1 Pemeriksaan di Akses Keluar Masuk Daerah Pasal 34 (1) Setiap orang
                    yang datang dari luar Daerah dapat diperiksa di akses keluar masuk Daerah. (2)
                    Pemeriksaan sebagaimana dimaksud pada ayat (1) dilaksanakan untuk mendeteksi
                    dini gejala COVID-19 sesuai dengan pedoman pemeriksaan kesehatan yang berlaku.
                    (3) Setiap orang yang telah dilakukan pemeriksaan sebagaimana dimaksud pada ayat
                    (2), diberi surat keterangan status kesehatan. (4) Setiap orang yang tidak
                    beridentitas Kota Malang, apabila hasil pemeriksaaan sebagaimana dimaksud pada
                    ayat (2), menandakan gejala COVID-19, dilarang untuk memasuki wilayah Kota
                    Malang. (5) Petugas pemeriksaan wajib melakukan pencatatan terhadap hasil
                    pemeriksaan sebagaimana dimaksud pada ayat (2).
                  pasalSet:
                    type: pasalSet
                    node:
                      nodeType: pasalSet
                      parentNode: *ref_89
                    elements: []
                - type: paragraf
                  node: &ref_90
                    nodeType: paragraf
                    key: 2
                    parentParagrafSetNode:
                      nodeType: paragrafSet
                      parentBagianNode: *ref_88
                  title: >-
                    Paragraf 2 Pemantauan Yang Dilakukan Oleh Lurah Pasal 35 (1) Lurah wajib
                    melakukan pemantauan terhadap warga yang datang dari luar Daerah, ke luar
                    Daerah, dan/atau warga yang bekerja di luar Daerah yang tidak dapat dilakukan
                    secara daring/ online. (2) Hasil pemantauan sebagaimana dimaksud pada ayat (1)
                    dilaporkan kepada Gugus Tugas COVID-19 Kecamatan secara berkala setiap 3 (tiga)
                    hari sekali. (3) Gugus Tugas COVID-19 Kecamatan melakukan pelaporan hasil
                    pemantauan sebagaimana dimaksud pada ayat (2) kepada Gugus Tugas COVID-19 Daerah
                    secara berkala setiap 3 (tiga) hari sekali. (4) Pemantauan yang dilakukan oleh
                    Lurah sebagaimana dimaksud pada ayat (1) dilaksanakan dengan melibatkan RT
                    dan/atau RW setempat. (5) Dalam melakukan pemantauan Ketua RT dan/atau Ketua RW
                    wajib melakukan pencatatan terhadap warga yang datang dari luar Daerah, ke luar
                    Daerah, dan/atau warga yang bekerja di luar Daerah yang tidak dapat dilakukan
                    secara daring/ online. (6) Pencatatan sebagaimana dimaksud pada ayat (5), paling
                    sedikit meliputi: a. identitas pribadi yang meliputi: nama, tempat tanggal
                    lahir, NIK, dan alamat asal, b. tanggal kedatangan, c. alamat tujuan, d. nomor
                    Handphone dan/atau telepon, e. keperluan, dan f. riwayat perjalanan. (7) Hasil
                    pencatatan sebagaimana dimaksud pada ayat (6) dilaporkan kepada Lurah setiap
                    hari. (8) Dalam pelaksanaan pemantauan, Lurah membuat jejaring komunikasi dan
                    informasi dengan ketua RT dan ketua RW setempat dengan memanfaatkan teknologi
                    informasi dan komunikasi. (9) Dalam hal ditemukan indikasi gejala COVID-19 yang
                    dialami oleh warga maka Lurah wajib untuk segera melaporkan kepada Gugus Tugas
                    COVID-19 Daerah. Pemantauan Yang Dilakukan Oleh Perguruan Tinggi Dalam rangka
                    mewujudkan masyarakat produktif dan aman COVID-19, Pemerintah Daerah
                    berkoordinasi dengan Pimpinan Perguruan Tinggi guna membentuk protokol kesehatan
                    di lingkungan Perguruan Tinggi. Pasal 37 (1) Pimpinan Perguruan Tinggi wajib
                    melakukan pemantauan terhadap arus keluar masuk mahasiswa di Kota Malang. (2)
                    Hasil pemantauan sebagaimana dimaksud pada ayat (1) dilaporkan kepada Gugus
                    Tugas COVID-19 Daerah secara berkala setiap 15 (lima belas) hari sekali. (3)
                    Pemantauan yang dilakukan oleh Pimpinan Perguruan Tinggi sebagaimana dimaksud
                    pada ayat (1) dilaksanakan sesuai dengan kebijakan masing-masing perguruan
                    tinggi. (4) Pelaporan sebagaimana dimaksud pada ayat (2), paling sedikit
                    meliputi: a.identitas pribadi yang meliputi: nama, tempat tanggal lahir, NIK,
                    dan alamat asal, b. tanggal kedatangan atau tanggal keberangkatan: c. alamat di
                    Kota Malang (Kos, kontrakan, dan sejenisnya): d. nomor Handphone dan/atau
                    telepon, dan e. riwayat perjalanan. (5) Dalam hal ditemukan indikasi gejala
                    COVID-19 yang dialami oleh mahasiswa maka Pimpinan Perguruan Tinggi wajib untuk
                    segera melaporkan kepada Gugus Tugas COVID-19 Daerah. Pasal 38 (1) Perguruan
                    tinggi wajib mengatur kedatangan mahasiswa. (2) Seluruh mahasiswa dari luar
                    daerah yang akan masuk ke Kota Malang, wajib memiliki hasil negatif COVID-19
                    berdasarkan Polymerase Chain Reaction (PCR) Test/Rapid Test atau surat
                    keterangan sehat dari dinas kesehatan/rumah sakit/puskesmas/klinik Kesehatan di
                    daerah asal. (3) Kedatangan mahasiswa sebagaimana dimaksud pada ayat (1) paling
                    lambat 2 (dua) minggu sebelum awal perkuliahan dimulai. (4) Pimpinan Perguruan
                    Tinggi wajib memastikan seluruh mahasiswa yang datang dari luar Daerah melakukan
                    isolasi secara mandiri di kos/kontrakan, dan/atau tempat tinggal masingg-masing
                    selama 14 (empat belas) hari sesuai protokol kesehatan dan dapat diperpanjang
                    sesuai dengan kondisi kesehatan. (5) Dalam menunjang pelaksanaan isolasi secara
                    mandiri mahasiswa sebagaimana dimaksud pada ayat (4), perguruan tinggi dapat
                    menyediakan rumah isolasi yang disesuaikan dengan kondisi perguruan tinggi. (6)
                    Pengelolaan rumah isolasi sebagaimana dimaksud pada ayat (5) dilakukan oleh
                    perguruan tinggi dengan berkoordinasi dengan Gugus Tugas COVID-19 Daerah, dengan
                    pembiayaan menjadi tanggung jawab perguruan tinggi. (7) Ketentuan mengenai
                    kedatangan mahasiswa sebagaimana dimaksud pada ayat (1), tercantum dalam
                    Lampiran II yang merupakan bagian tidak terpisahkan dari Peraturan Walikota ini.
                    Paragraf 4 Pelaporan Secara Mandiri Pasal 39 (1) Setiap orang yang datang dari
                    luar Daerah wajib melaporkan diri kepada ketua RT atau RW setempat. (2) Setiap
                    orang yang akan ke luar daerah, dan/atau warga yang bekerja di luar Daerah yang
                    tidak dapat dilakukan secara daring/ online wajib melaporkan diri kepada Ketua
                    RT atau RW setempat. (1) Isolasi sebagaimana dimaksud dalam Pasal 32 ayat (1)
                    huruf b dilakukan di: a. tingkat Kota, dan b. isolasi mandiri. (2) Isolasi
                    sebagaimana dimaksud pada ayat (1) dilakukan selama 14 (empat belas) hari dan
                    dapat diperpanjang berdasarkan rekomendasi dari petugas pemeriksaan kesehatan.
                    Pasal 41 (1) Setiap orang yang datang dari luar Daerah dan telah dilakukan
                    pemeriksaan sebagaimana dimaksud dalam Pasal 34 ayat (1), Orang Tanpa Gejala
                    (OTG), Orang Dalam Pemantauan (ODP), Pasien Dalam Pengawasan (PDP), dan/atau
                    pasien positif COVID-19, dilakukan tindakan isolasi. (2) Penentuan tempat
                    isolasi sebagaimana dimaksud pada ayat (1), ditentukan berdasarkan rekomendasi
                    dari petugas kesehatan dengan mempertimbangkan kondisi klinis, risiko penularan,
                    dan kapasitas tempat isolasi. Pasal 42 (1) Dikecualikan dari ketentuan
                    sebagaimana dimaksud dalam Pasal 41 ayat (1), bagi setiap orang yang jenis
                    pekerjaannya: a.tidak dapat dilakukan di rumah secara daring/ online: dan/atau
                    b.bekerja di perusahaan dan/atau instansi yang menerapkan kebijakan bekerja di
                    rumah secara bergantian. (2) Setiap orang sebagaimana dimaksud pada ayat (1)
                    huruf a wajib memiliki surat keterangan dari instansi tempat bekerja yang
                    menyatakan bahwa pekerjaan tidak dapat dilakukan di rumah secara daring/ online.
                    (3) Setiap orang sebagaimana dimaksud pada ayat (1) huruf b wajib memiliki surat
                    keterangan dari instansi tempat bekerja yang menyatakan bahwa perusahaan
                    dan/atau instansi menerapkan kebijakan bekerja di rumah secara bergantian. (4)
                    Surat keterangan sebagaimana dimaksud pada ayat (3) disertai dengan jadwal yang
                    ditentukan oleh perusahaan dan/atau instansi masing-masing. Pasal 43 (1) Segala
                    biaya yang muncul selama pelaksanaan isolasi di tingkat kota sebagaimana
                    dimaksud dalam Pasal 40 ayat (1) huruf a dibebankan kepada Anggaran Pendapatan
                    dan Belanja Daerah (APBD) sesuai dengan kemampuan keuangan daerah. (2) Segala
                    biaya yang muncul selama pelaksanaan isolasi mandiri sebagaimana dimaksud dalam
                    Pasal 40 ayat (1) huruf b dibebankan kepada masing-masing orang. Pasal 44 (1)
                    Penentuan lokasi isolasi di tingkat Kota sebagaimana dimaksud dalam Pasal 40
                    ayat (1) huruf a, dilaksanakan setelah melaksanakan koordinasi dengan instansi
                    terkait dan ditetapkan dengan Keputusan Walikota. (2) Lokasi isolasi sebagaimana
                    dimaksud pada ayat (1), dilakukan pemantauan dan evaluasi secara berkala. (3)
                    Berdasarkan hasil pemantauan dan evaluasi sebagaimana dimaksud pada ayat (2),
                    Walikota dapat mengurangi dan/atau menambahkan lokasi isolasi melalui Keputusan
                    Walikota. Pasal 45 Ketentuan mengenai pelaksanaan deteksi dini dan isolasi
                    tercantum dalam Lampiran III yang merupakan bagian tidak terpisahkan dari
                    Peraturan Walikota ini. (1) Masyarakat dapat berperan serta dalam usaha
                    penerapan masyarakat produktif dan aman COVID-19. (2) Bentuk peran serta
                    masyarakat sebagaimana dimaksud pada ayat (1), dilaksanakan secara terkoordinir
                    dengan Gugus Tugas COVID-19 Kecamatan dan/atau Gugus Tugas COVID- 19 Daerah. (3)
                    Peran serta masyarakat sebagaimana dimaksud pada ayat (1), dapat dilaksanakan
                    dalam bentuk Kampung Tangguh. (4) Kampung Tangguh sebagaimana dimaksud pada ayat
                    (3), terdiri dari: a. ketangguhan pangan, b. ketangguhan Kesehatan, c.
                    ketangguhan ketertiban dan keamanan, d. ketangguhan informasi, e. ketangguhan
                    psikologi, dan f. ketangguhan budaya. BAB VIII PENDANAAN Pasal 47 Pendanaan
                    pelaksanaan penerapan masyarakat produktif dan aman COVID-19 bersumber dari: a.
                    Anggaran Pendapatan dan Belanja Negara, b. Anggaran Pendapatan dan Belanja
                    Daerah Provinsi, Cc. Anggaran Pendapatan dan Belanja Daerah Kota, dan/atau d.
                    sumber lain yang sah dan tidak mengikat sesuai dengan ketentuan Peraturan
                    Perundang-undangan. (1) Pelangggaran terhadap ketentuan sebagaimana dimaksud
                    pada 13 huruf a, huruf b, huruf c, dan Pasal 18 ayat (4), dikenakan sanksi
                    berupa: a. teguran lisan, b. teguran tertulis, c. pembubaran massa, dan/atau d.
                    penyitaan kartu tanda penduduk (KTP). (2) Pelanggaran terhadap ketentuan
                    sebagaimana dimaksud pada ketentuan Pasal 13 huruf d dikenakan sanksi berupa
                    tindakan pemerintahan membawa orang tersebut ke lokasi isolasi. (3) Pelanggaran
                    terhadap ketentuan protokol kesehatan sebagaimana dimaksud dalam Pasal 14 ayat
                    (6), Pasal 17, Pasal 18 ayat (1), Pasal 18 ayat (2), Pasal 18 ayat (3), Pasal 18
                    ayat (5), Pasal 20 ayat (1), Pasal 20 ayat (3), Pasal 21 ayat (1), Pasal 22 ayat
                    (1), Pasal 28 ayat (1), Pasal 29 ayat (1), Pasal 30 ayat (1), Pasal 30 ayat (5),
                    dan Pasal 30 ayat (6) dikenakan sanksi berupa: a. teguran lisan, b. teguran
                    tertulis, c. penyitaan Kartu Tanda Penduduk, d. penutupan lembaga dan/atau
                    instansi selama 14 (empat belas) hari, dan/atau e. pencabutan izin sesuai dengan
                    kewenangannya. Pasal 49 Pelanggaran terhadap ketentuan Protokol Kesehatan
                    sebagaimana dimaksud dalam dan Pasal 25 ayat (2) dikenakan sanksi berupa: a.
                    teguran lisan, b. teguran tertulis, c. pembubaran massa, dan/atau d. penyitaan
                    Kartu Tanda Penduduk. Setiap orang yang melanggar ketentuan protokol kesehatan
                    sebagaimana dimaksud dalam Pasal 26 huruf a, huruf b, huruf c, dan huruf d,
                    dikenakan sanksi berupa: a. teguran lisan, b. teguran tertulis, dan/atau c.
                    penyitaan Kartu Tanda Penduduk. Pasal 51 Selain penerapan sanksi administratif
                    sebagaimana dimaksud dalam Pasal 48, Pasal 49, dan Pasal 50 Penegak Hukum dapat
                    menerapkan kewenangannya sesuai dengan ketentuan Peraturan Perundang-undangan.
                    BAB X KETENTUAN PENUTUP Pasal 52 Pada saat Peraturan Walikota ini berlaku,
                    Peraturan Walikota Malang Nomor 17 Tahun 2020 tentang Pedoman Pembatasan Sosial
                    Berskala Besar Dalam Rangka Percepatan Penanganan Corona Virus Disease 2019,
                    dicabut dan dinyatakan tidak berlaku. Peraturan Walikota ini mulai berlaku pada
                    tanggal 31 Mei 2020 Agar setiap orang mengetahuinya, memerintahkan pengundangan
                    Peraturan Walikota ini dengan penempatannya dalam Berita Daerah Kota Malang.
