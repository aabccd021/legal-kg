        sebagaimana dimaksud pada ayat (1) huruf a, dilakukan evaluasi secara berkala. Pasal 23 Bagi
        toko swalayan dan mal/pusat perbelanjaan yang tidak dapat memenuhi ketentuan sebagaimana
        dimaksud dalam Pasal 21 dan Pasal 22, dilarang untuk beroperasi sampai terpenuhinya
        ketentuan tersebut. Bagian Ketujuh Pedoman Kegiatan di Pasar Rakyat Pasal 24 (1) Dalam
        melayani pemenuhan kebutuhan penduduk selama masa pandemi COVID-19, pasar rakyat mengikuti
        ketentuan protokol kesehatan sebagai berikut: a. memastikan semua pedagang, pengelola pasar,
        dan organ pendukungnya negative COVID-19 berdasarkan bukti hasil tes Polymerase Chain
        Reaction (PCR)/Rapid Test yang difasilitasi Pemerintah Daerah, b. sebelum pasar dibuka,
        dilakukan screening awal untuk memastikan suhu tubuh seluruh pedagang, pengelola pasar, dan
        organ pendukungnya di bawah 37,30C: c. pengelola pasar rakyat agar memfasilitasi transaksi
        jual- beli dengan mengutamakan pemesanan barang secara daring (pasar online), . melarang
        masuk orang dengan gejala pernafasan seperti . pedagang memakai masker: . pengelola pasar
        melakukan penyemprotan disinfektan secara berkala setiap 2 (dua) hari sekali pada tempat .
        memelihara bersama kebersihan sarana umum seperti toilet umum, tempat pembuangan sampah,
        tempat parkir, lantai, saluran pembuangan, dan tempat makan pada saat sebelum dan sesudah
        melakukan aktivitas perdagangan, menyediakan protokol kesehatan dalam bentuk tertulis,
        menerapkan pembatasan jarak antar sesama konsumen dan pedagang (physical distancing) yang
        datang ke pasar paling sedikit dalam rentang 1 (satu) meter, dan/atau memberlakukan skema
        ganjil genap terhadap lapak pedagang, dengan memperhatikan jenis barang dagangan yang
        dijual, . pengelola pasar menegur pedagang dan pembeli yang tidak memakai masker, pengelola
        pasar menyediakan fasilitas cuci tangan yang memadai dengan memperhatikan jumlah pedagang,
        pembeli, dan akses keluar masuk pasar dan diletakkan di tempat yang mudah diakses oleh
        pedagang dan pembeli: . menerapkan pengaturan sirkulasi dan batasan waktu kunjungan serta
        jumlah pengunjung maksimal 3046 (tiga puluh persen) dari jumlah kunjungan pada saat kondisi
        normal dengan menerapkan kontrol yang ketat pada pintu masuk dan pintu keluar untuk mencegah
        terjadinya kerumunan, . mengatur waktu pemasukkan dan pengeluaran barang dagangan dari dan
        ke dalam pasar oleh pedagang: dan . mengoptimalkan ruang terbuka untuk berjualan dalam
        rangka physical distancing, dengan mengatur jarak antar pedagang dalam rentang minimal 2
        (dua) meter. (2) Ketentuan lebih lanjut mengenai protokol Kesehatan sebagaimana dimaksud
        pada ayat (1), dilaksanakan sesuai ketentuan peraturan perundang-undangan. (3) Pasar rakyat
        yang tidak dapat memenuhi ketentuan protokol kesehatan sebagaimana dimaksud pada ayat (1),
        dilarang untuk beroperasi sampai dengan terpenuhinya ketentuan tersebut. Bagian Kedelapan
        Pedoman Kegiatan Sosial dan Budaya Pasal 25 (1) Selama masa pandemi COVID-19, kegiatan
        sosial dan budaya yang menimbulkan kerumunan orang dilaksanakan sesuai protokol kesehatan.
        (2) Protokol kesehatan sebagaimana dimaksud pada ayat (1) dilaksanakan sebagai berikut: a.
        dihadiri dengan jumlah terbatas, paling banyak 504 (lima puluh persen) dari kapasitas gedung
        dan/atau tempat kegiatan, b. menggunakan masker, dan c. menjaga jarak antar pihak yang hadir
        (physical distancing) paling sedikit dalam rentang 1 (satu) meter. (3) Kegiatan sosial dan
        budaya yang menimbulkan kerumunan orang sebagaimana dimaksud pada ayat (1), memerlukan izin
        normal baru yang dikeluarkan oleh Dinas Tenaga Kerja, Penanaman Modal dan Pelayanan Terpadu
        Satu Pintu. (4) Ketentuan mengenai pedoman kegiatan sosial dan budaya tercantum dalam
        Lampiran II yang merupakan bagian tidak terpisahkan dari peraturan walikota ini. Pedoman
        Penggunaan Moda Transportasi untuk Pergerakan Selama masa pandemi COVID-19, semua kegiatan
        pergerakan orang dan/atau barang dilakukan sesuai protokol kesehatan, sebagai berikut: a.
        Pengguna kendaraan mobil penumpang pribadi wajib mengikuti ketentuan sebagai berikut: 1.
        digunakan hanya untuk pemenuhan kebutuhan pokok dan/atau kegiatan lain yang diperbolehkan
        selama masa pandemi COVID-19, 2. melakukan penyemprotan disinfektan kendaraan setelah
        selesai digunakan, 3. menggunakan masker dan menyediakan hand sanitizer di dalam kendaraan,
        4. membatasi jumlah orang paling banyak 504 (lima puluh persen) dari kapasitas kendaraan,
        dan 5. tidak berkendara jika sedang mengalami gejala suhu tubuh 37,30C ke atas, batuk,
        pilek, diare dan sesak nafas. b. Pengguna kendaraan roda dua pribadi wajib mengikuti
        ketentuan sebagai berikut: 1. digunakan hanya untuk pemenuhan kebutuhan pokok dan/atau
        kegiatan lain yang diperbolehkan masa pandemi COVID-19, 2. melakukan penyemprotan
        disinfektan kendaraan dan atribut setelah selesai digunakan, 3. menggunakan masker, dan 4.
        tidak berkendara jika sedang mengalami gejala suhu tubuh 37,30C ke atas, batuk, pilek, diare
        dan sesak nafas. c. Kendaraan roda dua berbasis aplikasi dan konvensional, mengikuti pedoman
        sebagai berikut: 1. melakukan penyemprotan disinfektan dan/atau mencuci kendaraan setiap
        hari, dan 2. mewajibkan penumpang menggunakan helm yang dibawa sendiri. p. Kendaraan
        pribadi, angkutan orang dengan kendaraan bermotor umum, angkutan perkeretaapian, dan/atau
        moda transportasi barang wajib mengikuti ketentuan sebagai berikut: 1. untuk angkutan orang
        membatasi jumlah orang paling banyak 5096 (lima puluh persen) dari kapasitas angkutan: 2.
        untuk angkutan barang berkursi: a) satu baris diangkut paling banyak 2 (dua) orang, dan b)
        dua baris diangkut paling banyak 3 (tiga) orang. 3. melakukan penyemprotan disinfektan
        dan/atau mencuci kendaraan yang digunakan setiap hari, 4. menggunakan masker, 5. melakukan
        deteksi dan pemantauan suhu tubuh petugas dan penumpang yang memasuki moda transportasi, 6.
        memastikan petugas dan penumpang moda transportasi tidak sedang mengalami suhu tubuh 37,30C
        ke atas atau sakit, dan 7. menerapkan ketentuan mengenai jaga jarak secara fisik (physical
        distancing) baik pada saat antrian maupun saat di dalam angkutan. Bagian Kesepuluh Pedoman
        Kegiatan di Restoran atau Rumah Makan Pasal 27 (1) Dalam melayani pemenuhan kebutuhan
        penduduk selama masa pandemi COVID-19, penyediaan makanan dan minuman, penanggung jawab
        restoran/rumah makan/usaha sejenisnya mengikuti protokol kesehatan sebagai berikut: a.
        beroperasi antara pukul 07.00 WIB sampai dengan 21.00 WIB, b. mengutamakan layanan untuk
        dibawa pulang secara langsung (take away), melalui pemesanan secara daring, dan/atau dengan
        fasilitas telepon/layanan antar: c. melakukan pembatasan pelanggan sebesar 50” dari
        kapasitas tempat makan untuk makan di tempat dan d. mencatat daftar pelanggan, baik yang
        melakukan pembelian untuk maupun makan di tempat. e. menjaga jarak (physical distancing)
        dalam antrean paling f. menerapkan prinsip higiene sanitasi pangan dalam proses penanganan
        pangan sesuai ketentuan, g. menyediakan alat bantu seperti sarung tangan dan/atau penjepit
        makanan untuk meminimalkan kontak langsung dengan makanan siap saji dalam proses persiapan,
        pengolahan dan penyajian, h. memastikan kecukupan proses pemanasan dalam pengolahan makanan
        sesuai standar, i. melakukan pembersihan area kerja, fasilitas dan peralatan, khususnya yang
        memiliki permukaan yang bersentuhan langsung dengan makanan, j. menyediakan tempat cuci
        tangan dengan sabun bagi pelanggan dan karyawan, k. menyediakan protokol kesehatan dalam
        bentuk tertulis, 1. melarang bekerja karyawan yang sakit atau menunjukkan gejala suhu tubuh
        37,30C ke atas, batuk, pilek, diare dan sesak nafas, m. mengharuskan karyawan yang bertugas
        secara langsung dalam proses penyiapan makanan/minuman dan/atau berinteraksi dengan
        pelanggan menggunakan sarung tangan, masker, pelindung wajah/face shield, penutup kepala dan
        pakaian kerja sesuai pedoman keselamatan dan kesehatan kerja, dan n. menyediakan protokol
        kesehatan dalam bentuk tertulis. (2) Jika terdapat karyawan yang terindikasi COVID-19
        dan/atau menunjukkan gejala sebagaimana dimaksud pada ayat (1) huruf 1, maka karyawanan
        tersebut wajib melakukan rapid test dan isolasi mandiri. (3) Apabila hasil rapid test
        sebagaimana dimaksud pada ayat (2) dinyatakan reaktif, maka karyawan tersebut melakukan SWAB
        Test, dan restoran/tempat makan/usaha sejenisnya tersebut harus ditutup selama 14 (empat
        belas) hari dan/atau sampai keluarnya hasil SWAB Test dan dilakukan penyemprotan
        disinfektan. (4) Apabila hasil SWAB Test sebagaimana dimaksud pada ayat (3) dinyatakan
        negatif, maka restoran/tempat makan/usaha sejenisnya dapat dibuka Kembali. (5) Apabila hasil
        SWAB Test sebagaimana dimaksud pada ayat (4) dinyatakan positif, maka tempat kerja/kantor
        harus ditutup selama 14 (empat belas) hari. (6) Pelaksanaan Rapid Test dan SWAB Test
        sebagaimana dimaksud pada ayat (2) dan ayat (3) dilaksanakan dengan berkoordinasi dengan
        Dinas Kesehatan Daerah. (7) Seluruh biaya yang timbul untuk melakukan Rapid Test sebagaimana
        dimaksud pada ayat (2) dan SWAB Test sebagaimana dimaksud pada ayat (3), termasuk biaya
        perawatan terhadap karyawan sebagaimana dimaksud pada ayat (2) ditanggung oleh
        restoran/tempat makan/usaha sejenisnya. (8) Bagi restoran/rumah makan/usaha sejenisnya yang
        tidak dapat memenuhi ketentuan sebagaimana dimaksud pada ayat (1), dilarang untuk beroperasi
        sampai terpenuhinya ketentuan tersebut. Bagian Kesebelas Pedoman Kegiatan di Perhotelan
        Pasal 28 (1) Dalam masa pandemi COVID-19, perhotelan mengikuti ketentuan protokol kesehatan
