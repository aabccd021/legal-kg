        Pengelola Toko Obat/Farmasi dan/atau Fasilitas Kesehatan di bawah 37,3”C, . di area Toko
        Obat/Farmasi dan/atau Fasilitas Kesehatan, disiapkan tempat cuci tangan, sabun dan hand
